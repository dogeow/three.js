<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>3697. Electrophysiology Neuron</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#050510}
canvas{display:block}
#ui{position:fixed;top:16px;left:16px;color:#aaddff;font-size:12px;z-index:10;pointer-events:none;font-family:'Courier New',monospace}
#ui h3{color:#88ddff;font-size:14px;margin-bottom:6px;letter-spacing:2px}
.bar-wrap{display:flex;align-items:center;gap:8px;margin:2px 0}
.bar-label{min-width:80px;color:#6677aa}
.bar-bg{flex:1;height:5px;background:rgba(255,255,255,0.08);border-radius:2px}
.bar-fill{height:100%;border-radius:2px;transition:width 0.05s}
#msg{position:fixed;bottom:16px;left:16px;color:#445566;font-size:11px;pointer-events:none;font-family:'Courier New',monospace}
</style>
</head>
<body>
<div id="ui">
  <h3>NEURON ELECTROPHYSIOLOGY</h3>
  <div class="bar-wrap"><span class="bar-label">Membrane mV</span><div class="bar-bg"><div id="bar-v" class="bar-fill" style="background:#44aaff;width:50%"></div></div></div>
  <div class="bar-wrap"><span class="bar-label">Na channel</span><div class="bar-bg"><div id="bar-na" class="bar-fill" style="background:#ff6644;width:0%"></div></div></div>
  <div class="bar-wrap"><span class="bar-label">K channel</span><div class="bar-bg"><div id="bar-k" class="bar-fill" style="background:#44ffaa;width:0%"></div></div></div>
  <div class="bar-wrap"><span class="bar-label">Ca channel</span><div class="bar-bg"><div id="bar-ca" class="bar-fill" style="background:#ffcc44;width:0%"></div></div></div>
  <div style="margin-top:8px;font-size:11px;color:#445566">
    t=<span id="time">0.00</span>s | AP fired: <span id="ap-count">0</span>
  </div>
</div>
<div id="msg">Click soma = inject current | Space = fire burst | R = reset</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module" src="main.js"></script>
</body>
</html>
