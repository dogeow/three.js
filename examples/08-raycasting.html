<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js - Raycasting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000a00; font-family: 'Courier New', monospace; }
    .title {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ff41;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #00ff41;
      z-index: 10;
    }
    .hud {
      position: absolute;
      top: 60px;
      left: 20px;
      color: #00ff41;
      font-size: 12px;
      line-height: 1.8;
      text-shadow: 0 0 5px #00ff41;
      z-index: 10;
      background: rgba(0, 20, 0, 0.7);
      padding: 12px;
      border: 1px solid #00ff41;
    }
    .scanlines {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 65, 0.03) 2px,
        rgba(0, 255, 65, 0.03) 4px
      );
      pointer-events: none;
      z-index: 100;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="title">Raycasting</div>
  <div class="hud" id="hud">
    <div>OBJECT: --</div>
    <div>POSITION: --</div>
    <div>STATUS: AWAITING INPUT</div>
  </div>
  <div class="scanlines"></div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000a00);
    scene.fog = new THREE.FogExp2(0x000a00, 0.03);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(8, 6, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.1;
    bloomPass.strength = 1.5;
    composer.addPass(bloomPass);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const ambientLight = new THREE.AmbientLight(0x001100, 1);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0x00ff41, 3, 20);
    pointLight.position.set(5, 8, 5);
    scene.add(pointLight);

    // Grid helpers
    const gridHelper = new THREE.GridHelper(20, 20, 0x004400, 0x001100);
    scene.add(gridHelper);

    const axesHelper = new THREE.AxesHelper(3);
    axesHelper.position.set(-8, 0.01, -8);
    scene.add(axesHelper);

    // Interactive objects
    const objects = [];
    const colors = [0x00ff41, 0x00aaff, 0xff6600, 0xaa00ff, 0xffff00];

    const sphereGeo = new THREE.SphereGeometry(0.6, 32, 32);
    const sphereMat = new THREE.MeshStandardMaterial({ color: 0x00ff41, metalness: 0.5, roughness: 0.3, emissive: 0x002200 });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    sphere.position.set(0, 0.6, 0);
    sphere.castShadow = true;
    sphere.userData = { name: 'SPHERE', originalColor: 0x00ff41 };
    scene.add(sphere);
    objects.push(sphere);

    const boxGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
    const boxMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, metalness: 0.5, roughness: 0.3, emissive: 0x001122 });
    const box = new THREE.Mesh(boxGeo, boxMat);
    box.position.set(3, 0.6, 0);
    box.castShadow = true;
    box.userData = { name: 'BOX', originalColor: 0x00aaff };
    scene.add(box);
    objects.push(box);

    const torusGeo = new THREE.TorusGeometry(0.6, 0.2, 16, 50);
    const torusMat = new THREE.MeshStandardMaterial({ color: 0xff6600, metalness: 0.5, roughness: 0.3, emissive: 0x221100 });
    const torus = new THREE.Mesh(torusGeo, torusMat);
    torus.position.set(-3, 0.6, 0);
    torus.castShadow = true;
    torus.userData = { name: 'TORUS', originalColor: 0xff6600 };
    scene.add(torus);
    objects.push(torus);

    const octGeo = new THREE.OctahedronGeometry(0.6);
    const octMat = new THREE.MeshStandardMaterial({ color: 0xaa00ff, metalness: 0.5, roughness: 0.3, emissive: 0x110022 });
    const oct = new THREE.Mesh(octGeo, octMat);
    oct.position.set(0, 0.6, 3);
    oct.castShadow = true;
    oct.userData = { name: 'OCTAHEDRON', originalColor: 0xaa00ff };
    scene.add(oct);
    objects.push(oct);

    const icoGeo = new THREE.IcosahedronGeometry(0.6);
    const icoMat = new THREE.MeshStandardMaterial({ color: 0xffff00, metalness: 0.5, roughness: 0.3, emissive: 0x222200 });
    const ico = new THREE.Mesh(icoGeo, icoMat);
    ico.position.set(-3, 0.6, 3);
    ico.castShadow = true;
    ico.userData = { name: 'ICOSAHEDRON', originalColor: 0xffff00 };
    scene.add(ico);
    objects.push(ico);

    // Raycaster
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredObject = null;
    let clickedObject = null;

    function updateHUD(obj, status) {
      const hud = document.getElementById('hud');
      if (obj) {
        hud.innerHTML = `
          <div>OBJECT: ${obj.userData.name}</div>
          <div>POSITION: ${obj.position.x.toFixed(2)}, ${obj.position.y.toFixed(2)}, ${obj.position.z.toFixed(2)}</div>
          <div>STATUS: ${status}</div>
        `;
      } else {
        hud.innerHTML = `
          <div>OBJECT: --</div>
          <div>POSITION: --</div>
          <div>STATUS: AWAITING INPUT</div>
        `;
      }
    }

    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    window.addEventListener('click', (e) => {
      if (clickedObject) {
        // Reset previous click
        clickedObject.material.emissive.setHex(clickedObject.userData.originalColor >> 8);
        clickedObject.scale.set(1, 1, 1);
      }
      if (hoveredObject) {
        clickedObject = hoveredObject;
        // Pulse effect
        const pulse = () => {
          if (clickedObject) {
            const s = 1 + Math.sin(Date.now() * 0.01) * 0.1;
            clickedObject.scale.set(s, s, s);
            if (clickedObject === hoveredObject) requestAnimationFrame(pulse);
          }
        };
        pulse();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      // Rotation animation
      objects.forEach((obj, i) => {
        obj.rotation.y = elapsed * (0.3 + i * 0.1);
        obj.position.y = 0.6 + Math.sin(elapsed + i) * 0.1;
      });

      // Raycasting
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(objects);

      if (hoveredObject && hoveredObject !== (intersects[0] ? intersects[0].object : null)) {
        hoveredObject.material.emissive.setHex(hoveredObject.userData.originalColor >> 8);
        hoveredObject = null;
      }

      if (intersects.length > 0) {
        const obj = intersects[0].object;
        if (obj !== hoveredObject) {
          hoveredObject = obj;
          obj.material.emissive.setHex(0x00ff00);
          updateHUD(obj, 'HOVER DETECTED');
        }
      } else {
        if (hoveredObject === null) {
          updateHUD(null, 'AWAITING INPUT');
        }
      }

      controls.update();
      composer.render();
    }
    animate();
  </script>
</body>
</html>
