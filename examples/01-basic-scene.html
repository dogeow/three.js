<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js - Basic Scene</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    .title {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ffff;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
      z-index: 10;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="title">Basic Scene</div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);
    scene.fog = new THREE.FogExp2(0x0a0a0f, 0.03);

    // Camera
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(4, 3, 5);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // Post-processing
    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.5, 0.4, 0.85
    );
    bloomPass.threshold = 0.1;
    bloomPass.strength = 2.0;
    bloomPass.radius = 0.8;
    composer.addPass(bloomPass);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 3;
    controls.maxDistance = 15;

    // Lights
    const ambientLight = new THREE.AmbientLight(0x111122, 0.5);
    scene.add(ambientLight);

    const pointLight1 = new THREE.PointLight(0x00ffff, 3, 20);
    pointLight1.position.set(5, 5, 5);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0xff00ff, 3, 20);
    pointLight2.position.set(-5, 3, -5);
    scene.add(pointLight2);

    // Grid helper
    const gridHelper = new THREE.GridHelper(20, 40, 0x222233, 0x111122);
    scene.add(gridHelper);

    // Main cube
    const cubeGeometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
    const cubeMaterial = new THREE.MeshStandardMaterial({
      color: 0x00ffff,
      metalness: 0.9,
      roughness: 0.1,
      emissive: 0x001111,
    });
    const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
    cube.position.y = 0.75;
    scene.add(cube);

    // Wireframe cube
    const wireGeometry = new THREE.BoxGeometry(2, 2, 2);
    const wireMaterial = new THREE.MeshBasicMaterial({
      color: 0xff00ff,
      wireframe: true,
      transparent: true,
      opacity: 0.3,
    });
    const wireCube = new THREE.Mesh(wireGeometry, wireMaterial);
    wireCube.position.y = 0.75;
    scene.add(wireCube);

    // Floating ring
    const ringGeometry = new THREE.TorusGeometry(1.2, 0.05, 16, 100);
    const ringMaterial = new THREE.MeshStandardMaterial({
      color: 0xff00ff,
      metalness: 1,
      roughness: 0,
      emissive: 0x220022,
    });
    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
    ring.position.y = 0.75;
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);

    // Small orbiting spheres
    const spheres = [];
    const sphereCount = 8;
    for (let i = 0; i < sphereCount; i++) {
      const sGeo = new THREE.SphereGeometry(0.15, 16, 16);
      const sMat = new THREE.MeshStandardMaterial({
        color: i % 2 === 0 ? 0x00ffff : 0xff00ff,
        metalness: 0.8,
        roughness: 0.2,
        emissive: i % 2 === 0 ? 0x002222 : 0x220022,
      });
      const sphere = new THREE.Mesh(sGeo, sMat);
      sphere.userData.angle = (i / sphereCount) * Math.PI * 2;
      sphere.userData.radius = 2.5 + Math.random() * 0.5;
      sphere.userData.speed = 0.5 + Math.random() * 0.5;
      sphere.userData.yOffset = Math.random() * 2 - 1;
      spheres.push(sphere);
      scene.add(sphere);
    }

    // Resize handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      cube.rotation.x = elapsed * 0.3;
      cube.rotation.y = elapsed * 0.5;

      wireCube.rotation.x = -elapsed * 0.2;
      wireCube.rotation.y = -elapsed * 0.3;
      wireCube.scale.setScalar(1 + Math.sin(elapsed) * 0.05);

      ring.rotation.z = elapsed * 0.5;

      // Animate orbiting spheres
      spheres.forEach((sphere, i) => {
        sphere.userData.angle += 0.01 * sphere.userData.speed;
        sphere.position.x = Math.cos(sphere.userData.angle) * sphere.userData.radius;
        sphere.position.z = Math.sin(sphere.userData.angle) * sphere.userData.radius;
        sphere.position.y = 0.75 + Math.sin(elapsed * sphere.userData.speed * 2) + sphere.userData.yOffset;
      });

      pointLight1.position.x = Math.sin(elapsed * 0.7) * 6;
      pointLight1.position.z = Math.cos(elapsed * 0.7) * 6;
      pointLight2.position.x = Math.sin(elapsed * 0.5 + Math.PI) * 6;
      pointLight2.position.z = Math.cos(elapsed * 0.5 + Math.PI) * 6;

      controls.update();
      composer.render();
    }
    animate();
  </script>
</body>
</html>
