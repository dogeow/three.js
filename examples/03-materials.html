<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js - Materials</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0d0d0d; font-family: 'Courier New', monospace; }
    .title {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #d4af37;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #d4af37;
      z-index: 10;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="title">Materials</div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d0d0d);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.4, 0.85);
    composer.addPass(bloomPass);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Spotlight
    const spotLight = new THREE.SpotLight(0xffffff, 20);
    spotLight.position.set(0, 15, 0);
    spotLight.angle = Math.PI / 4;
    spotLight.penumbra = 0.5;
    spotLight.castShadow = true;
    scene.add(spotLight);
    scene.add(spotLight.target);

    const fillLight = new THREE.PointLight(0xd4af37, 2, 20);
    fillLight.position.set(-5, 3, 5);
    scene.add(fillLight);

    const rimLight = new THREE.PointLight(0xffffff, 1, 20);
    rimLight.position.set(5, 3, -5);
    scene.add(rimLight);

    // Pedestals
    const pedestalPositions = [
      [-5, 0, 0], [-1.67, 0, 0], [1.67, 0, 0], [5, 0, 0]
    ];
    const pedestals = [];
    pedestalPositions.forEach(([x, y, z]) => {
      const pGeo = new THREE.CylinderGeometry(0.8, 1, 0.5, 32);
      const pMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5, roughness: 0.5 });
      const pedestal = new THREE.Mesh(pGeo, pMat);
      pedestal.position.set(x, 0.25, z);
      pedestal.receiveShadow = true;
      scene.add(pedestal);
      pedestals.push(pedestal);
    });

    // Floor
    const floorGeo = new THREE.PlaneGeometry(30, 30);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    scene.add(floor);

    // Materials comparison
    const materials = [
      new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.8, roughness: 0.3, emissive: 0x332200 }),
      new THREE.MeshPhongMaterial({ color: 0xd4af37, shininess: 100, specular: 0xffffff, emissive: 0x221100 }),
      new THREE.MeshPhysicalMaterial({ color: 0xd4af37, metalness: 0.9, roughness: 0.1, clearcoat: 1.0, clearcoatRoughness: 0.1, emissive: 0x332200 }),
      new THREE.MeshToonMaterial({ color: 0xd4af37 }),
    ];

    const materialNames = ['Standard', 'Phong', 'Physical', 'Toon'];
    const geometries = [
      new THREE.BoxGeometry(1.2, 1.2, 1.2),
      new THREE.SphereGeometry(0.7, 32, 32),
      new THREE.TorusKnotGeometry(0.5, 0.18, 100, 16),
      new THREE.OctahedronGeometry(0.7),
    ];

    const meshes = [];
    pedestalPositions.forEach(([x, y, z], i) => {
      const mesh = new THREE.Mesh(geometries[i], materials[i]);
      mesh.position.set(x, 1.5, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      meshes.push(mesh);

      // Label
      const label = document.createElement('div');
      label.style.cssText = `position:absolute;color:#d4af37;font-size:11px;letter-spacing:2px;text-shadow:0 0 5px #d4af37;`;
      label.textContent = materialNames[i];
    });

    // Labels using sprites
    const labelColors = [0xd4af37, 0xd4af37, 0xd4af37, 0xd4af37];
    meshes.forEach((mesh, i) => {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#d4af37';
      ctx.font = 'bold 24px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(materialNames[i].toUpperCase(), 128, 40);
      const texture = new THREE.CanvasTexture(canvas);
      const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.position.set(pedestalPositions[i][0], 2.8, pedestalPositions[i][2]);
      sprite.scale.set(2, 0.5, 1);
      scene.add(sprite);
    });

    // Progress sphere showing roughness/metalness sweep
    const sweepGeo = new THREE.SphereGeometry(0.5, 64, 64);
    const sweepMat = new THREE.MeshPhysicalMaterial({
      color: 0xd4af37,
      metalness: 0.8,
      roughness: 0.05,
      clearcoat: 1.0,
      emissive: 0x332200,
    });
    const sweepMesh = new THREE.Mesh(sweepGeo, sweepMat);
    sweepMesh.position.set(0, 1, -4);
    sweepMesh.castShadow = true;
    scene.add(sweepMesh);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      meshes.forEach((mesh, i) => {
        mesh.rotation.y = elapsed * (0.3 + i * 0.15);
        mesh.position.y = 1.5 + Math.sin(elapsed + i) * 0.1;
      });

      sweepMesh.rotation.y = elapsed * 0.5;
      sweepMat.roughness = 0.05 + (Math.sin(elapsed * 0.5) + 1) * 0.45;
      sweepMat.metalness = 0.5 + Math.sin(elapsed * 0.3) * 0.5;

      controls.update();
      composer.render();
    }
    animate();
  </script>
</body>
</html>
