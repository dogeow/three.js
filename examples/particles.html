<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Particle System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }

    #info {
      position: absolute;
      top: 18px;
      left: 20px;
      color: #a8d8ff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.7;
      background: rgba(0, 10, 30, 0.65);
      border: 1px solid rgba(80, 160, 255, 0.25);
      border-radius: 8px;
      padding: 12px 18px;
      pointer-events: none;
      backdrop-filter: blur(6px);
      letter-spacing: 0.03em;
    }
    #info .label { color: #5b9bd5; font-size: 11px; text-transform: uppercase; }
    #info .value { color: #e0f0ff; font-weight: bold; }
    #info .sep { border-top: 1px solid rgba(80,160,255,0.15); margin-top: 6px; padding-top: 6px; }
  </style>
</head>
<body>

<div id="info">
  <div><span class="label">Particles</span> &nbsp;<span class="value" id="particleCount">0</span></div>
  <div class="sep"><span class="label">FPS</span> &nbsp;<span class="value" id="fps">0</span></div>
  <div class="sep"><span class="label">Mode</span> &nbsp;<span class="value" id="modeLabel">Rising</span></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Config ──────────────────────────────────────────────────────────────────
const PARTICLE_COUNT = 15000;
const MODES = ['rising', 'swirling', 'flowing'];
let modeIndex = 0;
let currentMode = MODES[modeIndex];

// ── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ── Scene & Camera ──────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x02040f);
scene.fog = new THREE.FogExp2(0x02040f, 0.018);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 20, 80);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.maxDistance = 300;
controls.minDistance = 10;

// ── Particle Buffer Setup ────────────────────────────────────────────────────
const positions  = new Float32Array(PARTICLE_COUNT * 3);
const colors     = new Float32Array(PARTICLE_COUNT * 3);
const sizes      = new Float32Array(PARTICLE_COUNT);
const velocities = new Float32Array(PARTICLE_COUNT * 3);
const phases     = new Float32Array(PARTICLE_COUNT);  // per-particle phase

// Custom attributes
const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position',  new THREE.BufferAttribute(positions,  3));
geometry.setAttribute('color',     new THREE.BufferAttribute(colors,     3));
geometry.setAttribute('size',      new THREE.BufferAttribute(sizes,       1));
geometry.setAttribute('velocity',  new THREE.BufferAttribute(velocities, 3));
geometry.setAttribute('phase',     new THREE.BufferAttribute(phases,      1));

// Color palettes
const palette = [
  new THREE.Color(0x4fc3f7),  // sky blue
  new THREE.Color(0x29b6f6),  // blue
  new THREE.Color(0x0288d1),  // deep blue
  new THREE.Color(0x00bcd4),  // cyan
  new THREE.Color(0x1de9b6),  // teal
  new THREE.Color(0x69f0ae),  // mint
  new THREE.Color(0x80d8ff),  // light blue
];

// Accent colors (rare bright particles)
const accentPalette = [
  new THREE.Color(0xffffff),  // white
  new THREE.Color(0xe040fb),  // purple
  new THREE.Color(0xff6d00),  // orange
];

function initParticles() {
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;

    // Spread in a wide volume
    positions[i3]     = (Math.random() - 0.5) * 180;
    positions[i3 + 1] = (Math.random() - 0.5) * 120;
    positions[i3 + 2] = (Math.random() - 0.5) * 180;

    // Color: mostly blue spectrum, occasional bright accent
    const col = Math.random() < 0.06
      ? accentPalette[Math.floor(Math.random() * accentPalette.length)]
      : palette[Math.floor(Math.random() * palette.length)];
    colors[i3]     = col.r;
    colors[i3 + 1] = col.g;
    colors[i3 + 2] = col.b;

    // Size variation
    sizes[i] = Math.random() * 2.5 + 0.5;

    // Velocities (will be overridden per mode)
    velocities[i3]     = 0;
    velocities[i3 + 1] = 0;
    velocities[i3 + 2] = 0;

    // Phase for individual timing
    phases[i] = Math.random() * Math.PI * 2;
  }
  geometry.attributes.position.needsUpdate  = true;
  geometry.attributes.color.needsUpdate     = true;
  geometry.attributes.size.needsUpdate       = true;
  geometry.attributes.velocity.needsUpdate  = true;
  geometry.attributes.phase.needsUpdate     = true;
}

initParticles();

// ── Shader Material ─────────────────────────────────────────────────────────
const vertexShader = /* glsl */ `
  attribute float size;
  attribute float phase;
  varying vec3  vColor;
  varying float vAlpha;

  uniform float uTime;
  uniform float uPixelRatio;

  void main() {
    vColor = color;
    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);

    // Subtle twinkle via phase
    float twinkle = 0.65 + 0.35 * sin(uTime * 2.2 + phase * 6.2831);
    vAlpha = twinkle;

    gl_PointSize = size * uPixelRatio * (220.0 / -mvPosition.z);
    gl_PointSize = clamp(gl_PointSize, 0.5, 12.0);
    gl_Position  = projectionMatrix * mvPosition;
  }
`;

const fragmentShader = /* glsl */ `
  varying vec3  vColor;
  varying float vAlpha;

  void main() {
    // Soft circular sprite
    vec2  uv   = gl_PointCoord - 0.5;
    float dist = length(uv);
    if (dist > 0.5) discard;

    // Core + halo
    float core  = 1.0 - smoothstep(0.0,  0.18, dist);
    float halo  = 1.0 - smoothstep(0.15, 0.5,  dist);
    float alpha = (core * 0.9 + halo * 0.5) * vAlpha;

    gl_FragColor = vec4(vColor * (1.0 + core * 1.4), alpha);
  }
`;

const material = new THREE.ShaderMaterial({
  uniforms: {
    uTime:       { value: 0 },
    uPixelRatio: { value: renderer.getPixelRatio() },
  },
  vertexShader,
  fragmentShader,
  transparent: true,
  depthWrite:  false,
  blending:    THREE.AdditiveBlending,
  vertexColors: true,
});

const points = new THREE.Points(geometry, material);
scene.add(points);

// ── Ambient glow sphere ─────────────────────────────────────────────────────
const glowGeo  = new THREE.SphereGeometry(60, 16, 16);
const glowMat  = new THREE.MeshBasicMaterial({
  color: 0x0a1a3a,
  transparent: true,
  opacity: 0.15,
  side: THREE.BackSide,
});
scene.add(new THREE.Mesh(glowGeo, glowMat));

// ── Background stars ─────────────────────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(3000 * 3);
for (let i = 0; i < 3000 * 3; i++) {
  starPos[i] = (Math.random() - 0.5) * 800;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({
  color: 0x8899bb,
  size: 0.4,
  transparent: true,
  opacity: 0.6,
  sizeAttenuation: true,
});
scene.add(new THREE.Points(starGeo, starMat));

// ── Mouse Interaction ────────────────────────────────────────────────────────
const mouse     = new THREE.Vector2(9999, 9999);
const mouseWorld = new THREE.Vector3();
let mouseInfluence = false;

window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  mouseInfluence = true;
});
window.addEventListener('mouseleave', () => { mouseInfluence = false; });

// Convert mouse to world position on a plane at z=0
const raycaster  = new THREE.Raycaster();
const planeNormal = new THREE.Vector3(0, 0, 1);
const plane = new THREE.Plane();

function updateMouseWorld() {
  if (!mouseInfluence) return;
  raycaster.setFromCamera(mouse, camera);
  plane.setFromNormalAndCoplanarPoint(planeNormal, new THREE.Vector3(0, 0, 0));
  raycaster.ray.intersectPlane(plane, mouseWorld);
}
updateMouseWorld();

// ── Animation ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let frameCount = 0;
let lastFPSUpdate = 0;
const posAttr  = geometry.attributes.position;
const velAttr  = geometry.attributes.velocity;

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();
  const delta   = clock.getDelta ? Math.min(clock.getDelta(), 0.05) : 0.016;

  material.uniforms.uTime.value = elapsed;

  // ── FPS counter ──
  frameCount++;
  if (elapsed - lastFPSUpdate > 0.5) {
    const fps = Math.round(frameCount / (elapsed - lastFPSUpdate));
    document.getElementById('fps').textContent = fps;
    frameCount = 0;
    lastFPSUpdate = elapsed;
  }

  updateMouseWorld();

  const pos = posAttr.array;
  const vel = velAttr.array;
  const ph  = geometry.attributes.phase.array;

  const t = elapsed;

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    const px = pos[i3], py = pos[i3 + 1], pz = pos[i3 + 2];
    const p = ph[i];

    let vx = 0, vy = 0, vz = 0;

    if (currentMode === 'rising') {
      // Gentle upward float with horizontal drift
      const noiseX = Math.sin(py * 0.05 + t * 0.7 + p) * 0.12;
      const noiseZ = Math.cos(py * 0.04 + t * 0.5 + p * 1.3) * 0.12;
      vy = 0.8 + Math.sin(p + t * 0.3) * 0.3;
      vx = noiseX;
      vz = noiseZ;

      // Mouse attraction / repulsion
      if (mouseInfluence) {
        const dx = mouseWorld.x - px;
        const dy = mouseWorld.y - py;
        const dz = mouseWorld.z - pz;
        const dist2 = dx * dx + dy * dy + dz * dz;
        const influence = 80 / (dist2 + 80);
        vx += dx * influence * 0.04;
        vy += dy * influence * 0.04;
        vz += dz * influence * 0.04;
      }

      pos[i3]     += vx;
      pos[i3 + 1] += vy;
      pos[i3 + 2] += vz;

      // Reset if too high
      if (pos[i3 + 1] > 80) {
        pos[i3]     = (Math.random() - 0.5) * 180;
        pos[i3 + 1] = -60;
        pos[i3 + 2] = (Math.random() - 0.5) * 180;
      }

    } else if (currentMode === 'swirling') {
      // Orbital swirl with varying radius and height
      const radius = 30 + Math.sin(t * 0.2 + p * 3) * 20;
      const angle  = t * 0.6 + p * 6.2831;
      const height = 25 * Math.sin(t * 0.3 + p * 2);

      const targetX = Math.cos(angle) * radius;
      const targetY = height;
      const targetZ = Math.sin(angle) * radius;

      vx = (targetX - px) * 0.015;
      vy = (targetY - py) * 0.015;
      vz = (targetZ - pz) * 0.015;

      pos[i3]     += vx;
      pos[i3 + 1] += vy;
      pos[i3 + 2] += vz;

    } else if (currentMode === 'flowing') {
      // Flowing field using sine/cosine waves
      const scale  = 0.06;
      const speed  = 0.4;
      const flowX  = Math.sin(py * scale + t * speed + p) * 0.8;
      const flowZ  = Math.cos(px * scale + t * speed * 0.7 + p * 1.5) * 0.8;
      const flowY  = Math.sin(pz * scale * 0.7 + t * speed * 0.5 + p) * 0.4;

      pos[i3]     += flowX;
      pos[i3 + 1] += flowY;
      pos[i3 + 2] += flowZ;

      // Wrap around bounds
      if (pos[i3]     >  90) pos[i3]     = -90;
      if (pos[i3]     < -90) pos[i3]     =  90;
      if (pos[i3 + 1] >  60) pos[i3 + 1] = -60;
      if (pos[i3 + 1] < -60) pos[i3 + 1] =  60;
      if (pos[i3 + 2] >  90) pos[i3 + 2] = -90;
      if (pos[i3 + 2] < -90) pos[i3 + 2] =  90;
    }
  }

  posAttr.needsUpdate = true;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ── Mode Toggle (spacebar) ────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    modeIndex = (modeIndex + 1) % MODES.length;
    currentMode = MODES[modeIndex];
    document.getElementById('modeLabel').textContent =
      currentMode.charAt(0).toUpperCase() + currentMode.slice(1);
  }
});

// ── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  material.uniforms.uPixelRatio.value = renderer.getPixelRatio();
});

// ── Init UI ───────────────────────────────────────────────────────────────────
document.getElementById('particleCount').textContent = PARTICLE_COUNT.toLocaleString();
</script>

</body>
</html>
