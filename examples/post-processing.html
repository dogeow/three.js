<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Post-Processing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
    }
    #title {
      position: fixed;
      top: 24px;
      left: 32px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      z-index: 10;
      pointer-events: none;
    }
    #title span { color: #7c3aed; }
  </style>
</head>
<body>
  <div id="title">Three.js <span>Post-Processing</span></div>
  <div id="info">Drag · OrbitControls &nbsp;|&nbsp; GUI · lil-gui</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    // ─────────────────────────────────────────────
    // Custom Shader: Vignette + Chromatic Aberration
    // ─────────────────────────────────────────────
    const VignetteChromaticShader = {
      uniforms: {
        tDiffuse: { value: null },
        uVignetteStrength: { value: 0.5 },
        uVignetteSmoothness: { value: 0.5 },
        uChromaticStrength: { value: 0.003 },
        uEnabled: { value: 1.0 },
      },
      vertexShader: /* glsl */ `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: /* glsl */ `
        uniform sampler2D tDiffuse;
        uniform float uVignetteStrength;
        uniform float uVignetteSmoothness;
        uniform float uChromaticStrength;
        uniform float uEnabled;
        varying vec2 vUv;

        void main() {
          vec2 uv = vUv;
          vec2 center = uv - 0.5;
          float dist = length(center);

          // Chromatic aberration
          float r = texture2D(tDiffuse, uv + center * uChromaticStrength * uEnabled).r;
          float g = texture2D(tDiffuse, uv).g;
          float b = texture2D(tDiffuse, uv - center * uChromaticStrength * uEnabled).b;
          vec3 color = vec3(r, g, b);

          // Vignette
          float vignette = smoothstep(0.8, 0.8 - uVignetteSmoothness, dist * (uVignetteStrength + 0.5));
          color = mix(color * 0.15, color, vignette);

          gl_FragColor = vec4(color, 1.0);
        }
      `,
    };

    // ─────────────────────────────────────────────
    // Scene Setup
    // ─────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);
    scene.fog = new THREE.FogExp2(0x0a0a0f, 0.04);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 6, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 5;
    controls.maxDistance = 40;

    // ─────────────────────────────────────────────
    // Lights
    // ─────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0x1a1a2e, 1.5);
    scene.add(ambientLight);

    const pointLight1 = new THREE.PointLight(0x7c3aed, 8, 30);
    pointLight1.position.set(5, 8, 5);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0x06b6d4, 6, 25);
    pointLight2.position.set(-6, 5, -3);
    scene.add(pointLight2);

    const pointLight3 = new THREE.PointLight(0xf43f5e, 5, 20);
    pointLight3.position.set(0, 3, -8);
    scene.add(pointLight3);

    // ─────────────────────────────────────────────
    // Objects
    // ─────────────────────────────────────────────

    // Torus knot – emissive purple
    const torusKnotGeo = new THREE.TorusKnotGeometry(2, 0.6, 120, 20);
    const torusKnotMat = new THREE.MeshStandardMaterial({
      color: 0x7c3aed,
      emissive: 0x4c1d95,
      emissiveIntensity: 0.6,
      metalness: 0.9,
      roughness: 0.1,
    });
    const torusKnot = new THREE.Mesh(torusKnotGeo, torusKnotMat);
    torusKnot.position.set(0, 4, 0);
    scene.add(torusKnot);

    // Floating spheres – emissive cyan
    const sphereMat = new THREE.MeshStandardMaterial({
      color: 0x06b6d4,
      emissive: 0x0891b2,
      emissiveIntensity: 0.5,
      metalness: 0.7,
      roughness: 0.2,
    });
    const spheres = [];
    for (let i = 0; i < 12; i++) {
      const r = 0.3 + Math.random() * 0.7;
      const geo = new THREE.SphereGeometry(r, 24, 24);
      const mesh = new THREE.Mesh(geo, sphereMat.clone());
      const angle = (i / 12) * Math.PI * 2;
      const radius = 6 + Math.random() * 4;
      mesh.position.set(
        Math.cos(angle) * radius,
        1 + Math.random() * 6,
        Math.sin(angle) * radius
      );
      mesh.userData = {
        baseY: mesh.position.y,
        speed: 0.4 + Math.random() * 0.6,
        phase: Math.random() * Math.PI * 2,
        radius,
        angle,
      };
      scene.add(mesh);
      spheres.push(mesh);
    }

    // Torus rings – emissive pink/rose
    const ringMat = new THREE.MeshStandardMaterial({
      color: 0xf43f5e,
      emissive: 0xbe123c,
      emissiveIntensity: 0.4,
      metalness: 0.8,
      roughness: 0.15,
    });
    const rings = [];
    for (let i = 0; i < 5; i++) {
      const rOuter = 1.2 + i * 0.5;
      const geo = new THREE.TorusGeometry(rOuter, 0.08, 16, 80);
      const mesh = new THREE.Mesh(geo, ringMat.clone());
      mesh.position.set(
        (Math.random() - 0.5) * 8,
        -1 + i * 0.5,
        (Math.random() - 0.5) * 8
      );
      mesh.rotation.x = Math.random() * Math.PI;
      mesh.rotation.z = Math.random() * Math.PI;
      mesh.userData = {
        rotSpeed: (Math.random() > 0.5 ? 1 : -1) * (0.2 + Math.random() * 0.4),
        axis: new THREE.Vector3(
          Math.random() - 0.5,
          Math.random() - 0.5,
          Math.random() - 0.5
        ).normalize(),
      };
      scene.add(mesh);
      rings.push(mesh);
    }

    // Ground – dark reflective
    const groundGeo = new THREE.PlaneGeometry(60, 60);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x0d0d14,
      metalness: 0.6,
      roughness: 0.4,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1;
    scene.add(ground);

    // Grid helper
    const grid = new THREE.GridHelper(60, 40, 0x1a1a2e, 0x0f0f1a);
    grid.position.y = -0.99;
    scene.add(grid);

    // Particle field
    const particleCount = 600;
    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      positions[i * 3 + 0] = (Math.random() - 0.5) * 50;
      positions[i * 3 + 1] = Math.random() * 20;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 50;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({
      color: 0x6d28d9,
      size: 0.08,
      transparent: true,
      opacity: 0.7,
      sizeAttenuation: true,
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // ─────────────────────────────────────────────
    // Post-Processing
    // ─────────────────────────────────────────────
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    // Bloom pass
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      0.8,   // strength
      0.4,   // radius
      0.85   // threshold
    );
    composer.addPass(bloomPass);

    // Custom vignette + chromatic aberration pass
    const vignettePass = new ShaderPass(VignetteChromaticShader);
    composer.addPass(vignettePass);

    // ─────────────────────────────────────────────
    // GUI
    // ─────────────────────────────────────────────
    const gui = new GUI({ title: 'Post-Processing Controls' });
    gui.domElement.style.setProperty('--bg-color', '#0a0a0f');
    gui.domElement.style.setProperty('--title-background-color', '#1a1a2e');
    gui.domElement.style.setProperty('--widget-color', '#2d2d4a');
    gui.domElement.style.setProperty('--hover-color', '#3d3d5a');
    gui.domElement.style.setProperty('--focus-color', '#7c3aed');
    gui.domElement.style.setProperty('--number-color', '#06b6d4');
    gui.domElement.style.setProperty('--string-color', '#f43f5e');

    const bloomFolder = gui.addFolder('Bloom');
    bloomFolder.add(bloomPass, 'strength', 0, 3, 0.01).name('Strength');
    bloomFolder.add(bloomPass, 'radius', 0, 2, 0.01).name('Radius');
    bloomFolder.add(bloomPass, 'threshold', 0, 1, 0.01).name('Threshold');
    bloomFolder.open();

    const vigFolder = gui.addFolder('Vignette + Chromatic');
    vigFolder.add(vignettePass.uniforms.uVignetteStrength, 'value', 0, 2, 0.01).name('Vignette Strength');
    vigFolder.add(vignettePass.uniforms.uVignetteSmoothness, 'value', 0.05, 1, 0.01).name('Vignette Smooth');
    vigFolder.add(vignettePass.uniforms.uChromaticStrength, 'value', 0, 0.02, 0.0005).name('Chromatic Offset');
    vigFolder.open();

    const fxFolder = gui.addFolder('Effects Toggle');
    const fxState = { bloom: true, vignette: true };
    fxFolder.add(fxState, 'bloom').name('Bloom').onChange((v) => {
      bloomPass.enabled = v;
    });
    fxFolder.add(fxState, 'vignette').name('Vignette + CA').onChange((v) => {
      vignettePass.uniforms.uEnabled.value = v ? 1.0 : 0.0;
    });
    fxFolder.open();

    const animFolder = gui.addFolder('Animation Speed');
    const animSpeed = { scale: 1.0 };
    animFolder.add(animSpeed, 'scale', 0, 3, 0.01).name('Speed');

    // ─────────────────────────────────────────────
    // Resize
    // ─────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      bloomPass.resolution.set(window.innerWidth, window.innerHeight);
    });

    // ─────────────────────────────────────────────
    // Animate
    // ─────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      const speed = animSpeed.scale;

      // Torus knot rotation
      torusKnot.rotation.x = elapsed * 0.3 * speed;
      torusKnot.rotation.y = elapsed * 0.2 * speed;

      // Floating spheres
      spheres.forEach((s) => {
        const ud = s.userData;
        s.position.y = ud.baseY + Math.sin(elapsed * ud.speed * speed + ud.phase) * 1.5;
        s.position.x = Math.cos(elapsed * 0.1 * speed + ud.phase) * ud.radius;
        s.position.z = Math.sin(elapsed * 0.1 * speed + ud.phase) * ud.radius;
      });

      // Ring rotations
      rings.forEach((r) => {
        r.rotateOnAxis(r.userData.axis, elapsed * r.userData.rotSpeed * speed * 0.3);
      });

      // Particle slow drift
      particles.rotation.y = elapsed * 0.02 * speed;

      // Light orbit
      pointLight1.position.x = Math.cos(elapsed * 0.4 * speed) * 7;
      pointLight1.position.z = Math.sin(elapsed * 0.4 * speed) * 7;
      pointLight2.position.x = Math.cos(elapsed * 0.3 * speed + 2) * 8;
      pointLight2.position.z = Math.sin(elapsed * 0.3 * speed + 2) * 8;

      controls.update();
      composer.render();
    }

    animate();
  </script>
</body>
</html>
