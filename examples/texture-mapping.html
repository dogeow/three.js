<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three.js 纹理贴图 Texture Mapping</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d12; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #info {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.75); font-size: 13px; text-align: center;
    background: rgba(0,0,0,0.45); padding: 8px 20px; border-radius: 20px;
    backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08);
    pointer-events: none; z-index: 10;
    letter-spacing: 0.5px;
  }
  #labels {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 5;
  }
  .label {
    position: absolute; color: #fff; font-size: 11px; font-weight: 600;
    background: rgba(0,0,0,0.55); padding: 3px 8px; border-radius: 4px;
    border-left: 2px solid #6cf; white-space: nowrap;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<div id="info">Three.js Texture Mapping — 拖动旋转 · 滚轮缩放</div>
<div id="labels"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer ──────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ── Scene / Camera ─────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d12);
scene.fog = new THREE.Fog(0x0d0d12, 20, 50);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 4, 14);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 5;
controls.maxDistance = 30;

// ── Lights ─────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5e0, 2.2);
sun.position.set(6, 10, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 40;
sun.shadow.camera.left = -12;
sun.shadow.camera.right = 12;
sun.shadow.camera.top = 12;
sun.shadow.camera.bottom = -12;
scene.add(sun);

const fill = new THREE.PointLight(0x4488ff, 1.5, 20);
fill.position.set(-6, 4, -4);
scene.add(fill);

const rim = new THREE.PointLight(0xff6644, 0.8, 15);
rim.position.set(5, -2, -6);
scene.add(rim);

// ── Ground ─────────────────────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x111118,
  roughness: 0.9,
  metalness: 0.1,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2;
ground.receiveShadow = true;
scene.add(ground);

// ── Texture Sources ─────────────────────────────────────────────────────────
// We'll use several public-image texture sources
const TEX = {
  // Color / diffuse textures (public domain images)
  brick:   'https://threejs.org/examples/textures/brick_diffuse.jpg',
  // Normal maps from three.js examples
  normal1: 'https://threejs.org/examples/textures/normal/normal1.png',
  normal2: 'https://threejs.org/examples/textures/normal/normal2.png',
  // Map tiles / tiling textures
  gravel:  'https://threejs.org/examples/textures/gravel Gravel_002_COLOR.jpg',
};

function loadTex(url) {
  return new Promise(resolve => {
    new THREE.TextureLoader().load(url, tex => {
      tex.colorSpace = THREE.SRGBColorSpace;
      resolve(tex);
    });
  });
}

// ── 1. Basic Texture Mapping (brick) ──────────────────────────────────────
async function makeBasic() {
  const geo = new THREE.BoxGeometry(1.8, 1.8, 1.8);
  const mat = new THREE.MeshStandardMaterial({ map: await loadTex(TEX.brick) });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(-5, 1.5, 0);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  label(mesh, '基础贴图\nColor Map');
  return mesh;
}

// ── 2. Repeat Wrapping — tiling ───────────────────────────────────────────
async function makeTiling() {
  const tex = await loadTex(TEX.brick);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(3, 3);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();

  const geo = new THREE.BoxGeometry(1.8, 1.8, 1.8);
  const mat = new THREE.MeshStandardMaterial({ map: tex });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(-2.5, 1.5, 0);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  label(mesh, '重复平铺\n3× repeat');
  return mesh;
}

// ── 3. UV Offset / Scale — sprite-sheet-like atlas ─────────────────────────
async function makeUVAtlas() {
  // Use a grid texture with UV offset to show a sub-region
  const tex = await loadTex(TEX.brick);
  const atlasW = 4, atlasH = 4;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1 / atlasW, 1 / atlasH);
  tex.offset.set(0 / atlasW, 0 / atlasH); // top-left tile
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();

  const geo = new THREE.BoxGeometry(1.8, 1.8, 1.8);
  const mat = new THREE.MeshStandardMaterial({ map: tex });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(0, 1.5, 0);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  label(mesh, 'UV Atlas\n单块平铺');
  return mesh;
}

// ── 4. Normal Mapping ──────────────────────────────────────────────────────
async function makeNormalMapping() {
  const geo = new THREE.SphereGeometry(1.1, 64, 64);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xcccccc,
    normalMap: await loadTex(TEX.normal1),
    normalScale: new THREE.Vector2(1.2, 1.2),
    roughness: 0.6,
    metalness: 0.0,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(2.5, 1.5, 0);
  mesh.castShadow = true;
  scene.add(mesh);
  label(mesh, '法线贴图\nNormal Map');
  return mesh;
}

// ── 5. Roughness + Normal Map ──────────────────────────────────────────────
async function makeRoughness() {
  const geo = new THREE.CylinderGeometry(0.9, 0.9, 2, 64);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xdddddd,
    normalMap: await loadTex(TEX.normal2),
    roughness: 0.85,
    metalness: 0.15,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(5, 1.5, 0);
  mesh.castShadow = true;
  scene.add(mesh);
  label(mesh, '粗糙度+法线\nRoughness+Normal');
  return mesh;
}

// ── 6. CanvasTexture (procedural) ─────────────────────────────────────────
function makeProcedural() {
  const size = 512;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Checkerboard pattern
  const cell = 32;
  for (let y = 0; y < size; y += cell) {
    for (let x = 0; x < size; x += cell) {
      const even = ((x / cell) + (y / cell)) % 2 === 0;
      ctx.fillStyle = even ? '#1a1a2e' : '#16213e';
      ctx.fillRect(x, y, cell, cell);
    }
  }

  // Hexagon dots pattern overlay
  ctx.fillStyle = 'rgba(100,200,255,0.15)';
  for (let y = 0; y < size + cell; y += cell * 0.866) {
    for (let x = 0; x < size + cell; x += cell) {
      const ox = (Math.floor(y / (cell * 0.866)) % 2) * (cell / 2);
      ctx.beginPath();
      ctx.arc(x + ox, y, cell * 0.28, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Grid lines
  ctx.strokeStyle = 'rgba(100,200,255,0.08)';
  ctx.lineWidth = 1;
  for (let y = 0; y <= size; y += cell) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(size, y); ctx.stroke();
  }
  for (let x = 0; x <= size; x += cell) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, size); ctx.stroke();
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2, 2);

  const geo = new THREE.TorusKnotGeometry(0.8, 0.3, 128, 32);
  const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.4, metalness: 0.3 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(-3.75, 1.5, -4);
  mesh.castShadow = true;
  scene.add(mesh);
  label(mesh, 'CanvasTexture\n程序纹理');
  return mesh;
}

// ── 7. VideoTexture ───────────────────────────────────────────────────────
function makeVideoTexture() {
  // Use a public sample video
  const video = document.createElement('video');
  video.src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4';
  video.crossOrigin = 'anonymous';
  video.loop = true;
  video.muted = true;
  video.playsInline = true;
  video.play().catch(() => {});

  const tex = new THREE.VideoTexture(video);
  tex.colorSpace = THREE.SRGBColorSpace;

  const geo = new THREE.IcosahedronGeometry(1.2, 4);
  const mat = new THREE.MeshStandardMaterial({ map: tex, emissive: 0x222233, emissiveIntensity: 0.3 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(0, 1.5, -4);
  mesh.castShadow = true;
  scene.add(mesh);
  label(mesh, 'VideoTexture\n视频纹理');
  return mesh;
}

// ── 8. Normal map comparison sphere ────────────────────────────────────────
async function makeNormalCompare() {
  const geo = new THREE.SphereGeometry(1.1, 64, 64);

  const group = new THREE.Group();
  group.position.set(3.75, 1.5, -4);

  // Without normal map
  const matA = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, roughness: 0.7, metalness: 0.0 });
  const meshA = new THREE.Mesh(geo, matA);
  meshA.position.x = -1.4;
  meshA.castShadow = true;
  group.add(meshA);

  // With normal map
  const matB = new THREE.MeshStandardMaterial({
    color: 0xbbbbbb,
    normalMap: await loadTex(TEX.normal1),
    normalScale: new THREE.Vector2(1.0, 1.0),
    roughness: 0.7,
    metalness: 0.0,
  });
  const meshB = new THREE.Mesh(geo, matB);
  meshB.position.x = 1.4;
  meshB.castShadow = true;
  group.add(meshB);

  scene.add(group);
  label(group, '法线对比\nNo NML  vs  NML');
  return group;
}

// ── Label helper ────────────────────────────────────────────────────────────
const labelContainer = document.getElementById('labels');
function label(obj, text) {
  const el = document.createElement('div');
  el.className = 'label';
  el.textContent = text;
  labelContainer.appendChild(el);
  obj._labelEl = el;
}

function updateLabels() {
  const w = window.innerWidth, h = window.innerHeight;
  labelContainer.querySelectorAll('.label').forEach(el => {
    // Find associated mesh
    let found = false;
    scene.traverse(obj => {
      if (obj._labelEl === el) {
        const v = new THREE.Vector3();
        obj.getWorldPosition(v);
        v.project(camera);
        const x = (v.x * 0.5 + 0.5) * w;
        const y = (-(v.y * 0.5) + 0.5) * h - 40;
        if (v.z < 1) {
          el.style.display = 'block';
          el.style.left = x + 'px';
          el.style.top = y + 'px';
        } else {
          el.style.display = 'none';
        }
        found = true;
      }
    });
  });
}

// ── Animate a rotating element ─────────────────────────────────────────────
const rotators = [];

function addRotator(obj, speed = 0.005) {
  rotators.push({ obj, speed });
}

// ── Build scene ────────────────────────────────────────────────────────────
makeBasic().then(obj => addRotator(obj, 0.004));
makeTiling().then(obj => addRotator(obj, 0.004));
makeUVAtlas().then(obj => addRotator(obj, 0.004));
makeNormalMapping().then(obj => addRotator(obj, 0.006));
makeRoughness().then(obj => addRotator(obj, 0.005));
makeProcedural();
makeVideoTexture();
makeNormalCompare();

// ── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Render loop ─────────────────────────────────────────────────────────────
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;
  controls.update();
  rotators.forEach(r => { r.obj.rotation.y += r.speed; });
  updateLabels();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
