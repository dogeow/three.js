<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js - 3D Text</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0a; font-family: 'Courier New', monospace; }
    .title {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #d4af37;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #d4af37;
      z-index: 10;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="title">3D Text</div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.3;
    bloomPass.strength = 1.2;
    bloomPass.radius = 0.8;
    composer.addPass(bloomPass);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 5;
    controls.maxDistance = 30;

    const ambientLight = new THREE.AmbientLight(0x332200, 1);
    scene.add(ambientLight);

    const spotLight = new THREE.SpotLight(0xffd700, 10);
    spotLight.position.set(0, 10, 5);
    spotLight.angle = Math.PI / 4;
    spotLight.penumbra = 0.5;
    spotLight.castShadow = true;
    scene.add(spotLight);
    scene.add(spotLight.target);

    const pointLight1 = new THREE.PointLight(0xffd700, 3, 15);
    pointLight1.position.set(5, 3, 5);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0xffffff, 2, 15);
    pointLight2.position.set(-5, 3, -5);
    scene.add(pointLight2);

    const textMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xd4af37,
      metalness: 1.0,
      roughness: 0.1,
      clearcoat: 1.0,
      clearcoatRoughness: 0.05,
    });

    const fontLoader = new FontLoader();
    fontLoader.load(
      'https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json',
      (font) => {
        const textGeo = new TextGeometry('THREE.JS', {
          font, size: 1.2, height: 0.4, curveSegments: 12,
          bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.03,
          bevelOffset: 0, bevelSegments: 5,
        });
        textGeo.computeBoundingBox();
        textGeo.center();
        const textMesh = new THREE.Mesh(textGeo, textMaterial);
        textMesh.position.y = 0.5;
        textMesh.castShadow = true;
        scene.add(textMesh);
      },
      undefined,
      () => {
        const fallbackGroup = new THREE.Group();
        const letters = 'THREE.JS'.split('');
        let xOffset = -letters.length * 0.4;
        letters.forEach((char, i) => {
          const box = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1, 0.3), textMaterial);
          box.position.set(xOffset + i * 0.8, 0.5, 0);
          fallbackGroup.add(box);
        });
        scene.add(fallbackGroup);
      }
    );

    const floorGeo = new THREE.PlaneGeometry(30, 30);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.5;
    floor.receiveShadow = true;
    scene.add(floor);

    const sparkleCount = 200;
    const sparklePositions = new Float32Array(sparkleCount * 3);
    for (let i = 0; i < sparkleCount; i++) {
      sparklePositions[i * 3] = (Math.random() - 0.5) * 15;
      sparklePositions[i * 3 + 1] = Math.random() * 8;
      sparklePositions[i * 3 + 2] = (Math.random() - 0.5) * 8;
    }
    const sparkleGeo = new THREE.BufferGeometry();
    sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePositions, 3));
    const sparkleMat = new THREE.PointsMaterial({ color: 0xd4af37, size: 0.05, blending: THREE.AdditiveBlending, transparent: true });
    const sparkles = new THREE.Points(sparkleGeo, sparkleMat);
    scene.add(sparkles);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      sparkles.rotation.y = elapsed * 0.1;
      controls.update();
      composer.render();
    }
    animate();
  </script>
</body>
</html>
