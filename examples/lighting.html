<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Lighting Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #e0e0e0;
      font-size: 13px;
      line-height: 1.6;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    #info h1 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: #fff; }
    #info p { opacity: 0.7; }
  </style>
</head>
<body>
  <div id="info">
    <h1>Three.js Lighting</h1>
    <p>Drag lil-gui panels to tweak lights</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

    // ─── Scene Setup ───────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);
    scene.fog = new THREE.FogExp2(0x0a0a0f, 0.045);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(12, 9, 14);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.target.set(0, 1, 0);
    controls.minDistance = 5;
    controls.maxDistance = 50;

    // ─── Lights ────────────────────────────────────────────────────────────

    // AmbientLight
    const ambientLight = new THREE.AmbientLight(0x223355, 0.4);
    scene.add(ambientLight);

    // HemisphereLight (sky/ground gradient)
    const hemiLight = new THREE.HemisphereLight(0x4466aa, 0x332211, 0.5);
    hemiLight.position.set(0, 20, 0);
    scene.add(hemiLight);

    // DirectionalLight (sun-like with shadows)
    const dirLight = new THREE.DirectionalLight(0xfff4e0, 1.8);
    dirLight.position.set(8, 14, 6);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    dirLight.shadow.bias = -0.001;
    dirLight.shadow.normalBias = 0.02;
    scene.add(dirLight);

    // PointLight (radial, pulsing)
    const pointLight = new THREE.PointLight(0xff6622, 2.5, 20, 2);
    pointLight.position.set(-4, 3, -3);
    pointLight.castShadow = true;
    pointLight.shadow.mapSize.set(1024, 1024);
    pointLight.shadow.bias = -0.001;
    scene.add(pointLight);

    // SpotLight (cone with penumbra, animated)
    const spotLight = new THREE.SpotLight(0x22ccff, 5.0, 25, Math.PI / 6, 0.4, 2);
    spotLight.position.set(5, 10, -4);
    spotLight.target.position.set(0, 0, 0);
    spotLight.castShadow = true;
    spotLight.shadow.mapSize.set(2048, 2048);
    spotLight.shadow.bias = -0.001;
    spotLight.shadow.normalBias = 0.03;
    spotLight.penumbra = 0.4;
    scene.add(spotLight);
    scene.add(spotLight.target);

    // ─── Scene Objects ─────────────────────────────────────────────────────

    // Ground plane
    const groundGeo = new THREE.PlaneGeometry(30, 30, 60, 60);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x111118,
      roughness: 0.85,
      metalness: 0.1,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid helper
    const gridHelper = new THREE.GridHelper(30, 30, 0x222244, 0x15152a);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    // Sphere
    const sphereGeo = new THREE.SphereGeometry(1.4, 64, 64);
    const sphereMat = new THREE.MeshStandardMaterial({
      color: 0xccbbff,
      roughness: 0.2,
      metalness: 0.6,
      envMapIntensity: 1.0,
    });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    sphere.position.set(0, 1.4, 0);
    sphere.castShadow = true;
    sphere.receiveShadow = true;
    scene.add(sphere);

    // Torus knot
    const torusKnotGeo = new THREE.TorusKnotGeometry(0.7, 0.25, 128, 32);
    const torusKnotMat = new THREE.MeshStandardMaterial({
      color: 0xff6644,
      roughness: 0.3,
      metalness: 0.8,
    });
    const torusKnot = new THREE.Mesh(torusKnotGeo, torusKnotMat);
    torusKnot.position.set(4, 1.5, -2);
    torusKnot.castShadow = true;
    torusKnot.receiveShadow = true;
    scene.add(torusKnot);

    // Box
    const boxGeo = new THREE.BoxGeometry(2, 2, 2);
    const boxMat = new THREE.MeshStandardMaterial({
      color: 0x44ddaa,
      roughness: 0.4,
      metalness: 0.5,
    });
    const box = new THREE.Mesh(boxGeo, boxMat);
    box.position.set(-4, 1, -1.5);
    box.castShadow = true;
    box.receiveShadow = true;
    scene.add(box);

    // Cylinder
    const cylGeo = new THREE.CylinderGeometry(0.6, 0.6, 2.5, 32);
    const cylMat = new THREE.MeshStandardMaterial({
      color: 0xeedd44,
      roughness: 0.35,
      metalness: 0.7,
    });
    const cylinder = new THREE.Mesh(cylGeo, cylMat);
    cylinder.position.set(2, 1.25, 4);
    cylinder.castShadow = true;
    cylinder.receiveShadow = true;
    scene.add(cylinder);

    // Icosahedron
    const icoGeo = new THREE.IcosahedronGeometry(0.9, 1);
    const icoMat = new THREE.MeshStandardMaterial({
      color: 0xff44aa,
      roughness: 0.25,
      metalness: 0.6,
      wireframe: false,
    });
    const ico = new THREE.Mesh(icoGeo, icoMat);
    ico.position.set(-2.5, 1.5, 4);
    ico.castShadow = true;
    ico.receiveShadow = true;
    scene.add(ico);

    // Small decorative spheres
    const smallSpherePositions = [
      [-6, 0.4, 0], [6, 0.4, 2], [-3, 0.4, -5], [5, 0.4, -5], [0, 0.4, 6]
    ];
    smallSpherePositions.forEach(([x, y, z]) => {
      const sg = new THREE.SphereGeometry(0.4, 24, 24);
      const sm = new THREE.MeshStandardMaterial({ color: 0x8888cc, roughness: 0.3, metalness: 0.6 });
      const mesh = new THREE.Mesh(sg, sm);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
    });

    // Wall panels for bounce lighting
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9, metalness: 0.0 });
    const wallPositions = [
      { pos: [0, 3, -8], rot: [0, 0, 0], size: [16, 6, 0.3] },
      { pos: [0, 3, 8], rot: [0, Math.PI, 0], size: [16, 6, 0.3] },
      { pos: [-8, 3, 0], rot: [0, Math.PI / 2, 0], size: [16, 6, 0.3] },
      { pos: [8, 3, 0], rot: [0, -Math.PI / 2, 0], size: [16, 6, 0.3] },
    ];
    wallPositions.forEach(({ pos, rot, size }) => {
      const wg = new THREE.BoxGeometry(...size);
      const wm = new THREE.Mesh(wg, wallMat);
      wm.position.set(...pos);
      wm.rotation.set(...rot);
      wm.receiveShadow = true;
      scene.add(wm);
    });

    // ─── Light helper (spot cone) ──────────────────────────────────────────
    const spotHelper = new THREE.SpotLightHelper(spotLight);
    scene.add(spotHelper);

    // Point light glow sphere
    const pointGlowGeo = new THREE.SphereGeometry(0.18, 16, 16);
    const pointGlowMat = new THREE.MeshBasicMaterial({ color: 0xff6622 });
    const pointGlow = new THREE.Mesh(pointGlowGeo, pointGlowMat);
    pointLight.add(pointGlow);

    // Spot light glow
    const spotGlowGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.2, 16);
    const spotGlowMat = new THREE.MeshBasicMaterial({ color: 0x22ccff });
    const spotGlow = new THREE.Mesh(spotGlowGeo, spotGlowMat);
    spotLight.add(spotGlow);

    // Directional light indicator
    const dirGlowGeo = new THREE.SphereGeometry(0.15, 12, 12);
    const dirGlowMat = new THREE.MeshBasicMaterial({ color: 0xfff4e0 });
    const dirGlow = new THREE.Mesh(dirGlowGeo, dirGlowMat);
    dirLight.add(dirGlow);

    // Hemisphere light indicator
    const hemiGlowGeo = new THREE.SphereGeometry(0.12, 12, 12);
    const hemiGlowMat = new THREE.MeshBasicMaterial({ color: 0x4466aa });
    const hemiGlow = new THREE.Mesh(hemiGlowGeo, hemiGlowMat);
    hemiLight.add(hemiGlow);

    // ─── GUI ───────────────────────────────────────────────────────────────

    const gui = new GUI({ title: '💡 Light Controls', width: 280 });

    // Presentation mode folders (all start expanded for demo)
    const folders = {};

    const ambientFolder = gui.addFolder('AmbientLight');
    folders.ambient = ambientFolder.addFolder ? null : ambientFolder;
    ambientFolder.addColor('value', ambientLight, 'color').name('Color').onChange(() => {});
    ambientFolder.add(ambientLight, 'intensity', 0, 3, 0.01).name('Intensity');
    ambientFolder.open();

    const hemiFolder = gui.addFolder('HemisphereLight');
    hemiFolder.addColor('value', hemiLight, 'color').name('Sky Color');
    hemiFolder.addColor('groundColor', hemiLight, 'groundColor').name('Ground Color');
    hemiFolder.add(hemiLight, 'intensity', 0, 3, 0.01).name('Intensity');
    hemiFolder.open();

    const dirFolder = gui.addFolder('DirectionalLight');
    dirFolder.addColor('value', dirLight, 'color').name('Color');
    dirFolder.add(dirLight, 'intensity', 0, 5, 0.01).name('Intensity');
    const dirPosFolder = dirFolder.addFolder('Position');
    dirPosFolder.add(dirLight.position, 'x', -20, 20, 0.1).name('X');
    dirPosFolder.add(dirLight.position, 'y', 0, 30, 0.1).name('Y');
    dirPosFolder.add(dirLight.position, 'z', -20, 20, 0.1).name('Z');
    dirPosFolder.open();
    const dirShadowFolder = dirFolder.addFolder('Shadow');
    dirShadowFolder.add(dirLight.shadow, 'bias', -0.01, 0.01, 0.0001).name('Bias');
    dirShadowFolder.open();
    dirFolder.open();

    const pointFolder = gui.addFolder('PointLight');
    pointFolder.addColor('value', pointLight, 'color').name('Color');
    pointFolder.add(pointLight, 'intensity', 0, 10, 0.01).name('Intensity');
    pointFolder.add(pointLight, 'distance', 1, 50, 0.1).name('Distance');
    pointFolder.add(pointLight, 'decay', 0, 5, 0.01).name('Decay');
    const pointPosFolder = pointFolder.addFolder('Position');
    pointPosFolder.add(pointLight.position, 'x', -10, 10, 0.1).name('X');
    pointPosFolder.add(pointLight.position, 'y', 0, 15, 0.1).name('Y');
    pointPosFolder.add(pointLight.position, 'z', -10, 10, 0.1).name('Z');
    pointPosFolder.open();
    pointFolder.open();

    const spotFolder = gui.addFolder('SpotLight');
    spotFolder.addColor('value', spotLight, 'color').name('Color');
    spotFolder.add(spotLight, 'intensity', 0, 15, 0.01).name('Intensity');
    spotFolder.add(spotLight, 'angle', 0.05, Math.PI / 2, 0.01).name('Angle');
    spotFolder.add(spotLight, 'penumbra', 0, 1, 0.01).name('Penumbra');
    spotFolder.add(spotLight, 'distance', 1, 50, 0.1).name('Distance');
    spotFolder.add(spotLight, 'decay', 0, 5, 0.01).name('Decay');
    const spotPosFolder = spotFolder.addFolder('Position');
    spotPosFolder.add(spotLight.position, 'x', -15, 15, 0.1).name('X');
    spotPosFolder.add(spotLight.position, 'y', 0, 20, 0.1).name('Y');
    spotPosFolder.add(spotLight.position, 'z', -15, 15, 0.1).name('Z');
    spotPosFolder.open();
    spotFolder.open();

    // Renderer settings
    const rendererFolder = gui.addFolder('Renderer');
    rendererFolder.add(renderer, 'toneMappingExposure', 0.1, 3, 0.01).name('Exposure');
    const toneMapOptions = { None: -1, ACES: THREE.ACESFilmicToneMapping, Reinhard: THREE.ReinhardToneMapping, Cineon: THREE.CineonToneMapping, Linear: THREE.LinearToneMapping };
    // just exposure control for simplicity

    // Fix lil-gui color bug with three.js Color
    function fixColor(controller) {
      const originalGetValue = controller.getValue.bind(controller);
      const originalSetValue = controller.setValue.bind(controller);
      controller.getValue = () => '#' + originalGetValue().getHexString();
      controller.setValue = (v) => originalSetValue(v.startsWith('#') ? new THREE.Color(v) : v);
    }
    gui.controllersRecursive().forEach(c => {
      if (c.property === 'color' || c.property === 'groundColor') {
        fixColor(c);
      }
    });

    // ─── Animation ─────────────────────────────────────────────────────────

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Pulsing point light
      pointLight.intensity = 2.5 + Math.sin(t * 2.3) * 1.2;
      pointLight.position.x = -4 + Math.sin(t * 0.7) * 1.5;
      pointLight.position.z = -3 + Math.cos(t * 0.5) * 1.5;

      // Rotating spotlight
      const spotRadius = 8;
      spotLight.position.x = Math.sin(t * 0.4) * spotRadius;
      spotLight.position.z = Math.cos(t * 0.4) * spotRadius;
      spotLight.position.y = 10 + Math.sin(t * 0.3) * 2;
      spotHelper.update();

      // Bounce sphere
      sphere.position.y = 1.4 + Math.sin(t * 1.2) * 0.15;

      // Rotate objects
      torusKnot.rotation.y = t * 0.4;
      torusKnot.rotation.x = t * 0.2;
      box.rotation.y = t * 0.3;
      cylinder.rotation.x = t * 0.5;
      ico.rotation.y = t * 0.6;
      ico.rotation.z = t * 0.3;

      controls.update();
      renderer.render(scene, camera);
    }

    // ─── Resize ─────────────────────────────────────────────────────────────

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
