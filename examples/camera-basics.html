<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Camera Basics — 相机基础</title>
  <style>
    :root {
      --bg: #0b0b12;
      --surface: #13131f;
      --border: #2a2a40;
      --accent: #7c6aff;
      --accent2: #4ecdc4;
      --text: #e8e8f0;
      --muted: #7070a0;
      --fov30: #ff6b6b;
      --fov60: #ffd93d;
      --fov90: #6bcb77;
      --ortho: #4d96ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .tab-bar {
      display: flex;
      gap: 6px;
    }
    .tab {
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab:hover { border-color: var(--accent); color: var(--text); }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .fov-legend {
      display: flex;
      gap: 12px;
      margin-left: auto;
      font-size: 11px;
      align-items: center;
    }
    .fov-legend span { display: flex; align-items: center; gap: 4px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block;
    }

    #main-canvas {
      flex: 1;
      display: block;
      width: 100%;
    }

    #info-panel {
      position: fixed;
      top: 60px;
      right: 16px;
      width: 260px;
      background: rgba(19,19,31,0.92);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 12px;
      line-height: 1.6;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: opacity 0.3s;
    }
    #info-panel h3 {
      font-size: 13px;
      margin-bottom: 8px;
      color: var(--accent);
    }
    #info-panel p { color: var(--muted); }
    #info-panel code {
      background: rgba(124,106,255,0.15);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
      color: var(--accent2);
    }

    #split-indicator {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(19,19,31,0.9);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--muted);
      backdrop-filter: blur(8px);
    }

    .cam-switch-btns {
      display: flex;
      gap: 6px;
      margin-left: 12px;
    }
    .cam-btn {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .cam-btn:hover { border-color: var(--accent); color: var(--text); }
    .cam-btn.active { background: var(--accent2); border-color: var(--accent2); color: #000; font-weight: 700; }
  </style>
</head>
<body>

<header>
  <h1>📷 Three.js Camera Basics</h1>
  <div class="tab-bar">
    <button class="tab active" data-mode="fov">FOV 对比</button>
    <button class="tab" data-mode="ortho">正交 vs 透视</button>
    <button class="tab" data-mode="orbit">OrbitControls</button>
    <button class="tab" data-mode="transition">相机动画</button>
    <button class="tab" data-mode="split">分屏视图</button>
  </div>
  <div class="cam-switch-btns" id="cam-switch" style="display:none">
    <button class="cam-btn active" data-cam="0">1</button>
    <button class="cam-btn" data-cam="1">2</button>
    <button class="cam-btn" data-cam="2">3</button>
    <button class="cam-btn" data-cam="3">4</button>
  </div>
  <div class="fov-legend" id="fov-legend">
    <span><span class="dot" style="background:var(--fov30)"></span> FOV 30°</span>
    <span><span class="dot" style="background:var(--fov60)"></span> FOV 60°</span>
    <span><span class="dot" style="background:var(--fov90)"></span> FOV 90°</span>
  </div>
</header>

<canvas id="main-canvas"></canvas>

<div id="info-panel">
  <h3 id="panel-title">PerspectiveCamera FOV</h3>
  <p id="panel-desc">Field of View (FOV) 控制垂直视野角度。<br>较小的 FOV 产生长焦透视效果，<br>较大的 FOV 产生广角鱼眼效果。</p>
</div>

<div id="split-indicator" style="display:none">分屏视图 · 点击编号切换相机</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene Setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('main-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0b12);
scene.fog = new THREE.FogExp2(0x0b0b12, 0.018);

// ─── Lighting ──────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x4040a0, 0.5);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(8, 14, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.1;
dirLight.shadow.camera.far = 60;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x7c6aff, 0.8, 30);
pointLight.position.set(-5, 6, 5);
scene.add(pointLight);

// ─── Ground & Grid ─────────────────────────────────────────────────────────
const groundMat = new THREE.MeshStandardMaterial({ color: 0x111120, roughness: 0.9, metalness: 0.1 });
const ground = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);
const grid = new THREE.GridHelper(40, 40, 0x2a2a50, 0x1a1a30);
grid.position.y = 0.01;
scene.add(grid);

// ─── Objects ───────────────────────────────────────────────────────────────
function createSceneObjects() {
  const group = new THREE.Group();

  // Central pedestal
  const pedMat = new THREE.MeshStandardMaterial({ color: 0x222240, roughness: 0.4, metalness: 0.6 });
  const ped = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 2, 0.4, 32), pedMat);
  ped.position.y = 0.2;
  ped.castShadow = true;
  ped.receiveShadow = true;
  group.add(ped);

  // Colorful spheres
  const sphereColors = [0xff6b6b, 0xffd93d, 0x6bcb77, 0x4d96ff, 0xff9f43, 0xee5a24, 0x0abde3, 0x5f27cd];
  const sphereRadius = 0.55;
  const orbitRadius = 3.2;
  sphereColors.forEach((color, i) => {
    const angle = (i / sphereColors.length) * Math.PI * 2;
    const x = Math.cos(angle) * orbitRadius;
    const z = Math.sin(angle) * orbitRadius;
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.2, metalness: 0.3, emissive: color, emissiveIntensity: 0.2 });
    const sphere = new THREE.Mesh(new THREE.SphereGeometry(sphereRadius, 32, 32), mat);
    sphere.position.set(x, 1.0 + sphereRadius, z);
    sphere.castShadow = true;
    sphere.userData.baseY = sphere.position.y;
    sphere.userData.phase = i * 0.7;
    group.add(sphere);
  });

  // Tall pillars
  const pillarMat = new THREE.MeshStandardMaterial({ color: 0x2a2a50, roughness: 0.6, metalness: 0.4 });
  const pillarPositions = [[5, 0, 5], [-5, 0, 5], [5, 0, -5], [-5, 0, -5]];
  pillarPositions.forEach(([x, y, z], i) => {
    const h = 2 + i * 0.8;
    const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.6, h, 0.6), pillarMat);
    pillar.position.set(x, h / 2, z);
    pillar.castShadow = true;
    pillar.receiveShadow = true;
    group.add(pillar);
  });

  // Torus ring
  const torusMat = new THREE.MeshStandardMaterial({ color: 0x7c6aff, roughness: 0.3, metalness: 0.7, emissive: 0x7c6aff, emissiveIntensity: 0.15 });
  const torus = new THREE.Mesh(new THREE.TorusGeometry(2, 0.15, 16, 64), torusMat);
  torus.position.y = 2.5;
  torus.rotation.x = Math.PI / 4;
  torus.castShadow = true;
  group.add(torus);

  return group;
}

const mainGroup = createSceneObjects();
scene.add(mainGroup);

// ─── Camera Setup ──────────────────────────────────────────────────────────
let aspect = canvas.clientWidth / canvas.clientHeight;
const mainCamera = new THREE.PerspectiveCamera(60, aspect, 0.1, 100);
mainCamera.position.set(10, 8, 10);
mainCamera.lookAt(0, 1.5, 0);

// ─── Cameras for different modes ───────────────────────────────────────────
const cameras = {
  fov30: new THREE.PerspectiveCamera(30, aspect, 0.1, 100),
  fov60: new THREE.PerspectiveCamera(60, aspect, 0.1, 100),
  fov90: new THREE.PerspectiveCamera(90, aspect, 0.1, 100),
  ortho: new THREE.OrthographicCamera(-8 * aspect, 8 * aspect, 8, -8, 0.1, 200),
};
cameras.fov30.position.set(10, 8, 10);
cameras.fov60.position.set(10, 8, 10);
cameras.fov90.position.set(10, 8, 10);
cameras.ortho.position.set(10, 8, 10);

Object.values(cameras).forEach(c => c.lookAt(0, 1.5, 0));

// Split-screen cameras
const splitCameras = [
  new THREE.PerspectiveCamera(60, aspect, 0.1, 100),
  new THREE.PerspectiveCamera(30, aspect, 0.1, 100),
  new THREE.OrthographicCamera(-8*aspect, 8*aspect, 8, -8, 0.1, 200),
  new THREE.PerspectiveCamera(90, aspect, 0.1, 100),
];
splitCameras[0].position.set(12, 9, 12);
splitCameras[1].position.set(0, 15, 0);
splitCameras[2].position.set(-12, 9, -12);
splitCameras[3].position.set(12, 6, -12);
splitCameras.forEach((c, i) => c.lookAt(0, 1.5, 0));

// OrbitControls (attached to main camera)
const controls = new OrbitControls(mainCamera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 4;
controls.maxDistance = 30;
controls.target.set(0, 1.5, 0);
controls.enabled = false;

// ─── State & Mode Management ───────────────────────────────────────────────
let mode = 'fov';
let animTarget = null;
let animProgress = 0;
let splitActiveCam = 0;
const fovCamPositions = [
  new THREE.Vector3(10, 8, 10),
  new THREE.Vector3(10, 8, 10),
  new THREE.Vector3(10, 8, 10),
];

const infoContent = {
  fov: {
    title: 'PerspectiveCamera FOV',
    desc: 'Field of View (FOV) 控制垂直视野角度。<br>FOV 30° = 长焦（窄视角），压缩纵深。<br>FOV 90° = 广角（宽视角），夸张透视。'
  },
  ortho: {
    title: 'OrthographicCamera vs PerspectiveCamera',
    desc: '正交相机：平行投影，无透视变形，适合工程图纸。<br>透视相机：近大远小，符合人眼视觉，适合3D场景。'
  },
  orbit: {
    title: 'OrbitControls 轨道控制',
    desc: '鼠标左键拖拽旋转 · 右键平移 · 滚轮缩放<br>enableDamping 开启惯性阻尼效果。'
  },
  transition: {
    title: '相机位置动画',
    desc: '相机在多个关键帧之间平滑插值。<br>使用 Three.js Vector3.lerp() 实现平滑过渡。'
  },
  split: {
    title: '分屏多视角',
    desc: '同时渲染4个不同位置/类型的相机。<br>点击顶部编号切换激活相机视角。'
  }
};

function updateInfoPanel() {
  const content = infoContent[mode];
  document.getElementById('panel-title').textContent = content.title;
  document.getElementById('panel-desc').innerHTML = content.desc;
}

// ─── FOV Scene Markers ──────────────────────────────────────────────────────
function makeFovLabel(text, color) {
  const div = document.createElement('div');
  div.style.cssText = `
    position:fixed;bottom:20px;font-size:12px;font-weight:700;
    color:${color};background:rgba(11,11,18,0.85);padding:4px 10px;
    border-radius:6px;border:1px solid ${color}44;letter-spacing:0.5px;
    pointer-events:none;z-index:10;
  `;
  div.textContent = text;
  return div;
}
const fovLabels = {
  fov30: makeFovLabel('FOV 30° (长焦)', '#ff6b6b'),
  fov60: makeFovLabel('FOV 60° (标准)', '#ffd93d'),
  fov90: makeFovLabel('FOV 90° (广角)', '#6bcb77'),
};
Object.values(fovLabels).forEach(l => l.style.display = 'none');
document.body.appendChild(fovLabels.fov30);
document.body.appendChild(fovLabels.fov60);
document.body.appendChild(fovLabels.fov90);

// ─── Tab UI ─────────────────────────────────────────────────────────────────
const tabs = document.querySelectorAll('.tab');
const camSwitchBtns = document.getElementById('cam-switch');
const splitIndicator = document.getElementById('split-indicator');
const fovLegend = document.getElementById('fov-legend');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    mode = tab.dataset.mode;
    applyMode();
  });
});

document.querySelectorAll('.cam-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    splitActiveCam = parseInt(btn.dataset.cam);
    // Update controls target
    controls.enabled = false;
  });
});

function applyMode() {
  // Hide all extras
  Object.values(fovLabels).forEach(l => l.style.display = 'none');
  camSwitchBtns.style.display = 'none';
  splitIndicator.style.display = 'none';
  fovLegend.style.display = 'none';
  controls.enabled = false;

  if (mode === 'split') {
    camSwitchBtns.style.display = 'flex';
    splitIndicator.style.display = 'block';
  } else if (mode === 'orbit') {
    controls.enabled = true;
  } else if (mode === 'fov') {
    fovLegend.style.display = 'flex';
  }

  updateInfoPanel();
}

applyMode();

// ─── Window Resize ──────────────────────────────────────────────────────────
function onResize() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  aspect = w / h;

  renderer.setSize(w, h, false);

  mainCamera.aspect = aspect;
  mainCamera.updateProjectionMatrix();

  Object.values(cameras).forEach(c => {
    if (c.isPerspectiveCamera) {
      c.aspect = aspect;
    } else {
      c.left = -8 * aspect;
      c.right = 8 * aspect;
      c.top = 8;
      c.bottom = -8;
    }
    c.updateProjectionMatrix();
  });

  splitCameras.forEach(c => {
    if (c.isPerspectiveCamera) {
      c.aspect = aspect;
    } else {
      c.left = -8 * aspect;
      c.right = 8 * aspect;
    }
    c.updateProjectionMatrix();
  });
}
window.addEventListener('resize', onResize);
onResize();

// ─── Viewport Split Helper ──────────────────────────────────────────────────
function setViewport(x, y, w, h) {
  const dpr = renderer.getPixelRatio();
  renderer.setScissorTest(true);
  renderer.setViewport(x * dpr, y * dpr, w * dpr, h * dpr);
  renderer.setScissor(x * dpr, y * dpr, w * dpr, h * dpr);
}
function resetViewport() {
  renderer.setScissorTest(false);
  const dpr = renderer.getPixelRatio();
  renderer.setViewport(0, 0, canvas.clientWidth * dpr, canvas.clientHeight * dpr);
}

// ─── Transition Keyframes ───────────────────────────────────────────────────
const keyframes = [
  { pos: new THREE.Vector3(10, 8, 10),  target: new THREE.Vector3(0, 1.5, 0), fov: 60 },
  { pos: new THREE.Vector3(0, 14, 0),   target: new THREE.Vector3(0, 1.5, 0), fov: 50 },
  { pos: new THREE.Vector3(-10, 6, 10), target: new THREE.Vector3(-3, 1, 3), fov: 75 },
  { pos: new THREE.Vector3(10, 5, -10),target: new THREE.Vector3(3, 1, -3), fov: 45 },
  { pos: new THREE.Vector3(-8, 10, -8),target: new THREE.Vector3(0, 2, 0), fov: 60 },
];
let kfIndex = 0;
let kfProgress = 0;
const kfDuration = 180; // frames

// ─── Animation Loop ────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function lerp3(a, b, t) { return a.clone().lerp(b, t); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();
  const delta = clock.getDelta();

  // Animate scene objects
  mainGroup.children.forEach(child => {
    if (child.isMesh && child.geometry.type === 'SphereGeometry') {
      child.position.y = child.userData.baseY + Math.sin(elapsed * 1.2 + child.userData.phase) * 0.2;
    }
  });
  // Rotate torus
  const torus = mainGroup.children.find(c => c.geometry?.type === 'TorusGeometry');
  if (torus) torus.rotation.y = elapsed * 0.4;

  const W = canvas.clientWidth;
  const H = canvas.clientHeight;

  renderer.setScissorTest(false);

  if (mode === 'fov') {
    // Single full viewport with current FOV camera
    renderer.setViewport(0, 0, W, H);
    renderer.setScissorTest(false);

    // Show three small preview panels
    const panelW = Math.floor(W / 3) - 4;
    const panelH = Math.floor(H * 0.25);
    const panelY = H - panelH - 10;

    // Main view
    renderer.render(scene, cameras.fov60);

    // Small panels for FOV comparison
    const fovDefs = [
      { cam: cameras.fov30, label: fovLabels.fov30, x: 10 },
      { cam: cameras.fov60, label: fovLabels.fov60, x: 10 + panelW + 8 },
      { cam: cameras.fov90, label: fovLabels.fov90, x: 10 + (panelW + 8) * 2 },
    ];
    fovDefs.forEach(({ cam, label, x }) => {
      setViewport(x, panelY, panelW, panelH);
      renderer.render(scene, cam);
      label.style.display = 'block';
      label.style.left = `${x + 6}px`;
      label.style.bottom = `${H - panelY + 4}px`;
    });
    resetViewport();

  } else if (mode === 'ortho') {
    renderer.setViewport(0, 0, W, H);
    const half = Math.floor(W / 2);
    setViewport(0, 0, half - 2, H);
    renderer.render(scene, cameras.ortho);
    setViewport(half + 2, 0, half - 2, H);
    renderer.render(scene, cameras.fov60);
    resetViewport();

    // Labels
    showOrthoLabels(W, H);

  } else if (mode === 'orbit') {
    controls.update();
    renderer.setViewport(0, 0, W, H);
    renderer.render(scene, mainCamera);

  } else if (mode === 'transition') {
    // Animate camera through keyframes
    kfProgress += 1 / kfDuration;
    if (kfProgress >= 1) {
      kfProgress = 0;
      kfIndex = (kfIndex + 1) % keyframes.length;
    }
    const nextIdx = (kfIndex + 1) % keyframes.length;
    const t = easeInOut(kfProgress);
    const kfA = keyframes[kfIndex];
    const kfB = keyframes[nextIdx];

    mainCamera.position.lerpVectors(kfA.pos, kfB.pos, t);
    const target = new THREE.Vector3().lerpVectors(kfA.target, kfB.target, t);
    mainCamera.lookAt(target);
    mainCamera.fov = THREE.MathUtils.lerp(kfA.fov, kfB.fov, t);
    mainCamera.updateProjectionMatrix();

    renderer.setViewport(0, 0, W, H);
    renderer.render(scene, mainCamera);

  } else if (mode === 'split') {
    const halfW = Math.floor(W / 2);
    const halfH = Math.floor(H / 2);

    const vp = [
      [0,        halfH, halfW - 2, halfH - 2],
      [halfW + 2, halfH, halfW - 2, halfH - 2],
      [0,         0,    halfW - 2, halfH - 2],
      [halfW + 2, 0,    halfW - 2, halfH - 2],
    ];

    vp.forEach(([x, y, w, h], i) => {
      setViewport(x, y, w, h);
      renderer.render(scene, splitCameras[i]);
    });
    resetViewport();

    // Highlight active cam border
    if (splitActiveCam >= 0 && splitActiveCam < 4) {
      const [x, y, w, h] = vp[splitActiveCam];
      // Draw border overlay
    }
  }

  renderer.setScissorTest(false);
}

function showOrthoLabels(W, H) {
  // handled by info panel
}

// Initial info panel
updateInfoPanel();

// Start loop
animate();
</script>
</body>
</html>
