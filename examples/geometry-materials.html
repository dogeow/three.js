<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Geometry & Materials — 几何体与材质</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d12;
      color: #e0e0e0;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }
    canvas { display: block; }
    #title {
      position: absolute;
      top: 20px;
      left: 24px;
      font-size: 18px;
      font-weight: 600;
      color: #a0c4ff;
      pointer-events: none;
      letter-spacing: 0.5px;
    }
    #subtitle {
      position: absolute;
      top: 48px;
      left: 24px;
      font-size: 12px;
      color: #666;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="title">Three.js Geometry &amp; Materials</div>
  <div id="subtitle">几何体与材质</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

    // ─── Scene Setup ────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d0d12);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 2.5, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ─── Controls ───────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);

    // ─── Lights ─────────────────────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.25);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
    dirLight.position.set(6, 10, 6);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    scene.add(dirLight);

    const pointLight1 = new THREE.PointLight(0x4da6ff, 1.2, 30);
    pointLight1.position.set(-6, 4, -4);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0xff6b9d, 0.8, 25);
    pointLight2.position.set(6, -2, 4);
    scene.add(pointLight2);

    // ─── Ground plane (shadow receiver) ────────────────────────────────────
    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x111118,
      roughness: 0.9,
      metalness: 0.1
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -3.5;
    ground.receiveShadow = true;
    scene.add(ground);

    // ─── Grid helper ───────────────────────────────────────────────────────
    const grid = new THREE.GridHelper(40, 40, 0x222233, 0x1a1a2a);
    grid.position.y = -3.49;
    scene.add(grid);

    // ─── Geometry Definitions ──────────────────────────────────────────────
    const geometries = {
      'Box':        new THREE.BoxGeometry(1.6, 1.6, 1.6),
      'Sphere':     new THREE.SphereGeometry(1.0, 32, 32),
      'Cylinder':   new THREE.CylinderGeometry(0.7, 0.7, 1.8, 32),
      'Torus':      new THREE.TorusGeometry(0.9, 0.32, 20, 60),
      'Cone':       new THREE.ConeGeometry(1.0, 1.9, 32),
      'Octahedron': new THREE.OctahedronGeometry(1.1),
      'Icosahedron':new THREE.IcosahedronGeometry(1.05),
      'TorusKnot':  new THREE.TorusKnotGeometry(0.65, 0.22, 128, 20),
    };

    // ─── Material Definitions ──────────────────────────────────────────────
    function makeMaterials() {
      return {
        'MeshBasicMaterial':  new THREE.MeshBasicMaterial({ color: 0x4da6ff }),
        'MeshLambertMaterial': new THREE.MeshLambertMaterial({ color: 0x4da6ff }),
        'MeshPhongMaterial':  new THREE.MeshPhongMaterial({ color: 0x4da6ff, shininess: 80 }),
        'MeshStandardMaterial': new THREE.MeshStandardMaterial({ color: 0x4da6ff, metalness: 0.45, roughness: 0.35 }),
        'MeshToonMaterial':   new THREE.MeshToonMaterial({ color: 0x4da6ff }),
      };
    }

    // Material color palette
    const colorOptions = [
      { name: 'Azure Blue',   value: 0x4da6ff },
      { name: 'Coral Pink',   value: 0xff6b9d },
      { name: 'Mint Green',   value: 0x5de6c0 },
      { name: 'Sunflower',    value: 0xffd93d },
      { name: 'Violet',       value: 0x9d7aff },
      { name: 'Pearl White',  value: 0xf0f0f5 },
    ];

    let currentMaterials = makeMaterials();
    let currentColor = 0x4da6ff;

    // ─── Grid Layout ────────────────────────────────────────────────────────
    const COLS = 5;
    const ROWS = Math.ceil(Object.keys(geometries).length / COLS);
    const CELL_W = 3.0;
    const CELL_H = 3.2;
    const originX = -((COLS - 1) * CELL_W) / 2;
    const originY = ((ROWS - 1) * CELL_H) / 2;

    const meshMap = {}; // geometryName -> { mesh, rotationSpeed, rotationAxis }

    // ─── Build Scene Objects ────────────────────────────────────────────────
    Object.entries(geometries).forEach(([name, geo], i) => {
      const col = i % COLS;
      const row = Math.floor(i / COLS);
      const x = originX + col * CELL_W;
      const y = originY - row * CELL_H;

      // Pick material based on selected type (default first in list)
      const matType = Object.keys(currentMaterials)[0];
      const mesh = new THREE.Mesh(geo, currentMaterials[matType]);
      mesh.position.set(x, y, 0);
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      const rotAxis = new THREE.Vector3(
        Math.random() * 0.5 + 0.1,
        Math.random() * 0.5 + 0.5,
        Math.random() * 0.3 + 0.1
      ).normalize();
      const rotSpeed = 0.3 + Math.random() * 0.5;

      scene.add(mesh);
      meshMap[name] = { mesh, rotationAxis: rotAxis, rotationSpeed: rotSpeed };

      // Label (CSS)
      const label = document.createElement('div');
      label.style.cssText = `
        position: fixed;
        font-size: 11px;
        color: #555;
        pointer-events: none;
        transform: translate(-50%, 0);
        left: ${((x + 1) / 2 * innerWidth)}px;
        top: ${((1 - (y + 1.6) / 6) * innerHeight)}px;
        display:none;
      `;
      label.textContent = name;
      scene.userData.labels = scene.userData.labels || [];
      scene.userData.labels.push({ el: label, mesh });
    });

    // ─── Update Materials ───────────────────────────────────────────────────
    function applyMaterialToAll(matKey) {
      const mat = currentMaterials[matKey];
      Object.values(meshMap).forEach(({ mesh }) => {
        mesh.material = mat;
      });
    }

    function applyColorToAll(hexValue) {
      currentColor = hexValue;
      Object.values(currentMaterials).forEach(mat => {
        mat.color.setHex(hexValue);
      });
    }

    // ─── GUI ─────────────────────────────────────────────────────────────────
    const gui = new GUI({ title: 'Controls / 控制面板' });

    const state = {
      geometry: 'Box',
      material: 'MeshBasicMaterial',
      color: '#4da6ff',
      rotationSpeed: 1.0,
      autoRotate: true,
    };

    gui.add(state, 'geometry', Object.keys(geometries)).name('Geometry / 几何体').onChange(v => {
      const { mesh } = meshMap[v];
      camera.position.set(0, 2.5, 12);
      controls.target.set(0, 0, 0);
    });

    gui.add(state, 'material', Object.keys(currentMaterials)).name('Material / 材质').onChange(v => {
      applyMaterialToAll(v);
    });

    gui.addColor(state, 'color').name('Color / 颜色').onChange(v => {
      applyColorToAll(parseInt(v.replace('#', ''), 16));
    });

    gui.add(state, 'rotationSpeed', 0, 3, 0.05).name('Speed / 速度');
    gui.add(state, 'autoRotate').name('Auto Rotate / 自动旋转');

    // ─── Raycaster for click selection ─────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('click', e => {
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const meshes = Object.values(meshMap).map(v => v.mesh);
      const hits = raycaster.intersectObjects(meshes);
      if (hits.length > 0) {
        const clicked = hits[0].object;
        const entry = Object.entries(meshMap).find(([, v]) => v.mesh === clicked);
        if (entry) {
          state.geometry = entry[0];
          gui.controllers.forEach(c => c.updateDisplay());
        }
      }
    });

    // ─── Resize Handler ─────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ─── Animation Loop ─────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      const { mesh } = meshMap[state.geometry] || { mesh: null };
      const speedMult = state.rotationSpeed;

      // Rotate all meshes individually (each keeps its own axis + speed)
      Object.values(meshMap).forEach(({ mesh: m, rotationAxis, rotationSpeed }) => {
        const spd = state.autoRotate ? rotationSpeed * speedMult : 0;
        m.rotateOnAxis(rotationAxis, delta * spd);
      });

      // Spotlight pulsing
      pointLight1.intensity = 1.0 + Math.sin(elapsed * 1.3) * 0.3;
      pointLight2.intensity = 0.7 + Math.sin(elapsed * 1.7 + 1.0) * 0.25;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
