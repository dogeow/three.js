<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js - Physics Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; font-family: 'Courier New', monospace; }
    .title {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #ff6600;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #ff6600;
      z-index: 10;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="title">Physics Animation</div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(12, 10, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.1;
    bloomPass.strength = 1.8;
    composer.addPass(bloomPass);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Neon grid floor
    const gridSize = 20;
    const gridDivisions = 40;
    const gridHelper = new THREE.GridHelper(gridSize, gridDivisions, 0xff6600, 0x331100);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    // Reflective floor
    const floorGeo = new THREE.PlaneGeometry(gridSize, gridSize);
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x111111,
      metalness: 0.9,
      roughness: 0.3,
      emissive: 0x220800,
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Walls (invisible bounds)
    const boundSize = 8;
    const wallMat = new THREE.MeshStandardMaterial({
      color: 0xff6600,
      transparent: true,
      opacity: 0.1,
      side: THREE.DoubleSide,
    });

    // Container box
    const boxGeo = new THREE.BoxGeometry(boundSize * 2, boundSize, boundSize * 2);
    const edges = new THREE.EdgesGeometry(boxGeo);
    const lineMat = new THREE.LineBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.3 });
    const boxLines = new THREE.LineSegments(edges, lineMat);
    boxLines.position.y = boundSize / 2;
    scene.add(boxLines);

    // Lights
    const ambientLight = new THREE.AmbientLight(0x110000, 0.5);
    scene.add(ambientLight);

    const spotLight = new THREE.SpotLight(0xff6600, 5);
    spotLight.position.set(0, 15, 0);
    spotLight.angle = Math.PI / 3;
    spotLight.penumbra = 0.5;
    spotLight.castShadow = true;
    scene.add(spotLight);

    const pointLight = new THREE.PointLight(0x00aaff, 2, 20);
    pointLight.position.set(8, 5, 8);
    scene.add(pointLight);

    // Physics simulation
    class PhysicsSphere {
      constructor(x, y, z, radius, mass) {
        this.position = new THREE.Vector3(x, y, z);
        this.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 4,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 4
        );
        this.radius = radius;
        this.mass = mass;

        const color = [0xff6600, 0x00aaff, 0xff00aa, 0x00ffaa][Math.floor(Math.random() * 4)];
        const geo = new THREE.SphereGeometry(radius, 32, 32);
        const mat = new THREE.MeshStandardMaterial({
          color,
          metalness: 0.7,
          roughness: 0.2,
          emissive: color,
          emissiveIntensity: 0.2,
        });
        this.mesh = new THREE.Mesh(geo, mat);
        this.mesh.castShadow = true;
        this.mesh.receiveShadow = true;
        scene.add(this.mesh);
      }

      update(dt) {
        // Gravity
        this.velocity.y -= 9.8 * dt;

        // Damping
        this.velocity.multiplyScalar(0.999);

        // Update position
        this.position.addScaledVector(this.velocity, dt);

        // Boundary collisions
        const bound = boundSize - this.radius;
        const bounce = 0.75;

        if (this.position.x > bound) { this.position.x = bound; this.velocity.x *= -bounce; }
        if (this.position.x < -bound) { this.position.x = -bound; this.velocity.x *= -bounce; }
        if (this.position.z > bound) { this.position.z = bound; this.velocity.z *= -bounce; }
        if (this.position.z < -bound) { this.position.z = -bound; this.velocity.z *= -bounce; }
        if (this.position.y < this.radius) {
          this.position.y = this.radius;
          this.velocity.y *= -bounce;
          // Friction
          this.velocity.x *= 0.98;
          this.velocity.z *= 0.98;
        }
      }

      syncMesh() {
        this.mesh.position.copy(this.position);
      }
    }

    // Spring-connected spheres
    class SpringSystem {
      constructor() {
        this.spheres = [];
        this.springs = [];
        this.restLength = 2.5;
        this.springConstant = 50;
        this.damping = 0.95;

        for (let i = 0; i < 4; i++) {
          const angle = (i / 4) * Math.PI * 2;
          const x = Math.cos(angle) * 3;
          const z = Math.sin(angle) * 3;
          const sphere = new PhysicsSphere(x, 4 + i * 0.5, z, 0.5, 1);
          this.spheres.push(sphere);
        }

        // Connect springs
        for (let i = 0; i < this.spheres.length; i++) {
          for (let j = i + 1; j < this.spheres.length; j++) {
            this.springs.push({ a: i, b: j });
          }
        }
      }

      update(dt) {
        // Spring forces
        this.springs.forEach(({ a, b }) => {
          const pa = this.spheres[a].position;
          const pb = this.spheres[b].position;
          const diff = new THREE.Vector3().subVectors(pb, pa);
          const dist = diff.length();
          const force = diff.normalize().multiplyScalar((dist - this.restLength) * this.springConstant);
          this.spheres[a].velocity.addScaledVector(force, dt);
          this.spheres[b].velocity.addScaledVector(force, -dt);
        });

        // Damping
        this.spheres.forEach(s => s.velocity.multiplyScalar(this.damping));

        // Update positions
        this.spheres.forEach(s => s.update(dt));
        this.spheres.forEach(s => s.syncMesh());
      }
    }

    const springSystem = new SpringSystem();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    let lastTime = 0;

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      const dt = Math.min(elapsed - lastTime, 0.05);
      lastTime = elapsed;

      springSystem.update(dt);

      // Rotate point light
      pointLight.position.x = Math.sin(elapsed * 0.3) * 10;
      pointLight.position.z = Math.cos(elapsed * 0.3) * 10;

      controls.update();
      composer.render();
    }
    animate();
  </script>
</body>
</html>
