<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>磁场线可视化 - Magnetic Field Line Visualization</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1a; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #4fc3f7;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            text-shadow: 0 0 10px #4fc3f7;
            pointer-events: none;
        }
        #info h1 { font-size: 18px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div id="info">
        <h1>磁场线可视化</h1>
        <div>拖拽旋转 | 滚轮缩放</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ============ 顶点着色器 ============
        const vertexShader = `
            uniform float uTime;
            uniform float uNoiseScale;
            
            varying vec2 vUv;
            varying vec3 vPosition;
            varying float vDistortion;
            
            // 伪随机函数
            float random(vec2 st) {
                return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
            }
            
            // 噪声函数
            float noise(vec2 st) {
                vec2 i = floor(st);
                vec2 f = fract(st);
                float a = random(i);
                float b = random(i + vec2(1.0, 0.0));
                float c = random(i + vec2(0.0, 1.0));
                float d = random(i + vec2(1.0, 1.0));
                vec2 u = f * f * (3.0 - 2.0 * f);
                return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
            }
            
            void main() {
                vUv = uv;
                vPosition = position;
                
                // 基于位置的扭曲
                float dist = length(position.xy);
                float angle = atan(position.y, position.x);
                
                // 磁场线的波动
                float wave1 = sin(angle * 6.0 + uTime * 2.0 + dist * 3.0) * 0.1;
                float wave2 = cos(angle * 4.0 - uTime * 1.5 + dist * 2.0) * 0.08;
                
                // 3D空间的z轴位移
                vec3 pos = position;
                float zDisplacement = sin(dist * 4.0 - uTime * 3.0) * 0.3 
                                    + sin(angle * 3.0 + uTime) * 0.2;
                pos.z += zDisplacement;
                
                vDistortion = zDisplacement;
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        // ============ 片元着色器 ============
        const fragmentShader = `
            uniform float uTime;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            
            varying vec2 vUv;
            varying vec3 vPosition;
            varying float vDistortion;
            
            void main() {
                // 基于位置的磁场强度计算
                float dist = length(vPosition.xy);
                float angle = atan(vPosition.y, vPosition.x);
                
                // 多层sin/cos叠加产生复杂磁场线图案
                float field1 = sin(angle * 8.0 + uTime * 2.0 + dist * 5.0);
                float field2 = cos(angle * 6.0 - uTime * 1.5 + dist * 3.0);
                float field3 = sin(angle * 4.0 + uTime + dist * 2.0);
                
                // 混合多个场
                float combinedField = field1 * 0.5 + field2 * 0.3 + field3 * 0.2;
                
                // 产生流动效果
                float flow = sin(dist * 10.0 - uTime * 4.0) * 0.5 + 0.5;
                
                // 根据场值选择颜色
                vec3 color;
                if (combinedField > 0.3) {
                    color = mix(uColor1, uColor2, (combinedField - 0.3) / 0.7);
                } else if (combinedField > -0.3) {
                    color = mix(uColor2, uColor3, (combinedField + 0.3) / 0.6);
                } else {
                    color = uColor3;
                }
                
                // 添加流动发光效果
                float glow = pow(1.0 - abs(combinedField), 2.0) * flow;
                color += vec3(glow * 0.5);
                
                // 边缘衰减
                float edgeFade = smoothstep(3.0, 1.5, dist);
                color *= edgeFade;
                
                // 动态亮度变化
                float brightness = 0.7 + 0.3 * sin(uTime * 2.0 + dist * 2.0);
                color *= brightness;
                
                gl_FragColor = vec4(color, 0.9);
            }
        `;

        // ============ 场景设置 ============
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.05);

        // 相机
        const camera = new THREE.PerspectiveCamera(
            60, 
            window.innerWidth / window.innerHeight, 
            0.1, 
            1000
        );
        camera.position.set(0, 0, 5);

        // 渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2;
        controls.maxDistance = 15;

        // ============ 创建磁场线网格 ============
        const uniforms = {
            uTime: { value: 0 },
            uColor1: { value: new THREE.Color(0x00ffff) },  // 青色
            uColor2: { value: new THREE.Color(0xff00ff) },  // 品红
            uColor3: { value: new THREE.Color(0x4400ff) },  // 深蓝
            uNoiseScale: { value: 3.0 }
        };

        // 主磁场平面 - 使用PlaneGeometry创建平面网格
        const planeGeometry = new THREE.PlaneGeometry(6, 6, 128, 128);
        const planeMaterial = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending
        });
        const planeMesh = new THREE.Mesh(planeGeometry, planeMaterial);
        scene.add(planeMesh);

        // 创建环形磁场线
        function createTorusField(radius, tubeRadius, color) {
            const torusGeometry = new THREE.TorusGeometry(radius, tubeRadius, 16, 100);
            const torusMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: uniforms.uTime,
                    uColor1: { value: new THREE.Color(color) },
                    uColor2: { value: new THREE.Color(0x00ffff) },
                    uColor3: { value: new THREE.Color(0xff0066) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    uniform float uTime;
                    
                    void main() {
                        vUv = uv;
                        vNormal = normal;
                        
                        vec3 pos = position;
                        float wave = sin(pos.x * 10.0 + uTime * 3.0) * 0.05;
                        pos.z += wave;
                        
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColor1;
                    uniform vec3 uColor2;
                    uniform vec3 uColor3;
                    uniform float uTime;
                    varying vec2 vUv;
                    
                    void main() {
                        float flow = sin(vUv.x * 20.0 - uTime * 4.0) * 0.5 + 0.5;
                        vec3 color = mix(uColor1, uColor2, flow);
                        color = mix(color, uColor3, sin(uTime + vUv.y * 5.0) * 0.5 + 0.5);
                        gl_FragColor = vec4(color, 0.8);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            return new THREE.Mesh(torusGeometry, torusMaterial);
        }

        // 添加多个环形磁场
        const rings = [];
        const ringColors = [0x00ffff, 0xff00ff, 0xffff00, 0x00ff88, 0xff6600];
        for (let i = 0; i < 5; i++) {
            const radius = 1.5 + i * 0.5;
            const tubeRadius = 0.02 + Math.random() * 0.02;
            const ring = createTorusField(radius, tubeRadius, ringColors[i]);
            ring.rotation.x = Math.PI / 2 + (Math.random() - 0.5) * 0.5;
            ring.rotation.y = (Math.random() - 0.5) * 0.5;
            rings.push(ring);
            scene.add(ring);
        }

        // 创建粒子系统表示磁场强度
        const particleCount = 2000;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleSizes = new Float32Array(particleCount);

        for (let i = 0; i < particleCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 2 + Math.random() * 2;
            
            particlePositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            particlePositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            particlePositions[i * 3 + 2] = r * Math.cos(phi);
            particleSizes[i] = Math.random() * 2 + 0.5;
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        particleGeometry.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

        const particleMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: uniforms.uTime,
                uColor: { value: new THREE.Color(0x00ffff) }
            },
            vertexShader: `
                attribute float size;
                varying float vAlpha;
                uniform float uTime;
                
                void main() {
                    vec3 pos = position;
                    float dist = length(pos);
                    float angle = atan(pos.y, pos.x);
                    
                    // 粒子在磁场中流动
                    pos.z += sin(dist * 5.0 - uTime * 3.0 + angle * 3.0) * 0.2;
                    
                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    gl_PointSize = size * (300.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                    
                    vAlpha = 0.5 + 0.5 * sin(uTime * 2.0 + dist * 2.0);
                }
            `,
            fragmentShader: `
                uniform vec3 uColor;
                varying float vAlpha;
                
                void main() {
                    float dist = length(gl_PointCoord - vec2(0.5));
                    if (dist > 0.5) discard;
                    
                    float alpha = (1.0 - dist * 2.0) * vAlpha;
                    gl_FragColor = vec4(uColor, alpha * 0.6);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);

        // 添加中心磁极指示
        const poleGeometry = new THREE.SphereGeometry(0.1, 32, 32);
        const poleMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const northPole = new THREE.Mesh(poleGeometry, poleMaterial);
        northPole.position.set(0.3, 0, 0);
        scene.add(northPole);

        const southPoleMaterial = new THREE.MeshBasicMaterial({ color: 0x444444 });
        const southPole = new THREE.Mesh(poleGeometry, poleMaterial);
        southPole.position.set(-0.3, 0, 0);
        scene.add(southPole);

        // 灯光
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        // ============ 动画循环 ============
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();
            uniforms.uTime.value = elapsedTime;
            
            // 更新环形磁场旋转
            rings.forEach((ring, i) => {
                ring.rotation.x += 0.002 * (i % 2 === 0 ? 1 : -1);
                ring.rotation.z += 0.001 * (i % 3 === 0 ? 1 : -1);
            });
            
            // 脉冲效果
            const pulse = Math.sin(elapsedTime * 2) * 0.1 + 1;
            planeMesh.scale.set(pulse, pulse, 1);
            
            controls.update();
            renderer.render(scene, camera);
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
