<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generative Art Forest</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
  #info {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    pointer-events: none;
    text-align: center;
  }
</style>
</head>
<body>
<div id="info">Generative Art Forest — L-System Trees · Day/Night Cycle</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

// ─── Seeded Random ───────────────────────────────────────────────────────────
class SeededRandom {
  constructor(seed = 12345) {
    this.seed = seed;
  }
  next() {
    this.seed = (this.seed * 16807 + 0) % 2147483647;
    return (this.seed - 1) / 2147483646;
  }
  range(a, b) { return a + this.next() * (b - a); }
  rangeInt(a, b) { return Math.floor(this.range(a, b + 1)); }
  pick(arr) { return arr[Math.floor(this.next() * arr.length)]; }
}

// ─── L-System Tree ───────────────────────────────────────────────────────────
const L_SYSTEMS = [
  { axiom: 'X', rules: { X: 'F+[[X]-X]-F[-FX]+X', F: 'FF' }, angle: 25, iterations: 4 },
  { axiom: 'X', rules: { X: 'F[+X][-X]FX', F: 'FF' }, angle: 30, iterations: 5 },
  { axiom: 'X', rules: { X: 'F[+X]F[-X]+X', F: 'F' }, angle: 20, iterations: 6 },
  { axiom: 'X', rules: { X: 'F[-X][+X]FX', F: 'FF' }, angle: 35, iterations: 4 },
  { axiom: 'X', rules: { X: 'FF-[-F+F+F]+[+F-F-F]', F: 'F' }, angle: 22, iterations: 5 },
];

function applyRules(str, rules) {
  let out = '';
  for (const ch of str) {
    out += rules[ch] !== undefined ? rules[ch] : ch;
  }
  return out;
}

function buildLSystem(ls, rng) {
  let s = ls.axiom;
  const iters = rng.rangeInt(3, ls.iterations);
  for (let i = 0; i < iters; i++) s = applyRules(s, ls.rules);
  return s;
}

function interpretLSystem(str, angleDeg, scale, rng) {
  const stack = [];
  let x = 0, y = 0, dir = -90;
  const pitch = rng.range(-8, 8);
  const segments = [];

  for (const ch of str) {
    switch (ch) {
      case 'F': {
        const rad = (dir + pitch) * Math.PI / 180;
        const nx = x + Math.cos(rad) * scale;
        const ny = y + Math.sin(rad) * scale;
        segments.push({ x1: x, y1: y, x2: nx, y2: ny });
        x = nx; y = ny;
        break;
      }
      case '+': dir += angleDeg + rng.range(-5, 5); break;
      case '-': dir -= angleDeg + rng.range(-5, 5); break;
      case '[': stack.push({ x, y, dir }); break;
      case ']': { if (stack.length) { const s = stack.pop(); x = s.x; y = s.y; dir = s.dir; } break; }
    }
  }
  return segments;
}

// ─── Perlin-like noise (simple) ─────────────────────────────────────────────
function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function lerp(a, b, t) { return a + t * (b - a); }
function hash(x, y) {
  let h = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return h - Math.floor(h);
}
function noise2D(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const ux = fade(fx), uy = fade(fy);
  return lerp(
    lerp(hash(ix, iy), hash(ix + 1, iy), ux),
    lerp(hash(ix, iy + 1), hash(ix + 1, iy + 1), ux),
    uy
  ) * 2 - 1;
}
function fbm(x, y, octaves = 4) {
  let v = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    v += noise2D(x * freq, y * freq) * amp;
    amp *= 0.5; freq *= 2;
  }
  return v;
}

// ─── Terrain ────────────────────────────────────────────────────────────────
function createTerrain(scene, size = 200, segs = 80) {
  const geo = new THREE.PlaneGeometry(size, size, segs, segs);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    const h = fbm(x * 0.03, z * 0.03, 4) * 5 + fbm(x * 0.08, z * 0.08, 2) * 1.5;
    pos.setY(i, h);
  }
  geo.computeVertexNormals();
  const mat = new THREE.MeshLambertMaterial({ color: 0x3a5a2a });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  scene.add(mesh);
  return { geo, mesh };
}

function getTerrainHeight(x, z) {
  return fbm(x * 0.03, z * 0.03, 4) * 5 + fbm(x * 0.08, z * 0.08, 2) * 1.5;
}

// ─── Tree palette ────────────────────────────────────────────────────────────
const BARK_COLORS = [0x5c3a1e, 0x6b4423, 0x4a2e14, 0x7a5030, 0x3d2510];
const LEAF_PALETTES = [
  [0x2d5a1e, 0x3a7a28, 0x4d8a35, 0x5c9a42],
  [0x1a4a1a, 0x2a6a2a, 0x3a8a3a, 0x4a9a4a],
  [0x1e3d2a, 0x2a5538, 0x3a6d48, 0x4a8558],
  [0x5a2d0a, 0x7a4015, 0x9a5520, 0xaa6628],
  [0x2d3a1e, 0x3d4a28, 0x4d5a35, 0x5d6a42],
  [0x3a1a1a, 0x5a2a2a, 0x7a3a3a, 0x9a4a4a],
];

// ─── Build tree geometry (returns { trunkGeo, leafGeo, height, radius }) ───
function buildTreeGeo(rng) {
  const lsDef = rng.pick(L_SYSTEMS);
  const lsStr = buildLSystem(lsDef, rng);
  const segScale = rng.range(0.4, 1.0);
  const segments = interpretLSystem(lsStr, lsDef.angle, segScale, rng);

  // Trunk segments
  const trunkPositions = [], trunkNormals = [];
  const trunkIndices = [];
  let vi = 0;

  const thicknessScale = rng.range(0.06, 0.14);

  for (const seg of segments) {
    const dx = seg.x2 - seg.x1, dy = seg.y2 - seg.y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 0.001) continue;
    const nx = -dy / len, ny = dx / len;
    const thick = Math.max(0.02, thicknessScale * (1 - Math.abs(seg.y1) / 15));

    const base = vi;
    trunkPositions.push(seg.x1 + nx * thick, seg.y1, nx * thick * 0);
    trunkPositions.push(seg.x1 - nx * thick, seg.y1, -nx * thick * 0);
    trunkPositions.push(seg.x2 + nx * thick * 0.7, seg.y2, nx * thick * 0.7);
    trunkPositions.push(seg.x2 - nx * thick * 0.7, seg.y2, -nx * thick * 0.7);
    trunkNormals.push(nx, 0, 0, -nx, 0, 0, nx * 0.7, 0, 0, -nx * 0.7, 0, 0);
    trunkIndices.push(base, base + 1, base + 2, base + 1, base + 3, base + 2);
    vi += 4;
  }

  const trunkGeo = new THREE.BufferGeometry();
  trunkGeo.setAttribute('position', new THREE.Float32BufferAttribute(trunkPositions, 3));
  trunkGeo.setAttribute('normal', new THREE.Float32BufferAttribute(trunkNormals, 3));
  trunkGeo.setIndex(trunkIndices);

  // Leaf points
  const leafPositions = [], leafColors = [];
  const pal = rng.pick(LEAF_PALETTES);
  const leafCount = rng.rangeInt(40, 200);

  for (let i = 0; i < leafCount; i++) {
    const segIdx = rng.rangeInt(0, Math.max(1, segments.length - 1));
    const t = rng.next();
    const lx = segments[segIdx].x1 + (segments[segIdx].x2 - segments[segIdx].x1) * t;
    const ly = segments[segIdx].y1 + (segments[segIdx].y2 - segments[segIdx].y1) * t;
    const spread = rng.range(0.1, 0.6);
    leafPositions.push(lx + rng.range(-spread, spread), ly + rng.range(0, spread * 1.5), rng.range(-spread, spread));
    const c = new THREE.Color(rng.pick(pal));
    leafColors.push(c.r, c.g, c.b);
  }

  const leafGeo = new THREE.BufferGeometry();
  leafGeo.setAttribute('position', new THREE.Float32BufferAttribute(leafPositions, 3));
  leafGeo.setAttribute('color', new THREE.Float32BufferAttribute(leafColors, 3));

  let maxY = 0;
  for (const s of segments) { if (s.y2 > maxY) maxY = s.y2; }
  const height = maxY;
  const radius = thicknessScale * 8;

  return { trunkGeo, leafGeo, height, radius };
}

// ─── Sky colors per time of day ─────────────────────────────────────────────
function getSkyColors(t) {
  // t: 0=midnight, 0.5=noon, 1=midnight
  const phase = t;
  let skyTop, skyBot, ambColor, sunColor, fogColor;

  if (t < 0.2) {
    // Night
    const n = t / 0.2;
    skyTop = new THREE.Color(0x0a0a1a).lerp(new THREE.Color(0x1a1a3a), n);
    skyBot = new THREE.Color(0x050510).lerp(new THREE.Color(0x0a0a20), n);
    ambColor = new THREE.Color(0x111122).lerp(new THREE.Color(0x222244), n);
    sunColor = new THREE.Color(0x334466).lerp(new THREE.Color(0x5577aa), n);
    fogColor = new THREE.Color(0x050510).lerp(new THREE.Color(0x0a0a20), n);
  } else if (t < 0.4) {
    // Pre-dawn
    const n = (t - 0.2) / 0.2;
    skyTop = new THREE.Color(0x1a1a3a).lerp(new THREE.Color(0x4a2020), n);
    skyBot = new THREE.Color(0x0a0a20).lerp(new THREE.Color(0x6a2a10), n);
    ambColor = new THREE.Color(0x222244).lerp(new THREE.Color(0x443322), n);
    sunColor = new THREE.Color(0x5577aa).lerp(new THREE.Color(0xff6622), n);
    fogColor = new THREE.Color(0x0a0a20).lerp(new THREE.Color(0x3a1a0a), n);
  } else if (t < 0.5) {
    // Dawn
    const n = (t - 0.4) / 0.1;
    skyTop = new THREE.Color(0x4a2020).lerp(new THREE.Color(0x6699cc), n);
    skyBot = new THREE.Color(0x6a2a10).lerp(new THREE.Color(0xffcc88), n);
    ambColor = new THREE.Color(0x443322).lerp(new THREE.Color(0x998866), n);
    sunColor = new THREE.Color(0xff6622).lerp(new THREE.Color(0xffddaa), n);
    fogColor = new THREE.Color(0x3a1a0a).lerp(new THREE.Color(0xffcc88), n);
  } else if (t < 0.7) {
    // Day
    const n = (t - 0.5) / 0.2;
    skyTop = new THREE.Color(0x6699cc).lerp(new THREE.Color(0x2277cc), n);
    skyBot = new THREE.Color(0xffcc88).lerp(new THREE.Color(0x99ddff), n);
    ambColor = new THREE.Color(0x998866).lerp(new THREE.Color(0xccbb99), n);
    sunColor = new THREE.Color(0xffddaa).lerp(new THREE.Color(0xffffff), n);
    fogColor = new THREE.Color(0xffcc88).lerp(new THREE.Color(0x99ccff), n);
  } else if (t < 0.85) {
    // Dusk
    const n = (t - 0.7) / 0.15;
    skyTop = new THREE.Color(0x2277cc).lerp(new THREE.Color(0x4a1020), n);
    skyBot = new THREE.Color(0x99ddff).lerp(new THREE.Color(0xff6644), n);
    ambColor = new THREE.Color(0xccbb99).lerp(new THREE.Color(0x664422), n);
    sunColor = new THREE.Color(0xffffff).lerp(new THREE.Color(0xff4411), n);
    fogColor = new THREE.Color(0x99ccff).lerp(new THREE.Color(0x220810), n);
  } else {
    // Post-dusk to night
    const n = (t - 0.85) / 0.15;
    skyTop = new THREE.Color(0x4a1020).lerp(new THREE.Color(0x0a0a1a), n);
    skyBot = new THREE.Color(0xff6644).lerp(new THREE.Color(0x050510), n);
    ambColor = new THREE.Color(0x664422).lerp(new THREE.Color(0x111122), n);
    sunColor = new THREE.Color(0xff4411).lerp(new THREE.Color(0x334466), n);
    fogColor = new THREE.Color(0x220810).lerp(new THREE.Color(0x050510), n);
  }

  return { skyTop, skyBot, ambColor, sunColor, fogColor };
}

// ─── Main ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.Fog(0x050510, 40, 180);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
camera.position.set(30, 20, 50);
camera.lookAt(0, 5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI * 0.48;
controls.target.set(0, 3, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x111122, 1.0);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffddaa, 2.0);
sunLight.castShadow = true;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 300;
sunLight.shadow.camera.left = -80;
sunLight.shadow.camera.right = 80;
sunLight.shadow.camera.top = 80;
sunLight.shadow.camera.bottom = -80;
sunLight.shadow.mapSize.set(2048, 2048);
scene.add(sunLight);

// Fill light
const fillLight = new THREE.DirectionalLight(0x334466, 0.4);
fillLight.position.set(-50, 20, -50);
scene.add(fillLight);

// Ground plane + terrain
const { geo: terrainGeo, mesh: terrainMesh } = createTerrain(scene);

// Tree collections
let treeGroup = new THREE.Group();
scene.add(treeGroup);

let trunkInstances = [];
let leafInstances = [];
let windOffsets = [];

// Global time
let timeOfDay = 0.3;
let daySpeed = 0.0;

// ─── GUI ─────────────────────────────────────────────────────────────────────
const params = {
  treeCount: 60,
  regenerate: () => regenerateForest(true),
  timeOfDay: 0.3,
  daySpeed: 0.0,
  windStrength: 0.3,
  fogDensity: 1.0,
};

const gui = new GUI();
gui.add(params, 'regenerate').name('🔄 Regenerate');
gui.add(params, 'treeCount', 10, 200, 1).name('Tree Count').onFinishChange(() => regenerateForest(true));
gui.add(params, 'timeOfDay', 0, 1, 0.001).name('Time of Day').onChange(v => timeOfDay = v);
gui.add(params, 'daySpeed', 0, 0.002, 0.00001).name('Day Speed');
gui.add(params, 'windStrength', 0, 1, 0.01).name('Wind Strength');
gui.add(params, 'fogDensity', 0.1, 3, 0.1).name('Fog Density');

// ─── Regenerate ─────────────────────────────────────────────────────────────
function regenerateForest(newSeed = false) {
  // Clear old instances
  for (const t of trunkInstances) { t.mesh.geometry.dispose(); t.mesh.material.dispose(); treeGroup.remove(t.mesh); }
  for (const l of leafInstances) { l.mesh.geometry.dispose(); l.mesh.material.dispose(); treeGroup.remove(l.mesh); }
  trunkInstances = [];
  leafInstances = [];
  windOffsets = [];

  const rng = new SeededRandom(newSeed ? Math.floor(Math.random() * 999999) : 42);
  const n = params.treeCount;

  // Shared geometries per tree prototype (we rebuild each tree individually since unique)
  // Instead, we create InstancedMesh per tree prototype type but that's complex.
  // For simplicity and uniqueness, each tree gets its own mesh.
  // For performance, we limit instances per batch.

  const areaSize = 70;

  for (let i = 0; i < n; i++) {
    const rx = rng.range(-areaSize, areaSize);
    const rz = rng.range(-areaSize, areaSize);
    const y = getTerrainHeight(rx, rz);

    const { trunkGeo, leafGeo, height, radius } = buildTreeGeo(rng);
    const barkColor = rng.pick(BARK_COLORS);

    const trunkMat = new THREE.MeshLambertMaterial({ color: barkColor });
    const trunkMesh = new THREE.Mesh(trunkGeo, trunkMat);
    trunkMesh.castShadow = true;
    trunkMesh.receiveShadow = true;

    // Scale tree
    const s = rng.range(0.8, 2.2);
    trunkMesh.scale.set(s, s, s);
    trunkMesh.position.set(rx, y, rz);
    trunkMesh.rotation.y = rng.range(0, Math.PI * 2);
    treeGroup.add(trunkMesh);
    trunkInstances.push({ mesh: trunkMesh, baseY: y });

    // Leaf instanced mesh
    const leafMat = new THREE.MeshLambertMaterial({
      vertexColors: true,
      side: THREE.DoubleSide,
    });
    const leafMesh = new THREE.Mesh(leafGeo, leafMat);
    leafMesh.castShadow = true;
    leafMesh.scale.set(s, s, s);
    leafMesh.position.set(rx, y, rz);
    leafMesh.rotation.y = trunkMesh.rotation.y;
    treeGroup.add(leafMesh);
    leafInstances.push({ mesh: leafMesh, baseY: y, phase: rng.next() * Math.PI * 2 });
  }
}

regenerateForest(true);

// ─── Animate ────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const tempColor = new THREE.Color();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Advance time of day
  timeOfDay = (timeOfDay + params.daySpeed * dt) % 1;
  gui.controllers.forEach(c => { if (c.property === 'timeOfDay') c.updateDisplay(); });

  const { skyTop, skyBot, ambColor, sunColor, fogColor } = getSkyColors(timeOfDay);

  // Update sky
  scene.background = skyTop;
  scene.fog.color.copy(fogColor);
  scene.fog.near = 40 * params.fogDensity;
  scene.fog.far = 180 * params.fogDensity;

  // Update ambient
  ambientLight.color.copy(ambColor);
  ambientLight.intensity = 0.4 + 0.6 * (1 - Math.abs(timeOfDay - 0.5) * 2);

  // Update sun position (rotates around XZ plane)
  const sunAngle = (timeOfDay * Math.PI * 2) - Math.PI / 2;
  const sunHeight = Math.sin(timeOfDay * Math.PI);
  sunLight.position.set(Math.cos(sunAngle) * 80, 30 + sunHeight * 60, Math.sin(sunAngle) * 80);
  sunLight.color.copy(sunColor);
  sunLight.intensity = Math.max(0, sunHeight) * 2.5 + 0.1;

  // Update fill light
  fillLight.intensity = 0.1 + Math.max(0, -sunHeight) * 0.5;

  // Wind animation on leaves
  const wind = params.windStrength;
  for (const leaf of leafInstances) {
    leaf.mesh.rotation.z = Math.sin(elapsed * 1.5 + leaf.phase) * wind * 0.05;
    leaf.mesh.rotation.x = Math.sin(elapsed * 1.1 + leaf.phase + 1) * wind * 0.03;
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ─── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
