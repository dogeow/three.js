<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Three.js 环境贴图 / HDR</title>
  <style>body{margin:0;overflow:hidden;background:#111;font-family:Arial,sans-serif}a{position:absolute;top:16px;left:16px;color:#fff;text-decoration:none;background:rgba(0,0,0,.6);padding:8px 16px;border-radius:4px;z-index:10}</style>
</head>
<body>
<a href="../README.md">&larr; 返回目录</a>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

// ─── 核心知识点 ─────────────────────────────────────────────────────────────
// 1. RGBELoader 加载 HDR .exr/.hdr 文件作为环境贴图
// 2. scene.environment 将环境贴图自动赋值给所有 PBR 材质
// 3. PMREMGenerator 生成预过滤 mipmap，提升反射质量
// 4. envMapIntensity 控制反射强度

// 场景基础
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ─── 环境贴图加载 ───────────────────────────────────────────────────────────
// 使用 RGBELoader 加载 HDR 环境贴图
// PMREMGenerator 会自动将 HDR 数据转换为预过滤的 mipmap 环境贴图
// 这使得 scene.environment 可以直接使用，且在所有反射中表现正确
new RGBELoader()
  .setDataType(THREE.FloatType) // HDR 需要 FloatType
  .load('https://threejs.org/examples/textures/equirectangular/royal_esplanade_1k.hdr', (texture) => {
    // 将等距圆柱投影纹理转换为预过滤 mipmap
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    pmremGenerator.compileEquirectangularShader();

    // 生成环境贴图（自动设置到 scene.environment）
    scene.environment = pmremGenerator.fromEquirectangular(texture).texture;
    pmremGenerator.dispose();

    texture.dispose();
    console.log('环境贴图加载完成，已应用到 scene.environment');
  }, undefined, (err) => {
    console.warn('HDR 加载失败，使用纯色背景继续', err);
  });

// ─── 物体 ───────────────────────────────────────────────────────────────────
// 金属立方体 - 使用 PBR 材质，依赖 scene.environment 产生反射
const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
const cubeMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  metalness: 0.9,      // 高金属度
  roughness: 0.1,      // 低粗糙度 = 清晰反射
  envMapIntensity: 1.5 // 增强环境贴图反射强度
});
const cube = new THREE.Mesh(cubeGeo, cubeMat);
cube.position.set(-1.2, 0.5, 0);
scene.add(cube);

// 镜面球体
const sphereGeo = new THREE.SphereGeometry(0.7, 64, 64);
const sphereMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  metalness: 1.0,
  roughness: 0.0,
  envMapIntensity: 2.0
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
sphere.position.set(1.2, 0.7, 0);
scene.add(sphere);

// 地面 - 接收阴影
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 10),
  new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// 光照
const ambient = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(3, 5, 3);
dirLight.castShadow = true;
scene.add(dirLight);

// ─── 动画循环 ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // 立方体缓慢自转 + 上下浮动
  cube.rotation.y = t * 0.5;
  cube.position.y = 0.5 + Math.sin(t * 1.2) * 0.2;

  // 球体跟随鼠标或简单旋转
  sphere.rotation.y = t * 0.3;
  sphere.position.y = 0.7 + Math.cos(t * 0.8) * 0.15;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// 响应窗口调整
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
