<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体素迷宫生成器 - 递归回溯算法</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    #tip {
      position: absolute; bottom: 16px; left: 16px;
      background: rgba(0,0,0,0.75); color: #7fdbca;
      padding: 10px 14px; border-radius: 8px; font-size: 13px;
      max-width: 320px; line-height: 1.6; border: 1px solid #3a5a4a;
    }
    #tip strong { color: #a8f0d8; }
    #info {
      position: absolute; top: 16px; left: 16px;
      color: #aaa; font-size: 13px;
    }
    #info span { color: #7fdbca; }
  </style>
</head>
<body>
<div id="info">迷宫中单元: <span id="cells">0</span> | 已访问: <span id="visited">0</span></div>
<div id="tip">
  <strong>算法技巧: 递归回溯 (Recursive Backtracker)</strong><br>
  1. 从起点开始，随机选择一个未访问的相邻格子并打通墙壁<br>
  2. 递归重复步骤1，直到当前格子所有邻居都已访问<br>
  3. 回溯到上一个有未访问邻居的格子，重复过程<br>
  4. 全部格子访问完成后迷宫生成完毕<br>
  使用 InstancedMesh 批量渲染所有体素，性能极佳
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

// 场景初始化
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0d);
scene.fog = new THREE.Fog(0x0d0d0d, 40, 120);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 500);
camera.position.set(20, 25, 35);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.target.set(0, 0, 0);

// 光照
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
sun.position.set(30, 50, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 150;
sun.shadow.camera.left = sun.shadow.camera.bottom = -50;
sun.shadow.camera.right = sun.shadow.camera.top = 50;
scene.add(sun);
scene.add(new THREE.DirectionalLightHelper(sun));

// 地面
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshLambertMaterial({ color: 0x111111 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// GUI 参数
const params = {
  mazeSize: 15,
  wallHeight: 3,
  speed: 8,
  reset: () => initMaze(),
};

// GUI 控件
const gui = new GUI();
gui.add(params, 'mazeSize', 5, 31, 2).name('迷宫尺寸');
gui.add(params, 'wallHeight', 1, 8, 0.5).name('墙壁高度');
gui.add(params, 'speed', 1, 30, 1).name('生成速度');
gui.add(params, 'reset').name('重新生成');

const cellsEl = document.getElementById('cells');
const visitedEl = document.getElementById('visited');

// ============ 体素迷宫类 ============
class VoxelMaze {
  constructor(size) {
    this.size = size;
    this.grid = [];
    this.instancedMeshes = [];
    this.stack = [];
    this.current = null;
    this.animating = false;
    this.totalCells = 0;
    this.visitedCells = 0;
    this.init();
  }

  // 初始化网格，1=墙，0=路
  init() {
    const s = this.size;
    this.grid = [];
    for (let z = 0; z < s * 2 + 1; z++) {
      this.grid[z] = [];
      for (let x = 0; x < s * 2 + 1; x++) {
        this.grid[z][x] = 1; // 默认全是墙
      }
    }
    this.stack = [];
    this.visitedCells = 0;
    this.totalCells = s * s;

    // 从起点开始
    this.current = { x: 0, z: 0 };
    this.grid[0][0] = 0;
    this.visitedCells++;
    this.stack.push({ ...this.current });
    this.updateUI();
  }

  updateUI() {
    cellsEl.textContent = this.totalCells;
    visitedEl.textContent = this.visitedCells;
  }

  // 获取邻居格子（未访问的）
  getUnvisitedNeighbors(cx, cz) {
    const s = this.size;
    const dirs = [
      { dx: 0, dz: -1 }, // 上
      { dx: 1, dz: 0 },  // 右
      { dx: 0, dz: 1 },  // 下
      { dx: -1, dz: 0 }, // 左
    ];
    const neighbors = [];
    for (const { dx, dz } of dirs) {
      const nx = cx + dx;
      const nz = cz + dz;
      if (nx >= 0 && nx < s && nz >= 0 && nz < s) {
        if (this.grid[nz * 2 + 1][nx * 2 + 1] === 1) {
          neighbors.push({ x: nx, z: nz, dx, dz });
        }
      }
    }
    return neighbors;
  }

  // 打通两个格子之间的墙
  carveWall(cx, cz, dx, dz) {
    // 起点格子在grid中的中心位置
    const gx = cx * 2 + 1;
    const gz = cz * 2 + 1;
    // 墙壁格子位置（中间）
    this.grid[gz + dz][gx + dx] = 0;
    // 目标格子
    this.grid[gz + dz * 2][gx + dx * 2] = 0;
  }

  // 单步执行递归回溯
  step() {
    if (this.stack.length === 0) {
      this.animating = false;
      return false;
    }

    this.current = this.stack[this.stack.length - 1];
    const neighbors = this.getUnvisitedNeighbors(this.current.x, this.current.z);

    if (neighbors.length > 0) {
      // 随机选一个邻居
      const { x, z, dx, dz } = neighbors[Math.floor(Math.random() * neighbors.length)];
      this.carveWall(this.current.x, this.current.z, dx, dz);
      this.grid[z * 2 + 1][x * 2 + 1] = 0;
      this.stack.push({ x, z });
      this.visitedCells++;
      this.updateUI();
    } else {
      // 回溯
      this.stack.pop();
    }
    return true;
  }

  // 渲染当前网格状态为 InstancedMesh
  render(wallH) {
    // 移除旧的实例网格
    for (const m of this.instancedMeshes) {
      scene.remove(m);
      m.dispose();
    }
    this.instancedMeshes = [];

    const s = this.size * 2 + 1;
    const voxels = [];

    for (let z = 0; z < s; z++) {
      for (let x = 0; x < s; x++) {
        if (this.grid[z][x] === 1) {
          voxels.push({ x: x - this.size, y: wallH / 2, z: z - this.size });
        }
      }
    }

    if (voxels.length === 0) return;

    const geo = new THREE.BoxGeometry(1, wallH, 1);
    const mat = new THREE.MeshLambertMaterial({ color: 0x3a6ea5 });
    const mesh = new THREE.InstancedMesh(geo, mat, voxels.length);
    mesh.castShadow = true;
    mesh.receiveShadow = true;

    const dummy = new THREE.Object3D();
    for (let i = 0; i < voxels.length; i++) {
      dummy.position.set(voxels[i].x, voxels[i].y, voxels[i].z);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
    }
    mesh.instanceMatrix.needsUpdate = true;
    scene.add(mesh);
    this.instancedMeshes.push(mesh);
  }
}

// ============ 迷宫实例 ============
let maze = null;

function initMaze() {
  // 清理旧的
  if (maze) {
    for (const m of maze.instancedMeshes) {
      scene.remove(m);
      m.dispose();
    }
  }
  maze = new VoxelMaze(params.mazeSize);
  maze.render(params.wallHeight);
}

initMaze();

// ============ 动画循环 ============
let lastTime = 0;

function animate(time) {
  requestAnimationFrame(animate);

  const delta = time - lastTime;
  lastTime = time;

  // 按速度参数逐步生成迷宫
  if (maze && maze.animating) {
    const stepsPerFrame = Math.max(1, Math.floor(params.speed / 5));
    for (let i = 0; i < stepsPerFrame; i++) {
      if (!maze.step()) break;
    }
    maze.render(params.wallHeight);
  }

  controls.update();
  renderer.render(scene, camera);
}

// 启动动画
maze.animating = true;
requestAnimationFrame(animate);

// 点击画布开始生成
renderer.domElement.addEventListener('click', () => {
  if (maze && !maze.animating && maze.visitedCells < maze.totalCells) {
    maze.animating = true;
  }
});

// 窗口大小调整
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
