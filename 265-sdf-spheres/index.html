<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDF Sphere Packing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a0f; }
  canvas { display: block; }
  #info {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    pointer-events: none;
    text-align: center;
  }
</style>
</head>
<body>
<div id="info">Click to add spheres — Scroll to zoom — Drag to rotate</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.esm.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import GUI from 'lil-gui';

// ── Scene Setup ─────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 2, 12);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;

// ── Packed Spheres Data ───────────────────────────────────────────────────────
const SPHERE_COLORS = [
  new THREE.Color(0xff6b6b),
  new THREE.Color(0x4ecdc4),
  new THREE.Color(0xffe66d),
  new THREE.Color(0x95e1d3),
  new THREE.Color(0xf38181),
  new THREE.Color(0xaa96da),
  new THREE.Color(0xfcbad3),
  new THREE.Color(0xa8d8ea),
  new THREE.Color(0xff9a8b),
  new THREE.Color(0x88d8b0),
];

let spheres = [];

// ── Packing Parameters ────────────────────────────────────────────────────────
const params = {
  sphereCount: 12,
  minRadius: 0.35,
  maxRadius: 1.2,
  aoStrength: 0.6,
  shadowSoftness: 0.4,
  glossy: 0.85,
  aoRadius: 0.8,
  lightIntensity: 1.2,
};

// ── Simple Sphere Packing ─────────────────────────────────────────────────────
function packSphere(cx, cy, cz, r, existing) {
  for (const s of existing) {
    const dx = cx - s.x, dy = cy - s.y, dz = cz - s.z;
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
    if (dist < r + s.r + 0.05) return false;
  }
  return true;
}

function generatePackedSpheres() {
  spheres = [];
  const attempts = 2000;
  const box = 5.5;
  let colorIdx = 0;

  for (let i = 0; i < params.sphereCount; i++) {
    const r = params.minRadius + Math.random() * (params.maxRadius - params.minRadius);
    let placed = false;
    for (let a = 0; a < attempts && !placed; a++) {
      const x = (Math.random() - 0.5) * box * 2;
      const y = (Math.random() - 0.5) * box * 2;
      const z = (Math.random() - 0.5) * box * 2;
      if (packSphere(x, y, z, r, spheres)) {
        spheres.push({
          x, y, z, r,
          color: SPHERE_COLORS[colorIdx % SPHERE_COLORS.length].clone()
        });
        colorIdx++;
        placed = true;
      }
    }
    if (!placed && spheres.length < params.sphereCount) {
      // Force place
      const x = (Math.random() - 0.5) * box * 2;
      const y = (Math.random() - 0.5) * box * 2;
      const z = (Math.random() - 0.5) * box * 2;
      spheres.push({ x, y, z, r, color: SPHERE_COLORS[colorIdx % SPHERE_COLORS.length].clone() });
      colorIdx++;
    }
  }
}

generatePackedSpheres();

// ── Fullscreen Quad ───────────────────────────────────────────────────────────
const quadScene = new THREE.Scene();
const quadCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// ── Vertex Shader ─────────────────────────────────────────────────────────────
const vertexShader = `
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position, 1.0);
}
`;

// ── Fragment Shader ───────────────────────────────────────────────────────────
const fragmentShader = `
precision highp float;

varying vec2 vUv;

uniform vec2 uResolution;
uniform float uTime;
uniform vec3 uCamPos;
uniform mat4 uCamMatrixWorld;
uniform mat4 uCamProjInv;
uniform int uNumSpheres;
uniform float uSpheres[60]; // x,y,z,r per sphere, up to 20
uniform vec3 uSphereColors[20];
uniform float uAoStrength;
uniform float uShadowSoftness;
uniform float uGlossy;
uniform float uAoRadius;
uniform float uLightIntensity;

#define MAX_STEPS 120
#define MAX_DIST 40.0
#define SURF_DIST 0.001
#define PI 3.14159265359

// Hash for noise
float hash(vec3 p) {
  p = fract(p * 0.3183099 + 0.1);
  p *= 17.0;
  return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
}

float noise(vec3 p) {
  vec3 i = floor(p);
  vec3 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(mix(hash(i), hash(i + vec3(1,0,0)), f.x),
        mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
    mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
        mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y),
    f.z
  );
}

float fbm(vec3 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++) {
    v += a * noise(p);
    p *= 2.0; a *= 0.5;
  }
  return v;
}

// ── SDF Primitives ────────────────────────────────────────────────────────────
float sdSphere(vec3 p, float r) {
  return length(p) - r;
}

// ── Scene SDF (union of all spheres) ─────────────────────────────────────────
float sceneSDF(vec3 p) {
  float d = MAX_DIST;
  for (int i = 0; i < 20; i++) {
    if (i >= uNumSpheres) break;
    float sx = uSpheres[i * 3 + 0];
    float sy = uSpheres[i * 3 + 1];
    float sz = uSpheres[i * 3 + 2];
    float sr = uSpheres[i * 3 + 3];
    float sd = sdSphere(p - vec3(sx, sy, sz), sr);
    d = min(d, sd);
  }
  return d;
}

// ── Scene SDF with ID (returns closest sphere id) ─────────────────────────────
float sceneSDFID(vec3 p, out int id) {
  float d = MAX_DIST;
  id = -1;
  for (int i = 0; i < 20; i++) {
    if (i >= uNumSpheres) break;
    float sx = uSpheres[i * 3 + 0];
    float sy = uSpheres[i * 3 + 1];
    float sz = uSpheres[i * 3 + 2];
    float sr = uSpheres[i * 3 + 3];
    float sd = sdSphere(p - vec3(sx, sy, sz), sr);
    if (sd < d) { d = sd; id = i; }
  }
  return d;
}

vec3 getNormal(vec3 p) {
  float eps = 0.001;
  return normalize(vec3(
    sceneSDF(p + vec3(eps,0,0)) - sceneSDF(p - vec3(eps,0,0)),
    sceneSDF(p + vec3(0,eps,0)) - sceneSDF(p - vec3(0,eps,0)),
    sceneSDF(p + vec3(0,0,eps)) - sceneSDF(p - vec3(0,0,eps))
  ));
}

// ── Soft Shadows ─────────────────────────────────────────────────────────────
float softShadow(vec3 ro, vec3 rd, float mint, float maxt, float k) {
  float res = 1.0;
  float t = mint;
  for (int i = 0; i < 64; i++) {
    if (t > maxt) break;
    float h = sceneSDF(ro + rd * t);
    if (h < SURF_DIST) return 0.0;
    res = min(res, k * h / t);
    t += clamp(h, 0.01, 0.3);
  }
  return clamp(res, 0.0, 1.0);
}

// ── Ambient Occlusion ─────────────────────────────────────────────────────────
float calcAO(vec3 pos, vec3 nor) {
  float occ = 0.0;
  float sca = 1.0;
  for (int i = 0; i < 5; i++) {
    float h = 0.01 + 0.12 * float(i) / 4.0;
    float d = sceneSDF(pos + h * nor);
    occ += (h - d) * sca;
    sca *= 0.95;
    if (occ > 0.35) break;
  }
  return clamp(1.0 - 3.5 * occ, 0.0, 1.0) * (1.0 - uAoStrength) + uAoStrength;
}

// ── Sky / Environment ─────────────────────────────────────────────────────────
vec3 getSky(vec3 rd) {
  float t = 0.5 + 0.5 * rd.y;
  vec3 skyTop = vec3(0.05, 0.08, 0.18);
  vec3 skyHorizon = vec3(0.12, 0.10, 0.22);
  vec3 sky = mix(skyHorizon, skyTop, pow(max(rd.y, 0.0), 0.6));
  // Subtle stars
  float stars = smoothstep(0.97, 1.0, hash(normalize(rd) * 500.0));
  sky += stars * 0.3 * vec3(1.0, 0.95, 0.9);
  return sky;
}

// ── PBR-ish Lighting ─────────────────────────────────────────────────────────
vec3 pbrLighting(vec3 pos, vec3 nor, vec3 viewDir, vec3 albedo, float roughness, float metallic, vec3 lightDir, vec3 lightColor, float shadowMask) {
  // Diffuse (Lambert)
  float NdotL = max(dot(nor, lightDir), 0.0);
  vec3 diffuse = albedo * NdotL * lightColor * shadowMask;

  // Specular (Blinn-Phong + Schlick)
  vec3 halfVec = normalize(lightDir + viewDir);
  float NdotH = max(dot(nor, halfVec), 0.0);
  float specPower = mix(8.0, 256.0, uGlossy);
  float F0 = mix(0.04, 1.0, metallic);
  float spec = pow(NdotH, specPower) * F0 * (specPower + 2.0) / (8.0 * PI);
  vec3 specular = vec3(spec) * lightColor * NdotL * shadowMask;

  // Fresnel rim
  float fresnel = pow(1.0 - max(dot(nor, viewDir), 0.0), 3.0);
  vec3 fresnelColor = mix(vec3(0.02), albedo, metallic) * fresnel;

  // Environment reflection
  vec3 reflDir = reflect(-viewDir, nor);
  vec3 envColor = getSky(reflDir) * 0.4 * mix(0.04, 1.0, metallic);

  return diffuse + specular + fresnelColor + envColor * (0.5 + 0.5 * metallic);
}

// ── Raymarcher ────────────────────────────────────────────────────────────────
vec3 raymarch(vec3 ro, vec3 rd) {
  float t = 0.0;
  int hitID = -1;

  for (int i = 0; i < MAX_STEPS; i++) {
    int sid;
    float d = sceneSDFID(ro + rd * t, sid);
    if (d < SURF_DIST) {
      hitID = sid;
      break;
    }
    if (t > MAX_DIST) break;
    t += d;
  }

  if (hitID < 0) {
    return getSky(rd);
  }

  vec3 pos = ro + rd * t;
  vec3 nor = getNormal(pos);

  // Albedo from sphere color
  vec3 albedo = uSphereColors[hitID].rgb;

  // Surface roughness (varies by sphere size)
  float roughness = mix(0.05, 0.3, 1.0 - uGlossy);

  // Multiple lights
  vec3 col = vec3(0.0);

  // Key light (warm)
  vec3 lightDir1 = normalize(vec3(3.0, 6.0, 4.0));
  vec3 lightColor1 = vec3(1.0, 0.95, 0.85) * uLightIntensity;
  float shadow1 = softShadow(pos + nor * 0.005, lightDir1, 0.02, 12.0, 12.0 / uShadowSoftness);
  col += pbrLighting(pos, nor, -rd, albedo, roughness, 0.1, lightDir1, lightColor1, shadow1);

  // Fill light (cool)
  vec3 lightDir2 = normalize(vec3(-4.0, 2.0, -3.0));
  vec3 lightColor2 = vec3(0.4, 0.5, 0.8) * 0.4;
  float shadow2 = softShadow(pos + nor * 0.005, lightDir2, 0.02, 8.0, 8.0 / uShadowSoftness);
  col += pbrLighting(pos, nor, -rd, albedo, roughness, 0.0, lightDir2, lightColor2, shadow2);

  // Rim light
  vec3 lightDir3 = normalize(vec3(0.0, -2.0, -5.0));
  vec3 lightColor3 = vec3(0.3, 0.2, 0.5) * 0.3;
  col += pbrLighting(pos, nor, -rd, albedo, roughness, 0.0, lightDir3, lightColor3, 1.0);

  // Ambient + AO
  float ao = calcAO(pos, nor);
  vec3 ambient = vec3(0.06, 0.07, 0.12) * albedo * ao;
  col += ambient;

  // Subtle subsurface for translucency feel
  float sss = pow(max(dot(-rd, lightDir1), 0.0), 2.0) * 0.15;
  col += albedo * sss * vec3(1.0, 0.6, 0.4) * shadow1;

  // Tone mapping (ACES-ish)
  col = col / (col + 0.8);
  col = pow(col, vec3(1.0 / 2.2));

  return col;
}

// ── Camera Ray ────────────────────────────────────────────────────────────────
void main() {
  vec2 uv = (gl_FragCoord.xy / uResolution) * 2.0 - 1.0;
  uv.x *= uResolution.x / uResolution.y;

  // Reconstruct world-space ray from camera matrices
  vec4 clipPos = vec4(gl_FragCoord.xy / uResolution * 2.0 - 1.0, 1.0, 1.0);
  vec4 viewPos = uCamProjInv * clipPos;
  viewPos /= viewPos.w;
  vec3 rd = normalize((uCamMatrixWorld * vec4(viewPos.xyz, 0.0)).xyz);
  vec3 ro = uCamPos;

  vec3 col = raymarch(ro, rd);

  // Vignette
  float vignette = 1.0 - 0.4 * dot(vUv - 0.5, vUv - 0.5) * 2.0;
  col *= vignette;

  gl_FragColor = vec4(col, 1.0);
}
`;

// ── Uniforms ──────────────────────────────────────────────────────────────────
const uniforms = {
  uResolution: { value: new THREE.Vector2(innerWidth, innerHeight) },
  uTime:       { value: 0.0 },
  uCamPos:     { value: new THREE.Vector3() },
  uCamMatrixWorld: { value: new THREE.Matrix4() },
  uCamProjInv:     { value: new THREE.Matrix4() },
  uNumSpheres:     { value: spheres.length },
  uSpheres:        { value: new Float32Array(60) },
  uSphereColors:   { value: [] },
  uAoStrength:     { value: params.aoStrength },
  uShadowSoftness: { value: params.shadowSoftness },
  uGlossy:         { value: params.glossy },
  uAoRadius:       { value: params.aoRadius },
  uLightIntensity: { value: params.lightIntensity },
};

function updateSphereUniforms() {
  const flat = uniforms.uSpheres.value;
  const colors = [];
  for (let i = 0; i < spheres.length; i++) {
    flat[i * 3 + 0] = spheres[i].x;
    flat[i * 3 + 1] = spheres[i].y;
    flat[i * 3 + 2] = spheres[i].z;
    flat[i * 3 + 3] = spheres[i].r;
    colors.push(new THREE.Vector3(spheres[i].color.r, spheres[i].color.g, spheres[i].color.b));
  }
  uniforms.uSphereColors.value = colors;
  uniforms.uNumSpheres.value = spheres.length;
}

updateSphereUniforms();

// ── Shader Material ───────────────────────────────────────────────────────────
const material = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms,
});

const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
quadScene.add(quad);

// ── GUI ───────────────────────────────────────────────────────────────────────
const gui = new GUI({ title: '🔮 Sphere Packing' });
gui.add(params, 'sphereCount', 1, 30, 1).name('Sphere Count').onChange(() => {
  generatePackedSpheres();
  updateSphereUniforms();
});
gui.add(params, 'minRadius', 0.1, 1.0, 0.05).name('Min Radius').onChange(() => {
  generatePackedSpheres();
  updateSphereUniforms();
});
gui.add(params, 'maxRadius', 0.2, 2.0, 0.05).name('Max Radius').onChange(() => {
  generatePackedSpheres();
  updateSphereUniforms();
});
gui.add(params, 'aoStrength', 0.0, 1.0, 0.01).name('AO Strength').onChange(v => {
  uniforms.uAoStrength.value = v;
});
gui.add(params, 'shadowSoftness', 0.1, 3.0, 0.1).name('Shadow Softness').onChange(v => {
  uniforms.uShadowSoftness.value = v;
});
gui.add(params, 'glossy', 0.0, 1.0, 0.01).name('Glossiness').onChange(v => {
  uniforms.uGlossy.value = v;
});
gui.add(params, 'lightIntensity', 0.2, 3.0, 0.1).name('Light Intensity').onChange(v => {
  uniforms.uLightIntensity.value = v;
});

// ── Click to Add Sphere ───────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const clickPoint = new THREE.Vector3();

renderer.domElement.addEventListener('dblclick', (e) => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Find a good placement position using current ray
  // Place sphere on a virtual surface at average sphere distance
  raycaster.ray.intersectPlane(groundPlane, clickPoint);
  if (!clickPoint) return;

  // Try to place near clicked ray
  const target = raycaster.ray.origin.clone().add(raycaster.ray.direction.clone().multiplyScalar(8.0));
  target.x += (Math.random() - 0.5) * 2;
  target.y += (Math.random() - 0.5) * 2;
  target.z += (Math.random() - 0.5) * 2;

  const r = params.minRadius + Math.random() * (params.maxRadius - params.minRadius);

  if (packSphere(target.x, target.y, target.z, r, spheres)) {
    const color = SPHERE_COLORS[spheres.length % SPHERE_COLORS.length].clone();
    spheres.push({ x: target.x, y: target.y, z: target.z, r, color });
    updateSphereUniforms();
  }
});

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  uniforms.uResolution.value.set(innerWidth, innerHeight);
});

// ── Animate ───────────────────────────────────────────────────────────────────
function animate(time) {
  requestAnimationFrame(animate);
  uniforms.uTime.value = time * 0.001;
  controls.update();
  camera.updateMatrixWorld();
  uniforms.uCamPos.value.copy(camera.position);
  uniforms.uCamMatrixWorld.value.copy(camera.matrixWorld);
  uniforms.uCamProjInv.value.copy(camera.projectionMatrixInverse);
  renderer.render(quadScene, quadCamera);
}

animate(0);
</script>
</body>
</html>
