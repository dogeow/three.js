<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Shader Wave — Three.js</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; overflow:hidden; font-family:sans-serif; }
canvas { display:block; }
#info { position:absolute; top:16px; left:16px; color:#fff; opacity:0.7; font-size:13px; }
</style>
</head>
<body>
<div id="info">Shader Wave</div>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 5, 15);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const geo = new THREE.TorusKnotGeometry(2, 0.5, 128, 32);
const mat = new THREE.MeshStandardMaterial({ color: 0x4488ff, metalness: 0.7, roughness: 0.3 });
const mesh = new THREE.Mesh(geo, mat);
scene.add(mesh);

scene.add(new THREE.AmbientLight(0.3));
const dir = new THREE.DirectionalLight(0xffffff, 1.5);
dir.position.set(5, 10, 5);
scene.add(dir);

const box = new THREE.BoxGeometry(1, 1, 1);
const boxMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x222222 });
const boxMesh = new THREE.Mesh(box, boxMat);
boxMesh.position.set(5, 3, 5);
scene.add(boxMesh);

// Example: shader-wave
const clock = new THREE.Clock();
function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    mesh.rotation.x = t * 0.3;
    mesh.rotation.y = t * 0.5;
    boxMesh.position.y = 3 + Math.sin(t * 2) * 0.5;
    renderer.render(scene, camera);
}
animate();
window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
