<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPU墨水扩散流体模拟 - Navier-Stokes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a12; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #tip {
    position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.75);
    color: #a0d8ef; padding: 14px 18px; border-radius: 10px; font-size: 13px;
    max-width: 340px; line-height: 1.6; border: 1px solid rgba(80,180,255,0.2);
    backdrop-filter: blur(6px);
  }
  #tip strong { color: #5de8c4; }
</style>
</head>
<body>
<div id="tip">
  <strong>技术原理：</strong>本演示使用简化版 2D Navier-Stokes 方程。<br>
  通过 <strong>ping-pong FBO</strong> 技术在 GPU 上交替计算速度场与压力场。<br>
  鼠标拖拽注入彩色墨水，速度场对墨水进行<strong>对流传输</strong>，模拟真实流体扩散效果。
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

// ─────────────────────────────────────────────
// 着色器源码
// ─────────────────────────────────────────────

// 速度场外力注入 / Velocity field force injection
const velocityForceShader = `
precision highp float;
uniform sampler2D uVelocity;
uniform vec2 uForcePos;
uniform vec2 uForceDir;
uniform float uRadius;
uniform float uStrength;
uniform vec2 uResolution;

void main() {
  vec2 uv = gl_FragCoord.xy / uResolution;
  vec2 vel = texture2D(uVelocity, uv).xy;
  float dist = distance(uv, uForcePos);
  float influence = exp(-dist * dist / (uRadius * uRadius));
  vel += uForceDir * influence * uStrength;
  gl_FragColor = vec4(vel, 0.0, 1.0);
}
`;

// 速度场对流 / Velocity advection
const velocityAdvectShader = `
precision highp float;
uniform sampler2D uVelocity;
uniform vec2 uVelocityRes;
uniform float uDt;
uniform float uDissipation;

vec2 semiLagrangian(vec2 uv) {
  vec2 vel = texture2D(uVelocity, uv).xy;
  return uv - vel * uDt;
}

void main() {
  vec2 uv = gl_FragCoord.xy / uVelocityRes;
  vec2 vel = texture2D(uVelocity, semiLagrangian(uv)).xy;
  vel *= uDissipation;
  gl_FragColor = vec4(vel, 0.0, 1.0);
}
`;

// 压力求解 Jacobi 迭代 / Pressure solve via Jacobi iteration
const pressureShader = `
precision highp float;
uniform sampler2D uPressure;
uniform sampler2D uVelocity;
uniform vec2 uTexelSize;
uniform vec2 uResolution;

void main() {
  vec2 uv = gl_FragCoord.xy / uResolution;
  float pL = texture2D(uPressure, uv - vec2(uTexelSize.x, 0.0)).x;
  float pR = texture2D(uPressure, uv + vec2(uTexelSize.x, 0.0)).x;
  float pB = texture2D(uPressure, uv - vec2(0.0, uTexelSize.y)).x;
  float pT = texture2D(uPressure, uv + vec2(0.0, uTexelSize.y)).x;
  float pC = texture2D(uPressure, uv).x;

  float vL = texture2D(uVelocity, uv - vec2(uTexelSize.x, 0.0)).x;
  float vR = texture2D(uVelocity, uv + vec2(uTexelSize.x, 0.0)).x;
  float vB = texture2D(uVelocity, uv - vec2(0.0, uTexelSize.y)).y;
  float vT = texture2D(uVelocity, uv + vec2(0.0, uTexelSize.y)).y;

  float divergence = 0.5 * (vR - vL + vT - vB);
  float pressure = (pL + pR + pB + pT - divergence) * 0.25;
  gl_FragColor = vec4(pressure, 0.0, 0.0, 1.0);
}
`;

// 速度场散度减去压力梯度 / Subtract pressure gradient from velocity
const gradientSubtractShader = `
precision highp float;
uniform sampler2D uPressure;
uniform sampler2D uVelocity;
uniform vec2 uTexelSize;
uniform vec2 uResolution;

void main() {
  vec2 uv = gl_FragCoord.xy / uResolution;
  float pL = texture2D(uPressure, uv - vec2(uTexelSize.x, 0.0)).x;
  float pR = texture2D(uPressure, uv + vec2(uTexelSize.x, 0.0)).x;
  float pB = texture2D(uPressure, uv - vec2(0.0, uTexelSize.y)).x;
  float pT = texture2D(uPressure, uv + vec2(0.0, uTexelSize.y)).x;

  vec2 vel = texture2D(uVelocity, uv).xy;
  vel -= 0.5 * vec2(pR - pL, pT - pB);
  gl_FragColor = vec4(vel, 0.0, 1.0);
}
`;

// 墨水密度注入 / Ink density injection
const inkInjectShader = `
precision highp float;
uniform sampler2D uInk;
uniform vec2 uInkPos;
uniform vec3 uInkColor;
uniform float uRadius;
uniform float uStrength;
uniform vec2 uResolution;

void main() {
  vec2 uv = gl_FragCoord.xy / uResolution;
  vec4 ink = texture2D(uInk, uv);
  float dist = distance(uv, uInkPos);
  float influence = exp(-dist * dist / (uRadius * uRadius));
  ink.rgb += uInkColor * influence * uStrength;
  gl_FragColor = vec4(ink.rgb, 1.0);
}
`;

// 墨水密度对流 / Ink advection
const inkAdvectShader = `
precision highp float;
uniform sampler2D uInk;
uniform sampler2D uVelocity;
uniform vec2 uVelocityRes;
uniform float uDt;
uniform float uDissipation;

vec2 semiLagrangian(vec2 uv) {
  vec2 vel = texture2D(uVelocity, uv).xy;
  return uv - vel * uDt;
}

void main() {
  vec2 uv = gl_FragCoord.xy / uVelocityRes;
  vec3 ink = texture2D(uInk, semiLagrangian(uv)).rgb;
  ink *= uDissipation;
  gl_FragColor = vec4(ink, 1.0);
}
`;

// 最终显示着色器（混合墨水与背景） / Final display shader
const displayShader = `
precision highp float;
uniform sampler2D uInk;
uniform vec2 uResolution;
void main() {
  vec2 uv = gl_FragCoord.xy / uResolution;
  vec3 ink = texture2D(uInk, uv).rgb;
  // 背景渐变 + 墨水叠加
  vec3 bg = mix(vec3(0.04, 0.04, 0.08), vec3(0.08, 0.12, 0.18), uv.y);
  vec3 color = bg + ink;
  gl_FragColor = vec4(color, 1.0);
}
`;

// ─────────────────────────────────────────────
// 场景初始化
// ─────────────────────────────────────────────
const width = window.innerWidth, height = window.innerHeight;
const texW = Math.floor(width / 2), texH = Math.floor(height / 2);

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(width, height);
renderer.setPixelRatio(1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// ─────────────────────────────────────────────
// FBO 辅助函数
// ─────────────────────────────────────────────
function createFBO(w, h, type = THREE.HalfFloatType) {
  return new THREE.WebGLRenderTarget(w, h, {
    type,
    format: THREE.RGBAFormat,
    minFilter: THREE.LinearFilter,
    magFilter: THREE.LinearFilter,
    wrapS: THREE.ClampToEdgeWrapping,
    wrapT: THREE.ClampToEdgeWrapping,
    depthBuffer: false
  });
}

// 创建 ping-pong FBO 对
function createDoubleFBO(w, h) {
  return {
    read: createFBO(w, h),
    write: createFBO(w, h),
    swap() { const t = this.read; this.read = this.write; this.write = t; }
  };
}

// 全屏四边形
const fsqGeo = new THREE.PlaneGeometry(2, 2);
const fsqMesh = new THREE.Mesh(fsqGeo);
scene.add(fsqMesh);

// 正交相机渲染场景（将 shaderMaterial 应用于全屏四边形）
function renderPass(material, target) {
  fsqMesh.material = material;
  renderer.setRenderTarget(target);
  renderer.render(scene, camera);
}

// ─────────────────────────────────────────────
// 创建着色器材质（带 uniforms）
// ─────────────────────────────────────────────
function makeMat(fs, uniforms) {
  return new THREE.ShaderMaterial({
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position.xy, 0.0, 1.0);
      }
    `,
    fragmentShader: fs,
    uniforms,
    depthTest: false,
    depthWrite: false
  });
}

// ─────────────────────────────────────────────
// FBO 实例
// ─────────────────────────────────────────────
const velocity = createDoubleFBO(texW, texH);   // 速度场
const pressure = createDoubleFBO(texW, texH);    // 压力场
const ink      = createDoubleFBO(texW, texH);    // 墨水密度

// ─────────────────────────────────────────────
// 通用 uniform
// ─────────────────────────────────────────────
const uTexelSize = { value: new THREE.Vector2(1 / texW, 1 / texH) };
const uResolution = { value: new THREE.Vector2(texW, texH) };
const uVelocityRes = { value: new THREE.Vector2(texW, texH) };

// ─────────────────────────────────────────────
// 着色器材质
// ─────────────────────────────────────────────
const matVelocityForce = makeMat(velocityForceShader, {
  uVelocity:   { value: null },
  uForcePos:   { value: new THREE.Vector2() },
  uForceDir:   { value: new THREE.Vector2() },
  uRadius:     { value: 0.05 },
  uStrength:   { value: 0.5 },
  uResolution: { value: new THREE.Vector2(texW, texH) }
});

const matVelocityAdvect = makeMat(velocityAdvectShader, {
  uVelocity:    { value: null },
  uVelocityRes: { value: new THREE.Vector2(texW, texH) },
  uDt:          { value: 0.016 },
  uDissipation: { value: 0.99 }
});

const matPressure = makeMat(pressureShader, {
  uPressure:  { value: null },
  uVelocity:  { value: null },
  uTexelSize: { value: new THREE.Vector2(1 / texW, 1 / texH) },
  uResolution:{ value: new THREE.Vector2(texW, texH) }
});

const matGradient = makeMat(gradientSubtractShader, {
  uPressure:  { value: null },
  uVelocity:  { value: null },
  uTexelSize: { value: new THREE.Vector2(1 / texW, 1 / texH) },
  uResolution:{ value: new THREE.Vector2(texW, texH) }
});

const matInkInject = makeMat(inkInjectShader, {
  uInk:       { value: null },
  uInkPos:    { value: new THREE.Vector2() },
  uInkColor:  { value: new THREE.Vector3(1, 0.5, 0.2) },
  uRadius:    { value: 0.03 },
  uStrength:  { value: 1.0 },
  uResolution:{ value: new THREE.Vector2(texW, texH) }
});

const matInkAdvect = makeMat(inkAdvectShader, {
  uInk:        { value: null },
  uVelocity:   { value: null },
  uVelocityRes:{ value: new THREE.Vector2(texW, texH) },
  uDt:         { value: 0.016 },
  uDissipation:{ value: 0.997 }
});

const matDisplay = makeMat(displayShader, {
  uInk:       { value: null },
  uResolution:{ value: new THREE.Vector2(width, height) }
});

// ─────────────────────────────────────────────
// GUI 参数
// ─────────────────────────────────────────────
const params = {
  dissipation:    0.997,   // 墨水消散率
  velocityDissip:  0.99,    // 速度消散率
  forceRadius:     0.05,    // 力的影响半径
  forceStrength:   0.5,     // 力强度
  solverIters:     20,      // Jacobi 迭代次数
  inkRadius:       0.03,    // 墨水注入半径
  inkStrength:     1.0,     // 墨水注入强度
  autoColor:       true,   // 自动变换颜色
  color:           '#ff8833'
};

const gui = new GUI({ title: '🔬 流体控制面板' });
gui.add(params, 'dissipation', 0.98, 1.0, 0.001).name('墨水消散率');
gui.add(params, 'velocityDissip', 0.95, 1.0, 0.001).name('速度消散率');
gui.add(params, 'forceRadius', 0.01, 0.15).name('力半径');
gui.add(params, 'forceStrength', 0.1, 1.5).name('力强度');
gui.add(params, 'inkRadius', 0.005, 0.1).name('墨水半径');
gui.add(params, 'inkStrength', 0.1, 3.0).name('墨水强度');
gui.add(params, 'solverIters', 1, 50, 1).name('迭代次数');

// 颜色选择（自动变换或手动）
const colorFolder = gui.addFolder('墨水颜色');
colorFolder.add(params, 'autoColor').name('自动变色');
colorFolder.addColor(params, 'color').name('手动颜色');

// ─────────────────────────────────────────────
// 墨水颜色池（随时间自动变化）
// ─────────────────────────────────────────────
const colorPalette = [
  [1.0, 0.35, 0.15],
  [0.2, 0.6, 1.0],
  [0.4, 1.0, 0.5],
  [1.0, 0.15, 0.7],
  [0.8, 0.2, 1.0],
  [1.0, 0.75, 0.1]
];
let colorIdx = 0;
let colorTimer = 0;

function getInkColor() {
  if (params.autoColor) {
    return colorPalette[colorIdx % colorPalette.length];
  }
  const c = new THREE.Color(params.color);
  return [c.r, c.g, c.b];
}

// ─────────────────────────────────────────────
// 鼠标交互
// ─────────────────────────────────────────────
let isDragging = false;
let prevPos = new THREE.Vector2();
let curPos = new THREE.Vector2();
let forceDir = new THREE.Vector2();

// 将屏幕坐标转换为纹理 UV [0,1]
function screenToUV(x, y) {
  return new THREE.Vector2(x / width, 1.0 - y / height);
}

renderer.domElement.addEventListener('mousedown', e => {
  isDragging = true;
  curPos.copy(screenToUV(e.clientX, e.clientY));
  prevPos.copy(curPos);
  // 更换颜色
  colorIdx++;
});

renderer.domElement.addEventListener('mousemove', e => {
  if (!isDragging) return;
  prevPos.copy(curPos);
  curPos.copy(screenToUV(e.clientX, e.clientY));
  forceDir.subVectors(curPos, prevPos);
});

renderer.domElement.addEventListener('mouseup',   () => { isDragging = false; });
renderer.domElement.addEventListener('mouseleave', () => { isDragging = false; });

// 触控支持
renderer.domElement.addEventListener('touchstart', e => {
  e.preventDefault();
  isDragging = true;
  const t = e.touches[0];
  curPos.copy(screenToUV(t.clientX, t.clientY));
  prevPos.copy(curPos);
  colorIdx++;
}, { passive: false });

renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isDragging) return;
  const t = e.touches[0];
  prevPos.copy(curPos);
  curPos.copy(screenToUV(t.clientX, t.clientY));
  forceDir.subVectors(curPos, prevPos);
}, { passive: false });

renderer.domElement.addEventListener('touchend', () => { isDragging = false; });

// ─────────────────────────────────────────────
// 窗口调整
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
});

// ─────────────────────────────────────────────
// 主动画循环
// ─────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.033);

  // 1. 注入速度场外力（鼠标拖拽产生）
  if (isDragging && forceDir.length() > 0.0001) {
    matVelocityForce.uniforms.uVelocity.value = velocity.read.texture;
    matVelocityForce.uniforms.uForcePos.value.copy(curPos);
    matVelocityForce.uniforms.uForceDir.value.copy(forceDir.multiplyScalar(8.0));
    matVelocityForce.uniforms.uRadius.value = params.forceRadius;
    matVelocityForce.uniforms.uStrength.value = params.forceStrength;
    renderPass(matVelocityForce, velocity.write);
    velocity.swap();
  }

  // 2. 速度场对流
  matVelocityAdvect.uniforms.uVelocity.value = velocity.read.texture;
  matVelocityAdvect.uniforms.uDt.value = dt;
  matVelocityAdvect.uniforms.uDissipation.value = params.velocityDissip;
  renderPass(matVelocityAdvect, velocity.write);
  velocity.swap();

  // 3. 压力场求解（Jacobi 迭代）
  for (let i = 0; i < params.solverIters; i++) {
    matPressure.uniforms.uPressure.value = pressure.read.texture;
    matPressure.uniforms.uVelocity.value = velocity.read.texture;
    renderPass(matPressure, pressure.write);
    pressure.swap();
  }

  // 4. 减去压力梯度，得到无散速度场
  matGradient.uniforms.uPressure.value = pressure.read.texture;
  matGradient.uniforms.uVelocity.value = velocity.read.texture;
  renderPass(matGradient, velocity.write);
  velocity.swap();

  // 5. 注入墨水
  if (isDragging) {
    matInkInject.uniforms.uInk.value = ink.read.texture;
    matInkInject.uniforms.uInkPos.value.copy(curPos);
    const col = getInkColor();
    matInkInject.uniforms.uInkColor.value.set(col[0], col[1], col[2]);
    matInkInject.uniforms.uRadius.value = params.inkRadius;
    matInkInject.uniforms.uStrength.value = params.inkStrength;
    renderPass(matInkInject, ink.write);
    ink.swap();
  }

  // 6. 墨水对流传输
  matInkAdvect.uniforms.uInk.value = ink.read.texture;
  matInkAdvect.uniforms.uVelocity.value = velocity.read.texture;
  matInkAdvect.uniforms.uDt.value = dt;
  matInkAdvect.uniforms.uDissipation.value = params.dissipation;
  renderPass(matInkAdvect, ink.write);
  ink.swap();

  // 7. 最终渲染到屏幕
  matDisplay.uniforms.uInk.value = ink.read.texture;
  matDisplay.uniforms.uResolution.value.set(width, height);
  renderer.setRenderTarget(null);
  renderPass(matDisplay, null);

  // 自动颜色切换（每 1.5 秒）
  colorTimer += dt;
  if (params.autoColor && colorTimer > 1.5) {
    colorTimer = 0;
    // 拖动时自动换颜色已在上方处理
  }
}

animate();
</script>
</body>
</html>
