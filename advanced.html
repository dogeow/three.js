<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 高级示例 - Bloom + 雾效 + GLTF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x111122, 0.015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // 后处理 Bloom
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      0.8, 0.4, 0.85
    );
    composer.addPass(bloom);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 光照
    scene.add(new THREE.AmbientLight(0x222244, 0.5));
    const dir = new THREE.DirectionalLight(0xffffff, 1);
    dir.position.set(5, 10, 5);
    scene.add(dir);
    const point = new THREE.PointLight(0xff44aa, 2, 20);
    point.position.set(-3, 3, 3);
    scene.add(point);

    // 简单场景：多个发光球体（替代GLTF加载）
    const sphereGeo = new THREE.SphereGeometry(0.6, 32, 32);
    const positions = [[-2,0,0],[0,0.8,0],[2,0,0],[0,-0.8,0],[-1,2,0],[1,2,0]];
    const emColors = [0xff44aa, 0x44ffaa, 0xaa44ff, 0xffaa44, 0x44aaff, 0xff4444];
    positions.forEach(([x,y,z], i) => {
      const mat = new THREE.MeshStandardMaterial({
        color: 0x222233,
        emissive: emColors[i],
        emissiveIntensity: 2
      });
      const m = new THREE.Mesh(sphereGeo, mat);
      m.position.set(x, y, z);
      scene.add(m);
    });

    // 地面
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.8 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.5;
    scene.add(ground);

    // 尝试加载 GLTF 模型（备用：创建简单机器人场景）
    try {
      const loader = new GLTFLoader();
      loader.load(
        'https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
        (gltf) => {
          gltf.scene.position.set(0, -1, 0);
          gltf.scene.scale.set(0.5, 0.5, 0.5);
          scene.add(gltf.scene);
        },
        undefined,
        () => {} // 静默失败，使用备用场景
      );
    } catch(e) {}

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      // 发光球体浮动
      scene.children.forEach((child, i) => {
        if (child.isMesh && child.material.emissiveIntensity > 0) {
          child.position.y = positions[i] ? positions[i][1] + Math.sin(t * 2 + i) * 0.2 : child.position.y;
        }
      });
      controls.update();
      composer.render();
    }
    animate();
  </script>
</body>
</html>
