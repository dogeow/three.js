<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>3696. Enzyme Kinetics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#050510;font-family:'Courier New',monospace}
canvas{display:block}
#ui{position:fixed;top:16px;left:16px;color:#aaccff;font-size:13px;line-height:1.8;pointer-events:none;z-index:10;text-shadow:0 0 8px #4488ff}
#ui h3{color:#88ddff;font-size:15px;margin-bottom:8px;letter-spacing:2px}
.bar-wrap{display:flex;align-items:center;gap:8px;margin:3px 0}
.bar-label{min-width:110px;color:#8899bb}
.bar-bg{flex:1;height:6px;background:rgba(255,255,255,0.1);border-radius:3px}
.bar-fill{height:100%;border-radius:3px;transition:width 0.3s}
#legend{position:fixed;bottom:16px;left:16px;color:#667799;font-size:11px;pointer-events:none}
#legend span{margin-right:16px}
</style>
</head>
<body>
<div id="ui">
  <h3>ENZYME KINETICS</h3>
  <div class="bar-wrap"><span class="bar-label">Substrate [S]</span><div class="bar-bg"><div id="bar-s" class="bar-fill" style="background:#44ff88;width:60%"></div></div></div>
  <div class="bar-wrap"><span class="bar-label">Complex [ES]</span><div class="bar-bg"><div id="bar-es" class="bar-fill" style="background:#ffaa44;width:20%"></div></div></div>
  <div class="bar-wrap"><span class="bar-label">Product [P]</span><div class="bar-bg"><div id="bar-p" class="bar-fill" style="background:#ff4466;width:5%"></div></div></div>
  <div class="bar-wrap"><span class="bar-label">Velocity v</span><div class="bar-bg"><div id="bar-v" class="bar-fill" style="background:#44aaff;width:40%"></div></div></div>
  <div style="margin-top:10px;color:#556677;font-size:11px">
    Km=<span id="km">2.0</span> mM | Vmax=<span id="vmax">1.0</span> | dt=<span id="dt">0.00</span>s
  </div>
</div>
<div id="legend">
  <span style="color:#44ff88">● Substrate S</span>
  <span style="color:#ffaa44">● Enzyme</span>
  <span style="color:#ff4466">● Product P</span>
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module" src="main.js"></script>
</body>
</html>
