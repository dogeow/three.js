<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>3711. Pool Billiards 3D</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#1a3a0a;font-family:Segoe UI,sans-serif}
canvas{display:block}
#ui{position:fixed;top:14px;left:14px;z-index:10;color:#fff;font-size:13px;background:rgba(0,0,0,0.55);padding:12px 16px;border-radius:8px;line-height:1.7}
#ui strong{color:#90ff40;font-size:15px}
#power-bar{width:140px;height:10px;background:#333;border-radius:5px;margin-top:6px;overflow:hidden}
#power-fill{height:100%;width:0%;background:linear-gradient(90deg,#4caf50,#ffeb3b,#f44336);transition:width .05s}
#instructions{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:12px;text-align:center}
</style>
</head>
<body>
<div id="ui">
  <strong>🎱 Pool Billiards 3D</strong><br>
  Power: <span id="power-val">50</span>%<br>
  <div id="power-bar"><div id="power-fill"></div></div>
  <br>Drag to aim &nbsp;|&nbsp; Space to shoot<br>
  <span id="status">Rack em up — click and drag back to aim</span>
</div>
<div id="instructions">Hold Space + Drag → set power &amp; direction &nbsp;|&nbsp; Release → shoot</div>

</html>
