<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Sphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(180,220,255,0.85);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(100,180,255,0.8);
      z-index: 10;
    }
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      pointer-events: none;
      z-index: 10;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(180,220,255,0.6);
      border-radius: 1px;
    }
    #crosshair::before {
      width: 2px;
      height: 12px;
      left: 5px;
      top: 0;
    }
    #crosshair::after {
      width: 12px;
      height: 2px;
      top: 5px;
      left: 0;
    }
    #teleport-flash {
      position: fixed;
      inset: 0;
      background: rgba(180,220,255,0);
      pointer-events: none;
      z-index: 100;
      transition: background 0.15s ease;
    }
    #teleport-flash.active {
      background: rgba(180,220,255,0.5);
    }
  </style>
</head>
<body>
  <div id="info">PORTAL SPHERE — walk through to teleport</div>
  <div id="crosshair"></div>
  <div id="teleport-flash"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ─── Renderer ────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    // ─── Scene & Camera ──────────────────────────────────────────────────────
    const sceneA = new THREE.Scene();
    const sceneB = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 300);
    camera.position.set(0, 1.6, 6);

    // ─── Fog ────────────────────────────────────────────────────────────────
    sceneA.fog = new THREE.FogExp2(0x050a14, 0.035);
    sceneB.fog = new THREE.FogExp2(0x0a0514, 0.035);

    // ─── Lights: Scene A (blue/cyan theme) ──────────────────────────────────
    sceneA.add(new THREE.AmbientLight(0x112244, 1.5));

    const sunA = new THREE.DirectionalLight(0x88ccff, 2.5);
    sunA.position.set(10, 15, 10);
    sunA.castShadow = true;
    sunA.shadow.mapSize.setScalar(1024);
    sunA.shadow.camera.near = 0.5;
    sunA.shadow.camera.far = 80;
    sunA.shadow.camera.left = -20;
    sunA.shadow.camera.right = 20;
    sunA.shadow.camera.top = 20;
    sunA.shadow.camera.bottom = -20;
    sceneA.add(sunA);

    const fillA = new THREE.PointLight(0x0066ff, 3, 20);
    fillA.position.set(-5, 3, -5);
    sceneA.add(fillA);

    const rimA = new THREE.PointLight(0x00ffcc, 2, 15);
    rimA.position.set(3, 5, -8);
    sceneA.add(rimA);

    // ─── Lights: Scene B (purple/gold theme) ────────────────────────────────
    sceneB.add(new THREE.AmbientLight(0x220011, 1.5));

    const sunB = new THREE.DirectionalLight(0xffaa44, 2.5);
    sunB.position.set(-10, 15, 10);
    sunB.castShadow = true;
    sunB.shadow.mapSize.setScalar(1024);
    sunB.shadow.camera.near = 0.5;
    sunB.shadow.camera.far = 80;
    sunB.shadow.camera.left = -20;
    sunB.shadow.camera.right = 20;
    sunB.shadow.camera.top = 20;
    sunB.shadow.camera.bottom = -20;
    sceneB.add(sunB);

    const fillB = new THREE.PointLight(0xff0066, 3, 20);
    fillB.position.set(5, 3, -5);
    sceneB.add(fillB);

    const rimB = new THREE.PointLight(0xffcc00, 2, 15);
    rimB.position.set(-3, 5, -8);
    sceneB.add(rimB);

    // ─── Shared Render Targets ───────────────────────────────────────────────
    const W = window.innerWidth, H = window.innerHeight;
    const rtA = new THREE.WebGLRenderTarget(W, H, {
      minFilter: THREE.LinearFilter,
      magFilter: THREE.LinearFilter,
      format: THREE.RGBAFormat,
      colorSpace: THREE.SRGBColorSpace
    });
    const rtB = new THREE.WebGLRenderTarget(W, H, {
      minFilter: THREE.LinearFilter,
      magFilter: THREE.LinearFilter,
      format: THREE.RGBAFormat,
      colorSpace: THREE.SRGBColorSpace
    });

    // ─── Shared Geometry ────────────────────────────────────────────────────
    const sphereGeo = new THREE.SphereGeometry(1, 64, 64);

    // ─── Portal Shader ───────────────────────────────────────────────────────
    const portalVert = /* glsl */`
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vWorldPos;

      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `;

    const portalFrag = /* glsl */`
      uniform sampler2D tScene;
      uniform float uTime;
      uniform vec3 uPortalColor;
      uniform float uPortalRadius;
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vWorldPos;

      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        f = f * f * (3.0 - 2.0 * f);
        float a = hash(i);
        float b = hash(i + vec2(1.0, 0.0));
        float c = hash(i + vec2(0.0, 1.0));
        float d = hash(i + vec2(1.0, 1.0));
        return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
      }

      void main() {
        vec2 centered = vUv - 0.5;
        float dist = length(centered);

        if (dist > 0.5) discard;

        // Swirl distortion
        float angle = atan(centered.y, centered.x);
        float radius = dist * 2.0;
        float swirl = uTime * 0.8 + radius * 3.0;
        float swirlAmount = (1.0 - radius) * 1.8;
        angle += swirl * swirlAmount;

        vec2 swirlUV = vec2(cos(angle), sin(angle)) * radius * 0.85 + 0.5;

        // Layered noise distortion
        float n1 = noise(vec2(radius * 4.0 - uTime * 0.6, angle * 2.0));
        float n2 = noise(vec2(radius * 8.0 + uTime * 0.4, angle * 3.0 + uTime * 0.3));
        float distortion = (n1 * 0.5 + n2 * 0.5 - 0.5) * 0.12 * (1.0 - radius);
        swirlUV += distortion;

        swirlUV = clamp(swirlUV, 0.01, 0.99);
        vec4 sceneColor = texture2D(tScene, swirlUV);

        // Edge glow
        float edge = smoothstep(0.3, 0.5, dist);
        float pulse = 0.5 + 0.5 * sin(uTime * 2.5 + radius * 6.0);
        float glowPulse = smoothstep(0.28, 0.5, dist) * pulse;

        vec3 edgeColor = uPortalColor * (2.0 + glowPulse * 1.5);
        vec3 finalColor = mix(sceneColor.rgb, edgeColor, edge * 0.6);

        // Sparkle particles on surface
        float sparkle = noise(vec2(vUv.x * 50.0 + uTime, vUv.y * 50.0 - uTime * 0.5));
        sparkle = pow(max(0.0, sparkle - 0.85), 2.0) * 10.0;
        finalColor += uPortalColor * sparkle * 3.0;

        // Vignette
        float vignette = 1.0 - smoothstep(0.35, 0.5, dist);
        finalColor *= vignette;

        float alpha = 0.92 + edge * 0.08;
        gl_FragColor = vec4(finalColor, alpha);
      }
    `;

    // ─── Create Portal Materials ─────────────────────────────────────────────
    function makePortalMat(color) {
      return new THREE.ShaderMaterial({
        uniforms: {
          tScene:       { value: null },
          uTime:        { value: 0 },
          uPortalColor: { value: new THREE.Color(color) },
          uPortalRadius: { value: 1.0 }
        },
        vertexShader:   portalVert,
        fragmentShader: portalFrag,
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false
      });
    }

    const matA = makePortalMat('#00ccff'); // cyan portal → leads to B
    const matB = makePortalMat('#ff44cc'); // magenta portal → leads to A

    // ─── Portal Meshes ───────────────────────────────────────────────────────
    const portalA = new THREE.Mesh(sphereGeo, matA);
    const portalB = new THREE.Mesh(sphereGeo, matB);

    sceneA.add(portalA);
    sceneB.add(portalB);

    // ─── Environment A ───────────────────────────────────────────────────────
    // Ground
    const groundGeoA = new THREE.PlaneGeometry(80, 80, 40, 40);
    const groundMatA = new THREE.MeshStandardMaterial({
      color: 0x0a1520,
      roughness: 0.85,
      metalness: 0.15
    });
    const groundA = new THREE.Mesh(groundGeoA, groundMatA);
    groundA.rotation.x = -Math.PI / 2;
    groundA.receiveShadow = true;
    sceneA.add(groundA);

    // Grid
    const gridA = new THREE.GridHelper(60, 40, 0x004466, 0x002244);
    gridA.position.y = 0.01;
    sceneA.add(gridA);

    // Central pedestal
    const pedGeo = new THREE.CylinderGeometry(0.8, 1.0, 0.5, 24);
    const pedMat = new THREE.MeshStandardMaterial({ color: 0x112233, roughness: 0.3, metalness: 0.8 });
    const ped = new THREE.Mesh(pedGeo, pedMat);
    ped.position.set(0, 0.25, 0);
    ped.castShadow = true;
    ped.receiveShadow = true;
    sceneA.add(ped);

    // Floating crystals around portal
    const crystalMatA = new THREE.MeshStandardMaterial({
      color: 0x00aaff,
      emissive: 0x003366,
      emissiveIntensity: 0.6,
      roughness: 0.1,
      metalness: 0.9,
      transparent: true,
      opacity: 0.85
    });
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const r = 3.2;
      const crystal = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.18, 0),
        crystalMatA.clone()
      );
      crystal.position.set(Math.cos(angle) * r, 1.2 + Math.sin(i * 1.5) * 0.5, Math.sin(angle) * r);
      crystal.userData.baseY = crystal.position.y;
      crystal.userData.phase = i * 0.8;
      crystal.castShadow = true;
      sceneA.add(crystal);
    }

    // Pillars
    for (let i = 0; i < 4; i++) {
      const angle = (i / 4) * Math.PI * 2;
      const pillarGeo = new THREE.CylinderGeometry(0.25, 0.3, 5, 8);
      const pillarMat = new THREE.MeshStandardMaterial({ color: 0x0d1f30, roughness: 0.7, metalness: 0.3 });
      const pillar = new THREE.Mesh(pillarGeo, pillarMat);
      pillar.position.set(Math.cos(angle) * 7, 2.5, Math.sin(angle) * 7);
      pillar.castShadow = true;
      pillar.receiveShadow = true;
      sceneA.add(pillar);

      // Pillar cap glow
      const capGeo = new THREE.BoxGeometry(0.5, 0.1, 0.5);
      const capMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x0055aa, emissiveIntensity: 1.5 });
      const cap = new THREE.Mesh(capGeo, capMat);
      cap.position.set(Math.cos(angle) * 7, 5.05, Math.sin(angle) * 7);
      sceneA.add(cap);
    }

    // ─── Environment B ───────────────────────────────────────────────────────
    const groundGeoB = new THREE.PlaneGeometry(80, 80, 40, 40);
    const groundMatB = new THREE.MeshStandardMaterial({
      color: 0x140a18,
      roughness: 0.85,
      metalness: 0.15
    });
    const groundB = new THREE.Mesh(groundGeoB, groundMatB);
    groundB.rotation.x = -Math.PI / 2;
    groundB.receiveShadow = true;
    sceneB.add(groundB);

    const gridB = new THREE.GridHelper(60, 40, 0x440022, 0x220011);
    gridB.position.y = 0.01;
    sceneB.add(gridB);

    const pedGeoB = new THREE.CylinderGeometry(0.8, 1.0, 0.5, 24);
    const pedMatB = new THREE.MeshStandardMaterial({ color: 0x221133, roughness: 0.3, metalness: 0.8 });
    const pedB = new THREE.Mesh(pedGeoB, pedMatB);
    pedB.position.set(0, 0.25, 0);
    pedB.castShadow = true;
    pedB.receiveShadow = true;
    sceneB.add(pedB);

    const crystalMatB = new THREE.MeshStandardMaterial({
      color: 0xff6600,
      emissive: 0x662200,
      emissiveIntensity: 0.6,
      roughness: 0.1,
      metalness: 0.9,
      transparent: true,
      opacity: 0.85
    });
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + 0.2;
      const r = 3.2;
      const crystal = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.18, 0),
        crystalMatB.clone()
      );
      crystal.position.set(Math.cos(angle) * r, 1.2 + Math.cos(i * 1.5) * 0.5, Math.sin(angle) * r);
      crystal.userData.baseY = crystal.position.y;
      crystal.userData.phase = i * 0.8;
      crystal.castShadow = true;
      sceneB.add(crystal);
    }

    for (let i = 0; i < 4; i++) {
      const angle = (i / 4) * Math.PI * 2 + Math.PI / 8;
      const pillarGeo = new THREE.CylinderGeometry(0.25, 0.3, 5, 8);
      const pillarMat = new THREE.MeshStandardMaterial({ color: 0x1a0d22, roughness: 0.7, metalness: 0.3 });
      const pillar = new THREE.Mesh(pillarGeo, pillarMat);
      pillar.position.set(Math.cos(angle) * 7, 2.5, Math.sin(angle) * 7);
      pillar.castShadow = true;
      pillar.receiveShadow = true;
      sceneB.add(pillar);

      const capGeo = new THREE.BoxGeometry(0.5, 0.1, 0.5);
      const capMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xaa3300, emissiveIntensity: 1.5 });
      const cap = new THREE.Mesh(capGeo, capMat);
      cap.position.set(Math.cos(angle) * 7, 5.05, Math.sin(angle) * 7);
      sceneB.add(cap);
    }

    // ─── Edge Ring Glow ──────────────────────────────────────────────────────
    function makeEdgeRing(color) {
      const group = new THREE.Group();
      const ringGeo = new THREE.TorusGeometry(1.08, 0.025, 8, 64);
      const ringMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      group.add(ring);

      const outerGeo = new THREE.TorusGeometry(1.15, 0.01, 8, 64);
      const outerMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.4 });
      const outer = new THREE.Mesh(outerGeo, outerMat);
      group.add(outer);

      return { group, ring, outer };
    }

    const edgeA = makeEdgeRing(0x00ccff);
    const edgeB = makeEdgeRing(0xff44cc);
    sceneA.add(edgeA.group);
    sceneB.add(edgeB.group);

    // ─── Controls ────────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 1.5;
    controls.maxDistance = 20;
    controls.maxPolarAngle = Math.PI * 0.85;
    controls.target.set(0, 1.0, 0);

    // ─── Teleport State ──────────────────────────────────────────────────────
    let activePortal = 'A';
    let portalRadius = 1.0;
    let prevCamPos = new THREE.Vector3();
    let lastTeleportTime = 0;

    const flash = document.getElementById('teleport-flash');

    function triggerFlash() {
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 200);
    }

    function teleport() {
      const now = performance.now();
      if (now - lastTeleportTime < 800) return;
      lastTeleportTime = now;

      triggerFlash();
      prevCamPos.copy(camera.position);

      if (activePortal === 'A') {
        activePortal = 'B';
        camera.position.set(prevCamPos.x, prevCamPos.y, prevCamPos.z);
        camera.position.multiplyScalar(0.5);
        camera.position.y = Math.max(1.0, camera.position.y);
        controls.target.copy(portalB.position);
      } else {
        activePortal = 'A';
        camera.position.set(prevCamPos.x, prevCamPos.y, prevCamPos.z);
        camera.position.multiplyScalar(2.0);
        camera.position.y = Math.max(1.0, camera.position.y);
        controls.target.copy(portalA.position);
      }
    }

    function checkTeleport() {
      const targetPos = activePortal === 'A' ? portalA.position : portalB.position;
      const dist = camera.position.distanceTo(targetPos);
      if (dist < portalRadius * 1.1) {
        teleport();
      }
    }

    // ─── Resize ──────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      rtA.setSize(w, h);
      rtB.setSize(w, h);
    });

    // ─── Animation Loop ─────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    let prevTime = 0;

    function render() {
      requestAnimationFrame(render);

      const elapsed = clock.getElapsedTime();
      const delta = elapsed - prevTime;
      prevTime = elapsed;

      // Update portal uniforms
      matA.uniforms.uTime.value = elapsed;
      matB.uniforms.uTime.value = elapsed;

      // Animate crystals
      sceneA.children.forEach(child => {
        if (child.userData.baseY !== undefined) {
          child.position.y = child.userData.baseY + Math.sin(elapsed * 1.2 + child.userData.phase) * 0.25;
          child.rotation.y = elapsed * 0.5 + child.userData.phase;
          child.rotation.x = Math.sin(elapsed * 0.7 + child.userData.phase) * 0.3;
        }
      });
      sceneB.children.forEach(child => {
        if (child.userData.baseY !== undefined) {
          child.position.y = child.userData.baseY + Math.cos(elapsed * 1.2 + child.userData.phase) * 0.25;
          child.rotation.y = -elapsed * 0.5 - child.userData.phase;
          child.rotation.z = Math.sin(elapsed * 0.7 + child.userData.phase) * 0.3;
        }
      });

      // Edge rings pulse
      const pulseA = 0.85 + 0.15 * Math.sin(elapsed * 2.5);
      const pulseB = 0.85 + 0.15 * Math.sin(elapsed * 2.5 + Math.PI);
      edgeA.ring.material.opacity = pulseA;
      edgeA.outer.material.opacity = pulseA * 0.4;
      edgeB.ring.material.opacity = pulseB;
      edgeB.outer.material.opacity = pulseB * 0.4;

      // ── Render Scene A → rtA ────────────────────────────────────────────────
      camera.near = 0.05;
      camera.far = 300;
      camera.updateProjectionMatrix();

      portalA.visible = false;
      edgeA.group.visible = false;
      camera.position.sub(prevCamPos);
      camera.updateMatrixWorld();

      renderer.setRenderTarget(rtA);
      renderer.clear();
      renderer.render(sceneA, camera);
      camera.position.add(prevCamPos);

      // ── Render Scene B → rtB ────────────────────────────────────────────────
      portalB.visible = false;
      edgeB.group.visible = false;

      renderer.setRenderTarget(rtB);
      renderer.clear();
      renderer.render(sceneB, camera);

      // Restore portals
      portalA.visible = true;
      portalB.visible = true;
      edgeA.group.visible = true;
      edgeB.group.visible = true;

      // Set scene textures
      matA.uniforms.tScene.value = rtB.texture;
      matB.uniforms.tScene.value = rtA.texture;

      // ── Final composite render ─────────────────────────────────────────────
      renderer.setRenderTarget(null);
      renderer.clear();

      // Show the scene we're "in"
      const activeScene = activePortal === 'A' ? sceneA : sceneB;
      renderer.render(activeScene, camera);

      // Draw portal spheres on top (they show the other scene)
      const matToShow = activePortal === 'A' ? matA : matB;
      const portalToShow = activePortal === 'A' ? portalA : portalB;
      const edgeToShow = activePortal === 'A' ? edgeA.group : edgeB.group;

      // Force update camera for portal rendering
      camera.updateMatrixWorld();

      renderer.autoClear = false;
      renderer.render(portalToShow, camera);
      renderer.autoClear = true;

      // Teleport check
      checkTeleport();
      controls.update();
    }

    render();
  </script>
</body>
</html>
