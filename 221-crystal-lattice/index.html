<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystal Lattice Vibration — Phonon Wave Propagation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050510; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    #title {
      position: absolute; top: 20px; left: 24px;
      color: rgba(180, 210, 255, 0.85); font-size: 13px;
      pointer-events: none; letter-spacing: 0.06em; line-height: 1.7;
    }
    #title h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
    #title p  { color: rgba(140, 180, 240, 0.55); font-size: 11px; margin-top: 3px; }
    #legend {
      position: absolute; bottom: 24px; left: 24px;
      color: rgba(180,210,255,0.7); font-size: 11px; line-height: 1.9;
      pointer-events: none;
    }
    #legend .bar {
      width: 120px; height: 8px; border-radius: 4px;
      background: linear-gradient(to right, #2244cc, #44aaff, #aaddff, #ffffff);
      margin: 4px 0 8px;
    }
  </style>
</head>
<body>

<div id="title">
  <h1>Crystal Lattice Vibration</h1>
  <p>Phonon wave propagation in a face-centered cubic (FCC) lattice</p>
  <p>Drag to orbit &nbsp;|&nbsp; Scroll to zoom</p>
</div>

<div id="legend">
  <div>Displacement amplitude</div>
  <div class="bar"></div>
  <div style="display:flex;justify-content:space-between;width:120px"><span>Low</span><span>High</span></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

/* ─────────────────────────────────────────────────────────────────────────────
   CRYSTAL LATTICE PHYSICS — HEADER COMMENT
   ─────────────────────────────────────────────────────────────────────────────
   Crystal lattices are periodic arrangements of atoms held together by
   interatomic forces. In a perfect crystal at finite temperature, atoms
   oscillate around their equilibrium positions due to thermal energy.

   These collective vibrational modes are called PHONONS — quasiparticles
   that behave like traveling waves propagating through the solid.

   Key physics:
   • Harmonic approximation: restoring force F = -k·u  (Hooke's law)
   • Wave equation: ∂²u/∂t² = (K/ρ) · ∇²u  →  v_sound = √(K/ρ)
   • Dispersion relation: ω = 2ω₀|sin(ka/2)|  (monoatomic chain)
   • Wave amplitude decays with distance (damping) and time
   • Color coding shows displacement magnitude — hotter colors = larger displacement

   This demo uses a face-centered cubic (FCC) lattice — the same structure
   as many metals (Al, Cu, Ni) and the high-symmetry basis for diamond cubic.

   The wave is excited at the center and radiates outward as a spherical
   longitudinal wave, with atoms oscillating along the radial direction.
   ───────────────────────────────────────────────────────────────────────────── */

const params = {
  latticeSize:   4,   // N×N×N unit cells per side
  waveAmplitude: 0.28, // max radial displacement (world units)
  waveFrequency: 1.8,  // oscillation frequency (Hz-like)
  damping:       0.6, // falloff exponent (higher = faster spatial decay)
  waveSpeed:     3.0,  // radial propagation speed of the wave front
  atomRadius:    0.14, // visual radius of each sphere
  pulseRate:     0.4,  // pulses per second at the source
};

/* ── Scene setup ── */
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.022);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(10, 7, 13);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 3;
controls.maxDistance = 40;
controls.target.set(0, 0, 0);

/* ── Lighting ── */
const ambient = new THREE.AmbientLight(0x112244, 2.5);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 3.5);
dirLight.position.set(8, 14, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

const rimLight = new THREE.PointLight(0x4477ff, 8, 30);
rimLight.position.set(-9, 5, -7);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0xff9966, 3, 20);
fillLight.position.set(6, -4, 6);
scene.add(fillLight);

/* ── Lattice generation (FCC) ──
   FCC basis vectors (a = lattice constant):
     v1 = (a/2, 0,   a/2)
     v2 = (a/2, a/2, 0  )
     v3 = (0,   a/2, a/2)
   Integer combinations (i,j,k) generate all FCC positions.
   Centered on origin. */
function buildFCCPositions(N) {
  const a = 2.0; // lattice constant
  const positions = [];
  const half = (N - 1) / 2;
  for (let i = 0; i < N; i++) {
    for (let j = 0; j < N; j++) {
      for (let k = 0; k < N; k++) {
        const x = (i - half) * a + (j - half) * a / 2 + (k - half) * a / 2;
        const y = (j - half) * a + (k - half) * a / 2;
        const z = (k - half) * a + (i - half) * a / 2 + (j - half) * a / 2;
        positions.push(x, y, z);
      }
    }
  }
  return positions;
}

let positions    = [];   // original equilibrium positions
let origPosAttr  = null;
let sphereGeom   = null;
let sphereMesh   = null;
let latticeCenter = new THREE.Vector3();

function buildLattice() {
  if (sphereMesh) {
    scene.remove(sphereMesh);
    sphereGeom.dispose();
  }

  const rawPos = buildFCCPositions(params.latticeSize);
  positions = new Float32Array(rawPos.length);
  positions.set(rawPos);
  const count = positions.length / 3;

  // Compute geometric center of the lattice
  let cx = 0, cy = 0, cz = 0;
  for (let i = 0; i < positions.length; i += 3) {
    cx += positions[i]; cy += positions[i+1]; cz += positions[i+2];
  }
  cx /= count; cy /= count; cz /= count;
  latticeCenter.set(cx, cy, cz);

  sphereGeom = new THREE.SphereGeometry(params.atomRadius, 16, 12);
  const instGeo = new THREE.InstancedBufferGeometry();
  instGeo.index = sphereGeom.index;
  instGeo.attributes.position = sphereGeom.attributes.position;
  instGeo.attributes.normal   = sphereGeom.attributes.normal;

  // Per-instance original positions (used in shader as equilibrium)
  origPosAttr = new THREE.InstancedBufferAttribute(positions.slice(), 3);
  instGeo.setAttribute('aOrigPos', origPosAttr);
  instGeo.instanceCount = count;

  // Per-instance color attribute
  const colorArr = new Float32Array(count * 3);
  const colorAttr = new THREE.InstancedBufferAttribute(colorArr, 3);
  instGeo.setAttribute('aDispColor', colorAttr);

  const mat = new THREE.MeshPhysicalMaterial({
    metalness:        0.85,
    roughness:        0.08,
    color:            0x88aaff,
    emissive:         0x001133,
    emissiveIntensity: 0.4,
    envMapIntensity:  1.5,
  });

  sphereMesh = new THREE.Mesh(instGeo, mat);
  sphereMesh.castShadow    = true;
  sphereMesh.receiveShadow = false;
  sphereMesh.frustumCulled = false;
  scene.add(sphereMesh);

  // Update instance matrices (identity)
  const dummy = new THREE.Object3D();
  for (let i = 0; i < count; i++) {
    dummy.position.set(positions[i*3], positions[i*3+1], positions[i*3+2]);
    dummy.updateMatrix();
    instGeo.setMatrixAt(i, dummy.matrix);
  }
  instGeo.instanceMatrix.needsUpdate = true;
}

buildLattice();

/* ── Background stars ── */
{
  const starCount = 800;
  const starPos   = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 120;
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x334466, size: 0.06 })));
}

/* ── Ground plane for shadows ── */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.MeshStandardMaterial({ color: 0x080818, roughness: 0.9, metalness: 0.1 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -5;
ground.receiveShadow = true;
scene.add(ground);

/* ── GUI ── */
const gui = new GUI({ title: 'Phonon Controls', width: 240 });
gui.domElement.style.position = 'absolute';
gui.domElement.style.top       = '20px';
gui.domElement.style.right      = '20px';

const folderLattice = gui.addFolder('Lattice');
folderLattice.add(params, 'latticeSize', 2, 7, 1).name('Lattice Size (N×N×N)').onChange(buildLattice);
folderLattice.add(params, 'atomRadius', 0.05, 0.3, 0.01).name('Atom Radius');

const folderWave = gui.addFolder('Wave');
folderWave.add(params, 'waveAmplitude', 0.05, 0.8, 0.01).name('Amplitude');
folderWave.add(params, 'waveFrequency', 0.2, 6.0, 0.1).name('Frequency');
folderWave.add(params, 'waveSpeed', 0.5, 8.0, 0.1).name('Propagation Speed');
folderWave.add(params, 'damping', 0.1, 2.0, 0.05).name('Spatial Damping');
folderWave.add(params, 'pulseRate', 0.1, 3.0, 0.05).name('Pulse Rate (Hz)');

/* ── Vertex shader (inline GLSL) ── */
const vertexShader = /* glsl */`
  precision highp float;

  attribute vec3 aOrigPos;
  attribute vec3 aDispColor;

  uniform float uTime;
  uniform float uAmplitude;
  uniform float uDamping;
  uniform vec3  uCenter;
  uniform float uWaveSpeed;

  varying vec3  vColor;
  varying float vDispMag;

  void main() {
    vec3  orig  = aOrigPos;
    vec3  toVec = orig - uCenter;
    float dist  = length(toVec);

    // Spherical wave: radial displacement from center
    // Wave phase: delayed by distance / waveSpeed
    float phase       = uTime * 6.28318530718 - (dist / uWaveSpeed);
    float wave         = sin(phase) * uAmplitude;
    float spatialDecay = exp(-uDamping * dist);
    float dispMag      = wave * spatialDecay;

    vec3 displaced = orig + normalize(toVec + 0.0001) * dispMag;

    // Color: cool blue (low) → cyan → white (high displacement)
    float t   = clamp(abs(wave) / max(uAmplitude, 0.001), 0.0, 1.0);
    vec3  lowC = vec3(0.10, 0.25, 0.80);
    vec3  midC = vec3(0.25, 0.80, 1.00);
    vec3  hiC  = vec3(1.00, 1.00, 1.00);
    vColor = t < 0.5
      ? mix(lowC, midC, t * 2.0)
      : mix(midC, hiC,  (t - 0.5) * 2.0);

    // Dim by spatial decay so far atoms are not glaringly bright
    vColor *= 0.35 + 0.65 * spatialDecay;

    vDispMag = abs(dispMag);

    gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
  }
`;

/* ── Fragment shader ── */
const fragmentShader = /* glsl */`
  precision highp float;

  varying vec3  vColor;
  varying float vDispMag;

  void main() {
    gl_FragColor = vec4(vColor, 1.0);
  }
`;

/* ── ShaderMaterial for the crystal ── */
const crystalMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:       { value: 0 },
    uAmplitude:  { value: params.waveAmplitude },
    uDamping:    { value: params.damping },
    uCenter:     { value: latticeCenter },
    uWaveSpeed:  { value: params.waveSpeed },
  },
  vertexShader,
  fragmentShader,
  side: THREE.FrontSide,
});

// Remove the old instanced mesh, add shader-based one
scene.remove(sphereMesh);
sphereMesh.geometry.deleteAttribute('color');
const crystalMesh = new THREE.Mesh(sphereMesh.geometry, crystalMat);
crystalMesh.frustumCulled = false;
scene.add(crystalMesh);

// Sync base positions into shader attribute
crystalMesh.geometry.getAttribute('aOrigPos').set(positions);
crystalMesh.geometry.getAttribute('aOrigPos').needsUpdate = true;

/* ── Helper: refresh lattice geometry on resize ── */
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);

/* ── GUI sync helpers ── */
function syncUniforms() {
  crystalMat.uniforms.uAmplitude.value = params.waveAmplitude;
  crystalMat.uniforms.uDamping.value  = params.damping;
  crystalMat.uniforms.uWaveSpeed.value= params.waveSpeed;
  crystalMat.uniforms.uCenter.value.copy(latticeCenter);
}
gui.onChange(syncUniforms);

/* ── Animation loop ── */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  // Advance time uniform
  crystalMat.uniforms.uTime.value = t * params.waveFrequency * params.pulseRate;

  // Pulse the source — slight breathing at the center
  const pulse = 1.0 + 0.04 * Math.sin(t * params.waveFrequency * params.pulseRate * Math.PI * 2);
  crystalMesh.scale.setScalar(pulse);

  // Slow camera auto-rotation for beauty
  camera.position.applyAxisAngle(new THREE.Vector3(0, 1, 0), 0.0003);

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
