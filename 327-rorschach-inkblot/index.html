<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rorschach Inkblot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #f5f0e8;
      font-family: 'Georgia', serif;
    }

    canvas { display: block; }

    #info {
      position: fixed;
      top: 20px;
      left: 24px;
      color: #2a2a2a;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.55;
      pointer-events: none;
      user-select: none;
    }

    #info span {
      display: block;
      font-size: 10px;
      margin-top: 3px;
      letter-spacing: 0.12em;
      color: #888;
    }
  </style>
</head>
<body>

  <div id="info">
    Rorschach Inkblot
    <span>Click to add ink splats &nbsp;·&nbsp; Drag to adjust</span>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    // ─────────────────────────────────────────────
    // Scene Setup
    // ─────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    // Orthographic camera covering normalized device coords [-1,1]
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    // ─────────────────────────────────────────────
    // Uniforms
    // ─────────────────────────────────────────────
    const uniforms = {
      uTime:          { value: 0.0 },
      uResolution:   { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      uSymmetry:     { value: 1.0 },   // 0 = no symmetry, 1 = full bilateral
      uBlobCount:    { value: 7.0 },
      uNoiseScale:   { value: 2.8 },
      uThreshold:    { value: 0.42 },  // ink amount (lower = more ink)
      uAnimSpeed:    { value: 0.18 },
      uInkColor:     { value: new THREE.Color(0x1a1a2e) },
      uBgColor:      { value: new THREE.Color(0xf5f0e8) },
      // Interactive splats: up to 10 slots (xy = position, z = age 0..1)
      uSplats:       { value: Array.from({ length: 10 }, () => new THREE.Vector4(0, 0, -1, 0)) },
      uSplatCount:   { value: 0.0 },
    };

    // ─────────────────────────────────────────────
    // Vertex Shader
    // ─────────────────────────────────────────────
    const vertexShader = /* glsl */ `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position.xy, 0.0, 1.0);
      }
    `;

    // ─────────────────────────────────────────────
    // Fragment Shader
    // ─────────────────────────────────────────────
    const fragmentShader = /* glsl */ `
      precision highp float;

      varying vec2 vUv;

      uniform float uTime;
      uniform vec2  uResolution;
      uniform float uSymmetry;
      uniform float uBlobCount;
      uniform float uNoiseScale;
      uniform float uThreshold;
      uniform float uAnimSpeed;
      uniform vec3  uInkColor;
      uniform vec3  uBgColor;
      uniform vec4  uSplats[10];   // xy=pos, z=age(-1=inactive), w=size
      uniform float uSplatCount;

      // ── Pseudo-random hash ──────────────────────
      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }

      // ── Smooth value noise ──────────────────────
      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        f = f * f * (3.0 - 2.0 * f);  // smoothstep
        float a = hash(i);
        float b = hash(i + vec2(1.0, 0.0));
        float c = hash(i + vec2(0.0, 1.0));
        float d = hash(i + vec2(1.0, 1.0));
        return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
      }

      // ── FBM (Fractal Brownian Motion) ───────────
      float fbm(vec2 p, int octaves) {
        float value = 0.0;
        float amplitude = 0.5;
        float frequency  = 1.0;
        float maxVal = 0.0;
        for (int i = 0; i < 6; i++) {
          if (i >= octaves) break;
          value   += amplitude * noise(p * frequency);
          maxVal  += amplitude;
          amplitude *= 0.5;
          frequency *= 2.1;
        }
        return value / maxVal;
      }

      // ── Radial blob SDF (smooth) ───────────────
      float blobSDF(vec2 p, float radius) {
        return length(p) - radius;
      }

      // ── Layered ink blobs ───────────────────────
      float inkField(vec2 p, float t) {
        float field = 0.0;

        for (float i = 0.0; i < 10.0; i++) {
          if (i >= uBlobCount) break;

          // Seed position per blob using hash
          float angle = hash(vec2(i, 0.0)) * 6.2832;
          float r     = 0.18 + hash(vec2(i, 1.0)) * 0.28;
          vec2  seed  = vec2(cos(angle), sin(angle)) * r;

          // Slow drift animation per blob
          float phase = hash(vec2(i, 2.0)) * 6.2832;
          vec2  drift = vec2(
            sin(t * uAnimSpeed * 0.7 + phase),
            cos(t * uAnimSpeed * 0.9 + phase)
          ) * 0.012 * uAnimSpeed;

          vec2  blobP = p - seed - drift;

          // Irregular blob shape via noise warp on the SDF
          float n = fbm(blobP * 6.0 + i * 1.7, 4) * 0.28;
          float d = blobSDF(blobP, 0.07 + n);

          // Smooth, soft contribution
          float contrib = smoothstep(0.12, -0.04, d);
          field += contrib * (0.55 + 0.45 * hash(vec2(i, 3.0)));
        }

        return field;
      }

      // ── Interactive splat contribution ──────────
      float splatField(vec2 p) {
        float field = 0.0;
        for (int i = 0; i < 10; i++) {
          if (i >= int(uSplatCount)) break;
          vec4 s = uSplats[i];
          if (s.z < 0.0) continue;  // inactive slot
          float d = length(p - s.xy);
          float r = 0.08 + s.w * 0.12;
          // Splats fade in quickly, then slowly dissolve
          float fade = min(1.0, s.z * 4.0) * max(0.0, 1.0 - s.z * 0.35);
          field += smoothstep(r, r * 0.2, d) * fade;
        }
        return field;
      }

      void main() {
        // Normalize to centered coords, aspect-corrected
        vec2 uv = vUv;
        float aspect = uResolution.x / uResolution.y;
        vec2 p = (uv - 0.5) * vec2(aspect, 1.0);

        float t = uTime;

        // ── Bilateral symmetry ────────────────────
        float sign = (uv.x < 0.5) ? -1.0 : 1.0;
        float symBlend = mix(1.0, sign, uSymmetry);
        vec2 symP = vec2((uv.x - 0.5) * symBlend + 0.5, uv.y);
        vec2 q = (symP - 0.5) * vec2(aspect, 1.0);

        // ── Procedural ink field ───────────────────
        float field = inkField(q, t);

        // ── Add interactive splats ────────────────
        float splats = splatField(q);
        field += splats;

        // ── Domain-warped texture detail ───────────
        float warp = fbm(q * 3.0 + t * 0.05 * uAnimSpeed, 3) * 0.15;
        field += warp;

        // ── Threshold / smooth edges ───────────────
        float ink = smoothstep(uThreshold + 0.06, uThreshold - 0.06, field);

        // ── Vignette (soft paper feel) ──────────────
        float vignette = 1.0 - length((uv - 0.5) * 1.3) * 0.25;
        vignette = clamp(vignette, 0.0, 1.0);

        // ── Compose color ───────────────────────────
        vec3 col = mix(uInkColor, uBgColor, ink);
        col *= vignette;

        // Slight warm paper tint at very light areas
        float paperGrain = noise(uv * 180.0 + t) * 0.018;
        col += vec3(paperGrain);

        gl_FragColor = vec4(col, 1.0);
      }
    `;

    // ─────────────────────────────────────────────
    // Full-screen Quad
    // ─────────────────────────────────────────────
    const material = new THREE.ShaderMaterial({
      uniforms,
      vertexShader,
      fragmentShader,
    });

    const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
    scene.add(quad);

    // ─────────────────────────────────────────────
    // GUI
    // ─────────────────────────────────────────────
    const gui = new GUI({ title: 'Rorschach Controls' });
    gui.domElement.style.fontFamily = 'Georgia, serif';

    const params = {
      symmetry:    1.0,
      blobCount:   7,
      noiseScale:  2.8,
      threshold:   0.42,
      animSpeed:   0.18,
      inkColor:    '#1a1a2e',
      bgColor:     '#f5f0e8',
    };

    gui.add(params, 'symmetry',   0.0, 1.0, 0.01).name('Symmetry').onChange(v => uniforms.uSymmetry.value = v);
    gui.add(params, 'blobCount',  1.0, 12.0, 1.0).name('Blob Count').onChange(v => uniforms.uBlobCount.value = v);
    gui.add(params, 'noiseScale',0.5, 6.0, 0.1).name('Noise Scale').onChange(v => uniforms.uNoiseScale.value = v);
    gui.add(params, 'threshold',  0.1, 0.8, 0.01).name('Ink Amount').onChange(v => uniforms.uThreshold.value = v);
    gui.add(params, 'animSpeed', 0.0, 1.0, 0.01).name('Animation Speed').onChange(v => uniforms.uAnimSpeed.value = v);
    gui.addColor(params, 'inkColor').name('Ink Color').onChange(v => uniforms.uInkColor.value.set(v));
    gui.addColor(params, 'bgColor').name('Background').onChange(v => uniforms.uBgColor.value.set(v));

    // ─────────────────────────────────────────────
    // Interactive Splats (mouse click)
    // ─────────────────────────────────────────────
    let splatIndex = 0;

    function addSplat(clientX, clientY) {
      const x = clientX / window.innerWidth;
      const y = 1.0 - clientY / window.innerHeight;  // flip Y for UV

      // aspect-correct position
      const aspect = window.innerWidth / window.innerHeight;
      const px = (x - 0.5) * aspect;
      const py = y - 0.5;

      const idx = splatIndex % 10;
      uniforms.uSplats.value[idx].set(px, py, 0.0, Math.random() * 0.8 + 0.2);
      splatIndex++;
      uniforms.uSplatCount.value = Math.min(splatIndex, 10);
    }

    window.addEventListener('click', e => {
      addSplat(e.clientX, e.clientY);
    });

    // ─────────────────────────────────────────────
    // Resize Handler
    // ─────────────────────────────────────────────
    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
    });

    // ─────────────────────────────────────────────
    // Animation Loop
    // ─────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      uniforms.uTime.value = elapsed;

      // Age splats each frame (units are in seconds via clock)
      for (let i = 0; i < 10; i++) {
        const s = uniforms.uSplats.value[i];
        if (s.z >= 0.0) {
          s.z += 0.004;  // slow fade in + dissolve
        }
      }

      renderer.render(scene, camera);
    }

    animate();
  </script>

</body>
</html>
