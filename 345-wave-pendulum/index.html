<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wave Pendulum</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #05050a; }
    canvas { display: block; }
  </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

// ── Config ──────────────────────────────────────────────────────────────────
const params = {
  pendulumCount: 20,
  gravity: 9.81,
  damping: 0.000,
  bobSize: 0.14,
  trailLength: 180,
  initialAngle: Math.PI / 4,
  baseLength: 5.5,
  lengthSpread: 1.8,
  showRods: true,
  showGrid: true,
};

// ── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05050a);
scene.fog = new THREE.FogExp2(0x05050a, 0.018);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 300);
camera.position.set(0, 2, 22);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 3, 0);

// ── Lighting ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x334466, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(8, 20, 10);
scene.add(dirLight);
const rimLight = new THREE.PointLight(0x4488ff, 1.5, 60);
rimLight.position.set(-12, 15, -8);
scene.add(rimLight);
const warmLight = new THREE.PointLight(0xff8844, 0.6, 40);
warmLight.position.set(12, 8, 5);
scene.add(warmLight);

// ── Grid floor ──────────────────────────────────────────────────────────────
let gridHelper;
function makeGrid() {
  if (gridHelper) scene.remove(gridHelper);
  gridHelper = new THREE.GridHelper(60, 40, 0x112233, 0x0a1520);
  gridHelper.position.y = -0.01;
  scene.add(gridHelper);
}
makeGrid();

// ── Pendulum helpers ────────────────────────────────────────────────────────
const colorA = new THREE.Color(0x1a5fff); // slow  – blue
const colorB = new THREE.Color(0xff3311); // fast  – red

function velColor(omega, maxOmega) {
  const t = Math.min(Math.abs(omega) / (maxOmega || 0.001), 1.0);
  return colorA.clone().lerp(colorB, t);
}

// ── Pendulum class ──────────────────────────────────────────────────────────
class Pendulum {
  constructor(length, initialAngle, idx, total) {
    this.length = length;
    this.angle  = initialAngle;
    this.omega  = 0; // angular velocity
    this.g      = params.gravity;
    this.damp   = params.damping;

    // Pivot (evenly spaced along X)
    const xSpacing = total > 1 ? 14 / (total - 1) : 0;
    this.pivotX = (idx - (total - 1) / 2) * xSpacing;
    this.pivotY = 9.5;

    // ── Rod
    const rodGeo = new THREE.CylinderGeometry(0.025, 0.025, this.length, 8);
    rodGeo.translate(0, -this.length / 2, 0); // pivot at top
    const rodMat = new THREE.MeshPhongMaterial({ color: 0x8899bb, emissive: 0x112233 });
    this.rod = new THREE.Mesh(rodGeo, rodMat);
    this.rod.position.set(this.pivotX, this.pivotY, 0);

    // ── Bob
    const bobGeo = new THREE.SphereGeometry(params.bobSize, 24, 16);
    const bobMat = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x223344, shininess: 90 });
    this.bob = new THREE.Mesh(bobGeo, bobMat);
    this._updateBobPosition();

    // ── Pivot marker
    const pivGeo = new THREE.SphereGeometry(0.07, 12, 8);
    const pivMat = new THREE.MeshPhongMaterial({ color: 0x556688, emissive: 0x112233 });
    this.pivot = new THREE.Mesh(pivGeo, pivMat);
    this.pivot.position.set(this.pivotX, this.pivotY, 0);

    // ── Trail (line segments)
    const trailSize = Math.max(params.trailLength, 2);
    const trailPos  = new Float32Array(trailSize * 3);
    const trailCol  = new Float32Array(trailSize * 3);
    const trailGeo  = new THREE.BufferGeometry();
    trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
    trailGeo.setAttribute('color',    new THREE.BufferAttribute(trailCol, 3));
    trailGeo.setDrawRange(0, 0);
    const trailMat  = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.7 });
    this.trailLine  = new THREE.Line(trailGeo, trailMat);
    this.trailPosArr = trailPos;
    this.trailColArr = trailCol;
    this.trailSize   = trailSize;
    this.trailCount  = 0;

    // State for averaging angular velocity
    this._prevAngle = initialAngle;
    this._avgOmega  = 0;
    this._omegaSamples = [];
  }

  _updateBobPosition() {
    const x = this.pivotX + this.length * Math.sin(this.angle);
    const y = this.pivotY - this.length * Math.cos(this.angle);
    this.bob.position.set(x, y, 0);

    // Rod rotation (around Z axis)
    this.rod.rotation.z = this.angle;

    // Bob color by current angular velocity
    this.bob.material.color.copy(velColor(this.omega, this._maxOmega));
    this.bob.material.emissive.copy(velColor(this.omega, this._maxOmega).multiplyScalar(0.25));
  }

  update(dt, maxOmega) {
    // Small-angle pendulum equation: θ¨ = -(g/L)·sin(θ) - damping·θ̇
    const alpha = -(this.g / this.length) * Math.sin(this.angle) - this.damp * this.omega;
    this.omega += alpha * dt;
    this.angle += this.omega * dt;

    // Running average of |omega| for color scaling
    this._omegaSamples.push(Math.abs(this.omega));
    if (this._omegaSamples.length > 20) this._omegaSamples.shift();
    this._avgOmega = this._omegaSamples.reduce((a, b) => a + b, 0) / Math.max(this._omegaSamples.length, 1);
    this._maxOmega = maxOmega;

    this._updateBobPosition();
    this._updateTrail();
  }

  _updateTrail() {
    if (this.trailCount === 0) {
      // Seed trail with current position
      for (let i = 0; i < this.trailSize; i++) {
        const p = this.bob.position;
        this.trailPosArr[i * 3]     = p.x;
        this.trailPosArr[i * 3 + 1] = p.y;
        this.trailPosArr[i * 3 + 2] = p.z;
        const c = velColor(this.omega, this._maxOmega);
        this.trailColArr[i * 3]     = c.r;
        this.trailColArr[i * 3 + 1] = c.g;
        this.trailColArr[i * 3 + 2] = c.b;
      }
      this.trailCount = this.trailSize;
    }

    // Shift positions (older = more transparent via color)
    for (let i = this.trailSize - 1; i > 0; i--) {
      this.trailPosArr[i * 3]     = this.trailPosArr[(i - 1) * 3];
      this.trailPosArr[i * 3 + 1] = this.trailPosArr[(i - 1) * 3 + 1];
      this.trailPosArr[i * 3 + 2] = this.trailPosArr[(i - 1) * 3 + 2];
      this.trailColArr[i * 3]     = this.trailColArr[(i - 1) * 3];
      this.trailColArr[i * 3 + 1] = this.trailColArr[(i - 1) * 3 + 1];
      this.trailColArr[i * 3 + 2] = this.trailColArr[(i - 1) * 3 + 2];
    }

    // Newest
    const p = this.bob.position;
    this.trailPosArr[0] = p.x;
    this.trailPosArr[1] = p.y;
    this.trailPosArr[2] = p.z;
    const c = velColor(this.omega, this._maxOmega);
    this.trailColArr[0] = c.r;
    this.trailColArr[1] = c.g;
    this.trailColArr[2] = c.b;

    const geo = this.trailLine.geometry;
    geo.attributes.position.needsUpdate = true;
    geo.attributes.color.needsUpdate    = true;
    geo.setDrawRange(0, Math.min(this.trailCount, this.trailSize));
  }

  setVisible(rod, grid) {
    this.rod.visible   = rod;
    this.bob.visible   = true;
    this.pivot.visible = true;
    this.trailLine.visible = true;
  }

  dispose() {
    this.rod.geometry.dispose();
    this.bob.geometry.dispose();
    this.pivot.geometry.dispose();
    this.trailLine.geometry.dispose();
  }
}

// ── Build pendulums ─────────────────────────────────────────────────────────
window.pendulums = [];

function buildPendulums() {
  // Dispose old
  window.pendulums.forEach(p => {
    p.dispose();
    scene.remove(p.rod, p.bob, p.pivot, p.trailLine);
  });
  window.pendulums = [];

  for (let i = 0; i < params.pendulumCount; i++) {
    // Slightly different lengths → slightly different periods
    const t  = params.pendulumCount > 1 ? i / (params.pendulumCount - 1) : 0.5;
    const L  = params.baseLength + (t - 0.5) * params.lengthSpread;
    const p  = new Pendulum(L, params.initialAngle, i, params.pendulumCount);
    scene.add(p.rod, p.bob, p.pivot, p.trailLine);
    p.setVisible(params.showRods, params.showGrid);
    window.pendulums.push(p);
  }
}

buildPendulums();

// ── GUI ─────────────────────────────────────────────────────────────────────
const gui = new GUI();
gui.add(params, 'pendulumCount', 2, 50, 1).name('Pendulums').onFinishChange(buildPendulums);
gui.add(params, 'gravity', 1, 20, 0.01).name('Gravity');
gui.add(params, 'damping', 0, 0.08, 0.0005).name('Damping');
gui.add(params, 'bobSize', 0.05, 0.4, 0.01).name('Bob Size').onFinishChange(() => {
  const r = params.bobSize;
  window.pendulums.forEach(p => p.bob.scale.setScalar(r / 0.14));
});
gui.add(params, 'trailLength', 20, 400, 1).name('Trail Length').onFinishChange(buildPendulums);
gui.add(params, 'showRods').name('Show Rods').onFinishChange(v => {
  window.pendulums.forEach(p => p.rod.visible = v);
});
gui.add(params, 'showGrid').name('Show Grid').onFinishChange(v => {
  if (gridHelper) gridHelper.visible = v;
});

// ── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Animation loop ───────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let globalMaxOmega = 0.001;

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.033);

  // Sync gravity to params
  window.pendulums.forEach(p => { p.g = params.gravity; p.damp = params.damping; });

  // Find global max |omega| for color scaling
  globalMaxOmega = 0.001;
  window.pendulums.forEach(p => {
    if (p._avgOmega > globalMaxOmega) globalMaxOmega = p._avgOmega;
  });

  window.pendulums.forEach(p => p.update(dt, globalMaxOmega));

  // Subtle camera sway for mesmerising effect
  const t = clock.elapsedTime * 0.08;
  camera.position.x += (Math.sin(t) * 0.5 - camera.position.x) * 0.002;
  camera.position.y += (2 + Math.cos(t * 0.7) * 0.3 - camera.position.y) * 0.002;

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
