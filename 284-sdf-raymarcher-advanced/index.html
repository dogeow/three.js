<!--
  Three.js Example #284: Advanced SDF Ray Marching
  Features: Multiple SDF primitives, smooth union/subtraction, ambient occlusion,
  soft shadows, 3 preset morphing scenes, lil-gui controls
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced SDF Ray Marching</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.esm.min.js"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import GUI from 'lil-gui';

// ============ Shader Code ============

const vertexShader = `
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position, 1.0);
}
`;

const fragmentShader = `
precision highp float;

uniform float uTime;
uniform vec2 uResolution;
uniform float uCameraRadius;
uniform float uCameraTheta;
uniform float uCameraPhi;
uniform int uScene;
uniform float uShadowSoftness;
uniform int uAOIterations;
uniform float uAnimSpeed;
uniform int uColorScheme;

varying vec2 vUv;

#define MAX_STEPS 128
#define MAX_DIST 50.0
#define SURF_DIST 0.001
#define PI 3.14159265359

// ============ SDF Primitives ============

float sdSphere(vec3 p, float r) {
  return length(p) - r;
}

float sdBox(vec3 p, vec3 b) {
  vec3 q = abs(p) - b;
  return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0);
}

float sdTorus(vec3 p, vec2 t) {
  vec2 q = vec2(length(p.xz) - t.x, p.y);
  return length(q) - t.y;
}

float sdCapsule(vec3 p, vec3 a, vec3 b, float r) {
  vec3 pa = p - a, ba = b - a;
  float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
  return length(pa - ba * h) - r;
}

float sdRoundBox(vec3 p, vec3 b, float r) {
  vec3 q = abs(p) - b;
  return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0) - r;
}

float sdOctahedron(vec3 p, float s) {
  p = abs(p);
  return (p.x + p.y + p.z - s) * 0.57735027;
}

// ============ SDF Operations ============

float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
  return mix(b, a, h) - k * h * (1.0 - h);
}

float smax(float a, float b, float k) {
  return -smin(-a, -b, k);
}

// ============ Scene Definitions ============

float sceneMorphingBlob(vec3 p, float t) {
  float d = sdSphere(p - vec3(sin(t * 1.1) * 0.4, cos(t * 0.9) * 0.3, sin(t * 0.7) * 0.4), 0.5);
  d = smin(d, sdSphere(p - vec3(cos(t * 0.8) * 0.4, sin(t * 1.2) * 0.3, cos(t * 1.1) * 0.4), 0.45), 0.3);
  d = smin(d, sdSphere(p - vec3(sin(t * 1.3) * 0.3, cos(t * 0.7) * 0.4, sin(t * 0.9) * 0.3), 0.4), 0.3);
  d = smin(d, sdSphere(p - vec3(cos(t * 0.6) * 0.35, sin(t * 1.0) * 0.35, cos(t * 1.2) * 0.35), 0.42), 0.3);
  d = smin(d, sdSphere(p - vec3(sin(t * 0.9) * 0.25, sin(t * 1.4) * 0.25, cos(t * 0.8) * 0.25), 0.35), 0.3);
  return d;
}

float sceneRoundedCubeWithHoles(vec3 p, float t) {
  float cube = sdRoundBox(p, vec3(0.7), 0.1);
  float hole1 = sdSphere(p - vec3(0, 0, 0), 0.4 + sin(t) * 0.05);
  float hole2 = sdSphere(p - vec3(0.5, 0, 0), 0.25);
  float hole3 = sdSphere(p - vec3(-0.5, 0, 0), 0.25);
  float hole4 = sdSphere(p - vec3(0, 0.5, 0), 0.25);
  float hole5 = sdSphere(p - vec3(0, -0.5, 0), 0.25);
  float holes = min(min(min(hole1, hole2), min(hole3, hole4)), hole5);
  return smax(cube, -holes, 0.15);
}

float sceneTorusKnot(vec3 p, float t) {
  float twist = sin(t) * 0.5;
  vec3 q = p;
  float angle = atan(q.z, q.x);
  float c = cos(angle * 3.0 + twist);
  float s = sin(angle * 2.0 + t * 0.5);
  q.yz = mat2(c, -s, s, c) * q.yz;
  float torus = sdTorus(q, vec2(0.6, 0.2));
  float secondTorus = sdTorus(vec3(q.x, q.y - 0.3 * sin(angle * 2.0 + t), q.z), vec2(0.4, 0.15));
  return smin(torus, secondTorus, 0.2);
}

float mapScene(vec3 p) {
  float t = uTime * uAnimSpeed;
  if (uScene == 0) return sceneMorphingBlob(p, t);
  if (uScene == 1) return sceneRoundedCubeWithHoles(p, t);
  return sceneTorusKnot(p, t);
}

// ============ Normals & Lighting ============

vec3 getNormal(vec3 p) {
  vec2 e = vec2(0.001, 0.0);
  return normalize(vec3(
    mapScene(p + e.xyy) - mapScene(p - e.xyy),
    mapScene(p + e.yxy) - mapScene(p - e.yxy),
    mapScene(p + e.yyx) - mapScene(p - e.yyx)
  ));
}

float calcAO(vec3 pos, vec3 nor) {
  float occ = 0.0;
  float sca = 1.0;
  for (int i = 0; i < 12; i++) {
    if (i >= uAOIterations) break;
    float h = 0.01 + 0.12 * float(i) / 4.0;
    float d = mapScene(pos + h * nor);
    occ += (h - d) * sca;
    sca *= 0.95;
  }
  return clamp(1.0 - 3.0 * occ, 0.0, 1.0);
}

float softShadow(vec3 ro, vec3 rd, float mint, float maxt, float k) {
  float res = 1.0;
  float t = mint;
  for (int i = 0; i < 32; i++) {
    if (i >= 16) break;
    float h = mapScene(ro + rd * t);
    res = min(res, k * h / t);
    t += clamp(h, 0.02, 0.2);
    if (res < 0.001 || t > maxt) break;
  }
  return clamp(res, 0.0, 1.0);
}

// ============ Color Schemes ============

vec3 getColor(vec3 p, vec3 n, float ao, float sha) {
  vec3 col;
  if (uColorScheme == 0) {
    // Warm sunset
    col = mix(vec3(0.8, 0.3, 0.1), vec3(1.0, 0.7, 0.3), p.y * 0.5 + 0.5);
    col = mix(col, vec3(0.2, 0.1, 0.3), -p.y * 0.3 + 0.5);
  } else if (uColorScheme == 1) {
    // Cool cyan-magenta
    col = mix(vec3(0.1, 0.5, 0.8), vec3(0.8, 0.2, 0.6), sin(p.x * 2.0 + uTime) * 0.5 + 0.5);
    col = mix(col, vec3(0.0, 0.3, 0.4), p.z * 0.3 + 0.5);
  } else {
    // Electric green-blue
    col = mix(vec3(0.1, 0.8, 0.4), vec3(0.2, 0.4, 0.9), length(p) * 0.4);
    col = mix(col, vec3(0.05, 0.1, 0.15), 1.0 - length(p) * 0.2);
  }
  return col * (0.3 + 0.4 * sha) * (0.5 + 0.5 * ao);
}

// ============ Raymarching ============

float raymarch(vec3 ro, vec3 rd) {
  float t = 0.0;
  for (int i = 0; i < MAX_STEPS; i++) {
    vec3 p = ro + rd * t;
    float d = mapScene(p);
    if (d < SURF_DIST) return t;
    if (t > MAX_DIST) break;
    t += d * 0.8;
  }
  return -1.0;
}

vec3 render(vec3 ro, vec3 rd) {
  vec3 lightDir = normalize(vec3(1.0, 2.0, 1.5));
  
  float t = raymarch(ro, rd);
  
  if (t < 0.0) {
    // Background gradient
    float grad = rd.y * 0.5 + 0.5;
    if (uColorScheme == 0) return mix(vec3(0.1, 0.05, 0.15), vec3(0.3, 0.15, 0.2), grad);
    if (uColorScheme == 1) return mix(vec3(0.0, 0.05, 0.1), vec3(0.1, 0.0, 0.15), grad);
    return mix(vec3(0.02, 0.05, 0.08), vec3(0.0, 0.02, 0.05), grad);
  }
  
  vec3 p = ro + rd * t;
  vec3 n = getNormal(p);
  
  float ao = calcAO(p, n);
  float sha = softShadow(p + n * 0.01, lightDir, 0.02, 5.0, 8.0 / uShadowSoftness);
  
  vec3 col = getColor(p, n, ao, sha);
  
  // Add fresnel rim
  float fresnel = pow(1.0 - max(dot(n, -rd), 0.0), 3.0);
  if (uColorScheme == 0) col += vec3(0.4, 0.2, 0.1) * fresnel;
  else if (uColorScheme == 1) col += vec3(0.3, 0.1, 0.4) * fresnel;
  else col += vec3(0.1, 0.4, 0.2) * fresnel;
  
  return col;
}

// ============ Main ============

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * uResolution) / uResolution.y;
  
  // Camera setup
  float theta = uCameraTheta;
  float phi = uCameraPhi;
  float radius = uCameraRadius;
  
  vec3 target = vec3(0.0);
  vec3 ro = target + vec3(
    radius * sin(phi) * cos(theta),
    radius * cos(phi),
    radius * sin(phi) * sin(theta)
  );
  
  vec3 forward = normalize(target - ro);
  vec3 right = normalize(cross(forward, vec3(0.0, 1.0, 0.0)));
  vec3 up = cross(right, forward);
  
  vec3 rd = normalize(uv.x * right + uv.y * up + 1.5 * forward);
  
  vec3 col = render(ro, rd);
  
  // Tone mapping & gamma
  col = col / (col + vec3(1.0));
  col = pow(col, vec3(0.4545));
  
  gl_FragColor = vec4(col, 1.0);
}
`;

// ============ Three.js Setup ============

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

// Fullscreen quad
const geometry = new THREE.PlaneGeometry(2, 2);

const uniforms = {
  uTime: { value: 0 },
  uResolution: { value: new THREE.Vector2() },
  uCameraRadius: { value: 3.0 },
  uCameraTheta: { value: 0.5 },
  uCameraPhi: { value: 1.0 },
  uScene: { value: 0 },
  uShadowSoftness: { value: 1.0 },
  uAOIterations: { value: 5 },
  uAnimSpeed: { value: 1.0 },
  uColorScheme: { value: 0 }
};

const material = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// ============ GUI ============

const params = {
  scene: 0,
  shadowSoftness: 1.0,
  aoIterations: 5,
  animSpeed: 1.0,
  colorScheme: 0
};

const gui = new GUI();
gui.add(params, 'scene', { 'Morphing Blob': 0, 'Rounded Cube with Holes': 1, 'Torus Knot': 2 }).name('Scene').onChange(v => {
  uniforms.uScene.value = v;
});
gui.add(params, 'shadowSoftness', 0.1, 3.0).name('Shadow Softness').onChange(v => {
  uniforms.uShadowSoftness.value = v;
});
gui.add(params, 'aoIterations', 1, 12).step(1).name('AO Iterations').onChange(v => {
  uniforms.uAOIterations.value = v;
});
gui.add(params, 'animSpeed', 0.1, 3.0).name('Anim Speed').onChange(v => {
  uniforms.uAnimSpeed.value = v;
});
gui.add(params, 'colorScheme', { 'Warm Sunset': 0, 'Cyan-Magenta': 1, 'Electric Green': 2 }).name('Color Scheme').onChange(v => {
  uniforms.uColorScheme.value = v;
});

// ============ Mouse Orbit ============

let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let cameraTheta = 0.5;
let cameraPhi = 1.0;
const cameraRadius = 3.0;

renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  cameraTheta += dx * 0.005;
  cameraPhi = Math.max(0.1, Math.min(Math.PI - 0.1, cameraPhi + dy * 0.005));
  prevMouse = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mouseup', () => {
  isDragging = false;
});

renderer.domElement.addEventListener('mouseleave', () => {
  isDragging = false;
});

// Touch support
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
});

renderer.domElement.addEventListener('touchmove', (e) => {
  if (!isDragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - prevMouse.x;
  const dy = e.touches[0].clientY - prevMouse.y;
  cameraTheta += dx * 0.005;
  cameraPhi = Math.max(0.1, Math.min(Math.PI - 0.1, cameraPhi + dy * 0.005));
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});

renderer.domElement.addEventListener('touchend', () => {
  isDragging = false;
});

// ============ Resize ============

function onResize() {
  const width = window.innerWidth;
  const height = window.innerHeight;
  renderer.setSize(width, height);
  uniforms.uResolution.value.set(width * renderer.getPixelRatio(), height * renderer.getPixelRatio());
}

window.addEventListener('resize', onResize);
onResize();

// ============ Animation Loop ============

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  uniforms.uTime.value = clock.getElapsedTime();
  uniforms.uCameraTheta.value = cameraTheta;
  uniforms.uCameraPhi.value = cameraPhi;
  uniforms.uCameraRadius.value = cameraRadius;
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
