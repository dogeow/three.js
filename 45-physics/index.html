<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>15 · 物理引擎 cannon-es</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1d24; cursor: pointer; }
  canvas { display: block; }
  .tip {
    position: fixed; top: 12px; left: 12px;
    color: #fff; font: 14px/1.6 -apple-system, sans-serif;
    background: rgba(0,0,0,.5); padding: 8px 12px; border-radius: 6px;
  }
</style>
</head>
<body>
<div class="tip">
  <b>技术点：Three.js + cannon-es 物理引擎</b><br>
  · <b>点击画面</b>发射一个小球<br>
  · 每帧让物理世界 step，再把结果同步给可视网格
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import * as CANNON from 'cannon-es'

// ============ Three.js：负责「看起来」 ============
const scene = new THREE.Scene()
scene.background = new THREE.Color(0x1a1d24)
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 200)
camera.position.set(8, 8, 15)

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
renderer.shadowMap.enabled = true
document.body.appendChild(renderer.domElement)

const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping = true
controls.target.set(0, 2, 0)

scene.add(new THREE.AmbientLight(0xffffff, 0.4))
const dir = new THREE.DirectionalLight(0xffffff, 1)
dir.position.set(10, 20, 10)
dir.castShadow = true
dir.shadow.mapSize.set(2048, 2048)
dir.shadow.camera.left = -15
dir.shadow.camera.right = 15
dir.shadow.camera.top = 15
dir.shadow.camera.bottom = -15
scene.add(dir)

// ============ Cannon：负责「动起来」 ============
const world = new CANNON.World({
  gravity: new CANNON.Vec3(0, -9.82, 0) // 地心引力
})
// 让静止物体真的静止下来
world.allowSleep = true

// ====== 地面（物理 + 视觉） ======
// 物理：质量 0 = 静态物体（不会动）
const groundBody = new CANNON.Body({
  mass: 0,
  shape: new CANNON.Plane()
})
groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0) // 平面默认朝 Z，转到朝上
world.addBody(groundBody)

// 视觉
const groundMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.MeshStandardMaterial({ color: 0x4a5568 })
)
groundMesh.rotation.x = -Math.PI / 2
groundMesh.receiveShadow = true
scene.add(groundMesh)

// ====== 堆一座积木塔 ======
// 同时创建物理体和视觉网格，成对放进 objects 数组，每帧同步
const objects = []

function syncObject(mesh, body) {
  objects.push({ mesh, body })
  scene.add(mesh)
  world.addBody(body)
}

function createBox(pos, size, color) {
  const half = size.map(v => v / 2)
  const body = new CANNON.Body({
    mass: 1,
    shape: new CANNON.Box(new CANNON.Vec3(...half)),
    position: new CANNON.Vec3(...pos)
  })
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(...size),
    new THREE.MeshStandardMaterial({ color })
  )
  mesh.castShadow = true
  mesh.receiveShadow = true
  syncObject(mesh, body)
}

// 7 层塔
for (let layer = 0; layer < 7; layer++) {
  const y = 0.5 + layer * 1.05
  const rotate = layer % 2 === 0
  for (let i = 0; i < 3; i++) {
    const offset = (i - 1) * 1.05
    const pos = rotate ? [offset, y, 0] : [0, y, offset]
    const size = rotate ? [1, 1, 3] : [3, 1, 1]
    createBox(pos, size, new THREE.Color().setHSL(layer / 7, 0.6, 0.5).getHex())
  }
}

// ====== 点击发射小球砸过去 ======
addEventListener('pointerdown', (e) => {
  if (e.target !== renderer.domElement) return

  const body = new CANNON.Body({
    mass: 3,
    shape: new CANNON.Sphere(0.4),
    position: new CANNON.Vec3(camera.position.x, camera.position.y, camera.position.z)
  })
  // 朝相机看向的方向发射
  const dir = new THREE.Vector3()
  camera.getWorldDirection(dir).multiplyScalar(25)
  body.velocity.set(dir.x, dir.y, dir.z)

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 24, 24),
    new THREE.MeshStandardMaterial({ color: 0xffa500, metalness: 0.4, roughness: 0.3 })
  )
  mesh.castShadow = true
  syncObject(mesh, body)
})

// ============ 渲染循环 ============
const clock = new THREE.Clock()
function animate() {
  requestAnimationFrame(animate)
  const dt = clock.getDelta()

  // 1) 推进物理世界（固定步长，maxSubSteps 防卡顿跳帧）
  world.step(1 / 60, dt, 3)

  // 2) 把每个 body 的位置/旋转拷到对应 mesh 上
  for (const { mesh, body } of objects) {
    mesh.position.copy(body.position)
    mesh.quaternion.copy(body.quaternion)
  }

  controls.update()
  renderer.render(scene, camera)
}
animate()

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})
</script>
</body>
</html>
