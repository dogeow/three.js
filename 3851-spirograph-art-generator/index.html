<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Spirograph Art Generator</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#050510;font-family:monospace}
canvas{display:block}
#panel{position:fixed;top:14px;left:14px;color:#eee;font-size:12px;background:rgba(0,0,0,0.85);padding:12px 16px;border-radius:6px;line-height:2;min-width:200px;border:1px solid rgba(255,255,255,0.08)}
#hint{position:fixed;bottom:14px;left:14px;color:rgba(255,255,255,0.4);font-size:12px}
</style>
</head>
<body>
<div id="panel">
  <b style="color:#fff">Spirograph Art</b><br>
  R: <span id="r">7</span> r: <span id="rp">3</span> d: <span id="d">5</span><br>
  <input id="sR" type="range" min="2" max="20" step="0.5" value="7" style="width:120px">
  <input id="sRp" type="range" min="1" max="15" step="0.5" value="3" style="width:120px">
  <input id="sD" type="range" min="1" max="20" step="0.5" value="5" style="width:120px">
  <br><button id="newBtn" style="margin-top:6px;padding:4px 14px;cursor:pointer">New Pattern</button>
  <br><label style="cursor:pointer"><input type="checkbox" id="trail" checked> Trail</label>
  <label style="margin-left:10px"><input type="checkbox" id="bloom" checked> Bloom</label>
</div>
<div id="hint">Spirograph curves — hypotrochoid patterns | Adjust R, r, d | Space to reset</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 500);
camera.position.set(0, 0, 20);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.4, 0.5, 0.6);
composer.addPass(bloom);

// Trail canvas
const CW = 1024, CH = 1024;
const trailCanvas = document.createElement('canvas');
trailCanvas.width = CW; trailCanvas.height = CH;
const tctx = trailCanvas.getContext('2d');
tctx.fillStyle = '#050510';
tctx.fillRect(0, 0, CW, CH);
const trailTex = new THREE.CanvasTexture(trailCanvas);

// Display plane
const planeGeo = new THREE.PlaneGeometry(16, 16);
const planeMat = new THREE.MeshBasicMaterial({ map: trailTex });
const plane = new THREE.Mesh(planeGeo, planeMat);
plane.position.z = -0.1;
scene.add(plane);

// Center marker
const dotGeo = new THREE.SphereGeometry(0.08, 12, 12);
const dotMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const dot = new THREE.Mesh(dotGeo, dotMat);
scene.add(dot);

// Spirograph params
let R = 7, r = 3, d = 5;
let t = 0;
let drawing = false;
let lastX = 0, lastY = 0;
const MAX_T = Math.PI * 2 * 60; // extended for complete patterns
const STEP = 0.02;
const hues = [0, 30, 60, 120, 180, 210, 270, 300];
let hueIdx = 0;

function spirograph(T, R, r, d) {
  return {
    x: (R - r) * Math.cos(T) + d * Math.cos((R - r) / r * T),
    y: (R - r) * Math.sin(T) - d * Math.sin((R - r) / r * T)
  };
}

function drawPattern() {
  tctx.fillStyle = '#050510';
  tctx.fillRect(0, 0, CW, CH);
  const scale = 38;
  const cx = CW / 2, cy = CH / 2;
  const k = R / r;
  const period = r / gcd(R, r) * Math.PI * 2;
  const steps = Math.floor(period / STEP);
  
  let first = true;
  for (let i = 0; i <= steps; i++) {
    const T = i * STEP;
    const { x, y } = spirograph(T, R, r, d);
    const sx = cx + x * scale, sy = cy + y * scale;
    if (first) { first = false; lastX = sx; lastY = sy; continue; }
    const hue = (hueIdx * 360 / 8 + T * 30) % 360;
    const col = `hsl(${hue},85%,65%)`;
    tctx.strokeStyle = col;
    tctx.lineWidth = 1.5;
    tctx.beginPath();
    tctx.moveTo(lastX, lastY);
    tctx.lineTo(sx, sy);
    tctx.stroke();
    lastX = sx; lastY = sy;
  }
  trailTex.needsUpdate = true;
  hueIdx = (hueIdx + 1) % hues.length;
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function randomize() {
  // Find interesting ratios
  const ratios = [[5,2],[7,3],[8,3],[9,4],[11,5],[12,5],[13,5],[9,2],[11,3],[14,3],[15,4],[16,5]];
  const [ra, rb] = ratios[Math.floor(Math.random() * ratios.length)];
  R = ra;
  r = rb;
  d = Math.floor(Math.random() * ra) + 1;
  document.getElementById('sR').value = R;
  document.getElementById('sRp').value = r;
  document.getElementById('sD').value = d;
  updateLabels();
  drawPattern();
}

function updateLabels() {
  document.getElementById('r').textContent = R;
  document.getElementById('rp').textContent = r;
  document.getElementById('d').textContent = d;
}

document.getElementById('sR').oninput = () => { R = parseFloat(document.getElementById('sR').value); updateLabels(); drawPattern(); };
document.getElementById('sRp').oninput = () => { r = parseFloat(document.getElementById('sRp').value); updateLabels(); drawPattern(); };
document.getElementById('sD').oninput = () => { d = parseFloat(document.getElementById('sD').value); updateLabels(); drawPattern(); };
document.getElementById('newBtn').onclick = randomize;
document.getElementById('trail').onchange = (e) => { plane.visible = e.target.checked; };
document.getElementById('bloom').onchange = (e) => { bloom.enabled = e.target.checked; };

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); randomize(); }
});

// Initial draw
drawPattern();

// Animated: show the pen tip drawing in real-time
const penGeo = new THREE.SphereGeometry(0.12, 12, 12);
const penMat = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
const pen = new THREE.Mesh(penGeo, penMat);
scene.add(pen);

let animT = 0;
const animK = R / r;
const animPeriod = r / gcd(R, r) * Math.PI * 2;
let animSteps = 0;
const animTotal = Math.floor(animPeriod / STEP);

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  composer.render();
}
animate();

// Pen tip animation
let lastPenX = 0, lastPenY = 0;
function animLoop() {
  if (animSteps >= animTotal) return;
  const T = animSteps * STEP;
  const { x, y } = spirograph(T, R, r, d);
  const sx = x * 0.625, sy = y * 0.625;
  pen.position.set(sx, sy, 0.2);
  if (animSteps > 0) {
    // Draw line on 3D scene (optional, pen moves in 3D space)
  }
  lastPenX = sx; lastPenY = sy;
  animSteps++;
  setTimeout(animLoop, 16);
}
animLoop();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
