<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Music Visualizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }
    canvas { display: block; }

    #overlay {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 12px 28px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    #overlay h1 {
      margin: 0 0 4px;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #overlay p {
      margin: 0;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
    }

    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      align-items: center;
      z-index: 10;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #e0e0ff;
      padding: 9px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      backdrop-filter: blur(6px);
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .btn:hover { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.25); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn.active {
      background: rgba(167,139,250,0.25);
      border-color: rgba(167,139,250,0.5);
      color: #c4b5fd;
    }
    #fileInput { display: none; }

    #mode-label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div id="overlay">
    <h1>3D Music Visualizer</h1>
    <p>Load an audio file or try the demo oscillator &mdash; orbit to explore</p>
  </div>

  <div id="controls">
    <label id="mode-label">Mode</label>
    <button class="btn active" id="btn-polar">Frequency Bars</button>
    <button class="btn" id="btn-waveform">Waveform Rings</button>
    <button class="btn" id="btn-particles">Particles</button>
    <label class="btn" for="fileInput">Open File</label>
    <input type="file" id="fileInput" accept="audio/*" />
    <button class="btn" id="btn-demo">Demo Oscillator</button>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.min.js';

    // ─── State ───────────────────────────────────────────────────────────────
    let mode = 'polar';          // 'polar' | 'waveform' | 'particles'
    let audioCtx = null;
    let analyser = null;
    let dataArray = null;
    let timeDomainData = null;
    let sourceNode = null;
    let demoOsc = null;
    let demoGain = null;
    let audioStarted = false;

    const FFTSIZE = 512;
    const BAR_COUNT = 128;

    // ─── GUI params ──────────────────────────────────────────────────────────
    const params = {
      colorA: '#7c3aed',
      colorB: '#06b6d4',
      colorC: '#f43f5e',
      sensitivity: 1.4,
      particleSpeed: 1.0,
      barHeight: 4.5,
      ringRadius: 5.5,
      beatThreshold: 0.62,
      autoRotate: true,
    };

    // ─── Renderer / Scene / Camera ─────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);
    scene.fog = new THREE.FogExp2(0x0a0a0f, 0.04);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 5, 14);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.autoRotate = params.autoRotate;
    controls.autoRotateSpeed = 0.6;

    // ─── Lights ─────────────────────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0x1a1040, 1.5);
    scene.add(ambientLight);
    const pointLight1 = new THREE.PointLight(0x7c3aed, 80, 50);
    pointLight1.position.set(10, 10, 10);
    scene.add(pointLight1);
    const pointLight2 = new THREE.PointLight(0x06b6d4, 60, 50);
    pointLight2.position.set(-10, -5, -10);
    scene.add(pointLight2);

    // ─── Color helpers ───────────────────────────────────────────────────────
    function hexToColor(hex) { return new THREE.Color(hex); }

    function lerp3(a, b, t) {
      return new THREE.Color(
        a.r + (b.r - a.r) * t,
        a.g + (b.g - a.g) * t,
        a.b + (b.b - a.b) * t,
      );
    }

    function beatPulse() {
      if (!dataArray) return 0;
      let peak = 0;
      const len = dataArray.length;
      for (let i = 0; i < len; i++) peak = Math.max(peak, dataArray[i] / 255);
      return peak > params.beatThreshold ? peak : 0;
    }

    function avgLevel() {
      if (!dataArray) return 0;
      let sum = 0;
      for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
      return (sum / dataArray.length / 255) * params.sensitivity;
    }

    // ═══════════════════════════════════════════════════════════════════════
    // MODE 1 — POLAR FREQUENCY BARS
    // ═══════════════════════════════════════════════════════════════════════
    const polarGroup = new THREE.Group();
    scene.add(polarGroup);

    // Base ring
    const ringGeo = new THREE.TorusGeometry(params.ringRadius, 0.05, 8, 120);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x2a2a4a });
    const ringMesh = new THREE.Mesh(ringGeo, ringMat);
    polarGroup.add(ringMesh);

    // Bar geometry templates (box, rounded-cap cylinder, cone)
    function makePolarBars() {
      polarGroup.clear();

      // Base ring
      const baseRing = new THREE.Mesh(
        new THREE.TorusGeometry(params.ringRadius, 0.06, 8, 160),
        new THREE.MeshStandardMaterial({ color: 0x1a1040, emissive: 0x0a0520, roughness: 0.8 })
      );
      polarGroup.add(baseRing);

      const colA = hexToColor(params.colorA);
      const colB = hexToColor(params.colorB);
      const colC = hexToColor(params.colorC);

      for (let i = 0; i < BAR_COUNT; i++) {
        const angle = (i / BAR_COUNT) * Math.PI * 2;

        // Each bar: thin box that scales in Y (height)
        const geo = new THREE.BoxGeometry(0.14, 1, 0.14);
        const mat = new THREE.MeshStandardMaterial({
          color: colA,
          emissive: colA,
          emissiveIntensity: 0.5,
          roughness: 0.3,
          metalness: 0.6,
        });
        const mesh = new THREE.Mesh(geo, mat);

        // Position on ring
        const r = params.ringRadius;
        mesh.position.set(Math.cos(angle) * r, 0, Math.sin(angle) * r);
        mesh.rotation.x = Math.PI / 2;
        mesh.rotation.z = -angle;
        mesh.userData.baseAngle = angle;
        mesh.userData.index = i;

        polarGroup.add(mesh);
      }

      // Center orb
      const orbGeo = new THREE.SphereGeometry(0.4, 32, 32);
      const orbMat = new THREE.MeshStandardMaterial({
        color: colA,
        emissive: colA,
        emissiveIntensity: 1.5,
        roughness: 0.2,
        metalness: 0.8,
      });
      const orb = new THREE.Mesh(orbGeo, orbMat);
      orb.userData.isOrb = true;
      polarGroup.add(orb);

      // Outer glow ring
      const glowRingGeo = new THREE.TorusGeometry(params.ringRadius + 0.3, 0.02, 8, 120);
      const glowRingMat = new THREE.MeshBasicMaterial({ color: colA, transparent: true, opacity: 0.3 });
      const glowRing = new THREE.Mesh(glowRingGeo, glowRingMat);
      glowRing.rotation.x = Math.PI / 2;
      glowRing.userData.isGlowRing = true;
      polarGroup.add(glowRing);
    }

    function updatePolarBars(time, delta) {
      if (!dataArray) {
        // idle animation
        polarGroup.children.forEach(c => {
          if (c.userData.isOrb) {
            c.scale.setScalar(1 + Math.sin(time * 0.8) * 0.08);
          }
          if (c.userData.isGlowRing) {
            c.material.opacity = 0.15 + Math.sin(time * 1.2) * 0.1;
          }
        });
        return;
      }

      const beat = beatPulse();
      const avg = avgLevel();
      const colA = hexToColor(params.colorA);
      const colB = hexToColor(params.colorB);
      const colC = hexToColor(params.colorC);

      polarGroup.children.forEach(c => {
        const idx = c.userData.index;
        if (idx === undefined) return;

        const t = idx / BAR_COUNT;
        const freqValue = dataArray[idx] / 255;
        const height = freqValue * params.barHeight * params.sensitivity;
        const smooth = Math.max(height, c.scale.y * 0.85);

        // Scale in Y (local height)
        c.scale.y = smooth;
        // Move upward from base (center of ring = y:0, bar sits on ring plane)
        c.position.y = smooth * 0.5;

        // Color gradient based on position
        const col = t < 0.5 ? lerp3(colA, colB, t * 2) : lerp3(colB, colC, (t - 0.5) * 2);
        c.material.color.copy(col);
        c.material.emissive.copy(col);
        c.material.emissiveIntensity = 0.4 + freqValue * 1.2 + beat * 1.5;

        // Sway / wave
        const wave = Math.sin(time * 2.5 + idx * 0.3) * 0.05;
        const angle = c.userData.baseAngle + wave;
        const r = params.ringRadius;
        c.position.x = Math.cos(angle) * r;
        c.position.z = Math.sin(angle) * r;
        c.rotation.z = -angle;
      });

      // Orb pulse
      polarGroup.children.forEach(c => {
        if (c.userData.isOrb) {
          const s = 1 + beat * 2.5 + avg * 0.8;
          c.scale.setScalar(s);
          const col = lerp3(colA, colB, (Math.sin(time * 0.7) + 1) * 0.5);
          c.material.color.copy(col);
          c.material.emissive.copy(col);
          c.material.emissiveIntensity = 1.2 + beat * 2;
        }
        if (c.userData.isGlowRing) {
          c.material.opacity = 0.15 + beat * 0.5 + avg * 0.2;
          c.material.color.copy(hexToColor(params.colorA));
        }
      });

      // Rotate base
      polarGroup.rotation.y += delta * 0.15;
    }

    makePolarBars();

    // ═══════════════════════════════════════════════════════════════════════
    // MODE 2 — WAVEFORM RINGS
    // ═══════════════════════════════════════════════════════════════════════
    const waveformGroup = new THREE.Group();
    scene.add(waveformGroup);
    waveformGroup.visible = false;

    const RING_COUNT = 6;
    const RING_SEGMENTS = 256;
    let waveformRings = [];

    function makeWaveformRings() {
      waveformGroup.clear();
      waveformRings = [];

      for (let r = 0; r < RING_COUNT; r++) {
        const radius = 1.5 + r * 1.3;
        const geometry = new THREE.TorusGeometry(radius, 0.03, 8, RING_SEGMENTS);
        const color = new THREE.Color().setHSL(0.55 + r * 0.07, 0.9, 0.6);
        const material = new THREE.MeshStandardMaterial({
          color,
          emissive: color,
          emissiveIntensity: 0.5,
          roughness: 0.3,
          metalness: 0.7,
          transparent: true,
          opacity: 0.7 - r * 0.08,
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = Math.PI / 2;
        mesh.userData.ringIndex = r;
        mesh.userData.baseRadius = radius;
        waveformGroup.add(mesh);
        waveformRings.push(mesh);
      }

      // Center glow sphere
      const centerGeo = new THREE.SphereGeometry(0.6, 32, 32);
      const centerMat = new THREE.MeshStandardMaterial({
        color: 0x7c3aed,
        emissive: 0x7c3aed,
        emissiveIntensity: 1.0,
        roughness: 0.1,
        metalness: 0.9,
        transparent: true,
        opacity: 0.8,
      });
      const centerMesh = new THREE.Mesh(centerGeo, centerMat);
      centerMesh.userData.isCenter = true;
      waveformGroup.add(centerMesh);
    }

    function updateWaveformRings(time, delta) {
      const avg = avgLevel();
      const beat = beatPulse();

      if (!timeDomainData) {
        // idle
        waveformRings.forEach((ring, r) => {
          const idleScale = 1 + Math.sin(time * (0.5 + r * 0.1)) * 0.04;
          ring.scale.set(idleScale, idleScale, 1);
          ring.material.emissiveIntensity = 0.3 + Math.sin(time + r) * 0.2;
        });
        if (waveformGroup.children.find(c => c.userData.isCenter)) {
          const center = waveformGroup.children.find(c => c.userData.isCenter);
          center.scale.setScalar(1 + Math.sin(time * 0.8) * 0.1);
        }
        return;
      }

      const colA = hexToColor(params.colorA);
      const colB = hexToColor(params.colorB);
      const colC = hexToColor(params.colorC);

      waveformRings.forEach((ring, r) => {
        // Modify each vertex radially based on waveform
        const positions = ring.geometry.attributes.position;
        const count = positions.count;

        // Rebuild radial offsets
        const radials = new Float32Array(count);
        for (let i = 0; i < count; i++) {
          const domainIdx = Math.floor((i / count) * timeDomainData.length);
          const waveVal = (timeDomainData[domainIdx] - 128) / 128;
          radials[i] = waveVal * (0.6 + r * 0.25) * params.sensitivity;
        }

        for (let i = 0; i < count; i++) {
          const angle = (i / count) * Math.PI * 2;
          const baseR = ring.userData.baseRadius;
          const offset = radials[i];
          const finalR = baseR + offset;
          positions.setX(i, Math.cos(angle) * finalR);
          positions.setZ(i, Math.sin(angle) * finalR);
          positions.setY(i, Math.sin(angle * 3 + time * 2) * offset * 0.4);
        }
        positions.needsUpdate = true;
        ring.geometry.computeVertexNormals();

        // Color based on ring index
        const t = r / RING_COUNT;
        const col = lerp3(colA, colB, (t + Math.sin(time * 0.5) * 0.15 + 0.5) % 1);
        ring.material.color.copy(col);
        ring.material.emissive.copy(col);
        ring.material.emissiveIntensity = 0.4 + avg * 1.5 + beat * 1.2;
        ring.material.opacity = 0.7 - r * 0.07 + beat * 0.2;
      });

      // Center sphere
      const center = waveformGroup.children.find(c => c.userData.isCenter);
      if (center) {
        const s = 1 + beat * 3 + avg * 0.7;
        center.scale.setScalar(s);
        const col = lerp3(colA, colC, (Math.sin(time * 0.6) + 1) * 0.5);
        center.material.color.copy(col);
        center.material.emissive.copy(col);
        center.material.emissiveIntensity = 1.0 + beat * 2.5;
      }

      waveformGroup.rotation.y += delta * 0.2;
    }

    makeWaveformRings();

    // ═══════════════════════════════════════════════════════════════════════
    // MODE 3 — PARTICLES
    // ═══════════════════════════════════════════════════════════════════════
    const particleGroup = new THREE.Group();
    scene.add(particleGroup);
    particleGroup.visible = false;

    const PARTICLE_COUNT = 4000;
    const pPositions = new Float32Array(PARTICLE_COUNT * 3);
    const pVelocities = new Float32Array(PARTICLE_COUNT * 3);
    const pColors = new Float32Array(PARTICLE_COUNT * 3);
    const pSizes = new Float32Array(PARTICLE_COUNT);

    // Initialize particle positions in a sphere
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 2 + Math.random() * 8;
      pPositions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
      pPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      pPositions[i * 3 + 2] = r * Math.cos(phi);

      pVelocities[i * 3]     = (Math.random() - 0.5) * 0.02;
      pVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.02;
      pVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.02;

      const t = Math.random();
      const col = new THREE.Color().setHSL(0.6 + t * 0.35, 0.95, 0.55 + t * 0.2);
      pColors[i * 3]     = col.r;
      pColors[i * 3 + 1] = col.g;
      pColors[i * 3 + 2] = col.b;

      pSizes[i] = 0.5 + Math.random() * 1.5;
    }

    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
    pGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));
    pGeo.setAttribute('size', new THREE.BufferAttribute(pSizes, 1));

    const pMat = new THREE.PointsMaterial({
      size: 0.08,
      vertexColors: true,
      transparent: true,
      opacity: 0.85,
      sizeAttenuation: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    const particles = new THREE.Points(pGeo, pMat);
    particleGroup.add(particles);

    // Star field background
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(3000 * 3);
    for (let i = 0; i < 3000; i++) {
      starPos[i * 3]     = (Math.random() - 0.5) * 120;
      starPos[i * 3 + 1] = (Math.random() - 0.5) * 120;
      starPos[i * 3 + 2] = (Math.random() - 0.5) * 120;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starMat = new THREE.PointsMaterial({ color: 0x8888cc, size: 0.04, transparent: true, opacity: 0.5 });
    scene.add(new THREE.Points(starGeo, starMat));

    let particleTime = 0;
    function updateParticles(delta) {
      particleTime += delta;
      const avg = avgLevel();
      const beat = beatPulse();

      const colA = hexToColor(params.colorA);
      const colB = hexToColor(params.colorB);
      const colC = hexToColor(params.colorC);

      const positions = pGeo.attributes.position.array;
      const colors = pGeo.attributes.color.array;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;

        // Move outward with beat explosion
        const explosion = beat * 0.3 * params.particleSpeed;
        const drift = avg * 0.04 * params.particleSpeed;

        positions[ix] += pVelocities[ix] * (1 + explosion * 8);
        positions[iy] += pVelocities[iy] * (1 + explosion * 8);
        positions[iz] += pVelocities[iz] * (1 + explosion * 8);

        // Drift back toward center
        const len = Math.sqrt(positions[ix]**2 + positions[iy]**2 + positions[iz]**2);
        if (len > 12) {
          const pull = 0.002;
          positions[ix] -= (positions[ix] / len) * pull;
          positions[iy] -= (positions[iy] / len) * pull;
          positions[iz] -= (positions[iz] / len) * pull;
        }

        // Add spiral
        const angle = Math.atan2(positions[iz], positions[ix]) + delta * 0.2;
        const rad = Math.sqrt(positions[ix]**2 + positions[iz]**2);
        positions[ix] = Math.cos(angle) * rad;
        positions[iz] = Math.sin(angle) * rad;

        // Color shift with audio
        const t = (Math.sin(particleTime * 0.3 + i * 0.01) + 1) * 0.5;
        const col = lerp3(colA, colB, t);
        const brightness = 0.5 + avg * 1.5 + beat * 1.5;
        colors[ix] = col.r * brightness;
        colors[iy] = col.g * brightness;
        colors[iz] = col.b * brightness;
      }

      pGeo.attributes.position.needsUpdate = true;
      pGeo.attributes.color.needsUpdate = true;

      // Particle size pulse
      pMat.size = 0.06 + beat * 0.12 + avg * 0.06;

      particleGroup.rotation.y += delta * 0.08;
      particleGroup.rotation.x += delta * 0.03;
    }

    // ═══════════════════════════════════════════════════════════════════════
    // AUDIO SETUP
    // ═══════════════════════════════════════════════════════════════════════
    function initAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = FFTSIZE;
        analyser.smoothingTimeConstant = 0.78;
        analyser.connect(audioCtx.destination);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        timeDomainData = new Uint8Array(analyser.fftSize);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function loadAudioFile(file) {
      initAudioContext();
      if (sourceNode) { try { sourceNode.stop(); } catch(e){} sourceNode.disconnect(); }
      const reader = new FileReader();
      reader.onload = async (e) => {
        const buf = await audioCtx.decodeAudioData(e.target.result);
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = buf;
        sourceNode.loop = true;
        sourceNode.connect(analyser);
        sourceNode.start(0);
        audioStarted = true;
      };
      reader.readAsArrayBuffer(file);
    }

    function startDemoOscillator() {
      initAudioContext();
      if (demoOsc) { demoOsc.stop(); demoOsc.disconnect(); }

      // LFO for frequency modulation
      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.4;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 60;
      lfo.connect(lfoGain);

      demoOsc = audioCtx.createOscillator();
      demoOsc.type = 'sawtooth';
      demoOsc.frequency.value = 220;
      lfoGain.connect(demoOsc.frequency);

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 1200;
      filter.Q.value = 3;

      demoGain = audioCtx.createGain();
      demoGain.gain.value = 0.18;

      // Second oscillator for richness
      const osc2 = audioCtx.createOscillator();
      osc2.type = 'square';
      osc2.frequency.value = 220.5;
      const osc2Gain = audioCtx.createGain();
      osc2Gain.gain.value = 0.08;

      demoOsc.connect(filter);
      osc2.connect(filter);
      filter.connect(demoGain);
      demoGain.connect(analyser);
      osc2Gain.connect(analyser);

      demoOsc.start();
      osc2.start();
      lfo.start();
      audioStarted = true;
    }

    // ─── GUI ─────────────────────────────────────────────────────────────────
    const gui = new GUI({ title: 'Visualizer Controls' });
    gui.domElement.style.setProperty('--width', '280px');

    const colorFolder = gui.addFolder('Colors');
    colorFolder.addColor(params, 'colorA', 'Primary').onChange(refreshColors);
    colorFolder.addColor(params, 'colorB', 'Secondary').onChange(refreshColors);
    colorFolder.addColor(params, 'colorC', 'Accent').onChange(refreshColors);

    const visualFolder = gui.addFolder('Visual');
    visualFolder.add(params, 'sensitivity', 0.2, 3.0, 0.05).name('Sensitivity');
    visualFolder.add(params, 'barHeight', 1, 10, 0.1).name('Bar Height');
    visualFolder.add(params, 'ringRadius', 2, 10, 0.1).name('Ring Radius');
    visualFolder.add(params, 'particleSpeed', 0.1, 3.0, 0.05).name('Particle Speed');

    const audioFolder = gui.addFolder('Audio');
    audioFolder.add(params, 'beatThreshold', 0.3, 0.9, 0.01).name('Beat Threshold');

    const sceneFolder = gui.addFolder('Scene');
    sceneFolder.add(params, 'autoRotate').name('Auto Rotate').onChange(v => {
      controls.autoRotate = v;
    });

    function refreshColors() {
      // Rebuild modes with new colors
      makePolarBars();
      makeWaveformRings();
    }

    // ─── UI handlers ────────────────────────────────────────────────────────
    const btnPolar = document.getElementById('btn-polar');
    const btnWaveform = document.getElementById('btn-waveform');
    const btnParticles = document.getElementById('btn-particles');
    const btnDemo = document.getElementById('btn-demo');
    const fileInput = document.getElementById('fileInput');

    function setMode(m) {
      mode = m;
      polarGroup.visible = m === 'polar';
      waveformGroup.visible = m === 'waveform';
      particleGroup.visible = m === 'particles';

      btnPolar.classList.toggle('active', m === 'polar');
      btnWaveform.classList.toggle('active', m === 'waveform');
      btnParticles.classList.toggle('active', m === 'particles');
    }

    btnPolar.addEventListener('click', () => setMode('polar'));
    btnWaveform.addEventListener('click', () => setMode('waveform'));
    btnParticles.addEventListener('click', () => setMode('particles'));
    btnDemo.addEventListener('click', startDemoOscillator);
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) loadAudioFile(e.target.files[0]);
    });

    // ─── Resize ─────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Animate ─────────────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      // Read audio data
      if (analyser && audioStarted) {
        analyser.getByteFrequencyData(dataArray);
        analyser.getByteTimeDomainData(timeDomainData);
      }

      // Update current mode
      if (mode === 'polar') updatePolarBars(elapsed, delta);
      if (mode === 'waveform') updateWaveformRings(elapsed, delta);
      if (mode === 'particles') updateParticles(delta);

      // Animate lights
      pointLight1.position.set(
        Math.cos(elapsed * 0.4) * 12,
        Math.sin(elapsed * 0.3) * 8 + 5,
        Math.sin(elapsed * 0.5) * 10
      );
      pointLight2.position.set(
        Math.sin(elapsed * 0.35) * 10,
        Math.cos(elapsed * 0.45) * 6 - 3,
        Math.cos(elapsed * 0.3) * 12
      );

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // ─── Debug globals ───────────────────────────────────────────────────────
    window.THREE = THREE;
    window.scene = scene;
    window.camera = camera;
    window.renderer = renderer;
    window.controls = controls;
    window.params = params;
    window.polarGroup = polarGroup;
    window.waveformGroup = waveformGroup;
    window.particleGroup = particleGroup;
    window.analyser = analyser;
    window.dataArray = dataArray;
    window.setMode = setMode;
    window.startDemoOscillator = startDemoOscillator;
    window.loadAudioFile = loadAudioFile;
  </script>
</body>
</html>
