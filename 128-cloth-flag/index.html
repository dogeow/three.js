<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloth Flag Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    #tip {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.65);
      color: #e0e0e0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      max-width: 260px;
      z-index: 10;
    }
    #tip strong { color: #7eb8f7; }

    #ui {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.65);
      color: #e0e0e0;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 200px;
    }
    #ui label { font-size: 13px; color: #b0b0b0; display: flex; flex-direction: column; gap: 4px; }
    #ui input[type="range"] { width: 100%; accent-color: #7eb8f7; }
    #wind-strength-val { font-size: 12px; color: #7eb8f7; text-align: right; }
    #wind-dir {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    #wind-dir button {
      background: rgba(126,184,247,0.15);
      color: #7eb8f7;
      border: 1px solid rgba(126,184,247,0.35);
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }
    #wind-dir button:hover { background: rgba(126,184,247,0.35); }
    #wind-dir button.active { background: rgba(126,184,247,0.5); border-color: #7eb8f7; }
    #reset-btn {
      background: rgba(180,80,80,0.2);
      color: #f7a07e;
      border: 1px solid rgba(180,80,80,0.4);
      border-radius: 5px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }
    #reset-btn:hover { background: rgba(180,80,80,0.4); }
    .row-label { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div id="tip">
    <strong>Cloth Flag Simulation</strong><br>
    Verlet integration with structural, shear &amp; bend springs.<br>
    Click buttons to change wind direction.<br>
    Drag slider to adjust wind strength.
  </div>

  <div id="ui">
    <label>
      <span>Wind Strength: <span id="wind-strength-val">5.0</span></span>
      <input type="range" id="windSlider" min="0" max="15" step="0.1" value="5">
    </label>
    <div>
      <div class="row-label">Wind Direction</div>
      <div id="wind-dir">
        <button data-dir="left">Left</button>
        <button data-dir="right" class="active">Right</button>
        <button data-dir="up">Up</button>
        <button data-dir="down">Down</button>
      </div>
    </div>
    <button id="reset-btn">Reset Cloth</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 25, 60);

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, -2, 14);
    camera.lookAt(0, -2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, -2, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.maxPolarAngle = Math.PI * 0.85;
    controls.minDistance = 4;
    controls.maxDistance = 40;
    controls.update();

    // --- Lighting ---
    const ambientLight = new THREE.AmbientLight(0x404060, 1.2);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xfff0e0, 2.5);
    dirLight.position.set(6, 10, 8);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x4060ff, 0.4);
    fillLight.position.set(-5, 2, -3);
    scene.add(fillLight);

    // --- Ground ---
    const groundGeo = new THREE.PlaneGeometry(60, 60);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.95, metalness: 0.0 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -7;
    ground.receiveShadow = true;
    scene.add(ground);

    // --- Cloth Parameters ---
    const CLOTH_W = 30;
    const CLOTH_H = 20;
    const CLOTH_WIDTH = 8;
    const CLOTH_HEIGHT = 5.3;
    const SEG_W = CLOTH_W;
    const SEG_H = CLOTH_H;
    const DX = CLOTH_WIDTH / SEG_W;
    const DY = CLOTH_HEIGHT / SEG_H;
    const MASS = 1.0;
    const DAMPING = 0.985;
    const GRAVITY = new THREE.Vector3(0, -9.8, 0);
    const CONSTRAINT_ITER = 5;

    // --- Wind State ---
    let windStrength = 5.0;
    let windDir = new THREE.Vector3(1, 0, 0.3);
    let windPhase = 0;

    // --- Flag Texture (drawn on canvas) ---
    function createFlagTexture() {
      const c = document.createElement('canvas');
      c.width = 512;
      c.height = 340;
      const ctx = c.getContext('2d');

      // Blue background
      ctx.fillStyle = '#cc2200';
      ctx.fillRect(0, 0, 512, 340);

      // White stripes
      ctx.fillStyle = '#ffffff';
      for (let i = 0; i < 8; i++) {
        const y = i * 42.5;
        if (i % 2 === 0) {
          ctx.fillRect(0, y, 512, 21.25);
        }
      }

      // Blue canton area
      ctx.fillStyle = '#003399';
      ctx.fillRect(0, 0, 200, 170);

      // Stars in canton
      ctx.fillStyle = '#ffffff';
      for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 6; col++) {
          const sx = 14 + col * 30;
          const sy = 12 + row * 30;
          drawStar(ctx, sx, sy, 6, 5);
        }
      }
      // Extra offset row
      for (let col = 0; col < 5; col++) {
        const sx = 29 + col * 30;
        const sy = 27 + col * 0; // already accounted in offset
        // actually let me just draw 5 rows, simple grid
      }
      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 5; col++) {
          const sx = 28 + col * 30;
          const sy = 30 + row * 30;
          drawStar(ctx, sx, sy, 5, 5);
        }
      }

      // slight noise
      const imgd = ctx.getImageData(0, 0, 512, 340);
      for (let i = 0; i < imgd.data.length; i += 4) {
        const n = (Math.random() - 0.5) * 6;
        imgd.data[i] = Math.max(0, Math.min(255, imgd.data[i] + n));
        imgd.data[i + 1] = Math.max(0, Math.min(255, imgd.data[i + 1] + n));
        imgd.data[i + 2] = Math.max(0, Math.min(255, imgd.data[i + 2] + n));
      }
      ctx.putImageData(imgd, 0, 0);

      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
      return tex;
    }

    function drawStar(ctx, x, y, outerR, innerR) {
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        const angle = (i * Math.PI) / 5 - Math.PI / 2;
        const px = x + r * Math.cos(angle);
        const py = y + r * Math.sin(angle);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
    }

    // --- Particle ---
    class Particle {
      constructor(x, y, z) {
        this.pos = new THREE.Vector3(x, y, z);
        this.prev = new THREE.Vector3(x, y, z);
        this.acc = new THREE.Vector3();
        this.pinned = false;
        this.invMass = 1.0 / MASS;
      }

      applyForce(f) {
        this.acc.addScaledVector(f, this.invMass);
      }

      update() {
        if (this.pinned) return;
        const vel = this.pos.clone().sub(this.prev).multiplyScalar(DAMPING);
        const temp = this.pos.clone();
        this.pos.add(vel).addScaledVector(this.acc, 1);
        this.prev.copy(temp);
        this.acc.set(0, 0, 0);
      }
    }

    // --- Spring Constraint ---
    class Spring {
      constructor(p1, p2, stiffness) {
        this.p1 = p1;
        this.p2 = p2;
        this.restLen = p1.pos.distanceTo(p2.pos);
        this.stiffness = stiffness;
      }

      solve() {
        const diff = this.p2.pos.clone().sub(this.p1.pos);
        const dist = diff.length();
        if (dist < 1e-6) return;
        const correction = diff.multiplyScalar((dist - this.restLen) / dist * this.stiffness);
        if (!this.p1.pinned) this.p1.pos.addScaledVector(correction, 0.5);
        if (!this.p2.pinned) this.p2.pos.addScaledVector(correction, -0.5);
      }
    }

    // --- Cloth Init ---
    let particles = [];
    let springs = [];
    let clothGeo, clothMesh;

    function initCloth() {
      particles = [];
      springs = [];

      const startX = -CLOTH_WIDTH / 2;
      const startY = 0;
      const startZ = 0;

      for (let j = 0; j <= SEG_H; j++) {
        for (let i = 0; i <= SEG_W; i++) {
          const x = startX + i * DX;
          const y = startY - j * DY;
          const z = startZ;
          const p = new Particle(x, y, z);
          // Pin left edge
          if (i === 0) {
            p.pinned = true;
            p.invMass = 0;
          }
          particles.push(p);
        }
      }

      // Structural springs (horizontal + vertical)
      for (let j = 0; j <= SEG_H; j++) {
        for (let i = 0; i <= SEG_W; i++) {
          const idx = j * (SEG_W + 1) + i;
          // horizontal
          if (i < SEG_W) {
            springs.push(new Spring(particles[idx], particles[idx + 1], 0.9));
          }
          // vertical
          if (j < SEG_H) {
            springs.push(new Spring(particles[idx], particles[idx + (SEG_W + 1)], 0.9));
          }
        }
      }

      // Shear springs (diagonals)
      for (let j = 0; j < SEG_H; j++) {
        for (let i = 0; i < SEG_W; i++) {
          const idx = j * (SEG_W + 1) + i;
          springs.push(new Spring(particles[idx], particles[idx + (SEG_W + 1) + 1], 0.5));
          springs.push(new Spring(particles[idx + 1], particles[idx + (SEG_W + 1)], 0.5));
        }
      }

      // Bend springs (skip one)
      for (let j = 0; j <= SEG_H; j++) {
        for (let i = 0; i <= SEG_W; i++) {
          const idx = j * (SEG_W + 1) + i;
          if (i < SEG_W - 1) {
            springs.push(new Spring(particles[idx], particles[idx + 2], 0.3));
          }
          if (j < SEG_H - 1) {
            springs.push(new Spring(particles[idx], particles[idx + 2 * (SEG_W + 1)], 0.3));
          }
        }
      }

      buildClothMesh();
    }

    function buildClothMesh() {
      if (clothMesh) {
        scene.remove(clothMesh);
        clothGeo.dispose();
        clothMesh.material.map.dispose();
        clothMesh.material.dispose();
      }

      const segW = SEG_W;
      const segH = SEG_H;
      clothGeo = new THREE.PlaneGeometry(CLOTH_WIDTH, CLOTH_HEIGHT, segW, segH);

      // Set particle positions to geometry
      const pos = clothGeo.attributes.position;
      for (let j = 0; j <= segH; j++) {
        for (let i = 0; i <= segW; i++) {
          const idx = j * (segW + 1) + i;
          pos.setXYZ(idx, particles[idx].pos.x, particles[idx].pos.y, particles[idx].pos.z);
        }
      }
      pos.needsUpdate = true;
      clothGeo.computeVertexNormals();

      const tex = createFlagTexture();
      tex.flipY = false;
      const mat = new THREE.MeshStandardMaterial({
        map: tex,
        side: THREE.DoubleSide,
        roughness: 0.8,
        metalness: 0.05,
      });

      clothMesh = new THREE.Mesh(clothGeo, mat);
      clothMesh.castShadow = true;
      clothMesh.receiveShadow = true;
      scene.add(clothMesh);
    }

    initCloth();

    // --- Pole ---
    const POLE_HEIGHT = CLOTH_HEIGHT + 3;
    const poleGeo = new THREE.CylinderGeometry(0.06, 0.06, POLE_HEIGHT, 16);
    const poleMat = new THREE.MeshStandardMaterial({
      color: 0x2a2a3a,
      roughness: 0.3,
      metalness: 0.8,
    });
    const pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.set(-CLOTH_WIDTH / 2 - 0.06, -POLE_HEIGHT / 2 + 0.5, 0);
    pole.castShadow = true;
    scene.add(pole);

    // Pole top cap
    const capGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const cap = new THREE.Mesh(capGeo, poleMat);
    cap.position.set(pole.position.x, pole.position.y + POLE_HEIGHT / 2 + 0.06, 0);
    cap.castShadow = true;
    scene.add(cap);

    // Rope ring at top
    const ringGeo = new THREE.TorusGeometry(0.08, 0.015, 8, 16);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0xaa8844, roughness: 0.4, metalness: 0.6 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.set(-CLOTH_WIDTH / 2 - 0.06, 0.5, 0);
    ring.rotation.y = Math.PI / 2;
    scene.add(ring);

    // --- Simulation Update ---
    function updateCloth(dt) {
      const dtSq = dt * dt;
      windPhase += dt * 2.5;
      const flutter = Math.sin(windPhase) * 0.6 + Math.sin(windPhase * 2.3) * 0.3 + Math.sin(windPhase * 5.7) * 0.1;
      const windMag = windStrength * (1 + flutter * 0.5);
      const windForce = windDir.clone().multiplyScalar(windMag);

      // Apply forces
      for (const p of particles) {
        if (p.pinned) continue;
        p.applyForce(GRAVITY);
        // Wind perturbation per particle
        const noise = Math.sin(p.pos.x * 0.8 + windPhase * 1.3) * Math.cos(p.pos.y * 0.6 + windPhase * 0.9);
        const pWind = windForce.clone().multiplyScalar(1 + noise * 0.3);
        p.applyForce(pWind);
      }

      // Verlet integration
      for (const p of particles) {
        p.update();
      }

      // Constraint solving
      for (let iter = 0; iter < CONSTRAINT_ITER; iter++) {
        for (const s of springs) {
          s.solve();
        }
      }

      // Sync geometry
      const pos = clothGeo.attributes.position;
      for (let j = 0; j <= SEG_H; j++) {
        for (let i = 0; i <= SEG_W; i++) {
          const idx = j * (SEG_W + 1) + i;
          pos.setXYZ(idx, particles[idx].pos.x, particles[idx].pos.y, particles[idx].pos.z);
        }
      }
      pos.needsUpdate = true;
      clothGeo.computeVertexNormals();
      clothGeo.computeBoundingSphere();
    }

    // --- UI ---
    const slider = document.getElementById('windSlider');
    const valDisplay = document.getElementById('wind-strength-val');
    slider.addEventListener('input', () => {
      windStrength = parseFloat(slider.value);
      valDisplay.textContent = windStrength.toFixed(1);
    });

    const dirBtns = document.querySelectorAll('#wind-dir button');
    dirBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        dirBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const d = btn.dataset.dir;
        if (d === 'left') windDir.set(-1, 0, 0.3);
        if (d === 'right') windDir.set(1, 0, 0.3);
        if (d === 'up') windDir.set(0, 0.5, -1);
        if (d === 'down') windDir.set(0, -0.5, 1);
      });
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      initCloth();
    });

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // --- Attach to window for debugging ---
    window.scene = scene;
    window.camera = camera;
    window.renderer = renderer;
    window.controls = controls;
    window.clothMesh = clothMesh;
    window.clothGeo = clothGeo;
    window.particles = particles;

    // --- Animation Loop ---
    let lastTime = 0;
    function animate(time) {
      requestAnimationFrame(animate);
      const dt = Math.min((time - lastTime) / 1000, 0.033);
      lastTime = time;
      if (dt > 0) updateCloth(dt);
      controls.update();
      renderer.render(scene, camera);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
