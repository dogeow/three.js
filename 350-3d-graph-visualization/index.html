<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Graph Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a12; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    #tip {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 20, 0.75);
      border: 1px solid rgba(80, 120, 255, 0.3);
      border-radius: 8px;
      padding: 8px 18px;
      color: #aab4ff;
      font-size: 13px;
      pointer-events: none;
      z-index: 10;
      backdrop-filter: blur(6px);
      letter-spacing: 0.02em;
    }

    #label-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .node-label {
      position: absolute;
      color: #c8d0ff;
      font-size: 11px;
      font-family: 'Segoe UI', sans-serif;
      pointer-events: none;
      transform: translate(-50%, -120%);
      white-space: nowrap;
      text-shadow: 0 0 6px #4060ff88;
    }

    #tooltip {
      position: fixed;
      background: rgba(10, 10, 25, 0.9);
      border: 1px solid rgba(80, 140, 255, 0.5);
      border-radius: 6px;
      padding: 6px 12px;
      color: #dde6ff;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="tip">Three.js &nbsp;|&nbsp; lil-gui &nbsp;|&nbsp; Verlet Physics (Coulomb Repulsion + Spring Attraction) &nbsp;|&nbsp; CSS2DRenderer Labels</div>
  <div id="label-container"></div>
  <div id="tooltip"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
    import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

    // ── Scene Setup ──────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a12);
    scene.fog = new THREE.Fog(0x0a0a12, 60, 120);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
    camera.position.set(0, 0, 50);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(innerWidth, innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 5;
    controls.maxDistance = 200;

    // ── Lights ──────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x8899ff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xaabbff, 1.2);
    dirLight.position.set(20, 30, 20);
    scene.add(dirLight);
    const pointLight = new THREE.PointLight(0x4466ff, 1.5, 80);
    pointLight.position.set(-20, -10, 10);
    scene.add(pointLight);

    // ── Grid Helper (subtle) ─────────────────────────────────────────────────
    const gridHelper = new THREE.GridHelper(80, 20, 0x1a1a3a, 0x111128);
    gridHelper.position.y = -20;
    scene.add(gridHelper);

    // ── Parameters ─────────────────────────────────────────────────────────
    const params = {
      nodeCount: 40,
      springLength: 8,
      repulsion: 200,
      damping: 0.88,
      showLabels: true,
    };

    // ── Node / Edge Storage ─────────────────────────────────────────────────
    let nodes = [];
    let edges = [];
    const nodeGroup = new THREE.Group();
    const edgeGroup = new THREE.Group();
    const labelGroup = new THREE.Group();
    scene.add(nodeGroup, edgeGroup, labelGroup);

    // Remove all children helper
    function clearGroup(g) {
      while (g.children.length) g.remove(g.children[0]);
    }

    // ── Physics Classes ─────────────────────────────────────────────────────
    class PhysicsNode {
      constructor(id) {
        this.id = id;
        this.pos = new THREE.Vector3(
          (Math.random() - 0.5) * 30,
          (Math.random() - 0.5) * 30,
          (Math.random() - 0.5) * 30
        );
        this.oldPos = this.pos.clone();
        this.vel = new THREE.Vector3();
        this.force = new THREE.Vector3();
      }

      applyForce(f) {
        this.force.add(f);
      }

      integrate(damping) {
        this.vel.sub(this.force);
        this.oldPos.copy(this.pos);
        this.pos.add(this.vel);
        this.vel.multiplyScalar(damping);
        this.force.set(0, 0, 0);
      }
    }

    class SpringEdge {
      constructor(a, b, restLength) {
        this.a = a;
        this.b = b;
        this.restLength = restLength;
      }
    }

    // ── Build Graph ─────────────────────────────────────────────────────────
    function buildGraph() {
      clearGroup(nodeGroup);
      clearGroup(edgeGroup);
      while (labelGroup.children.length) labelGroup.remove(labelGroup.children[0]);

      nodes = [];
      edges = [];

      const n = params.nodeCount;
      for (let i = 0; i < n; i++) {
        nodes.push(new PhysicsNode(i));
      }

      // Create a connected-ish graph
      for (let i = 0; i < n; i++) {
        const degree = Math.floor(Math.random() * 3) + 2;
        for (let d = 0; d < degree; d++) {
          const j = Math.floor(Math.random() * n);
          if (j !== i && !edgeExists(i, j)) {
            edges.push(new SpringEdge(nodes[i], nodes[j], params.springLength));
          }
        }
      }

      // Ensure connectivity
      for (let i = 1; i < n; i++) {
        if (!edgeExists(0, i)) {
          edges.push(new SpringEdge(nodes[0], nodes[i], params.springLength));
        }
      }

      // Node meshes
      const geo = new THREE.SphereGeometry(0.6, 20, 20);
      for (let i = 0; i < n; i++) {
        const hue = 0.55 + (i / n) * 0.4;
        const mat = new THREE.MeshPhongMaterial({
          color: new THREE.Color().setHSL(hue, 0.7, 0.55),
          emissive: new THREE.Color().setHSL(hue, 0.8, 0.15),
          shininess: 80,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.userData.nodeId = i;
        nodeGroup.add(mesh);

        // CSS2D label
        const labelDiv = document.createElement('div');
        labelDiv.className = 'node-label';
        labelDiv.textContent = `Node ${i}`;
        labelDiv.style.display = params.showLabels ? 'block' : 'none';
        const label = new CSS2DObject(labelDiv);
        label.position.set(0, 0, 0);
        nodes[i].label = label;
        labelGroup.add(label);
      }

      // Edge meshes
      const edgeMat = new THREE.LineBasicMaterial({ color: 0x334488, transparent: true, opacity: 0.5 });
      for (let i = 0; i < edges.length; i++) {
        const geo = new THREE.BufferGeometry().setFromPoints([edges[i].a.pos, edges[i].b.pos]);
        const line = new THREE.Line(geo, edgeMat.clone());
        edgeGroup.add(line);
        edges[i].line = line;
      }
    }

    function edgeExists(i, j) {
      return edges.some(e => (e.a === nodes[i] && e.b === nodes[j]) || (e.a === nodes[j] && e.b === nodes[i]));
    }

    // ── Physics Step ────────────────────────────────────────────────────────
    const _repForce = new THREE.Vector3();
    const _springForce = new THREE.Vector3();
    const _diff = new THREE.Vector3();

    function physicsStep() {
      // Reset forces
      for (const n of nodes) n.force.set(0, 0, 0);

      // Coulomb repulsion (all pairs)
      const rep = params.repulsion;
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          _diff.subVectors(nodes[i].pos, nodes[j].pos);
          const dist = _diff.length();
          if (dist < 0.1) continue;
          const magnitude = rep / (dist * dist);
          _repForce.copy(_diff).normalize().multiplyScalar(magnitude);
          nodes[i].applyForce(_repForce);
          nodes[j].applyForce(_repForce.clone().negate());
        }
      }

      // Spring attraction
      const restLen = params.springLength;
      for (const e of edges) {
        _diff.subVectors(e.b.pos, e.a.pos);
        const dist = _diff.length();
        if (dist < 0.1) continue;
        const displacement = dist - restLen;
        _springForce.copy(_diff).normalize().multiplyScalar(displacement * 0.1);
        e.a.applyForce(_springForce);
        e.b.applyForce(_springForce.clone().negate());
      }

      // Center gravity (keeps graph from drifting too far)
      const center = new THREE.Vector3();
      for (const n of nodes) center.add(n.pos);
      center.divideScalar(nodes.length);
      for (const n of nodes) {
        n.applyForce(center.clone().negate().multiplyScalar(0.02));
      }

      // Integrate
      for (const n of nodes) n.integrate(params.damping);
    }

    // ── Raycasting ──────────────────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    raycaster.params.Points.threshold = 0.5;
    const mouse = new THREE.Vector2();
    const tooltip = document.getElementById('tooltip');
    let hoveredMesh = null;

    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    });

    // ── GUI ─────────────────────────────────────────────────────────────────
    const gui = new GUI();
    gui.add(params, 'nodeCount', 5, 120, 1).name('Node Count').onFinishChange(buildGraph);
    gui.add(params, 'springLength', 2, 20, 0.5).name('Spring Length');
    gui.add(params, 'repulsion', 10, 800, 10).name('Repulsion Force');
    gui.add(params, 'damping', 0.5, 0.99, 0.01).name('Damping');
    gui.add(params, 'showLabels').name('Show Labels').onChange(v => {
      document.querySelectorAll('.node-label').forEach(el => {
        el.style.display = v ? 'block' : 'none';
      });
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    buildGraph();

    // ── Animation Loop ───────────────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);

      // Physics iterations per frame
      for (let i = 0; i < 3; i++) physicsStep();

      // Update meshes
      for (let i = 0; i < nodes.length; i++) {
        nodeGroup.children[i].position.copy(nodes[i].pos);
        nodes[i].label.position.copy(nodes[i].pos);
      }

      // Update edge lines
      for (let i = 0; i < edges.length; i++) {
        const pos = edges[i].line.geometry.attributes.position;
        pos.setXYZ(0, edges[i].a.pos.x, edges[i].a.pos.y, edges[i].a.pos.z);
        pos.setXYZ(1, edges[i].b.pos.x, edges[i].b.pos.y, edges[i].b.pos.z);
        pos.needsUpdate = true;
      }

      // Hover / click
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(nodeGroup.children);

      if (hits.length > 0) {
        const mesh = hits[0].object;
        const nid = mesh.userData.nodeId;
        if (hoveredMesh !== mesh) {
          if (hoveredMesh) hoveredMesh.material.emissiveIntensity = 0.15;
          hoveredMesh = mesh;
          hoveredMesh.material.emissiveIntensity = 0.8;
          document.body.style.cursor = 'pointer';
        }
        tooltip.style.display = 'block';
        tooltip.style.left = (hits[0].clientX + 12) + 'px';
        tooltip.style.top = (hits[0].clientY - 8) + 'px';
        tooltip.textContent = `Node ${nid}  |  pos: ${nodes[nid].pos.x.toFixed(1)}, ${nodes[nid].pos.y.toFixed(1)}, ${nodes[nid].pos.z.toFixed(1)}`;
      } else {
        if (hoveredMesh) {
          hoveredMesh.material.emissiveIntensity = 0.15;
          hoveredMesh = null;
        }
        tooltip.style.display = 'none';
        document.body.style.cursor = 'default';
      }

      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    animate();

    // ── Resize ───────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      labelRenderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
