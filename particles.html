<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js 粒子系统示例</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';

    // 场景
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000005);

    // 相机
    const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 50;

    // 渲染器
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 粒子数量
    const particleCount = 3000;

    // 创建粒子几何体
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const sizes = new Float32Array(particleCount);

    // 颜色调色板
    const colorPalette = [
      new THREE.Color(0x4fc3f7),  // 浅蓝
      new THREE.Color(0xe91e63),  // 粉色
      new THREE.Color(0x7c4dff),  // 紫色
      new THREE.Color(0x00e5ff),  // 青色
      new THREE.Color(0xffeb3b),  // 黄色
    ];

    for (let i = 0; i < particleCount; i++) {
      // 球形空间分布
      const radius = 30 + Math.random() * 20;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);

      positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
      positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
      positions[i * 3 + 2] = radius * Math.cos(phi);

      // 随机颜色
      const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
      colors[i * 3] = color.r;
      colors[i * 3 + 1] = color.g;
      colors[i * 3 + 2] = color.b;

      // 随机大小
      sizes[i] = Math.random() * 2 + 0.5;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    // 粒子材质
    const material = new THREE.PointsMaterial({
      size: 0.8,
      vertexColors: true,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending,
      sizeAttenuation: true
    });

    // 创建粒子系统
    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // 添加中心星云效果
    const coreGeometry = new THREE.SphereGeometry(3, 32, 32);
    const coreMaterial = new THREE.MeshBasicMaterial({
      color: 0x7c4dff,
      transparent: true,
      opacity: 0.3
    });
    const core = new THREE.Mesh(coreGeometry, coreMaterial);
    scene.add(core);

    // 窗口调整
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 鼠标交互
    const mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', (event) => {
      mouse.x = (event.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = -(event.clientY / window.innerHeight - 0.5) * 2;
    });

    // 动画
    function animate() {
      requestAnimationFrame(animate);

      // 粒子群旋转
      particles.rotation.y += 0.0005;
      particles.rotation.x += 0.0002;

      // 跟随鼠标
      particles.rotation.y += mouse.x * 0.0003;
      particles.rotation.x += mouse.y * 0.0003;

      // 中心星云脉动
      const scale = 1 + Math.sin(Date.now() * 0.002) * 0.1;
      core.scale.set(scale, scale, scale);

      // 粒子闪烁
      const sizes = geometry.attributes.size.array;
      for (let i = 0; i < particleCount; i++) {
        sizes[i] += (Math.random() - 0.5) * 0.05;
        sizes[i] = Math.max(0.3, Math.min(2, sizes[i]));
      }
      geometry.attributes.size.needsUpdate = true;

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
