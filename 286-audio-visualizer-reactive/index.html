<!--
  Example #286: Audio Reactive Galaxy
  A procedural spiral galaxy that reacts to audio frequencies in real-time.
  Three.js r160 | Web Audio API | EffectComposer with UnrealBloomPass
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Reactive Galaxy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: sans-serif; }
    canvas { display: block; }
    #ui {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
    }
    #loadBtn, #playBtn {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    #loadBtn:hover, #playBtn:hover { background: rgba(255,255,255,0.2); }
    #playBtn.playing { background: rgba(100,200,255,0.3); }
    #info {
      position: fixed;
      top: 16px;
      left: 16px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">Audio Reactive Galaxy — Load audio or enjoy the auto-generated soundscape</div>
  <div id="ui">
    <button id="loadBtn">Load Audio File</button>
    <button id="playBtn" class="playing">Playing Auto-Generated</button>
  </div>

  <input type="file" id="audioInput" accept="audio/*" style="display:none" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import GUI from 'three/addons/libs/lil-gui.module.min.js';

    // ─── Config ───────────────────────────────────────────────────────────────
    const STAR_COUNT = 5000;
    const ARMS = 5;
    const GALAXY_RADIUS = 20;
    const CORE_RADIUS = 1.5;

    // ─── State ────────────────────────────────────────────────────────────────
    let audioContext, analyser, dataArray, audioSource;
    let autoGenerated = true;
    let isPlaying = false;
    let bassLevel = 0, midLevel = 0, highLevel = 0, amplitude = 0;
    let galaxyRotation = 0;
    let baseColor = new THREE.Color();
    let targetColor = new THREE.Color();
    let colorLerpFactor = 0.05;

    // ─── GUI Params ──────────────────────────────────────────────────────────
    const params = {
      sensitivity: 1.5,
      bloomStrength: 1.2,
      bloomRadius: 0.4,
      rotationSpeed: 1.0,
      colorScheme: 'Nebula',
      colorOptions: ['Nebula', 'Ice', 'Fire', 'Void']
    };

    // ─── Renderer / Scene / Camera ───────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000005);
    scene.fog = new THREE.FogExp2(0x000005, 0.008);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 30, 50);

    // ─── Controls ─────────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 10;
    controls.maxDistance = 150;

    // ─── Postprocessing ───────────────────────────────────────────────────────
    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      params.bloomStrength,
      params.bloomRadius,
      0.2
    );
    composer.addPass(bloomPass);

    // ─── Galaxy Star Particles ────────────────────────────────────────────────
    const starGeometry = new THREE.SphereGeometry(0.12, 4, 4);
    const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const starMesh = new THREE.InstancedMesh(starGeometry, starMaterial, STAR_COUNT);

    const dummy = new THREE.Object3D();
    const starData = [];

    function getArmAngle(i, total, arms) {
      return (i / total) * arms * Math.PI * 2;
    }

    function buildGalaxy() {
      starData.length = 0;
      for (let i = 0; i < STAR_COUNT; i++) {
        const t = i / STAR_COUNT;
        const armAngle = getArmAngle(i, STAR_COUNT / ARMS, ARMS) + Math.PI;
        const spread = 0.3 + t * 1.8;
        const r = t * GALAXY_RADIUS + (Math.random() - 0.5) * spread * 2;
        const angle = armAngle + (Math.random() - 0.5) * 0.6;
        const y = (Math.random() - 0.5) * spread * 0.4;

        const x = Math.cos(angle) * r;
        const z = Math.sin(angle) * r;

        dummy.position.set(x, y, z);
        const s = 0.5 + Math.random() * 1.5;
        dummy.scale.set(s, s, s);
        dummy.updateMatrix();
        starMesh.setMatrixAt(i, dummy.matrix);

        starData.push({
          baseX: x, baseY: y, baseZ: z,
          phase: Math.random() * Math.PI * 2,
          sparkleSpeed: 1 + Math.random() * 3,
          originalScale: s
        });
      }
      starMesh.instanceMatrix.needsUpdate = true;
      scene.add(starMesh);
    }
    buildGalaxy();

    // ─── Central Core ─────────────────────────────────────────────────────────
    const coreGeo = new THREE.SphereGeometry(CORE_RADIUS, 32, 32);
    const coreMat = new THREE.MeshBasicMaterial({ color: 0xffcc88 });
    const core = new THREE.Mesh(coreGeo, coreMat);
    scene.add(core);

    const coreGlowGeo = new THREE.SphereGeometry(CORE_RADIUS * 2.5, 32, 32);
    const coreGlowMat = new THREE.MeshBasicMaterial({
      color: 0xffaa44,
      transparent: true,
      opacity: 0.15,
      side: THREE.BackSide
    });
    const coreGlow = new THREE.Mesh(coreGlowGeo, coreGlowMat);
    scene.add(coreGlow);

    // ─── Ambient Dust Particles ───────────────────────────────────────────────
    const dustCount = 800;
    const dustGeo = new THREE.BufferGeometry();
    const dustPositions = new Float32Array(dustCount * 3);
    for (let i = 0; i < dustCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.random() * Math.PI;
      const r = 2 + Math.random() * GALAXY_RADIUS;
      dustPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      dustPositions[i * 3 + 1] = (Math.random() - 0.5) * 3;
      dustPositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
    }
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
    const dustMat = new THREE.PointsMaterial({ color: 0x8888ff, size: 0.08, transparent: true, opacity: 0.4 });
    const dust = new THREE.Points(dustGeo, dustMat);
    scene.add(dust);

    // ─── Color Schemes ────────────────────────────────────────────────────────
    const colorSchemes = {
      Nebula:   { cool: new THREE.Color(0x4488ff), warm: new THREE.Color(0xff88cc), core: new THREE.Color(0xffcc88) },
      Ice:      { cool: new THREE.Color(0x88ccff), warm: new THREE.Color(0xaaffee), core: new THREE.Color(0xffffff) },
      Fire:     { cool: new THREE.Color(0xff4400), warm: new THREE.Color(0xffcc00), core: new THREE.Color(0xff2200) },
      Void:     { cool: new THREE.Color(0x220033), warm: new THREE.Color(0x8844ff), core: new THREE.Color(0x4422aa) }
    };

    function applyColorScheme(name) {
      const scheme = colorSchemes[name];
      targetColor.copy(scheme.warm);
    }

    // ─── Audio Setup ──────────────────────────────────────────────────────────
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 512;
        analyser.smoothingTimeConstant = 0.8;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
      }
      if (audioContext.state === 'suspended') audioContext.resume();
    }

    function createAutoAudio() {
      initAudio();
      if (audioSource) { try { audioSource.stop(); } catch(e){} }
      const osc1 = audioContext.createOscillator();
      const osc2 = audioContext.createOscillator();
      const osc3 = audioContext.createOscillator();
      const lfo = audioContext.createOscillator();
      const lfoGain = audioContext.createGain();
      const gain1 = audioContext.createGain();
      const gain2 = audioContext.createGain();
      const gain3 = audioContext.createGain();

      osc1.type = 'sawtooth';
      osc1.frequency.value = 55;
      osc2.type = 'sine';
      osc2.frequency.value = 110;
      osc3.type = 'triangle';
      osc3.frequency.value = 220;

      lfo.type = 'sine';
      lfo.frequency.value = 0.3;
      lfoGain.gain.value = 0.4;

      gain1.gain.value = 0.15;
      gain2.gain.value = 0.1;
      gain3.gain.value = 0.08;

      lfo.connect(lfoGain);
      lfoGain.connect(gain1.gain);
      lfoGain.connect(gain2.gain);

      osc1.connect(gain1);
      osc2.connect(gain2);
      osc3.connect(gain3);
      gain1.connect(analyser);
      gain2.connect(analyser);
      gain3.connect(analyser);
      analyser.connect(audioContext.destination);

      osc1.start(); osc2.start(); osc3.start(); lfo.start();

      // Slowly modulate frequencies
      function modulate() {
        const t = audioContext.currentTime;
        osc1.frequency.setValueAtTime(55 + Math.sin(t * 0.1) * 20, t);
        osc2.frequency.setValueAtTime(110 + Math.sin(t * 0.07) * 30, t);
        osc3.frequency.setValueAtTime(220 + Math.sin(t * 0.05) * 50, t);
        requestAnimationFrame(modulate);
      }
      modulate();

      audioSource = { stop() { osc1.stop(); osc2.stop(); osc3.stop(); lfo.stop(); } };
      autoGenerated = true;
    }

    function loadAudioFile(file) {
      initAudio();
      if (audioSource) { try { audioSource.stop(); } catch(e){} audioSource = null; }
      const reader = new FileReader();
      reader.onload = async (e) => {
        const buffer = await audioContext.decodeAudioData(e.target.result);
        const bufSource = audioContext.createBufferSource();
        bufSource.buffer = buffer;
        bufSource.loop = true;
        bufSource.connect(analyser);
        analyser.connect(audioContext.destination);
        bufSource.start();
        audioSource = bufSource;
        autoGenerated = false;
      };
      reader.readAsArrayBuffer(file);
    }

    function analyzeAudio() {
      if (!analyser || !dataArray) return;
      analyser.getByteFrequencyData(dataArray);
      const len = dataArray.length;

      // Bass: first ~10 bins
      let bassSum = 0;
      for (let i = 0; i < 10; i++) bassSum += dataArray[i];
      bassLevel = (bassSum / 10 / 255) * params.sensitivity;

      // Mid: bins 10-80
      let midSum = 0;
      for (let i = 10; i < 80; i++) midSum += dataArray[i];
      midLevel = (midSum / 70 / 255) * params.sensitivity;

      // High: bins 80+
      let highSum = 0;
      const highBins = len - 80;
      for (let i = 80; i < len; i++) highSum += dataArray[i];
      highLevel = (highSum / highBins / 255) * params.sensitivity;

      // Overall amplitude
      let total = 0;
      for (let i = 0; i < len; i++) total += dataArray[i];
      amplitude = (total / len / 255) * params.sensitivity;
    }

    // ─── UI Buttons ───────────────────────────────────────────────────────────
    const loadBtn = document.getElementById('loadBtn');
    const playBtn = document.getElementById('playBtn');
    const audioInput = document.getElementById('audioInput');

    loadBtn.addEventListener('click', () => audioInput.click());
    audioInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        loadAudioFile(e.target.files[0]);
        playBtn.textContent = 'Play';
        playBtn.classList.remove('playing');
      }
    });

    playBtn.addEventListener('click', () => {
      if (!audioContext) {
        createAutoAudio();
        playBtn.textContent = 'Playing Auto-Generated';
        playBtn.classList.add('playing');
      } else if (audioContext.state === 'running') {
        audioContext.suspend();
        playBtn.textContent = 'Paused';
        playBtn.classList.remove('playing');
      } else {
        audioContext.resume();
        playBtn.textContent = autoGenerated ? 'Playing Auto-Generated' : 'Playing';
        if (autoGenerated) playBtn.classList.add('playing');
      }
    });

    // ─── GUI ──────────────────────────────────────────────────────────────────
    const gui = new GUI();
    gui.add(params, 'sensitivity', 0.1, 4.0).name('Sensitivity');
    gui.add(params, 'bloomStrength', 0.1, 3.0).name('Bloom Strength').onChange(v => {
      bloomPass.strength = v;
    });
    gui.add(params, 'bloomRadius', 0.1, 1.5).name('Bloom Radius').onChange(v => {
      bloomPass.radius = v;
    });
    gui.add(params, 'rotationSpeed', 0.0, 3.0).name('Rotation Speed');
    gui.add(params, 'colorScheme', params.colorOptions).name('Color Scheme').onChange(applyColorScheme);

    applyColorScheme('Nebula');

    // ─── Animation ─────────────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animateStars(time) {
      analyzeAudio();

      // Lerp colors based on mid frequencies
      const scheme = colorSchemes[params.colorScheme];
      const cool = scheme.cool;
      const warm = scheme.warm;
      baseColor.lerpColors(cool, warm, midLevel);
      baseColor.lerp(targetColor, colorLerpFactor);

      for (let i = 0; i < STAR_COUNT; i++) {
        const d = starData[i];
        const sparkle = Math.sin(time * d.sparkleSpeed + d.phase);
        const highInfluence = highLevel * 2;
        const brightness = 0.3 + bassLevel * 0.7 + highInfluence * (sparkle * 0.5 + 0.5) * 0.5;

        const mat = new THREE.MeshBasicMaterial({
          color: baseColor.clone().lerp(new THREE.Color(0xffffff), highInfluence * 0.5),
          transparent: brightness < 0.3,
          opacity: Math.min(brightness, 1.0)
        });

        dummy.position.set(d.baseX, d.baseY, d.baseZ);
        const scaleBoost = 1 + bassLevel * 0.5 + midLevel * 0.3;
        const sparkleBoost = 1 + highInfluence * sparkle * 0.3;
        const s = d.originalScale * scaleBoost * sparkleBoost;
        dummy.scale.set(s, s, s);
        dummy.updateMatrix();
        starMesh.setMatrixAt(i, dummy.matrix);
      }
      starMesh.instanceMatrix.needsUpdate = true;
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      controls.update();

      // Galaxy rotation reacts to amplitude
      galaxyRotation += delta * (0.05 + amplitude * 0.3) * params.rotationSpeed;
      starMesh.rotation.y = galaxyRotation;
      dust.rotation.y = galaxyRotation * 0.7;

      // Core pulsation with bass
      const coreScale = 1 + bassLevel * 0.8;
      core.scale.setScalar(coreScale);
      coreGlow.scale.setScalar(coreScale * 2.5);
      coreGlowMat.opacity = 0.1 + bassLevel * 0.2;

      const scheme = colorSchemes[params.colorScheme];
      coreMat.color.lerpColors(scheme.core, new THREE.Color(0xffffff), bassLevel * 0.5);

      animateStars(elapsed);

      composer.render();
    }

    // ─── Resize ───────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      bloomPass.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Start ────────────────────────────────────────────────────────────────
    createAutoAudio();
    animate();
  </script>
</body>
</html>
