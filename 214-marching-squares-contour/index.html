<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marching Squares Contour Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #08080f; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #overlay {
      position: fixed;
      top: 16px; left: 16px;
      color: rgba(160, 190, 255, 0.65);
      font-size: 11px; line-height: 1.7;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(80, 120, 255, 0.4);
      user-select: none;
    }
    #overlay h1 {
      font-size: 13px; font-weight: normal;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 2px;
      color: rgba(200, 220, 255, 0.85);
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="overlay">
    <h1>Marching Squares</h1>
    <div>Click canvas to add sources &bull; Drag circles to move</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    // ─── Renderer & Scene ─────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.01, 10);
    camera.position.z = 1;

    window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight));

    // ─── Value Noise & FBM ────────────────────────────────────────────────────

    function hash2(ix, iy) {
      let n = ix + iy * 57;
      n = (ix * 17811 + iy * 35813 + 9177) | 0;
      let x = Math.sin(n) * 43758.5453123;
      return x - Math.floor(x);
    }

    function valueNoise(x, y) {
      const ix = Math.floor(x), iy = Math.floor(y);
      const fx = x - ix, fy = y - iy;
      const ux = fx * fx * (3 - 2 * fx);
      const uy = fy * fy * (3 - 2 * fy);
      const a = hash2(ix,     iy    );
      const b = hash2(ix + 1, iy    );
      const c = hash2(ix,     iy + 1);
      const d = hash2(ix + 1, iy + 1);
      return a + (b - a) * ux + (c - a) * uy + (d - b - c + a) * ux * uy;
    }

    function fbm(x, y, octaves = 5) {
      let v = 0, amp = 0.5, freq = 1;
      for (let i = 0; i < octaves; i++) {
        v += amp * valueNoise(x * freq, y * freq);
        amp *= 0.5; freq *= 2.0;
      }
      return v;
    }

    // ─── Noise Sources ─────────────────────────────────────────────────────────

    class NoiseSource {
      constructor(x, y, radius, strength) {
        this.x = x; this.y = y; this.radius = radius; this.strength = strength;
      }
      influence(nx, ny) {
        const dx = nx - this.x, dy = ny - this.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d >= this.radius) return 0;
        return this.strength * Math.cos((d / this.radius) * Math.PI * 0.5);
      }
    }

    const sources = [
      new NoiseSource(0.25, 0.35, 0.22,  1.0),
      new NoiseSource(0.65, 0.60, 0.18, -0.8),
      new NoiseSource(0.45, 0.75, 0.15,  0.7),
    ];

    // ─── Parameters ────────────────────────────────────────────────────────────

    const params = {
      thresholds:    [0.25, 0.40, 0.55, 0.70, 0.85],
      gridRes:       72,
      noiseScale:    3.5,
      bgIntensity:   0.10,
      lineWidth:     1.0,
      scheme:        'topo',
    };

    const SCHEMES = {
      topo:    ['#0d0d2b','#1a1a4e','#1f3a8f','#1565c0','#0d7dbd','#0097a7',
                '#00838f','#00695c','#2e7d32','#558b2f','#827717','#f9a825',
                '#e65100','#bf360c'],
      thermal: ['#1a0000','#4a0000','#8b0000','#c62828','#d84315','#ef6c00',
                '#f57c00','#fb8c00','#ffa000','#ffb300','#ffd600','#fff176'],
      ocean:   ['#001030','#003060','#005080','#0070a0','#0090c0','#00a8d4',
                '#00bcd4','#26c6da','#4dd0e1','#80deea','#b2ebf2','#e0f7fa'],
      plasma:  ['#0d0887','#3b049a','#7201a8','#9c179e','#bd3786','#ed7953',
                '#fca636','#f0f921'],
      viridis: ['#440154','#482878','#3e4a8a','#31688e','#26838f','#1f9e89',
                '#6cce5a','#b6de2b','#fee825'],
    };

    // ─── Scalar Field ─────────────────────────────────────────────────────────

    function sample(nx, ny) {
      let v = fbm(nx * params.noiseScale, ny * params.noiseScale, 5);
      for (const s of sources) v += s.influence(nx, ny);
      return Math.max(0, Math.min(1, v));
    }

    // ─── Marching Squares Lookup Table ─────────────────────────────────────────
    //
    // Cell corners:  v00=BL  v10=BR  v11=TR  v01=TL
    // Bit index: v00*8 + v10*4 + v11*2 + v01  (values 0–15)
    //
    // For each case, linearly interpolate along edges using threshold t:
    //   t_bot  = (th - v00) / (v10 - v00)
    //   t_right= (th - v10) / (v11 - v10)
    //   t_top  = (th - v01) / (v11 - v01)
    //   t_left = (th - v00) / (v01 - v00)
    //
    // Segments: [x1,y1, x2,y2] in unit cell coords (0=BL-corner, 1=TR-corner)
    //
    // Edge midpoints: bot=(0.5,0) right=(1,0.5) top=(0.5,1) left=(0,0.5)

    const MS = [
      [], // 0: 0000 – empty
      [[0.5,0, 1,0.5]],   // 1: 0001 – BR corner above  → bot→right
      [[0,0.5, 0.5,1]],   // 2: 0010 – TL corner above  → left→top
      [[0,0.5, 1,0.5]],   // 3: 0011 – left edge (bot+top above) → left→right
      [[0.5,1, 1,0.5]],   // 4: 0100 – TR corner above  → top→right
      [[0.5,0, 0,0.5]],   // 5: 0101 – saddle BL+TR above → bot→left
      [[0.5,0, 1,0.5]],   // 6: 0110 – bot edge (v10 above) → bot→right
      [[0,0.5, 0.5,0]],   // 7: 0111 – top+left edge → left→bot
      [[0.5,1, 0,0.5]],   // 8: 1000 – BL corner above  → top→left
      [[0.5,1, 1,0.5]],   // 9: 1001 – right+left edge → top→right
      [[0.5,1, 0.5,0]],   // 10: 1010 – saddle BL+TR above (mirror) → top→bot
      [[1,0.5, 0,0.5]],   // 11: 1011 – right edge (v01+v10 above) → right→left
      [[0,0.5, 0.5,1]],   // 12: 1100 – right edge (v11+v01 above) → left→top
      [[0.5,0, 0,0.5]],   // 13: 1101 – bot edge (v00+v10 above) → bot→left
      [[0.5,0, 1,0.5]],   // 14: 1110 – right+top edge → bot→right
      [], // 15: 1111 – empty
    ];

    function marchingSquares(res, th) {
      const segs = [], step = 1 / res;
      for (let j = 0; j < res; j++) {
        for (let i = 0; i < res; i++) {
          const x0 = i * step, y0 = j * step;
          const x1 = x0 + step, y1 = y0 + step;

          // Corner values
          const v00 = sample(x0, y0), v10 = sample(x1, y0);
          const v11 = sample(x1, y1), v01 = sample(x0, y1);

          const idx = (v00 >= th ? 8 : 0) | (v10 >= th ? 4 : 0) |
                      (v11 >= th ? 2 : 0) | (v01 >= th ? 1 : 0);
          const segCoords = MS[idx];

          for (const [lx1, ly1, lx2, ly2] of segCoords) {
            segs.push(x0 + lx1 * step, y0 + ly1 * step,
                      x0 + lx2 * step, y0 + ly2 * step);
          }
        }
      }
      return segs;
    }

    // ─── Background Grid ───────────────────────────────────────────────────────

    const gridGeo = new THREE.BufferGeometry();
    const gridMat = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.DoubleSide });
    const gridMesh = new THREE.Mesh(gridGeo, gridMat);
    scene.add(gridMesh);

    function buildGrid() {
      const R = params.gridRes;
      const pos = new Float32Array(R * R * 3);
      const col = new Float32Array(R * R * 3);
      const palette = SCHEMES[params.scheme];

      for (let j = 0; j < R; j++) {
        for (let i = 0; i < R; i++) {
          const nx = i / (R - 1), ny = j / (R - 1);
          const val = sample(nx, ny);
          const ci = Math.min(Math.floor(val * palette.length), palette.length - 1);
          const c = new THREE.Color(palette[ci]);
          const idx = j * R + i;
          pos[idx*3]   = nx * 2 - 1;
          pos[idx*3+1] = ny * 2 - 1;
          pos[idx*3+2] = 0;
          const bright = params.bgIntensity + val * (1 - params.bgIntensity);
          col[idx*3]   = c.r * bright;
          col[idx*3+1] = c.g * bright;
          col[idx*3+2] = c.b * bright;
        }
      }

      const idxArr = [];
      for (let j = 0; j < R - 1; j++) {
        for (let i = 0; i < R - 1; i++) {
          const a = j * R + i, b = j * R + i + 1;
          const c = (j + 1) * R + i + 1, d = (j + 1) * R + i;
          idxArr.push(a, b, c, a, c, d);
        }
      }

      gridGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      gridGeo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
      gridGeo.setIndex(idxArr);
      gridGeo.computeVertexNormals();
    }

    // ─── Contour Lines ─────────────────────────────────────────────────────────

    const CONTOUR_COLORS = [
      new THREE.Color('#00e5ff'),
      new THREE.Color('#69ff47'),
      new THREE.Color('#ffea00'),
      new THREE.Color('#ff6d00'),
      new THREE.Color('#d500f9'),
    ];

    const contourGroups = [];

    function buildContours() {
      for (const g of contourGroups) scene.remove(g);
      contourGroups.length = 0;

      params.thresholds.forEach((th, ti) => {
        const segs = marchingSquares(params.gridRes, th);
        if (!segs.length) return;

        const verts = new Float32Array(segs.length / 2 * 3);
        for (let i = 0; i < segs.length / 2; i++) {
          verts[i*6]   = segs[i*4]   * 2 - 1;
          verts[i*6+1] = segs[i*4+1] * 2 - 1;
          verts[i*6+2] = 0;
          verts[i*6+3] = segs[i*4+2] * 2 - 1;
          verts[i*6+4] = segs[i*4+3] * 2 - 1;
          verts[i*6+5] = 0;
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
        const color = CONTOUR_COLORS[ti % CONTOUR_COLORS.length];
        const mat = new THREE.LineBasicMaterial({ color, linewidth: params.lineWidth });
        const lines = new THREE.LineSegments(geo, mat);
        lines.position.z = 0.005 * (ti + 1);

        const grp = new THREE.Group();
        grp.add(lines);
        scene.add(grp);
        contourGroups.push(grp);
      });
    }

    // ─── Source Markers ───────────────────────────────────────────────────────

    const markerGroup = new THREE.Group();
    scene.add(markerGroup);

    function buildMarkers() {
      while (markerGroup.children.length) markerGroup.remove(markerGroup.children[0]);
      sources.forEach((src, i) => {
        const dotColor = src.strength > 0 ? 0x00e676 : 0xff1744;
        const dot = new THREE.Mesh(
          new THREE.CircleGeometry(0.013, 32),
          new THREE.MeshBasicMaterial({ color: dotColor })
        );
        dot.position.set(src.x * 2 - 1, src.y * 2 - 1, 0.05);
        dot.userData.idx = i;
        markerGroup.add(dot);

        const ring = new THREE.Mesh(
          new THREE.RingGeometry(0.015, 0.020, 32),
          new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide })
        );
        ring.position.set(src.x * 2 - 1, src.y * 2 - 1, 0.06);
        ring.userData.idx = i;
        markerGroup.add(ring);
      });
    }

    // ─── Interaction ───────────────────────────────────────────────────────────

    const raycaster = new THREE.Raycaster();
    const ptr = new THREE.Vector2();
    let dragIdx = null;

    function ndcToField(px, py) {
      return { x: (px + 1) / 2, y: (py + 1) / 2 };
    }

    renderer.domElement.addEventListener('pointerdown', e => {
      ptr.set(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
      );
      raycaster.setFromCamera(ptr, camera);
      const hits = raycaster.intersectObjects(markerGroup.children);
      if (hits.length) {
        dragIdx = hits[0].object.userData.idx;
      } else {
        const { x, y } = ndcToField(ptr.x, ptr.y);
        sources.push(new NoiseSource(
          x, y, 0.18,
          (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random() * 0.8)
        ));
        buildMarkers();
        scheduleRebuild();
      }
    });

    renderer.domElement.addEventListener('pointermove', e => {
      if (dragIdx === null) return;
      ptr.set(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
      );
      const { x, y } = ndcToField(ptr.x, ptr.y);
      sources[dragIdx].x = x;
      sources[dragIdx].y = y;
      buildMarkers();
      scheduleRebuild();
    });

    renderer.domElement.addEventListener('pointerup', () => { dragIdx = null; });

    // ─── Rebuild Scheduler ─────────────────────────────────────────────────────

    let rebuildTimer = null;
    function scheduleRebuild() {
      if (rebuildTimer) clearTimeout(rebuildTimer);
      rebuildTimer = setTimeout(() => { buildGrid(); buildContours(); }, 20);
    }

    // ─── GUI ───────────────────────────────────────────────────────────────────

    const gui = new GUI({ title: 'Contour Controls' });

    const fThresh = gui.addFolder('Thresholds');
    params.thresholds.forEach((_, i) => {
      fThresh.add(params.thresholds, i, 0, 1, 0.01)
        .name(`Level ${i + 1}`)
        .onChange(scheduleRebuild);
    });
    fThresh.open();

    const fVis = gui.addFolder('Visualization');
    fVis.add(params, 'gridRes', 24, 140, 1).name('Grid Res').onChange(scheduleRebuild);
    fVis.add(params, 'noiseScale', 1, 12, 0.1).name('Noise Scale').onChange(scheduleRebuild);
    fVis.add(params, 'bgIntensity', 0, 0.5, 0.01).name('BG Brightness').onChange(scheduleRebuild);
    fVis.add(params, 'lineWidth', 0.5, 4, 0.1).name('Line Width').onChange(scheduleRebuild);
    fVis.add(params, 'scheme', Object.keys(SCHEMES)).name('Color Scheme').onChange(scheduleRebuild);
    fVis.open();

    // ─── Initial Build ────────────────────────────────────────────────────────

    buildGrid();
    buildContours();
    buildMarkers();

    // ─── Render Loop ───────────────────────────────────────────────────────────

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    // ─── Debug Exports ─────────────────────────────────────────────────────────

    window.THREE = THREE;
    window.scene = scene;
    window.camera = camera;
    window.renderer = renderer;
    window.params = params;
    window.sources = sources;
    window.buildGrid = buildGrid;
    window.buildContours = buildContours;
    window.scheduleRebuild = scheduleRebuild;

    console.log('[MarchingSquares] ready. window.params / window.sources for debugging.');
  </script>
</body>
</html>
