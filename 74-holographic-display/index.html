<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>74 · 全息投影 Holographic Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    canvas { display: block; }
    #tip {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 20, 30, 0.75);
      border: 1px solid rgba(0, 255, 220, 0.3);
      color: rgba(0, 220, 200, 0.9);
      padding: 14px 18px;
      font-size: 12px;
      line-height: 2;
      pointer-events: none;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 20px rgba(0, 255, 220, 0.1), inset 0 0 20px rgba(0, 255, 220, 0.03);
    }
    #tip span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: rgba(0, 255, 220, 0.7);
      margin-right: 8px;
      box-shadow: 0 0 6px rgba(0, 255, 220, 0.8);
    }
  </style>
</head>
<body>
<div id="tip">
  <span></span>透明平面投影 &nbsp;/&nbsp; 菲涅尔边缘发光<br>
  <span></span>扫描线纹理 &nbsp;/&nbsp; Pepper's Ghost<br>
  <span></span>数字飘落粒子 &nbsp;/&nbsp; 网格叠加
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import GUI from 'three/addons/libs/lil-gui.module.min.js';

// ── Renderer ──────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ── Scene & Camera ────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000508);
scene.fog = new THREE.FogExp2(0x000508, 0.08);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 6);
camera.lookAt(0, 1, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.maxPolarAngle = Math.PI * 0.75;
controls.minDistance = 2;
controls.maxDistance = 12;

// ── Hologram Scene (rendered to texture) ──────────────────────────────────
const holoScene = new THREE.Scene();
const holoCamera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
holoCamera.position.set(0, 1.5, 5);
holoCamera.lookAt(0, 1, 0);

const holoRT = new THREE.WebGLRenderTarget(
  window.innerWidth,
  window.innerHeight,
  { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter }
);

// ── Parameters ─────────────────────────────────────────────────────────────
const params = {
  opacity: 0.22,
  scanlineIntensity: 0.8,
  glitchAmount: 0.06,
  glitchFrequency: 0.3,
  fresnelIntensity: 1.2,
  flickerSpeed: 40,
  color: '#00ffee',
  rotationSpeed: 0.4,
  showParticles: true,
  showPyramid: true,
  bloomStrength: 1.5,
  bloomRadius: 0.6,
  bloomThreshold: 0.1,
};

// ── Holographic ShaderMaterial ────────────────────────────────────────────
const holoVert = /* glsl */`
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewDir;
  void main() {
    vUv = uv;
    vNormal = normalize(normalMatrix * normal);
    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
    vViewDir = normalize(-mvPos.xyz);
    gl_Position = projectionMatrix * mvPos;
  }
`;

const holoFrag = /* glsl */`
  uniform sampler2D uHoloTexture;
  uniform float uTime;
  uniform float uOpacity;
  uniform float uScanlineIntensity;
  uniform float uGlitchAmount;
  uniform float uGlitchFreq;
  uniform float uFresnelIntensity;
  uniform float uFlickerSpeed;
  uniform vec3 uColor;

  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewDir;

  float random(vec2 p) {
    return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
  }

  void main() {
    vec2 uv = vUv;

    // Glitch effect
    float glitchTick = step(1.0 - uGlitchFreq, random(vec2(floor(uTime * 8.0), floor(uv.y * 30.0))));
    float glitchOffset = (random(vec2(floor(uTime * 12.0), 1.0)) - 0.5) * uGlitchAmount * glitchTick;
    uv.x += glitchOffset;

    // Band glitch
    float bandY = floor(uv.y * 8.0) / 8.0;
    float bandGlitch = step(0.97, random(vec2(bandY, floor(uTime * 4.0))));
    uv.x += bandGlitch * 0.15;

    vec4 tex = texture2D(uHoloTexture, clamp(uv, 0.0, 1.0));

    // Color tint
    vec3 col = tex.rgb * uColor;

    // Scanlines
    float scanline = sin(vUv.y * 400.0 + uTime * 2.0) * 0.07 * uScanlineIntensity;
    col -= scanline;

    // Coarser scanlines
    float coarseScan = sin(vUv.y * 80.0) * 0.04 * uScanlineIntensity;
    col -= coarseScan;

    // Horizontal sync wave
    float wave = sin(vUv.y * 50.0 - uTime * 3.0) * 0.02;
    col += wave * uScanlineIntensity;

    // Fresnel rim glow
    float fresnel = pow(1.0 - max(dot(vNormal, vViewDir), 0.0), 2.5);
    col += fresnel * uFresnelIntensity * uColor;

    // Flicker
    float flicker = 0.97 + 0.03 * sin(uTime * uFlickerSpeed + 1.0)
                         + 0.02 * sin(uTime * uFlickerSpeed * 1.7 + 3.0);
    col *= flicker;

    // Random flicker burst
    float burst = step(0.995, random(vec2(floor(uTime * 30.0), 0.0)));
    col *= 1.0 - burst * 0.3;

    // Depth fade (bottom of plane is more transparent)
    float depthFade = mix(0.3, 1.0, vUv.y);

    // Grid overlay
    float gx = step(0.95, fract(vUv.x * 20.0));
    float gy = step(0.95, fract(vUv.y * 20.0));
    float grid = max(gx, gy) * 0.15 * uColor;
    col += grid;

    // Edge vignette
    vec2 vig = vUv * (1.0 - vUv);
    float vignette = vig.x * vig.y * 15.0;
    vignette = pow(vignette, 0.25);

    float alpha = uOpacity * tex.a * depthFade * vignette;
    alpha = clamp(alpha, 0.0, 1.0);

    gl_FragColor = vec4(col, alpha);
  }
`;

const holoUniforms = {
  uHoloTexture:    { value: holoRT.texture },
  uTime:           { value: 0 },
  uOpacity:        { value: params.opacity },
  uScanlineIntensity: { value: params.scanlineIntensity },
  uGlitchAmount:   { value: params.glitchAmount },
  uGlitchFreq:     { value: params.glitchFrequency },
  uFresnelIntensity: { value: params.fresnelIntensity },
  uFlickerSpeed:   { value: params.flickerSpeed },
  uColor:          { value: new THREE.Color(params.color) },
};

const holoMat = new THREE.ShaderMaterial({
  uniforms: holoUniforms,
  vertexShader: holoVert,
  fragmentShader: holoFrag,
  transparent: true,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});

// ── Hologram Object (inside the pyramid) ──────────────────────────────────
function createHologramObject() {
  const group = new THREE.Group();

  // DNA Helix parameters
  const helixCount = 40;
  const helixRadius = 0.4;
  const helixHeight = 3.5;
  const twist = 3.0;

  // Two intertwined spirals
  const sphereGeo = new THREE.SphereGeometry(0.06, 8, 6);
  const sphereMat = new THREE.MeshBasicMaterial({
    color: 0x00ffee,
    transparent: true,
    opacity: 0.9,
  });

  for (let i = 0; i < helixCount; i++) {
    const t = i / (helixCount - 1);
    const angle = t * Math.PI * 2 * twist;
    const y = t * helixHeight - helixHeight * 0.2;

    // Strand A
    const ax = Math.cos(angle) * helixRadius;
    const az = Math.sin(angle) * helixRadius;
    const sphereA = new THREE.Mesh(sphereGeo, sphereMat.clone());
    sphereA.position.set(ax, y, az);
    group.add(sphereA);

    // Strand B
    const bx = Math.cos(angle + Math.PI) * helixRadius;
    const bz = Math.sin(angle + Math.PI) * helixRadius;
    const sphereB = new THREE.Mesh(sphereGeo, sphereMat.clone());
    sphereB.position.set(bx, y, bz);
    group.add(sphereB);

    // Rungs
    if (i % 2 === 0) {
      const rungGeo = new THREE.CylinderGeometry(0.015, 0.015, helixRadius * 2, 4);
      const rungMat = new THREE.MeshBasicMaterial({ color: 0x00ffee, transparent: true, opacity: 0.4 });
      const rung = new THREE.Mesh(rungGeo, rungMat);
      rung.position.set(0, y, 0);
      rung.rotation.z = Math.PI / 2;
      rung.rotation.y = -angle;
      group.add(rung);
    }
  }

  // Central energy core - nested platonic solids
  const coreGroup = new THREE.Group();
  const coreMat = new THREE.MeshBasicMaterial({ color: 0x00ffee, wireframe: true, transparent: true, opacity: 0.5 });

  const tetra = new THREE.Mesh(new THREE.TetrahedronGeometry(0.3), coreMat);
  coreGroup.add(tetra);

  const octa = new THREE.Mesh(new THREE.OctahedronGeometry(0.22), coreMat.clone());
  octa.material.opacity = 0.3;
  coreGroup.add(octa);

  const ico = new THREE.Mesh(new THREE.IcosahedronGeometry(0.15), coreMat.clone());
  ico.material.opacity = 0.25;
  coreGroup.add(ico);

  coreGroup.position.y = helixHeight / 2 - helixHeight * 0.2;
  group.add(coreGroup);
  group.userData.coreGroup = coreGroup;

  return group;
}

const holoObject = createHologramObject();
holoObject.position.y = 0.2;
holoScene.add(holoObject);

// ── Ambient particles in hologram scene ───────────────────────────────────
function createParticles() {
  const count = 200;
  const positions = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 0.8 + Math.random() * 1.5;
    positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta) * 0.5 + 1;
    positions[i * 3 + 2] = r * Math.cos(phi);
    sizes[i] = Math.random() * 2 + 0.5;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  const mat = new THREE.PointsMaterial({
    color: 0x00ffee,
    size: 0.04,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  return new THREE.Points(geo, mat);
}
const particles = createParticles();
holoScene.add(particles);

// ── Floating digital rain in hologram scene ────────────────────────────────
function createDigitalRain() {
  const count = 60;
  const drops = [];
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEF';
  for (let i = 0; i < count; i++) {
    const geo = new THREE.PlaneGeometry(0.05, 0.12 + Math.random() * 0.2);
    const canvas = document.createElement('canvas');
    canvas.width = 32;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,255,238,0.9)';
    ctx.font = '16px monospace';
    ctx.fillText(chars[Math.floor(Math.random() * chars.length)], 4, 20);
    const tex = new THREE.CanvasTexture(canvas);
    const mat = new THREE.MeshBasicMaterial({
      map: tex,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      opacity: 0.3 + Math.random() * 0.4,
    });
    const mesh = new THREE.Mesh(geo, mat);
    const angle = Math.random() * Math.PI * 2;
    const radius = 0.5 + Math.random() * 1.2;
    mesh.position.set(
      Math.cos(angle) * radius,
      Math.random() * 4 - 0.5,
      Math.sin(angle) * radius
    );
    mesh.userData.speed = 0.01 + Math.random() * 0.03;
    mesh.userData.phase = Math.random() * Math.PI * 2;
    holoScene.add(mesh);
    drops.push(mesh);
  }
  return drops;
}
const digitalRain = createDigitalRain();

// ── Pepper's Ghost pyramid planes ─────────────────────────────────────────
const pyramidGroup = new THREE.Group();
scene.add(pyramidGroup);

const planeGeo = new THREE.PlaneGeometry(2.8, 2.8);
const pyramidAngles = [
  { y: Math.PI / 4,       x: -0.35 },
  { y: -Math.PI / 4,      x: -0.35 },
  { y: Math.PI / 4 + Math.PI / 2, x: -0.35 },
  { y: -Math.PI / 4 + Math.PI / 2, x: -0.35 },
];

const pyramidPlanes = [];
pyramidAngles.forEach((angle, i) => {
  const mat = holoMat.clone();
  mat.uniforms = JSON.parse(JSON.stringify(holoUniforms));
  // reassign uniforms by reference
  const baseUniforms = {
    uHoloTexture:      { value: holoRT.texture },
    uTime:             { value: 0 },
    uOpacity:          { value: params.opacity },
    uScanlineIntensity:{ value: params.scanlineIntensity },
    uGlitchAmount:     { value: params.glitchAmount },
    uGlitchFreq:       { value: params.glitchFrequency },
    uFresnelIntensity: { value: params.fresnelIntensity },
    uFlickerSpeed:     { value: params.flickerSpeed },
    uColor:            { value: new THREE.Color(params.color) },
  };
  mat.uniforms = baseUniforms;
  const plane = new THREE.Mesh(planeGeo, mat);
  plane.rotation.y = angle.y;
  plane.rotation.x = angle.x;
  plane.position.y = 0.8;
  pyramidGroup.add(plane);
  pyramidPlanes.push(plane);
});

// Bottom plane (reflective floor hint)
const floorGeo = new THREE.PlaneGeometry(2.8, 2.8);
const floorMat = new THREE.MeshBasicMaterial({
  color: 0x00ffee,
  transparent: true,
  opacity: 0.05,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const floorPlane = new THREE.Mesh(floorGeo, floorMat);
floorPlane.rotation.x = -Math.PI / 2;
floorPlane.position.y = -0.8;
pyramidGroup.add(floorPlane);

// ── Outer scene decorative elements ────────────────────────────────────────

// Grid floor
const gridHelper = new THREE.GridHelper(20, 40, 0x003333, 0x001a1a);
gridHelper.position.y = -0.8;
scene.add(gridHelper);

// Holographic rings around pyramid
const ringGeo = new THREE.TorusGeometry(2.2, 0.008, 8, 64);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0x00ffee,
  transparent: true,
  opacity: 0.15,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
for (let i = 0; i < 3; i++) {
  const ring = new THREE.Mesh(ringGeo, ringMat.clone());
  ring.rotation.x = Math.PI / 2;
  ring.position.y = 0.3 + i * 0.6;
  ring.userData.baseOpacity = 0.08 + i * 0.04;
  scene.add(ring);
}
const rings = scene.children.filter(c => c.isMesh && c.geometry && c.geometry.type === 'TorusGeometry');

// Outer ambient light
const ambientLight = new THREE.AmbientLight(0x001122, 0.5);
scene.add(ambientLight);

// Point lights for atmosphere
const ptLight1 = new THREE.PointLight(0x00ffee, 2, 8);
ptLight1.position.set(2, 3, 2);
scene.add(ptLight1);

const ptLight2 = new THREE.PointLight(0x0044ff, 1, 8);
ptLight2.position.set(-2, 2, -2);
scene.add(ptLight2);

// ── Post-processing ────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  params.bloomStrength,
  params.bloomRadius,
  params.bloomThreshold
);
composer.addPass(bloomPass);

// ── GUI ────────────────────────────────────────────────────────────────────
const gui = new GUI({ title: 'Holographic Display' });
gui.add(params, 'opacity', 0.05, 0.5, 0.01).name('Opacity').onChange(v => {
  pyramidPlanes.forEach(p => { p.material.uniforms.uOpacity.value = v; });
});
gui.add(params, 'scanlineIntensity', 0, 1.5, 0.05).name('Scanlines').onChange(v => {
  pyramidPlanes.forEach(p => { p.material.uniforms.uScanlineIntensity.value = v; });
});
gui.add(params, 'glitchAmount', 0, 0.2, 0.005).name('Glitch Amount').onChange(v => {
  pyramidPlanes.forEach(p => { p.material.uniforms.uGlitchAmount.value = v; });
});
gui.add(params, 'glitchFrequency', 0, 1, 0.05).name('Glitch Freq').onChange(v => {
  pyramidPlanes.forEach(p => { p.material.uniforms.uGlitchFreq.value = v; });
});
gui.add(params, 'fresnelIntensity', 0, 3, 0.1).name('Fresnel Glow').onChange(v => {
  pyramidPlanes.forEach(p => { p.material.uniforms.uFresnelIntensity.value = v; });
});
gui.add(params, 'flickerSpeed', 5, 80, 1).name('Flicker Speed').onChange(v => {
  pyramidPlanes.forEach(p => { p.material.uniforms.uFlickerSpeed.value = v; });
});
gui.addColor(params, 'color').name('Holo Color').onChange(v => {
  const c = new THREE.Color(v);
  pyramidPlanes.forEach(p => { p.material.uniforms.uColor.value = c; });
});
gui.add(params, 'rotationSpeed', 0, 2, 0.05).name('Rotation');
gui.add(params, 'bloomStrength', 0, 3, 0.1).name('Bloom').onChange(v => {
  bloomPass.strength = v;
});
gui.add(params, 'bloomRadius', 0, 1.5, 0.05).name('Bloom Radius').onChange(v => {
  bloomPass.radius = v;
});
gui.add(params, 'bloomThreshold', 0, 0.5, 0.02).name('Bloom Thresh').onChange(v => {
  bloomPass.threshold = v;
});
gui.add(params, 'showPyramid').name('Show Pyramid').onChange(v => {
  pyramidGroup.visible = v;
});

// ── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  holoCamera.aspect = window.innerWidth / window.innerHeight;
  holoCamera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  holoRT.setSize(window.innerWidth, window.innerHeight);
});

// ── Animate ────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();

  // Update hologram scene uniforms
  pyramidPlanes.forEach(p => {
    p.material.uniforms.uTime.value = elapsed;
  });

  // Rotate hologram object
  holoObject.rotation.y = elapsed * params.rotationSpeed;
  holoObject.rotation.x = Math.sin(elapsed * 0.3) * 0.15;

  // Rotate core solids
  if (holoObject.userData.coreGroup) {
    holoObject.userData.coreGroup.rotation.y = elapsed * 1.5;
    holoObject.userData.coreGroup.rotation.x = elapsed * 0.8;
  }

  // Rotate particles
  particles.rotation.y = elapsed * 0.2;

  // Digital rain
  if (params.showParticles) {
    digitalRain.forEach(drop => {
      drop.position.y -= drop.userData.speed;
      if (drop.position.y < -1) {
        drop.position.y = 3.5;
        drop.position.x = (Math.random() - 0.5) * 3;
        drop.position.z = (Math.random() - 0.5) * 3;
      }
      drop.material.opacity = 0.2 + 0.3 * Math.sin(elapsed * 2 + drop.userData.phase);
    });
  }

  // Animate rings
  rings.forEach((ring, i) => {
    ring.rotation.z = elapsed * (0.3 + i * 0.2);
    ring.material.opacity = ring.userData.baseOpacity * (0.8 + 0.2 * Math.sin(elapsed * 2 + i));
  });

  // Pyramid subtle oscillation
  pyramidGroup.rotation.y = Math.sin(elapsed * 0.3) * 0.03;

  controls.update();

  // Render hologram scene to texture
  holoCamera.position.x = Math.sin(elapsed * 0.15) * 0.5;
  holoCamera.lookAt(0, 1, 0);
  renderer.setRenderTarget(holoRT);
  renderer.clear();
  renderer.render(holoScene, holoCamera);
  renderer.setRenderTarget(null);

  // Render main scene with post-processing
  composer.render();
}

animate();
</script>
</body>
</html>
