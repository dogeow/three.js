<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Solar System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    .tip {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: rgba(200,220,255,0.9);
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 14px;
      letter-spacing: 0.5px;
      pointer-events: none;
      border: 1px solid rgba(100,150,255,0.2);
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .planet-label {
      color: rgba(200,230,255,0.85);
      font-size: 13px;
      font-family: 'Segoe UI', sans-serif;
      font-weight: 500;
      letter-spacing: 1px;
      text-shadow: 0 0 6px rgba(100,180,255,0.6);
      pointer-events: none;
      padding: 2px 6px;
      white-space: nowrap;
    }
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(150,200,255,0.8);
      font-size: 18px;
      letter-spacing: 2px;
      z-index: 100;
      transition: opacity 0.8s;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loading">加载中...</div>
  <div class="tip">探索太阳系：拖拽旋转视角，滚轮缩放</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
    import GUI from 'https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js';

    // ─── Scene Setup ──────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
    camera.position.set(0, 80, 200);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'fixed';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 20;
    controls.maxDistance = 1500;

    // ─── Starfield ────────────────────────────────────────────────────────────
    function createStarfield() {
      const count = 5000;
      const positions = new Float32Array(count * 3);
      const sizes = new Float32Array(count);
      for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = 1500 + Math.random() * 2000;
        positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
        sizes[i] = 0.5 + Math.random() * 2.5;
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
      const mat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 1.5,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.85,
      });
      return new THREE.Points(geo, mat);
    }
    scene.add(createStarfield());

    // ─── Lighting ─────────────────────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0x111122, 0.4);
    scene.add(ambientLight);

    // ─── Sun ───────────────────────────────────────────────────────────────────
    const SUN_DATA = { radius: 12, color: 0xffcc44 };

    function createSun() {
      const geo = new THREE.SphereGeometry(SUN_DATA.radius, 64, 64);
      const mat = new THREE.MeshBasicMaterial({ color: SUN_DATA.color });
      const sun = new THREE.Mesh(geo, mat);
      sun.castShadow = false;

      // Corona / glow sprite
      const glowCanvas = document.createElement('canvas');
      glowCanvas.width = glowCanvas.height = 256;
      const ctx = glowCanvas.getContext('2d');
      const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
      grad.addColorStop(0, 'rgba(255,220,100,1)');
      grad.addColorStop(0.3, 'rgba(255,160,50,0.6)');
      grad.addColorStop(1, 'rgba(255,100,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 256, 256);
      const glowTex = new THREE.CanvasTexture(glowCanvas);
      const glowMat = new THREE.SpriteMaterial({ map: glowTex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
      const glow = new THREE.Sprite(glowMat);
      glow.scale.set(55, 55, 1);
      sun.add(glow);

      const light = new THREE.PointLight(0xfff5e0, 3, 2000, 1.2);
      light.castShadow = true;
      light.shadow.mapSize.set(1024, 1024);
      sun.add(light);

      const labelDiv = document.createElement('div');
      labelDiv.className = 'planet-label';
      labelDiv.textContent = '太阳';
      const label = new CSS2DObject(labelDiv);
      label.position.set(0, SUN_DATA.radius + 3, 0);
      sun.add(label);

      scene.add(sun);
      return sun;
    }
    const sunMesh = createSun();

    // ─── Planet Data ───────────────────────────────────────────────────────────
    const PLANET_DATA = [
      { name: '水星', color: 0x9E9E9E, radius: 1.2, orbitRadius: 24,  speed: 0.80,  rotSpeed: 0.010, emissive: 0x111111 },
      { name: '金星', color: 0xE8C46A, radius: 2.4, orbitRadius: 36,  speed: 0.58,  rotSpeed: 0.005, emissive: 0x221100 },
      { name: '地球', color: 0x3A7BD5, radius: 2.6, orbitRadius: 52,  speed: 0.42,  rotSpeed: 0.020, emissive: 0x001122 },
      { name: '火星', color: 0xC1440E, radius: 1.8, orbitRadius: 68,  speed: 0.32,  rotSpeed: 0.022, emissive: 0x110500 },
      { name: '木星', color: 0xC88B3A, radius: 7.0, orbitRadius: 100, speed: 0.14,  rotSpeed: 0.050, emissive: 0x221000, moons: 4 },
      { name: '土星', color: 0xE4D191, radius: 5.8, orbitRadius: 135, speed: 0.10,  rotSpeed: 0.045, emissive: 0x221800, ring: true },
      { name: '天王星', color: 0x7FDBDA, radius: 3.6, orbitRadius: 165, speed: 0.07, rotSpeed: 0.030, emissive: 0x002222 },
      { name: '海王星', color: 0x4B70DD, radius: 3.4, orbitRadius: 192, speed: 0.05, rotSpeed: 0.028, emissive: 0x000811 },
    ];

    // ─── Orbit Line ────────────────────────────────────────────────────────────
    function createOrbitLine(radius) {
      const pts = [];
      const segs = 256;
      for (let i = 0; i <= segs; i++) {
        const a = (i / segs) * Math.PI * 2;
        pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
      }
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineBasicMaterial({ color: 0x6688bb, transparent: true, opacity: 0.25 });
      return new THREE.Line(geo, mat);
    }

    // ─── Planet Factory ────────────────────────────────────────────────────────
    const planetRefs = {};
    const orbitLines = [];
    const moonOrbitLines = [];

    function makeLabel(name) {
      const d = document.createElement('div');
      d.className = 'planet-label';
      d.textContent = name;
      return new CSS2DObject(d);
    }

    function createPlanetMoon(parentMesh, orbitRadius, size, color, speed, name) {
      const geo = new THREE.SphereGeometry(size, 24, 24);
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8, metalness: 0.1 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      const pivot = new THREE.Object3D();
      const label = makeLabel(name);
      label.position.set(0, size + 1.5, 0);
      mesh.add(label);

      mesh.position.x = orbitRadius;
      pivot.add(mesh);

      // Moon orbit line
      const moonOrbit = createOrbitLine(orbitRadius);
      moonOrbit.material = new THREE.LineBasicMaterial({ color: 0x4466aa, transparent: true, opacity: 0.2 });
      pivot.add(moonOrbit);
      moonOrbitLines.push(moonOrbit);

      parentMesh.add(pivot);
      return { mesh, pivot, speed };
    }

    PLANET_DATA.forEach(p => {
      const geo = new THREE.SphereGeometry(p.radius, 48, 48);
      const mat = new THREE.MeshStandardMaterial({
        color: p.color,
        roughness: 0.7,
        metalness: 0.15,
        emissive: new THREE.Color(p.emissive),
        emissiveIntensity: 0.3,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      const pivot = new THREE.Object3D();
      mesh.position.x = p.orbitRadius;
      pivot.add(mesh);

      const orbitLine = createOrbitLine(p.orbitRadius);
      scene.add(orbitLine);
      orbitLines.push(orbitLine);

      const label = makeLabel(p.name);
      label.position.set(0, p.radius + 3, 0);
      mesh.add(label);

      // Saturn ring
      if (p.ring) {
        const ringGeo = new THREE.RingGeometry(p.radius * 1.35, p.radius * 2.3, 80);
        // Fix UVs for ring so texture maps correctly
        const pos = ringGeo.attributes.position;
        const uv  = ringGeo.attributes.uv;
        const v3  = new THREE.Vector3();
        for (let i = 0; i < pos.count; i++) {
          v3.fromBufferAttribute(pos, i);
          const a = Math.atan2(v3.z, v3.x);
          uv.setXY(i, (v3.length() - p.radius * 1.35) / (p.radius * 0.95), (a + Math.PI) / (Math.PI * 2));
        }
        // Simple procedural ring texture
        const ringCanvas = document.createElement('canvas');
        ringCanvas.width = ringCanvas.height = 512;
        const rctx = ringCanvas.getContext('2d');
        for (let band = 0; band < 18; band++) {
          const alpha = 0.3 + Math.random() * 0.5;
          const w = 4 + Math.random() * 16;
          rctx.fillStyle = `rgba(210,190,130,${alpha})`;
          const y = band * (512 / 18);
          rctx.fillRect(0, y, 512, w);
        }
        const ringTex = new THREE.CanvasTexture(ringCanvas);
        const ringMat = new THREE.MeshBasicMaterial({
          map: ringTex,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.85,
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2.2;
        ring.rotation.z = 0.15;
        mesh.add(ring);
      }

      // Earth moon
      if (p.name === '地球') {
        const moon = createPlanetMoon(mesh, 5.5, 0.7, 0xBBBBBB, 1.2, '月球');
        mesh.userData.moonPivot = moon.pivot;
        moon.pivot.rotation.x = 0.3;
      }

      // Jupiter moons
      if (p.name === '木星') {
        const jMoonData = [
          { name: 'Io',     dist: 10,  size: 0.55, speed: 2.5 },
          { name: 'Europa', dist: 13,  size: 0.5,  speed: 1.8 },
          { name: 'Ganymede',dist: 16, size: 0.75, speed: 1.2 },
          { name: 'Callisto',dist: 20, size: 0.65, speed: 0.8 },
        ];
        jMoonData.forEach(md => {
          const jmoon = createPlanetMoon(mesh, md.dist, md.size, 0xaaaaaa, md.speed, md.name);
          jmoon.pivot.rotation.x = 0.2 + Math.random() * 0.4;
        });
      }

      scene.add(pivot);

      mesh.userData.angle     = Math.random() * Math.PI * 2;
      mesh.userData.orbitRadius = p.orbitRadius;
      mesh.userData.orbitSpeed  = p.speed;
      mesh.userData.rotSpeed   = p.rotSpeed;
      mesh.userData.pivot      = pivot;

      planetRefs[p.name] = mesh;
    });

    // ─── GUI ───────────────────────────────────────────────────────────────────
    const params = {
      timeScale:  1.0,
      orbitLines: true,
      labels:     true,
      moonOrbits: true,
    };

    const gui = new GUI({ title: '🌍 控制面板' });
    gui.add(params, 'timeScale', 0.1, 10, 0.05).name('时间缩放');
    gui.add(params, 'orbitLines').name('显示轨道');
    gui.add(params, 'labels').name('显示标签');
    gui.add(params, 'moonOrbits').name('卫星轨道');

    // ─── Debug ─────────────────────────────────────────────────────────────────
    window.debug = { planets: planetRefs, sun: sunMesh };

    // ─── Animation ─────────────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    let elapsed = 0;

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      elapsed += delta * params.timeScale;

      orbitLines.forEach(line => { line.visible = params.orbitLines; });
      moonOrbitLines.forEach(line => { line.visible = params.moonOrbits; });

      // Toggle labels via CSS2DRenderer.domElement visibility
      labelRenderer.domElement.style.display = params.labels ? 'block' : 'none';

      PLANET_DATA.forEach(p => {
        const mesh = planetRefs[p.name];
        mesh.userData.angle += p.speed * delta * params.timeScale * 0.3;
        mesh.position.x = Math.cos(mesh.userData.angle) * mesh.userData.orbitRadius;
        mesh.position.z = Math.sin(mesh.userData.angle) * mesh.userData.orbitRadius;
        mesh.rotation.y += p.rotSpeed * delta * params.timeScale;
      });

      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    // ─── Resize ────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Hide loading ───────────────────────────────────────────────────────────
    const loading = document.getElementById('loading');
    loading.style.opacity = '0';
    setTimeout(() => loading.remove(), 900);

    animate();
  </script>
</body>
</html>
