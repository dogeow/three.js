<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Molecular Dynamics Visualization</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0a0a0a; }
    canvas { display: block; }
    #loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #fff; font-family: monospace; font-size: 18px; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="loading">Initializing simulation...</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
    import { GUI } from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

    // --- Config ---
    const BOUNDS = 14;
    const NUM_ATOMS = 40;
    const BOND_DIST_MAX = 3.8;
    const BOND_DIST_MIN = 1.8;

    const ELEMENT_TYPES = {
      C: { color: 0x888888, radius: 0.55, emissive: 0x222222, label: 'C' },
      O: { color: 0xff3333, radius: 0.48, emissive: 0x441111, label: 'O' },
      N: { color: 0x3366ff, radius: 0.52, emissive: 0x112244, label: 'N' },
      H: { color: 0xffffff, radius: 0.28, emissive: 0x333333, label: 'H' },
    };
    const ELEM_KEYS = Object.keys(ELEMENT_TYPES);

    // --- State ---
    let temperature = 1.0;
    let bondStrength = 0.05;
    let damping = 0.98;
    let showLabels = true;
    let bloomStrength = 0.6;
    let bloomRadius = 0.4;
    let bloomThreshold = 0.2;

    // --- Atom class ---
    class Atom {
      constructor(id) {
        this.id = id;
        const ek = ELEM_KEYS[Math.floor(Math.random() * ELEM_KEYS.length)];
        this.type = ek;
        const cfg = ELEMENT_TYPES[ek];
        this.color = cfg.color;
        this.emissive = cfg.emissive;
        this.radius = cfg.radius;
        this.label = cfg.label;

        this.pos = new THREE.Vector3(
          (Math.random() - 0.5) * BOUNDS * 1.4,
          (Math.random() - 0.5) * BOUNDS * 1.4,
          (Math.random() - 0.5) * BOUNDS * 1.4
        );
        this.prevPos = this.pos.clone();
        this.vel = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2
        );
        this.force = new THREE.Vector3();
        this.mass = this.type === 'H' ? 1.0 : this.type === 'C' ? 12.0 : this.type === 'N' ? 14.0 : 16.0;
      }

      applyForce(f) {
        this.force.add(f);
      }

      update(dt) {
        // Verlet integration
        const vel = this.pos.clone().sub(this.prevPos).multiplyScalar(damping);
        this.prevPos.copy(this.pos);
        this.pos.add(vel);
        this.pos.addScaledVector(this.force, dt * dt / this.mass);
        this.force.set(0, 0, 0);

        // Boundary reflection
        const bound = BOUNDS - this.radius;
        ['x', 'y', 'z'].forEach(axis => {
          if (this.pos[axis] > bound) {
            this.pos[axis] = bound;
            this.prevPos[axis] = this.pos[axis] + vel[axis] * 0.3;
          } else if (this.pos[axis] < -bound) {
            this.pos[axis] = -bound;
            this.prevPos[axis] = this.pos[axis] + vel[axis] * 0.3;
          }
        });
      }
    }

    // --- Build scene ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);
    scene.fog = new THREE.FogExp2(0x0a0a0a, 0.015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 0, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 5;
    controls.maxDistance = 100;

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(20, 30, 20);
    scene.add(dirLight);
    const pointLight1 = new THREE.PointLight(0x4488ff, 2, 80);
    pointLight1.position.set(-15, 10, 5);
    scene.add(pointLight1);
    const pointLight2 = new THREE.PointLight(0xff8844, 2, 80);
    pointLight2.position.set(15, -10, -5);
    scene.add(pointLight2);

    // Boundary box
    const boxGeo = new THREE.BoxGeometry(BOUNDS * 2, BOUNDS * 2, BOUNDS * 2);
    const edges = new THREE.EdgesGeometry(boxGeo);
    const lineMat = new THREE.LineBasicMaterial({ color: 0x334455, transparent: true, opacity: 0.4 });
    const boxLines = new THREE.LineSegments(edges, lineMat);
    scene.add(boxLines);

    // Post-processing
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      bloomStrength, bloomRadius, bloomThreshold
    );
    composer.addPass(bloomPass);

    // Atoms
    const atoms = [];
    const atomMeshes = [];
    const atomLabels = [];
    const atomGeom = new THREE.IcosahedronGeometry(1, 2);

    for (let i = 0; i < NUM_ATOMS; i++) {
      const atom = new Atom(i);
      atoms.push(atom);

      const mat = new THREE.MeshStandardMaterial({
        color: atom.color,
        emissive: atom.emissive,
        metalness: 0.3,
        roughness: 0.4,
      });
      const mesh = new THREE.Mesh(atomGeom, mat);
      mesh.scale.setScalar(atom.radius);
      scene.add(mesh);
      atomMeshes.push(mesh);

      // CSS2D label
      const labelDiv = document.createElement('div');
      labelDiv.textContent = atom.label;
      labelDiv.style.fontFamily = 'monospace';
      labelDiv.style.fontSize = '10px';
      labelDiv.style.color = '#ffffff';
      labelDiv.style.textShadow = '0 0 4px #000';
      labelDiv.style.pointerEvents = 'none';
      labelDiv.style.opacity = showLabels ? '1' : '0';
      const labelObj = new CSS2DObject(labelDiv);
      scene.add(labelObj);
      atomLabels.push(labelObj);
    }

    // Bond group
    const bondGroup = new THREE.Group();
    scene.add(bondGroup);
    const bonds = []; // { mesh, a, b }

    const cylGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 8);
    const cylMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, metalness: 0.5, roughness: 0.3, transparent: true, opacity: 0.7 });

    function updateBond(mesh, a, b) {
      const mid = a.pos.clone().add(b.pos).multiplyScalar(0.5);
      const dir = b.pos.clone().sub(a.pos);
      const len = dir.length();
      mesh.position.copy(mid);
      mesh.scale.y = len;
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
    }

    function physicsStep() {
      // Forces
      for (let i = 0; i < atoms.length; i++) {
        const a = atoms[i];

        // Thermal noise
        const noise = new THREE.Vector3(
          (Math.random() - 0.5) * temperature * 0.3,
          (Math.random() - 0.5) * temperature * 0.3,
          (Math.random() - 0.5) * temperature * 0.3
        );
        a.applyForce(noise);

        // Repulsion between all close pairs
        for (let j = i + 1; j < atoms.length; j++) {
          const b = atoms[j];
          const diff = a.pos.clone().sub(b.pos);
          const dist = diff.length();

          if (dist < BOND_DIST_MIN) {
            const repel = diff.normalize().multiplyScalar((BOND_DIST_MIN - dist) * 0.8);
            a.applyForce(repel);
            b.applyForce(repel.negate());
          } else if (dist < BOND_DIST_MAX) {
            // Spring attraction for potential bonds
            const attr = diff.normalize().multiplyScalar((dist - BOND_DIST_MAX) * bondStrength);
            a.applyForce(attr.negate());
            b.applyForce(attr);
          }
        }
      }

      const dt = 0.016;
      atoms.forEach(a => a.update(dt));
    }

    function syncMeshes() {
      const tempVec = new THREE.Vector3();
      for (let i = 0; i < atoms.length; i++) {
        const a = atoms[i];
        atomMeshes[i].position.copy(a.pos);
        atomLabels[i].position.copy(a.pos).addScaledVector(new THREE.Vector3(0, 1, 0), a.radius + 0.2);
      }

      // Rebuild bonds
      const existingBonds = new Map();

      for (let i = 0; i < atoms.length; i++) {
        for (let j = i + 1; j < atoms.length; j++) {
          const dist = atoms[i].pos.distanceTo(atoms[j].pos);
          if (dist < BOND_DIST_MAX) {
            const key = i < j ? `${i}-${j}` : `${j}-${i}`;
            existingBonds.set(key, { a: atoms[i], b: atoms[j] });
          }
        }
      }

      // Remove extra bond meshes
      while (bonds.length > existingBonds.size) {
        const bd = bonds.pop();
        bondGroup.remove(bd.mesh);
      }

      // Reuse / create bond meshes
      let bondIdx = 0;
      for (const [key, { a, b }] of existingBonds) {
        let bd;
        if (bondIdx < bonds.length) {
          bd = bonds[bondIdx];
          bd.a = a;
          bd.b = b;
        } else {
          const mesh = new THREE.Mesh(cylGeo, cylMat.clone());
          bondGroup.add(mesh);
          bd = { mesh, a, b };
          bonds.push(bd);
        }
        updateBond(bd.mesh, bd.a, bd.b);
        bondIdx++;
      }
    }

    // --- GUI ---
    const gui = new GUI({ title: 'Molecular Dynamics' });
    gui.add({ temperature: 1.0 }, 'temperature', 0.0, 3.0, 0.05).name('Temperature').onChange(v => temperature = v);
    gui.add({ bondStrength: 0.05 }, 'bondStrength', 0.0, 0.2, 0.005).name('Bond Strength').onChange(v => bondStrength = v);
    gui.add({ damping: 0.98 }, 'damping', 0.8, 1.0, 0.005).name('Damping').onChange(v => damping = v);
    gui.add({ showLabels: true }, 'showLabels').name('Show Labels').onChange(v => {
      atomLabels.forEach(l => { l.element.style.opacity = v ? '1' : '0'; });
    });
    const bloomFolder = gui.addFolder('Bloom');
    bloomFolder.add({ bloomStrength }, 'bloomStrength', 0.0, 2.0, 0.05).name('Strength').onChange(v => bloomPass.strength = v);
    bloomFolder.add({ bloomRadius }, 'bloomRadius', 0.0, 1.5, 0.05).name('Radius').onChange(v => bloomPass.radius = v);
    bloomFolder.add({ bloomThreshold }, 'bloomThreshold', 0.0, 1.0, 0.05).name('Threshold').onChange(v => bloomPass.threshold = v);
    bloomFolder.open();

    // Remove loading
    document.getElementById('loading').style.display = 'none';

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Loop ---
    function animate() {
      requestAnimationFrame(animate);
      physicsStep();
      syncMeshes();
      controls.update();
      composer.render();
      labelRenderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
