<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>LATTICE GAUGE THEORY QCD</title>
<style>
body{margin:0;overflow:hidden;background:#08000a;font-family:monospace}
canvas{display:block}
#panel{position:fixed;top:12px;left:12px;color:#f0f;font-size:12px;background:rgba(0,0,0,0.6);padding:10px;border-radius:4px;line-height:1.8}
#info{position:fixed;bottom:12px;left:12px;color:#f08;font-size:12px;background:rgba(0,0,0,0.6);padding:8px;border-radius:4px}
</style>
</head>
<body>
<div id="panel"><b>Lattice Gauge Theory — QCD</b><br>Beta: <span id="beta">5.5</span><br>Plaquette: <span id="plaq">0.00</span></div>
<div id="info">SU(3) color gauge fields on 3D lattice — Wilson loop action</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x08000a);
const camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,500);
camera.position.set(15,12,20);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

const GRID=6, LS=1.0;
const linkGroup=new THREE.Group();
scene.add(linkGroup);

const colors=[0xff0044,0x00ff44,0x0088ff,0xffff00,0xff8800,0x8800ff,0x00ffff,0xff00ff];
const rng=(s)=>{let x=Math.sin(s*9301+49297)*233280;return x-Math.floor(x);};

for(let i=0;i<GRID;i++)for(let j=0;j<GRID;j++)for(let k=0;k<GRID;k++){
    const pos=new THREE.Vector3(i*LS-(GRID*LS)/2,j*LS-(GRID*LS)/2,k*LS-(GRID*LS)/2);
    const ci=Math.floor(rng(i*100+j*10+k)*8);
    linkGroup.add(new THREE.ArrowHelper(new THREE.Vector3(1,0,0),pos,LS*0.85,colors[ci]));
    linkGroup.add(new THREE.ArrowHelper(new THREE.Vector3(0,1,0),pos,LS*0.85,colors[Math.floor(rng(i*100+j*10+k+1)*8)]));
    linkGroup.add(new THREE.ArrowHelper(new THREE.Vector3(0,0,1),pos,LS*0.85,colors[Math.floor(rng(i*100+j*10+k+2)*8)]));
}

const nodeGeo=new THREE.SphereGeometry(0.08,8,8);
const nodeMat=new THREE.MeshStandardMaterial({emissive:0x330033,roughness:0.8});
for(let i=0;i<GRID;i++)for(let j=0;j<GRID;j++)for(let k=0;k<GRID;k++){
    const m=new THREE.Mesh(nodeGeo,nodeMat);
    m.position.set(i*LS-(GRID*LS)/2,j*LS-(GRID*LS)/2,k*LS-(GRID*LS)/2);
    linkGroup.add(m);
}

scene.add(new THREE.AmbientLight(0x220022));
const pl=new THREE.PointLight(0xff00ff,1,80); pl.position.set(10,10,10); scene.add(pl);

let t=0;
function animate(){
    requestAnimationFrame(animate);
    t+=0.01;
    linkGroup.rotation.y=t*0.05;
    linkGroup.rotation.x=Math.sin(t*0.03)*0.1;
    const beta=5.5+Math.sin(t*0.2)*0.5;
    document.getElementById('beta').textContent=beta.toFixed(2);
    document.getElementById('plaq').textContent=(1-0.15/beta).toFixed(4);
    controls.update(); renderer.render(scene,camera);
}
animate();
</script></body></html>
