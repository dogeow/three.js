<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDF Ray Marching</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.esm.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'lil-gui';

    // --- Renderer & Scene ---
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    // --- GUI params ---
    const params = {
      fov: 60,
      lightX: 5,
      lightY: 8,
      lightZ: 5,
      sphereScale: 1.0,
      boxScale: 1.0,
      torusScale: 1.0,
      aoStrength: 0.4,
    };

    // --- Vertex Shader ---
    const vertexShader = /* glsl */`
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position, 1.0);
      }
    `;

    // --- Fragment Shader ---
    const fragmentShader = /* glsl */`
      precision highp float;

      uniform vec2 uResolution;
      uniform float uTime;
      uniform float uFOV;
      uniform vec3 uCameraPos;
      uniform vec3 uLightPos;
      uniform float uSphereScale;
      uniform float uBoxScale;
      uniform float uTorusScale;
      uniform float uAOStrength;

      varying vec2 vUv;

      #define MAX_STEPS 128
      #define MAX_DIST 50.0
      #define SURF_DIST 0.001
      #define PI 3.14159265359

      // --- SDF Primitives ---
      float sdSphere(vec3 p, float s) {
        return length(p) - s;
      }

      float sdBox(vec3 p, vec3 b) {
        vec3 q = abs(p) - b;
        return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0);
      }

      float sdTorus(vec3 p, vec2 t) {
        vec2 q = vec2(length(p.xz) - t.x, p.y);
        return length(q) - t.y;
      }

      // --- Scene ---
      vec2 map(vec3 p) {
        float t = uTime;

        // Sphere
        float sphere = sdSphere(p - vec3(-2.5, 0.0, 0.0), uSphereScale * 1.0);

        // Box
        float box = sdBox(p - vec3(0.0, 0.0, 0.0), vec3(uBoxScale * 0.8));

        // Rotating torus
        float angle = t * 0.7;
        float c = cos(angle);
        float s = sin(angle);
        mat2 rot = mat2(c, -s, s, c);
        vec3 tp = p - vec3(2.5, 0.0, 0.0);
        tp.xz = rot * tp.xz;
        float torus = sdTorus(tp, vec2(uTorusScale * 1.0, uTorusScale * 0.35));

        float id = 0.0;
        float d = sphere;
        if (box < d) { d = box; id = 1.0; }
        if (torus < d) { d = torus; id = 2.0; }

        return vec2(d, id);
      }

      float rayMarch(vec3 ro, vec3 rd) {
        float d = 0.0;
        for (int i = 0; i < MAX_STEPS; i++) {
          vec3 p = ro + rd * d;
          float ds = map(p).x;
          d += ds;
          if (ds < SURF_DIST || d > MAX_DIST) break;
        }
        return d;
      }

      vec3 getNormal(vec3 p) {
        float e = 0.0005;
        return normalize(vec3(
          map(p + vec3(e, 0.0, 0.0)).x - map(p - vec3(e, 0.0, 0.0)).x,
          map(p + vec3(0.0, e, 0.0)).x - map(p - vec3(0.0, e, 0.0)).x,
          map(p + vec3(0.0, 0.0, e)).x - map(p - vec3(0.0, 0.0, e)).x
        ));
      }

      float calcAO(vec3 p, vec3 n) {
        float occ = 0.0;
        float sca = 1.0;
        for (int i = 0; i < 5; i++) {
          float h = 0.01 + 0.12 * float(i) / 4.0;
          float d = map(p + h * n).x;
          occ += (h - d) * sca;
          sca *= 0.95;
        }
        return clamp(1.0 - occ * uAOStrength * 2.5, 0.0, 1.0);
      }

      float softShadow(vec3 ro, vec3 rd, float mint, float maxt, float k) {
        float res = 1.0;
        float t = mint;
        for (int i = 0; i < 32; i++) {
          float h = map(ro + rd * t).x;
          res = min(res, k * h / t);
          t += clamp(h, 0.02, 0.2);
          if (h < 0.001 || t > maxt) break;
        }
        return clamp(res, 0.0, 1.0);
      }

      vec3 getMaterial(float id) {
        if (id < 0.5) return vec3(0.9, 0.2, 0.2); // red sphere
        if (id < 1.5) return vec3(0.2, 0.8, 0.3); // green box
        return vec3(0.2, 0.4, 0.9);               // blue torus
      }

      void main() {
        vec2 uv = (vUv * 2.0 - 1.0) * uResolution / uResolution.y;

        float fovRad = uFOV * PI / 180.0;
        float focal = 1.0 / tan(fovRad * 0.5);
        vec3 rd = normalize(vec3(uv, focal));
        vec3 ro = uCameraPos;

        float d = rayMarch(ro, rd);

        vec3 col = vec3(0.05, 0.05, 0.08); // background

        if (d < MAX_DIST) {
          vec3 p = ro + rd * d;
          vec3 n = getNormal(p);
          vec3 matColor = getMaterial(map(p).y);

          vec3 lightDir = normalize(uLightPos - p);
          float diff = max(dot(n, lightDir), 0.0);

          // Soft shadow
          float sha = softShadow(p + n * 0.01, lightDir, 0.02, 10.0, 8.0);

          // AO
          float ao = calcAO(p, n);

          // Specular
          vec3 viewDir = normalize(ro - p);
          vec3 halfVec = normalize(lightDir + viewDir);
          float spec = pow(max(dot(n, halfVec), 0.0), 32.0);

          col = matColor * diff * sha * ao + vec3(0.3) * spec * sha;
          col += matColor * 0.05 * ao; // ambient
        }

        // Gamma correction
        col = pow(col, vec3(0.4545));

        gl_FragColor = vec4(col, 1.0);
      }
    `;

    const uniforms = {
      uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      uTime:       { value: 0.0 },
      uFOV:        { value: params.fov },
      uCameraPos:  { value: new THREE.Vector3(0, 0, 8) },
      uLightPos:   { value: new THREE.Vector3(params.lightX, params.lightY, params.lightZ) },
      uSphereScale:{ value: params.sphereScale },
      uBoxScale:   { value: params.boxScale },
      uTorusScale: { value: params.torusScale },
      uAOStrength: { value: params.aoStrength },
    };

    const material = new THREE.ShaderMaterial({
      uniforms,
      vertexShader,
      fragmentShader,
    });

    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
    scene.add(mesh);

    // --- OrbitControls ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;

    // --- GUI ---
    const gui = new GUI();
    gui.add(params, 'fov', 20, 120, 1).name('FOV').onChange(v => uniforms.uFOV.value = v);
    gui.add(params, 'lightX', -10, 10, 0.1).name('Light X').onChange(updateLight);
    gui.add(params, 'lightY', -10, 10, 0.1).name('Light Y').onChange(updateLight);
    gui.add(params, 'lightZ', -10, 10, 0.1).name('Light Z').onChange(updateLight);
    gui.add(params, 'sphereScale', 0.1, 3.0, 0.05).name('Sphere Scale').onChange(v => uniforms.uSphereScale.value = v);
    gui.add(params, 'boxScale', 0.1, 3.0, 0.05).name('Box Scale').onChange(v => uniforms.uBoxScale.value = v);
    gui.add(params, 'torusScale', 0.1, 3.0, 0.05).name('Torus Scale').onChange(v => uniforms.uTorusScale.value = v);
    gui.add(params, 'aoStrength', 0.0, 1.0, 0.05).name('AO Strength').onChange(v => uniforms.uAOStrength.value = v);

    function updateLight() {
      uniforms.uLightPos.value.set(params.lightX, params.lightY, params.lightZ);
    }

    // --- Resize ---
    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
    });

    // --- Loop ---
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      uniforms.uTime.value = clock.getElapsedTime();
      controls.update();
      uniforms.uCameraPos.value.copy(controls.object.position);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
