<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>353 Wind Erosion Terrain</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a0f05}
canvas{display:block}
#info{position:absolute;top:16px;left:16px;color:#e8c47c;font-family:monospace;font-size:13px;background:rgba(0,0,0,0.55);padding:10px 14px;border-radius:6px;border:1px solid #5a3a1a;pointer-events:none}
</style>
</head>
<body>
<div id="info">Wind Erosion Terrain · Wind Force: <span id="wf">0.3</span> · Click to gust</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0f05);
scene.fog = new THREE.FogExp2(0x2a1a08, 0.012);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 2000);
camera.position.set(0, 60, 120);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0x7a5030, 0.9));
const sun = new THREE.DirectionalLight(0xffc87a, 1.6);
sun.position.set(80, 120, 60);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 10;
sun.shadow.camera.far = 400;
sun.shadow.camera.left = -120; sun.shadow.camera.right = 120;
sun.shadow.camera.top = 120;  sun.shadow.camera.bottom = -120;
scene.add(sun);

function hash(n){ return Math.abs(Math.sin(n)*43758.5453)%1; }
function lerp(a,b,t){ return a+(b-a)*t; }
function noise2(x,z){
  const ix=Math.floor(x), iz=Math.floor(z);
  const fx=x-ix, fz=z-iz;
  const ux=fx*fx*(3-2*fx), uz=fz*fz*(3-2*fz);
  const n00=hash(ix+iz*157), n10=hash(ix+1+iz*157);
  const n01=hash(ix+(iz+1)*157), n11=hash(ix+1+(iz+1)*157);
  return lerp(lerp(n00,n10,ux),lerp(n01,n11,ux),uz);
}
function fbm(x,z,oct=6){
  let v=0,a=0.5,f=1;
  for(let i=0;i<oct;i++){v+=a*noise2(x*f,z*f);a*=0.5;f*=2.1;}
  return v;
}

const SIZE=200, SEG=128;
const geo = new THREE.PlaneGeometry(SIZE,SIZE,SEG,SEG);
geo.rotateX(-Math.PI/2);
const pos = geo.attributes.position;
const terHeights = new Float32Array(pos.count);

for(let i=0;i<pos.count;i++){
  const x=pos.getX(i), z=pos.getZ(i);
  const nx=x/SIZE*4, nz=z/SIZE*4;
  let h = fbm(nx,nz)*35 - 18;
  const channel = Math.sin(nx*2.5)*Math.cos(nz*1.8)*4;
  h -= Math.max(0,channel)*0.4;
  h -= fbm(nx*3+5, nz*3)*3;
  h = Math.max(h, -8);
  pos.setY(i, h);
  terHeights[i] = h;
}
pos.needsUpdate = true;
geo.computeVertexNormals();

const sandMat = new THREE.MeshStandardMaterial({
  color: 0xc4955a, roughness: 0.92, metalness: 0.0
});
const terrain = new THREE.Mesh(geo, sandMat);
terrain.receiveShadow = true;
scene.add(terrain);

const particleCount = 12000;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount*3);
const pVel = new Float32Array(particleCount*3);
const pLife = new Float32Array(particleCount);
const pSize = new Float32Array(particleCount);

function spawnParticle(x,y,z,vx,vy,vz){
  const idx=Math.floor(Math.random()*particleCount);
  pPos[idx*3]=x; pPos[idx*3+1]=y; pPos[idx*3+2]=z;
  pVel[idx*3]=vx; pVel[idx*3+1]=vy; pVel[idx*3+2]=vz;
  pLife[idx]=1.0; pSize[idx]=0.3+Math.random()*0.4;
}
for(let i=0;i<particleCount;i++){
  pPos[i*3]=(Math.random()-0.5)*SIZE;
  pPos[i*3+1]=-20; pPos[i*3+2]=(Math.random()-0.5)*SIZE;
  pLife[i]=Math.random();
}
pGeo.setAttribute("position", new THREE.BufferAttribute(pPos,3));
pGeo.setAttribute("pLife", new THREE.BufferAttribute(pLife,1));
pGeo.setAttribute("pSize", new THREE.BufferAttribute(pSize,1));

const pMat = new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0}},
  vertexShader:`
    attribute float pLife; attribute float pSize;
    varying float vLife;
    void main(){
      vLife=pLife;
      vec4 mvPos=modelViewMatrix*vec4(position,1.0);
      gl_PointSize=pSize*(200.0/-mvPos.z);
      gl_Position=projectionMatrix*mvPos;
    }`,
  fragmentShader:`
    varying float vLife;
    void main(){
      float d=length(gl_PointCoord-0.5)*2.0;
      if(d>1.0)discard;
      float alpha=(1.0-d)*vLife*0.85;
      gl_FragColor=vec4(0.9,0.75,0.4,alpha);
    }`,
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
});
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

let windStrength = 0.3;
const windDir = new THREE.Vector3(1, 0, 0.3).normalize();
const windArrow = new THREE.ArrowHelper(windDir, new THREE.Vector3(0,50,0), 20, 0xffaa33, 4, 2);
scene.add(windArrow);

window.addEventListener("click", e => {
  windStrength = 1.8;
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);
  raycaster.setFromCamera(mouse, camera);
  const plane = new THREE.Plane(new THREE.Vector3(0,1,0), -10);
  const hit = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, hit);
  for(let i=0;i<200;i++){
    const a=Math.random()*Math.PI*2, r=Math.random()*5;
    spawnParticle(hit.x+Math.cos(a)*r, hit.y+Math.random()*3, hit.z+Math.sin(a)*r,
      windDir.x*windStrength*8, Math.random()*3, windDir.z*windStrength*8);
  }
});

function getHeight(wx,wz){
  const lx=Math.round((wx/SIZE+0.5)*(SEG));
  const lz=Math.round((wz/SIZE+0.5)*(SEG));
  const idx=Math.min(Math.max(lz*(SEG+1)+lx,0),pos.count-1);
  return terHeights[idx]||0;
}

const clock = new THREE.Clock();
let gustTimer = 0;

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.getElapsedTime();

  gustTimer += dt;
  if(gustTimer > 3.0){ gustTimer=0; windStrength=Math.max(0.2,windStrength*0.5); }

  pMat.uniforms.uTime.value = t;
  const pAttr = pGeo.attributes.position;
  const lAttr = pGeo.attributes.pLife;

  for(let i=0;i<particleCount;i++){
    if(lAttr.array[i]<=0)continue;
    pVel[i*3+1] -= 4.0*dt;
    const h = getHeight(pPos[i*3], pPos[i*3+2]);
    const distToGround = pPos[i*3+1]-h;
    if(distToGround < 3.0 && distToGround > -0.5){
      pVel[i*3]   += windDir.x * windStrength * 12 * dt;
      pVel[i*3+2] += windDir.z * windStrength * 12 * dt;
      if(distToGround < 0.3){ pVel[i*3+1] = 1.5 + Math.random()*2; }
    }
    pVel[i*3]*=0.97; pVel[i*3+1]*=0.99; pVel[i*3+2]*=0.97;
    pPos[i*3]+=pVel[i*3]*dt; pPos[i*3+1]+=pVel[i*3+1]*dt; pPos[i*3+2]+=pVel[i*3+2]*dt;
    if(pPos[i*3+1]<h){ pPos[i*3+1]=h; pVel[i*3+1]=0; lAttr.array[i]-=dt*0.3; }
    else { lAttr.array[i]-=dt*0.08; }
    if(lAttr.array[i]<=0){ pPos[i*3+1]=-20; lAttr.array[i]=0; }
  }
  pAttr.needsUpdate=true; lAttr.needsUpdate=true;
  document.getElementById("wf").textContent=windStrength.toFixed(2);
  controls.update();
  renderer.render(scene, camera);
}
animate();
window.addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
