<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>量子纠缠可视化</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #info {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(120, 200, 255, 0.7);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
      text-align: center;
    }

    #title {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(120, 200, 255, 0.9);
      font-size: 18px;
      letter-spacing: 4px;
      text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 0 20px rgba(100, 180, 255, 0.6);
    }
  </style>

  <!--
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║                        QUANTUM ENTANGLEMENT VISUALIZATION                       ║
    ║                                                                                ║
    ║  PHYSICS CONCEPT:                                                              ║
    ║  Quantum entanglement is a phenomenon where two particles become correlated    ║
    ║  such that the quantum state of one particle instantly influences the state   ║
    ║  of its entangled partner, regardless of the distance separating them.        ║
    ║                                                                                ║
    ║  When measured, entangled particles "collapse" into definite states that      ║
    ║  are perfectly correlated — if one particle's spin is "up", the other's is    ║
    ║  always "down", and vice versa. This correlation persists even if the          ║
    ║  particles are separated by vast distances (e.g., light-years apart).        ║
    ║                                                                                ║
    ║  IMPORTANT: No information travels faster than light. The "instantaneous"     ║
    ║  correlation is only observable when both measurement results are compared.   ║
    ║  You cannot use entanglement to send messages faster than light.             ║
    ║                                                                                ║
    ║  VISUAL METAPHOR:                                                              ║
    ║  - Two glowing spheres represent entangled particles                          ║
    ║  - The swirling quantum link field represents the entanglement correlation    ║
    ║  - When one particle rotates, the other responds "instantaneously"             ║
    ║  - The bloom/glow effect represents quantum uncertainty (probability clouds)  ║
    ╚══════════════════════════════════════════════════════════════════════════════╝
  -->

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="title">量子纠缠</div>
<div id="info">拖动旋转 · 滚轮缩放 · 使用 GUI 调整参数</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import GUI from 'https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.min.js';

// ─── Scene Setup ────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020408);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ─── Post-processing ─────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.5,   // strength
  0.4,   // radius
  0.85   // threshold
);
composer.addPass(bloomPass);

// ─── Controls ────────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 5;
controls.maxDistance = 30;

// ─── GUI Parameters ──────────────────────────────────────────────────────────
const params = {
  entanglementStrength: 0.8,
  particleSpeed: 1.0,
  linkOpacity: 0.6,
  colorScheme: 'Quantum Blue',
  bloomStrength: 1.5,
  bloomRadius: 0.4,
  bloomThreshold: 0.85,
  particleRadius: 0.55,
  linkTurbulence: 0.5,
  autoRotate: true,
};

// ─── Color Schemes ───────────────────────────────────────────────────────────
const colorSchemes = {
  'Quantum Blue':    { particle: 0x00d4ff, particle2: 0xff6b00, link: 0x00aaff, bg: 0x020408 },
  'Plasma Purple':   { particle: 0xbf00ff, particle2: 0x00ff9f, link: 0x8800ff, bg: 0x060210 },
  'Solar Flare':     { particle: 0xff4500, particle2: 0xffd700, link: 0xff2200, bg: 0x100200 },
  'Neutron Star':    { particle: 0xe0e0ff, particle2: 0xffccaa, link: 0xaabbff, bg: 0x020208 },
  'Emerald Entangle':{ particle: 0x00ff88, particle2: 0xff0066, link: 0x00ff66, bg: 0x021008 },
};

function applyColorScheme(name) {
  const c = colorSchemes[name];
  particleLeft.material.color.setHex(c.particle);
  particleLeft.glowMesh.material.color.setHex(c.particle);
  particleRight.material.color.setHex(c.particle2);
  particleRight.glowMesh.material.color.setHex(c.particle2);
  updateLinkColor(c.link);
  scene.background.setHex(c.bg);
}

function updateLinkColor(hex) {
  linkTube.material.color.setHex(hex);
  linkParticles.children.forEach(p => p.material.color.setHex(hex));
  linkSpiralLeft.children.forEach(p => p.material.color.setHex(hex));
  linkSpiralRight.children.forEach(p => p.material.color.setHex(hex));
  linkFieldMaterial.color.setHex(hex);
}

// ─── Shared geometry helpers ───────────────────────────────────────────────────
const sphereGeo  = new THREE.SphereGeometry(params.particleRadius, 64, 64);
const glowGeo    = new THREE.SphereGeometry(params.particleRadius * 1.8, 32, 32);

// ─── Particle Left ────────────────────────────────────────────────────────────
const particleLeft = new THREE.Mesh(
  sphereGeo,
  new THREE.MeshPhysicalMaterial({
    color: 0x00d4ff,
    emissive: 0x00d4ff,
    emissiveIntensity: 2.0,
    metalness: 0.1,
    roughness: 0.1,
    transparent: true,
    opacity: 0.95,
  })
);
scene.add(particleLeft);

// Glow halo for particle left
const glowMatLeft = new THREE.MeshBasicMaterial({
  color: 0x00d4ff,
  transparent: true,
  opacity: 0.12,
  side: THREE.BackSide,
  depthWrite: false,
});
particleLeft.glowMesh = new THREE.Mesh(glowGeo, glowMatLeft);
particleLeft.add(particleLeft.glowMesh);

// Outer glow ring
const ringGeo = new THREE.TorusGeometry(params.particleRadius * 2.2, 0.04, 16, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.3 });
particleLeft.ring = new THREE.Mesh(ringGeo, ringMat);
particleLeft.add(particleLeft.ring);

// ─── Particle Right ───────────────────────────────────────────────────────────
const particleRight = new THREE.Mesh(
  sphereGeo,
  new THREE.MeshPhysicalMaterial({
    color: 0xff6b00,
    emissive: 0xff6b00,
    emissiveIntensity: 2.0,
    metalness: 0.1,
    roughness: 0.1,
    transparent: true,
    opacity: 0.95,
  })
);
scene.add(particleRight);

// Glow halo for particle right
const glowMatRight = new THREE.MeshBasicMaterial({
  color: 0xff6b00,
  transparent: true,
  opacity: 0.12,
  side: THREE.BackSide,
  depthWrite: false,
});
particleRight.glowMesh = new THREE.Mesh(glowGeo, glowMatRight);
particleRight.add(particleRight.glowMesh);

particleRight.ring = new THREE.Mesh(ringGeo.clone(), ringMat.clone());
particleRight.ring.material.color.setHex(0xff6b00);
particleRight.add(particleRight.ring);

// ─── Quantum Link Field (volumetric ribbon between particles) ─────────────────
const linkFieldGeo = new THREE.CylinderGeometry(1.5, 1.5, 1, 32, 64, true);
const linkFieldMaterial = new THREE.MeshBasicMaterial({
  color: 0x00aaff,
  transparent: true,
  opacity: 0.04,
  side: THREE.DoubleSide,
  depthWrite: false,
});
const linkField = new THREE.Mesh(linkFieldGeo, linkFieldMaterial);
linkField.rotation.z = Math.PI / 2;
scene.add(linkField);

// ─── Spiral tubes emanating from each particle ───────────────────────────────
function buildSpiralTube(color, segments = 80) {
  const pts = [];
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const angle = t * Math.PI * 6;
    const r = 0.3 * Math.sin(t * Math.PI);
    pts.push(new THREE.Vector3(
      Math.cos(angle) * r,
      Math.sin(angle) * r,
      t * 0.0
    ));
  }
  const curve = new THREE.CatmullRomCurve3(pts, false);
  const tubeGeo = new THREE.TubeGeometry(curve, 120, 0.025, 8, false);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5 });
  return new THREE.Mesh(tubeGeo, mat);
}

const linkSpiralLeft  = new THREE.Group();
const linkSpiralRight = new THREE.Group();

for (let i = 0; i < 3; i++) {
  const offset = (i / 3) * Math.PI * 2;
  const spiralL = buildSpiralTube(0x00aaff);
  spiralL.rotation.x = offset;
  spiralL.rotation.y = Math.PI / 2;
  linkSpiralLeft.add(spiralL);

  const spiralR = buildSpiralTube(0x00aaff);
  spiralR.rotation.x = offset + Math.PI;
  spiralR.rotation.y = Math.PI / 2;
  linkSpiralRight.add(spiralR);
}
scene.add(linkSpiralLeft);
scene.add(linkSpiralRight);

// ─── Link tube connecting the two particles ──────────────────────────────────
const linkCurve = new THREE.LineCurve3(
  new THREE.Vector3(-4, 0, 0),
  new THREE.Vector3( 4, 0, 0)
);
const linkTubeGeo = new THREE.TubeGeometry(linkCurve, 32, 0.03, 8, false);
const linkTube = new THREE.Mesh(
  linkTubeGeo,
  new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.4 })
);
scene.add(linkTube);

// ─── Floating link particles (energy quanta flowing along the link) ───────────
const linkParticles = new THREE.Group();
const linkParticleGeo = new THREE.SphereGeometry(0.06, 8, 8);
const linkParticleCount = 40;
for (let i = 0; i < linkParticleCount; i++) {
  const mat = new THREE.MeshBasicMaterial({
    color: 0x00aaff,
    transparent: true,
    opacity: 0.6 + Math.random() * 0.4,
  });
  const mesh = new THREE.Mesh(linkParticleGeo, mat);
  mesh.userData = { phase: Math.random() * Math.PI * 2, speed: 0.5 + Math.random() * 1.5 };
  linkParticles.add(mesh);
}
scene.add(linkParticles);

// ─── Background star field ───────────────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starCount = 2000;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) {
  starPos[i] = (Math.random() - 0.5) * 200;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0x8899bb, size: 0.15, transparent: true, opacity: 0.6 });
scene.add(new THREE.Points(starGeo, starMat));

// ─── Ambient light ────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x111133, 0.5));

// ─── GUI Setup ────────────────────────────────────────────────────────────────
const gui = new GUI({ title: '量子控制', width: 280 });
gui.domElement.style.position = 'absolute';
gui.domElement.style.top = '10px';
gui.domElement.style.right = '10px';

// Entanglement section
const entFolder = gui.addFolder('纠缠');
entFolder.add(params, 'entanglementStrength', 0, 1, 0.01).name('强度');
entFolder.add(params, 'particleSpeed', 0, 3, 0.01).name('粒子速度');
entFolder.add(params, 'linkTurbulence', 0, 1, 0.01).name('连接湍流');
entFolder.add(params, 'autoRotate').name('自动旋转');

// Visual section
const visFolder = gui.addFolder('视觉效果');
visFolder.add(params, 'linkOpacity', 0, 1, 0.01).name('连接不透明度').onChange(v => {
  linkTube.material.opacity = v;
  linkFieldMaterial.opacity = v * 0.08;
});
visFolder.add(params, 'bloomStrength', 0, 3, 0.01).name('泛光强度').onChange(v => {
  bloomPass.strength = v;
});
visFolder.add(params, 'bloomRadius', 0, 1, 0.01).name('泛光半径').onChange(v => {
  bloomPass.radius = v;
});
visFolder.add(params, 'bloomThreshold', 0, 1, 0.01).name('泛光阈值').onChange(v => {
  bloomPass.threshold = v;
});
visFolder.add(params, 'particleRadius', 0.2, 1.5, 0.01).name('粒子大小').onChange(v => {
  const s = v / params.particleRadius;
  particleLeft.scale.setScalar(s);
  particleRight.scale.setScalar(s);
});

// Color scheme
gui.add(params, 'colorScheme', Object.keys(colorSchemes)).name('配色方案').onChange(applyColorScheme);

// ─── Animation State ──────────────────────────────────────────────────────────
let time = 0;
const particleDistance = 5;

// ─── Helper: Update Link Geometry ─────────────────────────────────────────────
function updateLinkGeometry() {
  const start = particleLeft.position.clone();
  const end   = particleRight.position.clone();
  const mid   = start.clone().add(end).multiplyScalar(0.5);
  const dir   = end.clone().sub(start).normalize();

  // Update tube
  const newCurve = new THREE.LineCurve3(start, end);
  const newTubeGeo = new THREE.TubeGeometry(newCurve, 32, 0.03, 8, false);
  linkTube.geometry.dispose();
  linkTube.geometry = newTubeGeo;

  // Update field cylinder
  const len = start.distanceTo(end);
  linkField.position.copy(mid);
  linkField.scale.x = len / 2;
  linkField.geometry.dispose();
  linkField.geometry = new THREE.CylinderGeometry(1.5 * params.linkOpacity, 1.5 * params.linkOpacity, 1, 32, 64, true);

  // Orient link field along the particle axis
  const quaternion = new THREE.Quaternion();
  quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
  linkField.quaternion.copy(quaternion);
}

// ─── Animate ──────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const delta = 0.016; // ~60fps assumed
  time += delta * params.particleSpeed;

  const es = params.entanglementStrength;
  const turb = params.linkTurbulence;

  // ── Particle left: Lissajous + noise motion ──────────────────────────────
  const lx = Math.sin(time * 1.1) * 0.9;
  const ly = Math.cos(time * 0.7) * 0.6 + Math.sin(time * 1.9) * 0.15;
  const lz = Math.sin(time * 0.5) * 0.5 * turb;

  particleLeft.position.set(
    -particleDistance / 2 + lx * es,
    ly * es,
    lz * es
  );
  particleLeft.rotation.x += 0.012 * params.particleSpeed * (1 + es * 0.5);
  particleLeft.rotation.y += 0.018 * params.particleSpeed * (1 + es * 0.3);

  // ── Particle right: correlated (entangled) motion ───────────────────────
  // When left goes up, right goes down — anti-correlated (spin entanglement metaphor)
  const rx = Math.sin(time * 1.1 + Math.PI) * 0.9;
  const ry = Math.cos(time * 0.7 + Math.PI) * 0.6 + Math.sin(time * 1.9 + Math.PI) * 0.15;
  const rz = Math.sin(time * 0.5 + Math.PI) * 0.5 * turb;

  particleRight.position.set(
     particleDistance / 2 + rx * es,
     ry * es,
     rz * es
  );
  particleRight.rotation.x -= 0.012 * params.particleSpeed * (1 + es * 0.5);
  particleRight.rotation.y -= 0.018 * params.particleSpeed * (1 + es * 0.3);

  // ── Rings pulse with entanglement ─────────────────────────────────────────
  const pulse = Math.sin(time * 3.0) * 0.3 + 0.7;
  particleLeft.ring.scale.setScalar(1 + pulse * 0.2 * es);
  particleLeft.ring.material.opacity = (0.2 + pulse * 0.15) * es;
  particleRight.ring.scale.setScalar(1 + pulse * 0.2 * es);
  particleRight.ring.material.opacity = (0.2 + pulse * 0.15) * es;

  // ── Glow halo breathe ─────────────────────────────────────────────────────
  const glowPulse = Math.sin(time * 2.5) * 0.04 + 0.12;
  particleLeft.glowMesh.material.opacity  = glowPulse * es;
  particleRight.glowMesh.material.opacity = glowPulse * es;

  // ── Spiral tubes twist ────────────────────────────────────────────────────
  linkSpiralLeft.rotation.z  =  time * 0.8 * params.particleSpeed;
  linkSpiralRight.rotation.z = -time * 0.8 * params.particleSpeed;
  linkSpiralLeft.children.forEach((s, i) => {
    s.material.opacity = (0.3 + Math.sin(time * 2 + i) * 0.2) * params.linkOpacity;
  });
  linkSpiralRight.children.forEach((s, i) => {
    s.material.opacity = (0.3 + Math.sin(time * 2 + i + 1) * 0.2) * params.linkOpacity;
  });

  // ── Energy quanta flow along link ─────────────────────────────────────────
  linkParticles.children.forEach(p => {
    const t = ((p.userData.phase + time * p.userData.speed * 0.5) % (Math.PI * 2)) / (Math.PI * 2);
    const start = particleLeft.position;
    const end   = particleRight.position;
    p.position.lerpVectors(start, end, t);

    // Random wobble perpendicular to link
    const perp = new THREE.Vector3(
      (Math.random() - 0.5) * 0.3,
      (Math.random() - 0.5) * 0.3,
      (Math.random() - 0.5) * 0.3
    ).multiplyScalar(es * turb);
    p.position.add(perp);

    p.material.opacity = (0.4 + Math.sin(time * 5 + p.userData.phase) * 0.3) * params.linkOpacity;
  });

  // ── Update link geometry ──────────────────────────────────────────────────
  updateLinkGeometry();

  // ── Auto orbit ────────────────────────────────────────────────────────────
  if (params.autoRotate) {
    const camAngle = time * 0.1;
    camera.position.x = Math.sin(camAngle) * 12;
    camera.position.z = Math.cos(camAngle) * 12;
    camera.position.y = 2 + Math.sin(time * 0.2) * 1.5;
    camera.lookAt(0, 0, 0);
  }

  controls.update();
  composer.render();
}

animate();

// ─── Resize Handler ───────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  bloomPass.resolution.set(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
