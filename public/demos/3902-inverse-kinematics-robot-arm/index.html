<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>INVERSE KINEMATICS ROBOT ARM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a0a;font-family:sans-serif}
canvas{display:block}
#info{position:fixed;bottom:14px;left:14px;color:#888;font-size:12px}
</style>
</head>
<body>
<div id="info">点击并拖动末端执行器（橙色球体）移动机械臂，FABRIK IK 反向运动学驱动</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0a0a);
scene.add(new THREE.GridHelper(40,40,0x1a1a1a,0x111111));

const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,500);
camera.position.set(0,8,30);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x334466,2));
const dl=new THREE.DirectionalLight(0xffffff,1.5);
dl.position.set(10,20,10);scene.add(dl);

const N=5;
const segLen=3;
const joints=[];
const segMeshes=[];
const jMeshes=[];
const target=new THREE.Vector3(8,10,0);

for(let i=0;i<=N;i++){
    const p=new THREE.Vector3(0,i*segLen,0);
    joints.push(p.clone());
    const jm=new THREE.Mesh(
        new THREE.SphereGeometry(i===0?0.5:i===N?0.4:0.3,16,16),
        new THREE.MeshStandardMaterial({color:i===0?0x334455:i===N?0xff6600:0x4488cc,metalness:0.5,roughness:0.4,emissive:i===N?0x441100:0})
    );
    jm.position.copy(p);
    scene.add(jm);
    jMeshes.push(jm);
}
for(let i=0;i<N;i++){
    const sm=new THREE.Mesh(
        new THREE.CylinderGeometry(0.18,0.22,segLen,12),
        new THREE.MeshStandardMaterial({color:0x667788,metalness:0.7,roughness:0.3})
    );
    scene.add(sm);
    segMeshes.push(sm);
}

const endEffector=jMeshes[N];
const endMat=endEffector.material;

function solveFABRIK(targetPos){
    const base=joints[0].clone();
    const totalLen=segLen*N;
    const dist=base.distanceTo(targetPos);
    if(dist>totalLen){
        const dir=targetPos.clone().sub(base).normalize();
        for(let i=1;i<=N;i++)joints[i].copy(base.clone().add(dir.clone().multiplyScalar(i*segLen)));
    } else {
        for(let iter=0;iter<20;iter++){
            joints[N].copy(targetPos);
            for(let i=N-1;i>=0;i--){
                const dir=joints[i].clone().sub(joints[i+1]).normalize().multiplyScalar(segLen);
                joints[i].copy(joints[i+1].clone().add(dir));
            }
            joints[0].copy(base);
            for(let i=1;i<=N;i++){
                const dir=joints[i].clone().sub(joints[i-1]).normalize().multiplyScalar(segLen);
                joints[i].copy(joints[i-1].clone().add(dir));
            }
            if(joints[N].distanceTo(targetPos)<0.01)break;
        }
    }
}

function updateMeshes(){
    for(let i=0;i<N;i++){
        const a=joints[i],b=joints[i+1];
        const mid=a.clone().add(b).multiplyScalar(0.5);
        segMeshes[i].position.copy(mid);
        const dir=b.clone().sub(a).normalize();
        const up=new THREE.Vector3(0,1,0);
        const quat=new THREE.Quaternion().setFromUnitVectors(up,dir);
        segMeshes[i].quaternion.copy(quat);
        jMeshes[i].position.copy(a);
    }
    jMeshes[N].position.copy(joints[N]);
}

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const plane=new THREE.Plane(new THREE.Vector3(0,0,1),0);
const hitPt=new THREE.Vector3();
let dragging=false;

window.addEventListener('mousemove',e=>{
    mouse.x=(e.clientX/innerWidth)*2-1;
    mouse.y=-(e.clientY/innerHeight)*2+1;
    raycaster.setFromCamera(mouse,camera);
    if(dragging){
        raycaster.ray.intersectPlane(plane,hitPt);
        target.copy(hitPt);
    }
});
window.addEventListener('mousedown',e=>{
    raycaster.setFromCamera(mouse,camera);
    const hits=raycaster.intersectObject(endEffector);
    dragging=hits.length>0;
});
window.addEventListener('mouseup',()=>dragging=false);

function animate(){
    requestAnimationFrame(animate);
    solveFABRIK(target);
    updateMeshes();
    endMat.emissive.setHex(dragging?0xff4400:0x441100);
    renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
