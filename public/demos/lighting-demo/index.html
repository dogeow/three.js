<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 光照示例</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: Arial, sans-serif; color: #fff; }
    canvas { display: block; }
    .info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 6px; }
    .info button { display: block; margin: 5px 0; padding: 6px 12px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="info">
    <div>光源开关：</div>
    <button onclick="toggleLight(0)">环境光 Ambient</button>
    <button onclick="toggleLight(1)">点光源 Point</button>
    <button onclick="toggleLight(2)">聚光灯 Spot</button>
    <button onclick="toggleLight(3)">平行光 Directional</button>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(8, 6, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const lights = [];

    // AmbientLight
    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);
    lights.push(ambient);

    // PointLight
    const point = new THREE.PointLight(0xff4444, 2, 20);
    point.position.set(-3, 3, 3);
    scene.add(point);
    lights.push(point);

    // SpotLight
    const spot = new THREE.SpotLight(0x44ff44, 3);
    spot.position.set(3, 5, 3);
    spot.angle = Math.PI / 6;
    spot.penumbra = 0.3;
    scene.add(spot);
    lights.push(spot);

    // DirectionalLight
    const dir = new THREE.DirectionalLight(0x4488ff, 1.5);
    dir.position.set(-3, 4, -3);
    scene.add(dir);
    lights.push(dir);

    window._lights = lights;
    window.toggleLight = function(i) {
      lights[i].intensity = lights[i].intensity > 0 ? 0 : (i === 0 ? 0.5 : (i === 3 ? 1.5 : (i === 2 ? 3 : 2)));
    };

    // 四个球体对应四种光源
    const sphereGeo = new THREE.SphereGeometry(0.8, 32, 32);
    const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x222222 });
    const positions = [[-3,0,3],[0,0,3],[3,0,3],[0,0,-3]];
    positions.forEach(([x,y,z]) => {
      const m = new THREE.Mesh(sphereGeo, mat.clone());
      m.position.set(x, y, z);
      scene.add(m);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
