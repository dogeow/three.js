<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 自定义着色器 - 波纹置换 + 渐变色彩</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'three/addons/libs/lil-gui.module.min.js';

    // ============================================================
    // 场景、相机、渲染器
    // ============================================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.set(0, 2, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ============================================================
    // OrbitControls（鼠标交互旋转/缩放）
    // ============================================================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // ============================================================
    // 自定义着色器（GLSL）
    // ============================================================

    // --- 顶点着色器 ---
    // 作用：根据 uTime（时间）和 uFrequency（频率），
    //      在平面上产生向外扩散的正弦波纹置换效果（沿 Z 轴上下位移）
    const vertexShader = /* glsl */ `
      // uniform：由 JavaScript 实时更新
      uniform float uTime;       // 运行时间（秒）
      uniform float uFrequency;  // 波纹频率（控制波纹密度）
      uniform float uAmplitude;  // 波纹振幅（控制置换强度）

      // varying：传递给片元着色器的插值数据
      varying vec2 vUv;          // 2D 贴图坐标
      varying float vElevation;  // 当前顶点沿 Z 轴的位移量（用于片元着色器着色）

      void main() {
        vUv = uv; // 保留原始 UV 供片元着色器使用

        // 计算当前顶点到原点的水平距离
        float dist = length(position.xy);

        // 正弦波纹：向外扩散的环形波纹
        // 公式：sin(dist * frequency - time * 速度) 产生向外传播的波
        float wave = sin(dist * uFrequency - uTime * 2.0);

        // 计算最终的 Z 轴置换量
        float elevation = wave * uAmplitude;
        vElevation = elevation;

        // 构建位移后的顶点位置
        // position 是 THREE.PlaneGeometry 默认的局部坐标
        vec3 displaced = position;
        displaced.z += elevation;

        // 变换到裁剪空间
        gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
      }
    `;

    // --- 片元着色器 ---
    // 作用：根据顶点着色器传递的 vElevation（位移量），
    //      在 vElevation 最小→最大之间做双色彩渐变，产生颜色层次感
    const fragmentShader = /* glsl */ `
      // uniform：由 JavaScript 实时更新（GUI 控制）
      uniform vec3 uColorLow;    // 低位处颜色（波谷）
      uniform vec3 uColorHigh;   // 高位处颜色（波峰）

      // varying：从顶点着色器插值而来
      varying vec2 vUv;
      varying float vElevation;

      void main() {
        // 将 vElevation 归一化到 [0, 1] 区间
        // uAmplitude 控制了实际位移范围，这里直接除以它做归一化
        float t = (vElevation + 1.0) * 0.5; // 假设 amplitude 最大为 1.0
        t = clamp(t, 0.0, 1.0);

        // 低位颜色 → 高位颜色 线性插值混合
        vec3 color = mix(uColorLow, uColorHigh, t);

        // 添加一点基于 UV 坐标的细微明暗变化，增强立体感
        float light = 0.8 + 0.2 * sin(vUv.x * 3.14159 + vUv.y * 3.14159);
        color *= light;

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    // ============================================================
    // ShaderMaterial
    // ============================================================
    const uniforms = {
      uTime:      { value: 0.0 },       // 运行时间
      uFrequency: { value: 8.0 },      // 波纹频率
      uAmplitude: { value: 0.5 },      // 波纹振幅
      uColorLow:  { value: new THREE.Color(0x0033ff) }, // 波谷颜色（深蓝）
      uColorHigh: { value: new THREE.Color(0x00ffcc) }, // 波峰颜色（青绿）
    };

    const material = new THREE.ShaderMaterial({
      vertexShader,       // 顶点着色器
      fragmentShader,     // 片元着色器
      uniforms,           // 实时参数
      side: THREE.DoubleSide, // 双面渲染（可以看到平面正反两面）
      wireframe: false,   // 不显示线框
    });

    // ============================================================
    // 几何体（PlaneGeometry 作为波纹载体）
    // ============================================================
    const geometry = new THREE.PlaneGeometry(4, 4, 128, 128);
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // ============================================================
    // lil-gui 参数控制面板
    // ============================================================
    const gui = new GUI();

    const params = {
      frequency: 8.0,
      amplitude: 0.5,
      colorLow: '#0033ff',
      colorHigh: '#00ffcc',
    };

    // 频率滑块
    gui.add(params, 'frequency', 1.0, 30.0).name('波纹频率').onChange((v) => {
      uniforms.uFrequency.value = v;
    });

    // 振幅滑块
    gui.add(params, 'amplitude', 0.0, 1.5).name('波纹振幅').onChange((v) => {
      uniforms.uAmplitude.value = v;
    });

    // 波谷颜色
    gui.addColor(params, 'colorLow').name('波谷颜色').onChange((v) => {
      uniforms.uColorLow.value.set(v);
    });

    // 波峰颜色
    gui.addColor(params, 'colorHigh').name('波峰颜色').onChange((v) => {
      uniforms.uColorHigh.value.set(v);
    });

    // ============================================================
    // 响应式 resize
    // ============================================================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    // ============================================================
    // 动画循环
    // ============================================================
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      // 更新运行时间 uniform
      uniforms.uTime.value = clock.getElapsedTime();

      // 更新 OrbitControls（阻尼效果）
      controls.update();

      // 渲染
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
