<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>363 — Thermal Imaging Vision</title>
<style>
body{margin:0;overflow:hidden;background:#000}
canvas{display:block}
#info{position:absolute;top:10px;left:10px;color:#0f0;font-family:monospace;font-size:13px;pointer-events:none}
</style>
</head>
<body>
<div id="info">363 — 热成像视觉 — 点击切换调色板</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 5, 8);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const thermalTarget = new THREE.WebGLRenderTarget(innerWidth, innerHeight);
const thermalMat = new THREE.ShaderMaterial({
    uniforms: { tDiffuse: { value: null }, uTime: { value: 0 }, uPalette: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
    fragmentShader: `
        uniform sampler2D tDiffuse; uniform float uTime; uniform int uPalette;
        varying vec2 vUv;
        vec3 ironP(float t){vec3 c=vec3(0.);c=mix(c,vec3(.1,0.,0.),smoothstep(0.,.25,t));c=mix(c,vec3(.8,.1,0.),smoothstep(.25,.5,t));c=mix(c,vec3(1.,.5,0.),smoothstep(.5,.75,t));c=mix(c,vec3(1.,1.,.5),smoothstep(.75,1.,t));return c;}
        vec3 rainP(float t){return vec3(sin(t*6.28)*.5+.5,sin(t*6.28+2.09)*.5+.5,sin(t*6.28+4.19)*.5+.5);}
        vec3 grayP(float t){return vec3(t);}
        void main(){
            vec4 tx = texture2D(tDiffuse, vUv);
            float lum = dot(tx.rgb, vec3(0.299,0.587,0.114));
            float heat = lum + sin(uTime*.5+vUv.x*10.)*.05*(1.-lum);
            vec3 col; if(uPalette==0)col=ironP(heat);else if(uPalette==1)col=rainP(heat);else col=grayP(heat);
            col -= sin(vUv.y*400.+uTime*2.)*.04;
            col *= 1.-length(vUv-.5)*.8;
            gl_FragColor=vec4(col,1.);
        }
    `
});

// Objects
scene.add(new THREE.GridHelper(20, 20, 0x333333, 0x222222));
const hotS = new THREE.Mesh(new THREE.SphereGeometry(.5,32,32), new THREE.MeshStandardMaterial({color:0xff4400,emissive:0xff2200,emissiveIntensity:.5}));
hotS.position.set(-2,1,1); scene.add(hotS);
const warmC = new THREE.Mesh(new THREE.CylinderGeometry(.4,.4,2,32), new THREE.MeshStandardMaterial({color:0xff8800,emissive:0xff4400,emissiveIntensity:.4}));
warmC.position.set(2,1,-1); scene.add(warmC);
const human = new THREE.Group();
human.add(new THREE.Mesh(new THREE.SphereGeometry(.3,16,16), new THREE.MeshStandardMaterial({color:0xff6633,emissive:0xff3300,emissiveIntensity:.6})));
human.add(new THREE.Mesh(new THREE.CylinderGeometry(.25,.3,1.2,16), new THREE.MeshStandardMaterial({color:0xff6633,emissive:0xff3300,emissiveIntensity:.6})));
human.position.set(0,0,2); scene.add(human);
const coolB = new THREE.Mesh(new THREE.BoxGeometry(1.5,1.5,1.5), new THREE.MeshStandardMaterial({color:0x0044ff,emissive:0x0022aa,emissiveIntensity:.3}));
coolB.position.set(0,.75,-2); scene.add(coolB);
for(let i=0;i<100;i++){const p=new THREE.Mesh(new THREE.SphereGeometry(.03+.05*Math.random(),8,8),new THREE.MeshBasicMaterial({color:Math.random()>.5?0xff3300:0x0033ff}));p.position.set((Math.random()-.5)*15,Math.random()*5,(Math.random()-.5)*15);scene.add(p);}
scene.add(new THREE.AmbientLight(0xffffff,.3));
const pL1=new THREE.PointLight(0xff4400,5,10);pL1.position.set(-2,2,1);scene.add(pL1);
const pL2=new THREE.PointLight(0x0044ff,3,8);pL2.position.set(0,1,-2);scene.add(pL2);

const quadScene=new THREE.Scene(),quadCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
quadScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),thermalMat));

let pal=0, t=0;
window.addEventListener('click',()=>{pal=(pal+1)%3;thermalMat.uniforms.uPalette.value=pal;});
function animate(){
    requestAnimationFrame(animate);t+=0.016;thermalMat.uniforms.uTime.value=t;
    hotS.scale.setScalar(1+Math.sin(t*3)*.1);human.scale.setScalar(1+Math.sin(t*2)*.05);
    renderer.setRenderTarget(thermalTarget);renderer.render(scene,camera);renderer.setRenderTarget(null);
    thermalMat.uniforms.tDiffuse.value=thermalTarget.texture;
    renderer.render(quadScene,quadCam);controls.update();
}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);thermalTarget.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
