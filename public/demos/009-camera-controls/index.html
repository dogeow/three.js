<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>009 · 相机控制 Camera Controls</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #111; }
    canvas { display: block; }
    #tip {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font: 13px/1.7 -apple-system, sans-serif;
      max-width: 280px;
      backdrop-filter: blur(8px);
    }
    #tip strong { color: #60a5fa; }
    #ctrl-btns {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
    }
    #ctrl-btns button {
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 1px solid rgba(96,165,250,0.3);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    #ctrl-btns button:hover { background: rgba(96,165,250,0.3); }
    #ctrl-btns button.active { background: rgba(96,165,250,0.4); border-color: #60a5fa; }
  </style>
</head>
<body>

<div id="tip">
  <strong>相机控制演示</strong><br>
  三种相机控制模式：轨道 · 第一人称 · 飞行<br>
  点击右侧按钮切换模式
</div>
<div id="ctrl-btns">
  <button class="active" id="btn-orbit">轨道 Orbit</button>
  <button id="btn-first">第一人称</button>
  <button id="btn-fly">飞行 Fly</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.160.0",
    "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="main.js"></script>
</body>
</html>
