<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>365 — 3D Light Painting</title>
<style>
body{margin:0;overflow:hidden;background:#000}
canvas{display:block}
#info{position:absolute;top:10px;left:10px;color:#fff;font-family:monospace;font-size:13px;pointer-events:none;opacity:0.8}
</style>
</head>
<body>
<div id="info">365 — 3D 光绘 — 点击绘制，移动鼠标，空格清除</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 0, 5);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Accumulation buffer for light trail effect
const accumTarget = new THREE.WebGLRenderTarget(innerWidth, innerHeight, {
    minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
    format: THREE.RGBAFormat, type: THREE.HalfFloatType
});

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 2.0, 0.5, 0.6);
composer.addPass(bloom);

// Brush cursor sphere
const cursorGeo = new THREE.SphereGeometry(0.08, 16, 16);
const cursorMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
const cursor = new THREE.Mesh(cursorGeo, cursorMat);
scene.add(cursor);

// Light paint strokes stored as line segments
const strokes = [];
let currentStroke = null;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
const planeIntersect = new THREE.Vector3();

// Color palette
const colors = [
    0xff0066, 0x00ff66, 0x6600ff, 0xff6600, 0x00ffff,
    0xff00cc, 0x66ff00, 0x0066ff, 0xffff00, 0xff3333
];
let colorIdx = 0;

function startStroke(point) {
    currentStroke = { points: [point.clone()], color: colors[colorIdx] };
    const geo = new THREE.BufferGeometry();
    const mat = new THREE.LineBasicMaterial({ color: currentStroke.color, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
    currentStroke.line = new THREE.Line(geo, mat);
    scene.add(currentStroke.line);
    strokes.push(currentStroke);
}

function addPoint(point) {
    if (!currentStroke) return;
    currentStroke.points.push(point.clone());
    const positions = new Float32Array(currentStroke.points.length * 3);
    currentStroke.points.forEach((p, i) => { positions[i*3]=p.x; positions[i*3+1]=p.y; positions[i*3+2]=p.z; });
    currentStroke.line.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    currentStroke.line.geometry.attributes.position.needsUpdate = true;
}

function endStroke() { currentStroke = null; }

// Drawing plane indicator
const gridHelper = new THREE.GridHelper(20, 20, 0x222222, 0x111111);
scene.add(gridHelper);

// Faint axis indicator
const axes = new THREE.AxesHelper(2);
scene.add(axes);

scene.add(new THREE.AmbientLight(0x111111, 1));

// Background fade material
const bgMat = new THREE.ShaderMaterial({
    uniforms: { tPrev: { value: null }, uFade: { value: 0.95 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
    fragmentShader: `
        uniform sampler2D tPrev; uniform float uFade;
        varying vec2 vUv;
        void main(){ vec4 c = texture2D(tPrev, vUv); gl_FragColor = c * uFade; }
    `
});
const bgScene = new THREE.Scene(), bgCam = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), bgMat));

let drawing = false, prevTime = 0;
function animate() {
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt = (now - prevTime) / 1000;
    prevTime = now;

    // Update cursor position
    raycaster.setFromCamera(mouse, camera);
    raycaster.ray.intersectPlane(plane, planeIntersect);
    cursor.position.copy(planeIntersect);

    if (drawing) addPoint(planeIntersect);

    controls.update();
    composer.render();
}
animate();

window.addEventListener('mousemove', e => {
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

window.addEventListener('mousedown', e => {
    if (e.button === 0) {
        drawing = true;
        raycaster.setFromCamera(mouse, camera);
        raycaster.ray.intersectPlane(plane, planeIntersect);
        startStroke(planeIntersect);
    }
});

window.addEventListener('mouseup', () => { drawing = false; endStroke(); });

window.addEventListener('keydown', e => {
    if (e.code === 'Space') {
        strokes.forEach(s => scene.remove(s.line));
        strokes.length = 0;
    }
    if (e.code === 'KeyC') {
        colorIdx = (colorIdx + 1) % colors.length;
        cursor.material.color.setHex(colors[colorIdx]);
    }
});

window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
    accumTarget.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
