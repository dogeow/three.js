<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恒星碰撞</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #tip {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(0,0,0,0.72);
    border: 1px solid rgba(100,200,255,0.25);
    border-radius: 10px;
    padding: 14px 18px;
    color: #b0d8f0;
    font-size: 13px;
    line-height: 1.6;
    max-width: 270px;
    backdrop-filter: blur(8px);
    pointer-events: none;
  }
  #tip b { color: #80c8ff; }

  #ui {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 18px;
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(100,200,255,0.18);
    border-radius: 40px;
    padding: 10px 22px;
    backdrop-filter: blur(8px);
  }
  #ui label { color: #7ab8e0; font-size: 12px; letter-spacing: 0.05em; }
  #ui span { color: #a0d4f4; font-size: 12px; min-width: 60px; text-align: center; }

  #speedSlider {
    -webkit-appearance: none;
    width: 140px;
    height: 4px;
    background: rgba(80,160,220,0.3);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #speedSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #50a8e0;
    cursor: pointer;
  }

  #resetBtn {
    background: rgba(60,130,200,0.25);
    border: 1px solid rgba(80,160,220,0.4);
    border-radius: 20px;
    color: #80c8ff;
    padding: 5px 16px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.05em;
  }
  #resetBtn:hover { background: rgba(60,130,200,0.45); }

  #stats {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(100,200,255,0.18);
    border-radius: 8px;
    padding: 10px 14px;
    color: #7ab0d8;
    font-size: 11px;
    line-height: 1.8;
    backdrop-filter: blur(6px);
  }
  #stats .val { color: #60a8e0; font-weight: 600; }
</style>
</head>
<body>

<div id="tip">
  <b>恒星碰撞</b><br>
  两个螺旋星系通过引力相互作用<br>
  粒子受到两个星系中心的引力吸引<br>
  拖动旋转 &bull; 滚轮缩放
</div>
<div id="ui">
  <label>速度</label>
  <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1.0">
  <span id="speedVal">1.0x</span>
  <button id="resetBtn">重置</button>
</div>

<div id="stats">
  星系 1: <span class="val" id="cnt1">0</span><br>
  星系 2: <span class="val" id="cnt2">0</span><br>
  时间: <span class="val" id="elapsed">0.0</span>秒
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene Setup ───────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000005, 0.0012);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 8000);
camera.position.set(0, 320, 600);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000005);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.35;
controls.minDistance = 50;
controls.maxDistance = 3000;

// ─── Background Stars ──────────────────────────────────────────────────────
function addBackgroundStars() {
  const count = 4000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 2000 + Math.random() * 2500;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    sizes[i] = 0.3 + Math.random() * 1.5;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  const mat = new THREE.ShaderMaterial({
    uniforms: {},
    vertexShader: `
      attribute float size;
      void main() {
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (250.0 / -mvPos.z);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        float a = smoothstep(0.5, 0.0, d);
        gl_FragColor = vec4(0.8, 0.88, 1.0, a * 0.6);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  scene.add(new THREE.Points(geo, mat));
}
addBackgroundStars();

// ─── Galaxy Shader ──────────────────────────────────────────────────────────
const GALAXY_VERT = `
  attribute float aSize;
  attribute vec3 aColor;
  varying vec3 vColor;
  varying float vDist;
  void main() {
    vColor = aColor;
    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
    vDist = -mvPos.z;
    gl_PointSize = aSize * (350.0 / vDist);
    gl_Position = projectionMatrix * mvPos;
  }
`;

const GALAXY_FRAG = `
  varying vec3 vColor;
  varying float vDist;
  void main() {
    vec2 c = gl_PointCoord - 0.5;
    float d = length(c);
    if (d > 0.5) discard;
    float glow = exp(-d * 5.0);
    float core = exp(-d * 14.0);
    float alpha = glow * 0.55 + core * 0.45;
    alpha = clamp(alpha, 0.0, 1.0);
    vec3 col = vColor * (0.85 + core * 0.8);
    gl_FragColor = vec4(col, alpha);
  }
`;

// ─── Galaxy Class ────────────────────────────────────────────────────────────
class Galaxy {
  constructor({ count, center, color, galaxyIndex }) {
    this.count = count;
    this.center = center.clone();
    this.originalCenter = center.clone();
    this.color = new THREE.Color(color);
    this.galaxyIndex = galaxyIndex;
    this.positions = new Float32Array(count * 3);
    this.velocities = [];
    this.sizes = new Float32Array(count);
    this.colors = new Float32Array(count * 3);
    this.trailPositions = []; // ring buffers per particle
    this.trailLength = 40;

    this._buildParticles();
    this._buildMesh();
    this._buildTrails();
  }

  _buildParticles() {
    const { count, color } = this;
    for (let i = 0; i < count; i++) {
      // Logarithmic spiral arm
      const arm = Math.floor(Math.random() * 3);
      const armOffset = (arm / 3) * Math.PI * 2;
      const theta = armOffset + Math.random() * Math.PI * 4;
      const a = 8 + Math.random() * 4;    // scale factor
      const b = 0.15 + Math.random() * 0.08;
      const r = a * Math.exp(b * theta) * (0.5 + Math.random() * 0.5);
      const diskH = (Math.random() - 0.5) * 14 * Math.exp(-r / 60);

      const x = this.center.x + r * Math.cos(theta);
      const y = this.center.y + diskH;
      const z = this.center.z + r * Math.sin(theta);

      this.positions[i*3]   = x;
      this.positions[i*3+1] = y;
      this.positions[i*3+2] = z;

      // Orbital velocity (tangential + small inward for stability)
      const speed = Math.sqrt(Math.max(0.5, r)) * 0.18;
      const angle = theta + Math.PI / 2;
      const vx = -speed * Math.sin(angle) * (0.8 + Math.random() * 0.4);
      const vy = (Math.random() - 0.5) * 0.05;
      const vz =  speed * Math.cos(angle) * (0.8 + Math.random() * 0.4);
      this.velocities.push(new THREE.Vector3(vx, vy, vz));

      // Sizes: brighter near center
      this.sizes[i] = 0.4 + (1.0 - Math.min(r / 80, 1)) * 2.2 + Math.random() * 0.8;

      // Color variation
      const t = Math.random();
      const c = new THREE.Color(color);
      if (t < 0.4) {
        c.setHSL(0.55 + Math.random() * 0.06, 0.7, 0.55 + Math.random() * 0.25);
      } else if (t < 0.75) {
        c.setHSL(0.58 + Math.random() * 0.08, 0.6, 0.6 + Math.random() * 0.2);
      } else {
        c.setHSL(0.62 + Math.random() * 0.1, 0.5, 0.65 + Math.random() * 0.2);
      }
      this.colors[i*3]   = c.r;
      this.colors[i*3+1] = c.g;
      this.colors[i*3+2] = c.b;

      // Trail init
      this.trailPositions.push(new Float32Array(this.trailLength * 3));
      for (let t = 0; t < this.trailLength; t++) {
        this.trailPositions[i][t*3]   = x;
        this.trailPositions[i][t*3+1] = y;
        this.trailPositions[i][t*3+2] = z;
      }
    }
  }

  _buildMesh() {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(this.positions.slice(), 3));
    geo.setAttribute('aSize', new THREE.BufferAttribute(this.sizes, 1));
    geo.setAttribute('aColor', new THREE.BufferAttribute(this.colors, 3));

    this.material = new THREE.ShaderMaterial({
      vertexShader: GALAXY_VERT,
      fragmentShader: GALAXY_FRAG,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    this.points = new THREE.Points(geo, this.material);
    scene.add(this.points);
  }

  _buildTrails() {
    const trailGeo = new THREE.BufferGeometry();
    const trailCount = this.count * this.trailLength;
    const pos = new Float32Array(trailCount * 3);
    const alpha = new Float32Array(trailCount);
    trailGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    trailGeo.setAttribute('aAlpha', new THREE.BufferAttribute(alpha, 1));

    const trailMat = new THREE.ShaderMaterial({
      vertexShader: `
        attribute float aAlpha;
        varying float vAlpha;
        void main() {
          vAlpha = aAlpha;
          vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = 1.5 * (250.0 / -mvPos.z);
          gl_PointSize = max(gl_PointSize, 0.5);
          gl_Position = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: `
        varying float vAlpha;
        void main() {
          vec2 c = gl_PointCoord - 0.5;
          float d = length(c);
          if (d > 0.5) discard;
          float a = (1.0 - d * 2.0) * vAlpha;
          gl_FragColor = vec4(0.5, 0.7, 1.0, a * 0.3);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    this.trailMesh = new THREE.Points(trailGeo, trailMat);
    scene.add(this.trailMesh);
    this.trailGeo = trailGeo;
  }

  update(dt, speed, g1Center, g2Center, selfIdx) {
    const G = 80.0 * speed;
    const softening = 20.0;
    const positions = this.points.geometry.attributes.position.array;

    for (let i = 0; i < this.count; i++) {
      const px = positions[i*3];
      const py = positions[i*3+1];
      const pz = positions[i*3+2];

      // Gravity from both galaxy centers
      let fx = 0, fy = 0, fz = 0;

      const otherCenter = selfIdx === 0 ? g2Center : g1Center;

      // Pull toward this galaxy's own center (restoring force)
      const dx0 = this.center.x - px;
      const dy0 = this.center.y - py;
      const dz0 = this.center.z - pz;
      const r0 = Math.sqrt(dx0*dx0 + dy0*dy0 + dz0*dz0) + softening;
      const f0 = G * 0.08 / (r0 * r0);
      fx += f0 * dx0 / r0;
      fy += f0 * dy0 / r0;
      fz += f0 * dz0 / r0;

      // Pull from other galaxy
      const dx1 = otherCenter.x - px;
      const dy1 = otherCenter.y - py;
      const dz1 = otherCenter.z - pz;
      const r1 = Math.sqrt(dx1*dx1 + dy1*dy1 + dz1*dz1) + softening;
      const f1 = G * 1.2 / (r1 * r1);
      fx += f1 * dx1 / r1;
      fy += f1 * dy1 / r1;
      fz += f1 * dz1 / r1;

      // Particle-particle repulsion (local, only for nearby particles)
      for (let j = Math.max(0, i - 15); j < Math.min(this.count, i + 15); j++) {
        if (j === i) continue;
        const sx = positions[j*3];
        const sy = positions[j*3+1];
        const sz = positions[j*3+2];
        const ddx = px - sx, ddy = py - sy, ddz = pz - sz;
        const rd = Math.sqrt(ddx*ddx + ddy*ddy + ddz*ddz);
        if (rd < 4 && rd > 0.1) {
          const fr = G * 0.015 / (rd * rd);
          fx += fr * ddx / rd;
          fy += fr * ddy / rd;
          fz += fr * ddz / rd;
        }
      }

      // Drag to prevent runaway
      const drag = 0.998;

      const v = this.velocities[i];
      v.x = (v.x + fx * dt) * drag;
      v.y = (v.y + fy * dt) * drag;
      v.z = (v.z + fz * dt) * drag;

      // Cap speed
      const sp = v.length();
      if (sp > 60) { v.multiplyScalar(60 / sp); }

      positions[i*3]   += v.x * dt;
      positions[i*3+1] += v.y * dt;
      positions[i*3+2] += v.z * dt;

      // Update trails (shift ring buffer)
      const tp = this.trailPositions[i];
      const lastX = tp[(this.trailLength-1)*3];
      const lastY = tp[(this.trailLength-1)*3+1];
      const lastZ = tp[(this.trailLength-1)*3+2];
      const nx = positions[i*3], ny = positions[i*3+1], nz = positions[i*3+2];
      // Only update trail if moved enough
      const moved = Math.sqrt((nx-lastX)**2 + (ny-lastY)**2 + (nz-lastZ)**2);
      if (moved > 0.3) {
        for (let t = this.trailLength - 1; t > 0; t--) {
          tp[t*3]   = tp[(t-1)*3];
          tp[t*3+1] = tp[(t-1)*3+1];
          tp[t*3+2] = tp[(t-1)*3+2];
        }
        tp[0] = nx; tp[1] = ny; tp[2] = nz;
      }
    }

    this.points.geometry.attributes.position.needsUpdate = true;

    // Update trail mesh
    const tPos = this.trailGeo.attributes.position.array;
    const tAlpha = this.trailGeo.attributes.aAlpha.array;
    for (let i = 0; i < this.count; i++) {
      const tp = this.trailPositions[i];
      for (let t = 0; t < this.trailLength; t++) {
        const idx = (i * this.trailLength + t);
        tPos[idx*3]   = tp[t*3];
        tPos[idx*3+1] = tp[t*3+1];
        tPos[idx*3+2] = tp[t*3+2];
        tAlpha[idx] = (1.0 - t / this.trailLength) * 0.6;
      }
    }
    this.trailGeo.attributes.position.needsUpdate = true;
    this.trailGeo.attributes.aAlpha.needsUpdate = true;
  }

  dispose() {
    scene.remove(this.points);
    scene.remove(this.trailMesh);
    this.points.geometry.dispose();
    this.material.dispose();
    this.trailGeo.dispose();
    this.trailMesh.material.dispose();
  }
}

// ─── Galaxy Centers ─────────────────────────────────────────────────────────
const GALAXY_COUNT = 3000;
const center1 = new THREE.Vector3(-120, 0, 0);
const center2 = new THREE.Vector3(120, 0, 0);

// ─── Create Galaxies ────────────────────────────────────────────────────────
let galaxy1 = new Galaxy({ count: GALAXY_COUNT, center: center1.clone(), color: '#4499ff', galaxyIndex: 0 });
let galaxy2 = new Galaxy({ count: GALAXY_COUNT, center: center2.clone(), color: '#ff9944', galaxyIndex: 1 });

document.getElementById('cnt1').textContent = GALAXY_COUNT.toLocaleString();
document.getElementById('cnt2').textContent = GALAXY_COUNT.toLocaleString();

// ─── UI Controls ─────────────────────────────────────────────────────────────
let speed = 1.0;
const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');
speedSlider.addEventListener('input', () => {
  speed = parseFloat(speedSlider.value);
  speedVal.textContent = speed.toFixed(1) + 'x';
});

const resetBtn = document.getElementById('resetBtn');
resetBtn.addEventListener('click', () => {
  galaxy1.dispose();
  galaxy2.dispose();
  galaxy1 = new Galaxy({ count: GALAXY_COUNT, center: center1.clone(), color: '#4499ff', galaxyIndex: 0 });
  galaxy2 = new Galaxy({ count: GALAXY_COUNT, center: center2.clone(), color: '#ff9944', galaxyIndex: 1 });
  elapsedTime = 0;
});

// ─── Animation ──────────────────────────────────────────────────────────────
let elapsedTime = 0;
const clock = new THREE.Clock();
const elapsedEl = document.getElementById('elapsed');

function animate() {
  requestAnimationFrame(animate);
  const rawDt = clock.getDelta();
  const dt = Math.min(rawDt, 0.05) * speed;
  elapsedTime += dt;
  elapsedEl.textContent = elapsedTime.toFixed(1);

  // Get current galaxy centers (they drift over time)
  const g1Center = galaxy1.center.clone();
  const g2Center = galaxy2.center.clone();

  // Gentle drift of galaxy centers toward/around each other
  const dx = g2Center.x - g1Center.x;
  const dy = g2Center.y - g1Center.y;
  const dz = g2Center.z - g1Center.z;
  const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
  const pullStrength = 0.008 * speed;
  g1Center.x += dx * pullStrength * dt / (dist + 1);
  g1Center.y += dy * pullStrength * dt / (dist + 1);
  g1Center.z += dz * pullStrength * dt / (dist + 1);
  g2Center.x -= dx * pullStrength * dt / (dist + 1);
  g2Center.y -= dy * pullStrength * dt / (dist + 1);
  g2Center.z -= dz * pullStrength * dt / (dist + 1);
  galaxy1.center.copy(g1Center);
  galaxy2.center.copy(g2Center);

  galaxy1.update(dt, speed, g1Center, g2Center, 0);
  galaxy2.update(dt, speed, g1Center, g2Center, 1);

  controls.update();
  renderer.render(scene, camera);
}

// ─── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Attach to window ───────────────────────────────────────────────────────
window.scene = scene;
window.camera = camera;
window.renderer = renderer;
window.controls = controls;
window.galaxy1 = galaxy1;
window.galaxy2 = galaxy2;

animate();
</script>
</body>
</html>
