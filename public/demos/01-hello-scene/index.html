<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>01 · 第一个 3D 场景</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; }
  canvas { display: block; }
  .tip {
    position: fixed; top: 12px; left: 12px;
    color: #fff; font: 14px/1.6 -apple-system, sans-serif;
    background: rgba(0,0,0,.4); padding: 8px 12px; border-radius: 6px;
  }
</style>
</head>
<body>
<div class="tip">第一个 3D 场景：旋转的立方体</div>

<!-- 用 importmap 指定 three 的模块路径，无需打包工具 -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three'

// ============ 1. 三件套：Scene / Camera / Renderer ============

// 场景：所有 3D 物体的容器
const scene = new THREE.Scene()

// 透视相机：模拟人眼，远小近大
// 参数：视野角度(FOV) | 宽高比 | 近裁剪面 | 远裁剪面
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
)
camera.position.z = 3 // 把相机往后挪，否则会挤在物体里面看不到

// 渲染器：把场景画到 canvas 上
const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(window.innerWidth, window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio) // 高清屏不糊
document.body.appendChild(renderer.domElement)

// ============ 2. 创建一个立方体 ============

// 几何体：定义形状（顶点、面）
const geometry = new THREE.BoxGeometry(1, 1, 1)

// 材质：定义外观（颜色、贴图、光照响应方式）
// MeshBasicMaterial 不受光照影响，适合入门
const material = new THREE.MeshBasicMaterial({ color: 0x00ff88 })

// 网格 = 几何体 + 材质
const cube = new THREE.Mesh(geometry, material)
scene.add(cube)

// ============ 3. 渲染循环 ============

function animate() {
  requestAnimationFrame(animate)

  // 每帧让立方体旋转一点点
  cube.rotation.x += 0.01
  cube.rotation.y += 0.01

  renderer.render(scene, camera)
}
animate()

// ============ 4. 处理窗口缩放 ============

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight
  camera.updateProjectionMatrix() // 改了相机参数后必须调用
  renderer.setSize(window.innerWidth, window.innerHeight)
})

// 暴露到全局，方便在 DevTools 里调试，比如 cube.rotation.x = 0
window.cube = cube
window.camera = camera
</script>
</body>
</html>
