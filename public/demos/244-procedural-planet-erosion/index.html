<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural Planet Erosion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    /* Top-left info overlay */
    .info {
      position: fixed;
      top: 16px;
      left: 16px;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      line-height: 1.6;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 10px 14px;
      pointer-events: none;
      z-index: 10;
      letter-spacing: 0.02em;
    }
    .info strong { color: #7dd3fc; }
  </style>

  <!-- Import map: Three.js r160 + addons from jsDelivr -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div class="info">
  <strong>程序化行星侵蚀</strong> | Procedural Planet Erosion<br>
  水力侵蚀模拟，地形演化
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

/* ================================================================
   1. RENDERER & SCENE SETUP
   ================================================================ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();

/* ================================================================
   2. CAMERA & CONTROLS
   ================================================================ */
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 1.5, 3.8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 1.8;
controls.maxDistance = 10;
controls.target.set(0, 0, 0);

/* ================================================================
   3. LIGHTING
   ================================================================ */
const ambientLight = new THREE.AmbientLight(0x223344, 1.2);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff4e0, 3.5);
sunLight.position.set(5, 3, 5);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(1024, 1024);
sunLight.shadow.camera.near = 0.1;
sunLight.shadow.camera.far = 20;
scene.add(sunLight);

// Subtle rim light for depth
const rimLight = new THREE.DirectionalLight(0x4488cc, 0.8);
rimLight.position.set(-4, -1, -3);
scene.add(rimLight);

/* ================================================================
   4. STARFIELD BACKGROUND
   ================================================================ */
function buildStarfield() {
  const count = 8000;
  const positions = new Float32Array(count * 3);
  const sizes    = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 400 + Math.random() * 100;
    positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);
    sizes[i] = 0.5 + Math.random() * 1.5;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.6,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.9
  });

  return new THREE.Points(geo, mat);
}
scene.add(buildStarfield());

/* ================================================================
   5. NOISE UTILITIES (FBM)
   ================================================================ */
// Hash – maps 2D seed to a pseudo-random [0,1)
function hash2(x, y) {
  const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return n - Math.floor(n);
}

// Smooth value noise
function valueNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix,       fy = y - iy;
  // Quintic smoothstep for smoother gradients
  const ux = fx * fx * fx * (fx * (fx * 6 - 15) + 10);
  const uy = fy * fy * fy * (fy * (fy * 6 - 15) + 10);

  const a = hash2(ix,     iy    );
  const b = hash2(ix + 1, iy    );
  const c = hash2(ix,     iy + 1);
  const d = hash2(ix + 1, iy + 1);

  return a + (b - a) * ux + (c - a) * uy + (d - b - c + a) * ux * uy;
}

// Fractal Brownian Motion – layered noise for natural terrain
function fbm(x, y, octaves = 7, lacunarity = 2.0, gain = 0.5) {
  let val = 0.0, amp = 0.5, freq = 1.0;
  for (let o = 0; o < octaves; o++) {
    val  += amp * valueNoise(x * freq, y * freq);
    amp  *= gain;
    freq *= lacunarity;
  }
  return val;
}

/* ================================================================
   6. HYDRAULIC EROSION SIMULATION
   ================================================================ */
/**
 * Hydraulic (thermal + water) erosion.
 *
 * For each iteration we:
 *   1. Sprinkle a water droplet at a random sphere point.
 *   2. Compute the gradient of the height field to find flow direction.
 *   3. Move the droplet downhill, picking up sediment (erosion) or
 *      depositing sediment when the water can no longer carry it.
 *   4. Update height and sediment maps.
 *
 * @param {Float32Array} heights     – base terrain heights (1D, row-major)
 * @param {number}        gridSize    – sphere vertex grid dimension (gridSize × gridSize)
 * @param {number}        iterations  – erosion iterations
 * @param {number}        capacity    – sediment carry capacity
 * @param {number}        deposition  – deposition coefficient [0,1]
 * @param {number}        evaporation – water evaporation rate
 */
function simulateErosion(heights, gridSize, iterations, capacity, deposition, evaporation) {
  const sediment = new Float32Array(heights.length); // carried sediment per vertex
  const water    = new Float32Array(heights.length); // water volume per vertex
  const inertia  = 0.05;
  const sedimentRate = 0.25;
  const minSlope = 0.01;
  const gravity  = 9.8;

  for (let iter = 0; iter < iterations; iter++) {
    // Random starting point on sphere UV [0,1)
    let u = Math.random(), v = Math.random();
    let sw = 1.0; // starting water volume
    let ss = 0.0; // starting sediment

    let velX = 0, velZ = 0;

    for (let step = 0; step < 64; step++) {
      // Map UV → height array index
      const ix = Math.floor(u * (gridSize - 1));
      const iz = Math.floor(v * (gridSize - 1));
      const idx = iz * gridSize + ix;

      // Sample height + water
      const h  = heights[idx];
      const wv = water[idx] + sw;

      // Gradient of height field (central differences)
      const hL = heights[iz * gridSize + Math.max(ix - 1, 0)];
      const hR = heights[iz * gridSize + Math.min(ix + 1, gridSize - 1)];
      const hD = heights[Math.max(iz - 1, 0) * gridSize + ix];
      const hU = heights[Math.min(iz + 1, gridSize - 1) * gridSize + ix];

      const dHdx = (hR - hL) * 0.5;
      const dHdz = (hU - hD) * 0.5;

      // Update velocity – water flows downhill
      velX = velX * inertia - dHdx * (1 - inertia);
      velZ = velZ * inertia - dHdz * (1 - inertia);

      // Normalise so we always move exactly one texel per step
      const len = Math.sqrt(velX * velX + velZ * velZ) + 1e-6;
      velX /= len;
      velZ /= len;

      // Advance
      u += velX / gridSize;
      v += velZ / gridSize;

      // Out of bounds → settle remaining sediment and stop
      if (u < 0 || u > 1 || v < 0 || v > 1) {
        heights[idx] += ss;
        break;
      }

      const ni = Math.floor(u * (gridSize - 1));
      const nj = Math.floor(v * (gridSize - 1));
      const nidx = nj * gridSize + ni;
      const nh2 = heights[nidx];

      // Gradient at new position
      const nhL = heights[nj * gridSize + Math.max(ni - 1, 0)];
      const nhR = heights[nj * gridSize + Math.min(ni + 1, gridSize - 1)];
      const nhD = heights[Math.max(nj - 1, 0) * gridSize + ni];
      const nhU = heights[Math.min(nj + 1, gridSize - 1) * gridSize + ni];
      const dHdx2 = (nhR - nhL) * 0.5;
      const dHdz2 = (nhU - nhD) * 0.5;
      const slope = Math.sqrt(dHdx2 * dHdx2 + dHdz2 * dHdz2);

      // Sediment capacity decreases with water volume, increases with slope
      const c = Math.max(Math.max(slope, minSlope) * sw * 50.0, 0.1);

      if (ss > c) {
        // Deposit excess sediment proportionally
        const dS = (ss - c) * deposition;
        heights[idx]    += dS;
        heights[nidx]    += dS;
        ss -= dS;
      } else {
        // Erode from the terrain
        const e = Math.min((c - ss) * sedimentRate, nh2 * 0.5);
        heights[nidx]    -= e;
        ss += e;
      }

      // Evaporate water
      sw *= (1.0 - evaporation);
      if (sw < 1e-4) break;
    }
  }

  return heights;
}

/* ================================================================
   7. BUILD PLANET GEOMETRY
   ================================================================ */
const PLANET_RADIUS = 1.0;
const GRID_SIZE     = 200;   // sphere grid resolution
const SPHERE_SEGS   = 160;  // sphere segment count

/**
 * Convert sphere UV (u,v) to a 3-D point on the unit sphere,
 * then apply radial displacement = height.
 */
function buildPlanet(heights) {
  const geo = new THREE.SphereGeometry(PLANET_RADIUS, SPHERE_SEGS, SPHERE_SEGS);
  const pos = geo.attributes.position;
  const uv  = geo.attributes.uv;

  // Re-sample height at each vertex UV
  for (let i = 0; i < pos.count; i++) {
    const u = uv.getX(i);
    const v = uv.getY(i);
    const r = PLANET_RADIUS + heights[i];
    pos.setXYZ(
      i,
      r * Math.sin(v * Math.PI) * Math.cos(u * Math.PI * 2),
      r * Math.cos(v * Math.PI),
      r * Math.sin(v * Math.PI) * Math.sin(u * Math.PI * 2)
    );
  }

  pos.needsUpdate = true;
  geo.computeVertexNormals();
  return geo;
}

/* ================================================================
   8. HEIGHT-BASED VERTEX COLOURING
   ================================================================ */
function colourVertices(geo) {
  const pos    = geo.attributes.position;
  const count  = pos.count;
  const colours = new Float32Array(count * 3);

  // Colour gradient: deep ocean → shallow → beach → lowland → highland → snow
  const stops = [
    { h: -0.25, r: 0.05, g: 0.10, b: 0.35 }, // deep ocean
    { h: -0.05, r: 0.08, g: 0.22, b: 0.55 }, // shallow ocean
    { h:  0.00, r: 0.76, g: 0.70, b: 0.45 }, // beach / sand
    { h:  0.06, r: 0.25, g: 0.55, b: 0.18 }, // lowland green
    { h:  0.18, r: 0.45, g: 0.38, b: 0.22 }, // highland brown
    { h:  0.38, r: 0.80, g: 0.82, b: 0.85 }, // mountain grey
    { h:  0.60, r: 0.95, g: 0.97, b: 1.00 }, // snow cap
  ];

  // Find min / max height for normalisation
  let minH = Infinity, maxH = -Infinity;
  for (let i = 0; i < count; i++) {
    const h = pos.getY(i); // approx; actual heights vary radially
    if (h < minH) minH = h;
    if (h > maxH) maxH = h;
  }
  const range = maxH - minH || 1;

  for (let i = 0; i < count; i++) {
    const y   = pos.getY(i);
    const t   = Math.max(0, Math.min(1, (y - minH) / range));
    const t7  = t * (stops.length - 1);
    const idx = Math.floor(t7);
    const frac = t7 - idx;
    const a = stops[Math.min(idx, stops.length - 2)];
    const b = stops[Math.min(idx + 1, stops.length - 1)];

    colours[i * 3]     = a.r + (b.r - a.r) * frac;
    colours[i * 3 + 1] = a.g + (b.g - a.g) * frac;
    colours[i * 3 + 2] = a.b + (b.b - a.b) * frac;
  }

  geo.setAttribute('color', new THREE.BufferAttribute(colours, 3));
  return geo;
}

/* ================================================================
   9. ATMOSPHERIC GLOW (custom additive shader)
   ================================================================ */
const atmVertShader = /* glsl */`
  varying vec3 vNormal;
  varying vec3 vViewPos;
  void main() {
    vNormal  = normalize(normalMatrix * normal);
    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
    vViewPos   = mvPos.xyz;
    gl_Position = projectionMatrix * mvPos;
  }
`;

const atmFragShader = /* glsl */`
  varying vec3 vNormal;
  varying vec3 vViewPos;
  uniform vec3 uColour;
  uniform float uPower;

  void main() {
    // Fresnel-like edge glow: thin at centre, bright at limb
    float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), uPower);
    gl_FragColor    = vec4(uColour * intensity, intensity * 0.75);
  }
`;

function buildAtmosphere(radius, colour, power) {
  const geo = new THREE.SphereGeometry(radius, 48, 48);
  const mat = new THREE.ShaderMaterial({
    vertexShader:   atmVertShader,
    fragmentShader: atmFragShader,
    uniforms: {
      uColour: { value: new THREE.Color(colour) },
      uPower:  { value: power }
    },
    transparent: true,
    side:        THREE.BackSide,
    blending:    THREE.AdditiveBlending,
    depthWrite:  false
  });
  return new THREE.Mesh(geo, mat);
}

/* ================================================================
   10. PARAMETERS & GUI
   ================================================================ */
const params = {
  // Noise / terrain
  noiseScale:   5.5,
  octaves:      7,
  terrainScale: 0.28,
  // Erosion
  iterations:  5000,
  capacity:    8.0,
  deposition:  0.03,
  evaporation: 0.01,
  // Atmosphere
  atmPower:    3.2,
  atmRadius:   1.22,
  atmColour:   '#5599ff'
};

let planetMesh  = null;
let atmosphere1 = null; // blue haze
let atmosphere2 = null; // warm outer glow

function generatePlanet() {
  // Remove old meshes if any
  if (planetMesh)  { scene.remove(planetMesh);  planetMesh.geometry.dispose(); }
  if (atmosphere1) { scene.remove(atmosphere1); atmosphere1.geometry.dispose(); }
  if (atmosphere2) { scene.remove(atmosphere2); atmosphere2.geometry.dispose(); }

  // --- Step A: build 2D height map via FBM ---
  const gridSize = GRID_SIZE;
  const hMap = new Float32Array(gridSize * gridSize);

  for (let iy = 0; iy < gridSize; iy++) {
    for (let ix = 0; ix < gridSize; ix++) {
      const u = ix / (gridSize - 1);
      const v = iy / (gridSize - 1);
      // Domain-warp free FBM for richer detail
      const qx = fbm(u * params.noiseScale,       v * params.noiseScale,       4, 2.0, 0.6);
      const qy = fbm(u * params.noiseScale + 5.2,  v * params.noiseScale + 1.3, 4, 2.0, 0.6);
      let   h   = fbm(u * params.noiseScale + 4.0 * qx, v * params.noiseScale + 4.0 * qy,
                      params.octaves, 2.0, 0.5);
      h = (h - 0.5) * params.terrainScale;
      hMap[iy * gridSize + ix] = h;
    }
  }

  // --- Step B: hydraulic erosion pass ---
  simulateErosion(
    hMap, gridSize,
    params.iterations,
    params.capacity,
    params.deposition,
    params.evaporation
  );

  // --- Step C: build sphere geometry ---
  let geo = buildPlanet(hMap);
  geo = colourVertices(geo);

  const mat = new THREE.MeshStandardMaterial({
    vertexColors: true,
    roughness:    0.82,
    metalness:    0.05,
    flatShading: false
  });

  planetMesh = new THREE.Mesh(geo, mat);
  planetMesh.castShadow    = true;
  planetMesh.receiveShadow = true;
  scene.add(planetMesh);

  // --- Step D: atmosphere glow ---
  atmosphere1 = buildAtmosphere(params.atmRadius, params.atmColour, params.atmPower);
  atmosphere2 = buildAtmosphere(params.atmRadius * 1.35, '#ff9944', params.atmPower * 0.6);
  scene.add(atmosphere1);
  scene.add(atmosphere2);
}

// Initial generation
generatePlanet();

/* ---- lil-gui ---- */
const gui = new GUI({ title: '侵蚀参数 / Erosion' });
gui.domElement.style.cssText = 'position:fixed;top:16px;right:16px;z-index:20;';

const terrainFolder = gui.addFolder('地形 Terrain');
terrainFolder.add(params, 'noiseScale',   1, 15, 0.1).name('噪声规模');
terrainFolder.add(params, 'octaves',      2, 10, 1 ).name('倍频数');
terrainFolder.add(params, 'terrainScale', 0.05, 0.6).name('地形强度');
terrainFolder.open();

const erosionFolder = gui.addFolder('侵蚀 Erosion');
erosionFolder.add(params, 'iterations',  100, 50000, 100).name('迭代次数');
erosionFolder.add(params, 'capacity',    0.5, 20, 0.1).name('沉积容量');
erosionFolder.add(params, 'deposition',   0.001, 0.2, 0.001).name('沉积速率');
erosionFolder.add(params, 'evaporation',  0.001, 0.1, 0.001).name('蒸发率');
// Regenerate on change
erosionFolder.onChange(generatePlanet);
terrainFolder.onChange(generatePlanet);

const atmFolder = gui.addFolder('大气 Atmosphere');
atmFolder.add(params, 'atmPower',  1, 8, 0.1).name('发光强度')
  .onChange(v => {
    atmosphere1.material.uniforms.uPower.value = v;
    atmosphere2.material.uniforms.uPower.value = v * 0.6;
  });
atmFolder.add(params, 'atmRadius', 1.05, 1.5, 0.01).name('大气半径')
  .onChange(v => {
    atmosphere1.scale.setScalar(v / 1.22);
    atmosphere2.scale.setScalar(v * 1.35 / 1.22);
  });
atmFolder.addColor(params, 'atmColour').name('大气颜色')
  .onChange(v => {
    atmosphere1.material.uniforms.uColour.value.set(v);
  });

/* ================================================================
   11. ANIMATION LOOP
   ================================================================ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  // Slow planet rotation so user can see all sides
  if (planetMesh) planetMesh.rotation.y = t * 0.04;

  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ================================================================
   12. AUTO-RESIZE
   ================================================================ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
