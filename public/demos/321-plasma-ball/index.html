<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>等离子球</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    /* Topic info overlay */
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: rgba(180, 220, 255, 0.9);
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
    }
    #info span {
      display: block;
      font-size: 10px;
      color: rgba(120, 180, 255, 0.6);
      margin-top: 4px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
<div id="info">
  等离子球
  <span>交互式电球</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import GUI from 'https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.min.js';

// ─── Scene Setup ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000510, 0.06);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ─── Post-processing (Bloom) ─────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.5, 0.4, 0.85
);
bloomPass.threshold = 0.1;
bloomPass.strength = 2.0;
bloomPass.radius = 0.8;
composer.addPass(bloomPass);

// ─── Controls ────────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 2;
controls.maxDistance = 12;

// ─── Lighting ────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x112244, 0.5);
scene.add(ambientLight);

const coreLight = new THREE.PointLight(0x88ccff, 3.0, 8);
coreLight.position.set(0, 0, 0);
scene.add(coreLight);

// ─── GUI Parameters ──────────────────────────────────────────────────────────
const params = {
  intensity:  2.0,
  speed:      1.0,
  color:      '#88ccff',
  filaments:  12,
  bloomStrength: 2.0,
};

// ─── Plasma Ball Geometry ─────────────────────────────────────────────────────

// Outer glass shell (transparent sphere)
const glassGeom = new THREE.SphereGeometry(1.5, 64, 64);
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0x223344,
  transparent: true,
  opacity: 0.18,
  roughness: 0.05,
  metalness: 0.0,
  transmission: 0.6,
  thickness: 0.5,
  envMapIntensity: 0.3,
  side: THREE.FrontSide,
});
const glassShell = new THREE.Mesh(glassGeom, glassMat);
scene.add(glassShell);

// Inner plasma core (small glowing sphere)
const coreGeom = new THREE.SphereGeometry(0.18, 32, 32);
const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const plasmaCore = new THREE.Mesh(coreGeom, coreMat);
scene.add(plasmaCore);

// ─── Filament System ──────────────────────────────────────────────────────────
const FILAMENT_SEGMENTS = 28;   // vertices per filament
const filamentGroup = new THREE.Group();
scene.add(filamentGroup);

let filaments = [];

/**
 * Creates a single lightning filament: a THREE.Line whose vertices are
 * animated each frame to zigzag from the core outward to the shell.
 */
function createFilament() {
  const positions = new Float32Array(FILAMENT_SEGMENTS * 3);
  const geometry  = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const color = new THREE.Color(params.color);
  const material = new THREE.LineBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });

  const line = new THREE.Line(geometry, material);
  line.userData = {
    offsets: new Float32Array(FILAMENT_SEGMENTS),   // per-vertex phase offset
    phases:  new Float32Array(FILAMENT_SEGMENTS),   // animation phase
  };

  filamentGroup.add(line);
  return line;
}

/** Rebuild filament array to match `params.filaments` count. */
function rebuildFilaments() {
  // Remove old
  filaments.forEach(f => filamentGroup.remove(f));
  filaments = [];

  for (let i = 0; i < params.filaments; i++) {
    filaments.push(createFilament());
  }
}

rebuildFilaments();

/**
 * Direction vector for each filament (set on mouse hover).
 * Stored so filaments smoothly return to random directions when not hovering.
 */
const filamentDirs = filaments.map(() => new THREE.Vector3(
  Math.random() - 0.5,
  Math.random() - 0.5,
  Math.random() - 0.5
).normalize());

/** Target direction per filament (set by mouse). */
const filamentTargetDirs = filamentDirs.map(v => v.clone());

/**
 * Update one filament's vertex positions.
 * The path starts at the core and zigzags outward toward the shell.
 */
function updateFilament(fi, time) {
  const line      = filaments[fi];
  const positions = line.geometry.attributes.position.array;
  const offsets    = line.userData.offsets;
  const phases     = line.userData.phases;

  const dir = filamentDirs[fi];
  const speed = params.speed;

  // Randomise offsets/phases once on creation
  if (offsets[0] === 0 && fi >= 0) {
    for (let v = 0; v < FILAMENT_SEGMENTS; v++) {
      offsets[v] = Math.random() * Math.PI * 2;
      phases[v]  = Math.random() * 0.3;
    }
  }

  const innerR = 0.18;
  const outerR = 1.38;

  for (let v = 0; v < FILAMENT_SEGMENTS; v++) {
    const t = v / (FILAMENT_SEGMENTS - 1);

    // Radial distance with a small pulse
    const r = innerR + (outerR - innerR) * t
            + Math.sin(t * Math.PI * 3 + time * speed * 4 + offsets[v]) * 0.05;

    // Jitter amplitude grows toward the tip
    const jitter = 0.08 * t * t;

    const px = dir.x * r + Math.sin(time * speed * 3 + offsets[v]) * jitter * (Math.random() > 0.5 ? 1 : -1);
    const py = dir.y * r + Math.cos(time * speed * 3.3 + offsets[v] + 1) * jitter;
    const pz = dir.z * r + Math.sin(time * speed * 2.7 + offsets[v] + 2) * jitter;

    positions[v * 3]     = px;
    positions[v * 3 + 1] = py;
    positions[v * 3 + 2] = pz;
  }

  line.geometry.attributes.position.needsUpdate = true;
  line.material.color.set(params.color);
  line.material.opacity = 0.5 + params.intensity * 0.25;
}

/** Update all filaments each frame. */
function updateAllFilaments(time) {
  for (let i = 0; i < filaments.length; i++) {
    updateFilament(i, time);
  }
}

// ─── Mouse Interaction ────────────────────────────────────────────────────────
const mouse     = new THREE.Vector2(-9999, -9999);
const raycaster = new THREE.Raycaster();
let   mouseOnSphere = false;

window.addEventListener('mousemove', (e) => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight)  * 2 + 1;
});

window.addEventListener('mouseleave', () => {
  mouseOnSphere = false;
  // Reset targets to random directions
  for (let i = 0; i < filamentTargetDirs.length; i++) {
    filamentTargetDirs[i].set(
      Math.random() - 0.5,
      Math.random() - 0.5,
      Math.random() - 0.5
    ).normalize();
  }
});

/** Convert mouse position to a 3D direction on the sphere surface. */
function getMouseDir() {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(glassShell);
  if (intersects.length > 0) {
    return intersects[0].point.clone().normalize();
  }
  return null;
}

window.addEventListener('mousemove', () => {
  const dir = getMouseDir();
  if (dir) {
    mouseOnSphere = true;
    // Influence all filaments toward the mouse point with a slight spread
    for (let i = 0; i < filamentTargetDirs.length; i++) {
      const spread = (Math.random() - 0.5) * 0.4;
      filamentTargetDirs[i].copy(dir).addScalar(spread).normalize();
    }
  }
});

// ─── GUI ──────────────────────────────────────────────────────────────────────
const gui = new GUI({ title: '等离子球控制' });

gui.add(params, 'intensity', 0.1, 5.0, 0.1).name('强度').onChange(v => {
  bloomPass.strength = params.bloomStrength * (v / 2.5);
});
gui.add(params, 'speed', 0.1, 4.0, 0.1).name('速度');
gui.addColor(params, 'color').name('颜色').onChange(() => {
  // color applied in updateFilament
});
gui.add(params, 'filaments', 2, 30, 1).name('丝状体').onFinishChange(() => {
  rebuildFilaments();
});
gui.add(params, 'bloomStrength', 0.5, 5.0, 0.1).name('泛光强度').onChange(v => {
  bloomPass.strength = v * (params.intensity / 2.5);
});

// ─── Window Resize ────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  bloomPass.setSize(window.innerWidth, window.innerHeight);
});

// ─── Background Particles (ambient sparks) ────────────────────────────────────
const sparkCount = 200;
const sparkGeom  = new THREE.BufferGeometry();
const sparkPos   = new Float32Array(sparkCount * 3);
const sparkSeed  = new Float32Array(sparkCount);

for (let i = 0; i < sparkCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  const r     = 1.5 + Math.random() * 1.5;
  sparkPos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
  sparkPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  sparkPos[i * 3 + 2] = r * Math.cos(phi);
  sparkSeed[i] = Math.random() * Math.PI * 2;
}

sparkGeom.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));
const sparkMat = new THREE.PointsMaterial({
  color: 0x88ccff,
  size: 0.04,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const sparks = new THREE.Points(sparkGeom, sparkMat);
scene.add(sparks);

// ─── Animation Loop ───────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();

  // Core pulse
  const pulse = 0.85 + Math.sin(time * 3.0 * params.speed) * 0.15;
  plasmaCore.scale.setScalar(pulse);
  coreLight.intensity = params.intensity * pulse;

  // Smooth filament direction lerp
  for (let i = 0; i < filaments.length; i++) {
    filamentDirs[i].lerp(filamentTargetDirs[i], 0.04);
  }

  // Update lightning filaments
  updateAllFilaments(time);

  // Spark drift
  const sparkPosArr = sparks.geometry.attributes.position.array;
  for (let i = 0; i < sparkCount; i++) {
    const seed = sparkSeed[i];
    sparkPosArr[i * 3]     += Math.sin(time * 0.7 + seed) * 0.001;
    sparkPosArr[i * 3 + 1] += Math.cos(time * 0.5 + seed) * 0.001;
  }
  sparks.geometry.attributes.position.needsUpdate = true;
  sparks.material.color.set(params.color);

  controls.update();
  composer.render();
}

animate();
</script>
</body>
</html>
