<script type="module">

// ─────────────────────────────────────────────────────────────────────────────
// Renderer & Scene Setup
// ─────────────────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });

document.body.appendChild(renderer.domElement);

scene.background = new THREE.Color(0x08080e);

camera.position.set(0, 3.5, 7);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 2;
controls.maxDistance = 18;
controls.maxPolarAngle = Math.PI * 0.88;
controls.update();

// ─────────────────────────────────────────────────────────────────────────────
// Lighting
// ─────────────────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x334466, 0.6);

const dirLight = new THREE.DirectionalLight(0xffeedd, 2.2);

dirLight.shadow.camera.bottom = -6;

const rimLight = new THREE.DirectionalLight(0x4466ff, 0.8);
rimLight.position.set(-5, 4, -4);

const fillLight = new THREE.PointLight(0xff6644, 1.2, 12);
fillLight.position.set(-3, 1.5, 3);
scene.add(fillLight);

// ─────────────────────────────────────────────────────────────────────────────
// Ground Plane
// ─────────────────────────────────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(30, 30, 60, 60);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x111118,
  roughness: 0.85,
  metalness: 0.15,
  envMapIntensity: 0.3,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid overlay
const gridHelper = new THREE.GridHelper(30, 30, 0x223355, 0x112233);
gridHelper.position.y = 0.002;
gridHelper.material.opacity = 0.35;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// ─────────────────────────────────────────────────────────────────────────────
// Skeleton Hierarchy Builder
// We build a simple humanoid rig from BoxGeometry / CapsuleGeometry / SphereGeometry
// Each "bone" is a THREE.Group that acts as a joint pivot.
// ─────────────────────────────────────────────────────────────────────────────

function createBone(geometry, material, position) {
  const mesh = new THREE.Mesh(geometry, material);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  const group = new THREE.Group();
  group.add(mesh);
  if (position) group.position.copy(position);
  return group;
}

// Materials for different body parts
const matBody = new THREE.MeshStandardMaterial({ color: 0x4a7aff, roughness: 0.4, metalness: 0.3 });
const matLimb = new THREE.MeshStandardMaterial({ color: 0x3a5acc, roughness: 0.5, metalness: 0.25 });
const matHead = new THREE.MeshStandardMaterial({ color: 0x88aaff, roughness: 0.3, metalness: 0.2 });
const matJoint = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, metalness: 0.6, emissive: 0x224488, emissiveIntensity: 0.4 });
const matShadow = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 1.0, transparent: true, opacity: 0.25 });

// ─── Build Skeleton Rig ───────────────────────────────────────────────────────

// Root / Hips
const hips = new THREE.Group();
hips.name = 'Hips';
hips.position.set(0, 1.0, 0);
scene.add(hips);

// Hips mesh (pelvis box)
const hipsMesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.28, 0.26), matBody);
hipsMesh.castShadow = true;
hips.add(hipsMesh);

// Spine
const spine = new THREE.Group();
spine.name = 'Spine';
spine.position.y = 0.16;
hips.add(spine);

const spineMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.14, 0.22, 4, 8), matBody);
spineMesh.position.y = 0.11;
spineMesh.castShadow = true;
spine.add(spineMesh);

// Chest
const chest = new THREE.Group();
chest.name = 'Chest';
chest.position.y = 0.35;
spine.add(chest);

const chestMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.2, 0.28, 4, 8), matBody);
chestMesh.position.y = 0.14;
chestMesh.castShadow = true;
chest.add(chestMesh);

// Shoulder pad left
const shoulderL = new THREE.Group();
shoulderL.name = 'ShoulderL';
shoulderL.position.set(-0.28, 0.3, 0);
chest.add(shoulderL);

const shoulderMeshL = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), matJoint);
shoulderL.add(shoulderMeshL);

// Upper arm left
const upperArmL = new THREE.Group();
upperArmL.name = 'UpperArmL';
upperArmL.position.x = -0.28;
upperArmL.position.y = 0.3;
chest.add(upperArmL);

const upperArmMeshL = new THREE.Mesh(new THREE.CapsuleGeometry(0.07, 0.28, 4, 8), matLimb);
upperArmMeshL.position.set(-0.02, -0.14, 0);
upperArmMeshL.castShadow = true;
upperArmL.add(upperArmMeshL);

// Elbow left
const elbowL = new THREE.Group();
elbowL.name = 'ElbowL';
elbowL.position.y = -0.30;
upperArmL.add(elbowL);

const elbowMeshL = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), matJoint);
elbowL.add(elbowMeshL);

// Lower arm left
const lowerArmL = new THREE.Group();
lowerArmL.name = 'LowerArmL';
lowerArmL.position.y = -0.08;
elbowL.add(lowerArmL);

const lowerArmMeshL = new THREE.Mesh(new THREE.CapsuleGeometry(0.055, 0.24, 4, 8), matLimb);
lowerArmMeshL.position.y = -0.12;
lowerArmMeshL.castShadow = true;
lowerArmL.add(lowerArmMeshL);

// Hand left
const handL = new THREE.Group();
handL.name = 'HandL';
handL.position.y = -0.28;
elbowL.add(handL);

const handMeshL = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.12, 0.05), matBody);
handL.add(handMeshL);

// Shoulder pad right (mirror)
const shoulderR = new THREE.Group();
shoulderR.name = 'ShoulderR';
shoulderR.position.set(0.28, 0.3, 0);
chest.add(shoulderR);

const shoulderMeshR = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), matJoint);
shoulderR.add(shoulderMeshR);

// Upper arm right
const upperArmR = new THREE.Group();
upperArmR.name = 'UpperArmR';
upperArmR.position.x = 0.28;
upperArmR.position.y = 0.3;
chest.add(upperArmR);

const upperArmMeshR = new THREE.Mesh(new THREE.CapsuleGeometry(0.07, 0.28, 4, 8), matLimb);
upperArmMeshR.position.set(0.02, -0.14, 0);
upperArmMeshR.castShadow = true;
upperArmR.add(upperArmMeshR);

// Elbow right
const elbowR = new THREE.Group();
elbowR.name = 'ElbowR';
elbowR.position.y = -0.30;
upperArmR.add(elbowR);

const elbowMeshR = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), matJoint);
elbowR.add(elbowMeshR);

// Lower arm right
const lowerArmR = new THREE.Group();
lowerArmR.name = 'LowerArmR';
lowerArmR.position.y = -0.08;
elbowR.add(lowerArmR);

const lowerArmMeshR = new THREE.Mesh(new THREE.CapsuleGeometry(0.055, 0.24, 4, 8), matLimb);
lowerArmMeshR.position.y = -0.12;
lowerArmMeshR.castShadow = true;
lowerArmR.add(lowerArmMeshR);

// Hand right
const handR = new THREE.Group();
handR.name = 'HandR';
handR.position.y = -0.28;
elbowR.add(handR);

const handMeshR = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.12, 0.05), matBody);
handR.add(handMeshR);

// Neck
const neck = new THREE.Group();
neck.name = 'Neck';
neck.position.y = 0.38;
chest.add(neck);

const neckMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.09, 0.14, 8), matBody);
neckMesh.position.y = 0.07;
neckMesh.castShadow = true;
neck.add(neckMesh);

// Head
const headJoint = new THREE.Group();
headJoint.name = 'Head';
headJoint.position.y = 0.18;
neck.add(headJoint);

const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 12), matHead);
headMesh.position.y = 0.08;
headMesh.scale.set(1, 1.1, 1);
headMesh.castShadow = true;
headJoint.add(headMesh);

// Eyes (decorative)
const eyeGeo = new THREE.SphereGeometry(0.04, 8, 8);
const eyeMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1.5, roughness: 0 });
const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
eyeL.position.set(-0.09, 0.14, 0.19);
headJoint.add(eyeL);
const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
eyeR.position.set(0.09, 0.14, 0.19);
headJoint.add(eyeR);

// ─── Left Leg ─────────────────────────────────────────────────────────────────

// Hip joint left
const hipJointL = new THREE.Group();
hipJointL.name = 'HipJointL';
hipJointL.position.set(-0.17, -0.06, 0);
hips.add(hipJointL);

const hipJointMeshL = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 8), matJoint);
hipJointL.add(hipJointMeshL);

// Upper leg left
const upperLegL = new THREE.Group();
upperLegL.name = 'UpperLegL';
upperLegL.position.y = -0.06;
hipJointL.add(upperLegL);

const upperLegMeshL = new THREE.Mesh(new THREE.CapsuleGeometry(0.09, 0.32, 4, 8), matLimb);
upperLegMeshL.position.y = -0.16;
upperLegMeshL.castShadow = true;
upperLegL.add(upperLegMeshL);

// Knee left
const kneeL = new THREE.Group();
kneeL.name = 'KneeL';
kneeL.position.y = -0.34;
upperLegL.add(kneeL);

const kneeMeshL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), matJoint);
kneeL.add(kneeMeshL);

// Lower leg left
const lowerLegL = new THREE.Group();
lowerLegL.name = 'LowerLegL';
lowerLegL.position.y = -0.06;
kneeL.add(lowerLegL);

const lowerLegMeshL = new THREE.Mesh(new THREE.CapsuleGeometry(0.065, 0.30, 4, 8), matLimb);
lowerLegMeshL.position.y = -0.15;
lowerLegMeshL.castShadow = true;
lowerLegL.add(lowerLegMeshL);

// Ankle left
const ankleL = new THREE.Group();
ankleL.name = 'AnkleL';
ankleL.position.y = -0.32;
lowerLegL.add(ankleL);

const ankleMeshL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), matJoint);
ankleL.add(ankleMeshL);

// Foot left
const footL = new THREE.Group();
footL.name = 'FootL';
footL.position.y = -0.08;
ankleL.add(footL);

const footMeshL = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.06, 0.22), matBody);
footMeshL.position.set(0, 0, 0.04);
footMeshL.castShadow = true;
footL.add(footMeshL);

// ─── Right Leg (mirror) ───────────────────────────────────────────────────────

const hipJointR = new THREE.Group();
hipJointR.name = 'HipJointR';
hipJointR.position.set(0.17, -0.06, 0);
hips.add(hipJointR);

const hipJointMeshR = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 8), matJoint);
hipJointR.add(hipJointMeshR);

const upperLegR = new THREE.Group();
upperLegR.name = 'UpperLegR';
upperLegR.position.y = -0.06;
hipJointR.add(upperLegR);

const upperLegMeshR = new THREE.Mesh(new THREE.CapsuleGeometry(0.09, 0.32, 4, 8), matLimb);
upperLegMeshR.position.y = -0.16;
upperLegMeshR.castShadow = true;
upperLegR.add(upperLegMeshR);

const kneeR = new THREE.Group();
kneeR.name = 'KneeR';
kneeR.position.y = -0.34;
upperLegR.add(kneeR);

const kneeMeshR = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), matJoint);
kneeR.add(kneeMeshR);

const lowerLegR = new THREE.Group();
lowerLegR.name = 'LowerLegR';
lowerLegR.position.y = -0.06;
kneeR.add(lowerLegR);

const lowerLegMeshR = new THREE.Mesh(new THREE.CapsuleGeometry(0.065, 0.30, 4, 8), matLimb);
lowerLegMeshR.position.y = -0.15;
lowerLegMeshR.castShadow = true;
lowerLegR.add(lowerLegMeshR);

const ankleR = new THREE.Group();
ankleR.name = 'AnkleR';
ankleR.position.y = -0.32;
lowerLegR.add(ankleR);

const ankleMeshR = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), matJoint);
ankleR.add(ankleMeshR);

const footR = new THREE.Group();
footR.name = 'FootR';
footR.position.y = -0.08;
ankleR.add(footR);

const footMeshR = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.06, 0.22), matBody);
footMeshR.position.set(0, 0, 0.04);
footMeshR.castShadow = true;
footR.add(footMeshR);

// ─────────────────────────────────────────────────────────────────────────────
// Collect all bone pivot groups for animation
// ─────────────────────────────────────────────────────────────────────────────
const bones = {
  hips,
  spine,
  chest,
  neck,
  head: headJoint,
  // Arms
  shoulderL, upperArmL, elbowL, lowerArmL, handL,
  shoulderR, upperArmR, elbowR, lowerArmR, handR,
  // Legs
  hipJointL, upperLegL, kneeL, lowerLegL, ankleL, footL,
  hipJointR, upperLegR, kneeR, lowerLegR, ankleR, footR,
};

// ─────────────────────────────────────────────────────────────────────────────
// Procedural Animation Functions
// Each returns a function that sets bone rotations given a time `t` (seconds)
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Idle: gentle breathing, subtle weight shift, occasional head turn
 */
function createIdleAnimation() {
  return function animateIdle(t) {
    const s = Math.sin;

    // Breathing — spine and chest expand/contract
    const breath = s(t * 1.8) * 0.025;
    bones.spine.scale.set(1, 1 + breath * 0.3, 1 + breath * 0.5);
    bones.chest.scale.set(1, 1 + breath, 1 + breath);

    // Subtle hip sway
    bones.hips.rotation.z = s(t * 0.9) * 0.015;
    bones.hips.rotation.y = s(t * 0.5) * 0.03;
    bones.hips.position.y = 1.0 + s(t * 1.8) * 0.012;

    // Head slight turn
    bones.head.rotation.y = s(t * 0.4) * 0.12;
    bones.head.rotation.x = s(t * 0.7) * 0.04;

    // Arms hang loosely, breathing motion
    bones.upperArmL.rotation.x = s(t * 1.8) * 0.02 - 0.05;
    bones.upperArmL.rotation.z = 0.08;
    bones.upperArmR.rotation.x = s(t * 1.8 + 0.5) * 0.02 - 0.05;
    bones.upperArmR.rotation.z = -0.08;

    bones.lowerArmL.rotation.x = -0.12;
    bones.lowerArmR.rotation.x = -0.12;

    // Legs relaxed stance
    bones.upperLegL.rotation.x = s(t * 0.6) * 0.015;
    bones.upperLegR.rotation.x = -bones.upperLegL.rotation.x;
    bones.lowerLegL.rotation.x = 0;
    bones.lowerLegR.rotation.x = 0;
    bones.kneeL.rotation.x = s(t * 0.6 + 0.2) * 0.01;
    bones.kneeR.rotation.x = -bones.kneeL.rotation.x;
  };
}

/**
 * Walk: full walking cycle with arm-leg counter-swing
 */
function createWalkAnimation() {
  return function animateWalk(t) {
    const s = Math.sin;
    const walkSpeed = 3.5;
    const phase = t * walkSpeed;

    // Hip bob and sway
    bones.hips.position.y = 1.0 + Math.abs(s(phase * 2)) * 0.04;
    bones.hips.rotation.z = s(phase) * 0.06;
    bones.hips.rotation.y = s(phase) * 0.1;

    // Spine slight lean
    bones.spine.rotation.x = 0.04;
    bones.chest.rotation.y = s(phase) * 0.06;

    // Head follows hip sway lightly
    bones.head.rotation.y = s(phase) * 0.08;
    bones.head.rotation.x = -0.02;

    // ── Left Leg ────────────────────────────────────────────────────────────
    const legSwingL = 0.55;
    bones.upperLegL.rotation.x = s(phase) * legSwingL;
    bones.kneeL.rotation.x = Math.max(0, s(phase + Math.PI * 0.5)) * 0.6;
    bones.lowerLegL.rotation.x = -Math.max(0, s(phase + Math.PI * 0.5)) * 0.4;
    bones.ankleL.rotation.x = s(phase + Math.PI * 0.3) * 0.15;
    bones.footL.rotation.x = -0.05;

    // ── Right Leg ───────────────────────────────────────────────────────────
    const legSwingR = 0.55;
    bones.upperLegR.rotation.x = s(phase + Math.PI) * legSwingR;
    bones.kneeR.rotation.x = Math.max(0, s(phase + Math.PI + Math.PI * 0.5)) * 0.6;
    bones.lowerLegR.rotation.x = -Math.max(0, s(phase + Math.PI + Math.PI * 0.5)) * 0.4;
    bones.ankleR.rotation.x = s(phase + Math.PI + Math.PI * 0.3) * 0.15;
    bones.footR.rotation.x = -0.05;

    // ── Left Arm (opposite to left leg) ─────────────────────────────────────
    const armSwing = 0.45;
    bones.upperArmL.rotation.x = s(phase + Math.PI) * armSwing;
    bones.upperArmL.rotation.z = 0.08;
    bones.lowerArmL.rotation.x = s(phase + Math.PI + 0.8) * 0.4 - 0.3;

    // ── Right Arm (opposite to right leg) ───────────────────────────────────
    bones.upperArmR.rotation.x = s(phase) * armSwing;
    bones.upperArmR.rotation.z = -0.08;
    bones.lowerArmR.rotation.x = s(phase + 0.8) * 0.4 - 0.3;
  };
}

/**
 * Run: exaggerated fast running with deeper knee drive
 */
function createRunAnimation() {
  return function animateRun(t) {
    const s = Math.sin;
    const runSpeed = 6.5;
    const phase = t * runSpeed;

    // Hip bounce
    bones.hips.position.y = 1.0 + Math.abs(s(phase * 2)) * 0.09;
    bones.hips.rotation.z = s(phase) * 0.08;
    bones.hips.rotation.y = s(phase) * 0.15;

    // Forward lean
    bones.spine.rotation.x = 0.12;
    bones.chest.rotation.x = -0.04;
    bones.chest.rotation.y = s(phase) * 0.08;

    // Head counter-balance
    bones.head.rotation.x = -0.06;
    bones.head.rotation.y = s(phase) * 0.06;

    // ── Left Leg ────────────────────────────────────────────────────────────
    const legSwingL = 0.9;
    bones.upperLegL.rotation.x = s(phase) * legSwingL;
    bones.kneeL.rotation.x = Math.max(0, s(phase + Math.PI * 0.5)) * 1.1;
    bones.lowerLegL.rotation.x = -Math.max(0, s(phase + Math.PI * 0.5)) * 0.8;
    bones.ankleL.rotation.x = s(phase + Math.PI * 0.3) * 0.3;
    bones.footL.rotation.x = s(phase) > 0 ? -0.15 : 0.0;

    // ── Right Leg ───────────────────────────────────────────────────────────
    bones.upperLegR.rotation.x = s(phase + Math.PI) * legSwingL;
    bones.kneeR.rotation.x = Math.max(0, s(phase + Math.PI + Math.PI * 0.5)) * 1.1;
    bones.lowerLegR.rotation.x = -Math.max(0, s(phase + Math.PI + Math.PI * 0.5)) * 0.8;
    bones.ankleR.rotation.x = s(phase + Math.PI + Math.PI * 0.3) * 0.3;
    bones.footR.rotation.x = s(phase + Math.PI) > 0 ? -0.15 : 0.0;

    // ── Left Arm ─────────────────────────────────────────────────────────────
    const armSwing = 0.8;
    bones.upperArmL.rotation.x = s(phase + Math.PI) * armSwing;
    bones.upperArmL.rotation.z = 0.12;
    bones.lowerArmL.rotation.x = s(phase + Math.PI + 0.5) * 0.7 - 0.6;

    // ── Right Arm ────────────────────────────────────────────────────────────
    bones.upperArmR.rotation.x = s(phase) * armSwing;
    bones.upperArmR.rotation.z = -0.12;
    bones.lowerArmR.rotation.x = s(phase + 0.5) * 0.7 - 0.6;
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// Blending System — THREE.Skeleton + THREE.AnimationMixer-like approach
// We simulate the AnimationMixer crossFade behaviour by maintaining
// per-bone current rotations and blending target rotations.
// ─────────────────────────────────────────────────────────────────────────────

// Interpolation helpers
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpQuat(q1, q2, t) { return q1.clone().slerp(q2, t); }

class SkeletalBlendSystem {
  constructor() {
    // Three "base" animations
    this.animations = {
      idle: createIdleAnimation(),
      walk: createWalkAnimation(),
      run:  createRunAnimation(),
    };

    // Blend weights (controlled by lil-gui)
    this.weights = { idle: 1.0, walk: 0.0, run: 0.0 };

    // Smooth weight targets for gradual crossFade
    this._targetWeights = { ...this.weights };
    this._weightSpeeds = { idle: 2.5, walk: 2.5, run: 2.5 };

    // Snapshot of bone local rotations before animation
    // (stored as THREE.Euler so we can reconstruct quats)
    this._baseRotations = {};
    Object.keys(this.animations).forEach(name => {
      this._baseRotations[name] = {};
      Object.keys(bones).forEach(boneName => {
        this._baseRotations[name][boneName] = new THREE.Euler();
      });
    });

    // Current blended Euler rotations per bone
    this._currentRot = {};
    Object.keys(bones).forEach(name => {
      this._currentRot[name] = new THREE.Euler();
    });
  }

  /**
   * Set target weight for an animation (triggers crossFade)
   */
  setWeight(name, value) {
    if (this._targetWeights.hasOwnProperty(name)) {
      this._targetWeights[name] = value;
    }
  }

  /**
   * Update blend weights — call once per frame
   * @param {number} dt delta time in seconds
   */
  updateWeights(dt) {
    Object.keys(this._targetWeights).forEach(name => {
      const target = this._targetWeights[name];
      const current = this.weights[name];
      // Exponential smoothing toward target
      this.weights[name] += (target - current) * Math.min(1.0, this._weightSpeeds[name] * dt);
      // Clamp
      this.weights[name] = Math.max(0, Math.min(1, this.weights[name]));
    });

    // Renormalise so they sum to 1
    const total = this.weights.idle + this.weights.walk + this.weights.run;
    if (total > 0.001) {
      const inv = 1 / total;
      this.weights.idle  *= inv;
      this.weights.walk  *= inv;
      this.weights.run   *= inv;
    }
  }

  /**
   * Advance animation state and apply blended bone rotations
   * @param {number} t  global time in seconds
   * @param {number} dt  delta time in seconds
   */
  update(t, dt) {
    this.updateWeights(dt);

    const w = this.weights;

    // For each bone, compute weighted-average Euler angles
    // We accumulate into _currentRot via quaternion blending for smooth results
    const tmpQuat = new THREE.Quaternion();
    const outQuat = new THREE.Quaternion();

    Object.keys(bones).forEach(boneName => {
      const bone = bones[boneName];

      // Save the bone's rest rotation (pre-animation base)
      // We store it as the quaternion that takes bone from its rest to current
      // We use euler accumulation for simplicity
      outQuat.set(0, 0, 0, 0);
      let totalW = 0;

      Object.entries(this.animations).forEach(([animName, animFn]) => {
        const weight = this.weights[animName];
        if (weight < 0.0001) return;

        // Snapshot into the bone hierarchy BEFORE calling anim
        // We reuse _baseRotations[animName][boneName] to hold the euler of this bone
        // computed at the current animation state
        const savedX = bone.rotation.x;
        const savedY = bone.rotation.y;
        const savedZ = bone.rotation.z;

        // Apply this animation's pose to get target euler
        animFn(t);
        const targetX = bone.rotation.x;
        const targetY = bone.rotation.y;
        const targetZ = bone.rotation.z;

        // Restore
        bone.rotation.set(savedX, savedY, savedZ);

        // Convert target euler to quaternion (XYZ order, matching Three.js default)
        tmpQuat.setFromEuler(new THREE.Euler(targetX, targetY, targetZ, 'XYZ'));

        // Weighted slerp accumulation
        // Normalise weight for quaternion slerp
        const wNorm = weight / (w.idle + w.walk + w.run);
        outQuat.x += tmpQuat.x * wNorm;
        outQuat.y += tmpQuat.y * wNorm;
        outQuat.z += tmpQuat.z * wNorm;
        outQuat.w += tmpQuat.w * wNorm;
        totalW += wNorm;
      });

      if (totalW > 0) {
        outQuat.normalize();
        bone.quaternion.copy(outQuat);
      }
    });
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Instantiate and apply initial pose
// ─────────────────────────────────────────────────────────────────────────────
const blendSystem = new SkeletalBlendSystem();

// Apply initial idle pose
blendSystem.animations.idle(0);
Object.keys(bones).forEach(name => {
  const b = bones[name];
  // Store initial quaternion as rest
  b.quaternion.set(0, 0, 0, 1);
});

// ─────────────────────────────────────────────────────────────────────────────
// lil-gui Controls
// ─────────────────────────────────────────────────────────────────────────────
const gui = new GUI({ title: '动画混合', width: 240 });
gui.domElement.style.position = 'fixed';
gui.domElement.style.top = '10px';
gui.domElement.style.right = '10px';

const blendParams = {
  idle: 1.0,
  walk: 0.0,
  run:  0.0,
};

function updateWeights() {
  blendSystem.setWeight('idle', blendParams.idle);
  blendSystem.setWeight('walk', blendParams.walk);
  blendSystem.setWeight('run',  blendParams.run);
}

const fBlend = gui.addFolder('混合权重');
fBlend.add(blendParams, 'idle', 0, 1, 0.01).name('待机').onChange(updateWeights);
fBlend.add(blendParams, 'walk', 0, 1, 0.01).name('行走').onChange(updateWeights);
fBlend.add(blendParams, 'run',  0, 1, 0.01).name('奔跑').onChange(updateWeights);
fBlend.open();

const info = {
  total: '1.00',
  status: '待机',
};
const fInfo = gui.addFolder('信息');
fInfo.add(info, 'total').name('总和').listen().disable();
fInfo.add(info, 'status').name('主导').listen().disable();
fInfo.open();

// ─────────────────────────────────────────────────────────────────────────────
// Post-processing (Bloom)
// ─────────────────────────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.5, 0.4, 0.85
);
composer.addPass(bloomPass);

// ─────────────────────────────────────────────────────────────────────────────
// Animation Loop
// ─────────────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let elapsed = 0;

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);
  elapsed += dt;

  // Update blend system
  blendSystem.update(elapsed, dt);

  // Update info panel
  const w = blendSystem.weights;
  info.total = (w.idle + w.walk + w.run).toFixed(2);
  const dominant = w.run > w.walk && w.run > w.idle ? 'RUN'
    : w.walk > w.idle ? 'WALK' : 'IDLE';
  info.status = dominant;

  // Gentle overall character rotation for showcase
  hips.rotation.y += dt * 0.18;

  controls.update();
  composer.render();
}

// ─────────────────────────────────────────────────────────────────────────────
// Resize Handler
// ─────────────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
});

animate();

</script>
</body>
</html>
