<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>骨骼动画 - SkinnedMesh + AnimationMixer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a0f; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #ui {
    position: absolute;
    top: 16px;
    left: 16px;
    color: #7fdbca;
    font-size: 13px;
    line-height: 1.8;
    pointer-events: none;
    text-shadow: 0 0 8px #7fdbca88;
  }
  #ui h2 { font-size: 15px; color: #b8fff9; margin-bottom: 8px; letter-spacing: 2px; }
  #controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
  }
  .btn {
    padding: 8px 18px;
    border: 1px solid #7fdbca;
    background: rgba(10,10,15,0.8);
    color: #7fdbca;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn:hover { background: #7fdbca22; border-color: #b8fff9; color: #b8fff9; }
  .btn.active { background: #7fdbca33; border-color: #b8fff9; color: #b8fff9; }
</style>
</head>
<body>
<div id="ui">
  <h2>// 骨骼动画</h2>
  <div>模型: 双足机器人</div>
  <div>渲染器: SkinnedMesh + 骨骼</div>
  <div>控制器: AnimationMixer</div>
  <div id="anim-info">▶ 待机</div>
</div>
<div id="controls">
  <button class="btn active" id="btn-idle">待机</button>
  <button class="btn" id="btn-walk">行走</button>
  <button class="btn" id="btn-run">奔跑</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Scene Setup ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.Fog(0x0a0a0f, 10, 40);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(3, 2.5, 5);
camera.lookAt(0, 1, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 2;
controls.maxDistance = 15;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

// ── Lighting ────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xfff4e0, 1.5);
dirLight.position.set(4, 8, 3);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -6;
dirLight.shadow.camera.right = 6;
dirLight.shadow.camera.top = 6;
dirLight.shadow.camera.bottom = -6;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

const rimLight = new THREE.DirectionalLight(0x4488ff, 0.5);
rimLight.position.set(-3, 4, -3);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0xff6644, 0.3, 8);
fillLight.position.set(-2, 0.5, 2);
scene.add(fillLight);

// ── Ground ─────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(20, 20, 40, 40);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a2e,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const grid = new THREE.GridHelper(20, 40, 0x223344, 0x1a2233);
scene.add(grid);

// ── Skeleton Helper Colors ─────────────────────────────────
const BONE_COLOR = 0x7fdbca;
const BONE_LINES = 0x334455;

// ── Build Robot Skeleton ────────────────────────────────────
// Hierarchy: Root → Hip → Spine → Chest → Neck → Head
//                         → L/R Shoulder → L/R Elbow → L/R Hand
//            Hip → L/R Thigh → L/R Knee → L/R Foot
const createBone = (name, length = 0.4) => {
  const bone = new THREE.Bone();
  bone.name = name;
  return bone;
};

const rootBone  = createBone('root',  0);
const hipBone   = createBone('hip',   0.15);
const spineBone = createBone('spine', 0.35);
const chestBone = createBone('chest', 0.3);
const neckBone  = createBone('neck',  0.15);
const headBone  = createBone('head',  0.2);

// Arms
const lShoulder = createBone('l_shoulder', 0.35);
const rShoulder = createBone('r_shoulder', 0.35);
const lElbow    = createBone('l_elbow',    0.3);
const rElbow    = createBone('r_elbow',    0.3);
const lHand     = createBone('l_hand',     0.2);
const rHand     = createBone('r_hand',     0.2);

// Legs
const lThigh = createBone('l_thigh', 0.4);
const rThigh = createBone('r_thigh', 0.4);
const lKnee  = createBone('l_knee',  0.35);
const rKnee  = createBone('r_knee',  0.35);
const lFoot  = createBone('l_foot',  0.25);
const rFoot  = createBone('r_foot',  0.25);

// Build hierarchy
rootBone.add(hipBone);
hipBone.add(spineBone);
spineBone.add(chestBone);
chestBone.add(neckBone);
neckBone.add(headBone);

chestBone.add(lShoulder);
chestBone.add(rShoulder);
lShoulder.add(lElbow);
rShoulder.add(rElbow);
lElbow.add(lHand);
rElbow.add(rHand);

hipBone.add(lThigh);
hipBone.add(rThigh);
lThigh.add(lKnee);
rThigh.add(rKnee);
lKnee.add(lFoot);
rKnee.add(rFoot);

// Skeleton
const skeleton = new THREE.Skeleton([
  rootBone, hipBone, spineBone, chestBone, neckBone, headBone,
  lShoulder, rShoulder, lElbow, rElbow, lHand, rHand,
  lThigh, rThigh, lKnee, rKnee, lFoot, rFoot
]);

// ── Build Geometry for each body part ──────────────────────
const seg = (w, h, d) => [w, h, d];
const box = (w, h, d) => new THREE.BoxGeometry(w, h, d);

// Torso
const torsoGeo = box(0.45, 0.5, 0.25);
const limbGeo  = box(0.12, 0.38, 0.12);
const handGeo  = box(0.1, 0.18, 0.1);
const footGeo  = box(0.13, 0.12, 0.22);
const headGeo  = box(0.28, 0.28, 0.28);
const chestGeo = box(0.5, 0.32, 0.28);
const hipGeo   = box(0.4, 0.2, 0.25);

// Materials
const bodyMat = new THREE.MeshStandardMaterial({
  color: 0x3a7fff,
  roughness: 0.4,
  metalness: 0.6,
  emissive: 0x0a1a3a,
  emissiveIntensity: 0.3
});
const jointMat = new THREE.MeshStandardMaterial({
  color: 0x7fdbca,
  roughness: 0.3,
  metalness: 0.8,
  emissive: 0x7fdbca,
  emissiveIntensity: 0.2
});
const accentMat = new THREE.MeshStandardMaterial({
  color: 0xff6644,
  roughness: 0.3,
  metalness: 0.7,
  emissive: 0xff4422,
  emissiveIntensity: 0.4
});

// ── Skinning Geometry Setup ─────────────────────────────────
// For SkinnedMesh we need to set skinIndex and skinWeight per vertex
// We'll build a merged geometry for the whole body

function buildSkinnedBody() {
  const positions = [];
  const normals   = [];
  const skinIndices = [];
  const skinWeights = [];
  const indices = [];
  let indexOffset = 0;

  const addBox = (geo, mat, tx, ty, tz, boneIdx, weight = 1) => {
    const pos = geo.attributes.position;
    const nor = geo.attributes.normal;
    const idx = geo.index;
    const count = pos.count;
    for (let i = 0; i < count; i++) {
      positions.push(pos.getX(i) + tx, pos.getY(i) + ty, pos.getZ(i) + tz);
      normals.push(nor.getX(i), nor.getY(i), nor.getZ(i));
      skinIndices.push(boneIdx, 0, 0, 0);
      skinWeights.push(weight, 0, 0, 0);
    }
    for (let i = 0; i < idx.count; i++) {
      indices.push(idx.getX(i) + indexOffset);
    }
    indexOffset += count;
  };

  // Torso (hip to chest) — spine
  addBox(torsoGeo, bodyMat, 0, 0, 0, 2, 0.7);
  addBox(torsoGeo, bodyMat, 0, -0.5, 0, 1, 1.0);

  // Chest
  addBox(chestGeo, bodyMat, 0, 0.15, 0, 3, 1.0);

  // Hip block
  addBox(hipGeo, bodyMat, 0, -0.55, 0, 1, 1.0);

  // Head
  addBox(headGeo, jointMat, 0, 0.45, 0, 5, 0.5);
  addBox(headGeo, jointMat, 0, 0.55, 0, 4, 0.5);

  // Left arm chain: shoulder(6) → elbow(8) → hand(10)
  addBox(limbGeo, bodyMat, -0.32, 0.05, 0, 6, 0.7);
  addBox(limbGeo, bodyMat, -0.32, -0.28, 0, 8, 0.85);
  addBox(handGeo, accentMat, -0.32, -0.52, 0, 10, 1.0);

  // Right arm chain: shoulder(7) → elbow(9) → hand(11)
  addBox(limbGeo, bodyMat, 0.32, 0.05, 0, 7, 0.7);
  addBox(limbGeo, bodyMat, 0.32, -0.28, 0, 9, 0.85);
  addBox(handGeo, accentMat, 0.32, -0.52, 0, 11, 1.0);

  // Left leg chain: thigh(12) → knee(14) → foot(16)
  addBox(limbGeo, bodyMat, -0.13, -0.75, 0, 12, 0.8);
  addBox(limbGeo, bodyMat, -0.13, -1.18, 0, 14, 0.9);
  addBox(footGeo, accentMat, -0.13, -1.52, 0.04, 16, 1.0);

  // Right leg chain: thigh(13) → knee(15) → foot(17)
  addBox(limbGeo, bodyMat, 0.13, -0.75, 0, 13, 0.8);
  addBox(limbGeo, bodyMat, 0.13, -1.18, 0, 15, 0.9);
  addBox(footGeo, accentMat, 0.13, -1.52, 0.04, 17, 1.0);

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geo.setAttribute('skinIndex', new THREE.Uint16BufferAttribute(skinIndices, 4));
  geo.setAttribute('skinWeight', new THREE.Float32BufferAttribute(skinWeights, 4));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

const bodyGeo = buildSkinnedBody();
const material = new THREE.MeshStandardMaterial({
  color: 0x3a7fff,
  roughness: 0.4,
  metalness: 0.6,
  emissive: 0x0a1a3a,
  emissiveIntensity: 0.3,
  skinning: true
});

// Offset mesh so hip is at origin and body sits on ground
const bodyGroup = new THREE.Group();
bodyGroup.position.y = 0;
scene.add(bodyGroup);

const mesh = new THREE.SkinnedMesh(bodyGeo, material);
mesh.castShadow = true;
mesh.receiveShadow = false;

const rootJoint = hipBone;
mesh.add(rootJoint);
mesh.bind(skeleton);

bodyGroup.add(mesh);

// ── Bone Helper Visualization ───────────────────────────────
const boneSphereGeo = new THREE.SphereGeometry(0.03, 8, 8);
const boneSphereMat = new THREE.MeshBasicMaterial({ color: BONE_COLOR });
const boneLineMat = new THREE.LineBasicMaterial({ color: BONE_LINES });

function createBoneVisual(bone) {
  const group = new THREE.Group();
  const sphere = new THREE.Mesh(boneSphereGeo, boneSphereMat.clone());
  group.add(sphere);
  return group;
}

const boneVisuals = {};
skeleton.bones.forEach(bone => {
  boneVisuals[bone.name] = createBoneVisual(bone);
  scene.add(boneVisuals[bone.name]);
});

function updateBoneVisuals() {
  skeleton.bones.forEach(bone => {
    bone.getWorldPosition(boneVisuals[bone.name].position);
    boneVisuals[bone.name].lookAt(camera.position);
  });
}

// ── Animation Tracks ────────────────────────────────────────
const clock = new THREE.Clock();
const mixer = new THREE.AnimationMixer(mesh);

// Idle animation — subtle breathing / sway
const idleTrack = new THREE.QuaternionKeyframeTrack(
  '.bones[spine].quaternion',
  [0, 0.5, 1.0, 1.5, 2.0],
  [
    ...new THREE.Quaternion().setFromEuler(new THREE.Euler(0, 0, 0)).toArray(),
    ...new THREE.Quaternion().setFromEuler(new THREE.Euler(0.05, 0, 0)).toArray(),
    ...new THREE.Quaternion().setFromEuler(new THREE.Euler(0, 0, 0)).toArray(),
    ...new THREE.Quaternion().setFromEuler(new THREE.Euler(-0.05, 0, 0)).toArray(),
    ...new THREE.Quaternion().setFromEuler(new THREE.Euler(0, 0, 0)).toArray(),
  ]
);

// Head slight nod in idle
const headNodTrack = new THREE.QuaternionKeyframeTrack(
  '.bones[head].quaternion',
  [0, 1.0, 2.0],
  [
    ...new THREE.Quaternion().setFromEuler(new THREE.Euler(0, 0, 0)).toArray(),
    ...new THREE.Quaternion().setFromEuler(new THREE.Euler(0.08, 0, 0)).toArray(),
    ...new THREE.Quaternion().setFromEuler(new THREE.Euler(0, 0, 0)).toArray(),
  ]
);

// Walk animation — legs/arms swing
const walkSpeed = 1.8;
const walkDuration = 2.0;
const walkFrames = 20;
const walkTimes = Array.from({ length: walkFrames + 1 }, (_, i) => (i / walkFrames) * walkDuration);

const lThighAngles = [];
const rThighAngles = [];
const lKneeAngles = [];
const rKneeAngles = [];
const lArmAngles = [];
const rArmAngles = [];

for (let i = 0; i <= walkFrames; i++) {
  const t = (i / walkFrames) * walkDuration;
  const phase = (t / walkDuration) * Math.PI * 2;
  lThighAngles.push(new THREE.Quaternion().setFromEuler(new THREE.Euler(
    Math.sin(phase) * 0.45, 0, 0
  )));
  rThighAngles.push(new THREE.Quaternion().setFromEuler(new THREE.Euler(
    Math.sin(phase + Math.PI) * 0.45, 0, 0
  )));
  lKneeAngles.push(new THREE.Quaternion().setFromEuler(new THREE.Euler(
    Math.max(0, Math.sin(phase + Math.PI * 0.5)) * 0.5, 0, 0
  )));
  rKneeAngles.push(new THREE.Quaternion().setFromEuler(new THREE.Euler(
    Math.max(0, Math.sin(phase + Math.PI * 1.5)) * 0.5, 0, 0
  )));
  lArmAngles.push(new THREE.Quaternion().setFromEuler(new THREE.Euler(
    Math.sin(phase + Math.PI) * 0.3, 0, 0
  )));
  rArmAngles.push(new THREE.Quaternion().setFromEuler(new THREE.Euler(
    Math.sin(phase) * 0.3, 0, 0
  )));
}

const flatten = quats => quats.flatMap(q => q.toArray());
const walkLThigh = new THREE.QuaternionKeyframeTrack('.bones[l_thigh].quaternion', walkTimes, flatten(lThighAngles));
const walkRThigh = new THREE.QuaternionKeyframeTrack('.bones[r_thigh].quaternion', walkTimes, flatten(rThighAngles));
const walkLKnee  = new THREE.QuaternionKeyframeTrack('.bones[l_knee].quaternion', walkTimes, flatten(lKneeAngles));
const walkRKnee  = new THREE.QuaternionKeyframeTrack('.bones[r_knee].quaternion', walkTimes, flatten(rKneeAngles));
const walkLArm   = new THREE.QuaternionKeyframeTrack('.bones[l_shoulder].quaternion', walkTimes, flatten(lArmAngles));
const walkRArm   = new THREE.QuaternionKeyframeTrack('.bones[r_shoulder].quaternion', walkTimes, flatten(rArmAngles));

// Body bob
const walkBodyY = walkTimes.map(t => {
  const phase = (t / walkDuration) * Math.PI * 2;
  return Math.abs(Math.sin(phase)) * 0.03;
});
const walkBodyTrack = new THREE.VectorKeyframeTrack(
  '.bones[hip].position',
  walkTimes,
  walkBodyY.flatMap(y => [0, y, 0])
);

// Run animation — faster, deeper swing
const runSpeed = 3.2;
const runDuration = 1.0;
const runFrames = 20;
const runTimes = Array.from({ length: runFrames + 1 }, (_, i) => (i / runFrames) * runDuration);

const rLThighAngles = [];
const rRThighAngles = [];
const rLKneeAngles = [];
const rRKneeAngles = [];

for (let i = 0; i <= runFrames; i++) {
  const t = (i / runFrames) * runDuration;
  const phase = (t / runDuration) * Math.PI * 2;
  rLThighAngles.push(new THREE.Quaternion().setFromEuler(new THREE.Euler(
    Math.sin(phase) * 0.7, 0, 0
  )));
  rRThighAngles.push(new THREE.Quaternion().setFromEuler(new THREE.Euler(
    Math.sin(phase + Math.PI) * 0.7, 0, 0
  )));
  rLKneeAngles.push(new THREE.Quaternion().setFromEuler(new THREE.Euler(
    Math.max(0, Math.sin(phase + Math.PI * 0.5)) * 0.9, 0, 0
  )));
  rRKneeAngles.push(new THREE.Quaternion().setFromEuler(new THREE.Euler(
    Math.max(0, Math.sin(phase + Math.PI * 1.5)) * 0.9, 0, 0
  )));
}

const runLThigh = new THREE.QuaternionKeyframeTrack('.bones[l_thigh].quaternion', runTimes, flatten(rLThighAngles));
const runRThigh = new THREE.QuaternionKeyframeTrack('.bones[r_thigh].quaternion', runTimes, flatten(rRThighAngles));
const runLKnee  = new THREE.QuaternionKeyframeTrack('.bones[l_knee].quaternion', runTimes, flatten(rLKneeAngles));
const runRKnee  = new THREE.QuaternionKeyframeTrack('.bones[r_knee].quaternion', runTimes, flatten(rRKneeAngles));

const runBodyY = runTimes.map(t => {
  const phase = (t / runDuration) * Math.PI * 2;
  return Math.abs(Math.sin(phase)) * 0.07;
});
const runBodyTrack = new THREE.VectorKeyframeTrack(
  '.bones[hip].position',
  runTimes,
  runBodyY.flatMap(y => [0, y, 0])
);

// ── Animation Clips ─────────────────────────────────────────
const idleClip = new THREE.AnimationClip('idle', 2.0, [idleTrack, headNodTrack]);
const walkClip = new THREE.AnimationClip('walk', walkDuration, [
  walkLThigh, walkRThigh, walkLKnee, walkRKnee, walkLArm, walkRArm, walkBodyTrack
]);
const runClip  = new THREE.AnimationClip('run', runDuration, [
  runLThigh, runRThigh, runLKnee, runRKnee, runBodyTrack
]);

// ── Animation Action Management ────────────────────────────
let currentAction = null;
let currentAnimName = 'idle';

function playAnimation(name) {
  const clips = { idle: idleClip, walk: walkClip, run: runClip };
  const clip = clips[name];
  if (!clip) return;

  if (currentAction) {
    currentAction.fadeOut(0.3);
  }
  currentAction = mixer.clipAction(clip);
  currentAction.reset().setEffectiveWeight(1).fadeIn(0.3).play();
  currentAnimName = name;
  document.getElementById('anim-info').textContent = `▶ ${name.toUpperCase()}`;
}

playAnimation('idle');

// ── UI Buttons ──────────────────────────────────────────────
const btns = ['idle', 'walk', 'run'];
btns.forEach(name => {
  document.getElementById(`btn-${name}`).addEventListener('click', () => {
    btns.forEach(n => document.getElementById(`btn-${n}`).classList.remove('active'));
    document.getElementById(`btn-${name}`).classList.add('active');
    playAnimation(name);
  });
});

// ── Resize ──────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Animate ─────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.05);
  mixer.update(delta);

  // Gentle overall rotation for idle (shows skeleton better)
  if (currentAnimName === 'idle') {
    bodyGroup.rotation.y += delta * 0.15;
  }

  updateBoneVisuals();
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
