<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>91 · AfterimagePass 残影拖尾</title>
<style>
  body { margin: 0; overflow: hidden; background: #040814; color: #fff; }
  canvas { display: block; }
  .tip {
    position: fixed; top: 12px; left: 12px;
    color: #fff; font: 14px/1.65 -apple-system, BlinkMacSystemFont, sans-serif;
    background: rgba(0, 0, 0, 0.56); padding: 10px 14px; border-radius: 10px;
    max-width: 380px; backdrop-filter: blur(10px);
  }
  .tip label { display: block; margin-top: 10px; }
  .tip input { width: 100%; margin-top: 4px; }
  .row { display: flex; justify-content: space-between; gap: 12px; }
  .value { color: #7dd3fc; font-weight: 700; }
</style>
</head>
<body>
<div class="tip">
  <b>技术点：AfterimagePass 残影拖尾</b><br>
  · 快速运动的物体会把上一帧的颜色“留”在屏幕上<br>
  · 常见于能量尾迹、赛博 HUD、速度感强化、梦境/记忆效果
  <label for="trail">
    <span class="row">
      <span>拖尾保持</span>
      <span class="value" id="trail-value">0.88</span>
    </span>
    <input id="trail" type="range" min="0.78" max="0.97" step="0.01" value="0.88" />
  </label>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js'
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js'
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js'
import { AfterimagePass } from 'three/addons/postprocessing/AfterimagePass.js'

const scene = new THREE.Scene()
scene.background = new THREE.Color(0x040814)
scene.fog = new THREE.FogExp2(0x040814, 0.035)

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 120)
camera.position.set(0, 4.8, 13)

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.2
document.body.appendChild(renderer.domElement)

const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping = true
controls.enablePan = false
controls.minDistance = 6
controls.maxDistance = 22
controls.target.set(0, 1.6, 0)

scene.add(new THREE.AmbientLight(0x88aaff, 0.34))

const keyLight = new THREE.PointLight(0x7dd3fc, 24, 26, 2)
keyLight.position.set(0, 7, 0)
scene.add(keyLight)

const rimLight = new THREE.PointLight(0xff5cc8, 18, 18, 2)
rimLight.position.set(-4, 2, 5)
scene.add(rimLight)

const floor = new THREE.Mesh(
  new THREE.CircleGeometry(13, 120),
  new THREE.MeshStandardMaterial({
    color: 0x0b1224,
    metalness: 0.1,
    roughness: 0.9,
    emissive: 0x071120,
    emissiveIntensity: 0.55
  })
)
floor.rotation.x = -Math.PI / 2
floor.position.y = -1.5
scene.add(floor)

const ring = new THREE.Mesh(
  new THREE.TorusGeometry(5.8, 0.08, 20, 120),
  new THREE.MeshBasicMaterial({ color: 0x7dd3fc })
)
ring.rotation.x = Math.PI / 2
ring.position.y = -1.1
scene.add(ring)

const core = new THREE.Mesh(
  new THREE.IcosahedronGeometry(1.25, 2),
  new THREE.MeshPhysicalMaterial({
    color: 0x9ae6ff,
    emissive: 0x2dd4ff,
    emissiveIntensity: 0.75,
    metalness: 0.2,
    roughness: 0.18,
    clearcoat: 1
  })
)
core.position.y = 1.3
scene.add(core)

const orbiters = []
const orbiterColors = [0x7dd3fc, 0xff7ad9, 0xfacc15, 0x4ade80, 0xa78bfa, 0xfb7185]

for (let i = 0; i < 18; i++) {
  const color = orbiterColors[i % orbiterColors.length]
  const orbiter = new THREE.Mesh(
    new THREE.SphereGeometry(0.16 + (i % 3) * 0.05, 20, 20),
    new THREE.MeshStandardMaterial({
      color,
      emissive: color,
      emissiveIntensity: 1.7,
      metalness: 0.18,
      roughness: 0.22
    })
  )
  orbiter.userData = {
    angle: (i / 18) * Math.PI * 2,
    radius: 2.6 + (i % 4) * 0.55,
    speed: 0.45 + (i % 6) * 0.06,
    offset: (i % 5) * 0.42
  }
  scene.add(orbiter)
  orbiters.push(orbiter)
}

const starGeo = new THREE.BufferGeometry()
const starPositions = new Float32Array(2400)
for (let i = 0; i < starPositions.length; i += 3) {
  const radius = 20 + Math.random() * 45
  const theta = Math.random() * Math.PI * 2
  const phi = Math.acos(THREE.MathUtils.randFloatSpread(2))
  starPositions[i] = radius * Math.sin(phi) * Math.cos(theta)
  starPositions[i + 1] = radius * Math.cos(phi)
  starPositions[i + 2] = radius * Math.sin(phi) * Math.sin(theta)
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3))
scene.add(new THREE.Points(
  starGeo,
  new THREE.PointsMaterial({ color: 0x8fb3ff, size: 0.08, transparent: true, opacity: 0.9 })
))

const composer = new EffectComposer(renderer)
composer.addPass(new RenderPass(scene, camera))

const afterimagePass = new AfterimagePass(0.88)
composer.addPass(afterimagePass)
composer.addPass(new OutputPass())

const trailInput = document.getElementById('trail')
const trailValue = document.getElementById('trail-value')

trailInput.addEventListener('input', (event) => {
  const damp = Number(event.target.value)
  afterimagePass.uniforms.damp.value = damp
  trailValue.textContent = damp.toFixed(2)
})

const clock = new THREE.Clock()

function animate() {
  const delta = clock.getDelta()
  const time = clock.elapsedTime

  core.rotation.x += delta * 0.45
  core.rotation.y += delta * 0.8
  core.position.y = 1.3 + Math.sin(time * 1.7) * 0.22
  ring.rotation.z += delta * 0.2

  orbiters.forEach((orbiter, index) => {
    const data = orbiter.userData
    const angle = time * data.speed + data.angle
    const wobble = Math.sin(time * 2.4 + data.offset + index) * 0.35
    const radius = data.radius + Math.cos(time * 1.6 + index) * 0.25

    orbiter.position.set(
      Math.cos(angle * 1.2) * radius,
      1.1 + Math.sin(angle * 2.1 + data.offset) * 1.4 + wobble,
      Math.sin(angle * 0.9) * radius
    )
  })

  controls.update()
  composer.render(delta)
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
  composer.setSize(innerWidth, innerHeight)
})

window.scene = scene
window.camera = camera
window.afterimagePass = afterimagePass
window.core = core

renderer.setAnimationLoop(animate)
</script>
</body>
</html>
