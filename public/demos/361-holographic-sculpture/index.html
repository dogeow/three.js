<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>361 — Holographic Sculpture</title>
<style>
body{margin:0;overflow:hidden;background:#000}
canvas{display:block}
#info{position:absolute;top:10px;left:10px;color:#fff;font-family:monospace;font-size:13px;pointer-events:none;opacity:0.8}
</style>
</head>
<body>
<div id="info">361 — Holographic Sculpture — Diffraction Grating Art</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 2, 6);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.4, 0.85);
composer.addPass(bloom);

const holoMaterial = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
        varying vec3 vPosition; varying vec3 vNormal; varying vec2 vUv;
        void main(){
            vPosition = position; vNormal = normalize(normalMatrix * normal); vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform float uTime;
        varying vec3 vPosition; varying vec3 vNormal; varying vec2 vUv;
        vec3 diffraction(float t, float angle) {
            return vec3(
                sin(t * 6.28 + angle * 10.0) * 0.5 + 0.5,
                sin(t * 6.28 + angle * 10.0 + 2.094) * 0.5 + 0.5,
                sin(t * 6.28 + angle * 10.0 + 4.189) * 0.5 + 0.5
            );
        }
        void main(){
            vec3 vd = normalize(cameraPosition - vPosition);
            float fr = pow(1.0 - max(dot(vNormal, vd), 0.0), 3.0);
            float ang = dot(vNormal, vec3(0.0, 1.0, 0.0));
            vec3 col = diffraction(uTime * 0.3, ang);
            col += fr * 2.0;
            col *= 1.5 + 0.5 * sin(uTime + vPosition.y * 4.0);
            gl_FragColor = vec4(col, 0.9);
        }
    `,
    transparent: true, side: THREE.DoubleSide
});

const group = new THREE.Group();

const torusKnot = new THREE.Mesh(new THREE.TorusKnotGeometry(1, 0.3, 128, 32, 2, 3), holoMaterial);
group.add(torusKnot);

const ringGeo = new THREE.TorusGeometry(2, 0.05, 16, 64);
const ringMats = [
    new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0.7 }),
    new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.7 }),
    new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.7 })
];
const rings = [];
for (let i = 0; i < 3; i++) {
    const ring = new THREE.Mesh(ringGeo, ringMats[i]);
    ring.rotation.set(Math.PI/2 + i * 0.5, i * 1.2, 0);
    group.add(ring);
    rings.push(ring);
}
scene.add(group);

const pCount = 2000;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(pCount * 3);
for (let i = 0; i < pCount * 3; i++) pPos[i] = (Math.random() - 0.5) * 10;
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.02, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending }));
scene.add(particles);

scene.add(new THREE.AmbientLight(0x222244, 2));
const pL = new THREE.PointLight(0xffffff, 3, 20);
pL.position.set(3, 4, 3);
scene.add(pL);

let t = 0;
function animate() {
    requestAnimationFrame(animate);
    t += 0.016;
    holoMaterial.uniforms.uTime.value = t * 0.5;
    torusKnot.rotation.x = t * 0.2;
    torusKnot.rotation.y = t * 0.3;
    rings.forEach((r, i) => { r.rotation.z = t * (0.3 + i * 0.1) * (i % 2 === 0 ? 1 : -1); });
    particles.rotation.y = t * 0.05;
    controls.update();
    composer.render();
}
animate();
window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
