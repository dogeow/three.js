<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>熔岩灯</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0a; }
    canvas { display: block; }

    #tip {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.75);
      color: #ff9944;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,120,30,0.3);
      pointer-events: none;
      user-select: none;
      line-height: 1.6;
      max-width: 280px;
    }
    #tip strong { color: #ffcc88; }

    #ui {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.8);
      color: #ffcc88;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,120,30,0.3);
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 220px;
    }
    #ui label {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #ui label span {
      color: #ff9944;
    }
    #ui input[type="range"] {
      width: 100%;
      accent-color: #ff6600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="tip">
    <strong>熔岩灯</strong><br/>
    温度滑块: 调节热度<br/>
    球体数量: 球体数量 (5-15)<br/>
    拖动旋转, 滚轮缩放
  </div>
<div id="ui">
    <label>
      <span>温度: <span id="tempVal">0.5</span></span>
      <input type="range" id="tempSlider" min="0" max="1" step="0.01" value="0.5" />
    </label>
    <label>
      <span>球体数量: <span id="blobVal">10</span></span>
      <input type="range" id="blobSlider" min="5" max="15" step="1" value="10" />
    </label>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);

    // --- Lighting ---
    const ambientLight = new THREE.AmbientLight(0x331100, 0.5);
    scene.add(ambientLight);

    // Warm orange point lights for lava glow
    const light1 = new THREE.PointLight(0xff6600, 3, 20);
    light1.position.set(3, 3, 3);
    light1.castShadow = true;
    scene.add(light1);

    const light2 = new THREE.PointLight(0xff4400, 2, 15);
    light2.position.set(-3, -2, 2);
    scene.add(light2);

    const light3 = new THREE.PointLight(0xff8800, 1.5, 12);
    light3.position.set(0, 5, -2);
    scene.add(light3);

    // --- Lava Lamp Container ---
    const LAMP_HEIGHT = 6.0;
    const LAMP_RADIUS = 1.2;
    const WALL_THICKNESS = 0.08;

    // Glass container (open-ended cylinder)
    const glassGeo = new THREE.CylinderGeometry(LAMP_RADIUS, LAMP_RADIUS, LAMP_HEIGHT, 64, 1, true);
    const glassMat = new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      transmission: 0.92,
      ior: 1.45,
      roughness: 0.05,
      metalness: 0,
      transparent: true,
      opacity: 0.3,
      side: THREE.DoubleSide,
      depthWrite: false,
      envMapIntensity: 1,
    });
    const glassMesh = new THREE.Mesh(glassGeo, glassMat);
    glassMesh.renderOrder = 2;
    scene.add(glassMesh);

    // Base
    const baseGeo = new THREE.CylinderGeometry(LAMP_RADIUS * 1.1, LAMP_RADIUS * 1.3, 0.6, 64);
    const baseMat = new THREE.MeshStandardMaterial({
      color: 0x888888,
      metalness: 0.9,
      roughness: 0.2,
    });
    const baseMesh = new THREE.Mesh(baseGeo, baseMat);
    baseMesh.position.y = -LAMP_HEIGHT / 2 - 0.3;
    baseMesh.castShadow = true;
    baseMesh.receiveShadow = true;
    scene.add(baseMesh);

    // Cap
    const capGeo = new THREE.CylinderGeometry(LAMP_RADIUS * 1.15, LAMP_RADIUS * 1.1, 0.5, 64);
    const capMesh = new THREE.Mesh(capGeo, baseMat);
    capMesh.position.y = LAMP_HEIGHT / 2 + 0.25;
    capMesh.castShadow = true;
    scene.add(capMesh);

    // Neck connector
    const neckGeo = new THREE.CylinderGeometry(LAMP_RADIUS * 0.9, LAMP_RADIUS, 0.4, 64);
    const neckMesh = new THREE.Mesh(neckGeo, baseMat);
    neckMesh.position.y = LAMP_HEIGHT / 2 + 0.0;
    scene.add(neckMesh);

    // Bottom connector
    const botNeckGeo = new THREE.CylinderGeometry(LAMP_RADIUS, LAMP_RADIUS * 0.85, 0.4, 64);
    const botNeckMesh = new THREE.Mesh(botNeckGeo, baseMat);
    botNeckMesh.position.y = -LAMP_HEIGHT / 2 + 0.2;
    scene.add(botNeckMesh);

    // --- Lava Blobs ---
    const BLOB_MIN_Y = -LAMP_HEIGHT / 2 + 0.5;
    const BLOB_MAX_Y = LAMP_HEIGHT / 2 - 0.5;
    const GRAVITY = -2.5;
    const BUOYANCY = 1.8;

    function createBlob() {
      const size = 0.35 + Math.random() * 0.35;
      const geo = new THREE.SphereGeometry(size, 24, 24);
      const hue = 0.06 + Math.random() * 0.06; // orange to red-orange
      const color = new THREE.Color().setHSL(hue, 1.0, 0.45 + Math.random() * 0.1);
      const mat = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color.clone().multiplyScalar(0.6),
        emissiveIntensity: 0.8,
        roughness: 0.3,
        metalness: 0.0,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      const blob = {
        mesh,
        temperature: 0.3 + Math.random() * 0.4,
        velocity: 0,
        size: size,
        baseY: BLOB_MIN_Y + Math.random() * (BLOB_MAX_Y - BLOB_MIN_Y),
      };

      // Random initial position
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * (LAMP_RADIUS * 0.7 - size);
      mesh.position.set(
        Math.cos(angle) * r,
        blob.baseY,
        Math.sin(angle) * r
      );

      scene.add(mesh);
      return blob;
    }

    let blobs = [];
    let blobCount = 10;

    function initBlobs(count) {
      blobs.forEach(b => scene.remove(b.mesh));
      blobs = [];
      for (let i = 0; i < count; i++) {
        blobs.push(createBlob());
      }
    }

    initBlobs(blobCount);

    // --- UI Controls ---
    let temperature = 0.5;
    let speedFactor = 1.0;

    const tempSlider = document.getElementById('tempSlider');
    const tempVal = document.getElementById('tempVal');
    tempSlider.addEventListener('input', (e) => {
      temperature = parseFloat(e.target.value);
      tempVal.textContent = temperature.toFixed(2);
      speedFactor = 0.2 + temperature * 2.0;
    });

    const blobSlider = document.getElementById('blobSlider');
    const blobVal = document.getElementById('blobVal');
    blobSlider.addEventListener('input', (e) => {
      const newCount = parseInt(e.target.value);
      blobVal.textContent = newCount;
      if (newCount !== blobCount) {
        blobCount = newCount;
        initBlobs(blobCount);
      }
    });

    speedFactor = 0.2 + temperature * 2.0;

    // --- Blob Physics ---
    const COOLING_RATE = 0.4;   // temp loss near top
    const HEATING_RATE = 0.5;   // temp gain near bottom
    const TEMP_DECAY = 0.15;    // passive temp equilibrium
    const DAMPING = 0.97;       // velocity damping

    function updateBlobs(dt) {
      const dtScaled = Math.min(dt, 0.05) * speedFactor;

      blobs.forEach((blob) => {
        const y = blob.mesh.position.y;
        const midY = 0;
        const normalized = (y - midY) / (LAMP_HEIGHT * 0.5); // -1 at bottom, +1 at top

        // Temperature dynamics
        if (normalized > 0) {
          // Near top: cool down
          blob.temperature -= COOLING_RATE * normalized * dtScaled;
        } else {
          // Near bottom: heat up
          blob.temperature += HEATING_RATE * Math.abs(normalized) * dtScaled;
        }

        // Passive temperature equilibrium
        blob.temperature += (0.5 - blob.temperature) * TEMP_DECAY * dtScaled;
        blob.temperature = Math.max(0, Math.min(1, blob.temperature));

        // Buoyancy force
        const buoyancyForce = normalized * BUOYANCY * (blob.temperature - 0.5);

        // Gravity
        const gravityForce = GRAVITY * (1 - blob.temperature * 0.8);

        // Update velocity
        blob.velocity += (buoyancyForce + gravityForce) * dtScaled;
        blob.velocity *= DAMPING;

        // Clamp velocity
        blob.velocity = Math.max(-4, Math.min(4, blob.velocity));

        // Update position
        let newY = blob.mesh.position.y + blob.velocity * dtScaled;

        // Boundary collision with soft bounce
        if (newY > BLOB_MAX_Y) {
          newY = BLOB_MAX_Y;
          blob.velocity = -Math.abs(blob.velocity) * 0.4;
          blob.temperature = Math.max(0, blob.temperature - 0.1);
        }
        if (newY < BLOB_MIN_Y) {
          newY = BLOB_MIN_Y;
          blob.velocity = Math.abs(blob.velocity) * 0.4;
          blob.temperature = Math.min(1, blob.temperature + 0.1);
        }

        blob.mesh.position.y = newY;

        // Keep within cylinder radius
        const maxR = LAMP_RADIUS - blob.size - 0.05;
        const dist = Math.sqrt(blob.mesh.position.x ** 2 + blob.mesh.position.z ** 2);
        if (dist > maxR) {
          const scale = maxR / dist;
          blob.mesh.position.x *= scale;
          blob.mesh.position.z *= scale;
          blob.velocity *= 0.5;
        }

        // Visual merging: lerp blobs toward nearest neighbor
        blobs.forEach((other) => {
          if (other === blob) return;
          const dx = other.mesh.position.x - blob.mesh.position.x;
          const dy = other.mesh.position.y - blob.mesh.position.y;
          const dz = other.mesh.position.z - blob.mesh.position.z;
          const distSq = dx * dx + dy * dy + dz * dz;
          const mergeRadius = (blob.size + other.size) * 3.0;

          if (distSq < mergeRadius * mergeRadius && distSq > 0.001) {
            const dist = Math.sqrt(distSq);
            const pullStrength = 0.03 * (1 - dist / mergeRadius);
            blob.mesh.position.x += dx * pullStrength;
            blob.mesh.position.y += dy * pullStrength * 0.5;
            blob.mesh.position.z += dz * pullStrength;
          }
        });

        // Update emissive based on temperature
        const tempColor = new THREE.Color().setHSL(0.06 - blob.temperature * 0.04, 1.0, 0.45);
        blob.mesh.material.emissive.copy(tempColor).multiplyScalar(0.6);
        blob.mesh.material.emissiveIntensity = 0.5 + blob.temperature * 0.8;

        // Gentle wobble
        blob.mesh.rotation.x += dtScaled * blob.velocity * 0.1;
        blob.mesh.rotation.z += dtScaled * (Math.sin(Date.now() * 0.001 + blob.size * 10) * 0.2);
      });
    }

    // --- Ground plane for shadows ---
    const groundGeo = new THREE.PlaneGeometry(30, 30);
    const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -LAMP_HEIGHT / 2 - 0.65;
    ground.receiveShadow = true;
    scene.add(ground);

    // Subtle floor glow
    const glowGeo = new THREE.PlaneGeometry(4, 4);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0xff4400,
      transparent: true,
      opacity: 0.15,
    });
    const glowMesh = new THREE.Mesh(glowGeo, glowMat);
    glowMesh.rotation.x = -Math.PI / 2;
    glowMesh.position.y = -LAMP_HEIGHT / 2 - 0.64;
    scene.add(glowMesh);

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Attach to window ---
    window.scene = scene;
    window.camera = camera;
    window.renderer = renderer;
    window.controls = controls;
    window.blobs = blobs;

    // --- Animation Loop ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      updateBlobs(dt);

      // Subtle light animation
      light1.intensity = 3 + Math.sin(Date.now() * 0.001) * 0.5;
      light2.intensity = 2 + Math.cos(Date.now() * 0.0013) * 0.3;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
