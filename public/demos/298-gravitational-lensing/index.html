<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>298 - Gravitational Lensing</title>
<style>body{margin:0;overflow:hidden;background:#000;font-family:monospace}</style>
<!-- tech: Post-processing / Black Hole / Gravitational Lensing Shader -->
<div class="tip" style="position:absolute;top:10px;left:10px;color:#fff;font-size:13px;background:rgba(0,0,0,.7);padding:8px 12px;border-left:3px solid #f80;max-width:340px">
  <b>引力透镜效应</b><br>
  拖动黑洞观察其质量如何使后方星场扭曲。<br>
  当黑洞与背景星对齐时会出现爱因斯坦环。
</div>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 0.1);

const params = {
  blackHoleMass: 2.0,
  bhX: 0.0,
  bhY: 0.0,
  showAccretionDisk: true,
  bloomStrength: 1.5
};

// --- Starfield ---
const starCanvas = document.createElement('canvas');
starCanvas.width = 2048; starCanvas.height = 1024;
const sctx = starCanvas.getContext('2d');
sctx.fillStyle = '#000008';
sctx.fillRect(0,0,2048,1024);
for(let i=0;i<15000;i++){
  const x=Math.random()*2048, y=Math.random()*1024;
  const r=Math.random()*1.5+0.2;
  const br=Math.random()*0.6+0.4;
  sctx.fillStyle=`rgba(${Math.floor(br*220)},${Math.floor(br*210)},${Math.floor(br*255)},${br})`;
  sctx.beginPath(); sctx.arc(x,y,r,0,Math.PI*2); sctx.fill();
}
// Nebula tints
const nebulaColors = [[60,20,120],[20,60,120],[120,60,20]];
nebulaColors.forEach(([r,g,b])=>{
  const gx=Math.random()*2048, gy=Math.random()*1024;
  const grd=sctx.createRadialGradient(gx,gy,0,gx,gy,200+Math.random()*200);
  grd.addColorStop(0,`rgba(${r},${g},${b},0.12)`);
  grd.addColorStop(1,'rgba(0,0,0,0)');
  sctx.fillStyle=grd;
  sctx.fillRect(0,0,2048,1024);
});
const starTex = new THREE.CanvasTexture(starCanvas);
const skyGeo = new THREE.SphereGeometry(100, 64, 32);
const skyMat = new THREE.MeshBasicMaterial({ map: starTex, side: THREE.BackSide });
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// --- Black hole (dark sphere) ---
const bhGeo = new THREE.SphereGeometry(1.5, 32, 32);
const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const blackHole = new THREE.Mesh(bhGeo, bhMat);
blackHole.position.set(0,0,-8);
scene.add(blackHole);

// --- Accretion disk ---
const diskGroup = new THREE.Group();
diskGroup.position.copy(blackHole.position);
scene.add(diskGroup);
const diskGeo = new THREE.RingGeometry(2.0, 6.0, 64, 8);
const diskMat = new THREE.ShaderMaterial({
  uniforms: { uTime: {value:0} },
  vertexShader: `
    varying vec2 vUv;
    varying float vRadius;
    void main(){
      vUv=uv;
      vRadius=length(position.xz);
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    varying float vRadius;
    uniform float uTime;
    void main(){
      float angle=atan(vUv.y-0.5,vUv.x-0.5);
      float t=vRadius/6.0;
      vec3 inner=vec3(1.0,0.9,0.5);
      vec3 outer=vec3(0.8,0.2,0.05);
      vec3 col=mix(inner,outer,t);
      float swirl=sin(angle*12.0-uTime*3.0+t*20.0)*0.5+0.5;
      float alpha=(1.0-t)*swirl*0.9;
      gl_FragColor=vec4(col*2.5,alpha);
    }
  `,
  transparent: true,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const disk = new THREE.Mesh(diskGeo, diskMat);
disk.rotation.x = Math.PI/2;
disk.scale.set(1,1,0.1);
diskGroup.add(disk);

// --- Lensing shader pass ---
const LensingShader = {
  uniforms: {
    tDiffuse: { value: null },
    bhPos: { value: new THREE.Vector2(0.5, 0.5) },
    bhMass: { value: 2.0 },
    resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
  },
  vertexShader: `
    varying vec2 vUv;
    void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 bhPos;
    uniform float bhMass;
    varying vec2 vUv;
    void main(){
      vec2 uv=vUv;
      vec2 toCenter=bhPos-uv;
      float dist=length(toCenter);
      float schwarzschild=bhMass*0.01/dist;
      float bend=max(0.0,schwarzschild/(dist*dist+0.0001));
      vec2 dir=normalize(toCenter);
      vec2 lensedUV=uv+bend*dir*0.04;
      vec4 col=texture2D(tDiffuse,lensedUV);
      // Einstein ring glow
      float ring=exp(-pow((dist-0.12)*30.0,2.0))*0.5;
      col.rgb+=vec3(1.0,0.7,0.3)*ring*bhMass;
      // Black out center
      float mask=1.0-smoothstep(0.0,0.03,dist-0.015*bhMass);
      col.rgb*=1.0-mask;
      gl_FragColor=col;
    }
  `
};
const lensingPass = new ShaderPass(LensingShader);

// --- Composer ---
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(lensingPass);
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85
);
bloomPass.threshold = 0.2;
bloomPass.strength = params.bloomStrength;
bloomPass.radius = 0.8;
composer.addPass(bloomPass);

// --- Mouse drag to move BH ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let dragging = false;
renderer.domElement.addEventListener('mousedown', e=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(blackHole);
  if(hits.length) dragging=true;
});
renderer.domElement.addEventListener('mousemove', e=>{
  if(!dragging) return;
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const plane = new THREE.Plane(new THREE.Vector3(0,0,1), 0);
  const pt = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, pt);
  blackHole.position.x=pt.x;
  blackHole.position.y=pt.y;
  diskGroup.position.copy(blackHole.position);
  const nx=(pt.x+10)/20;
  const ny=(pt.y+10)/20;
  lensingPass.uniforms.bhPos.value.set(nx,ny);
});
renderer.domElement.addEventListener('mouseup',()=>dragging=false);

// --- GUI ---
const gui = new GUI();
gui.add(params,'blackHoleMass',0.1,5,0.1).name('Mass').onChange(v=>{
  lensingPass.uniforms.bhMass.value=v;
  blackHole.scale.setScalar(v*0.5);
});
gui.add(params,'showAccretionDisk').name('Accretion Disk').onChange(v=>disk.visible=v);
gui.add(params,'bloomStrength',0,3,0.1).name('Bloom').onChange(v=>bloomPass.strength=v);

// --- Resize ---
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  composer.setSize(window.innerWidth,window.innerHeight);
  lensingPass.uniforms.resolution.value.set(window.innerWidth,window.innerHeight);
});

// --- Animate ---
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  diskMat.uniforms.uTime.value=t;
  diskGroup.rotation.z=t*0.3;
  composer.render();
}
animate();
</script>
</body>
</html>
