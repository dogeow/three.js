<!-- 
  Three.js Example #279: SPH Fluid Simulation
  Smoothed Particle Hydrodynamics in 3D
-->
<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPH 流体模拟 - Three.js #279</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: monospace; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-size: 12px;
      opacity: 0.7;
      pointer-events: none;
      text-shadow: 0 0 5px #000;
    }
  </style>
</head>
<body>
<div id="info">SPH 流体模拟 | 拖动搅拌 | 滚轮缩放</div>
  
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'three/addons/libs/lil-gui.module.min.js';

    // === SPH Configuration ===
    const config = {
      particleCount: 350,
      smoothingRadius: 0.8,
      restDensity: 1000,
      gravity: -9.81,
      viscosity: 0.015,
      pressureMultiplier: 200,
      boundsMin: new THREE.Vector3(-4, 0, -4),
      boundsMax: new THREE.Vector3(4, 8, 4),
      particleRadius: 0.12,
      damping: 0.98
    };

    // === SPH Particle Class ===
    class SPHParticle {
      constructor(position) {
        this.position = position.clone();
        this.velocity = new THREE.Vector3();
        this.acceleration = new THREE.Vector3();
        this.density = 0;
        this.pressure = 0;
        this.neighbors = [];
      }
    }

    // === SPH Solver ===
    class SPHSolver {
      constructor() {
        this.particles = [];
        this.initParticles();
      }

      initParticles() {
        const spacing = config.particleRadius * 2.2;
        const gridSize = Math.ceil(Math.cbrt(config.particleCount));
        let count = 0;

        for (let x = 0; x < gridSize && count < config.particleCount; x++) {
          for (let y = 0; y < gridSize && count < config.particleCount; y++) {
            for (let z = 0; z < gridSize && count < config.particleCount; z++) {
              const px = config.boundsMin.x + 1 + x * spacing;
              const py = config.boundsMin.y + 1 + y * spacing;
              const pz = config.boundsMin.z + 1 + z * spacing;
              this.particles.push(new SPHParticle(new THREE.Vector3(px, py, pz)));
              count++;
            }
          }
        }
      }

      kernelPoly6(r, h) {
        if (r >= h) return 0;
        const q = 1 - (r * r) / (h * h);
        return (315 / (64 * Math.PI * Math.pow(h, 9))) * q * q * q;
      }

      kernelSpikyGrad(r, h) {
        if (r >= h || r < 0.0001) return new THREE.Vector3();
        const q = h - r;
        const coeff = (-45 / (Math.PI * Math.pow(h, 6))) * q * q;
        return coeff;
      }

      kernelViscosityLaplacian(r, h) {
        if (r >= h) return 0;
        return (45 / (Math.PI * Math.pow(h, 6))) * (h - r);
      }

      findNeighbors() {
        const h2 = config.smoothingRadius * config.smoothingRadius;
        for (let i = 0; i < this.particles.length; i++) {
          this.particles[i].neighbors = [];
          for (let j = 0; j < this.particles.length; j++) {
            if (i === j) continue;
            const distSq = this.particles[i].position.distanceToSquared(this.particles[j].position);
            if (distSq < h2) {
              this.particles[i].neighbors.push({ particle: this.particles[j], dist: Math.sqrt(distSq) });
            }
          }
        }
      }

      computeDensityPressure() {
        for (const p of this.particles) {
          p.density = 0;
          for (const n of p.neighbors) {
            const r = n.dist;
            p.density += n.particle.mass || 1 * this.kernelPoly6(r, config.smoothingRadius);
          }
          p.density = Math.max(p.density, config.restDensity);
          p.pressure = config.pressureMultiplier * (p.density - config.restDensity);
        }
      }

      computeForces() {
        const gravity = new THREE.Vector3(0, config.gravity, 0);

        for (const p of this.particles) {
          const pressureForce = new THREE.Vector3();
          const viscosityForce = new THREE.Vector3();

          for (const n of p.neighbors) {
            const q = n.particle;
            const r = n.dist;
            const dir = new THREE.Vector3().subVectors(q.position, p.position).normalize();

            // Pressure force
            if (q.pressure + p.pressure > 0) {
              const spikyGrad = this.kernelSpikyGrad(r, config.smoothingRadius);
              const pressureTerm = -(q.mass || 1) * (p.pressure + q.pressure) / (2 * q.density) * spikyGrad;
              pressureForce.addScaledVector(dir, pressureTerm);
            }

            // Viscosity force
            const viscLaplacian = this.kernelViscosityLaplacian(r, config.smoothingRadius);
            const velDiff = new THREE.Vector3().subVectors(q.velocity, p.velocity);
            const viscTerm = config.viscosity * (q.mass || 1) * velDiff / q.density * viscLaplacian;
            viscosityForce.add(viscTerm);
          }

          p.acceleration.copy(gravity);
          p.acceleration.add(pressureForce);
          p.acceleration.add(viscosityForce);
        }
      }

      integrate(dt) {
        for (const p of this.particles) {
          p.velocity.addScaledVector(p.acceleration, dt);
          p.velocity.multiplyScalar(config.damping);
          p.position.addScaledVector(p.velocity, dt);

          // Boundary collision
          const bounce = 0.5;
          const margin = config.particleRadius;

          if (p.position.x < config.boundsMin.x + margin) {
            p.position.x = config.boundsMin.x + margin;
            p.velocity.x *= -bounce;
          }
          if (p.position.x > config.boundsMax.x - margin) {
            p.position.x = config.boundsMax.x - margin;
            p.velocity.x *= -bounce;
          }
          if (p.position.y < config.boundsMin.y + margin) {
            p.position.y = config.boundsMin.y + margin;
            p.velocity.y *= -bounce;
          }
          if (p.position.y > config.boundsMax.y - margin) {
            p.position.y = config.boundsMax.y - margin;
            p.velocity.y *= -bounce;
          }
          if (p.position.z < config.boundsMin.z + margin) {
            p.position.z = config.boundsMin.z + margin;
            p.velocity.z *= -bounce;
          }
          if (p.position.z > config.boundsMax.z - margin) {
            p.position.z = config.boundsMax.z - margin;
            p.velocity.z *= -bounce;
          }
        }
      }

      update(dt) {
        this.findNeighbors();
        this.computeDensityPressure();
        this.computeForces();
        this.integrate(dt);
      }

      stir(center, radius, strength) {
        for (const p of this.particles) {
          const dist = p.position.distanceTo(center);
          if (dist < radius) {
            const dir = new THREE.Vector3().subVectors(p.position, center).normalize();
            const force = strength * (1 - dist / radius);
            p.velocity.addScaledVector(dir, force);
          }
        }
      }
    }

    // === Scene Setup ===
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    scene.fog = new THREE.FogExp2(0x050510, 0.03);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(8, 6, 8);
    camera.lookAt(0, 3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // === Controls ===
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 3, 0);

    // === Lights ===
    const ambientLight = new THREE.AmbientLight(0x222244, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const pointLight1 = new THREE.PointLight(0x0066ff, 2, 20);
    pointLight1.position.set(-5, 5, -5);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0xff0066, 2, 20);
    pointLight2.position.set(5, 5, 5);
    scene.add(pointLight2);

    // === Floor Grid ===
    const gridHelper = new THREE.GridHelper(12, 24, 0x222244, 0x111122);
    gridHelper.position.y = 0;
    scene.add(gridHelper);

    // Floor plane
    const floorGeo = new THREE.PlaneGeometry(12, 12);
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x080818,
      transparent: true,
      opacity: 0.8,
      metalness: 0.8,
      roughness: 0.3
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.01;
    scene.add(floor);

    // === SPH System ===
    const sphSolver = new SPHSolver();

    // === Instanced Mesh ===
    const sphereGeo = new THREE.SphereGeometry(config.particleRadius, 16, 12);
    const sphereMat = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.85,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const instancedMesh = new THREE.InstancedMesh(sphereGeo, sphereMat, config.particleCount);
    instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    instancedMesh.instanceColor = new THREE.InstancedBufferAttribute(
      new Float32Array(config.particleCount * 3), 3
    );
    instancedMesh.instanceColor.setUsage(THREE.DynamicDrawUsage);
    scene.add(instancedMesh);

    // === Color by velocity ===
    const colorLow = new THREE.Color(0x0044ff);
    const colorMid = new THREE.Color(0x00ffaa);
    const colorHigh = new THREE.Color(0xff2200);

    function updateParticleColors() {
      let maxSpeed = 0;
      for (const p of sphSolver.particles) {
        maxSpeed = Math.max(maxSpeed, p.velocity.length());
      }
      maxSpeed = Math.max(maxSpeed, 1);

      const dummy = new THREE.Object3D();
      const colors = instancedMesh.instanceColor.array;

      for (let i = 0; i < sphSolver.particles.length; i++) {
        const p = sphSolver.particles[i];
        const speed = p.velocity.length();
        const t = Math.min(speed / maxSpeed, 1);

        let color;
        if (t < 0.5) {
          color = colorLow.clone().lerp(colorMid, t * 2);
        } else {
          color = colorMid.clone().lerp(colorHigh, (t - 0.5) * 2);
        }

        colors[i * 3] = color.r;
        colors[i * 3 + 1] = color.g;
        colors[i * 3 + 2] = color.b;

        // Update instance matrix
        dummy.position.copy(p.position);
        dummy.updateMatrix();
        instancedMesh.setMatrixAt(i, dummy.matrix);
      }

      instancedMesh.instanceMatrix.needsUpdate = true;
      instancedMesh.instanceColor.needsUpdate = true;
    }

    // === Mouse Interaction ===
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const stirPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -3);
    const stirCenter = new THREE.Vector3();
    let isStirring = false;
    let lastStirStrength = 0;

    function onMouseDown(event) {
      if (event.button !== 0) return;
      isStirring = true;
      controls.enabled = false;
      updateStirCenter(event);
    }

    function onMouseMove(event) {
      if (isStirring) {
        updateStirCenter(event);
      }
    }

    function onMouseUp() {
      isStirring = false;
      controls.enabled = true;
      lastStirStrength = 0;
    }

    function updateStirCenter(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      const intersection = new THREE.Vector3();
      raycaster.ray.intersectPlane(stirPlane, intersection);
      
      if (intersection) {
        stirCenter.copy(intersection);
        lastStirStrength = 8;
      }
    }

    window.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    window.addEventListener('mouseleave', onMouseUp);

    // Touch support
    window.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isStirring = true;
        controls.enabled = false;
        const touch = e.touches[0];
        updateStirCenter({ clientX: touch.clientX, clientY: touch.clientY });
      }
    });

    window.addEventListener('touchmove', (e) => {
      if (isStirring && e.touches.length === 1) {
        const touch = e.touches[0];
        updateStirCenter({ clientX: touch.clientX, clientY: touch.clientY });
      }
    });

    window.addEventListener('touchend', () => {
      isStirring = false;
      controls.enabled = true;
    });

    // === GUI ===
    const gui = new GUI({ title: 'SPH 控制' });

    const physicsFolder = gui.addFolder('物理');
    physicsFolder.add(config, 'gravity', -20, 0, 0.1).name('重力');
    physicsFolder.add(config, 'smoothingRadius', 0.3, 2, 0.05).name('平滑半径');
    physicsFolder.add(config, 'restDensity', 500, 2000, 50).name('静止密度');
    physicsFolder.add(config, 'viscosity', 0, 0.1, 0.001).name('粘度');
    physicsFolder.open();

    // === Animation ===
    const clock = new THREE.Clock();
    let accumulatedTime = 0;
    const fixedDt = 1 / 120;

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);
      accumulatedTime += delta;

      // Fixed timestep physics
      while (accumulatedTime >= fixedDt) {
        sphSolver.update(fixedDt);
        accumulatedTime -= fixedDt;
      }

      // Stir fluid on mouse drag
      if (isStirring && lastStirStrength > 0) {
        sphSolver.stir(stirCenter, 2.5, lastStirStrength);
      }

      updateParticleColors();

      // Animate lights
      const time = clock.getElapsedTime();
      pointLight1.position.x = Math.sin(time * 0.5) * 6;
      pointLight1.position.z = Math.cos(time * 0.5) * 6;
      pointLight2.position.x = Math.cos(time * 0.3) * 6;
      pointLight2.position.z = Math.sin(time * 0.3) * 6;

      controls.update();
      renderer.render(scene, camera);
    }

    // === Resize Handler ===
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start
    animate();
  </script>
</body>
</html>
