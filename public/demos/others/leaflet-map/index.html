<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Leaflet · 交互地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  body { margin: 0; font: 14px -apple-system, sans-serif; }
  #map { height: 100vh; width: 100vw; }
  .tip {
    position: fixed; top: 12px; left: 60px; z-index: 1000;
    color: #333; background: #fff; padding: 8px 12px;
    border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.1);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="tip">Leaflet · 交互地图（点击地图任意处添加 marker）</div>
<div id="map"></div>
<script type="module" src="main.js"></script>
</body>
</html>
