<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Tiptap · 富文本编辑器</title>
<style>
  body {
    margin: 0; padding: 40px 20px; background: #f5f5f7;
    font: 15px/1.6 -apple-system, sans-serif; color: #222;
  }
  .container {
    max-width: 820px; margin: 0 auto; background: #fff;
    border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06);
    overflow: hidden;
  }
  .toolbar {
    display: flex; gap: 4px; padding: 10px 12px;
    border-bottom: 1px solid #eee; flex-wrap: wrap;
    background: #fafafa;
  }
  .toolbar button {
    padding: 6px 10px; background: #fff;
    border: 1px solid #ddd; border-radius: 4px;
    cursor: pointer; font-size: 13px; color: #333;
  }
  .toolbar button:hover { background: #f0f0f0; }
  .toolbar button.active {
    background: #4a90ff; color: #fff; border-color: #4a90ff;
  }
  .editor { padding: 24px 32px; min-height: 420px; outline: none; }
  .editor:focus { outline: none; }
  .editor > *:first-child { margin-top: 0; }
  .editor h1 { font-size: 28px; margin: 0.8em 0 0.3em; }
  .editor h2 { font-size: 22px; margin: 0.8em 0 0.3em; }
  .editor h3 { font-size: 18px; margin: 0.8em 0 0.3em; }
  .editor p { margin: 0.4em 0; }
  .editor code {
    background: #f4f4f4; padding: 2px 6px; border-radius: 3px;
    font-family: Menlo, Monaco, monospace; font-size: 13px; color: #d73a49;
  }
  .editor pre {
    background: #282c34; color: #abb2bf; padding: 14px;
    border-radius: 6px; overflow-x: auto; font-size: 13px;
  }
  .editor pre code { background: transparent; color: inherit; padding: 0; }
  .editor blockquote {
    border-left: 3px solid #4a90ff; margin: 0.5em 0;
    padding-left: 16px; color: #666;
  }
  .editor ul, .editor ol { padding-left: 22px; }
  .editor hr { border: none; border-top: 1px solid #eee; margin: 1em 0; }
  .tip {
    position: fixed; top: 12px; left: 12px;
    background: #333; color: #fff; padding: 8px 12px;
    border-radius: 6px; font-size: 13px;
  }
</style>
</head>
<body>
<div class="tip">Tiptap · 基于 ProseMirror 的现代富文本编辑器</div>
<div class="container">
  <div class="toolbar" id="toolbar"></div>
  <div id="editor" class="editor"></div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
