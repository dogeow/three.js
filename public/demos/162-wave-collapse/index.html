<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>162 - 波函数坍缩</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    .tip {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 200, 120, 0.12);
      border: 1px solid rgba(0, 200, 120, 0.35);
      color: #00c878;
      padding: 8px 22px;
      border-radius: 20px;
      font-size: 13px;
      letter-spacing: 0.5px;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    #gui {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 200;
    }

    .lil-gui {
      --background-color: #12121f;
      --text-color: #c0c0d0;
      --title-background-color: #1a1a2e;
      --widget-color: #22223a;
      --hover-color: #2e2e4a;
      --focus-color: #00c878;
      --number-color: #7ecfff;
      --string-color: #00c878;
      font-family: 'Segoe UI', sans-serif !important;
      font-size: 12px;
    }

    #stats {
      position: fixed;
      bottom: 16px;
      left: 16px;
      color: #6a6a8a;
      font-size: 12px;
      line-height: 1.8;
      pointer-events: none;
      z-index: 100;
    }

    #seed-info {
      position: fixed;
      bottom: 16px;
      right: 16px;
      color: #6a6a8a;
      font-size: 12px;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
<div class="tip">波函数坍缩——相邻约束传播，程序化生成关卡/地牢</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

// ─── Tile definitions ────────────────────────────────────────────────────────
// Each tile: name, hex color, top/right/bottom/left edge values
// Edge values 0/1 for simplicity; matching requires equal values
const TILES = [
  { name: 'flat',    color: 0x445566, top: 0, right: 0, bottom: 0, left: 0  },
  { name: 'north',   color: 0x4488cc, top: 1, right: 0, bottom: 0, left: 0  },
  { name: 'east',    color: 0x44bb88, top: 0, right: 1, bottom: 0, left: 0  },
  { name: 'south',   color: 0xcc6644, top: 0, right: 0, bottom: 1, left: 0  },
  { name: 'west',    color: 0xccaa44, top: 0, right: 0, bottom: 0, left: 1  },
  { name: 'tsplit',  color: 0x9944cc, top: 1, right: 1, bottom: 0, left: 1  },
  { name: 'wstyle',  color: 0xcc4488, top: 1, right: 1, bottom: 1, left: 1  },
];

const NUM_TILES = TILES.length;
const CELL = 1.1; // spacing between cells
const HEIGHT = 0.28;

// ─── Scene setup ─────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.04);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(12, 14, 12);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 3;
controls.maxDistance = 60;
controls.target.set(0, 0, 0);

// ─── Lights ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x334466, 1.2));
const sun = new THREE.DirectionalLight(0xffeedd, 2.0);
sun.position.set(15, 25, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 80;
sun.shadow.camera.left = -25;
sun.shadow.camera.right = 25;
sun.shadow.camera.top = 25;
sun.shadow.camera.bottom = -25;
scene.add(sun);
const fill = new THREE.PointLight(0x4466aa, 0.8, 40);
fill.position.set(-8, 6, -8);
scene.add(fill);

// ─── Grid / ground ──────────────────────────────────────────────────────────
let gridHelper = null;
function addGrid(size) {
  if (gridHelper) scene.remove(gridHelper);
  gridHelper = new THREE.GridHelper(size * CELL, size, 0x222244, 0x181830);
  gridHelper.position.y = -HEIGHT / 2 - 0.01;
  scene.add(gridHelper);
}

// ─── Wave Function Collapse ──────────────────────────────────────────────────
// grid[row][col] = { possible: Set(0..N-1), collapsed: bool, tileIdx: int|null }
let GRID = [];
let GRID_SIZE = 6;
let animTimer = 0;
let running = false;
let done = false;

// Meshes
let meshes = []; // flat array, indexed row*size+col
const tileGeometry = new THREE.BoxGeometry(CELL * 0.85, HEIGHT, CELL * 0.85);

// Shared materials
const materials = TILES.map(t => new THREE.MeshStandardMaterial({
  color: t.color,
  roughness: 0.55,
  metalness: 0.15,
}));

// Edge line materials (edge glow per tile type)
const edgeMaterials = TILES.map(t => new THREE.LineBasicMaterial({
  color: t.color,
  transparent: true,
  opacity: 0.7,
}));

function makeEdgeGeom() {
  const g = new THREE.BufferGeometry();
  const v = new Float32Array([
    -CELL*0.425, HEIGHT, -CELL*0.425,   CELL*0.425, HEIGHT, -CELL*0.425,
     CELL*0.425, HEIGHT, -CELL*0.425,   CELL*0.425, HEIGHT,  CELL*0.425,
     CELL*0.425, HEIGHT,  CELL*0.425,  -CELL*0.425, HEIGHT,  CELL*0.425,
    -CELL*0.425, HEIGHT,  CELL*0.425,  -CELL*0.425, HEIGHT, -CELL*0.425,
  ]);
  g.setAttribute('position', new THREE.BufferAttribute(v, 3));
  return g;
}
const edgeGeom = makeEdgeGeom();

function initGrid(size) {
  GRID = [];
  for (let r = 0; r < size; r++) {
    GRID[r] = [];
    for (let c = 0; c < size; c++) {
      const s = new Set();
      for (let i = 0; i < NUM_TILES; i++) s.add(i);
      GRID[r][c] = { possible: s, collapsed: false, tileIdx: null };
    }
  }
}

function clearMeshes() {
  meshes.forEach(m => {
    scene.remove(m.mesh);
    scene.remove(m.edge);
  });
  meshes = [];
}

function getEntropy(g, r, c) {
  if (g[r][c].collapsed) return Infinity;
  return g[r][c].possible.size;
}

function lowestEntropy(g, size) {
  let best = Infinity, bestCell = null;
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const e = getEntropy(g, r, c);
      if (e > 0 && e < best) { best = e; bestCell = [r, c]; }
    }
  }
  return bestCell;
}

function collapse(g, r, c) {
  const arr = [...g[r][c].possible];
  const idx = arr[Math.floor(Math.random() * arr.length)];
  g[r][c].possible = new Set([idx]);
  g[r][c].collapsed = true;
  g[r][c].tileIdx = idx;
  return idx;
}

function propagate(g, size, initR, initC) {
  const queue = [[initR, initC]];
  while (queue.length > 0) {
    const [r, c] = queue.shift();
    if (!g[r][c].collapsed) continue;
    const tile = TILES[g[r][c].tileIdx];

    const dirs = [
      [-1,  0, 'top',    'bottom'],
      [ 0,  1, 'right',  'left'  ],
      [ 1,  0, 'bottom', 'top'   ],
      [ 0, -1, 'left',   'right' ],
    ];

    for (const [dr, dc, myEdge, theirEdge] of dirs) {
      const nr = r + dr, nc = c + dc;
      if (nr < 0 || nr >= size || nc < 0 || nc >= size) continue;
      const nb = g[nr][nc];
      if (nb.collapsed) continue;

      const myVal    = tile[myEdge];
      const nbPoss   = [...nb.possible];
      let changed    = false;

      for (const pi of nbPoss) {
        if (TILES[pi][theirEdge] !== myVal) {
          nb.possible.delete(pi);
          changed = true;
        }
      }

      if (changed) {
        // Recurse
        for (let br = 0; br < size; br++)
          for (let bc = 0; bc < size; bc++)
            if (!g[br][bc].collapsed) queue.push([br, bc]);
      }
    }
  }
}

function seed() {
  return Math.floor(Math.random() * 99999);
}

let currentSeed = seed();
let stepCount = 0;
let pendingCells = []; // cells that are about to collapse this frame

function startWFC(size) {
  clearMeshes();
  initGrid(size);
  running = true;
  done = false;
  animTimer = 0;
  stepCount = 0;
  pendingCells = [];
  currentSeed = seed();
  document.getElementById('seed-info').textContent = `种子: ${currentSeed}`;
  addGrid(size);

  // Place all tiles initially as transparent / very low opacity
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const mesh = new THREE.Mesh(tileGeometry, materials[0].clone());
      mesh.material.color.set(0x334455);
      mesh.material.opacity = 0.15;
      mesh.material.transparent = true;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      const x = (c - size / 2 + 0.5) * CELL;
      const z = (r - size / 2 + 0.5) * CELL;
      mesh.position.set(x, 0, z);
      scene.add(mesh);

      const edge = new THREE.LineSegments(edgeGeom, edgeMaterials[0].clone());
      edge.material.opacity = 0.15;
      edge.position.copy(mesh.position);
      scene.add(edge);

      meshes.push({ mesh, edge, r, c });
    }
  }
}

function applyTile(r, c, tileIdx) {
  const gi = r * GRID_SIZE + c;
  const { mesh, edge } = meshes[gi];

  // Finalize material
  mesh.material = materials[tileIdx].clone();
  mesh.material.opacity = 1.0;
  mesh.material.transparent = false;
  mesh.castShadow = true;

  edge.material = edgeMaterials[tileIdx].clone();
  edge.material.opacity = 1.0;

  // Pulse animation: quick scale pop
  mesh.scale.set(0.1, 0.1, 0.1);
  mesh.userData.targetScale = 1;
  mesh.userData.animating = true;
  edge.scale.set(0.1, 0.1, 0.1);
  edge.userData.targetScale = 1;
  edge.userData.animating = true;
}

function tickWFC(dt, speed) {
  if (!running || done) return;

  animTimer += dt * speed;
  const interval = 0.06; // seconds between steps
  if (animTimer < interval) return;
  animTimer = 0;

  // Animate scale pops
  for (const { mesh, edge } of meshes) {
    if (mesh.userData.animating) {
      const s = mesh.scale.x;
      const ns = s + (1 - s) * 0.25;
      mesh.scale.set(ns, ns, ns);
      edge.scale.set(ns, ns, ns);
      if (Math.abs(ns - 1) < 0.005) {
        mesh.scale.set(1, 1, 1);
        edge.scale.set(1, 1, 1);
        mesh.userData.animating = false;
        edge.userData.animating = false;
      }
    }
  }

  // Run one propagation step
  const cell = lowestEntropy(GRID, GRID_SIZE);
  if (!cell) {
    running = false;
    done = true;
    document.getElementById('seed-info').textContent = `完成! 种子: ${currentSeed}`;
    return;
  }

  const [r, c] = cell;
  const tileIdx = collapse(GRID, r, c);
  propagate(GRID, GRID_SIZE, r, c);
  applyTile(r, c, tileIdx);
  stepCount++;

  document.getElementById('stats').innerHTML =
    `步骤: ${stepCount} / ${GRID_SIZE * GRID_SIZE}<br>` +
    `进度: ${(stepCount / (GRID_SIZE * GRID_SIZE) * 100).toFixed(0)}%`;
}

// ─── GUI ─────────────────────────────────────────────────────────────────────
const params = {
  gridSize:  6,
  speed:     1.5,
  reset() {
    GRID_SIZE = params.gridSize;
    startWFC(GRID_SIZE);
    fitCamera(GRID_SIZE);
  },
};

const gui = new GUI({ title: '⚙ 波函数坍缩', width: 220 });
gui.domElement.id = 'gui';

gui.add(params, 'gridSize', 3, 12, 1).name('网格大小').onFinishChange(() => {
  GRID_SIZE = params.gridSize;
  startWFC(GRID_SIZE);
  fitCamera(GRID_SIZE);
});

gui.add(params, 'speed', 0.2, 8, 0.1).name('速度').listen();

gui.add(params, 'reset').name('重置 [R]');

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') { params.reset(); }
});

// ─── Camera fit ───────────────────────────────────────────────────────────────
function fitCamera(size) {
  const span = size * CELL * 0.8;
  const d = Math.max(span, 5) * 1.4;
  camera.position.set(d, d * 0.9, d);
  controls.target.set(0, 0, 0);
  controls.update();
}

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animate ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
startWFC(GRID_SIZE);
fitCamera(GRID_SIZE);

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  tickWFC(dt, params.speed);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>

<div id="stats">步骤: 0 / 36<br>进度: 0%</div>
<div id="seed-info">种子: —</div>
</body>
</html>
