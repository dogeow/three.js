<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大气散射</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
<div id="info">
        <strong>大气散射</strong><br>
        用 OrbitControls 拖动太阳球体改变天空颜色
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import GUI from 'three/addons/libs/lil-gui.module.min.js';

        /*
         * ============================================================
         * ATMOSPHERIC SCATTERING TECHNIQUE
         * ============================================================
         * Atmospheric scattering is the phenomenon where sunlight
         * interacts with Earth's atmosphere, causing sky color changes.
         *
         * TWO MAIN SCATTERING TYPES:
         * 1. Rayleigh Scattering: Occurs when light scatters off
         *    molecules much smaller than the light wavelength.
         *    - More effective for shorter wavelengths (blue light)
         *    - Creates the deep blue sky at zenith
         *    - Causes red/orange colors near the horizon at sunset
         *
         * 2. Mie Scattering: Occurs when light scatters off larger
         *    particles (dust, pollution, water droplets).
         *    - Less wavelength-dependent (white/gray)
         *    - Creates the hazy effect near the horizon
         *    - Produces the bright glow around the sun
         *
         * MATHEMATICAL APPROACH:
         * - dot(viewDir, sunDir) determines scattering intensity
         * - At noon: sun is overhead, uniform blue sky
         * - At sunset: sun is near horizon, light travels through
         *   more atmosphere, blue light scatters away, red remains
         *
         * SHADER UNIFORMS:
         * - uSunPosition: vec3 position of the sun in world space
         * - uSunIntensity: brightness multiplier for the sun
         * - uRayleighCoeff: Rayleigh scattering coefficient
         * - uMieCoeff: Mie scattering coefficient
         * ============================================================
         */

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // OrbitControls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 5;
        controls.maxDistance = 100;

        // Sun position (movable)
        const sunInitialPos = new THREE.Vector3(50, 80, 50);
        let sunPosition = sunInitialPos.clone();

        // Sun sphere
        const sunGeometry = new THREE.SphereGeometry(3, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffffcc });
        const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
        sunMesh.position.copy(sunPosition);
        scene.add(sunMesh);

        // Atmospheric scattering shader
        const atmosphericVertexShader = `
            varying vec3 vWorldPosition;
            varying vec3 vNormal;

            void main() {
                vWorldPosition = (modelMatrix * vec4(position, 1.0)).xyz;
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const atmosphericFragmentShader = `
            uniform vec3 uSunPosition;
            uniform float uSunIntensity;
            uniform float uRayleighCoeff;
            uniform float uMieCoeff;

            varying vec3 vWorldPosition;
            varying vec3 vNormal;

            // Rayleigh phase function
            float rayleighPhase(float cosTheta) {
                return 0.75 * (1.0 + cosTheta * cosTheta);
            }

            // Mie phase function (Henyey-Greenstein)
            float miePhase(float cosTheta, float g) {
                float g2 = g * g;
                float num = (1.0 - g2);
                float denom = pow(1.0 + g2 - 2.0 * g * cosTheta, 1.5);
                return (num / denom) / (4.0 * 3.14159);
            }

            void main() {
                // View direction (from camera to fragment)
                vec3 viewDir = normalize(cameraPosition - vWorldPosition);
                
                // Sun direction (normalized)
                vec3 sunDir = normalize(uSunPosition);
                
                // Direction between view and sun
                float cosTheta = dot(viewDir, sunDir);
                
                // Height factor for gradient (0 at horizon, 1 at zenith)
                float height = normalize(vWorldPosition).y;
                height = max(height, 0.0);
                
                // Atmosphere density falloff with height
                float density = exp(-height * 3.0);
                
                // Rayleigh scattering - blue sky
                vec3 rayleighColor = vec3(0.3, 0.6, 1.0);
                float rayleighAmount = rayleighPhase(cosTheta) * uRayleighCoeff * density;
                
                // Mie scattering - white/yellow glow
                vec3 mieColor = vec3(1.0, 0.9, 0.7);
                float mieAmount = miePhase(cosTheta, 0.75) * uMieCoeff * density;
                
                // Sun glow near horizon
                float sunGlow = pow(max(cosTheta, 0.0), 8.0) * 0.5;
                
                // Horizon darkening effect
                float horizonFactor = 1.0 - abs(height - 0.1) * 2.0;
                horizonFactor = max(horizonFactor, 0.0);
                
                // Combine scattering effects
                vec3 rayleighScatter = rayleighColor * rayleighAmount;
                vec3 mieScatter = mieColor * mieAmount * uSunIntensity;
                vec3 sunScatter = vec3(1.0, 0.8, 0.5) * sunGlow * uSunIntensity;
                
                // Sky gradient based on height
                vec3 zenithColor = vec3(0.1, 0.3, 0.8);  // Deep blue at top
                vec3 horizonColor = vec3(1.0, 0.6, 0.3); // Orange/red at horizon
                vec3 skyGradient = mix(horizonColor, zenithColor, pow(height, 0.4));
                
                // Base atmospheric color
                vec3 atmosphereColor = skyGradient * (1.0 - horizonFactor * 0.5);
                atmosphereColor += rayleighScatter + mieScatter + sunScatter;
                
                // Add red/orange tint near horizon based on sun angle
                float sunsetFactor = 1.0 - abs(dot(sunDir, vec3(0.0, 1.0, 0.0)));
                sunsetFactor = pow(sunsetFactor, 2.0);
                vec3 sunsetTint = vec3(1.0, 0.4, 0.2);
                atmosphereColor = mix(atmosphereColor, sunsetTint * atmosphereColor, sunsetFactor * horizonFactor);
                
                // Final intensity adjustment
                atmosphereColor *= uSunIntensity * 0.8 + 0.2;
                
                // Night sky when sun is below horizon
                if (uSunPosition.y < 0.0) {
                    atmosphereColor = mix(atmosphereColor, vec3(0.02, 0.02, 0.05), 0.8);
                }
                
                gl_FragColor = vec4(atmosphereColor, 1.0);
            }
        `;

        // Create atmospheric sphere
        const atmosphereGeometry = new THREE.SphereGeometry(90, 64, 64);
        const atmosphereMaterial = new THREE.ShaderMaterial({
            vertexShader: atmosphericVertexShader,
            fragmentShader: atmosphericFragmentShader,
            uniforms: {
                uSunPosition: { value: sunPosition },
                uSunIntensity: { value: 1.0 },
                uRayleighCoeff: { value: 1.0 },
                uMieCoeff: { value: 0.5 }
            },
            side: THREE.BackSide,
            transparent: false
        });

        const atmosphereMesh = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphereMesh);

        // Ground plane for reference
        const groundGeometry = new THREE.PlaneGeometry(200, 200);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x333333,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -10;
        scene.add(ground);

        // Ambient light
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        // Directional light from sun
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.copy(sunPosition);
        scene.add(directionalLight);

        // GUI controls
        const gui = new GUI();
        const params = {
            sunIntensity: 1.0,
            rayleighCoeff: 1.0,
            mieCoeff: 0.5,
            sunY: sunPosition.y,
            resetSun: () => {
                sunPosition.set(50, 80, 50);
                sunMesh.position.copy(sunPosition);
                params.sunY = 80;
                gui.updateDisplay();
            }
        };

        gui.add(params, 'sunIntensity', 0.1, 3.0).name('太阳强度').onChange((value) => {
            atmosphereMaterial.uniforms.uSunIntensity.value = value;
        });

        gui.add(params, 'rayleighCoeff', 0.1, 3.0).name('Rayleigh 散射').onChange((value) => {
            atmosphereMaterial.uniforms.uRayleighCoeff.value = value;
        });

        gui.add(params, 'mieCoeff', 0.1, 2.0).name('Mie 散射').onChange((value) => {
            atmosphereMaterial.uniforms.uMieCoeff.value = value;
        });

        gui.add(params, 'sunY', -20, 100).name('太阳高度').onChange((value) => {
            sunPosition.y = value;
            sunMesh.position.y = value;
        });

        gui.add(params, 'resetSun').name('重置太阳位置');

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Update sun position from mesh (for draggable sun)
            sunPosition.copy(sunMesh.position);
            atmosphereMaterial.uniforms.uSunPosition.value = sunPosition;
            directionalLight.position.copy(sunPosition);
            
            // Update sunY slider to match
            params.sunY = sunPosition.y;
            
            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        console.log('Atmospheric Scattering loaded successfully');
        console.log('Drag the sun sphere to change the sky colors');
    </script>
</body>
</html>
