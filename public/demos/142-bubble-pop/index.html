<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泡泡爆炸</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', system-ui, sans-serif; }
    canvas { display: block; }

    .tip-box {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(10, 10, 30, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 14px 18px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      line-height: 1.6;
      backdrop-filter: blur(10px);
      max-width: 220px;
    }
    .tip-box .tip-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(180, 220, 255, 0.95);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .score-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(10, 10, 30, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 16px 22px;
      backdrop-filter: blur(10px);
      text-align: right;
    }
    .score-panel .score-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 4px;
    }
    .score-panel .score-value {
      font-size: 42px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      transition: transform 0.1s ease;
    }
    .score-panel .score-value.bump {
      transform: scale(1.2);
    }
    .score-panel .bubble-count {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
    }
    .score-panel .bubble-count span {
      color: rgba(180, 220, 255, 0.7);
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="tip-box">
    <div class="tip-title">玩法说明</div>
    点击漂浮的泡泡来戳破它们。泡泡不断上升 —— 欣赏它们彩虹般的光泽吧。
  </div>

  <div class="score-panel">
    <div class="score-label">已戳破</div>
    <div class="score-value" id="scoreValue">0</div>
    <div class="bubble-count">泡泡: <span id="bubbleCount">0</span></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.FogExp2(0x0a0a1a, 0.018);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 6, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2 + 0.2;
    controls.minDistance = 5;
    controls.maxDistance = 50;

    // --- Lights ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    const rimLight = new THREE.DirectionalLight(0x4488ff, 0.6);
    rimLight.position.set(-15, 5, -10);
    scene.add(rimLight);

    const pointLight = new THREE.PointLight(0xff88cc, 0.8, 30);
    pointLight.position.set(0, 10, 0);
    scene.add(pointLight);

    // --- Ground ---
    const groundGeo = new THREE.PlaneGeometry(80, 80, 1, 1);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x111122,
      roughness: 0.9,
      metalness: 0.1,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -2;
    scene.add(ground);

    // Subtle grid
    const gridHelper = new THREE.GridHelper(80, 40, 0x222244, 0x111133);
    gridHelper.position.y = -1.99;
    scene.add(gridHelper);

    // --- Bubbles ---
    const bubbles = [];
    const MAX_BUBBLES = 35;
    const SPAWN_INTERVAL = 600; // ms

    const bubbleGeo = new THREE.SphereGeometry(1, 32, 32);

    function createBubbleMaterial() {
      return new THREE.MeshPhysicalMaterial({
        transmission: 0.92,
        thickness: 0.3,
        roughness: 0.04,
        metalness: 0.0,
        ior: 1.33,
        iridescence: 1.0,
        iridescenceIOR: 1.3,
        iridescenceThicknessRange: [100, 400],
        color: 0xffffff,
        attenuationColor: new THREE.Color(0.9, 0.95, 1.0),
        attenuationDistance: 2.0,
        transparent: true,
        opacity: 0.85,
        side: THREE.DoubleSide,
        envMapIntensity: 1.0,
        clearcoat: 0.3,
        clearcoatRoughness: 0.1,
      });
    }

    function spawnBubble() {
      if (bubbles.length >= MAX_BUBBLES) return;

      const radius = 0.3 + Math.random() * 0.9;
      const scale = radius;
      const geo = bubbleGeo.clone();
      geo.scale(scale, scale, scale);

      const mat = createBubbleMaterial();
      const mesh = new THREE.Mesh(geo, mat);

      const x = (Math.random() - 0.5) * 18;
      const y = -2 + radius;
      const z = (Math.random() - 0.5) * 12;
      mesh.position.set(x, y, z);

      // Random hue tint for variety
      const hue = Math.random();
      mat.color.setHSL(hue, 0.1, 0.9);
      mat.attenuationColor.setHSL(hue, 0.3, 0.85);

      scene.add(mesh);

      const bubble = {
        mesh,
        radius,
        speed: 0.4 + Math.random() * 0.6,
        phaseX: Math.random() * Math.PI * 2,
        phaseZ: Math.random() * Math.PI * 2,
        ampX: 0.3 + Math.random() * 0.4,
        ampZ: 0.2 + Math.random() * 0.3,
        freqX: 0.5 + Math.random() * 0.5,
        freqZ: 0.3 + Math.random() * 0.5,
        wobbleSpeed: 0.8 + Math.random() * 0.6,
        baseX: x,
        baseZ: z,
        popping: false,
        popProgress: 0,
      };

      bubbles.push(bubble);
      updateBubbleCount();
    }

    // --- Particles ---
    const particles = [];

    function spawnPopParticles(position, radius) {
      const count = 8 + Math.floor(Math.random() * 5);
      const particleGeo = new THREE.SphereGeometry(0.05, 6, 6);

      for (let i = 0; i < count; i++) {
        const hue = Math.random();
        const particleMat = new THREE.MeshBasicMaterial({
          color: new THREE.Color().setHSL(hue, 0.7, 0.7),
          transparent: true,
          opacity: 1.0,
        });

        const pMesh = new THREE.Mesh(particleGeo, particleMat);
        pMesh.position.copy(position);
        scene.add(pMesh);

        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;
        const speed = 0.08 + Math.random() * 0.12;

        const dir = new THREE.Vector3(
          Math.sin(phi) * Math.cos(theta),
          Math.sin(phi) * Math.sin(theta),
          Math.cos(phi)
        ).multiplyScalar(speed);

        particles.push({
          mesh: pMesh,
          velocity: dir,
          life: 1.0,
          decay: 0.02 + Math.random() * 0.02,
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.mesh.position.add(p.velocity);
        p.velocity.y -= 0.002; // slight gravity
        p.life -= p.decay;
        p.mesh.material.opacity = p.life;
        p.mesh.scale.setScalar(p.life);

        if (p.life <= 0) {
          scene.remove(p.mesh);
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          particles.splice(i, 1);
        }
      }
    }

    // --- Pop bubble ---
    let score = 0;

    function popBubble(bubble) {
      if (bubble.popping) return;
      bubble.popping = true;

      spawnPopParticles(bubble.mesh.position.clone(), bubble.radius);

      // Score
      score++;
      const scoreEl = document.getElementById('scoreValue');
      scoreEl.textContent = score;
      scoreEl.classList.remove('bump');
      void scoreEl.offsetWidth; // reflow
      scoreEl.classList.add('bump');
      setTimeout(() => scoreEl.classList.remove('bump'), 100);
    }

    // --- Raycaster ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const bubbleMeshes = bubbles.filter(b => !b.popping).map(b => b.mesh);
      const intersects = raycaster.intersectObjects(bubbleMeshes, false);

      if (intersects.length > 0) {
        const hitMesh = intersects[0].object;
        const bubble = bubbles.find(b => b.mesh === hitMesh);
        if (bubble && !bubble.popping) {
          popBubble(bubble);
        }
      }
    });

    // --- Update bubbles ---
    function updateBubbles(time) {
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];

        if (b.popping) {
          b.popProgress += 0.06;
          const s = Math.max(0, 1 - b.popProgress);
          b.mesh.scale.setScalar(s * b.radius);
          b.mesh.material.opacity = s * 0.85;

          if (b.popProgress >= 1) {
            scene.remove(b.mesh);
            b.mesh.geometry.dispose();
            b.mesh.material.dispose();
            bubbles.splice(i, 1);
            updateBubbleCount();
          }
          continue;
        }

        // Float upward
        b.mesh.position.y += b.speed * 0.016;

        // Drift
        b.mesh.position.x = b.baseX + Math.sin(time * b.freqX + b.phaseX) * b.ampX;
        b.mesh.position.z = b.baseZ + Math.sin(time * b.freqZ + b.phaseZ) * b.ampZ;

        // Gentle wobble rotation
        b.mesh.rotation.y += 0.005;
        b.mesh.rotation.x = Math.sin(time * b.wobbleSpeed + b.phaseX) * 0.1;

        // Remove if too high
        if (b.mesh.position.y > 25) {
          scene.remove(b.mesh);
          b.mesh.geometry.dispose();
          b.mesh.material.dispose();
          bubbles.splice(i, 1);
          updateBubbleCount();
        }
      }
    }

    function updateBubbleCount() {
      document.getElementById('bubbleCount').textContent = bubbles.length;
    }

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Spawn loop ---
    let lastSpawn = 0;
    function handleSpawn(time) {
      if (time - lastSpawn > SPAWN_INTERVAL) {
        spawnBubble();
        lastSpawn = time;
      }
    }

    // Initial bubbles
    for (let i = 0; i < 12; i++) {
      const b = {
        mesh: null,
        radius: 0,
        speed: 0,
        phaseX: 0,
        phaseZ: 0,
        ampX: 0,
        ampZ: 0,
        freqX: 0,
        freqZ: 0,
        wobbleSpeed: 0,
        baseX: 0,
        baseZ: 0,
        popping: false,
        popProgress: 0,
      };

      const radius = 0.3 + Math.random() * 0.9;
      const scale = radius;
      const geo = bubbleGeo.clone();
      geo.scale(scale, scale, scale);
      const mat = createBubbleMaterial();

      const hue = Math.random();
      mat.color.setHSL(hue, 0.1, 0.9);
      mat.attenuationColor.setHSL(hue, 0.3, 0.85);

      const mesh = new THREE.Mesh(geo, mat);
      const x = (Math.random() - 0.5) * 18;
      const startY = -2 + radius + Math.random() * 20;
      const z = (Math.random() - 0.5) * 12;
      mesh.position.set(x, startY, z);

      scene.add(mesh);

      b.mesh = mesh;
      b.radius = radius;
      b.speed = 0.4 + Math.random() * 0.6;
      b.phaseX = Math.random() * Math.PI * 2;
      b.phaseZ = Math.random() * Math.PI * 2;
      b.ampX = 0.3 + Math.random() * 0.4;
      b.ampZ = 0.2 + Math.random() * 0.3;
      b.freqX = 0.5 + Math.random() * 0.5;
      b.freqZ = 0.3 + Math.random() * 0.5;
      b.wobbleSpeed = 0.8 + Math.random() * 0.6;
      b.baseX = x;
      b.baseZ = z;

      bubbles.push(b);
    }
    updateBubbleCount();

    // --- Animate ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const time = clock.getElapsedTime();

      handleSpawn(time);
      updateBubbles(time);
      updateParticles();

      // Animate point light for shimmer
      pointLight.position.x = Math.sin(time * 0.5) * 8;
      pointLight.position.z = Math.cos(time * 0.5) * 8;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // --- Attach to window ---
    window.scene = scene;
    window.camera = camera;
    window.renderer = renderer;
    window.controls = controls;
    window.bubbles = bubbles;
  </script>
</body>
</html>
