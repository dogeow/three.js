<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>SONAR ACOUSTIC RANGEFINDER</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#010c14}
canvas{display:block}
#info{position:fixed;bottom:14px;left:14px;color:#4af;font-size:12px}
</style>
</head>
<body>
<div id="info">声呐 — 点击发射声波脉冲 | 声波在物体上反射</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x010c14);
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,500);
camera.position.set(0,40,15);
camera.lookAt(0,0,0);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

scene.add(new THREE.AmbientLight(0x112233,2));
const dl=new THREE.DirectionalLight(0x88ccff,1.5);
dl.position.set(10,20,10);scene.add(dl);

const ground=new THREE.Mesh(new THREE.PlaneGeometry(60,60),new THREE.MeshStandardMaterial({color:0x0a1a24,roughness:1}));
ground.rotation.x=-Math.PI/2;
scene.add(ground);
scene.add(new THREE.GridHelper(60,30,0x0a2535,0x051520));

const obstacles=[];
function mkObs(x,z,size){
    const m=new THREE.Mesh(new THREE.CylinderGeometry(size,size,2,24),
        new THREE.MeshStandardMaterial({color:0x1a3a4a,metalness:0.4,roughness:0.6,emissive:0x0a1a24}));
    m.position.set(x,1,z);
    scene.add(m);
    obstacles.push({mesh:m,x,z,size});
}
mkObs(-6,-3,1.2);mkObs(4,5,0.9);mkObs(-2,7,1.5);mkObs(8,-5,1.0);mkObs(-8,6,0.8);mkObs(0,0,1.3);

const waves=[];
function emitWave(x,z){
    if(waves.length>=12)return;
    const w={};
    w.circle=new THREE.Mesh(new THREE.TorusGeometry(0.1,0.06,8,64),
        new THREE.MeshBasicMaterial({color:0x00ffcc,transparent:true,opacity:0.9}));
    w.circle.position.set(x,0.05,z);
    w.circle.rotation.x=-Math.PI/2;
    scene.add(w.circle);
    w.r=0.1;w.maxR=45;w.speed=6;w.opacity=0.9;w.x=x;w.z=z;w.markers=[];
    waves.push(w);
}

const markerGeo=new THREE.SphereGeometry(0.18,8,8);
const markerMat=new THREE.MeshBasicMaterial({color:0xffcc00});

function checkHits(w){
    for(const ob of obstacles){
        const dx=w.x-ob.x,dz=w.z-ob.z;
        const dist=Math.sqrt(dx*dx+dz*dz);
        if(Math.abs(dist-w.r)<0.6){
            if(!ob.hit){
                ob.hit=true;
                ob.mesh.material.emissive.setHex(0x004422);
                const mk=new THREE.Mesh(markerGeo,markerMat.clone());
                mk.position.set(ob.x,0.2,ob.z);
                scene.add(mk);
                w.markers.push(mk);
                ob.mesh.material.emissiveIntensity=0.5;
                setTimeout(()=>{ob.hit=false;ob.mesh.material.emissiveIntensity=0;},3000);
            }
        }
    }
}

const ray=new THREE.Raycaster();
const m2=new THREE.Vector2();
const plane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
const hit=new THREE.Vector3();

window.addEventListener('click',e=>{
    m2.x=(e.clientX/innerWidth)*2-1;
    m2.y=-(e.clientY/innerHeight)*2+1;
    ray.setFromCamera(m2,camera);
    ray.ray.intersectPlane(plane,hit);
    emitWave(hit.x,hit.z);
});

emitWave(0,0);

function animate(){
    requestAnimationFrame(animate);
    for(let i=waves.length-1;i>=0;i--){
        const w=waves[i];
        w.r+=w.speed*0.016;
        w.opacity=Math.max(0,0.9*(1-w.r/w.maxR));
        w.circle.scale.setScalar(w.r/0.1);
        w.circle.material.opacity=w.opacity;
        checkHits(w);
        if(w.r>w.maxR){
            scene.remove(w.circle);
            w.markers.forEach(mk=>scene.remove(mk));
            waves.splice(i,1);
        }
    }
    controls.update();
    renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
