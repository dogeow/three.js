<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太空碎片场</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #tip {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0, 20, 40, 0.85);
      border: 1px solid rgba(0, 150, 255, 0.4);
      border-radius: 8px;
      padding: 12px 16px;
      color: rgba(180, 220, 255, 0.9);
      font-size: 13px;
      line-height: 1.6;
      max-width: 280px;
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    #tip strong {
      color: rgba(100, 200, 255, 1);
      font-size: 14px;
    }

    #ui-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 15, 35, 0.85);
      border: 1px solid rgba(0, 150, 255, 0.3);
      border-radius: 10px;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 28px;
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    .ui-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .ui-label {
      color: rgba(100, 180, 255, 0.7);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .ui-value {
      color: rgba(150, 220, 255, 1);
      font-size: 18px;
      font-weight: bold;
      min-width: 60px;
      text-align: center;
    }
    .ui-slider {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ui-slider input[type="range"] {
      -webkit-appearance: none;
      width: 140px;
      height: 4px;
      background: rgba(0, 100, 200, 0.4);
      border-radius: 2px;
      outline: none;
    }
    .ui-slider input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: rgba(100, 200, 255, 0.9);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(100, 200, 255, 0.6);
    }
    #speed-val {
      color: rgba(150, 220, 255, 1);
      font-size: 14px;
      min-width: 40px;
    }
  </style>
</head>
<body>

  <div id="tip">
    <strong>轨道碎片场</strong><br/>
    地球轨道 800 公里高度<br/>
    拖动旋转 | 滚轮缩放<br/>
    <span style="color:rgba(255,150,80,0.8)">已追踪 9,000+ 太空碎片</span>
  </div>
<div id="ui-panel">
    <div class="ui-item">
      <span class="ui-label">碎片数量</span>
      <span class="ui-value" id="debris-count">0</span>
    </div>
    <div class="ui-item">
      <span class="ui-label">碎片速度</span>
      <div class="ui-slider">
        <input type="range" id="speed-slider" min="0" max="3" step="0.05" value="1" />
        <span id="speed-val">1.0x</span>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ── Renderer ──────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // ── Scene & Camera ─────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 5000);
    camera.position.set(0, 30, 80);

    // ── Controls ───────────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.4;
    controls.minDistance = 20;
    controls.maxDistance = 400;

    // ── Lights ─────────────────────────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0x223355, 0.6);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xfff5e0, 2.5);
    sunLight.position.set(150, 80, 100);
    scene.add(sunLight);

    const fillLight = new THREE.DirectionalLight(0x4488cc, 0.5);
    fillLight.position.set(-80, -40, -60);
    scene.add(fillLight);

    // ── Earth ──────────────────────────────────────────────────────────────────
    function createEarthTexture() {
      const size = 512;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Ocean base
      ctx.fillStyle = '#1a4a8a';
      ctx.fillRect(0, 0, size, size);

      // Draw simplified continents
      ctx.fillStyle = '#2d6b3f';
      // North America
      ctx.beginPath();
      ctx.ellipse(130, 120, 60, 80, -0.3, 0, Math.PI * 2);
      ctx.fill();
      // South America
      ctx.beginPath();
      ctx.ellipse(180, 280, 30, 60, 0.2, 0, Math.PI * 2);
      ctx.fill();
      // Europe
      ctx.beginPath();
      ctx.ellipse(290, 100, 35, 45, 0.1, 0, Math.PI * 2);
      ctx.fill();
      // Africa
      ctx.beginPath();
      ctx.ellipse(290, 230, 40, 70, 0, 0, Math.PI * 2);
      ctx.fill();
      // Asia
      ctx.beginPath();
      ctx.ellipse(370, 110, 90, 60, 0.1, 0, Math.PI * 2);
      ctx.fill();
      // Australia
      ctx.beginPath();
      ctx.ellipse(410, 280, 35, 28, 0.3, 0, Math.PI * 2);
      ctx.fill();
      // Antarctica
      ctx.fillStyle = '#ddeeff';
      ctx.beginPath();
      ctx.ellipse(256, 480, 120, 30, 0, 0, Math.PI * 2);
      ctx.fill();

      // Add noise for texture
      const imageData = ctx.getImageData(0, 0, size, size);
      for (let i = 0; i < imageData.data.length; i += 4) {
        const n = (Math.random() - 0.5) * 15;
        imageData.data[i] = Math.max(0, Math.min(255, imageData.data[i] + n));
        imageData.data[i + 1] = Math.max(0, Math.min(255, imageData.data[i + 1] + n));
        imageData.data[i + 2] = Math.max(0, Math.min(255, imageData.data[i + 2] + n));
      }
      ctx.putImageData(imageData, 0, 0);

      return new THREE.CanvasTexture(canvas);
    }

    const earthGeo = new THREE.SphereGeometry(20, 64, 64);
    const earthMat = new THREE.MeshStandardMaterial({
      map: createEarthTexture(),
      roughness: 0.8,
      metalness: 0.1,
    });
    const earthMesh = new THREE.Mesh(earthGeo, earthMat);
    scene.add(earthMesh);

    // ── Atmosphere ─────────────────────────────────────────────────────────────
    const atmosphereVert = `
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        vViewDir = normalize(-mvPos.xyz);
        gl_Position = projectionMatrix * mvPos;
      }
    `;
    const atmosphereFrag = `
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main() {
        float fresnel = pow(1.0 - max(dot(vNormal, vViewDir), 0.0), 3.0);
        vec3 color = vec3(0.3, 0.65, 1.0) * fresnel;
        gl_FragColor = vec4(color, fresnel * 0.6);
      }
    `;
    const atmoGeo = new THREE.SphereGeometry(21.5, 64, 64);
    const atmoMat = new THREE.ShaderMaterial({
      vertexShader: atmosphereVert,
      fragmentShader: atmosphereFrag,
      side: THREE.BackSide,
      blending: THREE.AdditiveBlending,
      transparent: true,
    });
    const atmosphereMesh = new THREE.Mesh(atmoGeo, atmoMat);
    scene.add(atmosphereMesh);

    // ── Starfield ───────────────────────────────────────────────────────────────
    const starCount = 5000;
    const starPositions = new Float32Array(starCount * 3);
    const starSizes = new Float32Array(starCount);
    for (let i = 0; i < starCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 1200 + Math.random() * 1000;
      starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      starPositions[i * 3 + 2] = r * Math.cos(phi);
      starSizes[i] = 0.5 + Math.random() * 2.5;
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
    const starMat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 1.5,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0.85,
    });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // ── Debris ─────────────────────────────────────────────────────────────────
    const DEBRIS_COUNT = 220;
    const debrisData = [];

    const debrisGeos = [
      new THREE.BoxGeometry(1.2, 0.3, 1.8),   // satellite panel
      new THREE.CylinderGeometry(0.4, 0.4, 2.5, 8), // rocket body
      new THREE.TorusGeometry(0.8, 0.2, 6, 12),     // ring fragment
      new THREE.OctahedronGeometry(0.5),             // irregular fragment
    ];

    const debrisMats = [
      new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.6, metalness: 0.5 }),
      new THREE.MeshStandardMaterial({ color: 0xaa7733, roughness: 0.7, metalness: 0.3 }),
      new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.5, metalness: 0.7 }),
      new THREE.MeshStandardMaterial({ color: 0x666655, roughness: 0.8, metalness: 0.2 }),
    ];

    const debrisByType = [[], [], [], []];
    const debrisMeshes = [];

    for (let i = 0; i < DEBRIS_COUNT; i++) {
      const type = i % 4;
      const mesh = new THREE.Mesh(debrisGeos[type], debrisMats[type]);
      mesh.castShadow = true;

      // Spread debris in orbital shells
      const shell = Math.floor(i / DEBRIS_COUNT * 3);
      let radius;
      if (shell === 0) radius = 28 + Math.random() * 8;    // LEO - just above atmosphere
      else if (shell === 1) radius = 40 + Math.random() * 15; // mid orbit
      else radius = 60 + Math.random() * 30;                  // far orbit

      const theta = Math.random() * Math.PI * 2;
      const phi = (Math.random() - 0.5) * Math.PI;

      mesh.position.set(
        radius * Math.cos(theta) * Math.cos(phi),
        radius * Math.sin(phi),
        radius * Math.sin(theta) * Math.cos(phi)
      );

      // Random rotation
      mesh.rotation.set(
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2
      );

      // Scale variation
      const s = 0.3 + Math.random() * 1.8;
      mesh.scale.setScalar(s);

      debrisByType[type].push(mesh);
      debrisMeshes.push(mesh);
      scene.add(mesh);

      debrisData.push({
        mesh,
        rotSpeed: new THREE.Vector3(
          (Math.random() - 0.5) * 0.02,
          (Math.random() - 0.5) * 0.02,
          (Math.random() - 0.5) * 0.015
        ),
        orbitAngle: theta,
        orbitRadius: radius,
        orbitSpeed: (0.0005 + Math.random() * 0.001) * (Math.random() < 0.5 ? 1 : -1),
        orbitPhase: phi,
      });
    }

    document.getElementById('debris-count').textContent = DEBRIS_COUNT;

    // ── Space Station ──────────────────────────────────────────────────────────
    const stationGroup = new THREE.Group();

    const stationMetal = new THREE.MeshStandardMaterial({ color: 0xccddee, roughness: 0.4, metalness: 0.8 });
    const stationAccent = new THREE.MeshStandardMaterial({ color: 0x3366aa, roughness: 0.5, metalness: 0.6 });

    // Main truss
    const truss = new THREE.Mesh(
      new THREE.BoxGeometry(24, 1.5, 1.5),
      stationMetal
    );
    stationGroup.add(truss);

    // Solar panels
    for (let side of [-1, 1]) {
      const panel = new THREE.Mesh(
        new THREE.BoxGeometry(8, 0.15, 4),
        stationAccent
      );
      panel.position.set(side * 16, 0, 0);
      stationGroup.add(panel);

      // Panel frame
      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(8.2, 0.25, 4.2),
        stationMetal
      );
      frame.position.set(side * 16, 0, 0);
      stationGroup.add(frame);

      // Connecting arm
      const arm = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.2, 5, 8),
        stationMetal
      );
      arm.position.set(side * 12, 0, 0);
      arm.rotation.z = Math.PI / 2;
      stationGroup.add(arm);
    }

    // Central modules
    const core1 = new THREE.Mesh(
      new THREE.CylinderGeometry(2, 2, 6, 12),
      stationMetal
    );
    core1.rotation.z = Math.PI / 2;
    stationGroup.add(core1);

    const core2 = new THREE.Mesh(
      new THREE.CylinderGeometry(1.5, 1.5, 4, 12),
      stationAccent
    );
    core2.rotation.z = Math.PI / 2;
    core2.position.set(0, 0, 2.5);
    stationGroup.add(core2);

    const core3 = new THREE.Mesh(
      new THREE.CylinderGeometry(1.5, 1.5, 4, 12),
      stationAccent
    );
    core3.rotation.z = Math.PI / 2;
    core3.position.set(0, 0, -2.5);
    stationGroup.add(core3);

    // Radiators
    for (let side of [-1, 1]) {
      const radiator = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 4, 2.5),
        stationAccent
      );
      radiator.position.set(0, 2.5, side * 2.5);
      stationGroup.add(radiator);
      const radArm = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.15, 2, 6),
        stationMetal
      );
      radArm.position.set(0, 1.5, side * 2.5);
      stationGroup.add(radArm);
    }

    // Docking ports
    for (let i = 0; i < 4; i++) {
      const port = new THREE.Mesh(
        new THREE.CylinderGeometry(0.4, 0.5, 1.5, 8),
        stationMetal
      );
      const angle = (i / 4) * Math.PI * 2;
      port.position.set(Math.cos(angle) * 1.8, Math.sin(angle) * 1.8, 0);
      port.rotation.z = Math.PI / 2;
      port.rotation.y = angle;
      stationGroup.add(port);
    }

    scene.add(stationGroup);

    // ── Speed Slider ───────────────────────────────────────────────────────────
    let speedMultiplier = 1.0;
    const slider = document.getElementById('speed-slider');
    const speedVal = document.getElementById('speed-val');
    slider.addEventListener('input', () => {
      speedMultiplier = parseFloat(slider.value);
      speedVal.textContent = speedMultiplier.toFixed(1) + 'x';
    });

    // ── Animation Loop ─────────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      // Earth slow rotation
      earthMesh.rotation.y += 0.0003 * speedMultiplier;
      atmosphereMesh.rotation.y = earthMesh.rotation.y;

      // Starfield subtle drift
      stars.rotation.y += 0.00005;

      // Debris tumbling + orbital motion
      for (const d of debrisData) {
        d.mesh.rotation.x += d.rotSpeed.x * speedMultiplier;
        d.mesh.rotation.y += d.rotSpeed.y * speedMultiplier;
        d.mesh.rotation.z += d.rotSpeed.z * speedMultiplier;

        // Slight orbital drift
        d.orbitAngle += d.orbitSpeed * speedMultiplier;
        d.mesh.position.set(
          d.orbitRadius * Math.cos(d.orbitAngle),
          d.mesh.position.y + (Math.random() - 0.5) * 0.002,
          d.orbitRadius * Math.sin(d.orbitAngle)
        );
      }

      // Space station slow rotation
      stationGroup.rotation.y += 0.001 * speedMultiplier;
      stationGroup.rotation.x = Math.sin(elapsed * 0.1) * 0.05;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // ── Resize ─────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Expose to window ───────────────────────────────────────────────────────
    window.scene = scene;
    window.camera = camera;
    window.renderer = renderer;
    window.controls = controls;
    window.earthMesh = earthMesh;
    window.debrisMeshes = debrisMeshes;

  </script>
</body>
</html>
