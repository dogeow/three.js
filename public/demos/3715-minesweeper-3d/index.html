<title>3715. Minesweeper 3D</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#1a1a2e;font-family:Segoe UI,sans-serif}

#ui{position:fixed;top:14px;left:14px;z-index:10;color:#fff;font-size:12px;background:rgba(0,0,0,0.6);padding:10px 14px;border-radius:8px;line-height:1.8}

<body>
<div id="ui">
  <strong>💣 3D 扫雷</strong><br>
  左键：揭示格子<br>

  数字 = 相邻地雷数 (1-8)<br>
  <span id="mines-left">地雷：10</span><br>
  R = 新游戏
</div>
<div id="info">8×8 网格 | 10 个隐藏地雷</div>
