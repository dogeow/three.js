<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>3698. Seismic Wave Propagation</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#050810}
canvas{display:block}
#ui{position:fixed;top:16px;left:16px;color:#aabbcc;font-size:12px;z-index:10;pointer-events:none;font-family:'Courier New',monospace}
#ui h3{color:#88ccff;font-size:14px;margin-bottom:6px;letter-spacing:2px}
.bar-wrap{display:flex;align-items:center;gap:8px;margin:2px 0}
.bar-label{min-width:90px;color:#556688}
.bar-bg{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:2px}
.bar-fill{height:100%;border-radius:2px;transition:width 0.1s}
#msg{position:fixed;bottom:16px;left:16px;color:#334455;font-size:11px}
</style>
</head>
<body>
<div id="ui">
  <h3>地震波传播</h3>
  <div class="bar-wrap"><span class="bar-label">P 波振幅</span><div class="bar-bg"><div id="bar-p" class="bar-fill" style="background:#44aaff;width:0%"></div></div></div>
  <div class="bar-wrap"><span class="bar-label">S 波振幅</span><div class="bar-bg"><div id="bar-s" class="bar-fill" style="background:#ff8844;width:0%"></div></div></div>
  <div class="bar-wrap"><span class="bar-label">表面波振幅</span><div class="bar-bg"><div id="bar-surf" class="bar-fill" style="background:#44ff88;width:0%"></div></div></div>
  <div style="margin-top:8px;font-size:11px;color:#445566">
    t=<span id="time">0.0</span>秒 | 震级=<span id="mag">5.0</span> | 深度=<span id="depth">8</span>公里
  </div>
</div>
<div id="msg">点击 = 震中 | 滚轮 = 震级 | 空格 = 切换 P/S/表面波</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module" src="main.js"></script>
</body>
</html>
