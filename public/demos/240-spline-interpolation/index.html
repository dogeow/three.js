<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spline Interpolation Path Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      letter-spacing: 0.05em;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
<div id="hint">点击视口添加路径点 · 右键移除最后一个点</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Line2 } from 'three/addons/lines/Line2.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
import { LineGeometry } from 'three/addons/lines/LineGeometry.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

/* ─────────────────────────────────────────────────────────────
   Scene setup
───────────────────────────────────────────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.018);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 8, 22);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;

/* ─────────────────────────────────────────────────────────────
   Lighting
───────────────────────────────────────────────────────────── */
scene.add(new THREE.AmbientLight(0x222233, 3));

const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

const ptLight = new THREE.PointLight(0x4488ff, 4, 30);
ptLight.position.set(-8, 5, 0);
scene.add(ptLight);

const ptLight2 = new THREE.PointLight(0xff6644, 3, 25);
ptLight2.position.set(8, -3, 5);
scene.add(ptLight2);

/* ─────────────────────────────────────────────────────────────
   Grid / Axes helper
───────────────────────────────────────────────────────────── */
const grid = new THREE.GridHelper(60, 40, 0x1a1a2e, 0x111122);
scene.add(grid);

/* ─────────────────────────────────────────────────────────────
   Default path points (CatmullRom helix-like curve)
───────────────────────────────────────────────────────────── */
const defaultPoints = [
  new THREE.Vector3(-6,  0, -4),
  new THREE.Vector3(-3,  3, -6),
  new THREE.Vector3( 2,  5, -3),
  new THREE.Vector3( 5,  2,  2),
  new THREE.Vector3( 3, -2,  6),
  new THREE.Vector3(-2, -3,  4),
  new THREE.Vector3(-5, -1, -2),
];

/* ─────────────────────────────────────────────────────────────
   State
───────────────────────────────────────────────────────────── */
let pathPoints = defaultPoints.map(p => p.clone());
let splineType = 'CatmullRom';   // 'CatmullRom' | 'CubicBezier' | 'QuadraticBezier' | 'Linear'
let speed = 1.0;                 // normalised units / second (t traversal)
let animT  = 0;                  // normalised parameter [0,1]
let isPlaying = true;

// Control-point markers (small spheres)
const markerGroup = new THREE.Group();
scene.add(markerGroup);
const markerGeo = new THREE.SphereGeometry(0.18, 12, 8);
const markerMat = new THREE.MeshPhongMaterial({ color: 0x44aaff, emissive: 0x112233, shininess: 80 });

let markers = [];

function rebuildMarkers() {
  markerGroup.clear();
  markers = pathPoints.map(pos => {
    const m = new THREE.Mesh(markerGeo, markerMat.clone());
    m.position.copy(pos);
    markerGroup.add(m);
    return m;
  });
}
rebuildMarkers();

/* ─────────────────────────────────────────────────────────────
   Spline factory — returns a THREE.Curve
   For Bezier variants we convert input points into a
   polyline so the same display pipeline works for all types.
───────────────────────────────────────────────────────────── */
function buildCurve() {
  if (pathPoints.length < 2) return null;

  if (splineType === 'CatmullRom') {
    // CatmullRomCurve3 needs ≥ 2 points
    return new THREE.CatmullRomCurve3(pathPoints, false, 'catmullrom', 0.5);
  }

  if (splineType === 'CubicBezier') {
    // Each segment: start, cp1, cp2, end  → we cycle through points
    if (pathPoints.length < 2) return null;
    const pts = [];
    const n   = pathPoints.length;
    for (let i = 0; i < n - 1; i++) {
      const p0 = pathPoints[i];
      const p3 = pathPoints[i + 1];
      const p1 = p0.clone().lerp(p3, 1 / 3).add(new THREE.Vector3(0, 1.2, 0));
      const p2 = p0.clone().lerp(p3, 2 / 3).add(new THREE.Vector3(0, 1.2, 0));
      pts.push(p0, p1, p2, p3);
    }
    // Wrap last point
    if (pathPoints.length > 2) pts.push(pathPoints[pathPoints.length - 1]);
    return new THREE.CubicBezierCurve3(
      pts[0], pts[1], pts[2], pts[3]
    );
  }

  if (splineType === 'QuadraticBezier') {
    if (pathPoints.length < 2) return null;
    const pts = [];
    const n   = pathPoints.length;
    for (let i = 0; i < n - 1; i++) {
      const p0 = pathPoints[i];
      const p2 = pathPoints[i + 1];
      const p1 = p0.clone().lerp(p2, 0.5).add(new THREE.Vector3(0, 1.5, 0));
      pts.push(p0, p1, p2);
    }
    return new THREE.QuadraticBezierCurve3(pts[0], pts[1], pts[2]);
  }

  // Linear (piecewise)
  return new THREE.CatmullRomCurve3(pathPoints, false, 'linear', 0);
}

/* ─────────────────────────────────────────────────────────────
   Path line visualisation (Line2 / LineGeometry)
───────────────────────────────────────────────────────────── */
const lineMat = new LineMaterial({
  color: 0x44aaff,
  linewidth: 3,
  resolution: new THREE.Vector2(innerWidth, innerHeight),
  dashed: false,
});
const lineGeo = new LineGeometry();
const pathLine = new Line2(lineGeo, lineMat);
scene.add(pathLine);

// Segment dots (small spheres travelling the path for visual reference)
const dotGroup = new THREE.Group();
scene.add(dotGroup);
const dotGeo = new THREE.SphereGeometry(0.12, 8, 6);

function rebuildDot(intSegments = 80) {
  dotGroup.clear();
  const curve = buildCurve();
  if (!curve) return;
  for (let i = 0; i <= intSegments; i++) {
    const t  = i / intSegments;
    const pt = curve.getPoint(t);
    const dot = new THREE.Mesh(dotGeo, new THREE.MeshPhongMaterial({
      color: new THREE.Color().setHSL(t * 0.6 + 0.5, 1.0, 0.6),
      emissive: new THREE.Color().setHSL(t * 0.6 + 0.5, 1.0, 0.2),
    }));
    dot.position.copy(pt);
    dotGroup.add(dot);
  }
}

function updatePathLine(intSegments = 200) {
  const curve = buildCurve();
  if (!curve) { pathLine.visible = false; return; }
  pathLine.visible = true;

  const pts = [];
  for (let i = 0; i <= intSegments; i++) {
    const t = i / intSegments;
    const p = curve.getPoint(t);
    pts.push(p.x, p.y, p.z);
  }
  lineGeo.setPositions(pts);
  lineMat.color.set(0x44aaff);

  rebuildDot(intSegments);
}

updatePathLine();

/* ─────────────────────────────────────────────────────────────
   Moving object (arrow mesh pointing along tangent)
───────────────────────────────────────────────────────────── */
const arrowGroup = new THREE.Group();
scene.add(arrowGroup);

// Body
const bodyGeo = new THREE.CapsuleGeometry(0.22, 0.5, 8, 16);
const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff4488, emissive: 0x330011, shininess: 120 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
arrowGroup.add(body);

// Cone tip
const coneGeo = new THREE.ConeGeometry(0.22, 0.5, 16);
const cone    = new THREE.Mesh(coneGeo, bodyMat.clone());
cone.position.y = 0.5;
arrowGroup.add(cone);

// Glow ring
const ringGeo = new THREE.TorusGeometry(0.35, 0.04, 8, 32);
const ringMat = new THREE.MeshBasicMaterial({ color: 0xff4488, transparent: true, opacity: 0.4 });
const ring    = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI / 2;
arrowGroup.add(ring);

// Trail particles (InstancedMesh)
const TRAIL_COUNT = 40;
const trailGeo = new THREE.SphereGeometry(0.06, 6, 4);
const trailMat = new THREE.MeshBasicMaterial({ color: 0xff4488, transparent: true });
const trailMesh = new THREE.InstancedMesh(trailGeo, trailMat, TRAIL_COUNT);
trailMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
scene.add(trailMesh);

const trailPositions = Array.from({ length: TRAIL_COUNT }, () => new THREE.Vector3());
let trailHead = 0;

const dummy = new THREE.Object3D();
const trailColor = new THREE.Color();

/* ─────────────────────────────────────────────────────────────
   Path point add / remove
───────────────────────────────────────────────────────────── */
const raycaster = new THREE.Raycaster();
const mouse2d   = new THREE.Vector2();

function removeLast() {
  if (pathPoints.length <= 2) return;
  pathPoints.pop();
  rebuildMarkers();
  updatePathLine();
}

renderer.domElement.addEventListener('click', e => {
  // Ignore right-click (handled separately)
  if (e.button !== 0) return;

  mouse2d.set(
    (e.clientX / innerWidth)  * 2 - 1,
    -(e.clientY / innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(mouse2d, camera);

  // Project onto a horizontal plane at y=0 for simplicity
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const target = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, target);
  if (!target) return;

  // Nudge slightly above ground
  target.y = 0.5 + Math.random() * 3.5;

  pathPoints.push(target.clone());
  rebuildMarkers();
  updatePathLine();
});

renderer.domElement.addEventListener('contextmenu', e => {
  e.preventDefault();
  removeLast();
});

/* ─────────────────────────────────────────────────────────────
   GUI (lil-gui)
───────────────────────────────────────────────────────────── */
const gui = new GUI({ title: '样条控制', width: 260 });
gui.domElement.style.position = 'fixed';
gui.domElement.style.top = '16px';
gui.domElement.style.right = '16px';

const state = {
  splineType: 'CatmullRom',
  speed: 1.0,
  tension: 0.5,
  segments: 200,
  play() { isPlaying = true; },
  pause() { isPlaying = false; },
  reset() { animT = 0; isPlaying = true; },
  clearPoints() {
    pathPoints = [new THREE.Vector3(-6,0,-4), new THREE.Vector3(6,0,4)];
    rebuildMarkers();
    updatePathLine();
  },
};

gui.add(state, 'splineType', [
  'CatmullRom',
  'CubicBezier',
  'QuadraticBezier',
  'Linear',
]).name('插值').onChange(v => {
  splineType = v;
  updatePathLine(state.segments);
});

gui.add(state, 'speed', 0.1, 5.0, 0.05).name('速度').onChange(v => { speed = v; });

gui.add(state, 'tension', 0, 1, 0.05).name('张力').onChange(() => updatePathLine(state.segments));

gui.add(state, 'segments', 50, 500, 10).name('路径段数').onChange(v => {
  state.segments = parseInt(v);
  updatePathLine(state.segments);
});

gui.add(state, 'play').name('▶ 播放');
gui.add(state, 'pause').name('⏸ 暂停');
gui.add(state, 'reset').name('↺ 重置');
gui.add(state, 'clearPoints').name('清除点');

/* ─────────────────────────────────────────────────────────────
   Resize handler
───────────────────────────────────────────────────────────── */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  lineMat.resolution.set(innerWidth, innerHeight);
});

/* ─────────────────────────────────────────────────────────────
   Animation loop
───────────────────────────────────────────────────────────── */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt   = Math.min(clock.getDelta(), 0.05);
  const time = clock.getElapsedTime();

  controls.update();

  if (isPlaying) {
    // Advance normalised parameter t
    animT += dt * speed * 0.08;
    if (animT > 1) animT -= 1;
  }

  const curve = buildCurve();
  if (curve) {
    const pos = curve.getPoint(animT);
    const tan = curve.getTangent(animT).normalize();

    // Position arrow group
    arrowGroup.position.copy(pos);

    // Orient along tangent (arrow body points in +Y, rotate to align with tangent)
    const up  = new THREE.Vector3(0, 1, 0);
    const quat = new THREE.Quaternion().setFromUnitVectors(up, tan);
    arrowGroup.quaternion.copy(quat);

    // Pulse ring
    const s = 1 + 0.25 * Math.sin(time * 6);
    ring.scale.setScalar(s);
    ringMat.opacity = 0.35 + 0.15 * Math.sin(time * 6);

    // Trail — record position
    trailPositions[trailHead % TRAIL_COUNT].copy(pos);
    trailHead++;

    // Update instanced trail
    for (let i = 0; i < TRAIL_COUNT; i++) {
      const age = (trailHead - i + TRAIL_COUNT) % TRAIL_COUNT;
      const alpha = 1 - i / TRAIL_COUNT;
      dummy.position.copy(trailPositions[age]);
      const sc = alpha * 0.9 + 0.1;
      dummy.scale.setScalar(sc);
      dummy.updateMatrix();
      trailMesh.setMatrixAt(i, dummy.matrix);
      trailColor.setRGB(alpha, alpha * 0.3, alpha * 0.5);
      trailMesh.setColorAt(i, trailColor);
    }
    trailMesh.instanceMatrix.needsUpdate = true;
    if (trailMesh.instanceColor) trailMesh.instanceColor.needsUpdate = true;
  }

  // Subtle marker float animation
  markers.forEach((m, i) => {
    m.position.y = pathPoints[i].y + 0.08 * Math.sin(time * 2 + i * 0.9);
  });

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
