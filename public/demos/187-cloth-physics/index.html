<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布料模拟 - Verlet 积分法</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #111; }
        canvas { display: block; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #888;
            font-family: monospace;
            font-size: 13px;
            pointer-events: none;
            line-height: 1.6;
        }
    </style>

    <!--
    ============================================================
    CLOTH SIMULATION WITH VERLET INTEGRATION
    ============================================================

    PHYSICS TECHNIQUE:
    Verlet integration is a numerical method for simulating particle
    physics. Unlike simple Euler integration (which stores position
    and velocity), Verlet stores:
      - current_position (pos)
      - previous_position (prevPos)

    The velocity is implicit: velocity = pos - prevPos

    UPDATE RULE:
      nextPos = pos + (pos - prevPos) * damping + acceleration * dt²

    PARTICLE-SPRING SYSTEM:
    The cloth is modeled as a grid of particles connected by springs:
      - Structural springs: connect adjacent particles (horizontal & vertical)
      - Shear springs: connect diagonal neighbors
      - Bend springs: skip one particle for stiffness

    CONSTRAINT SOLVING:
    Each frame, spring constraints are iterated multiple times (substeps)
    to bring particles back to their rest distances. The cloth is pinned
    at its top edge (first row of particles cannot move).

    FORCES APPLIED EACH FRAME:
      1. Gravity: F = mass * gravity (constant downward force)
      2. Wind: F = windStrength * noise(time) (oscillating horizontal force)

    This creates realistic cloth behavior with ripples and draping.
    ============================================================
    -->
</head>
<body>
<div id="info">
        布料模拟 - Verlet 积分法<br>
        粒子弹簧系统 | 风力 | 重力
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        // ============================================================
        // SCENE SETUP
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        scene.fog = new THREE.Fog(0x111111, 20, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, -5, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, -8, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(5, 10, 7);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0x4488ff, 0.8, 30);
        pointLight.position.set(-8, 5, 5);
        scene.add(pointLight);

        // ============================================================
        // CLOTH SIMULATION PARAMETERS
        // ============================================================
        const params = {
            width: 30,           // Number of horizontal particles
            height: 25,          // Number of vertical particles
            spacing: 0.5,        // Distance between particles
            gravity: 9.8,        // Gravity strength
            damping: 0.97,       // Velocity damping (energy loss per frame)
            windStrength: 3.0,   // Wind force magnitude
            windEnabled: true,   // Toggle wind on/off
            substeps: 5,         // Constraint solving iterations per frame
            showParticles: false // Debug: show particle points
        };

        // ============================================================
        // PARTICLE CLASS
        // ============================================================
        class Particle {
            constructor(x, y, z, pinned = false) {
                this.position = new THREE.Vector3(x, y, z);
                this.previousPosition = new THREE.Vector3(x, y, z);
                this.acceleration = new THREE.Vector3(0, 0, 0);
                this.mass = 1.0;
                this.pinned = pinned;
            }

            applyForce(force) {
                if (this.pinned) return;
                this.acceleration.addScaledVector(force, 1.0 / this.mass);
            }

            update(dt) {
                if (this.pinned) return;

                // Verlet integration
                // velocity = currentPos - previousPos (implicit)
                const velocity = new THREE.Vector3().subVectors(this.position, this.previousPosition);
                velocity.multiplyScalar(params.damping);

                // newPos = pos + velocity + acceleration * dt^2
                const newPosition = new THREE.Vector3()
                    .addVectors(this.position, velocity)
                    .addScaledVector(this.acceleration, dt * dt);

                // Store current as previous
                this.previousPosition.copy(this.position);
                this.position.copy(newPosition);

                // Reset acceleration
                this.acceleration.set(0, 0, 0);
            }
        }

        // ============================================================
        // SPRING CONSTRAINT CLASS
        // ============================================================
        class SpringConstraint {
            constructor(p1, p2, restDistance) {
                this.p1 = p1;
                this.p2 = p2;
                this.restDistance = restDistance;
            }

            solve() {
                const diff = new THREE.Vector3().subVectors(this.p2.position, this.p1.position);
                const currentDist = diff.length();
                if (currentDist === 0) return;

                const correction = (currentDist - this.restDistance) / currentDist;
                diff.multiplyScalar(0.5 * correction);

                if (!this.p1.pinned) {
                    this.p1.position.add(diff);
                }
                if (!this.p2.pinned) {
                    this.p2.position.sub(diff);
                }
            }
        }

        // ============================================================
        // CREATE CLOTH PARTICLES
        // ============================================================
        const particles = [];
        const springs = [];

        function createCloth() {
            const halfWidth = (params.width - 1) * params.spacing / 2;
            const startY = 0;

            // Create particles grid
            for (let y = 0; y < params.height; y++) {
                for (let x = 0; x < params.width; x++) {
                    const px = x * params.spacing - halfWidth;
                    const py = startY - y * params.spacing;
                    const pz = 0;

                    // Pin top row
                    const pinned = (y === 0);
                    const particle = new Particle(px, py, pz, pinned);
                    particles.push(particle);
                }
            }

            // Create springs (structural + shear)
            const getIndex = (x, y) => y * params.width + x;

            for (let y = 0; y < params.height; y++) {
                for (let x = 0; x < params.width; x++) {
                    const idx = getIndex(x, y);

                    // Structural horizontal
                    if (x < params.width - 1) {
                        springs.push(new SpringConstraint(
                            particles[idx],
                            particles[idx + 1],
                            params.spacing
                        ));
                    }

                    // Structural vertical
                    if (y < params.height - 1) {
                        springs.push(new SpringConstraint(
                            particles[idx],
                            particles[idx + params.width],
                            params.spacing
                        ));
                    }

                    // Shear diagonal (top-left to bottom-right)
                    if (x < params.width - 1 && y < params.height - 1) {
                        springs.push(new SpringConstraint(
                            particles[idx],
                            particles[idx + params.width + 1],
                            params.spacing * Math.SQRT2
                        ));
                    }

                    // Shear diagonal (top-right to bottom-left)
                    if (x > 0 && y < params.height - 1) {
                        springs.push(new SpringConstraint(
                            particles[idx],
                            particles[idx + params.width - 1],
                            params.spacing * Math.SQRT2
                        ));
                    }

                    // Bend spring horizontal (skip 1)
                    if (x < params.width - 2) {
                        springs.push(new SpringConstraint(
                            particles[idx],
                            particles[idx + 2],
                            params.spacing * 2
                        ));
                    }

                    // Bend spring vertical (skip 1)
                    if (y < params.height - 2) {
                        springs.push(new SpringConstraint(
                            particles[idx],
                            particles[idx + params.width * 2],
                            params.spacing * 2
                        ));
                    }
                }
            }
        }

        createCloth();

        // ============================================================
        // CREATE CLOTH GEOMETRY
        // ============================================================
        const clothGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particles.length * 3);
        const normals = new Float32Array(particles.length * 3);
        const uvs = new Float32Array(particles.length * 2);

        // Generate indices for triangles
        const indices = [];
        for (let y = 0; y < params.height - 1; y++) {
            for (let x = 0; x < params.width - 1; x++) {
                const idx = y * params.width + x;

                // First triangle
                indices.push(idx, idx + 1, idx + params.width);
                // Second triangle
                indices.push(idx + 1, idx + params.width + 1, idx + params.width);
            }
        }

        // Generate UVs
        for (let y = 0; y < params.height; y++) {
            for (let x = 0; x < params.width; x++) {
                const idx = (y * params.width + x) * 2;
                uvs[idx] = x / (params.width - 1);
                uvs[idx + 1] = 1 - y / (params.height - 1);
            }
        }

        clothGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        clothGeometry.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
        clothGeometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
        clothGeometry.setIndex(indices);

        // Cloth material
        let clothMaterial = new THREE.MeshStandardMaterial({
            color: 0xe74c3c,
            side: THREE.DoubleSide,
            roughness: 0.8,
            metalness: 0.1
        });

        const clothMesh = new THREE.Mesh(clothGeometry, clothMaterial);
        clothMesh.castShadow = true;
        clothMesh.receiveShadow = true;
        scene.add(clothMesh);

        // Debug particles
        let particlePoints;
        if (params.showParticles) {
            const particleGeometry = new THREE.BufferGeometry();
            const particlePositions = new Float32Array(particles.length * 3);
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            const particleMaterial = new THREE.PointsMaterial({ color: 0xffff00, size: 0.1 });
            particlePoints = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particlePoints);
        }

        // ============================================================
        // UPDATE GEOMETRY FROM PARTICLES
        // ============================================================
        function updateGeometry() {
            const positions = clothGeometry.attributes.position.array;
            const normals = clothGeometry.attributes.normal.array;

            // Update particle positions
            for (let i = 0; i < particles.length; i++) {
                positions[i * 3] = particles[i].position.x;
                positions[i * 3 + 1] = particles[i].position.y;
                positions[i * 3 + 2] = particles[i].position.z;
            }

            // Compute normals
            const p1 = new THREE.Vector3();
            const p2 = new THREE.Vector3();
            const p3 = new THREE.Vector3();
            const normal = new THREE.Vector3();
            const faceNormals = [];

            // Initialize normals
            for (let i = 0; i < particles.length; i++) {
                normals[i * 3] = 0;
                normals[i * 3 + 1] = 0;
                normals[i * 3 + 2] = 0;
            }

            // Accumulate face normals
            const indexArray = clothGeometry.index.array;
            for (let i = 0; i < indexArray.length; i += 3) {
                const i1 = indexArray[i];
                const i2 = indexArray[i + 1];
                const i3 = indexArray[i + 2];

                p1.fromArray(positions, i1 * 3);
                p2.fromArray(positions, i2 * 3);
                p3.fromArray(positions, i3 * 3);

                const v1 = new THREE.Vector3().subVectors(p2, p1);
                const v2 = new THREE.Vector3().subVectors(p3, p1);
                normal.crossVectors(v1, v2).normalize();

                normals[i1 * 3] += normal.x;
                normals[i1 * 3 + 1] += normal.y;
                normals[i1 * 3 + 2] += normal.z;
                normals[i2 * 3] += normal.x;
                normals[i2 * 3 + 1] += normal.y;
                normals[i2 * 3 + 2] += normal.z;
                normals[i3 * 3] += normal.x;
                normals[i3 * 3 + 1] += normal.y;
                normals[i3 * 3 + 2] += normal.z;
            }

            // Normalize vertex normals
            for (let i = 0; i < particles.length; i++) {
                const nx = normals[i * 3];
                const ny = normals[i * 3 + 1];
                const nz = normals[i * 3 + 2];
                const len = Math.sqrt(nx * nx + ny * ny + nz * nz);
                if (len > 0) {
                    normals[i * 3] /= len;
                    normals[i * 3 + 1] /= len;
                    normals[i * 3 + 2] /= len;
                }
            }

            clothGeometry.attributes.position.needsUpdate = true;
            clothGeometry.attributes.normal.needsUpdate = true;

            // Update debug particles
            if (particlePoints) {
                const particlePositions = particlePoints.geometry.attributes.position.array;
                for (let i = 0; i < particles.length; i++) {
                    particlePositions[i * 3] = particles[i].position.x;
                    particlePositions[i * 3 + 1] = particles[i].position.y;
                    particlePositions[i * 3 + 2] = particles[i].position.z;
                }
                particlePoints.geometry.attributes.position.needsUpdate = true;
            }
        }

        // ============================================================
        // GUI CONTROLS
        // ============================================================
        const gui = new GUI();
        gui.title('布料模拟控制');

        const forcesFolder = gui.addFolder('力学');
        forcesFolder.add(params, 'gravity', 0, 30, 0.1).name('重力');
        forcesFolder.add(params, 'windEnabled').name('风力开关');
        forcesFolder.add(params, 'windStrength', 0, 15, 0.1).name('风力强度');

        const simulationFolder = gui.addFolder('模拟');
        simulationFolder.add(params, 'damping', 0.9, 1.0, 0.001).name('阻尼系数');
        simulationFolder.add(params, 'substeps', 1, 15, 1).name('迭代次数');

        const displayFolder = gui.addFolder('显示');
        displayFolder.addColor(clothMaterial, 'color').name('布料颜色');

        // ============================================================
        // ANIMATION LOOP
        // ============================================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.033); // Cap delta time
            const time = clock.getElapsedTime();

            // Apply gravity
            const gravityForce = new THREE.Vector3(0, -params.gravity, 0);

            // Apply wind (oscillating based on time)
            let windForce = new THREE.Vector3(0, 0, 0);
            if (params.windEnabled) {
                const windX = Math.sin(time * 2) * params.windStrength;
                const windZ = Math.cos(time * 3) * params.windStrength * 0.5;
                windForce = new THREE.Vector3(windX, 0, windZ);
            }

            // Apply forces to all particles
            for (let i = 0; i < particles.length; i++) {
                particles[i].applyForce(gravityForce);
                particles[i].applyForce(windForce);
            }

            // Update particles with Verlet integration
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(dt);
            }

            // Solve constraints multiple times per frame
            for (let sub = 0; sub < params.substeps; sub++) {
                for (let i = 0; i < springs.length; i++) {
                    springs[i].solve();
                }
            }

            // Update geometry
            updateGeometry();

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // ============================================================
        // WINDOW RESIZE
        // ============================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
