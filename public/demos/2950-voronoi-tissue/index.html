<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>2950. Voronoi Tissue</title><style>

#ui{position:fixed;top:20px;left:20px;z-index:10;color:#aaccff;font-family:'SF Pro',-apple-system,BlinkMacSystemFont,sans-serif;pointer-events:none;max-width:280px}
#ui h1{font-size:15px;font-weight:600;letter-spacing:0.5px;margin:0 0 8px;color:#fff}

<div id="ui">
  <h1>Voronoi Tissue · Voronoi 组织</h1>
  <p>模拟生物细胞组织的 <b>Voronoi 结构</b>，每个细胞包含一个细胞核（彩色球体）和细胞膜（透明球壳）。</p>
  <p>细胞具有<b>呼吸动画</b>——半径周期性收缩扩张，模拟新陈代谢。点击屏幕可<b>添加新细胞</b>。</p>
  <div class="legend">
    <div class="legend-item"><span class="dot" style="background:#ff3344"></span>细胞核 — 每个细胞的遗传物质中心</div>
    <div class="legend-item"><span class="dot" style="background:rgba(255,255,255,0.3);border:1px solid #336688"></span>细胞膜 — 半透明球壳包围细胞质</div>
    <div class="legend-item"><span class="dot" style="background:rgba(51,102,136,0.5)"></span>细胞骨架 — 线框结构</div>
  </div>
  <p class="tip">拖拽旋转 · 滚轮缩放 · 点击添加细胞</p>
</div>
