<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>362 — Penrose Stairs</title>
<style>
body{margin:0;overflow:hidden;background:#1a1a2e}
canvas{display:block}
#info{position:absolute;top:10px;left:10px;color:#e0e0ff;font-family:monospace;font-size:13px;pointer-events:none;opacity:0.8}
</style>
</head>
<body>
<div id="info">362 — 彭罗斯阶梯 — 3D 不可能几何</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);
camera.position.set(6, 4, 6);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.8, 0.3, 0.7));

const goldMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.8, roughness: 0.2, emissive: 0x332200, emissiveIntensity: 0.3 });
const shadowMat = new THREE.MeshStandardMaterial({ color: 0x2a1a4a, metalness: 0.5, roughness: 0.4 });
const group = new THREE.Group();
scene.add(group);

const barW = 0.25, len = 2.0;

function createCorner(rotY) {
    const g = new THREE.Group();
    const v = new THREE.Mesh(new THREE.BoxGeometry(barW, len, barW), goldMat);
    v.position.y = len/2; v.castShadow = true;
    g.add(v);
    const h = new THREE.Mesh(new THREE.BoxGeometry(len, barW, barW), goldMat);
    h.position.set(len/2 - barW/2, len - barW/2, 0); h.castShadow = true;
    g.add(h);
    g.rotation.y = rotY;
    return g;
}

// Penrose triangle — three L-shaped corners
const c0 = createCorner(0);
const c1 = createCorner(Math.PI * 2/3);
const c2 = createCorner(Math.PI * 4/3);
c0.position.set(0, 0, 0);
c1.position.set(len * Math.cos(0) - len * Math.cos(Math.PI/3), 0, len * Math.sin(0) - len * Math.sin(Math.PI/3));
c2.position.set(len * Math.cos(Math.PI/3) - len * Math.cos(Math.PI*2/3), 0, len * Math.sin(Math.PI/3) - len * Math.sin(Math.PI*2/3));
// Re-position for triangle layout
c0.position.set(0, 0, 0);
c1.position.set(len * 1.5, 0, len * 0.866);
c2.position.set(len * 1.5, 0, -len * 0.866);
group.add(c0, c1, c2);

// Connectors that cross over to create impossible illusion
const connH = 0.15;
const mkConn = (w, x, y, z, ry) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, connH, barW), goldMat);
    m.position.set(x, y, z); m.rotation.y = ry; m.castShadow = true;
    return m;
};
group.add(mkConn(len * 1.8, len * 0.75, barW * 2, 0, 0));
group.add(mkConn(len * 1.8, len * 1.1, barW * 4, 0, Math.PI/3));
group.add(mkConn(len * 1.8, len * 1.1, barW * 6, 0, -Math.PI/3));

// Vertical pillars
[[0, 0], [len * 1.5, len * 0.866], [len * 1.5, -len * 0.866]].forEach(p => {
    const pil = new THREE.Mesh(new THREE.CylinderGeometry(barW/2, barW/2, len, 16), shadowMat);
    pil.position.set(p[0], len/2, p[1]);
    group.add(pil);
});

// Floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({ color: 0x0a0a1a, metalness: 0.5, roughness: 0.8 }));
floor.rotation.x = -Math.PI/2; floor.position.y = -0.01;
group.add(floor);

scene.add(new THREE.AmbientLight(0x4444aa, 1.5));
const dL = new THREE.DirectionalLight(0xffffff, 2);
dL.position.set(5, 10, 5); dL.castShadow = true;
scene.add(dL);
const pL = new THREE.PointLight(0xd4af37, 2, 15);
pL.position.set(0, 5, 0);
scene.add(pL);

let t = 0;
function animate() {
    requestAnimationFrame(animate);
    t += 0.01;
    group.rotation.y = t * 0.3;
    controls.update();
    composer.render();
}
animate();
window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
