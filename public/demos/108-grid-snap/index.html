<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>108 · 网格吸附 Grid Snap</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #080c14; color: #fff; font-family: -apple-system, sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 16px; left: 16px;
    background: rgba(8,12,20,0.82); border: 1px solid rgba(56,189,248,0.2);
    border-radius: 12px; padding: 14px 18px; backdrop-filter: blur(12px);
    font-size: 12px; line-height: 1.7; min-width: 240px;
  }
  #ui h2 { font-size: 13px; color: #38bdf8; margin: 0 0 10px; letter-spacing: 0.05em; }
  #ui .row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .btn {
    padding: 5px 11px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05); color: #94a3b8;
    font-size: 11px; cursor: pointer; transition: all 0.15s;
    font-family: inherit;
  }
  .btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .btn.active { background: rgba(56,189,248,0.18); border-color: rgba(56,189,248,0.5); color: #38bdf8; }
  .btn.danger { border-color: rgba(248,113,113,0.3); color: #f87171; }
  .btn.danger:hover { background: rgba(248,113,113,0.12); }
  #stat { color: #475569; margin-top: 6px; }
  #stat span { color: #94a3b8; font-weight: 600; }
  .tip {
    position: fixed; bottom: 16px; left: 16px;
    background: rgba(8,12,20,0.75); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 10px 14px; font-size: 11px; color: #64748b;
    backdrop-filter: blur(8px);
  }
  .tip b { color: #94a3b8; }
</style>
</head>
<body>
<div id="ui">
  <h2>网格吸附</h2>
  <div class="row">
    <button class="btn" id="btn1">0.5</button>
    <button class="btn active" id="btn2">1.0</button>
    <button class="btn" id="btn3">2.0</button>
    <button class="btn" id="btn4">4.0</button>
  </div>
  <div class="row">
    <button class="btn" id="btnSnap">吸附选中</button>
    <button class="btn danger" id="btnDel">删除选中</button>
    <button class="btn" id="btnAdd">+ 添加</button>
  </div>
  <div id="stat">选中 <span id="sel">0</span> 个 &nbsp;|&nbsp; 共 <span id="total">0</span> 个</div>
</div>

<div class="tip">
  <b>拖拽</b> 移动 · <b>右键</b> 旋转视角 · <b>蓝色高亮</b> 是当前吸附位置
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

// ─── Scene ─────────────────────────────────────────────────────────────────
const scene = new THREE.Scene()
scene.background = new THREE.Color(0x080c14)

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 500)
camera.position.set(0, 18, 18)
camera.lookAt(0, 0, 0)

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
renderer.shadowMap.enabled = true
renderer.shadowMap.type = THREE.PCFSoftShadowMap
document.body.appendChild(renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff, 0.5))
const sun = new THREE.DirectionalLight(0xfff4e0, 1.5)
sun.position.set(12, 20, 8)
sun.castShadow = true
sun.shadow.mapSize.set(2048, 2048)
sun.shadow.camera.near = 1
sun.shadow.camera.far = 80
sun.shadow.camera.left = sun.shadow.camera.bottom = -25
sun.shadow.camera.right = sun.shadow.camera.top = 25
scene.add(sun)

// ─── Ground & Grid ─────────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.95 })
)
ground.rotation.x = -Math.PI / 2
ground.receiveShadow = true
ground.name = 'ground'
scene.add(ground)

let gridSize = 1.0
let gridDivs = 60
let gridHelper = new THREE.GridHelper(60, gridDivs, 0x1e3a5f, 0x0f2744)
scene.add(gridHelper)

function rebuildGrid(s) {
  scene.remove(gridHelper)
  const divs = Math.round(60 / s)
  const isFine = divs > 40
  gridHelper = new THREE.GridHelper(60, divs, isFine ? 0x1e3a5f : 0x38bdf8, isFine ? 0x0f2744 : 0x1e3a5f)
  scene.add(gridHelper)
}

// ─── Objects ────────────────────────────────────────────────────────────────
const objects = []
let selected = null
let hoverObj = null

const COLORS = [0x38bdf8, 0x818cf8, 0xf472b6, 0x34d399, 0xf59e0b, 0xfb923c, 0xa78bfa, 0x2dd4bf]

function makeBox(x, z) {
  const h = 0.5 + Math.random() * 2.5
  const w = 0.4 + Math.random() * 1.2
  const geo = new THREE.BoxGeometry(w, h, w)
  const mat = new THREE.MeshStandardMaterial({
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    roughness: 0.35, metalness: 0.45
  })
  const mesh = new THREE.Mesh(geo, mat)
  mesh.position.set(x, h / 2, z)
  mesh.castShadow = true
  mesh.receiveShadow = true
  scene.add(mesh)
  objects.push(mesh)
  return mesh
}

// Seed with random boxes
for (let i = 0; i < 20; i++) {
  const x = (Math.random() - 0.5) * 20
  const z = (Math.random() - 0.5) * 20
  makeBox(Math.round(x / gridSize) * gridSize, Math.round(z / gridSize) * gridSize)
}

// ─── Selection highlight ────────────────────────────────────────────────────
let outlineMesh = null
const outlineGeo = new THREE.BoxGeometry(1, 1, 1)
const outlineMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, wireframe: true, transparent: true, opacity: 0.9 })

const snapPad = new THREE.Mesh(
  new THREE.PlaneGeometry(1, 1),
  new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.16, side: THREE.DoubleSide })
)
snapPad.rotation.x = -Math.PI / 2
snapPad.position.y = 0.02
snapPad.visible = false
scene.add(snapPad)

function setSelected(mesh) {
  if (selected && selected.material?.emissive) {
    selected.material.emissive.set(0x000000)
    selected.material.emissiveIntensity = 0
  }
  if (outlineMesh) { scene.remove(outlineMesh); outlineMesh = null }
  selected = mesh
  if (mesh) {
    mesh.material.emissive = mesh.material.emissive || new THREE.Color(0x000000)
    mesh.material.emissive.set(0x38bdf8)
    mesh.material.emissiveIntensity = 0.18
    const b = new THREE.Box3().setFromObject(mesh)
    const s = new THREE.Vector3()
    b.getSize(s)
    const c = new THREE.Vector3()
    b.getCenter(c)
    outlineMesh = new THREE.Mesh(outlineGeo, outlineMat)
    outlineMesh.position.copy(c)
    outlineMesh.scale.copy(s).multiplyScalar(1.06)
    scene.add(outlineMesh)
  }
  updateUI()
}

// ─── Ghost / preview ────────────────────────────────────────────────────────
const ghostMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.3, wireframe: true })
const ghostMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), ghostMat)
ghostMesh.visible = false
scene.add(ghostMesh)

function showSnapPreview(x, z) {
  snapPad.visible = true
  snapPad.position.set(x, 0.02, z)
  snapPad.scale.set(gridSize, gridSize, 1)

  if (!selected) {
    ghostMesh.visible = false
    return
  }

  const b = new THREE.Box3().setFromObject(selected)
  const s = b.getSize(new THREE.Vector3())
  ghostMesh.visible = true
  ghostMesh.position.set(x, selected.position.y, z)
  ghostMesh.scale.copy(s)
}

function hideSnapPreview() {
  snapPad.visible = false
  ghostMesh.visible = false
}

// ─── Raycaster ──────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster()
const mouse = new THREE.Vector2()

function toNDC(e) {
  const r = renderer.domElement.getBoundingClientRect()
  return new THREE.Vector2(
    ((e.clientX - r.left) / r.width)  * 2 - 1,
   -((e.clientY - r.top)  / r.height) * 2 + 1
  )
}

function hitObjects(e) {
  mouse.copy(toNDC(e))
  raycaster.setFromCamera(mouse, camera)
  return raycaster.intersectObjects(objects)
}

function hitGround(e) {
  mouse.copy(toNDC(e))
  raycaster.setFromCamera(mouse, camera)
  return raycaster.intersectObject(ground)
}

// ─── Controls ──────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping = true
controls.enablePan = true
controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN }

// ─── Drag state ────────────────────────────────────────────────────────────
let dragging = false
let dragPlane = new THREE.Plane()
let dragOffset = new THREE.Vector3()
let dragStart = new THREE.Vector2()
let movedPx = 0

renderer.domElement.addEventListener('mousedown', e => {
  if (e.button !== 0) return
  dragStart.set(e.clientX, e.clientY)
  movedPx = 0

  const hits = hitObjects(e)
  if (hits.length > 0) {
    e.stopPropagation()
    const mesh = hits[0].object
    setSelected(mesh)
    dragging = true
    controls.enabled = false
    dragPlane.setFromNormalAndCoplanarPoint(new THREE.Vector3(0,1,0), mesh.position)
    const pt = new THREE.Vector3()
    raycaster.ray.intersectPlane(dragPlane, pt)
    dragOffset.subVectors(pt, mesh.position)
  } else {
    setSelected(null)
  }
})

renderer.domElement.addEventListener('mousemove', e => {
  const groundHits = hitGround(e)
  if (groundHits.length > 0) {
    const p = groundHits[0].point
    const sx = Math.round(p.x / gridSize) * gridSize
    const sz = Math.round(p.z / gridSize) * gridSize
    showSnapPreview(sx, sz)
  } else if (!dragging) {
    hideSnapPreview()
  }

  // Hover highlight
  const hits = hitObjects(e)
  if (!dragging) {
    if (hits.length > 0) {
      renderer.domElement.style.cursor = 'pointer'
    } else {
      renderer.domElement.style.cursor = 'default'
    }
    return
  }

  movedPx += Math.abs(e.clientX - dragStart.x) + Math.abs(e.clientY - dragStart.y)
  dragStart.set(e.clientX, e.clientY)

  mouse.copy(toNDC(e))
  raycaster.setFromCamera(mouse, camera)
  const pt = new THREE.Vector3()
  raycaster.ray.intersectPlane(dragPlane, pt)
  pt.sub(dragOffset)

  // Snap to grid
  const sx = Math.round(pt.x / gridSize) * gridSize
  const sz = Math.round(pt.z / gridSize) * gridSize

  selected.position.x = sx
  selected.position.z = sz
  showSnapPreview(sx, sz)

  // Update outline
  if (outlineMesh) {
    outlineMesh.position.set(sx, selected.position.y, sz)
  }
})

renderer.domElement.addEventListener('mouseup', e => {
  if (e.button !== 0) return
  dragging = false
  controls.enabled = true
  renderer.domElement.style.cursor = 'default'
})

renderer.domElement.addEventListener('mouseleave', () => {
  if (!dragging) hideSnapPreview()
})

// Double-click: add new box
renderer.domElement.addEventListener('dblclick', e => {
  const hits = hitGround(e)
  if (hits.length > 0) {
    const p = hits[0].point
    const sx = Math.round(p.x / gridSize) * gridSize
    const sz = Math.round(p.z / gridSize) * gridSize
    const mesh = makeBox(sx, sz)
    setSelected(mesh)
  }
})

// ─── UI ────────────────────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('sel').textContent = selected ? 1 : 0
  document.getElementById('total').textContent = objects.length
}

document.getElementById('btn1').addEventListener('click', () => setSize(0.5))
document.getElementById('btn2').addEventListener('click', () => setSize(1.0))
document.getElementById('btn3').addEventListener('click', () => setSize(2.0))
document.getElementById('btn4').addEventListener('click', () => setSize(4.0))

function setSize(s) {
  gridSize = s
  rebuildGrid(s)
  document.querySelectorAll('[id^=btn]').forEach(b => {
    if (b.classList.contains('btn')) b.classList.remove('active')
  })
  const map = { 0.5: 'btn1', 1.0: 'btn2', 2.0: 'btn3', 4.0: 'btn4' }
  document.getElementById(map[s]).classList.add('active')
}

document.getElementById('btnSnap').addEventListener('click', () => {
  if (!selected) return
  selected.position.x = Math.round(selected.position.x / gridSize) * gridSize
  selected.position.z = Math.round(selected.position.z / gridSize) * gridSize
  if (outlineMesh) outlineMesh.position.set(selected.position.x, selected.position.y, selected.position.z)
  showSnapPreview(selected.position.x, selected.position.z)
})

document.getElementById('btnDel').addEventListener('click', () => {
  if (!selected) return
  scene.remove(selected)
  const idx = objects.indexOf(selected)
  if (idx !== -1) objects.splice(idx, 1)
  setSelected(null)
})

document.getElementById('btnAdd').addEventListener('click', () => {
  const x = (Math.random() - 0.5) * 16
  const z = (Math.random() - 0.5) * 16
  const mesh = makeBox(Math.round(x / gridSize) * gridSize, Math.round(z / gridSize) * gridSize)
  setSelected(mesh)
})

// ─── Render ────────────────────────────────────────────────────────────────
let t = 0
function animate() {
  requestAnimationFrame(animate)
  t += 0.016

  if (outlineMesh) {
    outlineMat.opacity = 0.7 + Math.sin(t * 5) * 0.18
  }

  if (snapPad.visible) {
    snapPad.material.opacity = 0.12 + (Math.sin(t * 6) + 1) * 0.04
  }

  controls.update()
  renderer.render(scene, camera)
}
animate()

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})

updateUI()
</script>
</body>
</html>
