<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>07 · 加载 3D 模型 GLTFLoader</title>
<style>
  body { margin: 0; overflow: hidden; background: #d8e2ef; }
  canvas { display: block; }
  .tip {
    position: fixed; top: 12px; left: 12px;
    color: #222; font: 14px/1.6 -apple-system, sans-serif;
    background: rgba(255,255,255,.7); padding: 8px 12px; border-radius: 6px;
    max-width: 360px;
  }
  .status {
    position: fixed; bottom: 12px; left: 12px; right: 12px;
    color: #fff; font: 13px monospace;
    background: rgba(0,0,0,.6); padding: 8px 12px; border-radius: 6px;
  }
</style>
</head>
<body>
<div class="tip">
  <b>GLTFLoader 加载 .glb 模型</b><br>
  从 KhronosGroup 官方示例仓库加载一只小鸭子 🦆<br>
  鼠标拖拽旋转、滚轮缩放
</div>
<div class="status" id="status">⏳ 模型加载中...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
// GLTFLoader 用来加载 .gltf / .glb 格式的模型，是行业标准
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'

const scene = new THREE.Scene()
scene.background = new THREE.Color(0xd8e2ef)

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000)
camera.position.set(4, 3, 5)

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)
renderer.shadowMap.enabled = true
renderer.outputColorSpace = THREE.SRGBColorSpace
document.body.appendChild(renderer.domElement)

const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping = true

// ============ 灯光 ============
scene.add(new THREE.AmbientLight(0xffffff, 0.6))
const dir = new THREE.DirectionalLight(0xffffff, 1.2)
dir.position.set(5, 8, 5)
dir.castShadow = true
scene.add(dir)

// ============ 地面 ============
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshStandardMaterial({ color: 0xe7eef7 })
)
ground.rotation.x = -Math.PI / 2
ground.position.y = 0
ground.receiveShadow = true
scene.add(ground)

// ============ 加载模型 ============
const status = document.getElementById('status')
const loader = new GLTFLoader()

// 经典示例模型：小鸭子，托管在 KhronosGroup 的 glTF 样本仓库
const URL = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb'

loader.load(
  URL,
  // 加载成功
  (gltf) => {
    const model = gltf.scene
    // 让所有子网格都投阴影
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true
        child.receiveShadow = true
      }
    })

    const rawBox = new THREE.Box3().setFromObject(model)
    const rawSize = rawBox.getSize(new THREE.Vector3())
    const targetHeight = 2.2
    const scale = targetHeight / Math.max(rawSize.y, 0.001)
    model.scale.setScalar(scale)

    const fittedBox = new THREE.Box3().setFromObject(model)
    const fittedSize = fittedBox.getSize(new THREE.Vector3())
    const fittedCenter = fittedBox.getCenter(new THREE.Vector3())

    model.position.x -= fittedCenter.x
    model.position.y -= fittedBox.min.y
    model.position.z -= fittedCenter.z

    scene.add(model)
    window.duck = model
    controls.target.set(0, fittedSize.y * 0.45, 0)
    camera.position.set(fittedSize.x * 1.8, fittedSize.y * 1.1, fittedSize.z * 2.8)
    camera.lookAt(controls.target)
    controls.update()
    status.textContent = '✅ 加载完成 · 模型节点数：' + countNodes(gltf.scene)

    // 让鸭子缓慢自转
    function spin() {
      requestAnimationFrame(spin)
      model.rotation.y += 0.005
    }
    spin()
  },
  // 加载进度
  (e) => {
    if (e.lengthComputable) {
      const percent = ((e.loaded / e.total) * 100).toFixed(0)
      status.textContent = `⏳ 模型加载中... ${percent}%`
    }
  },
  // 加载失败
  (err) => {
    console.error(err)
    status.textContent = '❌ 加载失败：' + err.message + '（可能是网络/CORS 问题，请用本地服务器访问本页面）'
  }
)

function countNodes(obj) {
  let n = 0
  obj.traverse(() => n++)
  return n
}

// ============ 渲染循环 ============
function animate() {
  requestAnimationFrame(animate)
  controls.update()
  renderer.render(scene, camera)
}
animate()

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})
</script>
</body>
</html>
