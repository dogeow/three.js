<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>02 · 几何体与材质</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1a2e; }
  canvas { display: block; }
  .tip {
    position: fixed; top: 12px; left: 12px;
    color: #fff; font: 14px/1.6 -apple-system, sans-serif;
    background: rgba(0,0,0,.4); padding: 8px 12px; border-radius: 6px;
  }
  .legend {
    position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
    display: grid; grid-template-columns: repeat(6, minmax(88px, 1fr)); gap: 8px;
    width: min(920px, calc(100vw - 24px));
    color: #d8e6ff; font: 12px/1.4 -apple-system, sans-serif;
    pointer-events: none;
  }
  .legend span {
    padding: 8px 10px; text-align: center;
    background: rgba(8, 12, 20, 0.55); border: 1px solid rgba(255,255,255,.08);
    border-radius: 10px; backdrop-filter: blur(10px);
  }
</style>
</head>
<body>
<div class="tip">统一使用 MeshStandardMaterial，仅对比 Geometry 轮廓、分段与体积差异</div>
<div class="legend">
  <span>Box</span>
  <span>Sphere</span>
  <span>Cone</span>
  <span>Cylinder</span>
  <span>Torus</span>
  <span>TorusKnot</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module" src="main.js"></script>
</body>
</html>
