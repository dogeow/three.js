<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>305 程序化地形与生物群落</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: monospace; }
    canvas { display: block; }
    #fps {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #fff;
      font-size: 13px;
      background: rgba(0,0,0,0.55);
      padding: 5px 10px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
<div id="fps">FPS: --</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

// ─── Constants ───────────────────────────────────────────────────────────────
const GRID      = 128;
const WORLD     = 200;
const SEG       = GRID - 1;
const HALF      = WORLD / 2;

// ─── Biome colors ────────────────────────────────────────────────────────────
const C_DEEP    = new THREE.Color(0x0a2463);
const C_SHALLOW = new THREE.Color(0x1e6fbf);
const C_BEACH   = new THREE.Color(0xe8c872);
const C_GRASS   = new THREE.Color(0x4caf50);
const C_FOREST  = new THREE.Color(0x1b5e20);
const C_MOUNTAIN= new THREE.Color(0x78909c);
const C_SNOW    = new THREE.Color(0xf5f5f5);

// ─── Params ──────────────────────────────────────────────────────────────────
const p = {
  noiseScale:   2.5,
  heightScale:  14.0,
  octaves:      5,
  wireframe:    false,
};

// ─── Renderer / Scene / Camera ──────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 90, 130);
camera.lookAt(0, 0, 0);

// ─── Controls ────────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2 - 0.05;
controls.minDistance = 20;
controls.maxDistance = 500;

// ─── Lights ───────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x334455, 0.55);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5e0, 1.4);
sun.position.set(80, 120, 60);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 600;
sun.shadow.camera.left = -130;
sun.shadow.camera.right = 130;
sun.shadow.camera.top = 130;
sun.shadow.camera.bottom = -130;
scene.add(sun);

const hemi = new THREE.HemisphereLight(0x88aacc, 0x444422, 0.35);
scene.add(hemi);

// ─── Noise helpers ────────────────────────────────────────────────────────────
function hash2(x, y) {
  let h = Math.sin(x * 127.1 + y * 311.7) * 43758.5453123;
  return h - Math.floor(h);
}

function valueNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix,        fy = y - iy;
  const ux = fx * fx * (3 - 2 * fx);
  const uy = fy * fy * (3 - 2 * fy);
  const a = hash2(ix,     iy    );
  const b = hash2(ix + 1, iy    );
  const c = hash2(ix,     iy + 1);
  const d = hash2(ix + 1, iy + 1);
  return a + (b - a) * ux + (c - a) * uy + (a - b - c + d) * ux * uy;
}

function fbm(x, y, oct) {
  let v = 0, amp = 0.5, freq = 1, max = 0;
  for (let i = 0; i < oct; i++) {
    v += valueNoise(x * freq, y * freq) * amp;
    max += amp;
    amp  *= 0.5;
    freq *= 2.0;
  }
  return v / max;
}

// ─── Geometry ─────────────────────────────────────────────────────────────────
const geometry = new THREE.BufferGeometry();

const vertCount = GRID * GRID;
const positions = new Float32Array(vertCount * 3);
const normals   = new Float32Array(vertCount * 3);
const colors    = new Float32Array(vertCount * 3);
const indices   = [];

for (let iz = 0; iz < GRID; iz++) {
  for (let ix = 0; ix < GRID; ix++) {
    const vi = iz * GRID + ix;
    positions[vi * 3    ] = (ix / SEG) * WORLD - HALF;
    positions[vi * 3 + 1] = 0;
    positions[vi * 3 + 2] = (iz / SEG) * WORLD - HALF;
    normals[vi * 3 + 1] = 1;
  }
}

for (let iz = 0; iz < SEG; iz++) {
  for (let ix = 0; ix < SEG; ix++) {
    const a = iz * GRID + ix;
    const b = a + 1;
    const c = a + GRID;
    const d = c + 1;
    indices.push(a, c, b);
    indices.push(b, c, d);
  }
}

geometry.setIndex(indices);
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('normal',   new THREE.BufferAttribute(normals,   3));
geometry.setAttribute('color',    new THREE.BufferAttribute(colors,    3));

// ─── Material ─────────────────────────────────────────────────────────────────
const material = new THREE.MeshLambertMaterial({
  vertexColors: true,
  wireframe:    p.wireframe,
  side:         THREE.FrontSide,
});

const terrain = new THREE.Mesh(geometry, material);
terrain.receiveShadow = true;
terrain.castShadow   = true;
scene.add(terrain);

// ─── Biome logic ─────────────────────────────────────────────────────────────
function biomeColor(h, t, m) {
  // h: height 0..1  t: temperature 0..1  m: moisture 0..1
  // Latitude-based temperature modifier (cooler at poles)
  const latCool = 1 - Math.pow(Math.abs(h > 0.5 ? 1 : 0) * 0.4, 0.5);
  t = t * 0.7 + latCool * 0.3;
  t = Math.max(0, Math.min(1, t));

  if (h < 0.30) return C_DEEP;
  if (h < 0.38) return C_SHALLOW;
  if (h < 0.42) return C_BEACH;
  if (h < 0.65) {
    // Grass vs Forest: moisture drives forest
    if (m < 0.4) return lerpColor(C_GRASS, C_BEACH, (0.4 - m) * 1.2);
    if (m < 0.6) return C_GRASS;
    return lerpColor(C_GRASS, C_FOREST, (m - 0.6) * 2.5);
  }
  if (h < 0.82) {
    // Mountain
    if (t < 0.3) return C_MOUNTAIN;
    return lerpColor(C_MOUNTAIN, C_GRASS, t);
  }
  // Snow
  if (t > 0.55) return C_SNOW;
  return lerpColor(C_MOUNTAIN, C_SNOW, (t - 0.3) * 4.0);
}

function lerpColor(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  return new THREE.Color(
    a.r + (b.r - a.r) * t,
    a.g + (b.g - a.g) * t,
    a.b + (b.b - a.b) * t
  );
}

// Bi-lerp blend between adjacent vertices for smooth biome boundaries
function blendBiomeColor(h, t, m) {
  const base = biomeColor(h, t, m);
  const eps = 0.02;
  const tH = biomeColor(Math.min(1, h + eps), t, m);
  const tT = biomeColor(h, Math.min(1, t + eps), m);
  const tM = biomeColor(h, t, Math.min(1, m + eps));
  const r = (base.r + tH.r + tT.r + tM.r) / 4;
  const g = (base.g + tH.g + tT.g + tM.g) / 4;
  const b = (base.b + tH.b + tT.b + tM.b) / 4;
  return new THREE.Color(r, g, b);
}

// ─── Update geometry ──────────────────────────────────────────────────────────
function updateGeometry() {
  const ns   = p.noiseScale;
  const hs   = p.heightScale;
  const oct  = p.octaves;
  const pos  = geometry.attributes.position;
  const nor  = geometry.attributes.normal;
  const col  = geometry.attributes.color;

  for (let iz = 0; iz < GRID; iz++) {
    for (let ix = 0; ix < GRID; ix++) {
      const vi = iz * GRID + ix;
      const wx = pos.getX(vi);
      const wz = pos.getZ(vi);
      const nx = wx / WORLD;
      const nz = wz / WORLD;

      // Height (fine detail)
      const rawH = fbm(nx * ns + 5.1, nz * ns + 3.7, oct);
      const h = rawH * hs;

      // Temperature: large-scale FBM + latitude
      const temp = fbm(nx * ns * 0.4 + 12.3, nz * ns * 0.4 + 8.1, 3);

      // Moisture: medium-scale FBM
      const mois = fbm(nx * ns * 0.8 + 20.5, nz * ns * 0.8 + 15.3, 4);

      // Normalize
      const normH   = rawH;                         // 0..1
      const normTemp= Math.max(0, Math.min(1, temp));
      const normMois= Math.max(0, Math.min(1, mois));

      pos.setY(vi, h);

      // Vertex color with bi-lerp blending
      const c = blendBiomeColor(normH, normTemp, normMois);
      col.setXYZ(vi, c.r, c.g, c.b);
    }
  }

  pos.needsUpdate = true;
  col.needsUpdate = true;

  // Recompute normals
  geometry.computeVertexNormals();
  nor.needsUpdate = true;

  material.wireframe = p.wireframe;
}

updateGeometry();

// ─── Wireframe helper mesh ────────────────────────────────────────────────────
const wireMat = new THREE.MeshBasicMaterial({ color: 0x44aaff, wireframe: true, opacity: 0.18, transparent: true });
const wireMesh = new THREE.Mesh(geometry, wireMat);
wireMesh.visible = false;
scene.add(wireMesh);

// ─── GUI ──────────────────────────────────────────────────────────────────────
const gui = new GUI();
gui.add(p, 'noiseScale',  0.5, 8.0, 0.1).name('噪声缩放').onChange(updateGeometry);
gui.add(p, 'heightScale', 2.0, 30.0, 0.5).name('高度缩放').onChange(updateGeometry);
gui.add(p, 'octaves', 1, 8, 1).step(1).name('倍频').onChange(updateGeometry);
gui.add(p, 'wireframe').name('线框图').onChange(v => {
  wireMesh.visible = v;
});

// ─── Keyboard ─────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.key === 'w' || e.key === 'W') {
    p.wireframe = !p.wireframe;
    gui.controllers.forEach(c => c.updateDisplay());
    wireMesh.visible = p.wireframe;
  }
});

// ─── FPS counter ──────────────────────────────────────────────────────────────
const fpsEl = document.getElementById('fps');
let frames = 0, lastTime = performance.now();

function tickFPS() {
  frames++;
  const now = performance.now();
  if (now - lastTime >= 1000) {
    fpsEl.textContent = `FPS: ${frames}`;
    frames = 0;
    lastTime = now;
  }
}

// ─── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animation loop ───────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  tickFPS();
}

animate();
</script>
</body>
</html>
