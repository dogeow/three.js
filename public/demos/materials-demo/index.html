<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 材质示例</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: Arial, sans-serif; color: #fff; }
    canvas { display: block; }
    .label { position: absolute; padding: 6px 12px; background: rgba(0,0,0,0.7); border-radius: 4px; font-size: 14px; pointer-events: none; }
    #l1 { top: 25%; left: 18%; transform: translateX(-50%); }
    #l2 { top: 55%; left: 50%; transform: translateX(-50%); }
    #l3 { top: 25%; right: 18%; transform: translateX(50%); }
  </style>
</head>
<body>
  <div class="label" id="l1">MeshBasicMaterial</div>
  <div class="label" id="l2">MeshLambertMaterial</div>
  <div class="label" id="l3">MeshStandardMaterial</div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 三种材质几何体
    const geo = new THREE.SphereGeometry(1, 32, 32);
    const m1 = new THREE.MeshBasicMaterial({ color: 0xff6b6b });
    const m2 = new THREE.MeshLambertMaterial({ color: 0x51cf66 });
    const m3 = new THREE.MeshStandardMaterial({ color: 0x339af0, metalness: 0.6, roughness: 0.3 });

    const cube1 = new THREE.Mesh(geo, m1);
    cube1.position.set(-3, 0, 0);
    scene.add(cube1);

    const cube2 = new THREE.Mesh(geo, m2);
    cube2.position.set(0, 0, 0);
    scene.add(cube2);

    const cube3 = new THREE.Mesh(geo, m3);
    cube3.position.set(3, 0, 0);
    scene.add(cube3);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      cube1.rotation.y += 0.01;
      cube2.rotation.y += 0.01;
      cube3.rotation.y += 0.01;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
