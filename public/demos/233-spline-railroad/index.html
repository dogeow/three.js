<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js — 样条铁路</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #title {
      position: fixed; top: 16px; left: 20px;
      color: #7cffb2; font-size: 13px; letter-spacing: 2px;
      text-transform: uppercase; pointer-events: none; z-index: 10;
    }
    #hint {
      position: fixed; bottom: 16px; left: 20px;
      color: #555; font-size: 11px; pointer-events: none; z-index: 10;
    }
  </style>

  <!--
  ╔══════════════════════════════════════════════════════════════╗
  ║                         技术点                                 ║
  ╠══════════════════════════════════════════════════════════════╣
  ║ 1. CatmullRomCurve3                                          ║
  ║    - 三维样条曲线，通过一组控制点自动插值平滑路径               ║
  ║    - curve.getPointAt(t)  → 任意 t∈[0,1] 的世界坐标           ║
  ║    - curve.getTangentAt(t) → 任意 t 处的切线向量（方向）       ║
  ║    - 适合铁路、公路、河流等路径建模                           ║
  ║                                                              ║
  ║ 2. 铁路轨道生成                                               ║
  ║    - 沿曲线按固定间隔采样，在每个采样点生成轨枕（BoxGeometry） ║
  ║    - 轨枕朝向：法线方向 = cross(tangent, up) 使其垂直于轨道   ║
  ║    - 两条铁轨：左右各偏移半个轨距，用 TubeGeometry 渲染        ║
  ║                                                              ║
  ║ 3. 火车运动                                                   ║
  ║    - 以参数 t 沿曲线推进，每帧 += speed * deltaTime           ║
  ║    - getPointAt(t) → 车厢位置                                 ║
  ║    - getTangentAt(t) → 前进方向，做四元数 LookAt 旋转         ║
  ║    - 多车厢：每节车厢用不同的 t_offset（如 -0.05）跟随        ║
  ║                                                              ║
  ║ 4. 轨道形状预设                                               ║
  ║    - oval：4 个控制点围成椭圆                                 ║
  ║    - figure-8：8 个控制点构成 8 字形                          ║
  ║    - wobbly：多个随机偏移点构成蜿蜒路径                        ║
  ╚══════════════════════════════════════════════════════════════╝
  -->

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="title">样条铁路</div>
  <div id="hint">左键旋转 · 滚轮缩放 · 右键平移 &nbsp;|&nbsp; GUI: 调整速度与轨道形状</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    // ─── Renderer ─────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ─── Scene & Camera ───────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);
    scene.fog = new THREE.Fog(0x0a0a0f, 80, 250);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 18, 40);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.maxPolarAngle = Math.PI / 2 - 0.05;
    controls.minDistance = 5;
    controls.maxDistance = 150;

    // ─── Lights ────────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x223344, 1.2));

    const sun = new THREE.DirectionalLight(0xffeedd, 2.0);
    sun.position.set(30, 60, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 300;
    sun.shadow.camera.left = sun.shadow.camera.bottom = -80;
    sun.shadow.camera.right = sun.shadow.camera.top = 80;
    scene.add(sun);

    const fill = new THREE.DirectionalLight(0x4488bb, 0.6);
    fill.position.set(-20, 10, -30);
    scene.add(fill);

    // ─── Ground ────────────────────────────────────────────────────────────────
    const groundMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(300, 300),
      new THREE.MeshLambertMaterial({ color: 0x111a0f })
    );
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);

    // subtle grid
    const grid = new THREE.GridHelper(300, 60, 0x1a2a1a, 0x1a2a1a);
    grid.material.opacity = 0.4;
    grid.material.transparent = true;
    scene.add(grid);

    // ─── Track Presets ─────────────────────────────────────────────────────────
    const TRACK_PRESETS = {
      oval: () => [
        new THREE.Vector3(-24, 0, -12),
        new THREE.Vector3(  0, 0, -18),
        new THREE.Vector3( 24, 0, -12),
        new THREE.Vector3( 24, 0,   0),
        new THREE.Vector3( 24, 0,  12),
        new THREE.Vector3(  0, 0,  18),
        new THREE.Vector3(-24, 0,  12),
        new THREE.Vector3(-24, 0,   0),
      ],
      'figure-8': () => [
        new THREE.Vector3(  0, 0, -20),
        new THREE.Vector3( 16, 0, -14),
        new THREE.Vector3( 22, 0,   0),
        new THREE.Vector3( 16, 0,  14),
        new THREE.Vector3(  0, 0,  20),
        new THREE.Vector3(-16, 0,  14),
        new THREE.Vector3(-22, 0,   0),
        new THREE.Vector3(-16, 0, -14),
      ],
      wobbly: () => {
        const pts = [];
        const count = 16;
        for (let i = 0; i < count; i++) {
          const a = (i / count) * Math.PI * 2;
          const r = 22 + Math.sin(a * 3) * 6 + Math.cos(a * 5) * 4;
          pts.push(new THREE.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r));
        }
        return pts;
      },
    };

    // ─── Materials ─────────────────────────────────────────────────────────────
    const tieMat   = new THREE.MeshLambertMaterial({ color: 0x3d2510 });
    const railMat  = new THREE.MeshLambertMaterial({ color: 0x8a8a8a });
    const tieSSMat = new THREE.MeshLambertMaterial({ color: 0x5c3a1a });
    const engineMat   = new THREE.MeshLambertMaterial({ color: 0xcc2200 });
    const engineTopMat= new THREE.MeshLambertMaterial({ color: 0x991100 });
    const carMat      = new THREE.MeshLambertMaterial({ color: 0x2244aa });
    const carTopMat   = new THREE.MeshLambertMaterial({ color: 0x1a3366 });
    const wheelMat    = new THREE.MeshLambertMaterial({ color: 0x333333 });
    const wheelRimMat = new THREE.MeshLambertMaterial({ color: 0x666666 });

    // ─── State ─────────────────────────────────────────────────────────────────
    let curve        = null;
    let trackGroup   = null;
    let engineGroup  = null;
    const carGroups  = [];
    let t            = 0;
    let trainSpeed   = 0.018;
    let followCamera = true;

    // ─── Build Track ──────────────────────────────────────────────────────────
    function buildTrack(preset) {
      if (trackGroup) scene.remove(trackGroup);
      trackGroup = new THREE.Group();
      scene.add(trackGroup);

      const pts = TRACK_PRESETS[preset]();
      curve = new THREE.CatmullRomCurve3(pts, true, 'catmullrom', 0.5);

      // ── Rails (tube) ──
      const RAIL_OFFSET = 0.85;
      const curvePoints = curve.getPoints(600);
      const leftPts  = [];
      const rightPts = [];
      const up = new THREE.Vector3(0, 1, 0);

      curvePoints.forEach(p => {
        const tang = new THREE.Vector3().subVectors(
          curve.getTangentAt(p.x),
          new THREE.Vector3()
        ).normalize();
        // re-compute tangent properly via getTangentAt using the parameter
      });

      // compute offset points manually for the two rails
      for (let i = 0; i <= 600; i++) {
        const tt = i / 600;
        const pos = curve.getPointAt(tt);
        const tang = curve.getTangentAt(tt).normalize();
        const right = new THREE.Vector3().crossVectors(tang, up).normalize();
        leftPts.push(pos.clone().addScaledVector(right, -RAIL_OFFSET));
        rightPts.push(pos.clone().addScaledVector(right, RAIL_OFFSET));
      }

      const leftCurve  = new THREE.CatmullRomCurve3(leftPts,  true);
      const rightCurve = new THREE.CatmullRomCurve3(rightPts, true);

      const leftTube  = new THREE.Mesh(new THREE.TubeGeometry(leftCurve,  600, 0.07, 6, true), railMat);
      const rightTube = new THREE.Mesh(new THREE.TubeGeometry(rightCurve, 600, 0.07, 6, true), railMat);
      leftTube.castShadow  = rightTube.castShadow  = true;
      leftTube.receiveShadow = rightTube.receiveShadow = true;
      trackGroup.add(leftTube, rightTube);

      // ── Ties (sleepers) ──
      const NUM_TIES = 120;
      const tieGeo = new THREE.BoxGeometry(2.4, 0.14, 0.32);
      // add a bevel-like detail: slightly lighter top face via separate mesh

      for (let i = 0; i < NUM_TIES; i++) {
        const tt = i / NUM_TIES;
        const pos = curve.getPointAt(tt);
        const tang = curve.getTangentAt(tt).normalize();
        const right = new THREE.Vector3().crossVectors(tang, up).normalize();

        const tie = new THREE.Mesh(tieGeo, tieMat);
        tie.position.copy(pos);
        // rotate so Z-axis of tie aligns with right vector, Y stays up
        const mat4 = new THREE.Matrix4().makeBasis(right, up, new THREE.Vector3().crossVectors(right, up));
        tie.setRotationFromMatrix(mat4);
        tie.castShadow = true;
        tie.receiveShadow = true;
        trackGroup.add(tie);

        // spike/detail on top of tie (thin plank)
        const plankGeo = new THREE.BoxGeometry(2.3, 0.05, 0.28);
        const plank = new THREE.Mesh(plankGeo, tieSSMat);
        plank.position.copy(pos).addScaledVector(up, 0.095);
        plank.setRotationFromMatrix(mat4);
        plank.castShadow = true;
        trackGroup.add(plank);
      }

      // ── Ballast (small rocks under ties) ──
      const ballastGeo = new THREE.PlaneGeometry(3.0, 0.6);
      const ballastMat = new THREE.MeshLambertMaterial({ color: 0x2a1a0a, transparent: true, opacity: 0.7 });
      for (let i = 0; i < NUM_TIES; i++) {
        const tt = i / NUM_TIES;
        const pos = curve.getPointAt(tt);
        const tang = curve.getTangentAt(tt).normalize();
        const right = new THREE.Vector3().crossVectors(tang, up).normalize();
        const ballast = new THREE.Mesh(ballastGeo, ballastMat);
        ballast.position.copy(pos).addScaledVector(up, -0.05);
        const mat4 = new THREE.Matrix4().makeBasis(right, up, new THREE.Vector3().crossVectors(right, up));
        ballast.setRotationFromMatrix(mat4);
        ballast.rotation.x = -Math.PI / 2;
        ballast.receiveShadow = true;
        trackGroup.add(ballast);
      }

      return curve;
    }

    // ─── Build Train ────────────────────────────────────────────────────────────
    function buildTrain() {
      if (engineGroup) scene.remove(engineGroup);
      carGroups.forEach(c => scene.remove(c));
      carGroups.length = 0;

      // ── Engine ──
      engineGroup = new THREE.Group();

      // chassis
      const chassisGeo = new THREE.BoxGeometry(2.2, 1.0, 4.0);
      const chassis = new THREE.Mesh(chassisGeo, engineMat);
      chassis.position.y = 0.7;
      chassis.castShadow = true;
      engineGroup.add(chassis);

      // cabin
      const cabinGeo = new THREE.BoxGeometry(2.0, 1.4, 1.8);
      const cabin = new THREE.Mesh(cabinGeo, engineTopMat);
      cabin.position.set(0, 1.8, -0.6);
      cabin.castShadow = true;
      engineGroup.add(cabin);

      // smokestack
      const stackGeo = new THREE.CylinderGeometry(0.22, 0.3, 0.9, 8);
      const stack = new THREE.Mesh(stackGeo, engineTopMat);
      stack.position.set(0, 2.35, 1.2);
      stack.castShadow = true;
      engineGroup.add(stack);

      // boiler
      const boilerGeo = new THREE.CylinderGeometry(0.5, 0.5, 3.0, 12);
      const boiler = new THREE.Mesh(boilerGeo, engineTopMat);
      boiler.rotation.z = Math.PI / 2;
      boiler.position.set(0, 1.15, 1.0);
      boiler.castShadow = true;
      engineGroup.add(boiler);

      // front buffer
      const bufferGeo = new THREE.BoxGeometry(1.8, 0.2, 0.2);
      const buffer = new THREE.Mesh(bufferGeo, wheelMat);
      buffer.position.set(0, 0.7, 2.1);
      engineGroup.add(buffer);

      // cowcatcher
      const catcherGeo = new THREE.BoxGeometry(2.0, 0.5, 0.5);
      const catcher = new THREE.Mesh(catcherGeo, engineMat);
      catcher.position.set(0, 0.45, 2.35);
      catcher.rotation.x = 0.3;
      catcher.castShadow = true;
      engineGroup.add(catcher);

      // wheels (6)
      const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.2, 16);
      const wheelPositions = [
        [-0.9, 0.45, 1.3], [0.9, 0.45, 1.3],
        [-0.9, 0.45, 0.0],  [0.9, 0.45, 0.0],
        [-0.9, 0.45, -1.3], [0.9, 0.45, -1.3],
      ];
      wheelPositions.forEach(([x, y, z]) => {
        const w = new THREE.Mesh(wheelGeo, wheelMat);
        w.rotation.z = Math.PI / 2;
        w.position.set(x, y, z);
        w.castShadow = true;
        engineGroup.add(w);

        // rim
        const rimGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.22, 8);
        const rim = new THREE.Mesh(rimGeo, wheelRimMat);
        rim.rotation.z = Math.PI / 2;
        rim.position.set(x, y, z);
        engineGroup.add(rim);

        // connecting rod hint
        const rodGeo = new THREE.BoxGeometry(0.06, 0.06, 2.8);
        const rod = new THREE.Mesh(rodGeo, wheelRimMat);
        rod.position.set(x > 0 ? 0.12 : -0.12, y - 0.1, 0);
        engineGroup.add(rod);
      });

      scene.add(engineGroup);

      // ── Cars ──
      const carOffsets = [-5.5, -10.0];
      carOffsets.forEach((offset, idx) => {
        const carGroup = new THREE.Group();

        const carBodyGeo = new THREE.BoxGeometry(2.0, 1.0, 3.6);
        const carBody = new THREE.Mesh(carBodyGeo, carMat);
        carBody.position.y = 0.7;
        carBody.castShadow = true;
        carGroup.add(carBody);

        // car roof
        const roofGeo = new THREE.BoxGeometry(1.9, 0.3, 3.5);
        const roof = new THREE.Mesh(roofGeo, carTopMat);
        roof.position.set(0, 1.35, 0);
        roof.castShadow = true;
        carGroup.add(roof);

        // corner posts
        const postGeo = new THREE.BoxGeometry(0.12, 0.8, 0.12);
        [[-0.9, 0, 1.7], [0.9, 0, 1.7], [-0.9, 0, -1.7], [0.9, 0, -1.7]].forEach(([x, y, z]) => {
          const post = new THREE.Mesh(postGeo, carTopMat);
          post.position.set(x, 1.1, z);
          post.castShadow = true;
          carGroup.add(post);
        });

        // buffer / coupler
        const carBufferGeo = new THREE.BoxGeometry(1.6, 0.18, 0.18);
        const carBuffer = new THREE.Mesh(carBufferGeo, wheelMat);
        carBuffer.position.set(0, 0.7, idx === 0 ? 1.9 : 1.9);
        carGroup.add(carBuffer);

        // wheels (4 per car)
        const carWheelPositions = [
          [-0.85, 0.45, 1.2], [0.85, 0.45, 1.2],
          [-0.85, 0.45, -1.2], [0.85, 0.45, -1.2],
        ];
        carWheelPositions.forEach(([x, y, z]) => {
          const w = new THREE.Mesh(wheelGeo.clone(), wheelMat);
          w.rotation.z = Math.PI / 2;
          w.position.set(x, y, z);
          w.castShadow = true;
          carGroup.add(w);
        });

        scene.add(carGroup);
        carGroups.push({ group: carGroup, offset });
      });
    }

    // ─── Place Train on Curve ──────────────────────────────────────────────────
    function placeOnCurve(obj, tt) {
      if (!curve) return;
      const pos = curve.getPointAt(tt);
      const tang = curve.getTangentAt(tt).normalize();
      const up = new THREE.Vector3(0, 1, 0);
      const right = new THREE.Vector3().crossVectors(tang, up).normalize();
      const realUp = new THREE.Vector3().crossVectors(right, tang).normalize();

      // rotation: look along tangent
      const mat4 = new THREE.Matrix4().makeBasis(right, realUp, tang.negate());
      // simpler: use LookAt
      const dummy = new THREE.Object3D();
      dummy.position.copy(pos);
      dummy.lookAt(pos.clone().add(tang));
      obj.position.copy(dummy.position);
      obj.quaternion.copy(dummy.quaternion);
    }

    // ─── GUI ───────────────────────────────────────────────────────────────────
    const params = {
      speed: 0.018,
      preset: 'oval',
      followCamera: true,
    };

    const gui = new GUI({ title: '🚂 铁路控制' });
    gui.add(params, 'preset', { 椭圆: 'oval', '8 字形': 'figure-8', 摇摆形: 'wobbly' })
      .name('轨道形状')
      .onChange(v => {
        t = 0;
        buildTrack(v);
        buildTrain();
      });
    gui.add(params, 'speed', 0.002, 0.05, 0.001).name('火车速度').onChange(v => { trainSpeed = v; });
    gui.add(params, 'followCamera').name('跟随相机').onChange(v => { followCamera = v; });

    // ─── Init ───────────────────────────────────────────────────────────────────
    buildTrack(params.preset);
    buildTrain();

    // ─── Resize ────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Animate ────────────────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);

      // advance train
      if (curve) {
        t = (t + trainSpeed * delta * 60) % 1;

        placeOnCurve(engineGroup, t);

        carGroups.forEach(({ group, offset }) => {
          // offset in curve parameter (approximate)
          const carT = ((t - offset / curve.getLength() + 2) % 1);
          placeOnCurve(group, carT);
        });

        if (followCamera) {
          const trainPos = curve.getPointAt(t);
          const trainTang = curve.getTangentAt(t).normalize();
          const desiredCam = trainPos.clone()
            .addScaledVector(trainTang, -10)
            .add(new THREE.Vector3(0, 7, 0));
          camera.position.lerp(desiredCam, 0.05);
          controls.target.lerp(trainPos, 0.08);
        }
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
