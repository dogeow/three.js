<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js 动画示例</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a1a; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

    // ─── 场景、相机、渲染器 ───
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x0a0a1a)

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000)
    camera.position.set(5, 4, 5)
    camera.lookAt(0, 0, 0)

    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setPixelRatio(window.devicePixelRatio)
    document.body.appendChild(renderer.domElement)

    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true
    controls.dampingFactor = 0.05

    // ─── 创建三个演示物体 ───
    const boxGeo = new THREE.BoxGeometry(1, 1, 1)
    const sphereGeo = new THREE.SphereGeometry(0.6, 32, 32)
    const torusGeo = new THREE.TorusGeometry(0.5, 0.2, 16, 64)

    const mat1 = new THREE.MeshStandardMaterial({ color: 0x4488ff, metalness: 0.5, roughness: 0.3 })
    const mat2 = new THREE.MeshStandardMaterial({ color: 0xff6644, metalness: 0.5, roughness: 0.3 })
    const mat3 = new THREE.MeshStandardMaterial({ color: 0x44ff88, metalness: 0.5, roughness: 0.3 })

    const box = new THREE.Mesh(boxGeo, mat1)
    box.position.set(-2, 1, 0)
    scene.add(box)

    const sphere = new THREE.Mesh(sphereGeo, mat2)
    sphere.position.set(0, 2.5, 0)
    scene.add(sphere)

    const torus = new THREE.Mesh(torusGeo, mat3)
    torus.position.set(2, 1, 0)
    scene.add(torus)

    // ─── 光照 ───
    scene.add(new THREE.AmbientLight(0xffffff, 0.4))
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0)
    dirLight.position.set(5, 5, 5)
    scene.add(dirLight)

    // ─── 地面 ───
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x222233 })
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), groundMat)
    ground.rotation.x = -Math.PI / 2
    ground.position.y = -0.01
    scene.add(ground)

    const gridHelper = new THREE.GridHelper(10, 10, 0x444466, 0x222244)
    scene.add(gridHelper)

    // ─── 窗口响应 ───
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    // ─── 动画循环 ───
    // Three.js 动画核心：每帧更新物体属性
    function animate() {
      requestAnimationFrame(animate)

      const time = performance.now() * 0.001 // 转换为秒

      // ── 动画1：Box 做呼吸缩放（正弦波动） ──
      // scale 在 0.5 ~ 1.5 之间随时间正弦变化
      const breathScale = 1.0 + Math.sin(time * 2) * 0.5
      box.scale.set(breathScale, breathScale, breathScale)
      // 同时绕 Y 轴旋转
      box.rotation.y += 0.02

      // ── 动画2：Sphere 上下弹跳 + 旋转 ──
      // 使用二次缓动函数：先快后慢
      const jumpT = (Math.abs(Math.sin(time * 1.5)) * 2) // 0~2
      sphere.position.y = 0.6 + jumpT * 1.8             // 0.6 ~ 4.0
      sphere.rotation.y += 0.03
      sphere.rotation.x += 0.01

      // ── 动画3：Torus 轨道公转 ──
      // 在 XZ 平面做圆形轨道运动
      const orbitRadius = 2
      torus.position.x = Math.cos(time * 1.2) * orbitRadius
      torus.position.z = Math.sin(time * 1.2) * orbitRadius
      torus.rotation.x += 0.02
      torus.rotation.z += 0.01

      controls.update()
      renderer.render(scene, camera)
    }

    animate()
  </script>
</body>
</html>
