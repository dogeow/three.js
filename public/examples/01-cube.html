<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js 立方体示例</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
  <!-- Three.js 核心库 -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

    // ─── 1. 创建场景、相机、渲染器 ───
    const scene = new THREE.Scene()
    // 设置场景背景色
    scene.background = new THREE.Color(0x1a1a2e)

    // 透视相机：视野角度, 近平面, 远平面
    const camera = new THREE.PerspectiveCamera(
      60,                                     // 视野角度
      window.innerWidth / window.innerHeight, // 宽高比
      0.1,                                    // 近平面
      1000                                    // 远平面
    )
    camera.position.set(3, 3, 3) // 相机位置 (x, y, z)
    camera.lookAt(0, 0, 0)      // 相机朝向原点

    // WebGL 渲染器，抗锯齿开启
    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setPixelRatio(window.devicePixelRatio)
    document.body.appendChild(renderer.domElement)

    // ─── 2. 添加轨道控制器 ───
    // 允许鼠标拖拽旋转、滚轮缩放、右键平移
    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true  // 启用阻尼效果（惯性）
    controls.dampingFactor = 0.05

    // ─── 3. 创建立方体 ───
    // BoxGeometry(width, height, depth)
    const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5)

    // MeshStandardMaterial：基于物理的标准材质
    const material = new THREE.MeshStandardMaterial({
      color: 0x00ffff,    // 颜色
      metalness: 0.5,     // 金属度：0=非金属，1=全金属
      roughness: 0.3,     // 粗糙度：0=镜面反射，1=漫反射
    })

    // Mesh = 几何体 + 材质
    const cube = new THREE.Mesh(geometry, material)
    scene.add(cube)

    // ─── 4. 添加光照 ───
    // 环境光：均匀照亮所有物体，没有阴影
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4)
    scene.add(ambientLight)

    // 平行光：像太阳光，产生阴影
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0)
    directionalLight.position.set(5, 5, 5) // 光照方向
    directionalLight.castShadow = true      // 开启阴影
    scene.add(directionalLight)

    // ─── 5. 添加坐标轴辅助线（便于观察） ───
    const axesHelper = new THREE.AxesHelper(2)
    scene.add(axesHelper)

    // ─── 6. 响应窗口大小变化 ───
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    // ─── 7. 动画循环 ───
    function animate() {
      requestAnimationFrame(animate)

      // 让立方体旋转
      cube.rotation.x += 0.01  // 绕 X 轴旋转
      cube.rotation.y += 0.015 // 绕 Y 轴旋转

      // 更新轨道控制器（阻尼效果需要每帧调用）
      controls.update()

      // 渲染场景
      renderer.render(scene, camera)
    }

    animate()
  </script>
</body>
</html>
