<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js 材质对比示例</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #111; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.6;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="info">
    Three.js 材质对比<br>
    左起：Standard / Phong / Lambert
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

    // ─── 场景、相机、渲染器 ───
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x1a1a2e)

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000)
    camera.position.set(6, 4, 6)
    camera.lookAt(0, 0, 0)

    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setPixelRatio(window.devicePixelRatio)
    renderer.shadowMap.enabled = true  // 开启阴影
    renderer.shadowMap.type = THREE.PCFSoftShadowMap
    document.body.appendChild(renderer.domElement)

    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true
    controls.dampingFactor = 0.05

    // ─── 三种材质对比 ───

    // 1. MeshStandardMaterial：基于物理的标准材质（PBR）
    //   - metalness: 金属度（0=非金属，1=全金属）
    //   - roughness: 粗糙度（0=光滑镜面，1=完全漫反射）
    const standardMat = new THREE.MeshStandardMaterial({
      color: 0x4488ff,
      metalness: 0.5,
      roughness: 0.3,
    })

    // 2. MeshPhongMaterial：冯氏光照模型（较老的着色方式）
    //   - shininess: 光泽度（值越高高光越集中）
    const phongMat = new THREE.MeshPhongMaterial({
      color: 0x4488ff,
      shininess: 100,
      specular: 0x444444,  // 镜面高光颜色
    })

    // 3. MeshLambertMaterial： Lambert漫反射（最简单的光照）
    //   - 只考虑漫反射，不产生高光
    const lambertMat = new THREE.MeshLambertMaterial({
      color: 0x4488ff,
    })

    // ─── 创建三个球体并排展示 ───
    const sphereGeo = new THREE.SphereGeometry(0.8, 32, 32)

    const sphere1 = new THREE.Mesh(sphereGeo, standardMat)
    sphere1.position.set(-2.5, 0, 0)
    sphere1.castShadow = true
    scene.add(sphere1)

    const sphere2 = new THREE.Mesh(sphereGeo, phongMat)
    sphere2.position.set(0, 0, 0)
    sphere2.castShadow = true
    scene.add(sphere2)

    const sphere3 = new THREE.Mesh(sphereGeo, lambertMat)
    sphere3.position.set(2.5, 0, 0)
    sphere3.castShadow = true
    scene.add(sphere3)

    // ─── 地面（接收阴影） ───
    const groundGeo = new THREE.PlaneGeometry(20, 20)
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x333333 })
    const ground = new THREE.Mesh(groundGeo, groundMat)
    ground.rotation.x = -Math.PI / 2
    ground.position.y = -1.0
    ground.receiveShadow = true
    scene.add(ground)

    // ─── 光照 ───
    // 环境光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3)
    scene.add(ambientLight)

    // 点光源
    const pointLight = new THREE.PointLight(0xffffff, 1.0)
    pointLight.position.set(5, 5, 5)
    pointLight.castShadow = true
    scene.add(pointLight)

    // ─── 坐标轴辅助 ───
    const axesHelper = new THREE.AxesHelper(3)
    scene.add(axesHelper)

    // ─── 窗口响应 ───
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    // ─── 动画循环 ───
    function animate() {
      requestAnimationFrame(animate)

      // 三个球体各自旋转
      sphere1.rotation.y += 0.01
      sphere2.rotation.y += 0.01
      sphere3.rotation.y += 0.01

      controls.update()
      renderer.render(scene, camera)
    }

    animate()
  </script>
</body>
</html>
