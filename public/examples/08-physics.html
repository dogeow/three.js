<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js 物理碰撞示例</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #111; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- Cannon.js 物理引擎 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.min.js"></script>

  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

    // ─── 场景、相机、渲染器 ───
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x111122)

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000)
    camera.position.set(6, 8, 10)
    camera.lookAt(0, 0, 0)

    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setPixelRatio(window.devicePixelRatio)
    renderer.shadowMap.enabled = true
    renderer.shadowMap.type = THREE.PCFSoftShadowMap
    document.body.appendChild(renderer.domElement)

    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true
    controls.dampingFactor = 0.05

    // ─── 光照 ───
    scene.add(new THREE.AmbientLight(0xffffff, 0.4))
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0)
    dirLight.position.set(5, 10, 5)
    dirLight.castShadow = true
    dirLight.shadow.mapSize.set(1024, 1024)
    scene.add(dirLight)

    // ─── 地面 ───
    const groundGeo = new THREE.PlaneGeometry(20, 20)
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x333344 })
    const ground = new THREE.Mesh(groundGeo, groundMat)
    ground.rotation.x = -Math.PI / 2
    ground.receiveShadow = true
    scene.add(ground)

    const gridHelper = new THREE.GridHelper(20, 20, 0x444466, 0x222244)
    scene.add(gridHelper)

    // ───────────────────────────────────────
    // 物理引擎初始化（Cannon.js）
    // ───────────────────────────────────────
    // World：物理世界，包含所有刚体和碰撞检测
    const world = new CANNON.World()
    world.gravity.set(0, -9.82, 0)  // 重力加速度 (m/s²)
    world.broadphase = new CANNON.NaiveBroadphase()
    world.solver.iterations = 10

    // ── 地面物理刚体 ──
    const groundBody = new CANNON.Body({
      type: CANNON.Body.STATIC,  // STATIC = 固定不动
      shape: new CANNON.Plane(),
    })
    groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2)
    world.addBody(groundBody)

    // ─── 创建物理球体数组 ───
    const physicsBodies = []   // 物理刚体
    const threeMeshes = []    // Three.js 网格

    // 不同颜色列表
    const colors = [0x4488ff, 0xff6644, 0x44ff88, 0xffff44, 0xff44ff, 0x44ffff]
    const geometries = [
      new THREE.SphereGeometry(0.5, 16, 16),
      new THREE.BoxGeometry(1, 1, 1),
      new THREE.BoxGeometry(0.8, 0.8, 0.8),
      new THREE.SphereGeometry(0.4, 16, 16),
    ]

    // 初始化几个物体
    function createPhysicsObject(x, y, z, type) {
      // type: 0=球, 1=方块
      let shape
      let geo
      if (type === 0) {
        shape = new CANNON.Sphere(0.5)
        geo = geometries[0]
      } else if (type === 1) {
        shape = new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5))
        geo = geometries[1]
      } else if (type === 2) {
        shape = new CANNON.Box(new CANNON.Vec3(0.4, 0.4, 0.4))
        geo = geometries[2]
      } else {
        shape = new CANNON.Sphere(0.4)
        geo = geometries[3]
      }

      // 物理材质
      const mat = new THREE.MeshStandardMaterial({
        color: colors[Math.floor(Math.random() * colors.length)],
        metalness: 0.3,
        roughness: 0.5,
      })

      const mesh = new THREE.Mesh(geo, mat)
      mesh.castShadow = true
      mesh.receiveShadow = true
      scene.add(mesh)

      // 物理刚体
      const body = new CANNON.Body({
        mass: 1,           // 质量（kg），0 = 静态
        shape: shape,
        position: new CANNON.Vec3(x, y, z),
        material: new CANNON.Material({ friction: 0.3, restitution: 0.6 }),
      })
      // 给一个随机初始速度
      body.velocity.set(
        (Math.random() - 0.5) * 3,
        Math.random() * 2 + 1,
        (Math.random() - 0.5) * 3
      )
      body.angularVelocity.set(
        (Math.random() - 0.5) * 5,
        (Math.random() - 0.5) * 5,
        (Math.random() - 0.5) * 5
      )
      world.addBody(body)

      physicsBodies.push(body)
      threeMeshes.push(mesh)
    }

    // 初始创建 6 个物体
    for (let i = 0; i < 6; i++) {
      createPhysicsObject(
        (Math.random() - 0.5) * 4,
        3 + i * 1.5,
        (Math.random() - 0.5) * 4,
        i % 4
      )
    }

    // ─── 每 3 秒添加一个新物体 ───
    let spawnCounter = 0
    setInterval(() => {
      spawnCounter++
      createPhysicsObject(
        (Math.random() - 0.5) * 4,
        8 + Math.random() * 2,
        (Math.random() - 0.5) * 4,
        spawnCounter % 4
      )
      // 限制最大数量防止卡顿
      if (physicsBodies.length > 30) {
        const oldest = physicsBodies.shift()
        world.removeBody(oldest)
        const mesh = threeMeshes.shift()
        scene.remove(mesh)
      }
    }, 3000)

    // ─── 窗口响应 ───
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    // ─── 动画循环 ───
    const FIXED_TIME_STEP = 1 / 60  // 固定物理步长 60fps
    let lastCallTime = performance.now()

    function animate() {
      requestAnimationFrame(animate)

      const now = performance.now()
      const dt = (now - lastCallTime) / 1000
      lastCallTime = now

      // 让物理引擎往前推进
      world.step(FIXED_TIME_STEP, dt, 3)

      // 同步 Three.js 网格位置到物理刚体
      for (let i = 0; i < physicsBodies.length; i++) {
        const body = physicsBodies[i]
        const mesh = threeMeshes[i]
        mesh.position.copy(body.position)
        mesh.quaternion.copy(body.quaternion)
      }

      controls.update()
      renderer.render(scene, camera)
    }

    animate()
  </script>
</body>
</html>
