<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js 光照类型对比</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #legend {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      background: rgba(0,0,0,0.75);
      padding: 12px;
      border-radius: 6px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="legend">
    🔴 AmbientLight（环境光）<br>
    🟡 PointLight（点光源）<br>
    🔵 DirectionalLight（平行光）<br>
    🟢 SpotLight（聚光灯）
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

    // ─── 场景、相机、渲染器 ───
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x111122)

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000)
    camera.position.set(8, 5, 8)
    camera.lookAt(0, 0, 0)

    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setPixelRatio(window.devicePixelRatio)
    renderer.shadowMap.enabled = true
    renderer.shadowMap.type = THREE.PCFSoftShadowMap
    document.body.appendChild(renderer.domElement)

    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true
    controls.dampingFactor = 0.05
    controls.maxDistance = 20

    // ─── 中心球体 ───
    const sphereGeo = new THREE.SphereGeometry(1.0, 32, 32)
    const sphereMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      metalness: 0.3,
      roughness: 0.4,
    })
    const centerSphere = new THREE.Mesh(sphereGeo, sphereMat)
    centerSphere.position.y = 0
    centerSphere.castShadow = true
    scene.add(centerSphere)

    // ─── 地面 ───
    const groundGeo = new THREE.PlaneGeometry(30, 30)
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.9 })
    const ground = new THREE.Mesh(groundGeo, groundMat)
    ground.rotation.x = -Math.PI / 2
    ground.position.y = -1.2
    ground.receiveShadow = true
    scene.add(ground)

    // ─── 四种光源 ───

    // 1. AmbientLight（环境光）
    //   - 均匀照亮所有物体，不产生阴影
    //   - 参数：颜色、光照强度
    const ambientLight = new THREE.AmbientLight(0xff4444, 0.4)
    scene.add(ambientLight)

    // 2. PointLight（点光源）
    //   - 像灯泡，向所有方向发光
    //   - 参数：颜色、光照强度、衰减距离
    const pointLight = new THREE.PointLight(0xffcc00, 2.0, 20)
    pointLight.position.set(-4, 3, 0)
    pointLight.castShadow = true
    pointLight.shadow.mapSize.set(512, 512)
    scene.add(pointLight)
    // 可视化点光源位置
    const pointHelper = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0xffcc00 })
    )
    pointHelper.position.copy(pointLight.position)
    scene.add(pointHelper)

    // 3. DirectionalLight（平行光/ directionalLight）
    //   - 像太阳光，平行发射，用于产生硬阴影
    //   - position 设置光照方向（从光源位置射向原点）
    const directionalLight = new THREE.DirectionalLight(0x4444ff, 2.0)
    directionalLight.position.set(4, 5, 2)
    directionalLight.castShadow = true
    directionalLight.shadow.mapSize.set(512, 512)
    directionalLight.shadow.camera.near = 0.5
    directionalLight.shadow.camera.far = 20
    directionalLight.shadow.camera.left = -10
    directionalLight.shadow.camera.right = 10
    directionalLight.shadow.camera.top = 10
    directionalLight.shadow.camera.bottom = -10
    scene.add(directionalLight)
    // 可视化方向光
    const dirHelper = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0x4444ff })
    )
    dirHelper.position.copy(directionalLight.position)
    scene.add(dirHelper)

    // 4. SpotLight（聚光灯）
    //   - 像手电筒，向一个方向照射，形成锥形光束
    //   - 参数：颜色、强度、衰减距离、角度、锥形半影
    const spotLight = new THREE.SpotLight(0x44ff66, 3.0, 20, Math.PI / 6, 0.5, 2)
    spotLight.position.set(0, 5, -4)
    spotLight.target.position.set(0, 0, 0)
    spotLight.castShadow = true
    spotLight.shadow.mapSize.set(512, 512)
    scene.add(spotLight)
    scene.add(spotLight.target)
    // 可视化聚光灯
    const spotHelper = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0x44ff66 })
    )
    spotHelper.position.copy(spotLight.position)
    scene.add(spotHelper)

    // ─── 窗口响应 ───
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    // ─── 动画循环 ───
    let time = 0
    function animate() {
      requestAnimationFrame(animate)
      time += 0.01

      centerSphere.rotation.y += 0.01
      controls.update()
      renderer.render(scene, camera)
    }

    animate()
  </script>
</body>
</html>
