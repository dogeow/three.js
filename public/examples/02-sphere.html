<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js 球体示例 - 环境映射</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

    // ─── 场景、相机、渲染器 ───
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x0a0a1a)

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000)
    camera.position.set(4, 2, 4)
    camera.lookAt(0, 0, 0)

    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setPixelRatio(window.devicePixelRatio)
    renderer.toneMapping = THREE.ACESFilmicToneMapping   // ACES 色调映射
    renderer.toneMappingExposure = 1.2
    document.body.appendChild(renderer.domElement)

    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true
    controls.dampingFactor = 0.05

    // ─── 创建球体 ───
    // SphereGeometry(radius, widthSegments, heightSegments)
    const geometry = new THREE.SphereGeometry(1.2, 64, 64)

    // MeshStandardMaterial 金属球效果
    const material = new THREE.MeshStandardMaterial({
      color: 0xaaaaff,       // 浅蓝色
      metalness: 0.9,        // 高金属度
      roughness: 0.1,        // 低粗糙度 = 光滑镜面
      envMapIntensity: 1.0,  // 环境贴图强度
    })

    const sphere = new THREE.Mesh(geometry, material)
    scene.add(sphere)

    // ─── 环境贴图（模拟周围环境反射） ───
    // 使用 PMREMGenerator 从场景生成环境贴图
    const pmremGenerator = new THREE.PMREMGenerator(renderer)
    pmremGenerator.compileEquirectangularShader()

    // 创建一个简单的渐变环境球
    const envScene = new THREE.Scene()
    // 从下到上：深蓝 → 青色 → 白色
    const envGeo = new THREE.SphereGeometry(100, 32, 32)
    const envMat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      uniforms: {},
      vertexShader: `
        varying vec3 vWorldPosition;
        void main() {
          vec4 worldPosition = modelMatrix * vec4(position, 1.0);
          vWorldPosition = worldPosition.xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vWorldPosition;
        void main() {
          float h = normalize(vWorldPosition).y;
          vec3 colorBottom = vec3(0.0, 0.0, 0.2);
          vec3 colorMid = vec3(0.0, 0.5, 0.8);
          vec3 colorTop = vec3(0.8, 0.9, 1.0);
          vec3 color = mix(colorBottom, colorMid, smoothstep(-1.0, 0.0, h));
          color = mix(color, colorTop, smoothstep(0.0, 1.0, h));
          gl_FragColor = vec4(color, 1.0);
        }
      `
    })
    const envMesh = new THREE.Mesh(envGeo, envMat)
    envScene.add(envMesh)

    // 生成环境贴图
    const envMap = pmremGenerator.fromScene(envScene, 0.04).texture
    scene.environment = envMap

    // ─── 光照 ───
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3)
    scene.add(ambientLight)

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5)
    directionalLight.position.set(5, 5, 5)
    scene.add(directionalLight)

    // ─── 坐标轴辅助 ───
    const axesHelper = new THREE.AxesHelper(2)
    scene.add(axesHelper)

    // ─── 窗口响应 ───
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    // ─── 动画循环 ───
    let time = 0
    function animate() {
      requestAnimationFrame(animate)
      time += 0.01

      // 球体缓慢旋转
      sphere.rotation.y += 0.005
      sphere.rotation.x += 0.002

      controls.update()
      renderer.render(scene, camera)
    }

    animate()
  </script>
</body>
</html>
