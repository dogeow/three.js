<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js 相机类型对比</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      background: rgba(0,0,0,0.75);
      padding: 12px;
      border-radius: 6px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="info">
    左：PerspectiveCamera（透视相机）<br>
    右：OrthographicCamera（正交相机）<br>
    <br>
    按 <b>1</b> / <b>2</b> 键切换视角
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

    // ─── 场景 ───
    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x111122)

    // 视锥体尺寸（用于正交相机）
    const frustumSize = 6

    // ─── PerspectiveCamera 透视相机 ───
    // 特点：近大远小，符合人眼视觉
    // 参数：fov(视野角度), aspect(宽高比), near, far
    const aspect = window.innerWidth / window.innerHeight
    const perspectiveCamera = new THREE.PerspectiveCamera(60, aspect, 0.1, 100)
    perspectiveCamera.position.set(6, 4, 6)
    perspectiveCamera.lookAt(0, 0, 0)

    // ─── OrthographicCamera 正交相机 ───
    // 特点：物体大小不随距离改变，适合 2D UI / 工程制图
    // 参数：left, right, top, bottom, near, far
    const orthographicCamera = new THREE.OrthographicCamera(
      -frustumSize * aspect / 2, frustumSize * aspect / 2,
      frustumSize / 2, -frustumSize / 2,
      0.1, 100
    )
    orthographicCamera.position.set(6, 4, 6)
    orthographicCamera.lookAt(0, 0, 0)

    // 当前相机（默认透视）
    let camera = perspectiveCamera
    let usePerspective = true

    // ─── 渲染器 ───
    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setPixelRatio(window.devicePixelRatio)
    document.body.appendChild(renderer.domElement)

    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true
    controls.dampingFactor = 0.05

    // ─── 场景内容 ───
    // 同心球环（便于观察距离感）
    for (let i = 0; i < 5; i++) {
      const r = 1.0 + i * 0.5
      const sphereGeo = new THREE.SphereGeometry(r, 32, 32)
      const wireGeo = new THREE.WireframeGeometry(sphereGeo)
      const lineMat = new THREE.LineBasicMaterial({ color: 0x4488ff })
      const wireframe = new THREE.LineSegments(wireGeo, lineMat)
      scene.add(wireframe)
    }

    // 中心球体
    const centerGeo = new THREE.SphereGeometry(0.5, 32, 32)
    const centerMat = new THREE.MeshStandardMaterial({
      color: 0xff6644,
      metalness: 0.5,
      roughness: 0.3,
    })
    const centerSphere = new THREE.Mesh(centerGeo, centerMat)
    scene.add(centerSphere)

    // XZ 平面网格
    const gridHelper = new THREE.GridHelper(10, 10, 0x444466, 0x222244)
    scene.add(gridHelper)

    // 坐标轴
    const axesHelper = new THREE.AxesHelper(2)
    scene.add(axesHelper)

    // ─── 相机切换函数 ───
    function switchCamera() {
      if (usePerspective) {
        // 切换到正交相机，保持位置同步
        const aspectNow = window.innerWidth / window.innerHeight
        camera = orthographicCamera
        camera.left = -frustumSize * aspectNow / 2
        camera.right = frustumSize * aspectNow / 2
        camera.top = frustumSize / 2
        camera.bottom = -frustumSize / 2
        camera.near = 0.1
        camera.far = 100
        camera.position.copy(perspectiveCamera.position)
        camera.quaternion.copy(perspectiveCamera.quaternion)
        camera.updateProjectionMatrix()
        usePerspective = false
      } else {
        camera = perspectiveCamera
        camera.position.copy(orthographicCamera.position)
        camera.quaternion.copy(orthographicCamera.quaternion)
        usePerspective = true
      }
      controls.object = camera
      controls.update()
    }

    // 键盘监听 1/2 切换相机
    window.addEventListener('keydown', (e) => {
      if (e.key === '1') {
        if (!usePerspective) switchCamera()
      } else if (e.key === '2') {
        if (usePerspective) switchCamera()
      }
    })

    // ─── 窗口响应 ───
    window.addEventListener('resize', () => {
      const aspectNow = window.innerWidth / window.innerHeight
      perspectiveCamera.aspect = aspectNow
      perspectiveCamera.updateProjectionMatrix()

      orthographicCamera.left = -frustumSize * aspectNow / 2
      orthographicCamera.right = frustumSize * aspectNow / 2
      orthographicCamera.updateProjectionMatrix()

      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    // ─── 动画循环 ───
    function animate() {
      requestAnimationFrame(animate)

      centerSphere.rotation.y += 0.01
      centerSphere.rotation.x += 0.005

      controls.update()
      renderer.render(scene, camera)
    }

    animate()
  </script>
</body>
</html>
