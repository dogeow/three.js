<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js 粒子系统示例</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

    // ─── 场景、相机、渲染器 ───
    const scene = new THREE.Scene()
    // 黑色太空背景
    scene.background = new THREE.Color(0x020210)

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000)
    camera.position.set(0, 2, 8)
    camera.lookAt(0, 0, 0)

    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setPixelRatio(window.devicePixelRatio)
    document.body.appendChild(renderer.domElement)

    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true
    controls.dampingFactor = 0.05

    // ─── 创建星空粒子系统 ───
    // 粒子数量
    const particleCount = 5000

    // BufferGeometry：用数组存储每个粒子的属性
    const particlesGeo = new THREE.BufferGeometry()

    // positions：存储每个粒子的 x, y, z 位置
    const positions = new Float32Array(particleCount * 3)
    // colors：存储每个粒子的 RGB 颜色
    const colors = new Float32Array(particleCount * 3)
    // sizes：存储每个粒子的大小
    const sizes = new Float32Array(particleCount)

    for (let i = 0; i < particleCount; i++) {
      const i3 = i * 3

      // 随机位置（散布在一个球形空间内）
      const radius = 10 + Math.random() * 20  // 半径 10~30 的球壳
      const theta = Math.random() * Math.PI * 2
      const phi = Math.acos(2 * Math.random() - 1)

      positions[i3]     = radius * Math.sin(phi) * Math.cos(theta)
      positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta)
      positions[i3 + 2] = radius * Math.cos(phi)

      // 随机颜色（蓝白色调）
      const colorVal = 0.5 + Math.random() * 0.5
      const blueMix = Math.random()
      colors[i3]     = colorVal * (1 - blueMix * 0.5)       // R
      colors[i3 + 1] = colorVal * (1 - blueMix * 0.3)       // G
      colors[i3 + 2] = colorVal * (0.8 + blueMix * 0.2)     // B

      // 随机大小
      sizes[i] = 0.5 + Math.random() * 1.5
    }

    // 将数组赋值给 Geometry 的 attribute
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3))
    particlesGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3))
    particlesGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1))

    // PointsMaterial：专为粒子设计的材质
    const particlesMat = new THREE.PointsMaterial({
      size: 0.05,              // 粒子大小
      vertexColors: true,       // 使用顶点颜色
      transparent: true,
      opacity: 0.8,
      sizeAttenuation: true,    // 近大远小效果
      blending: THREE.AdditiveBlending, // 加法混合，产生发光效果
      depthWrite: false,
    })

    const particleSystem = new THREE.Points(particlesGeo, particlesMat)
    scene.add(particleSystem)

    // ─── 中央发光球体 ───
    const coreGeo = new THREE.SphereGeometry(0.3, 32, 32)
    const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffff })
    const core = new THREE.Mesh(coreGeo, coreMat)
    scene.add(core)

    // ─── 窗口响应 ───
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    // ─── 动画循环 ───
    const originalPositions = particlesGeo.attributes.position.array.slice()

    function animate() {
      requestAnimationFrame(animate)

      const time = performance.now() * 0.0003 // 时间缩放系数

      // 让整个粒子云缓慢自转
      particleSystem.rotation.y += 0.0005
      particleSystem.rotation.x += 0.0002

      // 让每个粒子做微小的随机运动（闪烁效果）
      const posAttr = particlesGeo.attributes.position
      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3
        const ox = originalPositions[i3]
        const oy = originalPositions[i3 + 1]
        const oz = originalPositions[i3 + 2]

        // 基于初始位置叠加微小的正弦扰动
        posAttr.array[i3]     = ox + Math.sin(time + i * 0.1) * 0.05
        posAttr.array[i3 + 1] = oy + Math.cos(time * 1.3 + i * 0.1) * 0.05
        posAttr.array[i3 + 2] = oz + Math.sin(time * 0.7 + i * 0.1) * 0.05
      }
      posAttr.needsUpdate = true

      // 中央球体脉动
      const pulse = 1.0 + Math.sin(time * 5) * 0.3
      core.scale.set(pulse, pulse, pulse)

      controls.update()
      renderer.render(scene, camera)
    }

    animate()
  </script>
</body>
</html>
