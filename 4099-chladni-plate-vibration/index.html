<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>CHLADNI PLATE VIBRATION</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#080808;font-family:'Segoe UI',sans-serif}
canvas{display:block}
#ui{position:fixed;top:16px;left:16px;z-index:10;color:#fff;font-size:12px}
#ui h2{font-size:13px;opacity:.5;margin-bottom:8px}
#params span{display:block;color:#ffaa44;margin-bottom:2px}
#info{position:fixed;bottom:16;left:16px;color:rgba(255,255,255,.35);font-size:11px}
</style>
</head>
<body>
<div id="ui"><h2>Chladni Plate Vibration</h2>
<div id="params"><span id="mode">Mode (m,n): 2, 3</span><span id="freq">Freq: 440 Hz</span></div>
</div>
<div id="info">Keys 1-9: cycle modes</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x080808);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,200);
camera.position.set(0,0,30);camera.lookAt(0,0,0);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
scene.add(new THREE.AmbientLight(0x334466,0.5));
const pt=new THREE.PointLight(0xffaa44,2,50);pt.position.set(0,10,15);scene.add(pt);
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.8,0.5,0.2));

const SEGS=80;
const plateGeo=new THREE.PlaneGeometry(20,20,SEGS,SEGS);
const plateMat=new THREE.MeshStandardMaterial({color:0x1a1a2e,metalness:0.3,roughness:0.4,side:THREE.DoubleSide});
const plate=new THREE.Mesh(plateGeo,plateMat);scene.add(plate);
const wirePlate=new THREE.LineSegments(new THREE.WireframeGeometry(plateGeo),new THREE.LineBasicMaterial({color:0x00aaff,transparent:true,opacity:0.15}));scene.add(wirePlate);

let m=2,n=3;
const BASE_FREQ=220;
function disp(x,y,t){return Math.sin(m*Math.PI*x)*Math.sin(n*Math.PI*y)*Math.cos(t*BASE_FREQ*Math.sqrt(m*m+n*n)*0.05);}

function update(t){
  const pos=plateGeo.attributes.position.array;
  for(let j=0;j<=SEGS;j++)for(let i=0;i<=SEGS;i++){
    const idx=j*(SEGS+1)+i;
    const bx=pos[idx*3],by=pos[idx*3+1];
    pos[idx*3+2]=disp(bx/10,by/10,t)*2.5;
  }
  plateGeo.attributes.position.needsUpdate=true;
  plateGeo.computeVertexNormals();
  wirePlate.geometry=new THREE.WireframeGeometry(plateGeo);
}

const modeKeys={d:1,a:2,w:3,s:4,e:5,q:6,r:7,f:8};
window.addEventListener('keydown',e=>{
  const map={'1':[1,1],'2':[2,1],'3':[3,1],'4':[1,2],'5':[2,2],'6':[3,2],'7':[2,3],'8':[3,3],'9':[4,3]};
  if(map[e.key]){[m,n]=map[e.key];document.getElementById('mode').textContent='Mode: ('+m+','+n+')';document.getElementById('freq').textContent='Freq: '+(BASE_FREQ*Math.sqrt(m*m+n*n))+' Hz';}
});

function animate(t){
  requestAnimationFrame(animate);
  update(t*0.001);
  controls.update();composer.render();
}
animate(0);
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});
</script>
</body></html>
