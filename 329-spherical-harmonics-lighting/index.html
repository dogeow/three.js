<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>球谐光照（SH Lighting）全局光照近似</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    #tip {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.75);
      color: #eee;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 700px;
    }
    #tip b { color: #7af; }
  </style>
</head>
<body>
<div id="tip">
  <b>球谐光照（Spherical Harmonics）技术说明：</b><br>
  球谐函数是一组定义在球面上的正交基函数。SH 光照将复杂的环境光预先投影到 9 个 L0-L2 系数中，
  通过 PMREMGenerator 生成预过滤环境贴图，实现<b>实时的全局光照近似</b>。
  相比传统动态光照，SH 大幅降低计算开销，广泛应用于游戏和交互式渲染中。
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import GUI from 'three/addons/libs/lil-gui.module.min.js';

// --- 渲染器设置 ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// --- 场景与相机 ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 6);

// --- 轨道控制器 ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);

// ============================================================
// 步骤1：使用 RoomEnvironment 创建典型的室内环境光照
// ============================================================
const pmremGenerator = new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();

// 使用 Three.js 内置 RoomEnvironment 创建室内场景环境
const roomEnv = new RoomEnvironment(renderer);
const envTexture = pmremGenerator.fromScene(roomEnv, 0.04).texture;

// 将环境贴图应用到场景背景
scene.environment = envTexture;
scene.background = envTexture;
roomEnv.dispose();

// ============================================================
// 步骤2：创建球谐光照系数（模拟预计算全局光照）
// ============================================================
// SphericalHarmonics3 包含 9 个系数（L0=1个, L1=3个, L2=5个）
// 这里模拟一个来自上方的主光源和补充环境光
const shLight = new THREE.SphericalHarmonics3();

// L0 (dc, 直流项) - 基础环境光亮度
shLight.set(0, new THREE.Vector3(0.35, 0.35, 0.4));

// L1 (linear) - 模拟来自上方的主光源
shLight.set(1, new THREE.Vector3(0.8, 0.7, 0.5));
shLight.set(2, new THREE.Vector3(0.2, 0.25, 0.3));
shLight.set(3, new THREE.Vector3(0.1, 0.15, 0.2));

// L2 (quadratic) - 增加细节反射
shLight.set(4, new THREE.Vector3(-0.1, -0.05, 0.0));
shLight.set(5, new THREE.Vector3(0.3, 0.25, 0.15));
shLight.set(6, new THREE.Vector3(0.1, 0.1, 0.05));
shLight.set(7, new THREE.Vector3(0.05, 0.05, 0.05));
shLight.set(8, new THREE.Vector3(0.0, 0.0, 0.0));

// 将 SH 系数转换为环境贴图供材质使用
const shEnvTexture = pmremGenerator.fromSphericalHarmonics(shLight, false, THREE.EquirectangularReflectionMapping);
scene.environment = shEnvTexture.texture;

// ============================================================
// 步骤3：创建场景物体展示 SH 光照效果
// ============================================================

// 地板 - 带有反射的材质
const floorGeo = new THREE.PlaneGeometry(10, 10);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0xaaaaaa,
  roughness: 0.1,
  metalness: 0.3,
  envMapIntensity: 1.5
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
scene.add(floor);

// 中央立方体 - 金属材质突出反射
const cubeGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
const cubeMat = new THREE.MeshStandardMaterial({
  color: 0xff4444,
  roughness: 0.15,
  metalness: 0.9,
  envMapIntensity: 2.0
});
const cube = new THREE.Mesh(cubeGeo, cubeMat);
cube.position.set(0, 1.1, 0);
scene.add(cube);

// 左侧球体 - 漫反射材质展示环境色
const sphereGeo = new THREE.SphereGeometry(0.7, 64, 64);
const sphereMat = new THREE.MeshStandardMaterial({
  color: 0x4488ff,
  roughness: 0.3,
  metalness: 0.1,
  envMapIntensity: 1.2
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
sphere.position.set(-2.2, 1.0, 0.5);
scene.add(sphere);

// 右侧圆环 - 展示复杂反射
const torusGeo = new THREE.TorusKnotGeometry(0.5, 0.15, 128, 32);
const torusMat = new THREE.MeshStandardMaterial({
  color: 0x44ff88,
  roughness: 0.2,
  metalness: 0.8,
  envMapIntensity: 1.8
});
const torus = new THREE.Mesh(torusGeo, torusMat);
torus.position.set(2.2, 1.0, -0.5);
scene.add(torus);

// 后方圆柱体
const cylGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.6, 64);
const cylMat = new THREE.MeshStandardMaterial({
  color: 0xffaa44,
  roughness: 0.25,
  metalness: 0.5,
  envMapIntensity: 1.5
});
const cylinder = new THREE.Mesh(cylGeo, cylMat);
cylinder.position.set(0, 1.0, -2.5);
scene.add(cylinder);

// 小型装饰球体
const miniSphereGeo = new THREE.SphereGeometry(0.3, 32, 32);
for (let i = 0; i < 5; i++) {
  const angle = (i / 5) * Math.PI * 2;
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(i * 0.15 + 0.5, 0.7, 0.5),
    roughness: 0.2,
    metalness: 0.6,
    envMapIntensity: 1.4
  });
  const mini = new THREE.Mesh(miniSphereGeo, mat);
  mini.position.set(Math.cos(angle) * 3.5, 0.5, Math.sin(angle) * 2 - 1);
  scene.add(mini);
}

// ============================================================
// 步骤4：添加辅助灯光（补充直接光照）
// ============================================================
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
directionalLight.position.set(5, 8, 3);
directionalLight.castShadow = true;
scene.add(directionalLight);

const pointLight = new THREE.PointLight(0x4080ff, 0.6, 15);
pointLight.position.set(-4, 3, 2);
scene.add(pointLight);

// ============================================================
// 步骤5：GUI 控制
// ============================================================
const params = {
  envIntensity: 1.0,
  ambientColor: '#334455',
  toneExposure: 1.0,
  roughness: 0.2,
  metalness: 0.5
};

const gui = new GUI({ title: 'SH 光照控制' });
gui.add(params, 'envIntensity', 0, 3, 0.01).name('环境光强度').onChange(v => {
  scene.environmentIntensity = v;
});
gui.addColor(params, 'ambientColor').name('环境颜色').onChange(v => {
  ambientLight.color.set(v);
});
gui.add(params, 'toneExposure', 0.2, 3, 0.01).name('色调曝光').onChange(v => {
  renderer.toneMappingExposure = v;
});
gui.add(params, 'roughness', 0, 1, 0.01).name('粗糙度').onChange(v => {
  [cubeMat, sphereMat, torusMat, cylMat].forEach(m => m.roughness = v);
});
gui.add(params, 'metalness', 0, 1, 0.01).name('金属度').onChange(v => {
  [cubeMat, sphereMat, torusMat, cylMat].forEach(m => m.metalness = v);
});

// ============================================================
// 动画循环
// ============================================================
function animate() {
  requestAnimationFrame(animate);

  // 立方体缓慢旋转
  cube.rotation.y += 0.005;
  cube.rotation.x += 0.003;

  // 甜甜圈反向旋转
  torus.rotation.y -= 0.008;
  torus.rotation.z += 0.004;

  // 圆柱体轻微摆动
  cylinder.rotation.y = Math.sin(Date.now() * 0.001) * 0.15;

  controls.update();
  renderer.render(scene, camera);
}

// ============================================================
// 响应窗口大小变化
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
