<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雪花生成器 - Koch 分形雪花 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050a18; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    #tip {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(100, 160, 255, 0.12);
      border: 1px solid rgba(100, 180, 255, 0.3);
      color: #a0c8ff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      text-align: center;
      pointer-events: none;
      backdrop-filter: blur(6px);
    }
    #tip b { color: #60c0ff; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="tip">
    💡 <b>Koch 雪花原理：</b>递归细分三角形每条边，向外凸出等边三角形，形成自相似分形结构 ·
    <b>点击画面</b>随机重新生成
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    // ─── 场景初始化 ───────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050a18);
    scene.fog = new THREE.FogExp2(0x050a18, 0.04);

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 0, 8);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.autoRotate = false;

    // ─── 光照 ─────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x223355, 1.5));
    const dirLight = new THREE.DirectionalLight(0xaaccff, 3);
    dirLight.position.set(5, 8, 6);
    scene.add(dirLight);
    const pointLight = new THREE.PointLight(0x4488ff, 4, 30);
    pointLight.position.set(-4, 3, 4);
    scene.add(pointLight);

    // ─── GUI 参数 ─────────────────────────────────────────────
    const params = {
      recursionDepth: 3,   // Koch 递归深度
      scale: 1.0,          // 整体缩放
      emissiveIntensity: 0.6, // 自发光强度
      autoRotate: true,
    };

    // ─── 随机种子工具 ─────────────────────────────────────────
    let seed = Math.random() * 9999 | 0;
    function seededRand(s) {
      // 简单线性同余随机数
      s = (s * 1664525 + 1013904223) & 0xffffffff;
      return (s >>> 0) / 0xffffffff;
    }

    // ─── Koch 雪花核心算法 ────────────────────────────────────
    /**
     * 对一条边 (a→b) 执行 Koch 细分：
     * 在边的 1/3 处插入两个点，向外突出一个等边三角形顶点
     * 返回细分后的折线点数组 [a, p1, peak, p2, b]
     */
    function kochEdge(a, b, depth, outward) {
      if (depth === 0) return [a.clone(), b.clone()];

      const d = b.clone().sub(a);
      const p1 = a.clone().add(d.clone().multiplyScalar(1 / 3));
      const p2 = a.clone().add(d.clone().multiplyScalar(2 / 3));

      // 外凸三角形顶点：边中点 + 垂直方向偏移
      const mid = a.clone().add(d.clone().multiplyScalar(0.5));
      const len = d.length() / 3;
      const perp = outward.clone().multiplyScalar(len * Math.sqrt(3) / 2);
      const peak = mid.clone().add(perp);

      const seg0 = kochEdge(a, p1, depth - 1, outward);
      const seg1 = kochEdge(p1, peak, depth - 1, outward);
      const seg2 = kochEdge(peak, p2, depth - 1, outward);
      const seg3 = kochEdge(p2, b, depth - 1, outward);

      // 拼接（去掉每段末尾重复点）
      return [...seg0.slice(0, -1), ...seg1.slice(0, -1), ...seg2.slice(0, -1), ...seg3];
    }

    /**
     * 生成 Koch 雪花轮廓点（等边三角形三条边各自细分）
     * depth: 递归深度 | r: 外接圆半径 | seedVal: 随机种子影响 z 扰动
     */
    function kochSnowflakePoints(depth, r, seedVal) {
      const v0 = new THREE.Vector3(0, r, 0);
      const v1 = new THREE.Vector3(-r * Math.sin(Math.PI * 2 / 3), -r * 0.5, 0);
      const v2 = new THREE.Vector3( r * Math.sin(Math.PI * 2 / 3), -r * 0.5, 0);

      // 各边外法线（向外指）
      const n0 = new THREE.Vector3(-Math.sin(Math.PI * 2 / 3), 0.5, 0).normalize();
      const n1 = new THREE.Vector3( Math.sin(Math.PI * 2 / 3), 0.5, 0).normalize();
      const n2 = new THREE.Vector3(0, -1, 0).normalize();

      const e0 = kochEdge(v0, v1, depth, n0);
      const e1 = kochEdge(v1, v2, depth, n1);
      const e2 = kochEdge(v2, v0, depth, n2);

      const pts = [...e0.slice(0, -1), ...e1.slice(0, -1), ...e2.slice(0, -1)];

      // 根据种子添加轻微 Z 轴扰动，制造 3D 立体感
      let s = seedVal;
      pts.forEach((p, i) => {
        s = (s * 1664525 + 1013904223) & 0xffffffff;
        const t = (s >>> 0) / 0xffffffff;
        p.z = (t - 0.5) * 0.18 * (depth + 1);
      });

      return pts;
    }

    /**
     * 将轮廓点构建为 3D 几何体（拉伸薄片 + 侧面）
     */
    function buildSnowflakeGeometry(depth, scale, seedVal) {
      const pts = kochSnowflakePoints(depth, scale, seedVal);
      const n = pts.length;

      // 使用 ShapeGeometry 先做平面三角化
      const shape = new THREE.Shape(pts.map(p => new THREE.Vector2(p.x, p.y)));
      const shapeGeo = new THREE.ShapeGeometry(shape, 2);

      // 正面顶点（带 z 扰动）
      const pos = shapeGeo.attributes.position;
      const zMap = {};
      pts.forEach(p => { zMap[`${p.x.toFixed(4)},${p.y.toFixed(4)}`] = p.z; });

      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i), y = pos.getY(i);
        const key = `${x.toFixed(4)},${y.toFixed(4)}`;
        const zVal = zMap[key] ?? 0;
        pos.setZ(i, zVal);
      }

      shapeGeo.computeVertexNormals();
      return shapeGeo;
    }

    // ─── 雪花网格管理 ─────────────────────────────────────────
    let snowflakeGroup = new THREE.Group();
    scene.add(snowflakeGroup);

    const mat = new THREE.MeshStandardMaterial({
      color: 0xd8eeff,
      emissive: 0x3388cc,
      emissiveIntensity: params.emissiveIntensity,
      metalness: 0.1,
      roughness: 0.3,
      side: THREE.DoubleSide,
    });

    function buildSnowflake() {
      // 清除旧网格
      snowflakeGroup.clear();

      const geo = buildSnowflakeGeometry(params.recursionDepth, params.scale * 2.2, seed);

      // 主雪花正面
      const mesh = new THREE.Mesh(geo, mat);
      snowflakeGroup.add(mesh);

      // 添加线框叠加，增强分形结构可视化
      const wireMat = new THREE.MeshBasicMaterial({
        color: 0x88ccff,
        wireframe: true,
        transparent: true,
        opacity: 0.12,
      });
      const wireMesh = new THREE.Mesh(geo, wireMat);
      snowflakeGroup.add(wireMesh);

      // 镜像背面
      const backMesh = mesh.clone();
      backMesh.scale.z = -1;
      snowflakeGroup.add(backMesh);

      // 粒子光点装饰
      const spriteCount = 60 + params.recursionDepth * 20;
      const spriteGeo = new THREE.BufferGeometry();
      const spritePos = new Float32Array(spriteCount * 3);
      let sv = seed;
      for (let i = 0; i < spriteCount; i++) {
        sv = (sv * 1664525 + 1013904223) & 0xffffffff;
        const r = ((sv >>> 0) / 0xffffffff) * params.scale * 2.5;
        sv = (sv * 1664525 + 1013904223) & 0xffffffff;
        const a = ((sv >>> 0) / 0xffffffff) * Math.PI * 2;
        sv = (sv * 1664525 + 1013904223) & 0xffffffff;
        const z = (((sv >>> 0) / 0xffffffff) - 0.5) * 0.5;
        spritePos[i * 3]     = Math.cos(a) * r;
        spritePos[i * 3 + 1] = Math.sin(a) * r;
        spritePos[i * 3 + 2] = z;
      }
      spriteGeo.setAttribute('position', new THREE.BufferAttribute(spritePos, 3));
      const spriteMat = new THREE.PointsMaterial({ color: 0xaaddff, size: 0.04, transparent: true, opacity: 0.7 });
      snowflakeGroup.add(new THREE.Points(spriteGeo, spriteMat));
    }

    buildSnowflake();

    // ─── GUI ──────────────────────────────────────────────────
    const gui = new GUI({ title: '❄ 雪花参数' });
    gui.add(params, 'recursionDepth', 0, 5, 1).name('递归深度').onChange(buildSnowflake);
    gui.add(params, 'scale', 0.3, 2.0, 0.05).name('缩放').onChange(buildSnowflake);
    gui.add(params, 'emissiveIntensity', 0, 2, 0.05).name('自发光强度').onChange(v => {
      mat.emissiveIntensity = v;
    });
    gui.add(params, 'autoRotate').name('自动旋转');

    // ─── 点击重新生成 ─────────────────────────────────────────
    renderer.domElement.addEventListener('click', () => {
      seed = Math.random() * 99999 | 0;
      buildSnowflake();
    });

    // ─── 响应窗口大小 ─────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ─── 动画循环 ─────────────────────────────────────────────
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // 雪花缓慢自转
      if (params.autoRotate) {
        snowflakeGroup.rotation.z = t * 0.15;
        snowflakeGroup.rotation.x = Math.sin(t * 0.1) * 0.2;
      }

      // 点光源轻微环绕，产生动态光效
      pointLight.position.x = Math.cos(t * 0.5) * 5;
      pointLight.position.y = Math.sin(t * 0.3) * 4;

      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
