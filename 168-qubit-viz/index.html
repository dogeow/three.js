<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>168 - Bloch Sphere Qubit Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  .tip {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.3);
    color: #00ff88; padding: 8px 20px; border-radius: 4px; font-size: 13px;
    pointer-events: none; z-index: 10; text-align: center; max-width: 90%;
  }
  #hud {
    position: absolute; bottom: 16px; left: 16px;
    color: #00ff88; font-size: 12px; line-height: 1.7;
    background: rgba(0,0,0,0.6); padding: 10px 14px; border-radius: 4px;
    border: 1px solid rgba(0,255,136,0.2); z-index: 10;
  }
  #hud span { color: #fff; }
</style>
</head>
<body>
<div class="tip">Bloch 球可视化——量子比特状态几何表示，|ψ⟩ = cos(θ/2)|0⟩ + e<sup>iφ</sup>sin(θ/2)|1⟩</div>
<div id="hud">
  <div>|0⟩ probability: <span id="p0">100.0</span>%</div>
  <div>|1⟩ probability: <span id="p1">0.0</span>%</div>
  <div>γ (Lorentz factor): <span id="gamma">1.000</span></div>
  <div>X gate: <span id="gx">0</span></div>
  <div>Y gate: <span id="gy">0</span></div>
  <div>Z gate: <span id="gz">0</span></div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(4, 3, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000510);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Quantum state
let theta = 0.0; // polar angle
let phi = 0.0;    // azimuthal angle
let gx = 0, gy = 0, gz = 0;

// Bloch sphere wireframe
const sphereGeo = new THREE.SphereGeometry(1, 16, 12);
const sphereEdges = new THREE.EdgesGeometry(sphereGeo);
const sphereLine = new THREE.LineSegments(
  sphereEdges,
  new THREE.LineBasicMaterial({ color: 0x00ff88, opacity: 0.15, transparent: true })
);
scene.add(sphereLine);

// Latitude circles
for (let i = 1; i < 8; i++) {
  const lat = new THREE.LatitudeCircle(i / 8);
  scene.add(lat);
}
// Longitude circles
for (let i = 0; i < 12; i++) {
  const lon = new THREE.LongitudeCircle(i / 12);
  scene.add(lon);
}

// |0⟩ and |1⟩ markers
const markerGeo = new THREE.SphereGeometry(0.06, 12, 8);
const m0 = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({ color: 0x00aaff }));
const m1 = new THREE.Mesh(markerGeo, new THREE.MeshBasicMaterial({ color: 0xff4400 }));
m0.position.set(0, 1, 0);
m1.position.set(0, -1, 0);
scene.add(m0);
scene.add(m1);

// |0⟩ / |1⟩ labels using sprites
function makeLabel(text, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = 'bold 48px Courier New';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 32, 32);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0.3, 0.3, 1);
  return sprite;
}
const lbl0 = makeLabel('|0⟩', '#00aaff'); lbl0.position.set(0.25, 1.2, 0); scene.add(lbl0);
const lbl1 = makeLabel('|1⟩', '#ff4400'); lbl1.position.set(0.25, -1.2, 0); scene.add(lbl1);

// State vector arrow
const arrow = new THREE.ArrowHelper(
  new THREE.Vector3(0, 1, 0),
  new THREE.Vector3(0, 0, 0),
  1,
  0xffff00,
  0.2, 0.1
);
scene.add(arrow);

// XYZ axis labels
function axisLabel(text, color, pos) {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = 'bold 40px Courier New';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 32, 32);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: new THREE.CanvasTexture(canvas), transparent: true
  }));
  sprite.position.copy(pos);
  sprite.scale.set(0.25, 0.25, 1);
  return sprite;
}
scene.add(axisLabel('X', '#ff6600', new THREE.Vector3(1.3, 0, 0)));
scene.add(axisLabel('Y', '#00ff66', new THREE.Vector3(0, 1.3, 0)));
scene.add(axisLabel('Z', '#6688ff', new THREE.Vector3(0, 0, 1.3)));

// Grid plane at equator
const gridHelper = new THREE.GridHelper(2, 10, 0x003322, 0x001111);
scene.add(gridHelper);

// Equator ring
const eqRingGeo = new THREE.TorusGeometry(1, 0.005, 8, 64);
const eqRing = new THREE.Mesh(eqRingGeo, new THREE.MeshBasicMaterial({ color: 0x00ff88, opacity: 0.3, transparent: true }));
eqRing.rotation.x = Math.PI / 2;
scene.add(eqRing);

// Helper classes
function LatitudeCircle(r) {
  const pts = [];
  for (let i = 0; i <= 64; i++) {
    const phi2 = (i / 64) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(phi2) * Math.sin(Math.acos(r * 2 - 1)), r * 2 - 1, Math.sin(phi2) * Math.sin(Math.acos(r * 2 - 1))));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x00ff88, opacity: 0.1, transparent: true }));
}

function LongitudeCircle(frac) {
  const phi2 = frac * Math.PI * 2;
  const pts = [];
  for (let i = 0; i <= 64; i++) {
    const theta2 = (i / 64) * Math.PI;
    pts.push(new THREE.Vector3(Math.cos(phi2) * Math.sin(theta2), Math.cos(theta2), Math.sin(phi2) * Math.sin(theta2)));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x00ff88, opacity: 0.1, transparent: true }));
}

// GUI
const params = {
  theta: 0,
  phi: 0,
  applyX: () => { gx++; phi = Math.PI - phi; updateArrow(); },
  applyY: () => { gy++; theta = Math.PI - theta; updateArrow(); },
  applyZ: () => { gz++; phi += Math.PI; updateArrow(); },
  reset: () => { theta = 0; phi = 0; gx = gy = gz = 0; updateArrow(); },
  animate: true,
  speed: 1.0,
};

const gui = new GUI();
gui.add(params, 'theta', 0, Math.PI, 0.01).name('θ (polar)').onChange(v => { theta = v; updateArrow(); });
gui.add(params, 'phi', 0, Math.PI * 2, 0.01).name('φ (azimuthal)').onChange(v => { phi = v; updateArrow(); });
gui.add(params, 'applyX').name('✗ Apply X gate');
gui.add(params, 'applyY').name('✗ Apply Y gate');
gui.add(params, 'applyZ').name('✗ Apply Z gate');
gui.add(params, 'reset').name('Reset |ψ⟩');
gui.add(params, 'animate').name('Auto-rotate');
gui.add(params, 'speed', 0.1, 3.0).name('Anim speed');

function updateArrow() {
  const n = new THREE.Vector3(
    Math.sin(theta) * Math.cos(phi),
    Math.cos(theta),
    Math.sin(theta) * Math.sin(phi)
  ).normalize();
  arrow.setDirection(n);

  const p0 = Math.cos(theta / 2) ** 2;
  const p1 = Math.sin(theta / 2) ** 2;
  document.getElementById('p0').textContent = (p0 * 100).toFixed(1);
  document.getElementById('p1').textContent = (p1 * 100).toFixed(1);
  document.getElementById('gx').textContent = gx;
  document.getElementById('gy').textContent = gy;
  document.getElementById('gz').textContent = gz;
}
updateArrow();

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  if (params.animate) {
    t += 0.005 * params.speed;
    theta = Math.PI * 0.5 + Math.sin(t * 0.7) * Math.PI * 0.45;
    phi = t * 1.3;
    gui.controllers.forEach(c => { if (c.property === 'theta') c.setValue(theta); if (c.property === 'phi') c.setValue(phi); });
    updateArrow();
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
