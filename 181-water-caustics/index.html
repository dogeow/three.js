<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>181 — Water Caustics</title>
  <!--
    Title:       Water Caustics
    Description: Real-time pool caustics with animated GLSL noise, geometry casting
                 caustic shadows, and interactive lil-gui controls.
    Technical:
      - three.js 0.160.0 via importmap / unpkg CDN (no build tools)
      - Custom GLSL fragment shader using animated value-noise for caustic flicker
      - Plane geometry for pool floor receiving projected caustic light
      - Simple box/sphere geometry casting shadows above the water surface
      - lil-gui for intensity, speed, and color control
    How to run:
      Serve this file with any static server, e.g.:
        npx serve .
        python3 -m http.server 8000
      Then open http://localhost:8000/181-water-caustics/index.html
  -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { GUI }             from 'three/addons/libs/lil-gui.module.min.js';

// ─────────────────────────────────────────────────────────────────────────────
// Renderer & Scene
// ─────────────────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x001018);
scene.fog = new THREE.FogExp2(0x001018, 0.04);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 9, 14);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.06;
controls.minDistance    = 3;
controls.maxDistance    = 30;

// ─────────────────────────────────────────────────────────────────────────────
// Lighting
// ─────────────────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x112233, 0.4);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
sunLight.position.set(6, 12, 8);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near   = 0.5;
sunLight.shadow.camera.far    = 60;
sunLight.shadow.camera.left   = -15;
sunLight.shadow.camera.right  = 15;
sunLight.shadow.camera.top    = 15;
sunLight.shadow.camera.bottom = -15;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

// Subtle fill from below (simulates light refraction through water)
const fillLight = new THREE.PointLight(0x4488ff, 0.6, 20);
fillLight.position.set(0, -2, 0);
scene.add(fillLight);

// ─────────────────────────────────────────────────────────────────────────────
// Caustic Shader
// ─────────────────────────────────────────────────────────────────────────────
const causticVertexShader = /* glsl */ `
  varying vec2  vUv;
  varying vec3  vWorldPos;

  void main() {
    vUv = uv;
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vWorldPos = wp.xyz;
    gl_Position = projectionMatrix * viewMatrix * wp;
  }
`;

const causticFragmentShader = /* glsl */ `
  precision highp float;

  uniform float uTime;
  uniform float uIntensity;
  uniform float uSpeed;
  uniform vec3  uColor;

  varying vec2 vUv;
  varying vec3 vWorldPos;

  // ── Value noise helpers ─────────────────────────────────────────────────────
  float hash(vec2 p) {
    p = fract(p * vec2(127.1, 311.7));
    p += dot(p, p + 74.27);
    return fract(p.x * p.y);
  }

  float valueNoise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f); // smoothstep

    float a = hash(i);
    float b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0));
    float d = hash(i + vec2(1.0, 1.0));

    return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
  }

  // ── Fractal Brownian Motion ──────────────────────────────────────────────────
  float fbm(vec2 p) {
    float v   = 0.0;
    float amp = 0.5;
    mat2  rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));
    for (int i = 0; i < 6; i++) {
      v   += amp * valueNoise(p);
      p    = rot * p * 2.03;
      amp *= 0.5;
    }
    return v;
  }

  // ── Caustic intensity ────────────────────────────────────────────────────────
  // Uses two overlapping noisy fields; where both are high we get bright rings.
  float causticPattern(vec2 p, float t) {
    float t1 = t * uSpeed * 0.7;
    float t2 = t * uSpeed * 0.5;

    float n1 = fbm(p * 2.8 + vec2(t1 * 0.4, t1 * 0.3));
    float n2 = fbm(p * 3.5 - vec2(t2 * 0.3, t2 * 0.6) + 1.7);

    // Interference: thin bright lines where difference is small
    float diff = abs(n1 - n2);
    float c    = 1.0 - smoothstep(0.0, 0.18, diff);
    c = pow(c, 1.4);

    // High-frequency sparkle overlay
    float spark = fbm(p * 9.0 + t * uSpeed * 2.0) * 0.25;

    return clamp(c + spark, 0.0, 1.0);
  }

  void main() {
    // Remap UV to world-space scale that covers the pool floor nicely
    vec2 p = vUv * 6.0;

    float c = causticPattern(p, uTime) * uIntensity;

    // Soft blue-white tint
    vec3 causticColor = uColor * c;

    // Pool floor base (ceramic blue-grey)
    vec3 floorBase = vec3(0.55, 0.72, 0.80);
    vec3 col = floorBase + causticColor;

    // Edge vignette to frame the pool
    float dist = length(vUv - 0.5) * 2.0;
    float vign = 1.0 - smoothstep(0.6, 1.2, dist);
    col *= mix(0.5, 1.0, vign);

    gl_FragColor = vec4(col, 1.0);
  }
`;

// ─────────────────────────────────────────────────────────────────────────────
// Pool Geometry
// ─────────────────────────────────────────────────────────────────────────────

// --- Pool Floor (receives caustics) ---
const FLOOR_SIZE = 14;
const floorGeo = new THREE.PlaneGeometry(FLOOR_SIZE, FLOOR_SIZE, 64, 64);
floorGeo.rotateX(-Math.PI / 2);

const causticUniforms = {
  uTime:      { value: 0 },
  uIntensity: { value: 1.2 },
  uSpeed:     { value: 1.0 },
  uColor:     { value: new THREE.Color(1.4, 1.6, 2.0) },
};

const floorMat = new THREE.ShaderMaterial({
  uniforms:       causticUniforms,
  vertexShader:   causticVertexShader,
  fragmentShader: causticFragmentShader,
});
const floorMesh = new THREE.Mesh(floorGeo, floorMat);
floorMesh.receiveShadow = true;
floorMesh.position.y = 0;
scene.add(floorMesh);

// --- Pool Walls ---
const wallMat = new THREE.MeshStandardMaterial({
  color: 0x8ab4c8,
  roughness: 0.35,
  metalness: 0.05,
});

function makeWall(w, h, rx, ry, x, y, z) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.25), wallMat);
  m.rotation.x = rx;
  m.rotation.y = ry;
  m.position.set(x, y, z);
  m.receiveShadow = true;
  m.castShadow    = true;
  scene.add(m);
}
makeWall(FLOOR_SIZE + 0.5, 3, 0, 0,  0,         1.5, -FLOOR_SIZE / 2 - 0.12); // back
makeWall(FLOOR_SIZE + 0.5, 3, 0, 0,  0,         1.5,  FLOOR_SIZE / 2 + 0.12); // front
makeWall(0.25,            3, 0, 0, -FLOOR_SIZE / 2 - 0.12, 1.5,  0);          // left
makeWall(0.25,            3, 0, 0,  FLOOR_SIZE / 2 + 0.12, 1.5,  0);          // right

// Pool floor rim
const rimGeo = new THREE.BoxGeometry(FLOOR_SIZE + 1.2, 0.18, FLOOR_SIZE + 1.2);
const rimMesh = new THREE.Mesh(rimGeo, wallMat);
rimMesh.position.y = -0.09;
rimMesh.receiveShadow = true;
scene.add(rimMesh);

// --- Water Surface ---
const waterGeo = new THREE.PlaneGeometry(FLOOR_SIZE, FLOOR_SIZE, 1, 1);
waterGeo.rotateX(-Math.PI / 2);
const waterMat = new THREE.MeshPhysicalMaterial({
  color:       0x1166aa,
  transparent: true,
  opacity:     0.55,
  roughness:   0.05,
  metalness:   0.1,
  transmission: 0.4,
  ior:         1.33,
  thickness:   0.5,
});
const waterMesh = new THREE.Mesh(waterGeo, waterMat);
waterMesh.position.y = 1.5;
scene.add(waterMesh);

// ─────────────────────────────────────────────────────────────────────────────
// Objects casting caustic shadows
// ─────────────────────────────────────────────────────────────────────────────
const boxMat = new THREE.MeshStandardMaterial({ color: 0xddaa66, roughness: 0.4, metalness: 0.1 });
const sphereMat = new THREE.MeshStandardMaterial({ color: 0xaa88dd, roughness: 0.3, metalness: 0.2 });

const objects = [];

// Large central sphere (partially submerged)
const sphereGeo = new THREE.SphereGeometry(1.2, 32, 32);
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
sphere.position.set(1.5, 1.0, -1.0);
sphere.castShadow    = true;
sphere.receiveShadow = true;
scene.add(sphere);
objects.push(sphere);

// Box 1
const box1 = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.8, 1.8), boxMat);
box1.position.set(-2.5, 0.9, 2.0);
box1.castShadow    = true;
box1.receiveShadow = true;
scene.add(box1);
objects.push(box1);

// Box 2 (taller, thin)
const box2 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2.8, 0.8), boxMat);
box2.position.set(-0.5, 1.4, -2.5);
box2.castShadow    = true;
box2.receiveShadow = true;
scene.add(box2);
objects.push(box2);

// Small sphere
const smallSphere = new THREE.Mesh(new THREE.SphereGeometry(0.6, 24, 24), sphereMat);
smallSphere.position.set(3.0, 0.6, 2.5);
smallSphere.castShadow    = true;
smallSphere.receiveShadow = true;
scene.add(smallSphere);
objects.push(smallSphere);

// ─────────────────────────────────────────────────────────────────────────────
// Particle sparkles on water surface
// ─────────────────────────────────────────────────────────────────────────────
const sparkleCount = 200;
const sparkleGeo   = new THREE.BufferGeometry();
const sparklePos   = new Float32Array(sparkleCount * 3);
for (let i = 0; i < sparkleCount; i++) {
  sparklePos[i * 3]     = (Math.random() - 0.5) * FLOOR_SIZE * 0.9;
  sparklePos[i * 3 + 1] = 1.52;
  sparklePos[i * 3 + 2] = (Math.random() - 0.5) * FLOOR_SIZE * 0.9;
}
sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePos, 3));
const sparkleMat = new THREE.PointsMaterial({
  color:       0xaaddff,
  size:        0.06,
  transparent: true,
  opacity:     0.7,
  depthWrite:  false,
});
const sparkles = new THREE.Points(sparkleGeo, sparkleMat);
scene.add(sparkles);

// ─────────────────────────────────────────────────────────────────────────────
// GUI
// ─────────────────────────────────────────────────────────────────────────────
const params = {
  intensity:  1.2,
  speed:      1.0,
  color:      '#ccddff',
  lightColor: '#ffffff',
  lightIntensity: 2.5,
};

const gui = new GUI({ title: 'Caustics Controls' });
gui.add(params, 'intensity', 0, 3, 0.01).name('Intensity').onChange(v => {
  causticUniforms.uIntensity.value = v;
});
gui.add(params, 'speed', 0, 4, 0.01).name('Speed').onChange(v => {
  causticUniforms.uSpeed.value = v;
});
gui.addColor(params, 'color').name('Caustic Color').onChange(v => {
  const c = new THREE.Color(v);
  causticUniforms.uColor.value.set(c.r * 1.5, c.g * 1.5, c.b * 1.8);
});
gui.addColor(params, 'lightColor').name('Sun Color').onChange(v => {
  sunLight.color.set(v);
});
gui.add(params, 'lightIntensity', 0, 5, 0.1).name('Sun Intensity').onChange(v => {
  sunLight.intensity = v;
});

// ─────────────────────────────────────────────────────────────────────────────
// Resize
// ─────────────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─────────────────────────────────────────────────────────────────────────────
// Animate
// ─────────────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();
  causticUniforms.uTime.value = t;

  // Gentle object bobbing
  sphere.position.y     = 1.0  + Math.sin(t * 0.8)  * 0.12;
  smallSphere.position.y = 0.6  + Math.sin(t * 1.2 + 1.0) * 0.1;
  box1.rotation.y       = t * 0.3;
  box2.rotation.y       = -t * 0.25;

  // Shimmer sparkles
  const pos = sparkleGeo.attributes.position.array;
  for (let i = 0; i < sparkleCount; i++) {
    pos[i * 3 + 1] = 1.52 + Math.sin(t * 3 + i * 0.7) * 0.04;
  }
  sparkleGeo.attributes.position.needsUpdate = true;

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
