<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaleidoscope</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    #tip {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.7);
      color: rgba(255,255,255,0.85);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 220px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      pointer-events: none;
    }
    #tip strong { color: #fff; }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.7);
      padding: 16px 24px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .control-label {
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      min-width: 80px;
    }

    .btn-group {
      display: flex;
      gap: 6px;
    }

    button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.2); }
    button.active {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.5);
    }

    #speedSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.2);
      outline: none;
    }
    #speedSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }
    #speedValue {
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      min-width: 30px;
      text-align: right;
    }
  </style>
</head>
<body>

<div id="tip">
  <strong>Kaleidoscope</strong><br>
  Drag to rotate view.<br>
  Scroll to zoom.<br>
  Customize slices &amp; colors below.
</div>

<div id="controls">
  <div class="control-row">
    <span class="control-label">Slices</span>
    <div class="btn-group">
      <button class="slice-btn" data-slices="6">6</button>
      <button class="slice-btn active" data-slices="8">8</button>
      <button class="slice-btn" data-slices="12">12</button>
    </div>
  </div>
  <div class="control-row">
    <span class="control-label">Speed</span>
    <input type="range" id="speedSlider" min="0" max="200" value="50" />
    <span id="speedValue">50</span>
  </div>
  <div class="control-row">
    <span class="control-label">Scheme</span>
    <div class="btn-group">
      <button class="scheme-btn active" data-scheme="vivid">Vivid</button>
      <button class="scheme-btn" data-scheme="neon">Neon</button>
      <button class="scheme-btn" data-scheme="pastel">Pastel</button>
      <button class="scheme-btn" data-scheme="mono">Mono</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

// ── Outer Scene & Camera ────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 3.5);

// ── OrbitControls ──────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.5;
controls.maxDistance = 10;

// ── Inner Scene (rendered to texture) ─────────────────────────────────────
const innerScene = new THREE.Scene();
innerScene.background = new THREE.Color(0x050510);

const innerCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 50);
innerCamera.position.set(0, 0, 0.01);
innerCamera.lookAt(0, 0, 0);

// ── Render Target ──────────────────────────────────────────────────────────
let rtSize = Math.min(window.innerWidth, window.innerHeight);
const renderTarget = new THREE.WebGLRenderTarget(rtSize, rtSize, {
  minFilter: THREE.LinearFilter,
  magFilter: THREE.LinearFilter,
  format: THREE.RGBAFormat,
});

// ── Color Schemes ──────────────────────────────────────────────────────────
const colorSchemes = {
  vivid: {
    colors: [
      new THREE.Color(0xff3366),
      new THREE.Color(0xff9933),
      new THREE.Color(0xffdd33),
      new THREE.Color(0x33ff66),
      new THREE.Color(0x3399ff),
      new THREE.Color(0x9933ff),
      new THREE.Color(0xff33cc),
      new THREE.Color(0x33ffcc),
    ],
    bg: new THREE.Color(0x050510),
  },
  neon: {
    colors: [
      new THREE.Color(0x00ffff),
      new THREE.Color(0xff00ff),
      new THREE.Color(0x00ff00),
      new THREE.Color(0xffff00),
      new THREE.Color(0xff0088),
      new THREE.Color(0x8800ff),
      new THREE.Color(0x00ff88),
      new THREE.Color(0xff8800),
    ],
    bg: new THREE.Color(0x020008),
  },
  pastel: {
    colors: [
      new THREE.Color(0xffb3ba),
      new THREE.Color(0xffdfba),
      new THREE.Color(0xffffba),
      new THREE.Color(0xbaffc9),
      new THREE.Color(0xbae1ff),
      new THREE.Color(0xe0bbff),
      new THREE.Color(0xffc3ff),
      new THREE.Color(0xc9ffec),
    ],
    bg: new THREE.Color(0x0a0812),
  },
  mono: {
    colors: [
      new THREE.Color(0xffffff),
      new THREE.Color(0xcccccc),
      new THREE.Color(0x999999),
      new THREE.Color(0x666666),
      new THREE.Color(0xcccccc),
      new THREE.Color(0xffffff),
      new THREE.Color(0x888888),
      new THREE.Color(0xbbbbbb),
    ],
    bg: new THREE.Color(0x050505),
  },
};

let currentScheme = 'vivid';
let sliceCount = 8;
let rotationSpeed = 0.5;

// ── Inner Scene Objects ────────────────────────────────────────────────────
const innerObjects = [];

function buildInnerScene() {
  innerObjects.forEach(obj => innerScene.remove(obj));
  innerObjects.length = 0;

  const scheme = colorSchemes[currentScheme];
  innerScene.background = scheme.bg;

  const shapes = [
    () => new THREE.BoxGeometry(0.3, 0.3, 0.3),
    () => new THREE.SphereGeometry(0.2, 16, 16),
    () => new THREE.ConeGeometry(0.2, 0.4, 6),
    () => new THREE.TorusGeometry(0.18, 0.06, 8, 16),
    () => new THREE.OctahedronGeometry(0.2),
    () => new THREE.TetrahedronGeometry(0.22),
    () => new THREE.IcosahedronGeometry(0.18),
    () => new THREE.DodecahedronGeometry(0.18),
  ];

  const count = 24;
  for (let i = 0; i < count; i++) {
    const geomIndex = i % shapes.length;
    const geo = shapes[geomIndex]();
    const color = scheme.colors[i % scheme.colors.length];
    const mat = new THREE.MeshStandardMaterial({
      color,
      emissive: color,
      emissiveIntensity: 0.4,
      roughness: 0.3,
      metalness: 0.7,
    });
    const mesh = new THREE.Mesh(geo, mat);

    const angle = (i / count) * Math.PI * 2;
    const radius = 1.2 + Math.sin(i * 1.3) * 0.4;
    mesh.position.set(
      Math.cos(angle) * radius,
      (Math.random() - 0.5) * 1.0,
      Math.sin(angle) * radius
    );
    mesh.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );
    mesh.userData.rotSpeed = {
      x: (Math.random() - 0.5) * 0.02,
      y: (Math.random() - 0.5) * 0.02,
      z: (Math.random() - 0.5) * 0.02,
    };
    mesh.userData.origColor = color.clone();
    mesh.userData.floatOffset = Math.random() * Math.PI * 2;
    mesh.userData.floatSpeed = 0.5 + Math.random() * 0.5;
    mesh.userData.origY = mesh.position.y;
    innerScene.add(mesh);
    innerObjects.push(mesh);
  }

  // Inner lights
  innerScene.clear();
  innerObjects.forEach(obj => innerScene.remove(obj));
  innerObjects.length = 0;

  // Rebuild lights
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  innerScene.add(ambient);

  const pointColors = scheme.colors.slice(0, 4);
  const lightPositions = [
    new THREE.Vector3(2, 2, 2),
    new THREE.Vector3(-2, -2, 2),
    new THREE.Vector3(2, -2, -2),
    new THREE.Vector3(-2, 2, -2),
  ];
  lightPositions.forEach((pos, i) => {
    const light = new THREE.PointLight(pointColors[i % pointColors.length], 2, 10);
    light.position.copy(pos);
    innerScene.add(light);
  });

  const geo2 = new THREE.SphereGeometry(0.03, 8, 8);
  lightPositions.forEach((pos, i) => {
    const lm = new THREE.Mesh(geo2, new THREE.MeshBasicMaterial({ color: pointColors[i % pointColors.length] }));
    lm.position.copy(pos);
    innerScene.add(lm);
  });

  for (let i = 0; i < count; i++) {
    const geomIndex = i % shapes.length;
    const geo = shapes[geomIndex]();
    const color = scheme.colors[i % scheme.colors.length];
    const mat = new THREE.MeshStandardMaterial({
      color,
      emissive: color,
      emissiveIntensity: 0.3,
      roughness: 0.3,
      metalness: 0.7,
    });
    const mesh = new THREE.Mesh(geo, mat);

    const angle = (i / count) * Math.PI * 2;
    const radius = 1.2 + Math.sin(i * 1.3) * 0.4;
    mesh.position.set(
      Math.cos(angle) * radius,
      (Math.random() - 0.5) * 1.0,
      Math.sin(angle) * radius
    );
    mesh.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );
    mesh.userData.rotSpeed = {
      x: (Math.random() - 0.5) * 0.02,
      y: (Math.random() - 0.5) * 0.02,
      z: (Math.random() - 0.5) * 0.02,
    };
    mesh.userData.origColor = color.clone();
    mesh.userData.floatOffset = Math.random() * Math.PI * 2;
    mesh.userData.floatSpeed = 0.5 + Math.random() * 0.5;
    mesh.userData.origY = mesh.position.y;
    innerScene.add(mesh);
    innerObjects.push(mesh);
  }

  // Ground ring
  const ringGeo = new THREE.TorusGeometry(2.0, 0.02, 8, 64);
  const ringMat = new THREE.MeshBasicMaterial({ color: scheme.colors[0] });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  innerScene.add(ring);
  innerObjects.push(ring);

  const ringGeo2 = new THREE.TorusGeometry(1.5, 0.015, 8, 64);
  const ring2 = new THREE.Mesh(ringGeo2, new THREE.MeshBasicMaterial({ color: scheme.colors[2] }));
  ring2.rotation.x = Math.PI / 2;
  innerScene.add(ring2);
  innerObjects.push(ring2);
}

// ── Kaleidoscope Shader ─────────────────────────────────────────────────────
const kaleidoscopeMat = new THREE.ShaderMaterial({
  uniforms: {
    tDiffuse: { value: renderTarget.texture },
    sliceCount: { value: sliceCount },
    time: { value: 0.0 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float sliceCount;
    uniform float time;
    varying vec2 vUv;

    void main() {
      vec2 uv = vUv;

      // Map UV from [0,1] to centered [-1,1]
      vec2 centered = uv * 2.0 - 1.0;

      float angle = atan(centered.y, centered.x);
      float radius = length(centered);

      // Rotate over time for spinning effect
      float rotatedAngle = angle + time * 0.5;

      // Compute slice width
      float sliceAngle = 6.28318530718 / sliceCount;

      // Mirror into first slice
      float a = mod(rotatedAngle, sliceAngle);
      if (a > sliceAngle * 0.5) {
        a = sliceAngle - a;
      }

      // Reconstruct mirrored direction
      vec2 mirrored = vec2(cos(a), sin(a)) * radius;

      // Map back to [0,1]
      vec2 mirroredUv = (mirrored + 1.0) * 0.5;

      // Flip horizontally for correct mirror-ball feel
      mirroredUv.x = 1.0 - mirroredUv.x;

      vec4 color = texture2D(tDiffuse, mirroredUv);

      // Subtle vignette on the sphere edges
      float vignette = 1.0 - smoothstep(0.7, 1.0, radius);
      color.rgb *= vignette;

      gl_FragColor = color;
    }
  `,
  side: THREE.FrontSide,
});

// ── Kaleidoscope Sphere ─────────────────────────────────────────────────────
const sphereGeo = new THREE.SphereGeometry(3.0, 64, 64);
const kaleidoscopeSphere = new THREE.Mesh(sphereGeo, kaleidoscopeMat);
scene.add(kaleidoscopeSphere);

// ── Build initial inner scene ──────────────────────────────────────────────
buildInnerScene();

// ── Animation Loop ──────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();
  const delta = clock.getDelta();

  // Update inner scene objects
  innerObjects.forEach((obj) => {
    if (obj.userData.rotSpeed) {
      obj.rotation.x += obj.userData.rotSpeed.x;
      obj.rotation.y += obj.userData.rotSpeed.y;
      obj.rotation.z += obj.userData.rotSpeed.z;
    }
    if (obj.userData.floatSpeed !== undefined) {
      const floatY = Math.sin(elapsed * obj.userData.floatSpeed + obj.userData.floatOffset) * 0.1;
      obj.position.y = obj.userData.origY + floatY;
    }
  });

  // Rotate the inner scene slightly
  innerScene.rotation.y = elapsed * 0.1 * rotationSpeed;

  // Update shader time
  kaleidoscopeMat.uniforms.time.value = elapsed * rotationSpeed;
  kaleidoscopeMat.uniforms.sliceCount.value = sliceCount;

  // Rotate kaleidoscope sphere slowly
  kaleidoscopeSphere.rotation.y = elapsed * 0.05;
  kaleidoscopeSphere.rotation.x = Math.sin(elapsed * 0.03) * 0.1;

  // Render inner scene to render target
  innerCamera.position.set(0, 0, 0.01);
  innerCamera.lookAt(0, 0, 0);
  renderer.setRenderTarget(renderTarget);
  renderer.setClearColor(0x000000, 1);
  renderer.clear();
  renderer.render(innerScene, innerCamera);

  // Render outer scene
  renderer.setRenderTarget(null);
  renderer.setClearColor(0x000000, 1);
  renderer.clear();
  renderer.render(scene, camera);

  controls.update();
}

animate();

// ── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;

  camera.aspect = w / h;
  camera.updateProjectionMatrix();

  renderer.setSize(w, h);

  // Update render target size
  rtSize = Math.min(w, h);
  renderTarget.setSize(rtSize, rtSize);

  innerCamera.aspect = w / h;
  innerCamera.updateProjectionMatrix();
});

// ── UI Controls ────────────────────────────────────────────────────────────
document.querySelectorAll('.slice-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.slice-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sliceCount = parseInt(btn.dataset.slices);
  });
});

const speedSlider = document.getElementById('speedSlider');
const speedValue = document.getElementById('speedValue');
speedSlider.addEventListener('input', () => {
  const v = parseInt(speedSlider.value);
  rotationSpeed = v / 50.0;
  speedValue.textContent = v;
});

document.querySelectorAll('.scheme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.scheme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentScheme = btn.dataset.scheme;
    buildInnerScene();
  });
});

// ── Expose to window ───────────────────────────────────────────────────────
window.scene = scene;
window.camera = camera;
window.renderer = renderer;
window.controls = controls;
window.innerScene = innerScene;
window.kaleidoscopeMat = kaleidoscopeMat;
</script>
</body>
</html>
