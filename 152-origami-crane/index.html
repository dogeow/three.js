<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Origami Crane</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    canvas { display: block; }

    #tip {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 12px 16px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      max-width: 220px;
      line-height: 1.5;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    #tip strong {
      display: block;
      color: rgba(255,255,255,0.9);
      margin-bottom: 4px;
      font-size: 14px;
    }

    #ui {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px 20px;
      backdrop-filter: blur(8px);
    }

    #toggleBtn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 8px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    #toggleBtn:hover { background: rgba(255,255,255,0.18); }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
    }

    #speedSlider {
      -webkit-appearance: none;
      width: 100px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
    }

    #speedSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="tip">
    <strong>Origami Crane</strong>
    An animated paper crane that unfolds from a flat sheet. Drag to orbit, scroll to zoom.
  </div>

  <div id="ui">
    <button id="toggleBtn">Unfold</button>
    <div class="slider-group">
      <span>Speed</span>
      <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1" />
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ─── Scene Setup ─────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);

    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 4, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ─── Controls ────────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.6;
    controls.minDistance = 4;
    controls.maxDistance = 20;
    controls.maxPolarAngle = Math.PI * 0.78;

    // ─── Lighting ─────────────────────────────────────────────────────────────
    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.4);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -8;
    dirLight.shadow.camera.right = 8;
    dirLight.shadow.camera.top = 8;
    dirLight.shadow.camera.bottom = -8;
    dirLight.shadow.bias = -0.001;
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0xc0d8ff, 0.4);
    fillLight.position.set(-5, 3, -5);
    scene.add(fillLight);

    // ─── Ground / Shadow Catcher ──────────────────────────────────────────────
    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.ShadowMaterial({ opacity: 0.25 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.5;
    ground.receiveShadow = true;
    scene.add(ground);

    // ─── Paper Material ───────────────────────────────────────────────────────
    const paperMat = new THREE.MeshStandardMaterial({
      color: 0xf8f6f0,
      roughness: 0.85,
      metalness: 0.0,
      side: THREE.DoubleSide,
    });

    // ─── Crane Geometry ───────────────────────────────────────────────────────
    // We build the crane from a subdivided plane, then animate vertex positions.
    // The crane has: left wing, right wing, body (center), tail, neck, head.
    const SUBDIV = 24; // segments per side
    const craneGeo = new THREE.PlaneGeometry(6, 6, SUBDIV, SUBDIV);

    // Original flat positions stored for base reference
    const origPos = craneGeo.attributes.position;

    // We'll define keyframe vertex positions for each "fold stage".
    // Stages go from flat (stage 0) to fully folded crane (stage 7).
    // Each stage stores an array of { vertexIndex, targetPosition } or a
    // transform applied to a region of vertices.

    // Helper: clone position array
    function clonePos() {
      const arr = new Float32Array(origPos.array.length);
      arr.set(origPos.array);
      return arr;
    }

    // Helper: set all vertex y values (height) by X region
    // This builds the crane shape from a flat sheet.
    // The sheet is in XY plane, centered at origin.
    // Wings: x < -1, Body: -1 <= x <= 1, Right wing: x > 1
    // Fold lines at x = -1 and x = 1 create the body ridge.
    // Wings fold up (positive y), body creates ridge along Z, tail at y edge.

    // For simplicity, we define the crane using a set of transforms for
    // different vertex groups. We build a list of keyframe position arrays.

    // Stage 0: flat paper (default)
    const stage0 = clonePos();

    // Stage 1: valley fold along center X (body ridge), z=0 to z>0 (body rises)
    function applyStage1(pos) {
      for (let i = 0; i < origPos.count; i++) {
        const x = origPos.getX(i);
        const z = origPos.getZ(i);
        const y = origPos.getY(i);
        // Fold so the body ridge lifts up
        const t = Math.max(0, 1 - Math.abs(x) * 0.5);
        const lift = t * Math.max(0, z) * 1.2;
        pos[i * 3 + 1] = y + lift;
      }
      return pos;
    }
    const stage1 = applyStage1(clonePos());

    // Stage 2: wings start to fold up (negative X and positive X regions)
    function applyStage2(pos) {
      for (let i = 0; i < origPos.count; i++) {
        const x = origPos.getX(i);
        const z = origPos.getZ(i);
        const y = origPos.getY(i);
        const t = Math.max(0, 1 - Math.abs(x) * 0.5);
        const lift = t * Math.max(0, z) * 1.2;

        // Wings fold upward
        if (x < -1.2) {
          const wingT = Math.min(1, (-x - 1.2) / 1.8);
          pos[i * 3 + 1] = y + lift + wingT * 3.5;
          pos[i * 3 + 2] = z + wingT * 0.3;
        } else if (x > 1.2) {
          const wingT = Math.min(1, (x - 1.2) / 1.8);
          pos[i * 3 + 1] = y + lift + wingT * 3.5;
          pos[i * 3 + 2] = z + wingT * 0.3;
        } else {
          pos[i * 3 + 1] = y + lift;
        }
      }
      return pos;
    }
    const stage2 = applyStage2(clonePos());

    // Stage 3: wings fold more, body ridge sharpens
    function applyStage3(pos) {
      for (let i = 0; i < origPos.count; i++) {
        const x = origPos.getX(i);
        const z = origPos.getZ(i);
        const y = origPos.getY(i);

        if (x < -1.2) {
          const wingT = Math.min(1, (-x - 1.2) / 1.8);
          const foldAngle = wingT * Math.PI * 0.38;
          pos[i * 3 + 1] = y + wingT * 4.2;
          pos[i * 3 + 2] = z + wingT * 0.4 - wingT * wingT * 0.5;
          // Slight inward tilt of wing tips
          pos[i * 3] = x - wingT * 0.3;
        } else if (x > 1.2) {
          const wingT = Math.min(1, (x - 1.2) / 1.8);
          pos[i * 3 + 1] = y + wingT * 4.2;
          pos[i * 3 + 2] = z + wingT * 0.4 - wingT * wingT * 0.5;
          pos[i * 3] = x + wingT * 0.3;
        } else {
          // Body: central ridge
          const t = Math.max(0, 1 - Math.abs(x) * 0.5);
          const lift = t * Math.max(0, z) * 1.5 + wingT * 0.1;
          // Slight Z compression at body
          pos[i * 3 + 1] = y + lift + 0.3;
          pos[i * 3 + 2] = z * (1 - 0.15 * Math.max(0, 1 - Math.abs(x)));
        }
      }
      return pos;
    }
    const stage3 = applyStage3(clonePos());

    // Stage 4: tail section forms (y > 2 region in original, becomes tail)
    function applyStage4(pos) {
      for (let i = 0; i < origPos.count; i++) {
        const x = origPos.getX(i);
        const y = origPos.getY(i);
        const z = origPos.getZ(i);

        if (x < -1.2) {
          const wingT = Math.min(1, (-x - 1.2) / 1.8);
          pos[i * 3 + 1] = y + wingT * 4.2;
          pos[i * 3 + 2] = z + wingT * 0.4 - wingT * wingT * 0.5;
          pos[i * 3] = x - wingT * 0.3;
        } else if (x > 1.2) {
          const wingT = Math.min(1, (x - 1.2) / 1.8);
          pos[i * 3 + 1] = y + wingT * 4.2;
          pos[i * 3 + 2] = z + wingT * 0.4 - wingT * wingT * 0.5;
          pos[i * 3] = x + wingT * 0.3;
        } else {
          // Body
          const t = Math.max(0, 1 - Math.abs(x) * 0.5);
          const lift = t * Math.max(0, z) * 1.5 + 0.3;
          pos[i * 3 + 1] = y + lift;
          pos[i * 3 + 2] = z * (1 - 0.15 * Math.max(0, 1 - Math.abs(x)));
        }
      }
      return pos;
    }
    const stage4 = applyStage4(clonePos());

    // Stage 5: neck and head form from y > 1.5 area
    function applyStage5(pos) {
      for (let i = 0; i < origPos.count; i++) {
        const x = origPos.getX(i);
        const y = origPos.getY(i);
        const z = origPos.getZ(i);

        if (x < -1.2) {
          const wingT = Math.min(1, (-x - 1.2) / 1.8);
          pos[i * 3 + 1] = y + wingT * 4.2;
          pos[i * 3 + 2] = z + wingT * 0.4 - wingT * wingT * 0.5;
          pos[i * 3] = x - wingT * 0.3;
        } else if (x > 1.2) {
          const wingT = Math.min(1, (x - 1.2) / 1.8);
          pos[i * 3 + 1] = y + wingT * 4.2;
          pos[i * 3 + 2] = z + wingT * 0.4 - wingT * wingT * 0.5;
          pos[i * 3] = x + wingT * 0.3;
        } else {
          // Body + neck
          const t = Math.max(0, 1 - Math.abs(x) * 0.5);
          let lift = t * Math.max(0, z) * 1.5 + 0.3;

          // Neck: front part (z near positive edge) rises
          if (z > 1.5 && y > 0.5) {
            const neckT = Math.min(1, (y - 0.5) / 1.5);
            pos[i * 3 + 1] = y + lift + neckT * 1.5;
            pos[i * 3 + 2] = z + neckT * 0.3;
            pos[i * 3] = x * (1 - neckT * 0.3); // narrow neck
          } else {
            pos[i * 3 + 1] = y + lift;
          }
        }
      }
      return pos;
    }
    const stage5 = applyStage5(clonePos());

    // Stage 6: head forms, tail lifts up
    function applyStage6(pos) {
      for (let i = 0; i < origPos.count; i++) {
        const x = origPos.getX(i);
        const y = origPos.getY(i);
        const z = origPos.getZ(i);

        if (x < -1.2) {
          const wingT = Math.min(1, (-x - 1.2) / 1.8);
          pos[i * 3 + 1] = y + wingT * 4.2;
          pos[i * 3 + 2] = z + wingT * 0.4 - wingT * wingT * 0.5;
          pos[i * 3] = x - wingT * 0.3;
        } else if (x > 1.2) {
          const wingT = Math.min(1, (x - 1.2) / 1.8);
          pos[i * 3 + 1] = y + wingT * 4.2;
          pos[i * 3 + 2] = z + wingT * 0.4 - wingT * wingT * 0.5;
          pos[i * 3] = x + wingT * 0.3;
        } else {
          const t = Math.max(0, 1 - Math.abs(x) * 0.5);
          let lift = t * Math.max(0, z) * 1.5 + 0.3;

          if (z > 1.5 && y > 0.5) {
            const neckT = Math.min(1, (y - 0.5) / 1.5);
            pos[i * 3 + 1] = y + lift + neckT * 1.5;
            pos[i * 3 + 2] = z + neckT * 0.3;

            // Head: top edge curls
            if (y > 1.8) {
              const headT = Math.min(1, (y - 1.8) / 0.6);
              pos[i * 3 + 1] += headT * 0.8;
              pos[i * 3] = x * (1 - headT * 0.7);
              pos[i * 3 + 2] = z + headT * 0.4;
            }
          } else {
            pos[i * 3 + 1] = y + lift;
          }
        }
      }
      return pos;
    }
    const stage6 = applyStage6(clonePos());

    // Stage 7: final crane shape — refined
    function applyStage7(pos) {
      for (let i = 0; i < origPos.count; i++) {
        const x = origPos.getX(i);
        const y = origPos.getY(i);
        const z = origPos.getZ(i);

        if (x < -1.2) {
          // Left wing
          const wingT = Math.min(1, (-x - 1.2) / 1.8);
          const baseY = y + wingT * 4.5;
          const baseZ = z + wingT * 0.5 - wingT * wingT * 0.6;
          pos[i * 3] = x - wingT * 0.5;
          pos[i * 3 + 1] = baseY;
          pos[i * 3 + 2] = baseZ;
        } else if (x > 1.2) {
          // Right wing
          const wingT = Math.min(1, (x - 1.2) / 1.8);
          const baseY = y + wingT * 4.5;
          const baseZ = z + wingT * 0.5 - wingT * wingT * 0.6;
          pos[i * 3] = x + wingT * 0.5;
          pos[i * 3 + 1] = baseY;
          pos[i * 3 + 2] = baseZ;
        } else {
          // Body
          const t = Math.max(0, 1 - Math.abs(x) * 0.5);
          let lift = t * Math.max(0, z) * 1.6 + 0.4;
          pos[i * 3 + 1] = y + lift;
          pos[i * 3 + 2] = z * (1 - 0.18 * Math.max(0, 1 - Math.abs(x)));

          if (z > 1.5 && y > 0.5) {
            const neckT = Math.min(1, (y - 0.5) / 1.5);
            pos[i * 3 + 1] = y + lift + neckT * 1.6;
            pos[i * 3 + 2] = z + neckT * 0.35;
            pos[i * 3] = x * (1 - neckT * 0.35);

            if (y > 1.8) {
              const headT = Math.min(1, (y - 1.8) / 0.6);
              pos[i * 3 + 1] += headT * 0.9;
              pos[i * 3] = x * (1 - headT * 0.75);
              pos[i * 3 + 2] = z + headT * 0.5;
            }
          }
        }
      }
      return pos;
    }
    const stage7 = applyStage7(clonePos());

    // All stages in order
    const stages = [stage0, stage1, stage2, stage3, stage4, stage5, stage6, stage7];

    // ─── Build Mesh ───────────────────────────────────────────────────────────
    // Recompute normals after geometry changes
    craneGeo.computeVertexNormals();

    const paperMesh = new THREE.Mesh(craneGeo, paperMat);
    paperMesh.castShadow = true;
    paperMesh.receiveShadow = true;
    scene.add(paperMesh);

    // ─── Animation State ─────────────────────────────────────────────────────
    let progress = 0;          // 0 = flat, 1 = fully folded
    let folding = true;       // true = unfolding (0→1), false = folding (1→0)
    let speed = 1.0;          // multiplier
    const BASE_DURATION = 12; // seconds for full fold at speed=1

    // Current interpolated positions
    const currentPos = new Float32Array(origPos.array.length);

    function lerpStage(out, fromStage, toStage, t) {
      for (let i = 0; i < out.length; i++) {
        out[i] = fromStage[i] + (toStage[i] - fromStage[i]) * t;
      }
    }

    function updateGeometry(stageA, stageB, t) {
      lerpStage(currentPos, stageA, stageB, t);
      const posAttr = craneGeo.attributes.position;
      posAttr.array.set(currentPos);
      posAttr.needsUpdate = true;
      craneGeo.computeVertexNormals();
    }

    function getStagePositions(p) {
      // p in [0, 1]
      const total = stages.length - 1;
      const scaled = p * total;
      const idx = Math.min(Math.floor(scaled), total - 1);
      const t = scaled - idx;
      return { a: stages[idx], b: stages[idx + 1], t };
    }

    // Initial geometry
    updateGeometry(stages[0], stages[0], 0);

    // ─── UI Controls ─────────────────────────────────────────────────────────
    const toggleBtn = document.getElementById('toggleBtn');
    const speedSlider = document.getElementById('speedSlider');

    toggleBtn.addEventListener('click', () => {
      folding = !folding;
      toggleBtn.textContent = folding ? 'Unfold' : 'Fold';
    });

    speedSlider.addEventListener('input', (e) => {
      speed = parseFloat(e.target.value);
    });

    // ─── Animation Loop ──────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const deltaProgress = (delta / BASE_DURATION) * speed;

      if (folding) {
        progress = Math.min(1, progress + deltaProgress);
        if (progress >= 1) { folding = false; }
      } else {
        progress = Math.max(0, progress - deltaProgress);
        if (progress <= 0) { folding = true; }
      }

      const { a, b, t } = getStagePositions(progress);
      updateGeometry(a, b, t);

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // ─── Resize Handler ───────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    });

    // ─── Expose globals ───────────────────────────────────────────────────────
    window.scene = scene;
    window.camera = camera;
    window.renderer = renderer;
    window.controls = controls;
    window.paperMesh = paperMesh;
  </script>
</body>
</html>
