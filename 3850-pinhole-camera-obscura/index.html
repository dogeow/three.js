<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Pinhole Camera Obscura</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#000;font-family:monospace}
canvas{display:block}
#panel{position:fixed;top:14px;left:14px;color:#ddd;font-size:13px;background:rgba(0,0,0,0.82);padding:12px 16px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);line-height:2}
#hint{position:fixed;bottom:14px;left:14px;color:rgba(255,255,255,0.4);font-size:12px}
</style>
</head>
<body>
<div id="panel">
  <b style="color:#fff">Pinhole Camera Obscura</b><br>
  Focal Length: <span id="fl">40</span> mm<br>
  Pinhole Radius: <span id="pr">2.0</span> mm<br>
  Aperture: f/<span id="ap">20.0</span><br>
  Drag slider to change pinhole size
</div>
<div id="hint">Scroll to zoom | Right-drag to rotate | Adjust pinhole with slider</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const W = 640, H = 480;
const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 1000);

// ---- Software pinhole render target ----
const rtCanvas = document.createElement('canvas');
rtCanvas.width = W; rtCanvas.height = H;
const rtCtx = rtCanvas.getContext('2d');
const imgData = rtCtx.createImageData(W, H);
const rtTex = new THREE.CanvasTexture(rtCanvas);

// Three.js scene for 3D preview
const scene3d = new THREE.Scene();
scene3d.background = new THREE.Color(0x020408);
const cam3d = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 500);
cam3d.position.set(0, 2, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(cam3d, renderer.domElement);
controls.enableDamping = true;

// ---- Scene objects for the pinhole camera to see ----
// Floor grid
const grid = new THREE.GridHelper(60, 60, 0x112233, 0x0a1520);
scene3d.add(grid);

// Spheres
const sphereGeo = new THREE.SphereGeometry(1, 32, 32);
const sphereMats = [
  new THREE.MeshStandardMaterial({ color: 0xff3344, roughness: 0.3, metalness: 0.6, emissive: 0x220000 }),
  new THREE.MeshStandardMaterial({ color: 0x33ff66, roughness: 0.4, metalness: 0.5, emissive: 0x002200 }),
  new THREE.MeshStandardMaterial({ color: 0x3366ff, roughness: 0.2, metalness: 0.7, emissive: 0x000022 }),
  new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.5, emissive: 0x221100 }),
];
const spheres = [];
[[-5, 1, -8], [5, 1.5, -10], [0, 0.5, -6], [8, 2, -12]].forEach((p, i) => {
  const m = new THREE.Mesh(sphereGeo, sphereMats[i % sphereMats.length]);
  m.position.set(...p);
  scene3d.add(m);
  spheres.push(m);
});

// Boxes
const boxGeo = new THREE.BoxGeometry(2, 3, 2);
const boxMat = new THREE.MeshStandardMaterial({ color: 0x444466, roughness: 0.7, metalness: 0.3 });
[-8, 0, 8].forEach((x, i) => {
  const b = new THREE.Mesh(boxGeo, boxMat);
  b.position.set(x, 1.5, -10 - i * 3);
  scene3d.add(b);
});

// Torus knot
const tkGeo = new THREE.TorusKnotGeometry(1.5, 0.4, 128, 16);
const tkMat = new THREE.MeshStandardMaterial({ color: 0xff44aa, roughness: 0.2, metalness: 0.9, emissive: 0x220011 });
const tk = new THREE.Mesh(tkGeo, tkMat);
tk.position.set(0, 3, -8);
scene3d.add(tk);

// Light
scene3d.add(new THREE.AmbientLight(0x334455, 2));
const sun = new THREE.DirectionalLight(0xfff5e0, 2);
sun.position.set(10, 20, 10);
scene3d.add(sun);
const fill = new THREE.PointLight(0x4466ff, 1, 50);
fill.position.set(-10, 5, 5);
scene3d.add(fill);

// ---- Pinhole camera parameters ----
let focalLength = 40;   // mm
let pinholeR = 2.0;     // mm
const sensorW = 36, sensorH = 24;  // 35mm full frame
const fov = 2 * Math.atan(sensorW / (2 * focalLength));
camera.fov = fov * 180 / Math.PI;
camera.updateProjectionMatrix();

// ---- Pinhole render function ----
const camPos = new THREE.Vector3(0, 2, 12);
const camTarget = new THREE.Vector3(0, 2, -10);
const forward = new THREE.Vector3().subVectors(camTarget, camPos).normalize();
const right = new THREE.Vector3(0, 1, 0).cross(forward).normalize();
const up3d = new THREE.Vector3().crossVectors(forward, right);

// Ray-sphere intersection
function hitSphere(ox, oy, oz, dx, dy, dz, cx, cy, cz, r) {
  const sx = ox - cx, sy = oy - cy, sz = oz - cz;
  const b = sx * dx + sy * dy + sz * dz;
  const c = sx * sx + sy * sy + sz * sz - r * r;
  const disc = b * b - c;
  if (disc < 0) return -1;
  const sq = Math.sqrt(disc);
  const t0 = -b - sq, t1 = -b + sq;
  if (t0 > 0.001) return t0;
  if (t1 > 0.001) return t1;
  return -1;
}

// Ray-box intersection (simplified AABB)
function hitBox(ox, oy, oz, dx, dy, dz, minX, minY, minZ, maxX, maxY, maxZ) {
  let tmin = -1e9, tmax = 1e9;
  const axes = [[0, dx, minX - ox, maxX - ox], [1, dy, minY - oy, maxY - oy], [2, dz, minZ - oz, maxZ - oz]];
  for (const [ax, d, mn, mx] of axes) {
    if (Math.abs(d) < 1e-9) { if (ox < mn || ox > mx) return -1; }
    else {
      const t1 = (mn - ox) / d, t2 = (mx - ox) / d;
      tmin = Math.max(tmin, Math.min(t1, t2));
      tmax = Math.min(tmax, Math.max(t1, t2));
    }
  }
  if (tmax < tmin || tmax < 0.001) return -1;
  return tmin > 0.001 ? tmin : tmax;
}

// Simple scene objects for software rendering
const sceneObjects = [
  { type: 'sphere', cx: -5, cy: 1, cz: -8, r: 1, r3: 0xff3344, g3: 0x33, b3: 0x44 },
  { type: 'sphere', cx: 5, cy: 1.5, cz: -10, r: 1.5, r3: 0x33, g3: 0xff66, b3: 0x66 },
  { type: 'sphere', cx: 0, cy: 0.5, cz: -6, r: 0.5, r3: 0x33, g3: 0x66, b3: 0xff },
  { type: 'sphere', cx: 8, cy: 2, cz: -12, r: 2, r3: 0xff, g3: 0xaa00, b3: 0 },
  { type: 'box', minX: -9, minY: 0, minZ: -13, maxX: -7, maxY: 3, maxZ: -11, r3: 0x44, g3: 0x44, b3: 0x66 },
  { type: 'box', minX: -1, minY: 0, minZ: -13, maxX: 1, maxY: 3, maxZ: -11, r3: 0x44, g3: 0x44, b3: 0x66 },
  { type: 'box', minX: 7, minY: 0, minZ: -13, maxX: 9, maxY: 3, maxZ: -11, r3: 0x44, g3: 0x44, b3: 0x66 },
  { type: 'torusknot', cx: 0, cy: 3, cz: -8, r3: 0xff44aa, g3: 0x44, b3: 0xaa },
];

function renderPinhole() {
  const fov_tan = Math.tan(fov / 2);
  const aspect = sensorW / sensorH;
  const du = sensorW / W;
  const dv = sensorH / H;

  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      const u = (px - W / 2) * du;
      const v = (py - H / 2) * dv;
      // Ray direction in world space
      const rdx = forward.x + u / focalLength * right.x + v / focalLength * up3d.x;
      const rdy = forward.y + u / focalLength * right.y + v / focalLength * up3d.y;
      const rdz = forward.z + u / focalLength * right.z + v / focalLength * up3d.z;
      const rl = Math.sqrt(rdx * rdx + rdy * rdy + rdz * rdz);
      const ndx = rdx / rl, ndy = rdy / rl, ndz = rdz / rl;

      // Diffraction: Airy disk pattern based on pinhole size
      // For small pinholes, wavelength ~550nm causes diffraction blur
      const wavelength = 550e-6; // mm
      const f_number = focalLength / (2 * pinholeR);
      const airy_angle = 1.22 * wavelength / (2 * pinholeR);
      const blur_pixels = Math.tan(airy_angle) * focalLength / du;

      // Simple scene color: check ground plane first
      let cr = 0.02, cg = 0.03, cb = 0.05; // BG
      let tBest = 1e9;

      // Ground plane y=0
      if (ndy < -0.001) {
        const t = -camPos.y / ndy;
        if (t > 0.001 && t < tBest) {
          tBest = t;
          const hx = camPos.x + ndx * t, hz = camPos.z + ndz * t;
          const checker = (Math.floor(hx) + Math.floor(hz)) & 1;
          cr = checker ? 0.15 : 0.08;
          cg = checker ? 0.15 : 0.08;
          cb = checker ? 0.18 : 0.1;
          // Distance fog
          const fog = Math.exp(-t * 0.015);
          cr *= fog; cg *= fog; cb *= fog;
        }
      }

      // Spheres & boxes
      for (const obj of sceneObjects) {
        let t = -1;
        if (obj.type === 'sphere') {
          t = hitSphere(camPos.x, camPos.y, camPos.z, ndx, ndy, ndz, obj.cx, obj.cy, obj.cz, obj.r);
        } else if (obj.type === 'box') {
          t = hitBox(camPos.x, camPos.y, camPos.z, ndx, ndy, ndz, obj.minX, obj.minY, obj.minZ, obj.maxX, obj.maxY, obj.maxZ);
        } else if (obj.type === 'torusknot') {
          // Approximate torus knot as sphere
          t = hitSphere(camPos.x, camPos.y, camPos.z, ndx, ndy, ndz, obj.cx, obj.cy, obj.cz, 1.8);
        }
        if (t > 0.001 && t < tBest) {
          tBest = t;
          const lx = camPos.x + ndx * t, ly = camPos.y + ndy * t, lz = camPos.z + ndz * t;
          let nx, ny, nz;
          if (obj.type === 'sphere') {
            nx = (lx - obj.cx) / obj.r; ny = (ly - obj.cy) / obj.r; nz = (lz - obj.cz) / obj.r;
          } else if (obj.type === 'box') {
            // Determine face normal
            const cx = (obj.minX + obj.maxX) / 2, cy2 = (obj.minY + obj.maxY) / 2, cz2 = (obj.minZ + obj.maxZ) / 2;
            const adx = Math.abs(lx - cx), ady = Math.abs(ly - cy2), adz = Math.abs(lz - cz2);
            if (adx > ady && adx > adz) { nx = Math.sign(lx - cx); ny = 0; nz = 0; }
            else if (ady > adz) { nx = 0; ny = Math.sign(ly - cy2); nz = 0; }
            else { nx = 0; ny = 0; nz = Math.sign(lz - cz2); }
          } else {
            nx = ndy; ny = -ndx; nz = ndz;
          }
          const diff = Math.max(0, -(nx * ndx + ny * ndy + nz * ndz));
          cr = obj.r3 * diff * 0.003;
          cg = obj.g3 * diff * 0.003;
          cb = obj.b3 * diff * 0.003;
          // Specular
          const spec = Math.pow(Math.max(0, -(nx * (ndx + ndy + ndz) + ny * (-ndx - ndy - ndz) + nz * (ndz))), 32);
          cr += spec * 0.8; cg += spec * 0.8; cb += spec * 0.8;
          const fog2 = Math.exp(-tBest * 0.02);
          cr *= fog2; cg *= fog2; cb *= fog2;
        }
      }

      // Diffraction: apply Airy disk blur via simple box filter
      let finalR = cr, finalG = cg, finalB = cb;
      if (blur_pixels > 0.5) {
        const r = Math.ceil(blur_pixels);
        let sumR = 0, sumG = 0, sumB = 0, cnt = 0;
        for (let dy = -r; dy <= r; dy++) {
          for (let dx = -r; dx <= r; dx++) {
            const nx2 = Math.max(0, Math.min(W - 1, px + dx));
            const ny2 = Math.max(0, Math.min(H - 1, py + dy));
            const i2 = (ny2 * W + nx2) * 4;
            sumR += imgData.data[i2]; sumG += imgData.data[i2 + 1]; sumB += imgData.data[i2 + 2];
            cnt++;
          }
        }
        finalR = sumR / cnt; finalG = sumG / cnt; finalB = sumB / cnt;
      }

      // Vignette
      const vx = (px / W - 0.5) * 2, vy = (py / H - 0.5) * 2;
      const vign = Math.max(0, 1 - (vx * vx + vy * vy) * 0.5);
      finalR *= vign; finalG *= vign; finalB *= vign;

      const i = (py * W + px) * 4;
      imgData.data[i] = Math.min(255, Math.max(0, finalR * 255));
      imgData.data[i + 1] = Math.min(255, Math.max(0, finalG * 255));
      imgData.data[i + 2] = Math.min(255, Math.max(0, finalB * 255));
      imgData.data[i + 3] = 255;
    }
  }
  rtCtx.putImageData(imgData, 0, 0);
  rtTex.needsUpdate = true;
}

// ---- Display the pinhole-rendered image as a plane in 3D scene ----
const displayGeo = new THREE.PlaneGeometry(16 * aspect, 16);
const displayMat = new THREE.MeshBasicMaterial({ map: rtTex });
const displayMesh = new THREE.Mesh(displayGeo, displayMat);
displayMesh.position.set(0, 2, -0.5);
scene3d.add(displayMesh);

// Label
const labelCanvas = document.createElement('canvas');
labelCanvas.width = 512; labelCanvas.height = 64;
const lctx = labelCanvas.getContext('2d');
lctx.fillStyle = 'rgba(0,0,0,0)';
lctx.clearRect(0, 0, 512, 64);
lctx.font = 'bold 28px Courier New';
lctx.fillStyle = '#8cf';
lctx.textAlign = 'center';
lctx.fillText('PINHOLE CAMERA OBSCURA — Real-time Software Render', 256, 40);
const labelTex = new THREE.CanvasTexture(labelCanvas);
const labelGeo = new THREE.PlaneGeometry(16 * aspect, 2);
const labelMat = new THREE.MeshBasicMaterial({ map: labelTex, transparent: true });
const labelMesh = new THREE.Mesh(labelGeo, labelMat);
labelMesh.position.set(0, 6.5, -0.5);
scene3d.add(labelMesh);

// UI: pinhole size slider
const panel = document.getElementById('panel');
const slider = document.createElement('input');
slider.type = 'range';
slider.min = 0.5; slider.max = 8; slider.step = 0.1; slider.value = 2;
slider.style.cssText = 'width:160px; cursor:pointer';
slider.oninput = () => {
  pinholeR = parseFloat(slider.value);
  const f = focalLength / (2 * pinholeR);
  document.getElementById('fl').textContent = focalLength;
  document.getElementById('pr').textContent = pinholeR.toFixed(1);
  document.getElementById('ap').textContent = f.toFixed(1);
  camera.fov = fov * 180 / Math.PI;
  camera.updateProjectionMatrix();
  renderPinhole();
};
panel.appendChild(document.createElement('br'));
panel.appendChild(slider);

// Initial render
renderPinhole();

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;
  spheres.forEach((s, i) => { s.position.y = s.position.y + Math.sin(t + i) * 0.003; });
  tk.rotation.y = t * 0.3;
  tk.rotation.x = t * 0.2;
  controls.update();
  renderer.render(scene3d, cam3d);
}
animate();
window.addEventListener('resize', () => {
  cam3d.aspect = innerWidth / innerHeight;
  cam3d.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
