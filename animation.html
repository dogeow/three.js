<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 动画示例</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0a; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dir = new THREE.DirectionalLight(0xffffff, 1);
    dir.position.set(5, 10, 5);
    scene.add(dir);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Torus 旋转
    const torus = new THREE.Mesh(
      new THREE.TorusGeometry(1, 0.4, 16, 50),
      new THREE.MeshStandardMaterial({ color: 0xff6b6b })
    );
    torus.position.set(-3, 1, 0);
    scene.add(torus);

    // 缩放立方体
    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(1.5, 1.5, 1.5),
      new THREE.MeshStandardMaterial({ color: 0x51cf66 })
    );
    cube.position.set(0, 1, 0);
    scene.add(cube);

    // 路径运动球体
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(0.6, 32, 32),
      new THREE.MeshStandardMaterial({ color: 0x339af0, metalness: 0.5, roughness: 0.2 })
    );
    ball.position.set(3, 1, 0);
    scene.add(ball);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Torus 旋转
      torus.rotation.x += 0.01;
      torus.rotation.y += 0.015;

      // 立方体缩放
      const scale = 1 + Math.sin(t * 2) * 0.3;
      cube.scale.set(scale, scale, scale);

      // 球体路径运动 (sin曲线)
      ball.position.x = 3 + Math.sin(t) * 2;
      ball.position.y = 1 + Math.sin(t * 2) * 0.8;
      ball.position.z = Math.cos(t) * 2;

      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
