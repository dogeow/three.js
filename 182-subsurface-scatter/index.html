<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Subsurface Scattering Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
    #info {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="info">Subsurface Scattering · MeshPhysicalMaterial · Three.js r160</div>

  <!--
    ================================================================
    TITLE:          Three.js Subsurface Scattering Demo
    DESCRIPTION:    Organic fruit-like sphere demonstrating physically-
                    accurate subsurface scattering (SSS) using Three.js
                    MeshPhysicalMaterial with transmission, thickness,
                    attenuationColor, and IOR controls.
    TECHNICAL POINTS:
      - MeshPhysicalMaterial with transmission=1 enables glass-like
        refraction and thick-material SSS simulation
      - thickness parameter controls how deep light penetrates before
        being absorbed/attenuated (key SSS parameter)
      - attenuationColor tints the scattered subsurface light (e.g.
        warm orange for a peach-like glow)
      - attenuationDistance controls how far light travels before
        intensity drops
      - IOR (index of refraction) governs bending of light at surface
      - A strong backlight behind the object illuminates the SSS
        effect, making scattered transmitted light visible from front
      - Scene lit by HemisphereLight + DirectionalLight (backlight)
    HOW TO RUN:
      Open this file directly in a browser (no server needed):
      file:///path/to/index.html
      Or serve via any static server:
      npx serve .
      Then open http://localhost:3000
    ================================================================
  -->

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    // ── Scene setup ────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // ── Lights ─────────────────────────────────────────────────────
    // Ambient fill
    const hemi = new THREE.HemisphereLight(0x1a1a2e, 0x0a0a0f, 0.4);
    scene.add(hemi);

    // Backlight — the key to visible SSS: positioned behind the object
    const backlight = new THREE.DirectionalLight(0xffe8cc, 6.0);
    backlight.position.set(0, 2, -4);
    backlight.castShadow = true;
    scene.add(backlight);

    // Soft front fill
    const frontFill = new THREE.PointLight(0x8899ff, 0.8, 20);
    frontFill.position.set(3, 3, 4);
    scene.add(frontFill);

    // Warm rim accent
    const rimLight = new THREE.PointLight(0xff6633, 1.2, 15);
    rimLight.position.set(-3, -1, 3);
    scene.add(rimLight);

    // ── SSS Material ──────────────────────────────────────────────
    const params = {
      color: 0xff9966,          // base surface color
      transmission: 1.0,        // fully transmissive (glass-like)
      thickness: 2.5,           // key SSS param: light penetration depth
      roughness: 0.15,          // micro-surface roughness
      ior: 1.45,                // index of refraction (skin/fruit ~1.4)
      attenuationColor: 0xff5500, // tinted SSS color inside the material
      attenuationDistance: 1.5, // how far attenuation travels
      clearcoat: 0.1,
      clearcoatRoughness: 0.1,
      envMapIntensity: 1.0,
    };

    const material = new THREE.MeshPhysicalMaterial({
      color: params.color,
      transmission: params.transmission,
      thickness: params.thickness,
      roughness: params.roughness,
      ior: params.ior,
      attenuationColor: params.attenuationColor,
      attenuationDistance: params.attenuationDistance,
      clearcoat: params.clearcoat,
      clearcoatRoughness: params.clearcoatRoughness,
      envMapIntensity: params.envMapIntensity,
      side: THREE.DoubleSide,
    });

    // ── Main organic sphere ───────────────────────────────────────
    const geometry = new THREE.SphereGeometry(1.2, 64, 64);
    const sphere = new THREE.Mesh(geometry, material);
    sphere.castShadow = true;
    sphere.receiveShadow = true;
    scene.add(sphere);

    // ── Small satellite fruit-like spheres ─────────────────────────
    const smallGeo = new THREE.SphereGeometry(0.35, 48, 48);
    const smallPositions = [
      [-1.8, 0.6, -0.3],
      [1.9, -0.3, 0.2],
      [-0.5, 1.8, 0.5],
      [0.6, -1.6, -0.4],
    ];
    const smallColors = [0xff7744, 0xffcc44, 0xff5588, 0x88ff66];
    smallPositions.forEach((pos, i) => {
      const mat = new THREE.MeshPhysicalMaterial({
        color: smallColors[i],
        transmission: 0.9,
        thickness: 1.8,
        roughness: 0.2,
        ior: 1.4,
        attenuationColor: smallColors[i],
        attenuationDistance: 1.2,
        side: THREE.DoubleSide,
      });
      const mesh = new THREE.Mesh(smallGeo, mat);
      mesh.position.set(...pos);
      scene.add(mesh);
    });

    // ── Ground plane to catch soft shadows ─────────────────────────
    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -2.5;
    ground.receiveShadow = true;
    scene.add(ground);

    // ── Environment map for reflections ───────────────────────────
    const pmrem = new THREE.PMREMGenerator(renderer);
    const envScene = new THREE.Scene();
    envScene.background = new THREE.Color(0x111122);
    const envLight1 = new THREE.PointLight(0xffeedd, 5, 10);
    envLight1.position.set(3, 3, 3);
    envScene.add(envLight1);
    const envLight2 = new THREE.PointLight(0x88aaff, 3, 10);
    envLight2.position.set(-3, -2, -3);
    envScene.add(envLight2);
    const envMap = pmrem.fromScene(envScene).texture;
    scene.environment = envMap;

    // ── GUI ────────────────────────────────────────────────────────
    const gui = new GUI({ title: 'SSS Controls' });

    const sssFolder = gui.addFolder('Subsurface Scattering');
    sssFolder.add(params, 'thickness', 0.0, 8.0, 0.01).name('Thickness').onChange(v => { material.thickness = v; });
    sssFolder.addColor(params, 'attenuationColor').name('Attenuation Color').onChange(v => { material.attenuationColor.set(v); });
    sssFolder.add(params, 'attenuationDistance', 0.1, 5.0, 0.01).name('Attenuation Dist').onChange(v => { material.attenuationDistance = v; });
    sssFolder.add(params, 'ior', 1.0, 2.5, 0.01).name('IOR').onChange(v => { material.ior = v; });

    const surfFolder = gui.addFolder('Surface');
    surfFolder.addColor(params, 'color').name('Base Color').onChange(v => { material.color.set(v); });
    surfFolder.add(params, 'roughness', 0.0, 1.0, 0.01).name('Roughness').onChange(v => { material.roughness = v; });
    surfFolder.add(params, 'transmission', 0.0, 1.0, 0.01).name('Transmission').onChange(v => { material.transmission = v; });
    surfFolder.add(params, 'clearcoat', 0.0, 1.0, 0.01).name('Clearcoat').onChange(v => { material.clearcoat = v; });
    surfFolder.add(params, 'envMapIntensity', 0.0, 3.0, 0.01).name('Env Map').onChange(v => { material.envMapIntensity = v; });

    const lightFolder = gui.addFolder('Backlight');
    lightFolder.add(backlight, 'intensity', 0, 12, 0.1).name('Intensity');
    lightFolder.add({ color: backlight.color.getHex() }, 'color').name('Color').onChange(v => { backlight.color.set(v); });
    lightFolder.add(backlight.position, 'x', -10, 10).name('Pos X');
    lightFolder.add(backlight.position, 'y', -10, 10).name('Pos Y');
    lightFolder.add(backlight.position, 'z', -10, 10).name('Pos Z');

    sssFolder.open();
    surfFolder.open();

    // ── Resize handler ─────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Animation loop ─────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Gentle floating motion
      sphere.position.y = Math.sin(t * 0.5) * 0.08;
      sphere.rotation.y = t * 0.15;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
