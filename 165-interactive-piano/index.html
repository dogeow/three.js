<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交互钢琴 - Interactive Piano</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    .tip {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.85);
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 14px;
      letter-spacing: 0.5px;
      z-index: 100;
      white-space: nowrap;
      pointer-events: none;
    }

    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      z-index: 100;
      pointer-events: none;
      text-align: center;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="tip">交互钢琴——Web Audio API 合成音色，3D 键盘可视化，支持鼠标/键盘输入</div>
  <div id="hint">点击琴键或使用 A-L 键演奏 &nbsp;|&nbsp; 拖拽旋转视角 &nbsp;|&nbsp; GUI 调节音量/音色/混响</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

    // ─── Audio ───────────────────────────────────────────────────────────────
    let audioCtx = null;
    let masterGain = null;
    let convolver = null;
    let reverbGain = null;

    const params = {
      volume: 0.6,
      waveform: 'sine',
      reverb: 0.3,
    };

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      masterGain = audioCtx.createGain();
      masterGain.gain.value = params.volume;

      convolver = audioCtx.createConvolver();
      reverbGain = audioCtx.createGain();
      reverbGain.gain.value = params.reverb;

      // Build impulse reverb
      buildReverbIR();

      masterGain.connect(audioCtx.destination);
      masterGain.connect(convolver);
      convolver.connect(reverbGain);
      reverbGain.connect(audioCtx.destination);
    }

    function buildReverbIR() {
      const sampleRate = audioCtx.sampleRate;
      const length = sampleRate * 2.5;
      const impulse = audioCtx.createBuffer(2, length, sampleRate);
      for (let c = 0; c < 2; c++) {
        const ch = impulse.getChannelData(c);
        for (let i = 0; i < length; i++) {
          ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.2);
        }
      }
      convolver.buffer = impulse;
    }

    // Note frequencies (C4 to B5, 2 octaves)
    const NOTE_NAMES = ['C4','D4','E4','F4','G4','A4','B4','C5','D5','E5','F5','G5','A5','B5'];
    const NOTE_FREQS = [261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25,587.33,659.25,698.46,783.99,880.00,987.77];

    // Key bindings: A-L = C4-B4, Z-M = C5-B5
    const KEY_MAP = {
      'a':0,'w':1,'s':2,'e':3,'d':4,'f':5,'t':6,'g':7,'y':8,'h':9,'u':10,'j':11,
      'k':12,'o':13,'l':14,'p':15,';':16
    };

    function playNote(index) {
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const freq = NOTE_FREQS[index];
      const now = audioCtx.currentTime;

      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();

      osc.type = params.waveform;
      osc.frequency.value = freq;

      // ADSR envelope
      const attack  = 0.008;
      const decay   = 0.18;
      const sustain = 0.35;
      const release = 0.4;

      env.gain.setValueAtTime(0, now);
      env.gain.linearRampToValueAtTime(1.0, now + attack);
      env.gain.linearRampToValueAtTime(sustain, now + attack + decay);
      env.gain.setValueAtTime(sustain, now + 0.6);
      env.gain.linearRampToValueAtTime(0, now + 0.6 + release);

      osc.connect(env);
      env.connect(masterGain);

      osc.start(now);
      osc.stop(now + 0.6 + release + 0.05);
    }

    // ─── Scene Setup ─────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);
    scene.fog = new THREE.FogExp2(0x0a0a0f, 0.04);

    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 6, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 4;
    controls.maxDistance = 20;
    controls.maxPolarAngle = Math.PI / 2.1;

    // ─── Lights ─────────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x334466, 0.8));

    const dirLight = new THREE.DirectionalLight(0xfff5ee, 1.5);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);

    const rimLight = new THREE.PointLight(0x4466aa, 2, 20);
    rimLight.position.set(-6, 4, -4);
    scene.add(rimLight);

    const fillLight = new THREE.PointLight(0xaa6644, 1.2, 15);
    fillLight.position.set(6, 2, -3);
    scene.add(fillLight);

    // ─── Floor ──────────────────────────────────────────────────────────────
    const floorGeo = new THREE.PlaneGeometry(30, 30);
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x111122,
      roughness: 0.8,
      metalness: 0.3,
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.51;
    floor.receiveShadow = true;
    scene.add(floor);

    // Grid
    const grid = new THREE.GridHelper(30, 30, 0x223355, 0x112233);
    grid.position.y = -0.49;
    scene.add(grid);

    // ─── Piano Keys ─────────────────────────────────────────────────────────
    // 2 octaves = 14 notes: C4 to B5
    // White keys = natural notes, Black keys = sharps/flats
    const NUM_NOTES = 14;
    const WHITE_WIDTH = 0.55;
    const WHITE_DEPTH = 1.8;
    const BLACK_WIDTH = 0.34;
    const BLACK_DEPTH = 1.1;
    const WHITE_GAP = 0.05;
    const TOTAL_W = NUM_NOTES * (WHITE_WIDTH + WHITE_GAP);
    const START_X = -TOTAL_W / 2 + WHITE_WIDTH / 2;

    // [noteIndex, isBlack, whiteKeyIndex]
    const KEY_PATTERN = [
      [0,false,0],[1,true,NaN],[2,false,1],[3,true,NaN],[4,false,2],[5,false,3],[6,true,NaN],
      [7,false,4],[8,true,NaN],[9,false,5],[10,true,NaN],[11,false,6],[12,false,7],[13,true,NaN]
    ];

    const whiteMaterials = [
      new THREE.MeshStandardMaterial({ color: 0xf5f0e8, roughness: 0.3, metalness: 0.05 }),
      new THREE.MeshStandardMaterial({ color: 0xeee8de, roughness: 0.3, metalness: 0.05 }),
    ];
    const blackMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.4, metalness: 0.15 });
    const pressedWhiteMaterial = new THREE.MeshStandardMaterial({ color: 0xd4cfc7, roughness: 0.5, metalness: 0.05 });
    const pressedBlackMaterial = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.5, metalness: 0.15 });

    const keyMeshes = [];     // index → { mesh, group, origY, noteIndex, isBlack }
    const clickTargets = [];  // invisible boxes for raycasting

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    // Base plate
    const plateGeo = new THREE.BoxGeometry(TOTAL_W + 0.3, 0.08, WHITE_DEPTH + 0.4);
    const plateMat = new THREE.MeshStandardMaterial({ color: 0x1c1c1c, roughness: 0.6, metalness: 0.5 });
    const plate = new THREE.Mesh(plateGeo, plateMat);
    plate.position.y = -0.04;
    plate.receiveShadow = true;
    plate.castShadow = true;
    scene.add(plate);

    // Build white keys
    let whiteIdx = 0;
    for (let i = 0; i < KEY_PATTERN.length; i++) {
      const [noteIdx, isBlack, wi] = KEY_PATTERN[i];
      if (!isBlack) {
        const geo = new THREE.BoxGeometry(WHITE_WIDTH, 0.28, WHITE_DEPTH);
        const mat = whiteMaterials[whiteIdx % 2].clone();
        const mesh = new THREE.Mesh(geo, mat);
        const xPos = START_X + whiteIdx * (WHITE_WIDTH + WHITE_GAP);
        mesh.position.set(xPos, 0.14, 0);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData = { noteIdx, isBlack, whiteIdx };
        scene.add(mesh);

        // invisible click target (slightly taller)
        const tGeo = new THREE.BoxGeometry(WHITE_WIDTH, 0.5, WHITE_DEPTH);
        const tMat = new THREE.MeshBasicMaterial({ visible: false });
        const target = new THREE.Mesh(tGeo, tMat);
        target.position.set(xPos, 0.25, 0);
        target.userData = { noteIdx, isBlack, mesh, origY: 0.14 };
        scene.add(target);
        clickTargets.push(target);
        keyMeshes.push({ mesh, group: null, origY: 0.14, noteIdx, isBlack, target });

        whiteIdx++;
      }
    }

    // Build black keys (need to be on top, so add after)
    whiteIdx = 0;
    for (let i = 0; i < KEY_PATTERN.length; i++) {
      const [noteIdx, isBlack, wi] = KEY_PATTERN[i];
      if (isBlack) {
        // Find adjacent white keys to sit between
        const geo = new THREE.BoxGeometry(BLACK_WIDTH, 0.38, BLACK_DEPTH);
        const mat = blackMaterial.clone();
        const mesh = new THREE.Mesh(geo, mat);
        // Position between white keys
        const xOffset = (WHITE_WIDTH + WHITE_GAP) * 0.5;
        const xPos = START_X + whiteIdx * (WHITE_WIDTH + WHITE_GAP) + xOffset;
        mesh.position.set(xPos, 0.33, -0.18);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData = { noteIdx, isBlack };
        scene.add(mesh);

        const tGeo = new THREE.BoxGeometry(BLACK_WIDTH + 0.05, 0.6, BLACK_DEPTH + 0.1);
        const tMat = new THREE.MeshBasicMaterial({ visible: false });
        const target = new THREE.Mesh(tGeo, tMat);
        target.position.set(xPos, 0.4, -0.18);
        target.userData = { noteIdx, isBlack, mesh, origY: 0.33 };
        scene.add(target);
        clickTargets.push(target);
        keyMeshes.push({ mesh, group: null, origY: 0.33, noteIdx, isBlack, target });
      } else {
        whiteIdx++;
      }
    }

    // ─── Animations ──────────────────────────────────────────────────────────
    const keyAnim = {}; // noteIdx → { pressed, progress }

    function animateKey(noteIdx) {
      if (keyAnim[noteIdx] === undefined) {
        keyAnim[noteIdx] = { pressed: true, progress: 0 };
      } else {
        keyAnim[noteIdx].pressed = true;
        keyAnim[noteIdx].progress = 0;
      }
    }

    function releaseKey(noteIdx) {
      if (keyAnim[noteIdx] !== undefined) {
        keyAnim[noteIdx].pressed = false;
      }
    }

    // Particle burst on key press
    const particles = [];
    function spawnParticles(x, y, z, color) {
      const count = 12;
      const geo = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      const velocities = [];
      for (let i = 0; i < count; i++) {
        positions[i*3] = x;
        positions[i*3+1] = y;
        positions[i*3+2] = z;
        velocities.push(
          (Math.random() - 0.5) * 0.08,
          Math.random() * 0.06 + 0.02,
          (Math.random() - 0.5) * 0.08
        );
      }
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({ color, size: 0.06, transparent: true, opacity: 0.8 });
      const pts = new THREE.Points(geo, mat);
      scene.add(pts);
      particles.push({ pts, velocities, life: 1.0 });
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt * 2;
        if (p.life <= 0) {
          scene.remove(p.pts);
          p.pts.geometry.dispose();
          p.pts.material.dispose();
          particles.splice(i, 1);
          continue;
        }
        const positions = p.pts.geometry.attributes.position.array;
        for (let j = 0; j < p.velocities.length / 3; j++) {
          positions[j*3]   += p.velocities[j*3];
          positions[j*3+1] += p.velocities[j*3+1];
          positions[j*3+2] += p.velocities[j*3+2];
          p.velocities[j*3+1] -= 0.002; // gravity
        }
        p.pts.geometry.attributes.position.needsUpdate = true;
        p.pts.material.opacity = p.life;
      }
    }

    // ─── Input ───────────────────────────────────────────────────────────────
    const pressedKeys = new Set();

    function triggerNote(noteIdx) {
      if (pressedKeys.has(noteIdx)) return;
      pressedKeys.add(noteIdx);
      playNote(noteIdx);
      animateKey(noteIdx);
      const keyData = keyMeshes[noteIdx];
      if (keyData) {
        const isBlack = keyData.isBlack;
        keyData.mesh.material.emissive = new THREE.Color(isBlack ? 0x334488 : 0x443322);
        keyData.mesh.material.emissiveIntensity = 0.4;
        spawnParticles(
          keyData.mesh.position.x,
          keyData.mesh.position.y + 0.15,
          keyData.mesh.position.z,
          isBlack ? 0x4455cc : 0xffcc66
        );
      }
      setTimeout(() => {
        pressedKeys.delete(noteIdx);
        if (keyData) {
          keyData.mesh.material.emissive = new THREE.Color(0x000000);
          keyData.mesh.material.emissiveIntensity = 0;
        }
        releaseKey(noteIdx);
      }, 300);
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (KEY_MAP[key] !== undefined) {
        triggerNote(KEY_MAP[key]);
      }
    });

    // ─── Mouse / Touch ────────────────────────────────────────────────────────
    renderer.domElement.addEventListener('pointerdown', (e) => {
      pointer.x = (e.clientX / innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickTargets, false);
      if (hits.length > 0) {
        const { noteIdx } = hits[0].object.userData;
        triggerNote(noteIdx);
      }
    });

    // ─── GUI ─────────────────────────────────────────────────────────────────
    const gui = new GUI();
    gui.title('钢琴设置');
    gui.add(params, 'volume', 0, 1, 0.01).name('音量').onChange(v => {
      if (masterGain) masterGain.gain.value = v;
    });
    gui.add(params, 'waveform', ['sine', 'square', 'sawtooth', 'triangle']).name('音色').onChange();
    gui.add(params, 'reverb', 0, 1, 0.01).name('混响').onChange(v => {
      if (reverbGain) reverbGain.gain.value = v;
    });

    // ─── Resize ───────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ─── Render Loop ──────────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      const t = clock.getElapsedTime();

      // Animate pressed keys
      for (const { noteIdx } of keyMeshes) {
        const anim = keyAnim[noteIdx];
        if (!anim) continue;
        const keyData = keyMeshes[noteIdx];
        const mesh = keyData.mesh;

        if (anim.pressed) {
          anim.progress = Math.min(anim.progress + dt * 12, 1);
        } else {
          anim.progress = Math.max(anim.progress - dt * 6, 0);
        }

        const sinkAmount = keyData.isBlack ? 0.04 : 0.055;
        const rotAmount  = keyData.isBlack ? 0.08 : 0.06;

        const down = anim.progress;
        mesh.position.y = keyData.origY - sinkAmount * Math.sin(down * Math.PI * 0.5);
        mesh.rotation.x = rotAmount * Math.sin(down * Math.PI * 0.5);
      }

      // Subtle camera bob
      camera.position.y += Math.sin(t * 0.3) * 0.001;

      // Particles
      updateParticles(dt);

      // Rim light pulse
      rimLight.intensity = 1.8 + Math.sin(t * 0.8) * 0.4;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
