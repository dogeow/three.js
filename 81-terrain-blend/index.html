<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

// ─── Utils ────────────────────────────────────────────────────────────────────
function hash(x, y) {
  let n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return n - Math.floor(n);
}

function smoothNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const ux = fx * fx * (3 - 2 * fx);
  const uy = fy * fy * (3 - 2 * fy);
  const a = hash(ix,     iy    );
  const b = hash(ix + 1, iy    );
  const c = hash(ix,     iy + 1);
  const d = hash(ix + 1, iy + 1);
  return a + (b - a) * ux + (c - a) * uy + (a - b - c + d) * ux * uy;
}

function fbm(x, y, octaves, lacunarity = 2.0, gain = 0.5) {
  let val = 0, amp = 0.5, freq = 1.0;
  for (let i = 0; i < octaves; i++) {
    val += amp * smoothNoise(x * freq, y * freq);
    amp  *= gain;
    freq *= lacunarity;
  }
  return val;
}

// ─── River path ──────────────────────────────────────────────────────────────
function riverValue(x, z) {
  // A meandering river using multiple sine waves
  const t = (x + 100) / 200;
  const centerZ = Math.sin(t * Math.PI * 2.5) * 20
                 + Math.sin(t * Math.PI * 1.3 + 1.0) * 12
                 + Math.sin(t * Math.PI * 3.7 + 0.5) * 6;
  const dist = Math.abs(z - centerZ);
  // River width ~ 5 units, with soft banks
  const width = 5.0;
  if (dist < width) {
    const t2 = dist / width;
    return Math.pow(t2, 2.0); // 1 inside river, 0 at banks
  }
  return 0.0;
}

// ─── Terrain generation ───────────────────────────────────────────────────────
function generateTerrain(params) {
  const { size, segments, terrainScale, heightScale, octaves, waterLevel } = params;

  const geo = new THREE.PlaneGeometry(size, size, segments, segments);
  geo.rotateX(-Math.PI / 2);

  const pos = geo.attributes.position;
  const count = pos.count;

  // Build height map and river map
  const heights = new Float32Array(count);
  let minH = Infinity, maxH = -Infinity;

  for (let i = 0; i < count; i++) {
    const x = pos.getX(i);
    const z = pos.getZ(i);

    let h = fbm(x * terrainScale, z * terrainScale, octaves);

    // Carve river: lower terrain along river path
    const river = riverValue(x, z);
    const riverDepth = 3.0;
    h = h * (1.0 - river * riverDepth);

    // Shore gradient: flatten near water level
    const shoreFactor = Math.max(0, 1.0 - Math.abs(h - waterLevel / heightScale) * 6.0);
    h = h * (1.0 - shoreFactor * 0.3);

    h *= heightScale;
    heights[i] = h;
    if (h < minH) minH = h;
    if (h > maxH) maxH = h;
  }

  // Apply heights and compute vertex colors + normals
  const colorArr = new Float32Array(count * 4);

  for (let i = 0; i < count; i++) {
    const x = pos.getX(i);
    const y = heights[i];
    const z = pos.getZ(i);
    pos.setY(i, y);

    // Normalize height 0-1
    const h01 = (y - minH) / (maxH - minH);

    // Slope estimation from neighbors
    const dx = terrainScale * 2.0;
    const dz = terrainScale * 2.0;
    const hLx = fbm((x - dx) * terrainScale, z * terrainScale, octaves) * heightScale;
    const hRx = fbm((x + dx) * terrainScale, z * terrainScale, octaves) * heightScale;
    const hDz = fbm(x * terrainScale, (z - dz) * terrainScale, octaves) * heightScale;
    const hUz = fbm(x * terrainScale, (z + dz) * terrainScale, octaves) * heightScale;

    const river = riverValue(x, z);
    const riverDepth = 3.0;
    let hLx2 = hLx * (1.0 - river * riverDepth);
    let hRx2 = hRx * (1.0 - river * riverDepth);
    let hDz2 = hDz * (1.0 - river * riverDepth);
    let hUz2 = hUz * (1.0 - river * riverDepth);

    const nx = (hLx2 - hRx2) / (2.0 * dx);
    const nz = (hDz2 - hUz2) / (2.0 * dz);
    const slope = Math.sqrt(nx * nx + nz * nz);
    const slopeFactor = Math.min(1.0, slope * 15.0);

    // Biome thresholds
    // h01 ranges from ~0 to ~1 across the terrain
    let grass = 0, sand = 0, rock = 0, snow = 0, forest = 0;

    if (h01 < 0.12) {
      // Deep water
      sand = 1.0;
    } else if (h01 < 0.18) {
      // Shallow / beach
      const t = (h01 - 0.12) / 0.06;
      sand = 1.0 - t;
      grass = t;
    } else if (h01 < 0.65) {
      // Grassland
      grass = 1.0;
      if (h01 > 0.45) {
        // Forest transition
        const ft = (h01 - 0.45) / 0.2;
        forest = ft * 0.6;
        grass = 1.0 - ft * 0.6;
      }
    } else if (h01 < 0.82) {
      // Rock
      rock = 1.0;
    } else {
      // Snow peaks
      snow = 1.0;
    }

    // Rock on steep slopes (anywhere)
    if (slopeFactor > 0.3) {
      const rockWeight = (slopeFactor - 0.3) / 0.7;
      const blend = rockWeight * 0.7;
      rock = Math.max(rock, blend);
      grass = Math.max(0, grass * (1.0 - blend));
      forest = Math.max(0, forest * (1.0 - blend));
    }

    // River carve visual: water bed is sandy/rocky
    if (river > 0.5) {
      sand = river;
      grass = grass * (1.0 - river);
      forest = forest * (1.0 - river);
      rock = rock * (1.0 - river);
    }

    // Normalize to sum to ~1
    const total = grass + sand + rock + snow + forest;
    const inv = total > 0 ? 1.0 / total : 1.0;

    colorArr[i * 4    ] = grass  * inv;
    colorArr[i * 4 + 1] = sand   * inv;
    colorArr[i * 4 + 2] = rock   * inv;
    colorArr[i * 4 + 3] = (snow + forest * 0.5) * inv; // a channel: snow and forest share
  }

  geo.setAttribute('vertexColor', new THREE.BufferAttribute(colorArr, 4));
  geo.computeVertexNormals();

  return { geo, heights, minH, maxH };
}

// ─── Shaders ─────────────────────────────────────────────────────────────────
const vertexShader = `
  varying float vGrass;
  varying float vSand;
  varying float vRock;
  varying float vSnow;
  varying float vForest;
  varying vec3 vNormal;
  varying float vHeight;
  varying vec3 vWorldPos;
  varying float vRiver;

  attribute vec4 vertexColor;

  void main() {
    vGrass  = vertexColor.r;
    vSand   = vertexColor.g;
    vRock   = vertexColor.b;
    vSnow   = vertexColor.a * 0.6;
    vForest = vertexColor.a * 0.4;
    vNormal = normalMatrix * normal;
    vHeight = position.y;
    vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;

    // River detection
    float x = vWorldPos.x;
    float t = (x + 100.0) / 200.0;
    float riverCenter = sin(t * 3.14159 * 2.5) * 20.0
                       + sin(t * 3.14159 * 1.3 + 1.0) * 12.0
                       + sin(t * 3.14159 * 3.7 + 0.5) * 6.0;
    float dist = abs(vWorldPos.z - riverCenter);
    vRiver = 1.0 - smoothstep(0.0, 8.0, dist);

    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const fragmentShader = `
  uniform float uWaterLevel;
  uniform vec3  uLightDir;
  uniform bool  uShowWater;
  uniform bool  uShowVegetation;

  varying float vGrass;
  varying float vSand;
  varying float vRock;
  varying float vSnow;
  varying float vForest;
  varying vec3  vNormal;
  varying float vHeight;
  varying vec3  vWorldPos;
  varying float vRiver;

  float hash21(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
  }

  void main() {
    vec3 grassColor  = vec3(0.28, 0.52, 0.18);
    vec3 grass2Color = vec3(0.22, 0.45, 0.12);  // darker grass
    vec3 sandColor    = vec3(0.76, 0.70, 0.48);
    vec3 sandWetColor = vec3(0.65, 0.60, 0.40);
    vec3 rockColor    = vec3(0.42, 0.38, 0.32);
    vec3 rock2Color   = vec3(0.50, 0.45, 0.38);
    vec3 snowColor    = vec3(0.90, 0.92, 0.95);
    vec3 snow2Color   = vec3(0.85, 0.87, 0.90);
    vec3 waterColor   = vec3(0.08, 0.28, 0.48);
    vec3 waterDeep    = vec3(0.04, 0.18, 0.35);
    vec3 forestColor  = vec3(0.18, 0.38, 0.10);

    // Subtle noise for natural variation
    float n1 = hash21(vWorldPos.xz * 0.5);
    float n2 = hash21(vWorldPos.xz * 2.0);
    float n3 = hash21(vWorldPos.xz * 8.0);

    // Mix colors based on vertex color weights
    vec3 baseColor = vec3(0.0);
    baseColor += grassColor  * vGrass;
    baseColor += grass2Color * vForest * 0.7;
    baseColor += forestColor  * vForest * 0.3;
    baseColor += sandColor    * vSand;
    baseColor += rockColor    * vRock;
    baseColor += rock2Color   * vRock * n2 * 0.3;
    baseColor += snowColor    * vSnow;
    baseColor += snow2Color   * vSnow * n1 * 0.2;

    // Micro texture
    baseColor += (n3 - 0.5) * 0.03;

    // Slope-based rock blending (reinforce)
    vec3 up = vec3(0.0, 1.0, 0.0);
    float slope = 1.0 - abs(dot(normalize(vNormal), up));
    if (slope > 0.4) {
      float rockBlend = smoothstep(0.4, 0.85, slope) * 0.8;
      baseColor = mix(baseColor, rockColor, rockBlend);
    }

    // Wet sand near water
    if (vSand > 0.3) {
      float wetness = smoothstep(uWaterLevel + 2.0, uWaterLevel - 1.0, vHeight);
      baseColor = mix(baseColor, sandWetColor, wetness * vSand * 0.6);
    }

    // Water rendering
    vec3 finalColor = baseColor;
    float waterDepth = uWaterLevel - vHeight;
    if (uShowWater && vHeight < uWaterLevel) {
      float waterAlpha = smoothstep(uWaterLevel + 1.0, uWaterLevel - 3.0, vHeight);
      vec3 wc = mix(waterDeep, waterColor, smoothstep(0.0, 3.0, waterDepth));
      // Foam at edges
      float foam = smoothstep(uWaterLevel - 0.5, uWaterLevel + 0.2, vHeight);
      wc = mix(wc, vec3(0.85, 0.85, 0.80), foam * 0.5);
      finalColor = mix(baseColor, wc, waterAlpha * 0.85);
    }

    // Simple diffuse lighting
    vec3 lightDir = normalize(uLightDir);
    float diff = max(dot(normalize(vNormal), lightDir), 0.0);
    float amb = 0.35;
    finalColor *= (amb + (1.0 - amb) * diff);

    // Shore fog effect
    float shoreFog = smoothstep(uWaterLevel - 4.0, uWaterLevel + 1.0, vHeight) * 0.0;

    gl_FragColor = vec4(clamp(finalColor, 0.0, 1.0), 1.0);
  }
`;

// ─── Scene setup ─────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0x9ec5e8, 0.004);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 2000);
camera.position.set(0, 60, 120);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI * 0.5;
controls.minDistance = 20;
controls.maxDistance = 400;
controls.target.set(0, 0, 0);

// ─── Lights ───────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x8090b0, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
sunLight.position.set(80, 120, 60);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 500;
sunLight.shadow.camera.left = -150;
sunLight.shadow.camera.right = 150;
sunLight.shadow.camera.top = 150;
sunLight.shadow.camera.bottom = -150;
scene.add(sunLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x4a7c3f, 0.4);
scene.add(hemiLight);

// ─── Parameters ──────────────────────────────────────────────────────────────
const params = {
  terrainScale: 0.012,
  heightScale: 22,
  octaves: 6,
  waterLevel: 1.5,
  terrainSize: 200,
  segments: 200,
  grassDensity: 800,
  treeDensity: 180,
  showWater: true,
  showVegetation: true,
};

let uniforms = {
  uWaterLevel:    { value: params.waterLevel },
  uLightDir:      { value: new THREE.Vector3(0.5, 1.0, 0.3).normalize() },
  uShowWater:     { value: true },
  uShowVegetation:{ value: true },
};

let terrainMesh = null;
let grassMesh   = null;
let treeMesh    = null;
let waterMesh   = null;

// ─── Grass material ──────────────────────────────────────────────────────────
const grassVertShader = `
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  void main() {
    vNormal = normalMatrix * normal;
    vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const grassFragShader = `
  uniform vec3 uColor;
  uniform vec3 uLightDir;
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  void main() {
    float diff = max(dot(normalize(vNormal), normalize(uLightDir)), 0.0);
    vec3 col = uColor * (0.4 + 0.6 * diff);
    gl_FragColor = vec4(col, 1.0);
  }
`;

// ─── Tree material ────────────────────────────────────────────────────────────
const treeTrunkMat = new THREE.MeshLambertMaterial({ color: 0x5c3a1e });
const treeLeafMat  = new THREE.MeshLambertMaterial({ color: 0x2d6a2a });

// ─── Build terrain ─────────────────────────────────────────────────────────────
function buildTerrain() {
  // Remove old
  if (terrainMesh) scene.remove(terrainMesh);
  if (grassMesh)   scene.remove(grassMesh);
  if (treeMesh)    scene.remove(treeMesh);
  if (waterMesh)   scene.remove(waterMesh);

  const { geo, minH, maxH } = generateTerrain(params);

  const mat = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms,
    side: THREE.FrontSide,
  });

  terrainMesh = new THREE.Mesh(geo, mat);
  terrainMesh.receiveShadow = true;
  terrainMesh.castShadow = false;
  scene.add(terrainMesh);

  // Water plane
  const waterGeo = new THREE.PlaneGeometry(params.terrainSize * 2, params.terrainSize * 2, 1, 1);
  waterGeo.rotateX(-Math.PI / 2);
  const waterMat = new THREE.MeshPhongMaterial({
    color: 0x0a4a7a,
    transparent: true,
    opacity: 0.72,
    shininess: 100,
    specular: 0x4488bb,
  });
  waterMesh = new THREE.Mesh(waterGeo, waterMat);
  waterMesh.position.y = params.waterLevel;
  waterMesh.receiveShadow = true;
  scene.add(waterMesh);

  // Scatter grass
  buildGrass(minH, maxH);

  // Scatter trees
  buildTrees(minH, maxH);
}

function buildGrass(minH, maxH) {
  const count = params.grassDensity;
  const geo = new THREE.BoxGeometry(0.25, 0.5, 0.25);
  const mat = new THREE.ShaderMaterial({
    vertexShader: grassVertShader,
    fragmentShader: grassFragShader,
    uniforms: {
      uColor:    { value: new THREE.Color(0x3a6b1a) },
      uLightDir: uniforms.uLightDir,
    },
  });

  grassMesh = new THREE.InstancedMesh(geo, mat, count);
  grassMesh.castShadow = true;

  const dummy = new THREE.Object3D();
  let placed = 0;
  let attempts = 0;
  const hRange = maxH - minH;

  while (placed < count && attempts < count * 8) {
    attempts++;
    const x = (Math.random() - 0.5) * params.terrainSize * 0.85;
    const z = (Math.random() - 0.5) * params.terrainSize * 0.85;

    // Sample height at this location
    const h = fbm(x * params.terrainScale, z * params.terrainScale, params.octaves);
    const river = riverValue(x, z);
    const riverDepth = 3.0;
    const hAdj = h * (1.0 - river * riverDepth) * params.heightScale;

    const h01 = (hAdj - minH) / hRange;

    // Only on grass (h01 0.18-0.65), away from water and rivers
    if (h01 < 0.18 || h01 > 0.70) continue;
    if (hAdj < params.waterLevel + 1.5) continue;
    if (river > 0.3) continue;

    // Slope check
    const dx = params.terrainScale * 3;
    const hLx = fbm((x - dx) * params.terrainScale, z * params.terrainScale, params.octaves) * params.heightScale;
    const hRx = fbm((x + dx) * params.terrainScale, z * params.terrainScale, params.octaves) * params.heightScale;
    const hDz = fbm(x * params.terrainScale, (z - dx) * params.terrainScale, params.octaves) * params.heightScale;
    const hUz = fbm(x * params.terrainScale, (z + dx) * params.terrainScale, params.octaves) * params.heightScale;
    const slope = Math.sqrt(Math.pow((hLx - hRx) / (2 * dx), 2) + Math.pow((hDz - hUz) / (2 * dx), 2));
    if (slope > 0.4) continue;

    dummy.position.set(x, hAdj + 0.2, z);
    dummy.rotation.y = Math.random() * Math.PI * 2;
    dummy.scale.setScalar(0.6 + Math.random() * 0.8);
    dummy.updateMatrix();
    grassMesh.setMatrixAt(placed, dummy.matrix);
    placed++;
  }

  grassMesh.count = placed;
  grassMesh.instanceMatrix.needsUpdate = true;
  scene.add(grassMesh);
}

function buildTrees(minH, maxH) {
  const count = params.treeDensity;
  const trunkGeo  = new THREE.CylinderGeometry(0.3, 0.5, 3, 6);
  const leaf1Geo  = new THREE.ConeGeometry(2.5, 4, 7);
  const leaf2Geo  = new THREE.ConeGeometry(2.0, 3, 7);
  const leaf3Geo  = new THREE.ConeGeometry(1.2, 2, 6);

  // Build merged tree geometry
  const mergedGeo = new THREE.BufferGeometry();
  const geometries = [];

  const trunkMat = treeTrunkMat;
  const leafMat  = treeLeafMat;

  // We'll render trees as grouped mesh objects, not instanced mesh
  // since they have multiple parts. Use InstancedMesh with separate parts.

  // For simplicity, use simple cone trees
  const treeGroup = new THREE.Group();
  let placed = 0;
  let attempts = 0;
  const hRange = maxH - minH;

  while (placed < count && attempts < count * 6) {
    attempts++;
    const x = (Math.random() - 0.5) * params.terrainSize * 0.8;
    const z = (Math.random() - 0.5) * params.terrainSize * 0.8;

    const h = fbm(x * params.terrainScale, z * params.terrainScale, params.octaves);
    const river = riverValue(x, z);
    const hAdj = h * (1.0 - river * 3.0) * params.heightScale;
    const h01 = (hAdj - minH) / hRange;

    // Trees in forest/grass transition
    if (h01 < 0.20 || h01 > 0.68) continue;
    if (hAdj < params.waterLevel + 2.0) continue;
    if (river > 0.25) continue;

    // Slope check
    const dx = params.terrainScale * 3;
    const hLx = fbm((x - dx) * params.terrainScale, z * params.terrainScale, params.octaves) * params.heightScale;
    const hRx = fbm((x + dx) * params.terrainScale, z * params.terrainScale, params.octaves) * params.heightScale;
    const hDz = fbm(x * params.terrainScale, (z - dx) * params.terrainScale, params.octaves) * params.heightScale;
    const hUz = fbm(x * params.terrainScale, (z + dx) * params.terrainScale, params.octaves) * params.heightScale;
    const slope = Math.sqrt(Math.pow((hLx - hRx) / (2 * dx), 2) + Math.pow((hDz - hUz) / (2 * dx), 2));
    if (slope > 0.35) continue;

    // Tree mesh
    const scale = 0.6 + Math.random() * 0.8;
    const tree = new THREE.Group();

    const trunk = new THREE.Mesh(trunkGeo, treeTrunkMat);
    trunk.position.y = 1.5 * scale;
    trunk.scale.setScalar(scale);
    trunk.castShadow = true;
    tree.add(trunk);

    const leaf1 = new THREE.Mesh(leaf1Geo, treeLeafMat);
    leaf1.position.y = (3.0 + 2.0) * scale;
    leaf1.scale.setScalar(scale);
    leaf1.castShadow = true;
    tree.add(leaf1);

    const leaf2 = new THREE.Mesh(leaf2Geo, treeLeafMat.clone());
    leaf2.position.y = (3.0 + 4.5) * scale;
    leaf2.scale.setScalar(scale * 0.85);
    leaf2.castShadow = true;
    tree.add(leaf2);

    const leaf3 = new THREE.Mesh(leaf3Geo, treeLeafMat.clone());
    leaf3.position.y = (3.0 + 6.5) * scale;
    leaf3.scale.setScalar(scale * 0.6);
    leaf3.castShadow = true;
    tree.add(leaf3);

    tree.position.set(x, hAdj, z);
    tree.rotation.y = Math.random() * Math.PI * 2;
    scene.add(tree);
    placed++;
  }

  treeMesh = treeGroup;
}

// ─── GUI ─────────────────────────────────────────────────────────────────────
const gui = new GUI({ title: '地形材质混合 Terrain Blending' });

gui.add(params, 'terrainScale', 0.005, 0.05, 0.001).name('地形缩放 TerrainScale').onChange(rebuild);
gui.add(params, 'heightScale',   5, 50, 1).name('高度缩放 HeightScale').onChange(rebuild);
gui.add(params, 'octaves',      1, 7, 1).name('噪声倍频 Octaves').onChange(rebuild);
gui.add(params, 'waterLevel',  -5, 5, 0.1).name('水位 WaterLevel').onChange(v => {
  uniforms.uWaterLevel.value = v;
  if (waterMesh) waterMesh.position.y = v;
  rebuild();
});
gui.add(params, 'grassDensity',  0, 2000, 10).name('草密度 GrassDensity').onChange(rebuild);
gui.add(params, 'treeDensity',  0, 500, 5).name('树密度 TreeDensity').onChange(rebuild);
gui.add(params, 'showWater').name('显示水面 ShowWater').onChange(v => {
  uniforms.uShowWater.value = v;
  if (waterMesh) waterMesh.visible = v;
});
gui.add(params, 'showVegetation').name('显示植被 ShowVeg').onChange(v => {
  if (grassMesh) grassMesh.visible = v;
  scene.traverse(obj => {
    if (obj.isGroup || obj.isMesh) {
      // tree leaves and trunks
      if (obj !== terrainMesh && obj !== waterMesh && obj !== grassMesh) {
        obj.visible = v;
      }
    }
  });
});

function rebuild() {
  buildTerrain();
}

buildTerrain();

// ─── Animate ─────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Water shimmer
  if (waterMesh && params.showWater) {
    waterMesh.material.opacity = 0.65 + Math.sin(Date.now() * 0.001) * 0.05;
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
