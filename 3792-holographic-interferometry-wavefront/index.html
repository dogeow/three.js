<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOLOGRAPHIC INTERFEROMETRY</title>
<style>
body{margin:0;overflow:hidden;background:#000a0a;font-family:monospace}
canvas{display:block}
#panel{position:fixed;top:12px;left:12px;color:#0ff;font-size:12px;background:rgba(0,0,0,0.6);padding:10px;border-radius:4px;line-height:1.8}
#info{position:fixed;bottom:12px;left:12px;color:#0f8;font-size:12px;background:rgba(0,0,0,0.6);padding:8px;border-radius:4px}
</style>
</head>
<body>
<div id="panel"><b>Holographic Interferometry</b><br>Phase: <span id="phase">0.00</span> rad<br>Fringe order: <span id="order">0</span></div>
<div id="info">Coherent wave interference — double-exposure hologram reconstruction</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000a0a);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 8, 18);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.6, 0.4, 0.7));

const planeGeo = new THREE.PlaneGeometry(30, 30, 256, 256);
const planeMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uPhase: { value: 0 } },
    vertexShader: `varying vec2 vUv; varying vec3 vPos; void main(){ vUv=uv; vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `
        uniform float uTime; uniform float uPhase;
        varying vec2 vUv; varying vec3 vPos;
        void main(){
            float r = length(vPos.xy);
            float wave1 = sin(r*12.0-uTime*3.0);
            float wave2 = sin(r*12.0-uTime*3.0+uPhase);
            float interference = (wave1+wave2)*0.5;
            float fringe = 0.5+0.5*interference;
            vec3 col1 = vec3(0.0,0.4,0.8); vec3 col2 = vec3(0.0,0.8,0.4);
            vec3 col = mix(col1,col2,fringe);
            float alpha = smoothstep(15.0,12.0,r);
            gl_FragColor = vec4(col*fringe*1.5,alpha);
        }
    `,
    transparent: true, side: THREE.DoubleSide
});
const plane = new THREE.Mesh(planeGeo, planeMat);
plane.rotation.x = -Math.PI*0.35;
scene.add(plane);

const refSphere = new THREE.Mesh(new THREE.SphereGeometry(0.15,16,16),
    new THREE.MeshStandardMaterial({emissive:0x00ffff,emissiveIntensity:2}));
refSphere.position.set(0,0,5);
scene.add(refSphere);

scene.add(new THREE.GridHelper(40,40,0x003333,0x001a1a));
scene.add(new THREE.AmbientLight(0x112233));
const light = new THREE.PointLight(0x00ffff,2,50);
light.position.set(5,5,5); scene.add(light);

let t=0;
function animate(){
    requestAnimationFrame(animate);
    t+=0.016;
    planeMat.uniforms.uTime.value=t;
    planeMat.uniforms.uPhase.value=Math.sin(t*0.3)*Math.PI;
    document.getElementById('phase').textContent=planeMat.uniforms.uPhase.value.toFixed(2);
    document.getElementById('order').textContent=Math.floor(Math.abs(planeMat.uniforms.uPhase.value/Math.PI));
    controls.update(); composer.render();
}
animate();
</script></body></html>
