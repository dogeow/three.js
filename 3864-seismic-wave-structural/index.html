<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>级联阴影 CSM - Three.js</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a0f; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #info {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    color: #7ec8e3; font-size: 13px; text-align: center; pointer-events: none;
    text-shadow: 0 0 8px rgba(126,200,227,0.4);
  }
  #cascades {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; pointer-events: none;
  }
  .casc-badge {
    padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px; color: #0a0a0f;
  }
</style>
</head>
<body>
<div id="info">THREE.DirectionalLight · Cascaded Shadow Maps (CSM)<br>大场景级联阴影贴图 — 多个投影物体测试</div>
<div id="cascades"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSM } from 'three/addons/lights/CSM.js';
import { CSMHelper } from 'three/addons/lights/CSMHelper.js';

// ─── Renderer ───────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// ─── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.018);

// ─── Camera ──────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(30, 25, 30);
camera.lookAt(0, 0, 0);

// ─── Controls ────────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 5;
controls.maxDistance = 120;
controls.target.set(0, 1, 0);

// ─── Lights ──────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xfff4e0, 2.5);
dirLight.position.set(40, 60, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 200;
dirLight.shadow.camera.left = -60;
dirLight.shadow.camera.right = 60;
dirLight.shadow.camera.top = 60;
dirLight.shadow.camera.bottom = -60;
dirLight.shadow.bias = -0.0005;
scene.add(dirLight);

// ─── CSM Setup ───────────────────────────────────────────────────────────────
const csm = new CSM({
  maxFar: 200,
  cascades: 4,
  mode: 'practical',
  parent: scene,
  light: dirLight,
  shadowBias: -0.0005,
});
csm.fade = true;

// ─── Ground ──────────────────────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(120, 120, 80, 80);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x2a2d35,
  roughness: 0.92,
  metalness: 0.05,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
ground.castShadow = true;
scene.add(ground);
csm.includeObject(ground);

// ─── Helper Visual ───────────────────────────────────────────────────────────
const csmHelper = new CSMHelper(dirLight);
csmHelper.visible = false;
scene.add(csmHelper);

// ─── Buildings & Objects ────────────────────────────────────────────────────
const boxGeo  = new THREE.BoxGeometry(1, 1, 1);
const cylGeo  = new THREE.CylinderGeometry(0.5, 0.5, 1, 12);
const sphereGeo = new THREE.SphereGeometry(0.6, 16, 12);

const matStone = new THREE.MeshStandardMaterial({ color: 0x8a8f9a, roughness: 0.85 });
const matBrick = new THREE.MeshStandardMaterial({ color: 0x7a4f3a, roughness: 0.9 });
const matSteel = new THREE.MeshStandardMaterial({ color: 0x556677, roughness: 0.4, metalness: 0.7 });
const matGlass = new THREE.MeshStandardMaterial({ color: 0x88ccee, roughness: 0.1, metalness: 0.3, transparent: true, opacity: 0.7 });
const matGrass = new THREE.MeshStandardMaterial({ color: 0x3a5f2a, roughness: 1.0 });

const matArray = [matStone, matBrick, matSteel, matGlass];

function rand(min, max) { return Math.random() * (max - min) + min; }

// Tall buildings cluster (left zone)
for (let i = 0; i < 8; i++) {
  const h = rand(8, 22);
  const w = rand(2, 5);
  const d = rand(2, 5);
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = matArray[Math.floor(Math.random() * matArray.length)];
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(rand(-28, -8), h / 2, rand(-15, 15));
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  csm.includeObject(mesh);
}

// Mid buildings (center)
for (let i = 0; i < 12; i++) {
  const h = rand(3, 12);
  const geo = new THREE.BoxGeometry(rand(2, 6), h, rand(2, 6));
  const mat = matArray[Math.floor(Math.random() * matArray.length)];
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(rand(-8, 8), h / 2, rand(-15, 15));
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  csm.includeObject(mesh);
}

// Low structures (right zone)
for (let i = 0; i < 10; i++) {
  const h = rand(1, 5);
  const geo = new THREE.BoxGeometry(rand(3, 8), h, rand(3, 8));
  const mat = matArray[Math.floor(Math.random() * matArray.length)];
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(rand(10, 30), h / 2, rand(-15, 15));
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  csm.includeObject(mesh);
}

// Cylindrical pillars
for (let i = 0; i < 15; i++) {
  const h = rand(2, 10);
  const geo = new THREE.CylinderGeometry(rand(0.4, 1.2), rand(0.4, 1.2), h, 8);
  const mesh = new THREE.Mesh(geo, matStone);
  mesh.position.set(rand(-25, 25), h / 2, rand(-18, 18));
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  csm.includeObject(mesh);
}

// Spheres
for (let i = 0; i < 10; i++) {
  const r = rand(0.4, 1.5);
  const geo = new THREE.SphereGeometry(r, 16, 12);
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(Math.random() * 0.2 + 0.5, 0.5, 0.5),
    roughness: 0.5, metalness: 0.3
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(rand(-25, 25), r, rand(-18, 18));
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  csm.includeObject(mesh);
}

// Small house-like boxes
for (let i = 0; i < 6; i++) {
  const w = rand(4, 8), h = rand(3, 6), d = rand(4, 8);
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({ color: 0x9a8870, roughness: 0.88 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(rand(-30, -12), h / 2, rand(-18, 18));
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  csm.includeObject(mesh);

  // roof
  const roofGeo = new THREE.ConeGeometry(Math.max(w, d) * 0.8, 2.5, 4);
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x5a3020, roughness: 0.9 });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.set(mesh.position.x, h + 1.25, mesh.position.z);
  roof.rotation.y = Math.PI / 4;
  roof.castShadow = true;
  roof.receiveShadow = true;
  scene.add(roof);
  csm.includeObject(roof);
}

// ─── Cascade Badge UI ─────────────────────────────────────────────────────────
const badgeColors = ['#e05050', '#e09030', '#50b050', '#4080d0'];
const badges = document.getElementById('cascades');
badgeColors.forEach((c, i) => {
  const b = document.createElement('span');
  b.className = 'casc-badge';
  b.style.background = c;
  b.textContent = `级联 ${i + 1}`;
  badges.appendChild(b);
});

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Keyboard ─────────────────────────────────────────────────────────────────
window.addEventListener('keydown', (e) => {
  if (e.key === 'h' || e.key === 'H') csmHelper.visible = !csmHelper.visible;
});

// ─── Animate ──────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();

  // Slight light movement to showcase cascades dynamically
  dirLight.position.x = 40 + Math.sin(t * 0.08) * 8;
  dirLight.position.z = 20 + Math.cos(t * 0.08) * 8;

  csm.update(renderer);

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
