<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>162 · 波函数塌缩 Wave Function Collapse</title>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a14; }
  canvas { display: block; }
  .tip {
    position: fixed; top: 12px; left: 12px;
    color: #e2e8f0; font: 14px/1.65 -apple-system, sans-serif;
    background: rgba(10,10,20,0.85); padding: 10px 14px; border-radius: 10px;
    max-width: 340px; backdrop-filter: blur(10px);
    border: 1px solid rgba(99,102,241,0.3);
  }
  .tip b { color: #818cf8; }
  .panel {
    position: fixed; top: 12px; right: 12px;
    background: rgba(10,10,20,0.85); border: 1px solid rgba(99,102,241,0.3);
    border-radius: 12px; padding: 14px; backdrop-filter: blur(10px); width: 200px;
  }
  .panel h3 { margin: 0 0 8px; font-size: 12px; color: #818cf8; letter-spacing: 0.08em; text-transform: uppercase; }
  .stat { font-size: 12px; color: #64748b; margin-bottom: 8px; }
  .stat span { color: #818cf8; font-weight: 600; }
  .btn {
    display: block; width: 100%; padding: 8px; margin-top: 6px;
    background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
    color: #818cf8; border-radius: 8px; cursor: pointer; font-size: 13px;
    transition: background 0.15s;
  }
  .btn:hover { background: rgba(99,102,241,0.3); }
</style>
</head>
<body>

<div class="tip">
  <b>技术点：波函数塌缩 (WFC) ★</b><br>
  · 从小图块逐步塌缩生成程序化地牢<br>
  · 每步可视化塌缩动画，观察熵降低过程<br>
  · 3D 堆叠展示最终地图，用颜色区分房间类型
</div>

<div class="panel">
  <h3>⚡ WFC 发生器</h3>
  <div class="stat">种子：<span id="seedDisplay">—</span></div>
  <div class="stat">尺寸：<span id="sizeDisplay">—</span></div>
  <div class="stat">步骤：<span id="stepDisplay">0</span></div>
  <div class="stat">完成：<span id="doneDisplay">0%</span></div>
  <button class="btn" id="runBtn">▶ 启动塌缩</button>
  <button class="btn" id="resetBtn">↺ 重置</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { GUI } from 'three/addons/libs/lil-gui.module.min.js'

// ─── Scene Setup ───────────────────────────────────────────────
const scene = new THREE.Scene()
scene.background = new THREE.Color(0x0a0a14)

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 1000)
camera.position.set(12, 18, 12)
camera.lookAt(0, 0, 0)

const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setPixelRatio(devicePixelRatio)
renderer.setSize(innerWidth, innerHeight)
renderer.shadowMap.enabled = true
renderer.shadowMap.type = THREE.PCFSoftShadowMap
document.body.appendChild(renderer.domElement)

const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping = true
controls.dampingFactor = 0.05

// ─── Lighting ──────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x404060, 0.6)
scene.add(ambientLight)

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2)
dirLight.position.set(10, 20, 10)
dirLight.castShadow = true
dirLight.shadow.mapSize.set(2048, 2048)
dirLight.shadow.camera.near = 1
dirLight.shadow.camera.far = 50
dirLight.shadow.camera.left = -20
dirLight.shadow.camera.right = 20
dirLight.shadow.camera.top = 20
dirLight.shadow.camera.bottom = -20
scene.add(dirLight)

// ─── Tile definitions ────────────────────────────────────────
// 0=floor, 1=wall, 2=door, 3=empty
const TILE_COLORS = [0x4ade80, 0xf87171, 0xfbbf24, 0x1e1b4b]
const TILE_NAMES = ['Floor', 'Wall', 'Door', 'Empty']

// Adjacency rules: for each tile type, which neighbors are allowed
// [N, E, S, W]
const ADJACENCY = {
  0: { 0: [0,1,2,3], 1: [0,2], 2: [0,1,2,3], 3: [0,1,2,3] }, // floor
  1: { 0: [0,2], 1: [1,2], 2: [1], 3: [1,2] },               // wall
  2: { 0: [0,1,3], 1: [0,3], 2: [0,1,3], 3: [0,1,3] },       // door
  3: { 0: [0,1,2,3], 1: [1,2], 2: [0,1,2,3], 3: [1,2] }      // empty
}

// ─── WFC State ────────────────────────────────────────────────
let GRID_W = 12
let GRID_H = 12
let grid = []           // grid[y][x] = { possible: [0,1,2,3], collapsed: false, value: null }
let meshMap = new Map() // "x,y" -> mesh
let stepCount = 0
let totalCells = 0
let collapsedCells = 0
let running = false
let stepTimer = null
let group = null

// ─── GUI ───────────────────────────────────────────────────────
const gui = new GUI()
const params = {
  gridSize: 12,
  speed: 8,
  autoRun: false,
  wallHeight: 2,
  seed: Math.floor(Math.random() * 99999)
}
gui.add(params, 'gridSize', 6, 20, 1).name('网格尺寸')
gui.add(params, 'speed', 1, 30, 1).name('动画速度')
gui.add(params, 'wallHeight', 0.5, 5, 0.1).name('墙高度')
gui.add(params, 'autoRun').name('自动运行')
gui.add(params, 'seed', 0, 99999, 1).name('随机种子')

// ─── Grid Init ─────────────────────────────────────────────────
function initGrid() {
  grid = []
  for (let y = 0; y < GRID_H; y++) {
    grid[y] = []
    for (let x = 0; x < GRID_W; x++) {
      grid[y][x] = { possible: [0, 1, 2, 3], collapsed: false, value: null }
    }
  }
  totalCells = GRID_W * GRID_H
  collapsedCells = 0
  stepCount = 0
  document.getElementById('stepDisplay').textContent = '0'
  document.getElementById('doneDisplay').textContent = '0%'
  document.getElementById('seedDisplay').textContent = params.seed
  document.getElementById('sizeDisplay').textContent = `${GRID_W}×${GRID_H}`
}

function seededRandom(seed) {
  let s = seed
  return function() {
    s = (s * 9301 + 49297) % 233280
    return s / 233280
  }
}

const rng = seededRandom(params.seed)

// ─── Build 3D scene ────────────────────────────────────────────
function buildScene() {
  if (group) scene.remove(group)
  group = new THREE.Group()
  scene.add(group)

  // Ground plane
  const groundGeo = new THREE.PlaneGeometry(GRID_W + 4, GRID_H + 4)
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.9 })
  const ground = new THREE.Mesh(groundGeo, groundMat)
  ground.rotation.x = -Math.PI / 2
  ground.position.set(GRID_W / 2 - 0.5, -0.05, GRID_H / 2 - 0.5)
  ground.receiveShadow = true
  group.add(ground)

  // Grid
  for (let y = 0; y < GRID_H; y++) {
    for (let x = 0; x < GRID_W; x++) {
      const cell = grid[y][x]
      const key = `${x},${y}`
      meshMap.set(key, null)

      if (!cell.collapsed) continue

      const value = cell.value
      if (value === 3) continue // empty

      const geo = new THREE.BoxGeometry(0.92, value === 1 ? params.wallHeight : 0.15, 0.92)
      const mat = new THREE.MeshStandardMaterial({
        color: TILE_COLORS[value],
        roughness: value === 1 ? 0.7 : 0.3,
        metalness: value === 2 ? 0.5 : 0.0
      })
      const mesh = new THREE.Mesh(geo, mat)
      mesh.position.set(x, value === 1 ? params.wallHeight / 2 : 0.075, y)
      mesh.castShadow = true
      mesh.receiveShadow = true
      group.add(mesh)
      meshMap.set(key, mesh)

      // Door frame
      if (value === 2) {
        const frameGeo = new THREE.BoxGeometry(0.92, 0.15, 0.92)
        const frameMat = new THREE.MeshStandardMaterial({ color: 0xfbbf24, roughness: 0.3, metalness: 0.8 })
        const frame = new THREE.Mesh(frameGeo, frameMat)
        frame.position.set(x, 0.075, y)
        frame.castShadow = true
        group.add(frame)
      }
    }
  }

  // Update camera
  const maxDim = Math.max(GRID_W, GRID_H)
  camera.position.set(maxDim * 0.9, maxDim * 1.4, maxDim * 0.9)
  camera.lookAt(GRID_W / 2, 0, GRID_H / 2)
}

// ─── WFC Step ──────────────────────────────────────────────────
function wfcStep() {
  // Find cell with lowest entropy (fewest possibilities, not collapsed)
  let minEntropy = Infinity
  let candidates = []

  for (let y = 0; y < GRID_H; y++) {
    for (let x = 0; x < GRID_W; x++) {
      const cell = grid[y][x]
      if (cell.collapsed) continue
      const e = cell.possible.length
      if (e < minEntropy) {
        minEntropy = e
        candidates = [{ x, y }]
      } else if (e === minEntropy) {
        candidates.push({ x, y })
      }
    }
  }

  if (candidates.length === 0) {
    running = false
    clearInterval(stepTimer)
    return
  }

  // Pick random from candidates
  const pick = candidates[Math.floor(rng() * candidates.length)]
  const cell = grid[pick.y][pick.x]

  // Collapse
  const chosen = cell.possible[Math.floor(rng() * cell.possible.length)]
  cell.collapsed = true
  cell.value = chosen
  cell.possible = [chosen]
  collapsedCells++

  // Propagate
  const stack = [pick]
  while (stack.length > 0) {
    const { x, y } = stack.pop()
    const cell2 = grid[y][x]
    if (!cell2.collapsed) continue

    // Check 4 neighbors
    const dirs = [{ nx: x, ny: y - 1, dir: 0 }, { nx: x + 1, ny: y, dir: 1 },
                  { nx: x, ny: y + 1, dir: 2 }, { nx: x - 1, ny: y, dir: 3 }]
    for (const { nx, ny, dir } of dirs) {
      if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H) continue
      const neighbor = grid[ny][nx]
      if (neighbor.collapsed) continue

      const allowed = ADJACENCY[cell2.value][dir]
      const newPossible = neighbor.possible.filter(v => allowed.includes(v))
      if (newPossible.length === 0) {
        // contradiction — reset this neighbor
        neighbor.possible = [0, 1, 2, 3]
      } else if (newPossible.length < neighbor.possible.length) {
        neighbor.possible = newPossible
        stack.push({ x: nx, y: ny })
      }
    }
  }

  // Update UI
  stepCount++
  document.getElementById('stepDisplay').textContent = stepCount
  document.getElementById('doneDisplay').textContent = Math.round(collapsedCells / totalCells * 100) + '%'

  // Rebuild changed cells only
  for (let y = 0; y < GRID_H; y++) {
    for (let x = 0; x < GRID_W; x++) {
      const cell2 = grid[y][x]
      if (!cell2.collapsed) continue
      const key = `${x},${y}`
      const oldMesh = meshMap.get(key)
      if (oldMesh) {
        group.remove(oldMesh)
        oldMesh.geometry.dispose()
        oldMesh.material.dispose()
      }
      if (cell2.value === 3) { meshMap.set(key, null); continue }

      const geo = new THREE.BoxGeometry(0.92, cell2.value === 1 ? params.wallHeight : 0.15, 0.92)
      const mat = new THREE.MeshStandardMaterial({
        color: TILE_COLORS[cell2.value],
        roughness: cell2.value === 1 ? 0.7 : 0.3,
        metalness: cell2.value === 2 ? 0.5 : 0.0,
        emissive: TILE_COLORS[cell2.value],
        emissiveIntensity: 0.05
      })
      const mesh = new THREE.Mesh(geo, mat)
      mesh.position.set(x, cell2.value === 1 ? params.wallHeight / 2 : 0.075, y)
      mesh.castShadow = true
      mesh.receiveShadow = true
      group.add(mesh)
      meshMap.set(key, mesh)
    }
  }
}

// ─── Reset / Run ───────────────────────────────────────────────
function reset() {
  if (stepTimer) clearInterval(stepTimer)
  running = false
  GRID_W = params.gridSize
  GRID_H = params.gridSize
  initGrid()
  buildScene()
  document.getElementById('runBtn').textContent = '▶ 启动塌缩'
}

function toggleRun() {
  if (running) {
    clearInterval(stepTimer)
    running = false
    document.getElementById('runBtn').textContent = '▶ 继续'
  } else {
    running = true
    document.getElementById('runBtn').textContent = '⏸ 暂停'
    stepTimer = setInterval(wfcStep, 1200 / params.speed)
  }
}

document.getElementById('runBtn').addEventListener('click', () => {
  if (!running && collapsedCells === 0) {
    GRID_W = params.gridSize
    GRID_H = params.gridSize
    initGrid()
    buildScene()
  }
  toggleRun()
})
document.getElementById('resetBtn').addEventListener('click', reset)

// ─── Resize ────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight
  camera.updateProjectionMatrix()
  renderer.setSize(innerWidth, innerHeight)
})

// ─── Init ──────────────────────────────────────────────────────
reset()
if (params.autoRun) document.getElementById('runBtn').click()

// ─── Animate ───────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate)
  controls.update()
  renderer.render(scene, camera)
}
animate()
</script>
</body>
</html>
