<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>CRYSTAL GROWTH EVAPORATION</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#03010a}
canvas{display:block}
#info{position:fixed;bottom:14px;left:14px;color:rgba(200,180,255,0.5);font-size:12px}
</style>
</head>
<body>
<div id="info">Crystal Growth — Click to add seed crystals | MeshPhysicalMaterial refraction</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x03010a);
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,200);
camera.position.set(0,8,20);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.2,0.5,0.6));

scene.add(new THREE.AmbientLight(0x221133,2));
const pl=new THREE.PointLight(0x8844ff,3,50);pl.position.set(5,12,5);scene.add(pl);
const pl2=new THREE.PointLight(0x4488ff,2,40);pl2.position.set(-8,5,-5);scene.add(pl2);

const crystals=[];
const MAX_CRYSTALS=80;

function makeCrystal(x,y,z,size,hex){
    const geo=new THREE.CylinderGeometry(size*0.15,size*0.5,size*6,6);
    const mat=new THREE.MeshPhysicalMaterial({
        color:hex,metalness:0.0,roughness:0.05,
        transmission:0.7,thickness:size*2,ior:2.4,
        transparent:true,opacity:0.9,envMapIntensity:2.0
    });
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(x,y,z);
    const angle=Math.random()*Math.PI*2;
    mesh.rotation.z=Math.random()*0.3-0.15;
    mesh.rotation.y=angle;
    mesh.userData={size,hex,angle,vx:(Math.random()-0.5)*0.01,vy:Math.random()*0.02+0.005,vrot:(Math.random()-0.5)*0.02};
    scene.add(mesh);
    crystals.push(mesh);
    return mesh;
}

for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2;
    const r=Math.random()*6;
    makeCrystal(Math.cos(a)*r,0,Math.sin(a)*r,0.3+Math.random()*0.3,0x8844ff);
}

const ray=new THREE.Raycaster();
const m=new THREE.Vector2();
const plane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
const hit=new THREE.Vector3();

window.addEventListener('click',e=>{
    m.x=(e.clientX/innerWidth)*2-1;
    m.y=-(e.clientY/innerHeight)*2+1;
    ray.setFromCamera(m,camera);
    ray.ray.intersectPlane(plane,hit);
    if(crystals.length<MAX_CRYSTALS){
        const h=Math.random()>0.5?0x8844ff:0x4488ff;
        makeCrystal(hit.x,0,hit.z,0.2+Math.random()*0.4,h);
    }
});

function animate(){
    requestAnimationFrame(animate);
    const t=performance.now()*0.001;
    crystals.forEach(c=>{
        const ud=c.userData;
        if(c.position.y<ud.size*4){
            c.position.y+=ud.vy;
            c.rotation.y+=ud.vrot;
            c.scale.setScalar(Math.min(1.2,c.position.y/(ud.size*4)*1.2));
        }
    });
    pl.position.x=Math.sin(t*0.5)*8;
    pl.position.z=Math.cos(t*0.4)*8;
    pl2.position.x=Math.cos(t*0.3)*6;
    pl2.position.z=Math.sin(t*0.6)*6;
    controls.update();
    composer.render();
}
animate();
window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
