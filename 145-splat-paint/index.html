<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Paint Splat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
    canvas { display: block; }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 10;
    }

    #tip {
      background: rgba(0,0,0,0.7);
      color: #ccc;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 260px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #panel {
      background: rgba(0,0,0,0.7);
      padding: 14px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .row label {
      color: #ccc;
      font-size: 13px;
      min-width: 60px;
    }

    input[type="color"] {
      width: 40px;
      height: 30px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      padding: 0;
      background: none;
    }

    input[type="range"] {
      flex: 1;
      cursor: pointer;
      accent-color: #6c5ce7;
    }

    #sizeVal {
      color: #ccc;
      font-size: 12px;
      min-width: 30px;
      text-align: right;
    }

    button {
      background: #6c5ce7;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #5a4ad1; }
    button:active { background: #4834c4; }

    #count {
      color: #999;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="tip">Click on the wall to throw paint.<br>Drag to orbit. Scroll to zoom.</div>
    <div id="panel">
      <div class="row">
        <label>Color</label>
        <input type="color" id="colorPicker" value="#e74c3c" />
      </div>
      <div class="row">
        <label>Size</label>
        <input type="range" id="sizeSlider" min="20" max="200" value="80" />
        <span id="sizeVal">80</span>
      </div>
      <div class="row">
        <button id="undoBtn">Undo</button>
        <button id="clearBtn">Clear All</button>
      </div>
      <div id="count">Splats: 0</div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    // Camera
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 12);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    scene.add(dirLight);

    const fillLight = new THREE.PointLight(0x6c5ce7, 0.4, 30);
    fillLight.position.set(-5, 5, -5);
    scene.add(fillLight);

    // Wall
    const wallGeo = new THREE.PlaneGeometry(20, 15, 1, 1);
    const wallMat = new THREE.MeshStandardMaterial({
      color: 0xdddddd,
      roughness: 0.8,
      metalness: 0.1,
      side: THREE.DoubleSide,
    });
    const wall = new THREE.Mesh(wallGeo, wallMat);
    wall.rotation.x = 0;
    wall.receiveShadow = true;
    scene.add(wall);

    // Floor (for shadow reference)
    const floorGeo = new THREE.PlaneGeometry(30, 30);
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x222222,
      roughness: 1,
      metalness: 0,
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -7.5;
    floor.receiveShadow = true;
    scene.add(floor);

    // Raycaster
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // Splat collection
    const splats = [];
    let splatsGroup = new THREE.Group();
    scene.add(splatsGroup);

    // UI elements
    const colorPicker = document.getElementById('colorPicker');
    const sizeSlider = document.getElementById('sizeSlider');
    const sizeVal = document.getElementById('sizeVal');
    const undoBtn = document.getElementById('undoBtn');
    const clearBtn = document.getElementById('clearBtn');
    const countEl = document.getElementById('count');

    sizeSlider.addEventListener('input', () => {
      sizeVal.textContent = sizeSlider.value;
    });

    // Generate splat canvas texture
    function createSplatTexture(color, size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, size, size);

      // Parse color
      const r = parseInt(color.slice(1, 3), 16);
      const g = parseInt(color.slice(3, 5), 16);
      const b = parseInt(color.slice(5, 7), 16);

      // Darken color for edge
      const darkR = Math.max(0, r - 40);
      const darkG = Math.max(0, g - 40);
      const darkB = Math.max(0, b - 40);

      const cx = size / 2;
      const cy = size / 2;
      const baseRadius = size * 0.42;

      // Draw main blob with irregular edge
      ctx.beginPath();
      const segments = 24;
      for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        const variance = 0.7 + Math.random() * 0.6;
        const rx = baseRadius * variance;
        const ry = baseRadius * (0.7 + Math.random() * 0.6);
        const x = cx + Math.cos(angle) * rx;
        const y = cy + Math.sin(angle) * ry;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();

      const grad = ctx.createRadialGradient(cx - size * 0.1, cy - size * 0.1, 0, cx, cy, baseRadius * 1.2);
      grad.addColorStop(0, `rgba(${r},${g},${b},1)`);
      grad.addColorStop(0.6, `rgba(${r},${g},${b},0.9)`);
      grad.addColorStop(1, `rgba(${darkR},${darkG},${darkB},0.7)`);
      ctx.fillStyle = grad;
      ctx.fill();

      // Draw drips and smaller blobs
      const dripCount = Math.floor(Math.random() * 4) + 2;
      for (let d = 0; d < dripCount; d++) {
        const dx = (Math.random() - 0.5) * baseRadius * 1.5;
        const dy = (Math.random() - 0.5) * baseRadius * 1.5;
        const dr = baseRadius * (0.15 + Math.random() * 0.25);

        ctx.beginPath();
        const dSegs = 12;
        for (let i = 0; i <= dSegs; i++) {
          const a = (i / dSegs) * Math.PI * 2;
          const v = 0.7 + Math.random() * 0.6;
          const x = cx + dx + Math.cos(a) * dr * v;
          const y = cy + dy + Math.sin(a) * dr * v * 0.8;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = `rgba(${r},${g},${b},0.85)`;
        ctx.fill();
      }

      // Tiny specks
      const specks = Math.floor(Math.random() * 8) + 4;
      for (let s = 0; s < specks; s++) {
        const sx = cx + (Math.random() - 0.5) * baseRadius * 2.2;
        const sy = cy + (Math.random() - 0.5) * baseRadius * 2.2;
        const sr = baseRadius * (0.03 + Math.random() * 0.06);
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${0.4 + Math.random() * 0.4})`;
        ctx.fill();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    function updateCount() {
      countEl.textContent = `Splats: ${splats.length}`;
    }

    function addSplat(point, normal) {
      const size = parseInt(sizeSlider.value);
      const color = colorPicker.value;
      const texture = createSplatTexture(color, size);

      const geo = new THREE.PlaneGeometry(size * 0.07, size * 0.07);
      const mat = new THREE.MeshStandardMaterial({
        map: texture,
        transparent: true,
        depthWrite: false,
        side: THREE.DoubleSide,
      });
      const mesh = new THREE.Mesh(geo, mat);

      mesh.position.copy(point);

      // Align to wall surface
      mesh.lookAt(point.clone().add(normal));

      // Random rotation around normal
      mesh.rotateZ(Math.random() * Math.PI * 2);

      mesh.castShadow = true;

      mesh.userData.splatIndex = splats.length;
      splatsGroup.add(mesh);
      splats.push(mesh);
      updateCount();
    }

    // Click handler
    function onPointerDown(event) {
      if (event.button !== 0) return;

      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(wall);

      if (intersects.length > 0) {
        const hit = intersects[0];
        addSplat(hit.point, hit.face.normal);
      }
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    // Undo
    undoBtn.addEventListener('click', () => {
      if (splats.length === 0) return;
      const last = splats.pop();
      splatsGroup.remove(last);
      last.geometry.dispose();
      last.material.dispose();
      if (last.material.map) last.material.map.dispose();
      updateCount();
    });

    // Clear all
    clearBtn.addEventListener('click', () => {
      splats.forEach(s => {
        s.geometry.dispose();
        s.material.dispose();
        if (s.material.map) s.material.map.dispose();
        splatsGroup.remove(s);
      });
      splats.length = 0;
      updateCount();
    });

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    // Attach to window for debugging
    window.scene = scene;
    window.camera = camera;
    window.renderer = renderer;
    window.controls = controls;
    window.splats = splats;

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
