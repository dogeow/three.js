<!DOCTYPE html>
<!--
  Holographic Audio Visualizer
  A 3D audio visualizer featuring frequency bars arranged in a spiral/helix pattern
  with holographic Fresnel-style rendering, scan line effects, and floating particles.
  Supports microphone input or audio file upload.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holographic Audio Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #0ff;
    }
    canvas { display: block; }
    #ui {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
    }
    .btn {
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid #0ff;
      color: #0ff;
      padding: 10px 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      letter-spacing: 1px;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .btn:hover {
      background: rgba(0, 255, 255, 0.25);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
    }
    .btn.active {
      background: rgba(0, 255, 255, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
    }
    #fileInput { display: none; }
    #info {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 11px;
      color: rgba(0, 255, 255, 0.5);
      letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none;
    }
    #audioStatus {
      position: fixed;
      top: 15px;
      right: 15px;
      font-size: 11px;
      color: rgba(0, 255, 255, 0.5);
      letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">Holographic Audio Visualizer</div>
  <div id="audioStatus">No Audio</div>
  <div id="ui">
    <button class="btn" id="micBtn">Use Microphone</button>
    <button class="btn" id="fileBtn">Upload Audio</button>
    <input type="file" id="fileInput" accept="audio/*">
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

    // ═══════════════════════════════════════════════════════════════
    // CONFIGURATION
    // ═══════════════════════════════════════════════════════════════
    const params = {
      sensitivity: 1.8,
      barCount: 64,
      rotationSpeed: 0.4,
      colorScheme: 'Cyber',
      spiralRadius: 5,
      spiralHeight: 8,
      particleCount: 800,
      particleSpeed: 0.015,
      scanLineSpeed: 0.08,
      barThickness: 0.12,
    };

    const colorSchemes = {
      Cyber:   { primary: new THREE.Color(0x00ffff), secondary: new THREE.Color(0xff00ff), tertiary: new THREE.Color(0x00ff88) },
      Plasma:  { primary: new THREE.Color(0xff0066), secondary: new THREE.Color(0x6600ff), tertiary: new THREE.Color(0xffaa00) },
      Aurora:  { primary: new THREE.Color(0x00ff66), secondary: new THREE.Color(0x0066ff), tertiary: new THREE.Color(0xff00aa) },
      Mono:    { primary: new THREE.Color(0xffffff), secondary: new THREE.Color(0x88ffff), tertiary: new THREE.Color(0xffffff) },
      Inferno: { primary: new THREE.Color(0xff4400), secondary: new THREE.Color(0xff0066), tertiary: new THREE.Color(0xffff00) },
    };

    // ═══════════════════════════════════════════════════════════════
    // SCENE SETUP
    // ═══════════════════════════════════════════════════════════════
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000814, 0.035);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 6, 14);
    camera.lookAt(0, 3, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxDistance = 30;
    controls.minDistance = 3;

    // ═══════════════════════════════════════════════════════════════
    // SCAN LINE BACKGROUND PLANE (ShaderMaterial)
    // ═══════════════════════════════════════════════════════════════
    const scanLineVert = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;
    const scanLineFrag = `
      uniform float uTime;
      uniform vec3 uColor;
      varying vec2 vUv;

      void main() {
        float scan = sin(vUv.y * 180.0 - uTime * 3.0) * 0.5 + 0.5;
        float grid = sin(vUv.x * 80.0) * 0.5 + 0.5;
        grid = pow(grid, 18.0);
        scan = pow(scan, 6.0) * 0.12;
        float alpha = (scan + grid * 0.04);
        gl_FragColor = vec4(uColor, alpha * 0.6);
      }
    `;
    const scanMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uColor: { value: new THREE.Color(0x00ffff) },
      },
      vertexShader: scanLineVert,
      fragmentShader: scanLineFrag,
      transparent: true,
      side: THREE.DoubleSide,
    });
    const scanPlane = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), scanMat);
    scanPlane.position.y = 0;
    scanPlane.rotation.x = -Math.PI / 2;
    scene.add(scanPlane);

    // ═══════════════════════════════════════════════════════════════
    // HOLOGRAPHIC BAR SPIRAL
    // ═══════════════════════════════════════════════════════════════
    const helixGroup = new THREE.Group();
    scene.add(helixGroup);

    const bars = [];
    const barGeometries = [];
    let currentBarCount = params.barCount;

    function createBars(count) {
      // Remove old bars
      bars.forEach(b => helixGroup.remove(b));
      bars.length = 0;

      for (let i = 0; i < count; i++) {
        const t = i / count;
        const angle = t * Math.PI * 6;
        const radius = params.spiralRadius;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const y = t * params.spiralHeight - params.spiralHeight * 0.15;

        const geo = new THREE.BoxGeometry(params.barThickness, 1, params.barThickness);
        const mat = new THREE.MeshBasicMaterial({
          color: new THREE.Color(0x00ffff),
          transparent: true,
          opacity: 0.75,
        });

        const bar = new THREE.Mesh(geo, mat);
        bar.position.set(x, y, z);
        bar.rotation.y = -angle;
        bar.userData.baseY = y;
        bar.userData.angle = angle;
        bar.userData.t = t;

        helixGroup.add(bar);
        bars.push(bar);
      }
    }

    createBars(currentBarCount);

    // ═══════════════════════════════════════════════════════════════
    // PARTICLES
    // ═══════════════════════════════════════════════════════════════
    const particleCount = params.particleCount;
    const particleGeo = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleSpeeds = new Float32Array(particleCount);
    const particleSources = new Float32Array(particleCount);

    for (let i = 0; i < particleCount; i++) {
      resetParticle(i, true);
    }

    function resetParticle(i, randomY = false) {
      const barIdx = i % bars.length;
      const bar = bars[barIdx];
      if (!bar) return;

      const spread = 0.3;
      particlePositions[i * 3]     = bar.position.x + (Math.random() - 0.5) * spread;
      particlePositions[i * 3 + 1] = randomY ? Math.random() * params.spiralHeight : bar.position.y + 0.5;
      particlePositions[i * 3 + 2] = bar.position.z + (Math.random() - 0.5) * spread;
      particleSpeeds[i] = params.particleSpeed * (0.5 + Math.random() * 1.5);
      particleSources[i] = barIdx;
    }

    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

    const particleVert = `
      attribute float aSpeed;
      varying float vAlpha;
      void main() {
        vAlpha = 0.3 + sin(aSpeed * 10.0) * 0.2;
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = (3.0 / -mvPos.z) * 80.0;
        gl_Position = projectionMatrix * mvPos;
      }
    `;
    const particleFrag = `
      uniform vec3 uColor;
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        float glow = 1.0 - d * 2.0;
        glow = pow(glow, 2.0);
        gl_FragColor = vec4(uColor, glow * vAlpha);
      }
    `;
    const particleMat = new THREE.ShaderMaterial({
      uniforms: { uColor: { value: new THREE.Color(0x00ffff) } },
      vertexShader: particleVert,
      fragmentShader: particleFrag,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // ═══════════════════════════════════════════════════════════════
    // GLOW RING AT BASE
    // ═══════════════════════════════════════════════════════════════
    const ringGeo = new THREE.TorusGeometry(params.spiralRadius + 0.2, 0.05, 8, 80);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.4 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = -0.5;
    scene.add(ring);

    // ═══════════════════════════════════════════════════════════════
    // AUDIO SETUP
    // ═══════════════════════════════════════════════════════════════
    let audioContext, analyser, dataArray, audioSource;
    let useMic = false;
    let audioPlaying = false;

    async function initMicrophone() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 512;
        analyser.smoothingTimeConstant = 0.8;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        audioSource = audioContext.createMediaStreamSource(stream);
        audioSource.connect(analyser);
        useMic = true;
        audioPlaying = true;
        document.getElementById('audioStatus').textContent = 'Microphone Active';
        document.getElementById('micBtn').classList.add('active');
      } catch (e) {
        console.warn('Microphone access denied:', e);
        document.getElementById('audioStatus').textContent = 'Mic Denied';
      }
    }

    function loadAudioFile(file) {
      if (audioContext) audioContext.close();
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.82;
      dataArray = new Uint8Array(analyser.frequencyBinCount);

      const reader = new FileReader();
      reader.onload = async (e) => {
        const buffer = await audioContext.decodeAudioData(e.target.result);
        if (audioSource) audioSource.stop();
        audioSource = audioContext.createBufferSource();
        audioSource.buffer = buffer;
        audioSource.loop = true;
        audioSource.connect(analyser);
        analyser.connect(audioContext.destination);
        audioSource.start();
        useMic = false;
        audioPlaying = true;
        document.getElementById('audioStatus').textContent = `Playing: ${file.name}`;
      };
      reader.readAsArrayBuffer(file);
    }

    // Fallback demo mode (no audio)
    function getDemoFrequency(index, total) {
      const t = performance.now() * 0.001;
      const wave = Math.sin(t * 1.5 + index * 0.15) * 0.5 + 0.5;
      const pulse = Math.sin(t * 0.7 + index * 0.08) * 0.3 + 0.7;
      return wave * pulse * Math.random() * 0.4;
    }

    // ═══════════════════════════════════════════════════════════════
    // COLOR UPDATE
    // ═══════════════════════════════════════════════════════════════
    function updateColors() {
      const scheme = colorSchemes[params.colorScheme];
      scanMat.uniforms.uColor.value = scheme.primary;
      particleMat.uniforms.uColor.value = scheme.primary;
      ringMat.color = scheme.primary;
    }

    // ═══════════════════════════════════════════════════════════════
    // GUI
    // ═══════════════════════════════════════════════════════════════
    const gui = new GUI({ title: 'Holographic Controls' });
    gui.add(params, 'sensitivity', 0.2, 4.0).name('Sensitivity');
    gui.add(params, 'barCount', 16, 128).step(1).name('Bar Count').onChange(v => {
      currentBarCount = v;
      createBars(currentBarCount);
    });
    gui.add(params, 'rotationSpeed', 0, 2.0).name('Rotation Speed');
    gui.add(params, 'spiralRadius', 2, 10).name('Spiral Radius').onChange(() => createBars(currentBarCount));
    gui.add(params, 'spiralHeight', 3, 15).name('Spiral Height').onChange(() => createBars(currentBarCount));
    gui.add(params, 'particleSpeed', 0.002, 0.05).name('Particle Speed');
    gui.add(params, 'colorScheme', Object.keys(colorSchemes)).name('Color Scheme').onChange(updateColors);
    gui.add(params, 'barThickness', 0.05, 0.3).name('Bar Thickness').onChange(() => createBars(currentBarCount));

    // ═══════════════════════════════════════════════════════════════
    // UI EVENTS
    // ═══════════════════════════════════════════════════════════════
    document.getElementById('micBtn').addEventListener('click', () => {
      initMicrophone();
    });
    document.getElementById('fileBtn').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });
    document.getElementById('fileInput').addEventListener('change', (e) => {
      if (e.target.files[0]) loadAudioFile(e.target.files[0]);
    });

    // ═══════════════════════════════════════════════════════════════
    // ANIMATION LOOP
    // ═══════════════════════════════════════════════════════════════
    const clock = new THREE.Clock();
    let globalTime = 0;

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      globalTime += delta;

      controls.update();

      // Rotate helix
      helixGroup.rotation.y += params.rotationSpeed * 0.005;

      // Get frequency data
      let freqData = null;
      if (analyser && audioPlaying) {
        analyser.getByteFrequencyData(dataArray);
        freqData = dataArray;
      }

      // Update scan line shader
      scanMat.uniforms.uTime.value = globalTime;

      // Color cycling
      const scheme = colorSchemes[params.colorScheme];
      const colorPhase = globalTime * 0.5;

      // Update bars
      bars.forEach((bar, i) => {
        let freq = 0;
        if (freqData) {
          const binIndex = Math.floor((i / bars.length) * (freqData.length * 0.6));
          freq = (freqData[binIndex] || 0) / 255.0;
        } else {
          freq = getDemoFrequency(i, bars.length);
        }

        const height = Math.max(0.05, freq * params.sensitivity * 6.0);
        bar.scale.y = height;
        bar.position.y = bar.userData.baseY + height * 0.5;

        // Holographic color shift
        const phase = bar.userData.t * Math.PI * 4 + colorPhase;
        const r = Math.sin(phase) * 0.5 + 0.5;
        const g = Math.sin(phase + Math.PI * 0.66) * 0.5 + 0.5;
        const b = Math.sin(phase + Math.PI * 1.33) * 0.5 + 0.5;

        const col = new THREE.Color();
        if (params.colorScheme === 'Cyber') {
          col.r = scheme.primary.r * (0.6 + r * 0.4);
          col.g = scheme.secondary.g * (0.5 + g * 0.5);
          col.b = scheme.tertiary.b * (0.5 + b * 0.5);
        } else if (params.colorScheme === 'Mono') {
          col.r = 0.7 + r * 0.3;
          col.g = 0.85 + g * 0.15;
          col.b = 0.9 + b * 0.1;
        } else {
          col.r = scheme.primary.r * (0.5 + r * 0.5);
          col.g = scheme.primary.g * (0.4 + g * 0.6);
          col.b = scheme.primary.b * (0.5 + b * 0.5);
        }
        bar.material.color = col;
        bar.material.opacity = 0.55 + freq * 0.35;

        // Fresnel-ish edge glow simulation via slight scale
        bar.rotation.y = bar.userData.angle - helixGroup.rotation.y;
      });

      // Update particles
      const posArr = particleGeo.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        posArr[i * 3 + 1] += particleSpeeds[i] * (1.0 + (freqData ? (freqData[Math.floor((i / particleCount) * 60)] || 0) / 255.0 : 0.5));

        if (posArr[i * 3 + 1] > params.spiralHeight + 1.5) {
          resetParticle(i, false);
        }
      }
      particleGeo.attributes.position.needsUpdate = true;

      // Pulse ring
      ring.scale.x = 1.0 + Math.sin(globalTime * 2.0) * 0.02;
      ring.scale.z = 1.0 + Math.sin(globalTime * 2.0) * 0.02;
      ring.material.opacity = 0.2 + Math.sin(globalTime * 1.5) * 0.15;

      renderer.render(scene, camera);
    }

    animate();

    // ═══════════════════════════════════════════════════════════════
    // RESIZE
    // ═══════════════════════════════════════════════════════════════
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
