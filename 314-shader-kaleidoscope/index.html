<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>314 - Shader Kaleidoscope</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    .info {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(120, 80, 255, 0.3);
      border-radius: 10px;
      padding: 14px 18px;
      color: #d0b8ff;
      z-index: 100;
      min-width: 210px;
    }
    .info h1 { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: #e0ccff; }
    .info p  { font-size: 12px; opacity: 0.75; line-height: 1.5; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="info">
    <h1>314 Shader Kaleidoscope</h1>
    <p>GLSL angular symmetry patterns.<br>Move mouse to shift center.</p>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

    // ── Renderer ──────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // ── Scene & Camera ───────────────────────────────────────────────────────
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.minDistance = 2;
    controls.maxDistance = 20;

    // ── Kaleidoscope Shader ───────────────────────────────────────────────────
    const vertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      precision highp float;
      uniform float uTime;
      uniform vec2  uResolution;
      uniform vec2  uMouse;
      uniform float uSymmetry;
      uniform float uNoiseScale;
      uniform float uSpeed;
      uniform float uHueOffset;
      varying vec2 vUv;

      #define PI 3.14159265358979

      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }
      float noise(vec2 p) {
        vec2 i = floor(p); vec2 f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(hash(i), hash(i+vec2(1,0)), u.x),
                   mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
      }
      float fbm(vec2 p, int octaves) {
        float v = 0.0, a = 0.5, freq = 1.0;
        for (int i = 0; i < 6; i++) {
          if (i >= octaves) break;
          v += a * noise(p * freq);
          a *= 0.5; freq *= 2.0;
        }
        return v;
      }

      vec3 hsv2rgb(vec3 c) {
        vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
        vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
        return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
      }

      void main() {
        vec2 uv = vUv - 0.5;
        uv.x *= uResolution.x / uResolution.y;

        vec2 mouse = uMouse * 0.5;
        vec2 center = uv - mouse * 0.4;

        float r = length(center);
        float angle = atan(center.y, center.x);

        float sym = uSymmetry;
        float seg = 2.0 * PI / sym;
        angle = mod(angle, seg);
        angle = abs(angle - seg * 0.5);

        vec2 finalUv = vec2(cos(angle), sin(angle)) * r;

        float t = uTime * uSpeed * 0.4;
        float n = fbm(finalUv * uNoiseScale + vec2(t * 0.8, t * 0.6), 5);
        float n2 = fbm(finalUv * uNoiseScale * 1.8 + vec2(-t * 0.5, t * 0.7), 4);
        float pattern = n * 0.6 + n2 * 0.4;

        float hue = fract(pattern * 1.5 + uHueOffset + t * 0.05);
        float sat = 0.85;
        float val = 0.9 + 0.1 * sin(pattern * 12.0);

        vec3 col = hsv2rgb(vec3(hue, sat, val));

        // Ring glow
        float ring = sin(r * 8.0 - t * 3.0 + pattern * 4.0) * 0.5 + 0.5;
        col += ring * 0.2 * hsv2rgb(vec3(fract(hue + 0.3), 0.7, 1.0));

        // Vignette
        float vig = 1.0 - smoothstep(0.3, 1.0, r);
        col *= vig;

        gl_FragColor = vec4(col, 1.0);
      }
    `;

    const params = {
      symmetry: 8,
      noiseScale: 6.0,
      speed: 1.0,
      hueOffset: 0.0,
    };

    const uniforms = {
      uTime:       { value: 0 },
      uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      uMouse:      { value: new THREE.Vector2(0, 0) },
      uSymmetry:   { value: params.symmetry },
      uNoiseScale: { value: params.noiseScale },
      uSpeed:      { value: params.speed },
      uHueOffset:  { value: params.hueOffset },
    };

    const material = new THREE.ShaderMaterial({
      uniforms,
      vertexShader,
      fragmentShader,
      side: THREE.DoubleSide,
    });

    const plane = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), material);
    scene.add(plane);

    // ── GUI ───────────────────────────────────────────────────────────────────
    const gui = new GUI();
    gui.add(params, 'symmetry', 4, 16, 1).name('Symmetry').onChange(v => uniforms.uSymmetry.value = v);
    gui.add(params, 'noiseScale', 1, 20, 0.5).name('Noise Scale').onChange(v => uniforms.uNoiseScale.value = v);
    gui.add(params, 'speed', 0, 3, 0.05).name('Speed').onChange(v => uniforms.uSpeed.value = v);
    gui.add(params, 'hueOffset', 0, 1, 0.01).name('Hue Offset').onChange(v => uniforms.uHueOffset.value = v);

    // ── Mouse ─────────────────────────────────────────────────────────────────
    window.addEventListener('mousemove', (e) => {
      uniforms.uMouse.value.set(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
      );
    });

    // ── Resize ────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
    });

    // ── Animate ───────────────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      uniforms.uTime.value = clock.getElapsedTime();
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
