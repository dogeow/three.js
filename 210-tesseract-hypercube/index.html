<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4D Tesseract Hypercube — Three.js</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    canvas { display: block; }
    #overlay {
      position: fixed;
      top: 20px;
      left: 24px;
      color: rgba(160, 180, 255, 0.75);
      font-size: 13px;
      line-height: 1.6;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 0 12px rgba(100, 140, 255, 0.4);
    }
    #overlay h1 {
      margin: 0 0 6px;
      font-size: 16px;
      font-weight: 600;
      color: rgba(200, 220, 255, 0.9);
      letter-spacing: 0.05em;
    }
    #overlay p { margin: 0; opacity: 0.7; }
    #fps {
      position: fixed;
      bottom: 16px;
      left: 24px;
      color: rgba(120, 160, 255, 0.5);
      font-size: 11px;
      pointer-events: none;
      z-index: 10;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="overlay">
    <h1>Tesseract Hypercube</h1>
    <p>4D wireframe projected into 3D<br />Drag to orbit &bull; Adjust params ↓</p>
  </div>
  <div id="fps">FPS: —</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'three/addons/libs/lil-gui.module.min.js';

    // ─── Scene setup ───────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x0a0a0f, 1);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.add(new THREE.AmbientLight(0x334466, 0.6));

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 0, 9);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;

    // ─── 4D Helpers ────────────────────────────────────────────────────────
    // A tesseract has 16 vertices in 4D; we generate all edges between
    // vertices that differ in exactly one coordinate.
    function generateTesseractVertices(size = 2.0) {
      const h = size / 2;
      const verts = [];
      for (let i = 0; i < 16; i++) {
        const x = (i & 1) ? h : -h;
        const y = (i & 2) ? h : -h;
        const z = (i & 4) ? h : -h;
        const w = (i & 8) ? h : -h;
        verts.push(new THREE.Vector4(x, y, z, w));
      }
      return verts;
    }

    function generateTesseractEdges() {
      const edges = [];
      for (let i = 0; i < 16; i++) {
        for (let j = i + 1; j < 16; j++) {
          const xor = i ^ j;
          // exactly one bit differs → edge
          if ((xor & (xor - 1)) === 0) {
            edges.push([i, j]);
          }
        }
      }
      return edges; // 32 edges total
    }

    // Apply a 4D rotation (XY, XZ, XW, YZ, YW, ZW planes)
    function rotate4D(vec, params) {
      const { xy, xz, xw, yz, yw, zw } = params;
      const cos = Math.cos, sin = Math.sin;
      let { x, y, z, w } = vec;

      let nx = x, ny = y, nz = z, nw = w;

      // XY plane
      if (xy) {
        const c = cos(xy), s = sin(xy);
        [nx, ny] = [c * nx - s * ny, s * nx + c * ny];
      }
      // XZ plane
      if (xz) {
        const c = cos(xz), s = sin(xz);
        [nx, nz] = [c * nx - s * nz, s * nx + c * nz];
      }
      // XW plane
      if (xw) {
        const c = cos(xw), s = sin(xw);
        [nx, nw] = [c * nx - s * nw, s * nx + c * nw];
      }
      // YZ plane
      if (yz) {
        const c = cos(yz), s = sin(yz);
        [ny, nz] = [c * ny - s * nz, s * ny + c * nz];
      }
      // YW plane
      if (yw) {
        const c = cos(yw), s = sin(yw);
        [ny, nw] = [c * ny - s * nw, s * ny + c * nw];
      }
      // ZW plane
      if (zw) {
        const c = cos(zw), s = sin(zw);
        [nz, nw] = [c * nz - s * nw, s * nz + c * nw];
      }

      return new THREE.Vector4(nx, ny, nz, nw);
    }

    // Project a 4D point to 3D: perspective in W, then drop W
    function project4Dto3D(vec4, params) {
      const { projDist, projMode } = params;
      let { x, y, z, w } = vec4;

      if (projMode === 'perspective') {
        const denom = projDist - w;
        if (Math.abs(denom) < 0.001) return new THREE.Vector3(x, y, z);
        const scale = projDist / denom;
        x *= scale; y *= scale; z *= scale;
      }
      // 'orthographic' just drops W
      return new THREE.Vector3(x, y, z);
    }

    // ─── Tesseract builder ────────────────────────────────────────────────
    const TESSERACT_SIZE = 2.2;
    const baseVerts4D = generateTesseractVertices(TESSERACT_SIZE);
    const baseEdges = generateTesseractEdges();

    // Color palette for inner cells
    const CELL_COLORS = [
      0x4488ff,
      0x44ffaa,
      0xff8844,
      0xaa44ff,
      0xff44aa,
      0x88ff44,
      0x44aaff,
      0xff4488,
    ];

    // We'll create 2 concentric tesseracts: outer and inner
    function buildTesseractGeo(verts4D, rotParams, projParams, color, opacity) {
      const positions = [];
      const colors = [];

      for (const [a, b] of baseEdges) {
        const pA = project4Dto3D(rotate4D(verts4D[a], rotParams), projParams);
        const pB = project4Dto3D(rotate4D(verts4D[b], rotParams), projParams);
        positions.push(pA.x, pA.y, pA.z, pB.x, pB.y, pB.z);

        const c = new THREE.Color(color);
        colors.push(c.r, c.g, c.b, c.r, c.g, c.b);
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      return geo;
    }

    // Create multiple hypercube cells at different 4D offsets
    const NUM_CELLS = 5;
    const hypercubes = [];

    const group = new THREE.Group();
    scene.add(group);

    // Shared rotation params (will be modified each frame)
    const rotParams = { xy: 0, xz: 0, xw: 0, yz: 0, yw: 0, zw: 0 };
    const projParams = { projDist: 4, projMode: 'perspective' };

    for (let ci = 0; ci < NUM_CELLS; ci++) {
      const color = CELL_COLORS[ci % CELL_COLORS.length];
      const scale = 0.6 + ci * 0.28; // 0.6, 0.88, 1.16, 1.44, 1.72
      const wOffset = (ci - NUM_CELLS / 2) * 0.6; // -1.2 .. +1.2

      const verts4D = baseVerts4D.map(v => new THREE.Vector4(v.x * scale, v.y * scale, v.z * scale, v.w + wOffset));

      const geo = buildTesseractGeo(verts4D, rotParams, projParams, color, 1.0);
      const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.85, depthWrite: false });
      const lines = new THREE.LineSegments(geo, mat);
      group.add(lines);

      hypercubes.push({ lines, geo, verts4D, scale, wOffset, color });
    }

    // ─── GUI ───────────────────────────────────────────────────────────────
    const params = {
      speed: 1.0,
      projMode: 'perspective',
      projDist: 4.0,
      // Individual plane rotations (as phase offsets)
      phaseXY: 0.0,
      phaseXZ: Math.PI / 4,
      phaseXW: Math.PI / 3,
      phaseYZ: Math.PI / 5,
      phaseYW: Math.PI / 6,
      phaseZW: Math.PI / 7,
      showCells: true,
      groupRotX: 0,
      groupRotY: 0,
    };

    const gui = new GUI({ title: 'Tesseract Controls' });
    gui.add(params, 'speed', 0, 3, 0.01).name('Speed');
    gui.add(params, 'projMode', ['perspective', 'orthographic']).name('Projection').onChange(() => {
      projParams.projMode = params.projMode;
    });
    gui.add(params, 'projDist', 1, 12, 0.1).name('Proj Distance').onChange(() => {
      projParams.projDist = params.projDist;
    });
    gui.add(params, 'phaseXY', 0, Math.PI * 2, 0.01).name('Phase XY');
    gui.add(params, 'phaseXZ', 0, Math.PI * 2, 0.01).name('Phase XZ');
    gui.add(params, 'phaseXW', 0, Math.PI * 2, 0.01).name('Phase XW');
    gui.add(params, 'phaseYZ', 0, Math.PI * 2, 0.01).name('Phase YZ');
    gui.add(params, 'phaseYW', 0, Math.PI * 2, 0.01).name('Phase YW');
    gui.add(params, 'phaseZW', 0, Math.PI * 2, 0.01).name('Phase ZW');
    gui.add(params, 'groupRotX', 0, Math.PI * 2, 0.01).name('Group X').onChange(v => group.rotation.x = v);
    gui.add(params, 'groupRotY', 0, Math.PI * 2, 0.01).name('Group Y').onChange(v => group.rotation.y = v);
    gui.add(params, 'showCells').name('Show Cells').onChange(v => {
      group.visible = v;
    });

    // ─── Animation ─────────────────────────────────────────────────────────
    let clock = new THREE.Clock();
    let frameCount = 0;
    let fpsTime = 0;
    const fpsEl = document.getElementById('fps');

    function updateHypercubeGeometry(hc, t) {
      const { verts4D } = hc;
      const positions = [];
      const colors = [];

      const p = {
        xy: params.speed * t * 0.7 + params.phaseXY,
        xz: params.speed * t * 0.5 + params.phaseXZ,
        xw: params.speed * t * 0.9 + params.phaseXW,
        yz: params.speed * t * 0.4 + params.phaseYZ,
        yw: params.speed * t * 0.6 + params.phaseYW,
        zw: params.speed * t * 0.3 + params.phaseZW,
      };

      for (const [a, b] of baseEdges) {
        const pA = project4Dto3D(rotate4D(verts4D[a], p), projParams);
        const pB = project4Dto3D(rotate4D(verts4D[b], p), projParams);
        positions.push(pA.x, pA.y, pA.z, pB.x, pB.y, pB.z);

        const c = new THREE.Color(hc.color);
        colors.push(c.r, c.g, c.b, c.r, c.g, c.b);
      }

      hc.geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      hc.geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      hc.geo.attributes.position.needsUpdate = true;
      hc.geo.attributes.color.needsUpdate = true;
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      // FPS counter
      frameCount++;
      fpsTime += delta;
      if (fpsTime >= 0.5) {
        fpsEl.textContent = `FPS: ${Math.round(frameCount / fpsTime)}`;
        frameCount = 0;
        fpsTime = 0;
      }

      // Update each hypercube
      for (const hc of hypercubes) {
        updateHypercubeGeometry(hc, elapsed);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // ─── Resize ────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Debug mounts ──────────────────────────────────────────────────────
    window.THREE = THREE;
    window.scene = scene;
    window.camera = camera;
    window.renderer = renderer;
    window.hypercubes = hypercubes;
    window.params = params;
    window.projParams = projParams;
    window.group = group;
    window.baseEdges = baseEdges;
    window.baseVerts4D = baseVerts4D;

    console.log('[Tesseract] Debug objects mounted:', Object.keys(window).filter(k => !k.startsWith('_')));
  </script>
</body>
</html>
