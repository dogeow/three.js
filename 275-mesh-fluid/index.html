<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesh Fluid Surface</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
    #tip {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(10, 10, 20, 0.85);
      color: #8af;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(100, 150, 255, 0.2);
      max-width: 320px;
      line-height: 1.6;
      pointer-events: none;
    }
    #tip strong { color: #acf; }
  </style>
</head>
<body>
<div id="tip">
  <strong>Mesh Fluid Surface</strong><br>
  Click anywhere on the water to create ripples.<br>
  Wave equation: d²z/dt² = c²(∇²z) - damping · dz/dt<br>
  Vertices displaced per-frame on CPU.
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

// --- Params ---
const params = {
  damping: 0.985,
  waveSpeed: 0.5,
  resolution: 128,
  particleCount: 2000
};

// --- Scene ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.018);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 18, 30);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxDistance = 80;
controls.minDistance = 5;

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0x112244, 0.8);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(10, 30, 10);
dirLight.castShadow = true;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0x4488ff, 1.5, 60);
pointLight.position.set(-10, 15, -10);
scene.add(pointLight);

// --- Fluid Mesh ---
let segments = params.resolution;
let size = 40;
let geometry = new THREE.PlaneGeometry(size, size, segments, segments);
geometry.rotateX(-Math.PI / 2);

const vertexCount = geometry.attributes.position.count;
const positions = geometry.attributes.position;
const posArray = positions.array;

const heightMap = new Float32Array(vertexCount);
const prevHeight = new Float32Array(vertexCount);
const velocity = new Float32Array(vertexCount);

// Color attribute for vertex colors
const colors = new Float32Array(vertexCount * 3);
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const material = new THREE.MeshPhongMaterial({
  vertexColors: true,
  shininess: 80,
  specular: new THREE.Color(0x3366ff),
  side: THREE.DoubleSide
});

const mesh = new THREE.Mesh(geometry, material);
mesh.receiveShadow = true;
scene.add(mesh);

// Grid helper (subtle)
const grid = new THREE.GridHelper(size, segments, 0x111133, 0x111133);
grid.position.y = -0.05;
scene.add(grid);

// --- Particles ---
const particleGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(params.particleCount * 3);
const particleHeights = new Float32Array(params.particleCount);

function resetParticle(i) {
  const x = (Math.random() - 0.5) * size * 0.9;
  const z = (Math.random() - 0.5) * size * 0.9;
  particlePositions[i * 3] = x;
  particlePositions[i * 3 + 1] = 2;
  particlePositions[i * 3 + 2] = z;
  particleHeights[i] = 0;
}

for (let i = 0; i < params.particleCount; i++) {
  resetParticle(i);
  particlePositions[i * 3 + 1] = getHeightAt(particlePositions[i * 3], particlePositions[i * 3 + 2]) + 0.5;
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

const particleMaterial = new THREE.PointsMaterial({
  color: 0x88ccff,
  size: 0.15,
  transparent: true,
  opacity: 0.7,
  sizeAttenuation: true
});

const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

function getHeightAt(x, z) {
  const half = size / 2;
  const nx = Math.round(((x + half) / size) * segments);
  const nz = Math.round(((z + half) / size) * segments);
  if (nx < 0 || nx > segments || nz < 0 || nz > segments) return 0;
  return heightMap[nz * (segments + 1) + nx];
}

// --- Wave Simulation ---
function addRipple(wx, wz, strength = 1.5) {
  const half = size / 2;
  const nx = Math.round(((wx + half) / size) * segments);
  const nz = Math.round(((wz + half) / size) * segments);
  if (nx < 0 || nx > segments || nz < 0 || nz > segments) return;

  const idx = nz * (segments + 1) + nx;
  velocity[idx] += strength;
  // Also affect neighbors slightly
  const neighbors = [
    [nx - 1, nz], [nx + 1, nz], [nx, nz - 1], [nx, nz + 1]
  ];
  neighbors.forEach(([nx2, nz2]) => {
    if (nx2 >= 0 && nx2 <= segments && nz2 >= 0 && nz2 <= segments) {
      velocity[nz2 * (segments + 1) + nx2] += strength * 0.5;
    }
  });
}

function updateWave(dt) {
  const c2 = params.waveSpeed * params.waveSpeed;
  const seg = segments + 1;

  // Wave equation: acc = c2 * laplacian - damping * velocity
  const newHeight = new Float32Array(vertexCount);

  for (let nz = 1; nz < segments; nz++) {
    for (let nx = 1; nx < segments; nx++) {
      const i = nz * seg + nx;
      const left = heightMap[i - 1];
      const right = heightMap[i + 1];
      const up = heightMap[i - seg];
      const down = heightMap[i + seg];
      const laplacian = (left + right + up + down) / 4 - heightMap[i];

      velocity[i] += c2 * laplacian;
      velocity[i] *= params.damping;
      newHeight[i] = heightMap[i] + velocity[i] * dt;
    }
  }

  // Apply gravity (center sags)
  const centerForce = -0.001;
  for (let nz = 0; nz <= segments; nz++) {
    for (let nx = 0; nx <= segments; nx++) {
      const i = nz * seg + nx;
      const cx = (nx / segments - 0.5) * size;
      const cz = (nz / segments - 0.5) * size;
      const dist = Math.sqrt(cx * cx + cz * cz);
      const maxDist = size * 0.4;
      if (dist < maxDist) {
        velocity[i] += centerForce * (1 - dist / maxDist);
      }
    }
  }

  heightMap.set(newHeight);

  // Update mesh vertices
  for (let i = 0; i < vertexCount; i++) {
    posArray[i * 3 + 1] = heightMap[i];

    // Vertex color based on height
    const h = heightMap[i];
    const t = Math.max(0, Math.min(1, (h + 2) / 4));

    // Blue to cyan to white
    const r = t * 0.3 + 0.05;
    const g = t * 0.5 + 0.2;
    const b = t * 0.5 + 0.5;
    colors[i * 3] = r;
    colors[i * 3 + 1] = g;
    colors[i * 3 + 2] = b;
  }

  positions.needsUpdate = true;
  geometry.attributes.color.needsUpdate = true;
  geometry.computeVertexNormals();
}

function updateParticles() {
  const pos = particleGeometry.attributes.position.array;
  for (let i = 0; i < params.particleCount; i++) {
    const x = pos[i * 3];
    const z = pos[i * 3 + 2];
    const h = getHeightAt(x, z);
    pos[i * 3 + 1] = h + 0.3 + Math.sin(Date.now() * 0.003 + i) * 0.05;
  }
  particleGeometry.attributes.position.needsUpdate = true;
}

// --- Mouse Interaction ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObject(mesh);
  if (intersects.length > 0) {
    const pt = intersects[0].point;
    addRipple(pt.x, pt.z, 2.0);
  }
});

// --- GUI ---
const gui = new GUI();
gui.add(params, 'damping', 0.9, 0.999, 0.001).name('Damping');
gui.add(params, 'waveSpeed', 0.1, 2.0, 0.05).name('Wave Speed');
gui.add(params, 'resolution', 32, 256, 16).name('Resolution').onChange((v) => {
  // Rebuild geometry (simple approach: page reload for now, or we can live-rebuild)
  segments = v;
  geometry.dispose();
  const newGeo = new THREE.PlaneGeometry(size, size, segments, segments);
  newGeo.rotateX(-Math.PI / 2);

  const newPosArray = newGeo.attributes.position.array;
  const newVC = new Float32Array(newPosArray.length / 3 * 3);
  newGeo.setAttribute('color', new THREE.BufferAttribute(newVC, 3));

  mesh.geometry = newGeo;
  geometry = newGeo;

  // Resize height maps
  const newVertexCount = (segments + 1) * (segments + 1);
  heightMap.fill(0);
  prevHeight.fill(0);
  velocity.fill(0);

  // Update grid
  scene.remove(grid);
  const newGrid = new THREE.GridHelper(size, segments, 0x111133, 0x111133);
  newGrid.position.y = -0.05;
  scene.add(newGrid);
});
gui.add(params, 'particleCount', 500, 5000, 100).name('Particle Count').onChange((v) => {
  const newPos = new Float32Array(v * 3);
  const min = Math.min(v, params.particleCount);
  for (let i = 0; i < min; i++) {
    newPos[i * 3] = particlePositions[i * 3];
    newPos[i * 3 + 1] = particlePositions[i * 3 + 1];
    newPos[i * 3 + 2] = particlePositions[i * 3 + 2];
  }
  for (let i = min; i < v; i++) {
    newPos[i * 3] = (Math.random() - 0.5) * size * 0.9;
    newPos[i * 3 + 2] = (Math.random() - 0.5) * size * 0.9;
    newPos[i * 3 + 1] = getHeightAt(newPos[i * 3], newPos[i * 3 + 2]) + 0.5;
  }
  particlePositions.length = v * 3;
  particlePositions.set(newPos);
  particleHeights.length = v;
  particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
  particleGeometry.attributes.position.needsUpdate = true;
});

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animate ---
let lastTime = performance.now();

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  updateWave(dt);
  updateParticles();
  controls.update();
  renderer.render(scene, camera);
}

// Seed a few initial ripples
setTimeout(() => {
  addRipple(0, 0, 3);
  setTimeout(() => addRipple(5, 5, 2), 300);
  setTimeout(() => addRipple(-5, -5, 2), 600);
}, 200);

animate();
</script>
</body>
</html>
