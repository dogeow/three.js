<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>84 · 软体模拟 Soft Body</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    #tip {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 18px;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      letter-spacing: 0.5px;
      pointer-events: none;
      z-index: 10;
    }
    #info {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="tip">弹簧-质点系统 / Verlet积分形变 / 地面碰撞反弹 / 压力约束体积</div>
  <div id="info">Click to push · Drag to throw</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    // ─── Scene ────────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a12);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(6, 5, 8);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.update();

    // ─── Lighting ────────────────────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0x404060, 1.5);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xfff0e0, 3.5);
    sunLight.position.set(5, 10, 5);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    sunLight.shadow.camera.near = 0.1;
    sunLight.shadow.camera.far = 50;
    sunLight.shadow.camera.left = -10;
    sunLight.shadow.camera.right = 10;
    sunLight.shadow.camera.top = 10;
    sunLight.shadow.camera.bottom = -10;
    sunLight.shadow.bias = -0.001;
    scene.add(sunLight);

    const fillLight = new THREE.DirectionalLight(0x4060ff, 0.8);
    fillLight.position.set(-5, 3, -5);
    scene.add(fillLight);

    const rimLight = new THREE.PointLight(0xff6030, 1.5, 20);
    rimLight.position.set(-3, 4, 3);
    scene.add(rimLight);

    // ─── Ground ──────────────────────────────────────────────────────────────
    const groundGeo = new THREE.PlaneGeometry(30, 30);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x151520,
      roughness: 0.85,
      metalness: 0.15
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid lines on ground
    const gridHelper = new THREE.GridHelper(30, 30, 0x333355, 0x222240);
    gridHelper.position.y = 0.001;
    scene.add(gridHelper);

    // ─── Obstacles ───────────────────────────────────────────────────────────
    const obstacles = [];

    const obs1Geo = new THREE.SphereGeometry(0.9, 32, 32);
    const obs1Mat = new THREE.MeshStandardMaterial({ color: 0x334466, roughness: 0.4, metalness: 0.6 });
    const obs1 = new THREE.Mesh(obs1Geo, obs1Mat);
    obs1.position.set(-2.5, 0.9, 0.5);
    obs1.castShadow = true;
    obs1.receiveShadow = true;
    scene.add(obs1);
    obstacles.push({ x: obs1.position.x, y: obs1.position.y, z: obs1.position.z, radius: 0.9 });

    const obs2Geo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
    const obs2Mat = new THREE.MeshStandardMaterial({ color: 0x443322, roughness: 0.5, metalness: 0.4 });
    const obs2 = new THREE.Mesh(obs2Geo, obs2Mat);
    obs2.position.set(2.2, 0.6, -0.8);
    obs2.castShadow = true;
    obs2.receiveShadow = true;
    scene.add(obs2);
    obstacles.push({ x: obs2.position.x, y: obs2.position.y, z: obs2.position.z, radius: 0.85 });

    // ─── Soft Body Physics ────────────────────────────────────────────────────
    const GRID = 5;
    const SPACING = 0.38;
    const SIZE = 2.0;

    const params = {
      gravity: -15.0,
      stiffness: 180.0,
      shearStiffness: 100.0,
      damping: 0.985,
      pressure: 600.0,
      bounce: 0.45,
      groundFriction: 0.92,
      reset: resetSoftBody
    };

    let particles = [];
    let springs = [];
    let restVolume = 0;

    function createParticles() {
      particles = [];
      springs = [];
      const cx = 0, cy = SIZE / 2 + 1.5, cz = 0;

      for (let x = 0; x < GRID; x++) {
        for (let y = 0; y < GRID; y++) {
          for (let z = 0; z < GRID; z++) {
            const px = (x - (GRID - 1) / 2) * SPACING + cx;
            const py = (y - (GRID - 1) / 2) * SPACING + cy;
            const pz = (z - (GRID - 1) / 2) * SPACING + cz;
            particles.push({
              x: px, y: py, z: pz,
              px: px, py: py, pz: pz,
              vx: 0, vy: 0, vz: 0,
              fx: 0, fy: 0, fz: 0,
              mass: 1.0
            });
          }
        }
      }

      // Helper to get particle index
      const idx = (x, y, z) => x * GRID * GRID + y * GRID + z;

      // Structural springs (face neighbors)
      for (let x = 0; x < GRID; x++) {
        for (let y = 0; y < GRID; y++) {
          for (let z = 0; z < GRID; z++) {
            const i = idx(x, y, z);
            if (x + 1 < GRID) addSpring(i, idx(x + 1, y, z), params.stiffness);
            if (y + 1 < GRID) addSpring(i, idx(x, y + 1, z), params.stiffness);
            if (z + 1 < GRID) addSpring(i, idx(x, y, z + 1), params.stiffness);
          }
        }
      }

      // Shear springs (face diagonals)
      for (let x = 0; x < GRID; x++) {
        for (let y = 0; y < GRID; y++) {
          for (let z = 0; z < GRID; z++) {
            const i = idx(x, y, z);
            if (x + 1 < GRID && y + 1 < GRID) addSpring(i, idx(x + 1, y + 1, z), params.shearStiffness * 0.707);
            if (x + 1 < GRID && z + 1 < GRID) addSpring(i, idx(x + 1, y, z + 1), params.shearStiffness * 0.707);
            if (y + 1 < GRID && z + 1 < GRID) addSpring(i, idx(x, y + 1, z + 1), params.shearStiffness * 0.707);
            if (x + 1 < GRID && y + 1 < GRID && z + 1 < GRID) addSpring(i, idx(x + 1, y + 1, z + 1), params.shearStiffness * 0.577);
          }
        }
      }

      // Compute rest volume
      computeRestVolume();
    }

    function addSpring(i, j, stiffness) {
      const p1 = particles[i], p2 = particles[j];
      const dx = p2.x - p1.x, dy = p2.y - p1.y, dz = p2.z - p1.z;
      const rest = Math.sqrt(dx * dx + dy * dy + dz * dz);
      springs.push({ i, j, rest, stiffness });
    }

    function computeRestVolume() {
      // Approximate volume using bounding box
      let minX = Infinity, maxX = -Infinity;
      let minY = Infinity, maxY = -Infinity;
      let minZ = Infinity, maxZ = -Infinity;
      for (const p of particles) {
        if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
        if (p.z < minZ) minZ = p.z; if (p.z > maxZ) maxZ = p.z;
      }
      restVolume = (maxX - minX) * (maxY - minY) * (maxZ - minZ);
    }

    function getCurrentVolume() {
      let minX = Infinity, maxX = -Infinity;
      let minY = Infinity, maxY = -Infinity;
      let minZ = Infinity, maxZ = -Infinity;
      for (const p of particles) {
        if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
        if (p.z < minZ) minZ = p.z; if (p.z > maxZ) maxZ = p.z;
      }
      return Math.max(0.001, (maxX - minX) * (maxY - minY) * (maxZ - minZ));
    }

    function resetSoftBody() {
      createParticles();
      updateMeshGeometry();
    }

    // ─── Soft Body Mesh ──────────────────────────────────────────────────────
    const softGeo = new THREE.BoxGeometry(SIZE, SIZE, SIZE, GRID - 1, GRID - 1, GRID - 1);
    const softMat = new THREE.MeshStandardMaterial({
      color: 0x55ccff,
      transparent: true,
      opacity: 0.72,
      roughness: 0.12,
      metalness: 0.05,
      side: THREE.DoubleSide,
      envMapIntensity: 0.5
    });
    const softMesh = new THREE.Mesh(softGeo, softMat);
    softMesh.castShadow = true;
    softMesh.receiveShadow = true;
    scene.add(softMesh);

    // Wireframe overlay for visual interest
    const wireGeo = new THREE.BoxGeometry(SIZE, SIZE, SIZE, GRID - 1, GRID - 1, GRID - 1);
    const wireMat = new THREE.MeshBasicMaterial({
      color: 0x88ddff,
      wireframe: true,
      transparent: true,
      opacity: 0.08
    });
    const wireMesh = new THREE.Mesh(wireGeo, wireMat);
    scene.add(wireMesh);

    function updateMeshGeometry() {
      const pos = softGeo.attributes.position;
      const wirePos = wireGeo.attributes.position;

      for (let i = 0; i < pos.count; i++) {
        const lx = pos.getX(i);
        const ly = pos.getY(i);
        const lz = pos.getZ(i);

        // Find nearest particle
        let minDist = Infinity;
        let nx = 0, ny = 0, nz = 0;
        for (const p of particles) {
          const d = Math.sqrt((p.x - lx) ** 2 + (p.y - ly) ** 2 + (p.z - lz) ** 2);
          if (d < minDist) {
            minDist = d;
            nx = p.x;
            ny = p.y;
            nz = p.z;
          }
        }

        const blend = 0.65;
        const newX = lx + (nx - lx) * blend;
        const newY = ly + (ny - ly) * blend;
        const newZ = lz + (nz - lz) * blend;
        pos.setXYZ(i, newX, newY, newZ);
        wirePos.setXYZ(i, newX, newY, newZ);
      }

      pos.needsUpdate = true;
      wirePos.needsUpdate = true;
      softGeo.computeVertexNormals();
      wireGeo.computeVertexNormals();

      // Sync wire mesh position with soft mesh
      wireMesh.position.copy(softMesh.position);
      wireMesh.rotation.copy(softMesh.rotation);
      wireMesh.scale.copy(softMesh.scale);
    }

    // Particle visual markers
    const particleMarkers = new THREE.InstancedMesh(
      new THREE.SphereGeometry(0.04, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0xaaddff }),
      0
    );
    particleMarkers.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    scene.add(particleMarkers);

    function updateParticleMarkers() {
      const matrix = new THREE.Matrix4();
      const count = particles.length;
      if (particleMarkers.count !== count) {
        particleMarkers.dispose();
        particleMarkers.geometry = new THREE.SphereGeometry(0.04, 8, 8);
        particleMarkers.count = count;
      }
      for (let i = 0; i < count; i++) {
        const p = particles[i];
        matrix.setPosition(p.x, p.y, p.z);
        particleMarkers.setMatrixAt(i, matrix);
      }
      particleMarkers.instanceMatrix.needsUpdate = true;
    }

    // ─── Physics Update ───────────────────────────────────────────────────────
    function updatePhysics(dt) {
      const subSteps = 3;
      const sdt = dt / subSteps;

      for (let step = 0; step < subSteps; step++) {
        // Reset forces
        for (const p of particles) {
          p.fx = 0;
          p.fy = params.gravity;
          p.fz = 0;
        }

        // Spring forces
        for (const s of springs) {
          const p1 = particles[s.i];
          const p2 = particles[s.j];
          const dx = p2.x - p1.x;
          const dy = p2.y - p1.y;
          const dz = p2.z - p1.z;
          const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.0001;
          const stretch = dist - s.rest;
          const force = stretch * s.stiffness;
          const fx = dx / dist * force;
          const fy = dy / dist * force;
          const fz = dz / dist * force;
          p1.fx += fx; p1.fy += fy; p1.fz += fz;
          p2.fx -= fx; p2.fy -= fy; p2.fz -= fz;
        }

        // Pressure / volume preservation
        const volRatio = restVolume / getCurrentVolume();
        const pressureForce = params.pressure * (volRatio - 1.0);

        // Push outward from center
        let cx = 0, cy = 0, cz = 0;
        for (const p of particles) { cx += p.x; cy += p.y; cz += p.z; }
        cx /= particles.length; cy /= particles.length; cz /= particles.length;

        for (const p of particles) {
          const dx = p.x - cx;
          const dy = p.y - cy;
          const dz = p.z - cz;
          const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.0001;
          p.fx += dx / dist * pressureForce * 0.001;
          p.fy += dy / dist * pressureForce * 0.001;
          p.fz += dz / dist * pressureForce * 0.001;
        }

        // Verlet integration
        for (const p of particles) {
          const ax = p.fx / p.mass;
          const ay = p.fy / p.mass;
          const az = p.fz / p.mass;

          // Damping
          const damp = params.damping;
          const vx = (p.x - p.px) * damp + ax * sdt * sdt;
          const vy = (p.y - p.py) * damp + ay * sdt * sdt;
          const vz = (p.z - p.pz) * damp + az * sdt * sdt;

          p.px = p.x; p.py = p.y; p.pz = p.z;
          p.x += vx;
          p.y += vy;
          p.z += vz;

          // Ground collision
          if (p.y < 0.02) {
            p.y = 0.02;
            p.py = p.y + (p.py - p.y - vy) * params.bounce;
            // Friction
            p.px = p.x - (p.x - p.px) * params.groundFriction;
            p.pz = p.z - (p.z - p.pz) * params.groundFriction;
          }

          // Wall bounds
          if (p.x < -8) { p.x = -8; p.px = p.x + (p.x - p.px) * 0.3; }
          if (p.x > 8) { p.x = 8; p.px = p.x + (p.x - p.px) * 0.3; }
          if (p.z < -8) { p.z = -8; p.pz = p.z + (p.z - p.pz) * 0.3; }
          if (p.z > 8) { p.z = 8; p.pz = p.z + (p.z - p.pz) * 0.3; }

          // Obstacle collision
          for (const obs of obstacles) {
            const odx = p.x - obs.x;
            const ody = p.y - obs.y;
            const odz = p.z - obs.z;
            const odist = Math.sqrt(odx * odx + ody * ody + odz * odz);
            if (odist < obs.radius) {
              const overlap = obs.radius - odist;
              const nx = odx / odist;
              const ny = ody / odist;
              const nz = odz / odist;
              p.x += nx * overlap * 1.1;
              p.y += ny * overlap * 1.1;
              p.z += nz * overlap * 1.1;

              // Reflect velocity
              const prevX = p.x - (p.x - p.px);
              const prevY = p.y - (p.y - p.py);
              const prevZ = p.z - (p.z - p.pz);
              const vdx = p.x - prevX;
              const vdy = p.y - prevY;
              const vdz = p.z - prevZ;
              const dot = vdx * nx + vdy * ny + vdz * nz;
              if (dot < 0) {
                const bounce = params.bounce;
                p.x -= 2 * dot * nx * bounce;
                p.y -= 2 * dot * ny * bounce;
                p.z -= 2 * dot * nz * bounce;
                p.px = p.x - (vdx - 2 * dot * nx * bounce);
                p.py = p.y - (vdy - 2 * dot * ny * bounce);
                p.pz = p.z - (vdz - 2 * dot * nz * bounce);
              }
            }
          }
        }
      }
    }

    // ─── Mouse Interaction ────────────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let mouseDown = false;
    let lastMouse = new THREE.Vector2();
    const throwForce = { x: 0, y: 0, z: 0 };

    function applyImpulse(cx, cy, cz, fx, fy, fz) {
      for (const p of particles) {
        const dx = p.x - cx;
        const dy = p.y - cy;
        const dz = p.z - cz;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.01;
        const influence = Math.max(0, 1.0 - dist / 3.0);
        p.vx = (p.x - p.px) + fx * influence;
        p.vy = (p.y - p.py) + fy * influence;
        p.vz = (p.z - p.pz) + fz * influence;
        p.px = p.x - p.vx;
        p.py = p.y - p.vy;
        p.pz = p.z - p.vz;
      }
    }

    renderer.domElement.addEventListener('mousedown', (e) => {
      mouseDown = true;
      lastMouse.set(e.clientX, e.clientY);
    });

    renderer.domElement.addEventListener('mousemove', (e) => {
      if (!mouseDown) return;
      const dx = (e.clientX - lastMouse.x) * 0.015;
      const dy = (e.clientY - lastMouse.y) * 0.015;
      lastMouse.set(e.clientX, e.clientY);

      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      // Apply impulse to all particles
      for (const p of particles) {
        const influence = Math.max(0, 1.0 - p.y / 4.0);
        p.vx += dx * influence * 1.5;
        p.vy += dy * influence * 1.5;
      }
    });

    renderer.domElement.addEventListener('mouseup', (e) => {
      if (mouseDown) {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        // Find centroid of all particles
        let cx = 0, cy = 0, cz = 0;
        for (const p of particles) { cx += p.x; cy += p.y; cz += p.z; }
        cx /= particles.length; cy /= particles.length; cz /= particles.length;

        const throwX = (e.clientX - lastMouse.x) * 0.2;
        const throwY = (e.clientY - lastMouse.y) * 0.2;
        applyImpulse(cx, cy, cz, throwX, throwY, 0);
      }
      mouseDown = false;
    });

    // Touch support
    renderer.domElement.addEventListener('touchstart', (e) => {
      if (e.touches.length > 0) {
        mouseDown = true;
        lastMouse.set(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: true });

    renderer.domElement.addEventListener('touchmove', (e) => {
      if (!mouseDown || e.touches.length === 0) return;
      const dx = (e.touches[0].clientX - lastMouse.x) * 0.012;
      const dy = (e.touches[0].clientY - lastMouse.y) * 0.012;
      lastMouse.set(e.touches[0].clientX, e.touches[0].clientY);
      for (const p of particles) {
        const influence = Math.max(0, 1.0 - p.y / 4.0);
        p.vx += dx * influence * 1.2;
        p.vy += dy * influence * 1.2;
      }
    }, { passive: true });

    renderer.domElement.addEventListener('touchend', (e) => {
      if (mouseDown && e.changedTouches.length > 0) {
        const t = e.changedTouches[0];
        let cx = 0, cy = 0, cz = 0;
        for (const p of particles) { cx += p.x; cy += p.y; cz += p.z; }
        cx /= particles.length; cy /= particles.length; cz /= particles.length;
        const throwX = (t.clientX - lastMouse.x) * 0.15;
        const throwY = (t.clientY - lastMouse.y) * 0.15;
        applyImpulse(cx, cy, cz, throwX, throwY, 0);
      }
      mouseDown = false;
    }, { passive: true });

    // ─── GUI ─────────────────────────────────────────────────────────────────
    const gui = new GUI({ title: '软体模拟控制' });
    gui.domElement.style.marginRight = '0';

    const physicsFolder = gui.addFolder('物理参数');
    physicsFolder.add(params, 'gravity', -30, 0, 0.5).name('重力');
    physicsFolder.add(params, 'stiffness', 50, 400, 5).name('结构刚度');
    physicsFolder.add(params, 'shearStiffness', 20, 200, 5).name('剪切刚度');
    physicsFolder.add(params, 'pressure', 0, 1500, 10).name('体积压力');
    physicsFolder.add(params, 'damping', 0.9, 1.0, 0.002).name('阻尼');
    physicsFolder.add(params, 'bounce', 0, 1, 0.05).name('弹性');
    physicsFolder.add(params, 'groundFriction', 0.5, 1.0, 0.01).name('地面摩擦');

    const colorFolder = gui.addFolder('外观');
    colorFolder.addColor({ color: 0x55ccff }, 'color').name('颜色').onChange((v) => {
      softMat.color.set(v);
    });
    colorFolder.add(softMat, 'opacity', 0.1, 1.0, 0.01).name('透明度');

    gui.add(params, 'reset').name('重置 (Reset)');

    physicsFolder.open();
    colorFolder.open();

    // ─── Init ─────────────────────────────────────────────────────────────────
    createParticles();
    updateMeshGeometry();

    // ─── Animation Loop ───────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.03);

      updatePhysics(dt);
      updateMeshGeometry();
      updateParticleMarkers();

      controls.update();
      renderer.render(scene, camera);
    }

    // ─── Resize ──────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
