<!-- Example 338: Soft Body Physics Simulation -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Example 338: Soft Body Physics Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: monospace; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #7fdbca;
      font-size: 13px;
      pointer-events: none;
      text-shadow: 0 0 8px rgba(127, 219, 202, 0.6);
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div id="info">
  <strong>Soft Body Physics</strong><br>
  Click &amp; drag to squish<br>
  Scroll to zoom
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

// === Scene Setup ===
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a10);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 6, 14);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 3, 0);
controls.minDistance = 5;
controls.maxDistance = 30;

// === Post-Processing ===
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.2, 0.4, 0.2
);
composer.addPass(bloomPass);

// === Lighting ===
scene.add(new THREE.AmbientLight(0x112233, 0.5));
const dirLight = new THREE.DirectionalLight(0x7fdbca, 1.5);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);
const fillLight = new THREE.PointLight(0x00aaff, 2, 20);
fillLight.position.set(-5, 5, -5);
scene.add(fillLight);

// === Ground Plane ===
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0a1520,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
scene.add(ground);

// Grid helper
const grid = new THREE.GridHelper(30, 30, 0x1a3a4a, 0x0a1a25);
grid.position.y = 0.01;
scene.add(grid);

// === Soft Body Parameters ===
const params = {
  stiffness: 0.4,
  damping: 0.94,
  gravity: 9.8,
  reset: () => resetSoftBody(),
  addImpulse: () => addRandomImpulse()
};

// === Particle Class (Verlet) ===
class Particle {
  constructor(x, y, z, mass = 1) {
    this.position = new THREE.Vector3(x, y, z);
    this.previousPosition = new THREE.Vector3(x, y, z);
    this.acceleration = new THREE.Vector3();
    this.mass = mass;
    this.invMass = mass > 0 ? 1 / mass : 0;
    this.pinned = false;
  }

  applyForce(force) {
    if (this.pinned) return;
    this.acceleration.addScaledVector(force, this.invMass);
  }

  update(dt) {
    if (this.pinned) return;

    // Verlet integration
    const velocity = new THREE.Vector3().subVectors(this.position, this.previousPosition);
    velocity.multiplyScalar(params.damping);

    // Store current position
    this.previousPosition.copy(this.position);

    // New position = current + velocity + acceleration * dt^2
    this.position.add(velocity);
    this.position.addScaledVector(this.acceleration, dt * dt);

    // Reset acceleration
    this.acceleration.set(0, 0, 0);
  }

  constrainToGround() {
    if (this.position.y < 0.3) {
      this.position.y = 0.3;
      // Bounce
      const velocity = new THREE.Vector3().subVectors(this.position, this.previousPosition);
      this.previousPosition.y = this.position.y + velocity.y * 0.5;
    }
  }
}

// === Spring Constraint ===
class Spring {
  constructor(p1, p2, restLength = null) {
    this.p1 = p1;
    this.p2 = p2;
    this.restLength = restLength !== null ? restLength : p1.position.distanceTo(p2.position);
  }

  solve() {
    const delta = new THREE.Vector3().subVectors(this.p2.position, this.p1.position);
    const currentLength = delta.length();
    if (currentLength === 0) return;

    const diff = (currentLength - this.restLength) / currentLength;
    const stiffness = params.stiffness;

    if (!this.p1.pinned && !this.p2.pinned) {
      const halfCorrection = delta.clone().multiplyScalar(diff * 0.5 * stiffness);
      this.p1.position.add(halfCorrection);
      this.p2.position.sub(halfCorrection);
    } else if (!this.p1.pinned) {
      this.p1.position.add(delta.clone().multiplyScalar(diff * stiffness));
    } else if (!this.p2.pinned) {
      this.p2.position.sub(delta.clone().multiplyScalar(diff * stiffness));
    }
  }
}

// === Soft Body System ===
const GRID_SIZE = 6; // segments per axis
const SPHERE_RADIUS = 2;
const particles = [];
const springs = [];
let particleMesh, springMesh;

function createSoftBody() {
  particles.length = 0;
  springs.length = 0;

  // Create icosphere vertices
  const geo = new THREE.IcosahedronGeometry(SPHERE_RADIUS, 2);
  const positions = geo.attributes.position;

  // Build unique particle grid from icosphere vertices
  // Group vertices by approximate position
  const particleMap = new Map();
  const particleIndices = [];

  for (let i = 0; i < positions.count; i++) {
    const x = positions.getX(i);
    const y = positions.getY(i);
    const z = positions.getZ(i);

    // Snap to grid for deduplication
    const key = `${Math.round(x * 2)}_${Math.round(y * 2)}_${Math.round(z * 2)}`;

    if (!particleMap.has(key)) {
      const p = new Particle(x, y + SPHERE_RADIUS + 4, z, 1);
      particles.push(p);
      particleMap.set(key, particles.length - 1);
    }
    particleIndices.push(particleMap.get(key));
  }

  // Create structural springs from icosahedron edges
  const indices = geo.index.array;
  const springSet = new Set();

  for (let i = 0; i < indices.length; i += 3) {
    const a = particleIndices[indices[i]];
    const b = particleIndices[indices[i + 1]];
    const c = particleIndices[indices[i + 2]];

    // Add springs for triangle edges
    [[a, b], [b, c], [a, c]].forEach(([p1, p2]) => {
      const key = p1 < p2 ? `${p1}-${p2}` : `${p2}-${p1}`;
      if (!springSet.has(key)) {
        springSet.add(key);
        springs.push(new Spring(particles[p1], particles[p2]));
      }
    });
  }

  // Add cross-bracing springs (shear springs) for stability
  const structuralCount = springs.length;
  for (let i = 0; i < structuralCount; i++) {
    const s1 = springs[i];
    for (let j = i + 1; j < structuralCount; j++) {
      const s2 = springs[j];
      if (s1.p1 === s2.p1 && s1.p2 !== s2.p2) {
        const key = `${particles.indexOf(s1.p2)}-${particles.indexOf(s2.p2)}`;
        if (!springSet.has(key)) {
          springSet.add(key);
          springs.push(new Spring(s1.p2, s2.p2, s1.restLength * 1.2));
        }
      }
      if (s1.p1 === s2.p2 && s1.p2 !== s2.p1) {
        const key = `${particles.indexOf(s1.p2)}-${particles.indexOf(s2.p1)}`;
        if (!springSet.has(key)) {
          springSet.add(key);
          springs.push(new Spring(s1.p2, s2.p1, s1.restLength * 1.2));
        }
      }
      if (s1.p2 === s2.p1 && s1.p1 !== s2.p2) {
        const key = `${particles.indexOf(s1.p1)}-${particles.indexOf(s2.p2)}`;
        if (!springSet.has(key)) {
          springSet.add(key);
          springs.push(new Spring(s1.p1, s2.p2, s1.restLength * 1.2));
        }
      }
      if (s1.p2 === s2.p2 && s1.p1 !== s2.p1) {
        const key = `${particles.indexOf(s1.p1)}-${particles.indexOf(s2.p1)}`;
        if (!springSet.has(key)) {
          springSet.add(key);
          springs.push(new Spring(s1.p1, s2.p1, s1.restLength * 1.2));
        }
      }
    }
  }

  geo.dispose();

  // Create particle mesh
  const pGeo = new THREE.SphereGeometry(0.18, 10, 10);
  const pMat = new THREE.MeshStandardMaterial({
    color: 0x40e0d0,
    emissive: 0x20a090,
    emissiveIntensity: 0.8,
    roughness: 0.2,
    metalness: 0.3
  });
  particleMesh = new THREE.InstancedMesh(pGeo, pMat, particles.length);
  particleMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  scene.add(particleMesh);

  // Create spring mesh (LineSegments)
  const sGeo = new THREE.BufferGeometry();
  const positions2 = new Float32Array(springs.length * 6);
  sGeo.setAttribute('position', new THREE.BufferAttribute(positions2, 3));
  const sMat = new THREE.LineBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.35,
    linewidth: 1
  });
  springMesh = new THREE.LineSegments(sGeo, sMat);
  scene.add(springMesh);
}

function resetSoftBody() {
  if (particleMesh) scene.remove(particleMesh);
  if (springMesh) scene.remove(springMesh);
  createSoftBody();
}

function addRandomImpulse() {
  const force = new THREE.Vector3(
    (Math.random() - 0.5) * 60,
    Math.random() * 40 + 20,
    (Math.random() - 0.5) * 60
  );
  particles.forEach(p => p.applyForce(force));
}

function updateSoftBody(dt) {
  const gravity = new THREE.Vector3(0, -params.gravity, 0);

  // Apply gravity
  particles.forEach(p => p.applyForce(gravity));

  // Update particles (Verlet)
  particles.forEach(p => p.update(dt));

  // Solve springs multiple times for stability
  for (let iter = 0; iter < 5; iter++) {
    springs.forEach(s => s.solve());
  }

  // Ground collision
  particles.forEach(p => p.constrainToGround());

  // Update instance matrices
  const dummy = new THREE.Object3D();
  particles.forEach((p, i) => {
    dummy.position.copy(p.position);
    dummy.updateMatrix();
    particleMesh.setMatrixAt(i, dummy.matrix);
  });
  particleMesh.instanceMatrix.needsUpdate = true;

  // Update spring lines
  const pos = springMesh.geometry.attributes.position.array;
  springs.forEach((s, i) => {
    pos[i * 6] = s.p1.position.x;
    pos[i * 6 + 1] = s.p1.position.y;
    pos[i * 6 + 2] = s.p1.position.z;
    pos[i * 6 + 3] = s.p2.position.x;
    pos[i * 6 + 4] = s.p2.position.y;
    pos[i * 6 + 5] = s.p2.position.z;
  });
  springMesh.geometry.attributes.position.needsUpdate = true;
}

// === Mouse Interaction ===
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDragging = false;
let draggedParticle = null;
let dragPlane = new THREE.Plane();
let dragOffset = new THREE.Vector3();
let intersection = new THREE.Vector3();

function onMouseDown(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const ray = raycaster.ray;

  // Find closest particle
  let minDist = 1.5;
  particles.forEach(p => {
    const dist = ray.distanceToPoint(p.position);
    if (dist < minDist) {
      minDist = dist;
      draggedParticle = p;

      // Create drag plane perpendicular to camera
      const camDir = new THREE.Vector3();
      camera.getWorldDirection(camDir);
      dragPlane.setFromNormalAndCoplanarPoint(camDir.negate(), p.position);

      // Calculate offset
      ray.intersectPlane(dragPlane, intersection);
      dragOffset.subVectors(p.position, intersection);
    }
  });

  if (draggedParticle) {
    isDragging = true;
    controls.enabled = false;

    // Apply strong impulse
    const impulse = new THREE.Vector3(0, -30, 0);
    draggedParticle.applyForce(impulse);
  }
}

function onMouseMove(e) {
  if (!isDragging || !draggedParticle) return;

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const ray = raycaster.ray;

  if (ray.intersectPlane(dragPlane, intersection)) {
    // Move particle with mouse
    const target = intersection.clone().add(dragOffset);

    // Apply impulse toward target
    const impulse = target.clone().sub(draggedParticle.position).multiplyScalar(15);
    draggedParticle.applyForce(impulse);
  }
}

function onMouseUp() {
  isDragging = false;
  draggedParticle = null;
  controls.enabled = true;
}

renderer.domElement.addEventListener('mousedown', onMouseDown);
renderer.domElement.addEventListener('mousemove', onMouseMove);
renderer.domElement.addEventListener('mouseup', onMouseUp);
renderer.domElement.addEventListener('mouseleave', onMouseUp);

// Touch support
renderer.domElement.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  onMouseDown({ clientX: touch.clientX, clientY: touch.clientY });
}, { passive: false });

renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  onMouseMove({ clientX: touch.clientX, clientY: touch.clientY });
}, { passive: false });

renderer.domElement.addEventListener('touchend', onMouseUp);

// === GUI ===
const gui = new GUI({ title: 'Soft Body Controls' });
gui.add(params, 'stiffness', 0.1, 1.0, 0.01).name('Stiffness');
gui.add(params, 'damping', 0.80, 0.99, 0.01).name('Damping');
gui.add(params, 'gravity', 0, 20, 0.1).name('Gravity');
gui.add(params, 'reset').name('Reset');
gui.add(params, 'addImpulse').name('Add Impulse');

// === Resize ===
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// === Animation Loop ===
const clock = new THREE.Clock();
let accumulator = 0;
const FIXED_DT = 1 / 120;

function animate() {
  requestAnimationFrame(animate);

  const delta = Math.min(clock.getDelta(), 0.1);
  accumulator += delta;

  // Fixed timestep physics
  while (accumulator >= FIXED_DT) {
    updateSoftBody(FIXED_DT);
    accumulator -= FIXED_DT;
  }

  controls.update();
  composer.render();
}

// === Init ===
createSoftBody();
animate();
</script>
</body>
</html>
