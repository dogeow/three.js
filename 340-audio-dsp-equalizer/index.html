<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Audio DSP Equalizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.85);
      z-index: 10;
      transition: opacity 0.5s ease;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    #overlay h1 {
      color: #e0e0ff;
      font-size: 2rem;
      margin-bottom: 1.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .btn-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }

    .btn {
      padding: 0.7rem 1.8rem;
      background: transparent;
      border: 1px solid rgba(120, 180, 255, 0.5);
      color: #a0c8ff;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn:hover {
      background: rgba(120, 180, 255, 0.12);
      border-color: #78b4ff;
      color: #d0e8ff;
      box-shadow: 0 0 20px rgba(120, 180, 255, 0.2);
    }

    #status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 6px 16px;
      background: rgba(0, 0, 0, 0.6);
      color: rgba(160, 180, 255, 0.7);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      display: flex;
      justify-content: space-between;
      z-index: 5;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="overlay">
    <h1>3D Equalizer</h1>
    <div class="btn-row">
      <button class="btn" id="btn-mic">Use Microphone</button>
      <button class="btn" id="btn-demo">Demo Oscillators</button>
      <button class="btn" id="btn-file">Load Audio File</button>
    </div>
    <input type="file" id="file-input" accept="audio/*" style="display:none">
  </div>

  <div id="status-bar">
    <span id="status-text">AWAITING INPUT</span>
    <span id="fps-text">-- FPS</span>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GUI } from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

    // ── Config ───────────────────────────────────────────────
    const cfg = {
      barCount:      64,
      radius:        9,
      sensitivity:   1.8,
      lerpSpeed:     0.12,
      colorScheme:   'Spectrum',
      layout:        'Circular',
      autoRotate:    true,
      rotationSpeed: 0.003,
      heightScale:   4.0,
      barWidth:      0.14,
      gapRatio:      0.3,
      floorOpacity:  0.35,
    };

    // ── Renderer ─────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // ── Scene / Camera ────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x080810, 0.028);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 14, 18);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.maxPolarAngle = Math.PI * 0.48;
    controls.target.set(0, 2, 0);

    // ── Lights ────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0x1a1a2e, 2.0));

    const keyLight = new THREE.DirectionalLight(0x88aaff, 2.5);
    keyLight.position.set(10, 20, 10);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(1024, 1024);
    keyLight.shadow.camera.near = 1;
    keyLight.shadow.camera.far = 60;
    keyLight.shadow.camera.left = -20;
    keyLight.shadow.camera.right = 20;
    keyLight.shadow.camera.top = 20;
    keyLight.shadow.camera.bottom = -20;
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0xff4488, 1.2);
    rimLight.position.set(-15, 5, -10);
    scene.add(rimLight);

    const fillLight = new THREE.PointLight(0x44ccff, 1.5, 40);
    fillLight.position.set(0, 8, 0);
    scene.add(fillLight);

    // ── Floor ─────────────────────────────────────────────────
    const floorGeo = new THREE.PlaneGeometry(60, 60);
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x0d0d1a,
      roughness: 0.85,
      metalness: 0.15,
      transparent: true,
      opacity: cfg.floorOpacity,
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // ── Grid ──────────────────────────────────────────────────
    const gridHelper = new THREE.GridHelper(40, 40, 0x1a1a3a, 0x0d0d22);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    // ── Color Schemes ─────────────────────────────────────────
    function spectrumColor(t) {
      // 0=red/orange → 0.33=green → 0.66=cyan/blue → 1=violet
      const r = Math.max(0, Math.min(1, 1.5 - Math.abs(t - 0.25) * 4));
      const g = Math.max(0, Math.min(1, 1.0 - Math.abs(t - 0.5) * 3.5));
      const b = Math.max(0, Math.min(1, 0.5 + t * 2.0));
      return new THREE.Color(r, g, b);
    }

    function fireColor(t) {
      const r = t * 2.0;
      const g = Math.pow(t, 1.8) * 0.9;
      const b = Math.pow(t, 4) * 0.4;
      return new THREE.Color(r, g, b);
    }

    function neonColor(t) {
      const phase = t * Math.PI * 2;
      const r = 0.5 + 0.5 * Math.sin(phase);
      const g = 0.5 + 0.5 * Math.sin(phase + Math.PI * 2 / 3);
      const b = 0.5 + 0.5 * Math.sin(phase + Math.PI * 4 / 3);
      return new THREE.Color(r, g, b);
    }

    function monoColor(t) {
      return new THREE.Color(t * 0.5 + 0.3, t * 0.7 + 0.2, t * 0.9 + 0.5);
    }

    const colorSchemes = {
      Spectrum: spectrumColor,
      Fire:     fireColor,
      Neon:     neonColor,
      Mono:     monoColor,
    };

    // ── Bar Group ─────────────────────────────────────────────
    let mesh = null;
    const barObjects = [];
    const targetHeights = [];

    function getColorFn() {
      return colorSchemes[cfg.colorScheme] || spectrumColor;
    }

    function buildMesh() {
      if (mesh) {
        scene.remove(mesh);
        mesh.traverse(c => { if (c.isMesh) { c.geometry.dispose(); c.material.dispose(); } });
      }
      barObjects.length = 0;
      targetHeights.length = 0;

      mesh = new THREE.Group();

      const N   = cfg.barCount;
      const R   = cfg.radius;
      const bW  = cfg.barWidth;
      const gap = bW * (1 - cfg.gapRatio);
      const colorFn = getColorFn();

      for (let i = 0; i < N; i++) {
        const t = i / (N - 1);
        const angle = cfg.layout === 'Circular'
          ? (i / N) * Math.PI * 2 - Math.PI / 2
          : (t - 0.5) * Math.PI * 0.5;

        const geo = new THREE.BoxGeometry(bW, 1, gap);
        const mat = new THREE.MeshStandardMaterial({
          color:     colorFn(t),
          emissive:  colorFn(t).clone().multiplyScalar(0.4),
          roughness: 0.3,
          metalness: 0.6,
        });

        const bar = new THREE.Mesh(geo, mat);
        bar.castShadow = true;
        bar.receiveShadow = false;

        // Initial height: tiny idle pulse
        const idleH = 0.08 + Math.sin(t * Math.PI * 4) * 0.04;
        bar.scale.y = idleH;
        bar.position.y = idleH * 0.5;
        targetHeights.push(idleH);

        if (cfg.layout === 'Circular') {
          bar.position.x = Math.cos(angle) * R;
          bar.position.z = Math.sin(angle) * R;
          bar.rotation.y = -angle + Math.PI / 2;
        } else {
          bar.position.x = (t - 0.5) * (N * (bW + 0.05));
          bar.position.z = 0;
          bar.rotation.y = 0;
        }

        mesh.add(bar);
        barObjects.push(bar);
      }

      scene.add(mesh);
      window.mesh = mesh;
    }

    buildMesh();

    // ── Particles ──────────────────────────────────────────────
    const PARTICLE_COUNT = 300;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(PARTICLE_COUNT * 3);
    const pCol = new Float32Array(PARTICLE_COUNT * 3);
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const r = cfg.radius * (0.2 + Math.random() * 0.9);
      const a = Math.random() * Math.PI * 2;
      pPos[i*3]   = Math.cos(a) * r;
      pPos[i*3+1] = Math.random() * 8;
      pPos[i*3+2] = Math.sin(a) * r;
      pCol[i*3]   = 0.2;
      pCol[i*3+1] = 0.5;
      pCol[i*3+2] = 1.0;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    pGeo.setAttribute('color',    new THREE.BufferAttribute(pCol, 3));
    const pMat = new THREE.PointsMaterial({ size: 0.06, vertexColors: true, transparent: true, opacity: 0.55 });
    const particles = new THREE.Points(pGeo, pMat);
    scene.add(particles);

    // ── Web Audio ──────────────────────────────────────────────
    let audioCtx = null;
    let analyser  = null;
    let dataArray = null;
    let sourceNode = null;
    let demoNodes  = [];
    let isDemoMode = false;

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.78;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      analyser.connect(audioCtx.destination);
    }

    function stopDemo() {
      demoNodes.forEach(n => { try { n.stop(); } catch(e){} });
      demoNodes = [];
      isDemoMode = false;
    }

    function startDemo() {
      initAudio();
      stopDemo();
      isDemoMode = true;
      document.getElementById('status-text').textContent = 'DEMO MODE — OSCILLATORS';

      // Layered oscillators for rich spectrum
      const layers = [
        { freq: 60,   type: 'sine',     gain: 0.35, mod: 0.3  },
        { freq: 180,  type: 'sawtooth', gain: 0.15, mod: 0.5  },
        { freq: 400,  type: 'square',   gain: 0.08, mod: 0.7  },
        { freq: 1000, type: 'sine',     gain: 0.20, mod: 1.1  },
        { freq: 2500, type: 'triangle', gain: 0.12, mod: 1.5  },
        { freq: 6000, type: 'sawtooth', gain: 0.06, mod: 2.0  },
        { freq: 10000,type: 'sine',     gain: 0.10, mod: 3.0  },
      ];

      layers.forEach(({ freq, type, gain, mod }) => {
        const osc  = audioCtx.createOscillator();
        const g    = audioCtx.createGain();
        const lfo  = audioCtx.createOscillator();
        const lfoG = audioCtx.createGain();

        lfo.frequency.value = mod;
        lfoG.gain.value = freq * 0.25;
        lfo.connect(lfoG);
        lfoG.connect(g.gain);

        osc.type = type;
        osc.frequency.value = freq;
        g.gain.value = gain;

        osc.connect(g);
        g.connect(analyser);
        osc.start();
        lfo.start();
        demoNodes.push(osc, lfo);
      });
    }

    async function startMic() {
      initAudio();
      stopDemo();
      document.getElementById('status-text').textContent = 'MICROPHONE INPUT';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        sourceNode = audioCtx.createMediaStreamSource(stream);
        sourceNode.connect(analyser);
      } catch (e) {
        document.getElementById('status-text').textContent = 'MIC DENIED — USING DEMO';
        startDemo();
      }
    }

    function loadFile(file) {
      initAudio();
      stopDemo();
      document.getElementById('status-text').textContent = 'FILE: ' + file.name.toUpperCase().slice(0, 20);
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const buf = await audioCtx.decodeAudioData(ev.target.result);
          const src = audioCtx.createBufferSource();
          src.buffer = buf;
          src.loop = true;
          src.connect(analyser);
          src.start();
          if (sourceNode) { try { sourceNode.stop(); } catch(e){} }
          sourceNode = src;
        } catch (e) {
          document.getElementById('status-text').textContent = 'DECODE ERROR';
        }
      };
      reader.readAsArrayBuffer(file);
    }

    // ── UI Buttons ─────────────────────────────────────────────
    document.getElementById('btn-mic').addEventListener('click', () => {
      document.getElementById('overlay').classList.add('hidden');
      startMic();
    });

    document.getElementById('btn-demo').addEventListener('click', () => {
      document.getElementById('overlay').classList.add('hidden');
      startDemo();
    });

    document.getElementById('btn-file').addEventListener('click', () => {
      document.getElementById('file-input').click();
    });

    document.getElementById('file-input').addEventListener('change', (e) => {
      if (e.target.files[0]) {
        document.getElementById('overlay').classList.add('hidden');
        loadFile(e.target.files[0]);
      }
    });

    // ── GUI ────────────────────────────────────────────────────
    const gui = new GUI({ title: 'Equalizer Controls' });

    const audioFolder = gui.addFolder('Audio');
    audioFolder.add(cfg, 'sensitivity', 0.1, 5.0, 0.05).name('Sensitivity');
    audioFolder.add(cfg, 'lerpSpeed',   0.02, 0.4, 0.01).name('Lerp Speed');
    audioFolder.open();

    const visFolder = gui.addFolder('Visual');
    visFolder.add(cfg, 'barCount',   8, 128, 1).onChange(buildMesh).name('Bar Count');
    visFolder.add(cfg, 'radius',     2, 20,  0.2).onChange(buildMesh).name('Radius');
    visFolder.add(cfg, 'heightScale',0.5, 10, 0.1).name('Height Scale');
    visFolder.add(cfg, 'barWidth',   0.05, 0.5, 0.01).onChange(buildMesh).name('Bar Width');
    visFolder.add(cfg, 'gapRatio',   0.1, 0.9, 0.02).onChange(buildMesh).name('Gap Ratio');
    visFolder.add(cfg, 'colorScheme', Object.keys(colorSchemes)).onChange(() => {
      buildMesh();
    }).name('Color Scheme');
    visFolder.add(cfg, 'layout', ['Circular', 'Linear']).onChange(buildMesh).name('Layout');
    visFolder.open();

    const sceneFolder = gui.addFolder('Scene');
    sceneFolder.add(cfg, 'autoRotate').name('Auto Rotate');
    sceneFolder.add(cfg, 'rotationSpeed', 0.0005, 0.01, 0.0005).name('Rot. Speed');
    sceneFolder.add(cfg, 'floorOpacity', 0, 1, 0.05).name('Floor Opacity').onChange(v => {
      floorMat.opacity = v;
    });
    sceneFolder.open();

    // ── Resize ─────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Animation ──────────────────────────────────────────────
    let frameCount = 0;
    let lastFPSTime = performance.now();
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta   = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      // FPS counter
      frameCount++;
      const now = performance.now();
      if (now - lastFPSTime >= 1000) {
        document.getElementById('fps-text').textContent = frameCount + ' FPS';
        frameCount = 0;
        lastFPSTime = now;
      }

      // Auto rotate
      if (cfg.autoRotate && mesh) {
        mesh.rotation.y += cfg.rotationSpeed;
      }

      // Particle drift
      const pAttr = pGeo.attributes.position;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        pAttr.array[i*3+1] += 0.008;
        if (pAttr.array[i*3+1] > 10) pAttr.array[i*3+1] = 0;
      }
      pAttr.needsUpdate = true;

      // Fill light pulse
      fillLight.intensity = 1.2 + Math.sin(elapsed * 1.5) * 0.4;

      // Audio analysis
      let freqData = null;
      if (analyser && (isDemoMode || sourceNode)) {
        analyser.getByteFrequencyData(dataArray);
        freqData = dataArray;
      }

      // Update bar heights
      if (mesh) {
        const N   = barObjects.length;
        const binStep = freqData ? Math.floor(freqData.length / N) : 0;

        for (let i = 0; i < N; i++) {
          const bar = barObjects[i];
          let target;

          if (freqData && binStep > 0) {
            const binIdx = Math.min(i * binStep, freqData.length - 1);
            const raw    = freqData[binIdx] / 255.0;
            target = Math.pow(raw, 0.9) * cfg.sensitivity * cfg.heightScale;
          } else {
            // Idle animation
            const t = i / N;
            target = (0.06 + Math.sin(elapsed * 2.0 + t * Math.PI * 5) * 0.04) * cfg.heightScale;
          }

          // Smooth lerp
          targetHeights[i] += (target - targetHeights[i]) * cfg.lerpSpeed;
          const h = Math.max(targetHeights[i], 0.005);

          bar.scale.y     = h;
          bar.position.y  = h * 0.5;

          // Emissive glow driven by height
          const color = getColorFn()(i / (N - 1));
          bar.material.emissive.copy(color).multiplyScalar(0.3 + (h / cfg.heightScale) * 0.7);
          bar.material.color.copy(color);
        }
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
