<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optical Art Isometric Room — Post-Processing Effects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0a0a0a; color: #fff; font-family: 'Courier New', monospace; font-size: 1.1rem;
      z-index: 10; transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #info {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.55); font-family: 'Courier New', monospace; font-size: 0.75rem;
      pointer-events: none; text-align: center;
    }
  </style>
</head>
<body>
  <div id="loading">Loading HDR environment…</div>
  <div id="info">Drag to orbit · Scroll to zoom · Bloom + Tone Mapping + Vignette</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer }   from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass }  from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass }       from 'three/addons/postprocessing/ShaderPass.js';
    import { RGBELoader }       from 'three/addons/loaders/RGBELoader.js';
    import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';

    // ── Renderer ──────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ── Scene & Camera ─────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(6, 5, 8);
    camera.lookAt(0, 0, 0);

    // ── Controls ───────────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.maxPolarAngle = Math.PI * 0.85;
    controls.minDistance = 3;
    controls.maxDistance = 20;
    controls.target.set(0, 0.5, 0);

    // ── HDR Environment ─────────────────────────────────────────────────────────
    const rgblLoader = new RGBELoader();
    rgblLoader.setPath('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/');
    rgblLoader.load('studio_small_08_1k.hdr', (texture) => {
      texture.mapping = THREE.EquirectangularReflectionMapping;
      scene.environment = texture;
      scene.background = new THREE.Color(0x080810);
      document.getElementById('loading').classList.add('hidden');
    }, undefined, () => {
      // fallback: no HDR
      scene.environment = new THREE.HemisphereLight(0x443366, 0x111122, 2).multiplyScalar(1);
      document.getElementById('loading').classList.add('hidden');
    });

    // ── Room geometry (isometric-style box room) ───────────────────────────────
    const roomW = 12, roomH = 8, roomD = 12;
    const roomMat = new THREE.MeshStandardMaterial({
      color: 0x0d0d1a,
      roughness: 0.85,
      metalness: 0.15,
      side: THREE.BackSide,
    });
    const room = new THREE.Mesh(new THREE.BoxGeometry(roomW, roomH, roomD), roomMat);
    room.position.y = roomH / 2 - 0.5;
    room.receiveShadow = true;
    scene.add(room);

    // Floor grid lines
    const gridHelper = new THREE.GridHelper(roomW, 24, 0x1a1a3a, 0x1a1a3a);
    gridHelper.position.y = -0.49;
    scene.add(gridHelper);

    // ── Emissive materials ─────────────────────────────────────────────────────
    const glowRed    = new THREE.MeshStandardMaterial({ color: 0xff2244, emissive: 0xff2244, emissiveIntensity: 3.0, roughness: 0.2, metalness: 0.8 });
    const glowCyan   = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 3.0, roughness: 0.2, metalness: 0.8 });
    const glowPurple = new THREE.MeshStandardMaterial({ color: 0xaa44ff, emissive: 0xaa44ff, emissiveIntensity: 3.0, roughness: 0.2, metalness: 0.8 });
    const glowOrange = new THREE.MeshStandardMaterial({ color: 0xff8800, emissive: 0xff8800, emissiveIntensity: 3.0, roughness: 0.2, metalness: 0.8 });
    const glowYellow = new THREE.MeshStandardMaterial({ color: 0xffee00, emissive: 0xffee00, emissiveIntensity: 3.0, roughness: 0.2, metalness: 0.8 });
    const glowBlue   = new THREE.MeshStandardMaterial({ color: 0x4488ff, emissive: 0x4488ff, emissiveIntensity: 3.0, roughness: 0.2, metalness: 0.8 });

    const emissiveMats = [glowRed, glowCyan, glowPurple, glowOrange, glowYellow, glowBlue];

    // ── Central glowing sphere cluster ─────────────────────────────────────────
    const sphereGroup = new THREE.Group();
    const sphereGeo   = new THREE.SphereGeometry(0.55, 32, 32);
    const positions = [
      [0,    0.6,  0   ],
      [0.9,  0.0,  0.6 ],
      [-0.7, 0.3,  0.8 ],
      [0.4,  1.2, -0.5],
      [-0.5, -0.2,-0.7],
      [0.8,  0.8, -0.3],
    ];
    const sphereMeshs = positions.map(([x, y, z], i) => {
      const m = new THREE.Mesh(sphereGeo, emissiveMats[i % emissiveMats.length]);
      m.position.set(x, y, z);
      m.castShadow = true;
      sphereGroup.add(m);
      return m;
    });
    scene.add(sphereGroup);

    // ── Floating cubes (isometric tiling) ─────────────────────────────────────
    const cubeGroup = new THREE.Group();
    const cubeGeo   = new THREE.BoxGeometry(0.7, 0.7, 0.7);
    const cubePositions = [
      [-3.5, 0.35, -2], [3.5, 0.35, -2], [-3.5, 0.35, 2], [3.5, 0.35, 2],
      [-2,   0.35, -3.5], [2, 0.35, -3.5], [-2, 0.35, 3.5], [2, 0.35, 3.5],
      [-4,   0.35,  0  ], [4,  0.35,  0 ], [0,  0.35, -4], [0,  0.35,  4],
      [-3,   0.35, -3 ], [3,  0.35, -3 ], [-3, 0.35,  3], [3,  0.35,  3],
    ];
    cubePositions.forEach(([x, y, z], i) => {
      const m = new THREE.Mesh(cubeGeo, emissiveMats[i % emissiveMats.length]);
      m.position.set(x, y, z);
      m.castShadow = true;
      m.userData.baseY = y;
      m.userData.phase = Math.random() * Math.PI * 2;
      cubeGroup.add(m);
    });
    scene.add(cubeGroup);

    // ── Thin glowing rods ──────────────────────────────────────────────────────
    const rodGroup = new THREE.Group();
    const rodGeo  = new THREE.CylinderGeometry(0.04, 0.04, 3.5, 8);
    const rodPositions = [
      [1.8, 1.75, 1.8], [-1.8, 1.75, 1.8], [1.8, 1.75, -1.8], [-1.8, 1.75, -1.8],
      [0,   1.75, 2.2], [0,   1.75, -2.2],  [2.2, 1.75, 0],  [-2.2, 1.75, 0],
    ];
    rodPositions.forEach(([x, y, z], i) => {
      const r = new THREE.Mesh(rodGeo, emissiveMats[i % emissiveMats.length]);
      r.position.set(x, y, z);
      r.rotation.z = Math.PI / 2 * (i % 2 === 0 ? 0 : 1);
      r.rotation.x = Math.PI / 2 * (i % 4 < 2 ? 0 : 1);
      rodGroup.add(r);
    });
    scene.add(rodGroup);

    // ── Lights ─────────────────────────────────────────────────────────────────
    const ambient = new THREE.AmbientLight(0x111122, 0.5);
    scene.add(ambient);

    const pointLight1 = new THREE.PointLight(0xff2244, 8, 12);
    pointLight1.position.set(2, 4, 2);
    pointLight1.castShadow = true;
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0x00ffcc, 8, 12);
    pointLight2.position.set(-2, 4, -2);
    pointLight2.castShadow = true;
    scene.add(pointLight2);

    // ── Post-processing ────────────────────────────────────────────────────────
    const composer = new EffectComposer(renderer);

    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    // Bloom pass
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.2,   // strength
      0.45,  // radius
      0.15   // threshold
    );
    composer.addPass(bloomPass);

    // Custom vignette + tone mapping shader pass
    const VignetteShader = {
      uniforms: {
        tDiffuse:    { value: null },
        uVignette:   { value: 0.45 },
        uVignetteBlur: { value: 0.3 },
        uSaturation: { value: 1.15 },
      },
      vertexShader: /* glsl */`
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: /* glsl */`
        uniform sampler2D tDiffuse;
        uniform float uVignette;
        uniform float uVignetteBlur;
        uniform float uSaturation;
        varying vec2 vUv;

        vec3 adjustSaturation(vec3 color, float sat) {
          float grey = dot(color, vec3(0.2126, 0.7152, 0.0722));
          return mix(vec3(grey), color, sat);
        }

        void main() {
          vec4 texel = texture2D(tDiffuse, vUv);
          vec2 uv = vUv * (1.0 - vUv.yx);
          float vig = uv.x * uv.y * 15.0;
          vig = pow(vig, uVignette + uVignetteBlur * 0.5);
          vig = smoothstep(0.0, 1.0, vig);
          texel.rgb = adjustSaturation(texel.rgb, uSaturation);
          texel.rgb *= mix(0.4, 1.0, vig);
          gl_FragColor = texel;
        }
      `,
    };

    const vignettePass = new ShaderPass(VignetteShader);
    composer.addPass(vignettePass);

    // ── Resize ─────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      composer.setSize(w, h);
      bloomPass.resolution.set(w, h);
    });

    // ── Animation ──────────────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Rotate sphere cluster
      sphereGroup.rotation.y = t * 0.25;

      // Bob floating cubes
      cubeGroup.children.forEach((cube) => {
        const phase = cube.userData.phase;
        cube.position.y = cube.userData.baseY + Math.sin(t * 0.8 + phase) * 0.18;
        cube.rotation.x = t * 0.3 + phase;
        cube.rotation.y = t * 0.2 + phase * 0.7;
      });

      // Pulse lights
      pointLight1.intensity = 6 + Math.sin(t * 1.3) * 2;
      pointLight2.intensity = 6 + Math.cos(t * 1.1) * 2;

      // Vignette breathe
      vignettePass.uniforms.uVignette.value = 0.42 + Math.sin(t * 0.4) * 0.06;

      controls.update();
      composer.render();
    }
    animate();
  </script>
</body>
</html>
