<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shooting Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0008; }
  canvas { display: block; cursor: crosshair; }

  #ui {
    position: fixed;
    top: 20px;
    right: 20px;
    font-family: 'Courier New', monospace;
    z-index: 100;
    user-select: none;
  }

  #score-panel {
    background: rgba(0,0,0,0.75);
    border: 2px solid #ff2266;
    border-radius: 8px;
    padding: 16px 24px;
    color: #fff;
    box-shadow: 0 0 20px rgba(255,34,102,0.4), inset 0 0 10px rgba(255,34,102,0.1);
  }

  #score-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: #ff2266;
    text-shadow: 0 0 8px #ff2266;
    margin-bottom: 4px;
  }

  #score-value {
    font-size: 36px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 12px #ff2266, 0 0 24px #ff2266;
  }

  #round-info {
    margin-top: 8px;
    font-size: 12px;
    color: #aaa;
    letter-spacing: 1px;
  }

  #round-info span {
    color: #ff2266;
    text-shadow: 0 0 6px #ff2266;
  }

  #reload-bar-container {
    margin-top: 10px;
    width: 120px;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  #reload-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff2266, #ff6600);
    border-radius: 3px;
    transition: width 0.05s linear;
    box-shadow: 0 0 8px #ff2266;
  }

  #message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Courier New', monospace;
    font-size: 48px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 20px #ff2266, 0 0 40px #ff6600, 0 0 60px #ff2266;
    letter-spacing: 8px;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #message.show {
    opacity: 1;
    animation: pulse 0.5s ease-in-out infinite alternate;
  }

  @keyframes pulse {
    from { text-shadow: 0 0 20px #ff2266, 0 0 40px #ff6600, 0 0 60px #ff2266; }
    to { text-shadow: 0 0 40px #ff2266, 0 0 80px #ff6600, 0 0 120px #ff2266; }
  }

  #hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    z-index: 100;
  }

  #crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 24px;
    height: 24px;
    pointer-events: none;
    z-index: 150;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255, 100, 50, 0.7);
    border-radius: 1px;
  }
  #crosshair::before {
    width: 2px;
    height: 24px;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
  }
  #crosshair::after {
    width: 24px;
    height: 2px;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
  }
  #muzzle-flash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at center, rgba(255,200,50,0.15) 0%, transparent 60%);
    pointer-events: none;
    z-index: 140;
    opacity: 0;
    transition: opacity 0.05s;
  }
  #muzzle-flash.fire {
    opacity: 1;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="score-panel">
    <div id="score-label">SCORE</div>
    <div id="score-value">0</div>
    <div id="round-info">ROUND <span id="round-num">1</span> / <span id="targets-left">0</span> LEFT</div>
    <div id="reload-bar-container"><div id="reload-bar"></div></div>
  </div>
</div>

<div id="message"></div>
<div id="hint">HOLD TO CHARGE &bull; RELEASE TO SHOOT</div>
<div id="crosshair"></div>
<div id="muzzle-flash"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ============================================================
//  SETUP
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0008);
scene.fog = new THREE.FogExp2(0x0a0008, 0.025);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 4, 18);
camera.lookAt(0, 3, 0);

// OrbitControls-like manual orbit
let orbitTheta = 0;
let orbitPhi = Math.PI / 9;
let orbitRadius = 18;
let orbitTargetY = 3;
let isDragging = false;
let lastMouseX = 0, lastMouseY = 0;
let rightMouseDown = false;
let tempVec3 = new THREE.Vector3();

function updateCamera() {
  camera.position.x = orbitRadius * Math.sin(orbitTheta) * Math.cos(orbitPhi);
  camera.position.y = orbitRadius * Math.sin(orbitPhi) + orbitTargetY;
  camera.position.z = orbitRadius * Math.cos(orbitTheta) * Math.cos(orbitPhi);
  camera.lookAt(0, orbitTargetY, 0);
}

// ============================================================
//  LIGHTS
// ============================================================
const ambientLight = new THREE.AmbientLight(0x441122, 1.2);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
mainLight.position.set(5, 12, 8);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(2048, 2048);
mainLight.shadow.camera.near = 0.5;
mainLight.shadow.camera.far = 60;
mainLight.shadow.camera.left = -20;
mainLight.shadow.camera.right = 20;
mainLight.shadow.camera.top = 20;
mainLight.shadow.camera.bottom = -20;
scene.add(mainLight);

const rimLight = new THREE.PointLight(0xff2266, 2.5, 30);
rimLight.position.set(-8, 8, -5);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0x6622ff, 1.5, 25);
fillLight.position.set(8, 5, -3);
scene.add(fillLight);

// ============================================================
//  FLOOR & BACKDROP
// ============================================================
const floorGeo = new THREE.PlaneGeometry(80, 80);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a0020, roughness: 0.9, metalness: 0.1 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Back wall
const wallGeo = new THREE.PlaneGeometry(60, 30);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x200028, roughness: 1 });
const wall = new THREE.Mesh(wallGeo, wallMat);
wall.position.set(0, 10, -12);
wall.receiveShadow = true;
scene.add(wall);

// Neon border on wall
const borderGeo = new THREE.PlaneGeometry(60, 0.3);
const borderMat = new THREE.MeshBasicMaterial({ color: 0xff2266 });
const border = new THREE.Mesh(borderGeo, borderMat);
border.position.set(0, 10, -11.9);
scene.add(border);

// Side pillars
for (let i = -1; i <= 1; i += 2) {
  const pillarGeo = new THREE.BoxGeometry(0.4, 20, 0.4);
  const pillarMat = new THREE.MeshStandardMaterial({ color: 0x1a0025, roughness: 0.7, metalness: 0.3 });
  const pillar = new THREE.Mesh(pillarGeo, pillarMat);
  pillar.position.set(i * 14, 5, -6);
  pillar.castShadow = true;
  scene.add(pillar);
}

// Shelf platforms
function makeShelf(x, y, z, width) {
  const geo = new THREE.BoxGeometry(width, 0.25, 1.5);
  const mat = new THREE.MeshStandardMaterial({ color: 0x2a0015, roughness: 0.6, metalness: 0.4 });
  const shelf = new THREE.Mesh(geo, mat);
  shelf.position.set(x, y, z);
  shelf.castShadow = true;
  shelf.receiveShadow = true;
  scene.add(shelf);

  // Neon edge
  const edgeGeo = new THREE.BoxGeometry(width + 0.1, 0.08, 0.08);
  const edgeMat = new THREE.MeshBasicMaterial({ color: 0xff2266 });
  const edge = new THREE.Mesh(edgeGeo, edgeMat);
  edge.position.set(x, y + 0.17, z + 0.8);
  scene.add(edge);

  return shelf;
}

const shelves = [
  makeShelf(0, 2.5, -8, 18),
  makeShelf(0, 4.5, -6, 18),
  makeShelf(0, 6.5, -4, 18),
];

// Decorative neon signs
const signGeo = new THREE.PlaneGeometry(5, 0.8);
const signCanvas = document.createElement('canvas');
signCanvas.width = 512;
signCanvas.height = 80;
const ctx = signCanvas.getContext('2d');
ctx.fillStyle = '#0a0008';
ctx.fillRect(0, 0, 512, 80);
ctx.font = 'bold 48px Courier New';
ctx.fillStyle = '#ff2266';
ctx.textAlign = 'center';
ctx.shadowColor = '#ff2266';
ctx.shadowBlur = 20;
ctx.fillText('CARNIVAL GALLERY', 256, 55);
const signTex = new THREE.CanvasTexture(signCanvas);
const signMat = new THREE.MeshBasicMaterial({ map: signTex, transparent: true });
const signMesh = new THREE.Mesh(signGeo, signMat);
signMesh.position.set(0, 12, -11.8);
scene.add(signMesh);

// ============================================================
//  TARGET CLASS
// ============================================================
const TARGET_COLORS = [
  0xff2266, 0xff6622, 0xffdd00, 0x22ff66, 0x22ddff, 0xaa22ff, 0xff22aa, 0x00ffaa
];

const SHELF_CONFIGS = [
  { shelfY: 2.5, zRange: [-9, -7], spacing: 2.5 },
  { shelfY: 4.5, zRange: [-7, -5], spacing: 2.8 },
  { shelfY: 6.5, zRange: [-5, -3], spacing: 3.0 },
];

let targets = [];
let roundNumber = 1;
let score = 0;

function createDuck(color) {
  const group = new THREE.Group();

  // Body
  const bodyGeo = new THREE.SphereGeometry(0.5, 16, 12);
  bodyGeo.scale(1, 0.85, 1.2);
  const bodyMat = new THREE.MeshStandardMaterial({
    color, roughness: 0.3, metalness: 0.2,
    emissive: color, emissiveIntensity: 0.8
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.castShadow = true;
  group.add(body);

  // Head
  const headGeo = new THREE.SphereGeometry(0.32, 12, 10);
  const headMat = new THREE.MeshStandardMaterial({
    color: 0xffeeaa, roughness: 0.4, metalness: 0.1,
    emissive: 0x332200, emissiveIntensity: 0.1
  });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.set(0.35, 0.55, 0);
  head.castShadow = true;
  group.add(head);

  // Beak
  const beakGeo = new THREE.ConeGeometry(0.12, 0.35, 6);
  const beakMat = new THREE.MeshStandardMaterial({ color: 0xff8800, roughness: 0.5 });
  const beak = new THREE.Mesh(beakGeo, beakMat);
  beak.rotation.z = -Math.PI / 2;
  beak.position.set(0.65, 0.52, 0);
  group.add(beak);

  // Eye
  const eyeGeo = new THREE.SphereGeometry(0.07, 8, 6);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  const eyeWhite = new THREE.Mesh(eyeGeo, eyeMat);
  eyeWhite.position.set(0.5, 0.62, 0.2);
  group.add(eyeWhite);

  // Wing highlight
  const wingGeo = new THREE.SphereGeometry(0.25, 8, 6);
  wingGeo.scale(1, 0.5, 0.3);
  const wingMat = new THREE.MeshStandardMaterial({
    color: 0xffffff, roughness: 0.2, metalness: 0.5,
    emissive: color, emissiveIntensity: 0.7, transparent: true, opacity: 0.5
  });
  const wing = new THREE.Mesh(wingGeo, wingMat);
  wing.position.set(-0.1, 0.05, 0.45);
  group.add(wing);

  // Neon outline
  const outlineGeo = bodyGeo.clone();
  const outlineMat = new THREE.MeshBasicMaterial({
    color, wireframe: true, transparent: true, opacity: 0.3
  });
  const outline = new THREE.Mesh(outlineGeo, outlineMat);
  outline.scale.setScalar(1.05);
  group.add(outline);

  return group;
}

function createCircleTarget(color) {
  const group = new THREE.Group();

  // Outer ring
  const outerGeo = new THREE.TorusGeometry(0.55, 0.08, 8, 32);
  const outerMat = new THREE.MeshStandardMaterial({
    color, roughness: 0.2, metalness: 0.6,
    emissive: color, emissiveIntensity: 0.6
  });
  const outer = new THREE.Mesh(outerGeo, outerMat);
  outer.castShadow = true;
  group.add(outer);

  // Middle ring
  const midGeo = new THREE.TorusGeometry(0.35, 0.06, 8, 24);
  const midMat = new THREE.MeshStandardMaterial({
    color: 0xffffff, roughness: 0.2, metalness: 0.5,
    emissive: 0xffffff, emissiveIntensity: 0.5
  });
  const mid = new THREE.Mesh(midGeo, midMat);
  group.add(mid);

  // Bullseye
  const centerGeo = new THREE.CircleGeometry(0.18, 16);
  const centerMat = new THREE.MeshStandardMaterial({
    color, roughness: 0.2, metalness: 0.3,
    emissive: color, emissiveIntensity: 0.9
  });
  const center = new THREE.Mesh(centerGeo, centerMat);
  group.add(center);

  // Back plate
  const plateGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.1, 16);
  const plateMat = new THREE.MeshStandardMaterial({ color: 0x1a0020, roughness: 0.8, metalness: 0.2 });
  const plate = new THREE.Mesh(plateGeo, plateMat);
  plate.rotation.x = Math.PI / 2;
  plate.position.z = -0.08;
  plate.castShadow = true;
  group.add(plate);

  return group;
}

function createDiamondTarget(color) {
  const group = new THREE.Group();

  const shape = new THREE.Shape();
  shape.moveTo(0, 0.7);
  shape.lineTo(0.5, 0);
  shape.lineTo(0, -0.7);
  shape.lineTo(-0.5, 0);
  shape.closePath();

  const extrudeSettings = { depth: 0.15, bevelEnabled: true, bevelSize: 0.03, bevelThickness: 0.03, bevelSegments: 2 };
  const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
  const mat = new THREE.MeshStandardMaterial({
    color, roughness: 0.2, metalness: 0.5,
    emissive: color, emissiveIntensity: 0.9
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  group.add(mesh);

  // Wire outline
  const edges = new THREE.EdgesGeometry(geo);
  const lineMat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.5 });
  const wireframe = new THREE.LineSegments(edges, lineMat);
  group.add(wireframe);

  return group;
}

function spawnRound() {
  // Clear old targets
  targets.forEach(t => {
    scene.remove(t.group);
    t.group.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
        else child.material.dispose();
      }
    });
  });
  targets = [];

  const count = 5 + roundNumber * 2;
  let idx = 0;

  SHELF_CONFIGS.forEach((cfg, shelfIdx) => {
    const perShelf = Math.ceil(count / SHELF_CONFIGS.length);
    for (let i = 0; i < perShelf && idx < count; i++, idx++) {
      const type = (shelfIdx + idx) % 3;
      const color = TARGET_COLORS[(shelfIdx + idx) % TARGET_COLORS.length];
      const x = (i - (perShelf - 1) / 2) * cfg.spacing;
      const y = cfg.shelfY + (Math.random() - 0.5) * 0.3;
      const z = cfg.zRange[0] + Math.random() * (cfg.zRange[1] - cfg.zRange[0]);

      let group;
      if (type === 0) group = createDuck(color);
      else if (type === 1) group = createCircleTarget(color);
      else group = createDiamondTarget(color);

      group.position.set(x, y, z);
      group.rotation.y = (Math.random() - 0.5) * 0.3;
      scene.add(group);

      targets.push({
        group,
        color,
        originalY: y,
        originalZ: z,
        alive: true,
        dying: false,
        deathTimer: 0,
        hitFlash: 0,
        points: 10 + (shelfIdx + 1) * 5 + roundNumber * 2,
      });
    }
  });

  updateUI();
}

function updateUI() {
  document.getElementById('score-value').textContent = score;
  document.getElementById('round-num').textContent = roundNumber;
  const alive = targets.filter(t => t.alive).length;
  document.getElementById('targets-left').textContent = alive;
}

// ============================================================
//  SHOOTING MECHANICS
// ============================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const mouseWorld = new THREE.Vector3();

let isCharging = false;
let chargeStart = 0;
const CHARGE_TIME = 0.4;
let cooldownTime = 0;
const COOLDOWN_TIME = 0.2;
let canShoot = true;
let lastShotNDC = new THREE.Vector2();

// Tracer lines pool
const tracerPool = [];
const MAX_TRACERS = 10;

function getTracer() {
  for (let t of tracerPool) { if (!t.active) return t; }
  if (tracerPool.length >= MAX_TRACERS) return null;

  const geo = new THREE.BufferGeometry();
  const mat = new THREE.LineBasicMaterial({ color: 0xffee00, transparent: true, opacity: 1.0, linewidth: 2 });
  const line = new THREE.Line(geo, mat);
  line.visible = false;
  scene.add(line);

  const tracer = { mesh: line, geo, active: false };
  tracerPool.push(tracer);
  return tracer;
}

function fireTracer(from, to) {
  const t = getTracer();
  if (!t) return;
  t.geo.setFromPoints([from.clone(), to.clone()]);
  t.mesh.position.set(0, 0, 0);
  t.mesh.visible = true;
  t.active = true;
  t.timer = 0;
}

function updateTracers(dt) {
  tracerPool.forEach(t => {
    if (!t.active) return;
    t.timer += dt;
    const life = t.timer / 0.25;
    if (life >= 1) {
      t.active = false;
      t.mesh.visible = false;
      return;
    }
    t.mesh.material.opacity = 0.8 * (1 - life);
  });
}

// Hit flash meshes
const hitFlashPool = [];
const MAX_HIT_FLASHES = 10;

function createHitFlash(pos, color) {
  let hf = hitFlashPool.find(h => !h.active);
  if (!hf) {
    if (hitFlashPool.length >= MAX_HIT_FLASHES) return;
    const geo = new THREE.SphereGeometry(0.5, 8, 6);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.visible = false;
    scene.add(mesh);
    hf = { mesh, active: false, timer: 0 };
    hitFlashPool.push(hf);
  }
  hf.mesh.position.copy(pos);
  hf.mesh.scale.setScalar(0.3);
  hf.mesh.material.color.setHex(0xffffff);
  hf.mesh.material.opacity = 1;
  hf.mesh.visible = true;
  hf.active = true;
  hf.timer = 0;
}

function updateHitFlashes(dt) {
  hitFlashPool.forEach(hf => {
    if (!hf.active) return;
    hf.timer += dt;
    const life = hf.timer / 0.3;
    if (life >= 1) {
      hf.active = false;
      hf.mesh.visible = false;
      return;
    }
    hf.mesh.scale.setScalar(0.3 + life * 1.2);
    hf.mesh.material.opacity = 1 - life;
  });
}

// ============================================================
//  PARTICLE SPARKLES
// ============================================================
const MAX_PARTICLES = 500;
const particlePositions = new Float32Array(MAX_PARTICLES * 3);
const particleColors = new Float32Array(MAX_PARTICLES * 3);
const particleSizes = new Float32Array(MAX_PARTICLES);
const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.PointsMaterial({
  size: 0.15,
  vertexColors: true,
  transparent: true,
  opacity: 0.9,
  sizeAttenuation: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});

const particleSystem = new THREE.Points(particleGeo, particleMat);
scene.add(particleSystem);

const particles = [];

function spawnParticles(pos, color, count = 20) {
  for (let i = 0; i < count; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    const c = new THREE.Color(color);
    c.r += (Math.random() - 0.5) * 0.5;
    c.g += (Math.random() - 0.5) * 0.5;
    c.b += (Math.random() - 0.5) * 0.5;
    particles.push({
      pos: pos.clone(),
      vel: new THREE.Vector3(
        (Math.random() - 0.5) * 8,
        Math.random() * 6 + 2,
        (Math.random() - 0.5) * 8
      ),
      color: c,
      life: 0,
      maxLife: 0.5 + Math.random() * 0.5,
      size: 0.08 + Math.random() * 0.15,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life += dt;
    if (p.life >= p.maxLife) {
      particles.splice(i, 1);
      continue;
    }
    p.vel.y -= 9.8 * dt;
    p.pos.addScaledVector(p.vel, dt);
    const t = p.life / p.maxLife;
    const opacity = 1 - t * t;
    p.color.multiplyScalar(0.98);
  }

  const pos = particleGeo.attributes.position;
  const col = particleGeo.attributes.color;
  const siz = particleGeo.attributes.size;

  for (let i = 0; i < MAX_PARTICLES; i++) {
    if (i < particles.length) {
      const p = particles[i];
      pos.setXYZ(i, p.pos.x, p.pos.y, p.pos.z);
      col.setXYZ(i, p.color.r, p.color.g, p.color.b);
      const t = p.life / p.maxLife;
      siz.setX(i, p.size * (1 - t));
    } else {
      pos.setXYZ(i, 0, -999, 0);
      col.setXYZ(i, 0, 0, 0);
      siz.setX(i, 0);
    }
  }
  pos.needsUpdate = true;
  col.needsUpdate = true;
  siz.needsUpdate = true;
}

// ============================================================
//  SHOOT
// ============================================================
function shoot() {
  if (!canShoot || cooldownTime > 0) return;

  raycaster.setFromCamera(lastShotNDC, camera);
  const targetMeshes = [];
  const targetData = [];
  targets.forEach(t => {
    if (!t.alive) return;
    t.group.traverse(child => {
      if (child.isMesh) {
        targetMeshes.push(child);
        targetData.push({ mesh: child, target: t });
      }
    });
  });

  const intersects = raycaster.intersectObjects(targetMeshes, false);

  let hitPoint = new THREE.Vector3();
  let didHit = false;

  if (intersects.length > 0) {
    const hit = intersects[0];
    hitPoint.copy(hit.point);
    didHit = true;

    const hitTargetData = targetData.find(d => d.mesh === hit.object);
    if (hitTargetData && hitTargetData.target.alive && !hitTargetData.target.dying) {
      hitTarget(hitTargetData.target);
    }
  }

  // Always show tracer
  const camPos = camera.position.clone();
  const dir = raycaster.ray.direction;
  const endPoint = didHit ? hitPoint : camPos.clone().addScaledVector(dir, 25);
  fireTracer(camPos, endPoint);

  // Muzzle flash
  spawnParticles(camPos.clone().addScaledVector(dir, 0.5), 0xffee88, 5);

  // Screen flash
  const flashEl = document.getElementById('muzzle-flash');
  flashEl.classList.add('fire');
  setTimeout(() => flashEl.classList.remove('fire'), 80);

  cooldownTime = COOLDOWN_TIME;
}

function hitTarget(target) {
  target.alive = false;
  target.dying = true;
  target.deathTimer = 0;
  score += target.points;
  updateUI();

  // Flash and particles at target
  const worldPos = new THREE.Vector3();
  target.group.getWorldPosition(worldPos);
  createHitFlash(worldPos, target.color);
  spawnParticles(worldPos, target.color, 30);

  // Check round clear
  const alive = targets.filter(t => t.alive).length;
  if (alive === 0) {
    setTimeout(() => showRoundClear(), 600);
  }
}

// ============================================================
//  ROUND CLEAR
// ============================================================
const messageEl = document.getElementById('message');

function showRoundClear() {
  messageEl.textContent = 'ROUND CLEAR!';
  messageEl.classList.add('show');
  setTimeout(() => {
    messageEl.classList.remove('show');
    setTimeout(() => {
      roundNumber++;
      spawnRound();
    }, 500);
  }, 2000);
}

// ============================================================
//  ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();

// Ambient neon glow pulse
let glowTime = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  glowTime += dt;

  // Update camera orbit (limited)
  updateCamera();

  // Cooldown
  if (cooldownTime > 0) cooldownTime -= dt;

  // Charge bar
  if (isCharging) {
    const charge = Math.min((performance.now() - chargeStart) / 1000 / CHARGE_TIME, 1);
    document.getElementById('reload-bar').style.width = (charge * 100) + '%';
    if (charge >= 1 && canShoot) {
      // Auto-fire at full charge
      shoot();
      canShoot = false;
      setTimeout(() => { canShoot = true; }, 300);
    }
  } else {
    document.getElementById('reload-bar').style.width = '0%';
  }

  // Update targets
  targets.forEach(t => {
    if (!t.alive) {
      if (t.dying) {
        t.deathTimer += dt;
        const p = Math.min(t.deathTimer / 0.6, 1);
        // Fall and shrink
        t.group.position.y = t.originalY - p * 3;
        t.group.scale.setScalar(Math.max(0, 1 - p));
        t.group.rotation.x += dt * 3;
        t.group.rotation.z += dt * 2;
        if (p >= 1) {
          t.dying = false;
          t.group.visible = false;
        }
      }
    } else {
      // Idle bob
      t.group.position.y = t.originalY + Math.sin(glowTime * 2 + t.group.position.x) * 0.04;
      // Glow pulse on emissive
      t.group.traverse(child => {
        if (child.isMesh && child.material && child.material.emissiveIntensity !== undefined) {
          child.material.emissiveIntensity = 0.4 + Math.sin(glowTime * 3 + t.group.position.x * 2) * 0.3;
        }
      });
    }
  });

  // Neon border pulse
  const borderIntensity = 0.5 + Math.sin(glowTime * 2) * 0.3;
  border.material.color.setRGB(
    1,
    0.13 * borderIntensity + 0.05,
    0.4 * borderIntensity
  );

  // Rim light pulse
  rimLight.intensity = 2.0 + Math.sin(glowTime * 1.5) * 0.5;

  updateTracers(dt);
  updateHitFlashes(dt);
  updateParticles(dt);

  renderer.render(scene, camera);
}

// ============================================================
//  INPUT
// ============================================================
document.addEventListener('mousedown', e => {
  if (e.button === 0) {
    isCharging = true;
    chargeStart = performance.now();
    lastShotNDC.set(
      (e.clientX / window.innerWidth) * 2 - 1,
      -(e.clientY / window.innerHeight) * 2 + 1
    );
  }
  if (e.button === 2) {
    isDragging = true;
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
    rightMouseDown = true;
  }
});

document.addEventListener('mouseup', e => {
  if (e.button === 0 && isCharging) {
    const charge = Math.min((performance.now() - chargeStart) / 1000 / CHARGE_TIME, 1);
    isCharging = false;
    if (charge < 1 && canShoot) {
      shoot();
    }
  }
  if (e.button === 2) {
    isDragging = false;
    rightMouseDown = false;
  }
});

document.addEventListener('mousemove', e => {
  if (isDragging) {
    const dx = e.clientX - lastMouseX;
    const dy = e.clientY - lastMouseY;
    orbitTheta -= dx * 0.005;
    orbitPhi = Math.max(0.05, Math.min(Math.PI / 2.2, orbitPhi + dy * 0.005));
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
  }
  // Always track NDC for shooting
  lastShotNDC.set(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
});

    orbitPhi = Math.max(0.05, Math.min(Math.PI / 2.2, orbitPhi + dy * 0.005));
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
  }
});

document.addEventListener('contextmenu', e => e.preventDefault());

// ============================================================
//  RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
//  START
// ============================================================
spawnRound();
animate();

// Expose to window
window.THREE = THREE;
window.scene = scene;
window.camera = camera;
window.renderer = renderer;
window.targets = targets;
window.score = score;
window.roundNumber = roundNumber;
</script>
