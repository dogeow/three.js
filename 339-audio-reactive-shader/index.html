<!-- Example 339: Audio Reactive Shader Visualizer -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Reactive Shader Visualizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75);
    color: #fff; z-index: 10;
    transition: opacity 0.5s;
  }
  #overlay h1 { font-size: 2rem; margin-bottom: 0.5rem; letter-spacing: 0.2em; }
  #overlay p { font-size: 0.9rem; color: #aaa; margin-bottom: 1.5rem; }
  #overlay input[type="file"] { display: none; }
  #overlay label, #overlay button {
    padding: 0.6rem 1.4rem; margin: 0.3rem;
    border: 1px solid #555; background: transparent;
    color: #ccc; cursor: pointer; font-family: inherit;
    border-radius: 4px; transition: all 0.2s;
  }
  #overlay label:hover, #overlay button:hover {
    border-color: #0af; color: #0af;
  }
  #overlay .hint { margin-top: 1rem; font-size: 0.75rem; color: #666; }
</style>
</head>
<body>

<div id="overlay">
  <h1>AUDIO REACTIVE SHADER</h1>
  <p>Click to start audio context</p>
  <input type="file" id="fileInput" accept="audio/*">
  <label for="fileInput">Load Audio File</label>
  <button id="demoBtn">Use Oscillator Demo</button>
  <p class="hint">Press Space or click anywhere to toggle audio</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

// ─── State ───────────────────────────────────────────────────────────────────
let audioCtx = null;
let analyser = null;
let dataArray = null;
let sourceNode = null;
let audioBuffer = null;
let isPlaying = false;
let isDemo = false;
let started = false;

const PARAMS = {
  fftSize: 256,
  smoothing: 0.8,
  colorScheme: 'Neon',
  bloomStrength: 1.5,
  bloomRadius: 0.4,
  bloomThreshold: 0.2,
  barSpacing: 0.35,
  particleCount: 3000,
  particleSpeed: 1.0,
  spherePulse: 1.0
};

// ─── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
scene.fog = new THREE.FogExp2(0x050508, 0.035);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 10, 28);
camera.lookAt(0, 4, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2 - 0.05;
controls.minDistance = 8;
controls.maxDistance = 60;

// ─── Post-processing ──────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  PARAMS.bloomStrength, PARAMS.bloomRadius, PARAMS.bloomThreshold
);
composer.addPass(bloomPass);

// ─── Lights ───────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x111122, 0.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
dirLight.position.set(5, 15, 5);
scene.add(dirLight);

// ─── Grid Floor ───────────────────────────────────────────────────────────────
const gridHelper = new THREE.GridHelper(60, 60, 0x1a1a3a, 0x0a0a1a);
gridHelper.position.y = -0.01;
scene.add(gridHelper);

const floorGeo = new THREE.PlaneGeometry(60, 60);
const floorMat = new THREE.MeshBasicMaterial({
  color: 0x050510, transparent: true, opacity: 0.6
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.02;
scene.add(floor);

// ─── Color Scheme ─────────────────────────────────────────────────────────────
const COLOR_SCHEMES = {
  Neon:    { bass: new THREE.Color(0xff2200), mid: new THREE.Color(0x00ffaa), high: new THREE.Color(0x0055ff) },
  Ocean:   { bass: new THREE.Color(0x004488), mid: new THREE.Color(0x00aacc), high: new THREE.Color(0x88eeff) },
  Sunset:  { bass: new THREE.Color(0xff5500), mid: new THREE.Color(0xff9900), high: new THREE.Color(0xff00aa) }
};

function getColors() {
  return COLOR_SCHEMES[PARAMS.colorScheme];
}

// ─── Custom Shader Material ───────────────────────────────────────────────────
const barShaderMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uBass: { value: 0 },
    uMid: { value: 0 },
    uHigh: { value: 0 },
    uBassColor: { value: getColors().bass },
    uMidColor: { value: getColors().mid },
    uHighColor: { value: getColors().high }
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPos;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vPos = (modelMatrix * vec4(position, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform float uBass;
    uniform float uMid;
    uniform float uHigh;
    uniform vec3 uBassColor;
    uniform vec3 uMidColor;
    uniform vec3 uHighColor;
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vPos;

    void main() {
      float edge = 1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0)));
      float rim = pow(edge, 2.0);

      float freqMix = uBass * 0.5 + uMid * 0.3 + uHigh * 0.2;
      vec3 col = mix(uBassColor, uMidColor, clamp(uMid * 2.0, 0.0, 1.0));
      col = mix(col, uHighColor, clamp(uHigh * 2.5, 0.0, 1.0));

      float pulse = 0.85 + 0.15 * sin(uTime * 8.0 + vPos.y * 2.0);
      col *= pulse;
      col += rim * col * 0.6;
      col += vec3(0.1, 0.05, 0.15) * uBass;

      gl_FragColor = vec4(col, 1.0);
    }
  `,
  side: THREE.DoubleSide
});

// ─── 64 Bar Columns (InstancedMesh) ──────────────────────────────────────────
const BAR_COUNT = 64;
const barGeo = new THREE.BoxGeometry(0.28, 1, 0.28);
const barMesh = new THREE.InstancedMesh(barGeo, barShaderMaterial, BAR_COUNT);
barMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
scene.add(barMesh);

const dummy = new THREE.Object3D();
const barBaseY = 0;

for (let i = 0; i < BAR_COUNT; i++) {
  dummy.position.set((i - BAR_COUNT / 2) * PARAMS.barSpacing, barBaseY + 0.5, 0);
  dummy.scale.set(1, 0.01, 1);
  dummy.updateMatrix();
  barMesh.setMatrixAt(i, dummy.matrix);
}
barMesh.instanceMatrix.needsUpdate = true;

// ─── Central Sphere ───────────────────────────────────────────────────────────
const sphereGeo = new THREE.SphereGeometry(2, 64, 64);
const sphereMat = new THREE.MeshStandardMaterial({
  color: 0x220011, emissive: 0xaa0033, emissiveIntensity: 0.8,
  metalness: 0.9, roughness: 0.1
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
sphere.position.set(0, 4.5, 0);
scene.add(sphere);

// Sphere wireframe overlay
const wireGeo = new THREE.SphereGeometry(2.1, 32, 32);
const wireMat = new THREE.MeshBasicMaterial({ color: 0xff2255, wireframe: true, transparent: true, opacity: 0.15 });
const wireSphere = new THREE.Mesh(wireGeo, wireMat);
sphere.add(wireSphere);

// ─── Particle System ──────────────────────────────────────────────────────────
const particleCount = PARAMS.particleCount;
const particleGeo = new THREE.BufferGeometry();
const pPositions = new Float32Array(particleCount * 3);
const pVelocities = new Float32Array(particleCount * 3);
const pColors = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 5 + Math.random() * 15;
  pPositions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
  pPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta) * 0.4 + 2;
  pPositions[i * 3 + 2] = r * Math.cos(phi);

  pVelocities[i * 3]     = (Math.random() - 0.5) * 0.05;
  pVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.08 + 0.02;
  pVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.05;

  pColors[i * 3]     = 0.5 + Math.random() * 0.5;
  pColors[i * 3 + 1] = 0.3 + Math.random() * 0.4;
  pColors[i * 3 + 2] = 0.8 + Math.random() * 0.2;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));

const particleMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uBass: { value: 0 },
    uMid: { value: 0 },
    uHigh: { value: 0 },
    uVolume: { value: 0 },
    uBassColor: { value: getColors().bass },
    uHighColor: { value: getColors().high }
  },
  vertexShader: `
    uniform float uTime;
    uniform float uVolume;
    uniform float uBass;
    attribute vec3 color;
    varying vec3 vColor;
    varying float vAlpha;
    void main() {
      vColor = color;
      vec3 pos = position;
      pos.y += sin(uTime * 2.0 + position.x * 0.5 + position.z * 0.5) * uVolume * 3.0;
      pos.y += uBass * 4.0 * (1.0 - length(pos.xz) / 20.0);
      vAlpha = 0.6 + 0.4 * sin(uTime * 3.0 + position.x);
      vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
      gl_PointSize = 2.5 + uVolume * 4.0 * (300.0 / -mvPos.z);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    uniform vec3 uBassColor;
    uniform vec3 uHighColor;
    uniform float uHigh;
    varying vec3 vColor;
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      vec3 col = mix(uBassColor, vColor, clamp(1.0 - uHigh * 1.5, 0.0, 1.0));
      col = mix(col, uHighColor, uHigh * 0.7);
      gl_FragColor = vec4(col, vAlpha * (1.0 - d * 2.0));
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ─── Ambient Rings ─────────────────────────────────────────────────────────────
const ringMat = new THREE.MeshBasicMaterial({ color: 0x002244, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
for (let i = 0; i < 3; i++) {
  const ringGeo = new THREE.RingGeometry(6 + i * 3, 6.2 + i * 3, 64);
  const ring = new THREE.Mesh(ringGeo, ringMat.clone());
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.05;
  ring.userData.baseOpacity = 0.2 + i * 0.1;
  scene.add(ring);
}

// ─── Audio Setup ──────────────────────────────────────────────────────────────
function setupAnalyser() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = PARAMS.fftSize;
  analyser.smoothingTimeConstant = PARAMS.smoothing;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
}

async function loadAudioFile(file) {
  setupAnalyser();
  const arrayBuffer = await file.arrayBuffer();
  audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  playAudio();
}

function playAudio() {
  if (sourceNode) {
    sourceNode.stop();
    sourceNode.disconnect();
  }
  sourceNode = audioCtx.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.loop = true;
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);
  sourceNode.start();
  isPlaying = true;
  isDemo = false;
}

function startDemo() {
  setupAnalyser();
  if (sourceNode) { try { sourceNode.stop(); } catch(e){} sourceNode.disconnect(); }

  // Create multiple oscillators for demo
  const gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.3;
  gainNode.connect(analyser);
  analyser.connect(audioCtx.destination);

  // Bass drone
  const bass = audioCtx.createOscillator();
  bass.type = 'sawtooth';
  bass.frequency.value = 55;
  const bassGain = audioCtx.createGain();
  bassGain.gain.value = 0.4;
  bass.connect(bassGain);
  bassGain.connect(gainNode);
  bass.start();

  // Mid melody
  const mid = audioCtx.createOscillator();
  mid.type = 'square';
  mid.frequency.value = 220;
  const midGain = audioCtx.createGain();
  midGain.gain.value = 0.2;
  mid.connect(midGain);
  midGain.connect(gainNode);
  mid.start();

  // Schedule frequency changes
  const melodies = [220, 330, 440, 330, 293, 349, 440, 494];
  let mi = 0;
  setInterval(() => {
    mid.frequency.setTargetAtTime(melodies[mi++ % melodies.length], audioCtx.currentTime, 0.1);
  }, 400);

  // High shimmer
  const high = audioCtx.createOscillator();
  high.type = 'sine';
  high.frequency.value = 1760;
  const highGain = audioCtx.createGain();
  highGain.gain.value = 0.1;
  high.connect(highGain);
  highGain.connect(gainNode);
  high.start();

  setInterval(() => {
    high.frequency.setTargetAtTime(880 + Math.random() * 1760, audioCtx.currentTime, 0.05);
  }, 200);

  sourceNode = { stop: () => { bass.stop(); mid.stop(); high.stop(); } };
  isPlaying = true;
  isDemo = true;
}

function stopAudio() {
  if (sourceNode) {
    try { sourceNode.stop(); } catch(e) {}
    sourceNode.disconnect();
    sourceNode = null;
  }
  isPlaying = false;
}

function toggleAudio() {
  if (!started) { started = true; hideOverlay(); }
  if (isPlaying) stopAudio();
  else if (isDemo) startDemo();
  else if (audioBuffer) playAudio();
}

// ─── FFT Analysis ─────────────────────────────────────────────────────────────
function getFrequencyData() {
  if (!analyser) return { bass: 0, mid: 0, high: 0, volume: 0, raw: null };
  analyser.fftSize = PARAMS.fftSize;
  analyser.smoothingTimeConstant = PARAMS.smoothing;
  analyser.getByteFrequencyData(dataArray);

  const len = dataArray.length;
  const bassEnd = Math.floor(len * 0.1);
  const midEnd = Math.floor(len * 0.5);

  let bassSum = 0, midSum = 0, highSum = 0;
  for (let i = 0; i < bassEnd; i++) bassSum += dataArray[i];
  for (let i = bassEnd; i < midEnd; i++) midSum += dataArray[i];
  for (let i = midEnd; i < len; i++) highSum += dataArray[i];

  const bass = (bassSum / bassEnd / 255);
  const mid = (midSum / (midEnd - bassEnd) / 255);
  const high = (highSum / (len - midEnd) / 255);
  const volume = (bass + mid + high) / 3;

  return { bass, mid, high, volume, raw: dataArray };
}

// ─── Update Scene ─────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let bassSmooth = 0, midSmooth = 0, highSmooth = 0, volumeSmooth = 0;

function updateScene(time, freq) {
  bassSmooth += (freq.bass - bassSmooth) * 0.15;
  midSmooth  += (freq.mid  - midSmooth)  * 0.12;
  highSmooth += (freq.high - highSmooth) * 0.1;
  volumeSmooth += (freq.volume - volumeSmooth) * 0.1;

  // Update bar heights
  if (freq.raw) {
    const step = Math.floor(freq.raw.length / BAR_COUNT);
    for (let i = 0; i < BAR_COUNT; i++) {
      let sum = 0;
      for (let j = 0; j < step; j++) sum += freq.raw[i * step + j];
      const avg = sum / step / 255;
      const h = Math.max(0.05, avg * 18);
      dummy.position.set((i - BAR_COUNT / 2) * PARAMS.barSpacing, barBaseY + h / 2, 0);
      dummy.scale.set(1, h, 1);
      dummy.updateMatrix();
      barMesh.setMatrixAt(i, dummy.matrix);
    }
    barMesh.instanceMatrix.needsUpdate = true;
  }

  // Update sphere
  const pulse = 1.0 + bassSmooth * 0.6 * PARAMS.spherePulse;
  sphere.scale.setScalar(pulse);
  sphere.rotation.y += 0.008 + bassSmooth * 0.02;
  sphere.rotation.x += 0.003 + midSmooth * 0.01;
  const sc = getColors();
  sphere.material.emissive.set(sc.bass);
  sphere.material.emissiveIntensity = 0.5 + bassSmooth * 1.2;

  // Update rings
  scene.children.forEach(c => {
    if (c.isMesh && c.geometry.type === 'RingGeometry') {
      c.material.opacity = c.userData.baseOpacity + bassSmooth * 0.3;
      c.rotation.z += 0.002 + midSmooth * 0.005;
    }
  });

  // Update shader uniforms
  barShaderMaterial.uniforms.uTime.value = time;
  barShaderMaterial.uniforms.uBass.value = bassSmooth;
  barShaderMaterial.uniforms.uMid.value = midSmooth;
  barShaderMaterial.uniforms.uHigh.value = highSmooth;
  barShaderMaterial.uniforms.uBassColor.value = sc.bass;
  barShaderMaterial.uniforms.uMidColor.value = sc.mid;
  barShaderMaterial.uniforms.uHighColor.value = sc.high;

  particleMat.uniforms.uTime.value = time;
  particleMat.uniforms.uBass.value = bassSmooth;
  particleMat.uniforms.uMid.value = midSmooth;
  particleMat.uniforms.uHigh.value = highSmooth;
  particleMat.uniforms.uVolume.value = volumeSmooth;
  particleMat.uniforms.uBassColor.value = sc.bass;
  particleMat.uniforms.uHighColor.value = sc.high;

  // Update particles position.y drift
  const posAttr = particleGeo.attributes.position;
  for (let i = 0; i < particleCount; i++) {
    pPositions[i * 3 + 1] += pVelocities[i * 3 + 1] * PARAMS.particleSpeed * (1 + volumeSmooth * 2);
    if (pPositions[i * 3 + 1] > 25) {
      pPositions[i * 3 + 1] = -2;
      const theta = Math.random() * Math.PI * 2;
      const r = 3 + Math.random() * 12;
      pPositions[i * 3] = r * Math.cos(theta);
      pPositions[i * 3 + 2] = r * Math.sin(theta);
    }
  }
  posAttr.needsUpdate = true;

  // Bloom
  bloomPass.strength = PARAMS.bloomStrength * (1 + bassSmooth * 0.5);
}

// ─── GUI ───────────────────────────────────────────────────────────────────────
const gui = new GUI({ title: 'Audio Visualizer' });
gui.add(PARAMS, 'fftSize', [128, 256, 512, 1024, 2048]).name('FFT Size').onChange(() => {
  if (analyser) analyser.fftSize = PARAMS.fftSize;
});
gui.add(PARAMS, 'smoothing', 0, 0.99, 0.01).name('Smoothing');
gui.add(PARAMS, 'colorScheme', ['Neon', 'Ocean', 'Sunset']).name('Color Scheme');
gui.add(PARAMS, 'bloomStrength', 0, 3, 0.05).name('Bloom Strength');
gui.add(PARAMS, 'bloomRadius', 0, 1, 0.05).name('Bloom Radius').onChange(v => bloomPass.radius = v);
gui.add(PARAMS, 'bloomThreshold', 0, 1, 0.05).name('Bloom Threshold').onChange(v => bloomPass.threshold = v);
gui.add(PARAMS, 'barSpacing', 0.1, 0.6, 0.05).name('Bar Spacing');
gui.add(PARAMS, 'particleSpeed', 0, 3, 0.1).name('Particle Speed');
gui.add(PARAMS, 'spherePulse', 0, 2, 0.1).name('Sphere Pulse');

// ─── Overlay ──────────────────────────────────────────────────────────────────
const overlay = document.getElementById('overlay');
const fileInput = document.getElementById('fileInput');

function hideOverlay() {
  overlay.style.opacity = '0';
  setTimeout(() => overlay.style.display = 'none', 500);
}

fileInput.addEventListener('change', async (e) => {
  if (e.target.files[0]) {
    if (!started) { started = true; hideOverlay(); }
    await loadAudioFile(e.target.files[0]);
  }
});

document.getElementById('demoBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (!started) { started = true; hideOverlay(); }
  startDemo();
});

document.addEventListener('click', () => { if (started) toggleAudio(); });
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); if (started) toggleAudio(); }
});

// ─── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animation Loop ───────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();
  const freq = getFrequencyData();
  updateScene(time, freq);
  controls.update();
  composer.render();
}
animate();
</script>
</body>
</html>
