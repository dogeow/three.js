<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowflake Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000a1a; }
  canvas { display: block; }
  #hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(180, 220, 255, 0.6);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    pointer-events: none;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div id="hint">Click to regenerate · Drag to orbit</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import GUI from 'three/addons/libs/lil-gui.module.min.js';

// ── Renderer ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000a1a, 1);
document.body.appendChild(renderer.domElement);

// ── Scene & Camera ────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(0, 0, 5);

// ── Controls ──────────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.5;
controls.maxDistance = 15;

// ── GUI ───────────────────────────────────────────────────────────────────────
const params = {
  armLevels: 3,
  branchAngleVariance: 0.25,
  snowflakeSize: 1.8,
  rotationSpeed: 0.3,
  export: () => {
    const data = {
      armLevels: gui.params.armLevels,
      branchAngleVariance: gui.params.branchAngleVariance,
      snowflakeSize: gui.params.snowflakeSize,
      rotationSpeed: gui.params.rotationSpeed,
      seed: currentSeed
    };
    console.log('Snowflake params:', JSON.stringify(data, null, 2));
    alert('Params logged to console:\n' + JSON.stringify(data, null, 2));
  }
};

const gui = new GUI({ title: '❄ Snowflake Controls' });
gui.add(params, 'armLevels', 1, 4, 1).name('Arm Levels').onChange(regenerate);
gui.add(params, 'branchAngleVariance', 0, 1, 0.01).name('Angle Variance').onChange(regenerate);
gui.add(params, 'snowflakeSize', 0.5, 4, 0.1).name('Size').onChange(regenerate);
gui.add(params, 'rotationSpeed', 0, 1.5, 0.05).name('Rotation Speed');
gui.add(params, 'export').name('📤 Export Params');

// ── Snowflake State ───────────────────────────────────────────────────────────
let snowflakeGroup = new THREE.Group();
scene.add(snowflakeGroup);
let currentSeed = Math.random() * 10000 | 0;

// ── Seeded RNG ────────────────────────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ── Build one arm as a CatmullRomCurve3, return Points ────────────────────────
function buildArmPoints(rng, maxLevels, angleBase, length, width, spreadAngle) {
  const pts = [];
  // start at center (will be duplicated for the loop later)
  pts.push(new THREE.Vector3(0, 0, 0));

  function build(level, pos, dir, len, wid) {
    if (level > maxLevels) return;
    const remaining = maxLevels - level + 1;
    const segLen = len / remaining;

    // main extension
    const tip = pos.clone().addScaledVector(dir, segLen);
    pts.push(tip.clone());

    if (level < maxLevels) {
      // two side branches at ±60° from current direction
      const sideAngles = [
        angleBase + Math.PI / 3 + (rng() - 0.5) * spreadAngle,
        angleBase - Math.PI / 3 + (rng() - 0.5) * spreadAngle
      ];
      for (const sa of sideAngles) {
        const sideDir = new THREE.Vector3(Math.cos(sa), Math.sin(sa), 0).normalize();
        const sideLen = segLen * (0.55 + rng() * 0.25);
        const sideTip = tip.clone().addScaledVector(sideDir, sideLen);
        pts.push(sideTip.clone());
        build(level + 1, sideTip, sideDir, sideLen, wid * 0.65);

        // tertiary branches at ±120° from main
        const tertAngles = [
          sa + Math.PI / 3 * 2 + (rng() - 0.5) * spreadAngle * 0.5,
          sa - Math.PI / 3 * 2 + (rng() - 0.5) * spreadAngle * 0.5
        ];
        for (const ta of tertAngles) {
          if (level + 1 < maxLevels) {
            const tertDir = new THREE.Vector3(Math.cos(ta), Math.sin(ta), 0).normalize();
            const tertLen = sideLen * 0.4 * rng();
            const tertTip = sideTip.clone().addScaledVector(tertDir, tertLen);
            pts.push(tertTip.clone());
            build(level + 2, tertTip, tertDir, tertLen, wid * 0.5);
          }
        }
      }
    }
  }

  build(1, new THREE.Vector3(0, 0, 0), new THREE.Vector3(Math.cos(angleBase), Math.sin(angleBase), 0), length, width);
  return pts;
}

// ── Generate snowflake ────────────────────────────────────────────────────────
function generateSnowflake(seed) {
  const rng = mulberry32(seed | 0);
  const { armLevels, branchAngleVariance, snowflakeSize } = params;

  // remove old
  while (snowflakeGroup.children.length) {
    const c = snowflakeGroup.children[0];
    c.geometry?.dispose();
    if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
    else c.material?.dispose();
    snowflakeGroup.remove(c);
  }

  const numArms = 6;
  const armLength = snowflakeSize * 0.9;
  const spreadAngle = branchAngleVariance * Math.PI / 3;

  const mat = new THREE.MeshBasicMaterial({
    color: 0xc8e8ff,
    transparent: true,
    opacity: 0.85,
    side: THREE.DoubleSide
  });

  for (let a = 0; a < numArms; a++) {
    const angleBase = (a / numArms) * Math.PI * 2;
    const pts = buildArmPoints(rng, armLevels, angleBase, armLength, 0.05, spreadAngle);

    if (pts.length < 2) continue;

    // deduplicate sequential dupes (Vector3 doesn't compare so use plain)
    const uniquePts = [pts[0]];
    for (let i = 1; i < pts.length; i++) {
      const prev = uniquePts[uniquePts.length - 1];
      if (pts[i].distanceTo(prev) > 0.001) uniquePts.push(pts[i]);
    }
    if (uniquePts.length < 2) continue;

    // ── Tube along the main path ──────────────────────────────────────────────
    try {
      const curve = new THREE.CatmullRomCurve3(uniquePts);
      const tubeGeo = new THREE.TubeGeometry(curve, Math.max(8, uniquePts.length * 2), 0.018, 5, false);
      const tubeMesh = new THREE.Mesh(tubeGeo, mat.clone());
      snowflakeGroup.add(tubeMesh);
    } catch(e) {}

    // ── Also draw fat lines for branches ────────────────────────────────────
    // Build line segments from pts directly for a crisper dendritic look
    for (let i = 1; i < uniquePts.length; i++) {
      const segPts = [uniquePts[i-1], uniquePts[i]];
      const lineGeo = new THREE.BufferGeometry().setFromPoints(segPts);
      const lineMat = new THREE.LineBasicMaterial({
        color: 0xa8d8ff,
        transparent: true,
        opacity: 0.7,
        linewidth: 1
      });
      snowflakeGroup.add(new THREE.Line(lineGeo, lineMat));
    }
  }

  // central hex sparkle
  const hexGeo = new THREE.CircleGeometry(snowflakeSize * 0.06, 6);
  const hexMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
  const hex = new THREE.Mesh(hexGeo, hexMat);
  hex.position.z = 0.001;
  snowflakeGroup.add(hex);

  // inner ring glow
  const ringGeo = new THREE.RingGeometry(snowflakeSize * 0.05, snowflakeSize * 0.09, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x88ccff, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
  snowflakeGroup.add(new THREE.Mesh(ringGeo, ringMat));
}

function regenerate() {
  currentSeed = Math.random() * 10000 | 0;
  generateSnowflake(currentSeed);
}

// ── Starfield background ───────────────────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starCount = 1800;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const r = 40 + Math.random() * 60;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starPos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
  starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  starPos[i * 3 + 2] = r * Math.cos(phi);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0x99bbdd, size: 0.12, sizeAttenuation: true, transparent: true, opacity: 0.7 });
scene.add(new THREE.Points(starGeo, starMat));

// Deep blue fog
scene.fog = new THREE.FogExp2(0x000820, 0.018);

// ── Ambient point light (subtle) ──────────────────────────────────────────────
const light = new THREE.PointLight(0x88ccff, 1, 20);
light.position.set(0, 2, 5);
scene.add(light);

// ── Click to regenerate ───────────────────────────────────────────────────────
window.addEventListener('click', (e) => {
  // ignore clicks on gui
  if (e.target !== renderer.domElement) return;
  regenerate();
});

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Init ──────────────────────────────────────────────────────────────────────
generateSnowflake(currentSeed);

// ── Animation loop ────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  snowflakeGroup.rotation.y = t * params.rotationSpeed;
  snowflakeGroup.rotation.x = Math.sin(t * 0.12) * 0.08;
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
