<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Chladni 3D Plate Vibration</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#030508;font-family:monospace}
canvas{display:block}
#panel{position:fixed;top:14px;left:14px;color:#eee;font-size:12px;background:rgba(0,0,0,0.85);padding:12px 16px;border-radius:6px;line-height:2;border:1px solid rgba(255,255,255,0.08);min-width:200px}
#hint{position:fixed;bottom:14px;left:14px;color:rgba(255,255,255,0.4);font-size:12px}
</style>
</head>
<body>
<div id="panel">
  <b style="color:#fff">Chladni Plate Vibration</b><br>
  Mode (m,n): <span id="mode">2,4</span><br>
  <input id="sM" type="range" min="0" max="6" step="1" value="2" style="width:100px"> m
  <input id="sN" type="range" min="0" max="8" step="1" value="4" style="width:100px"> n
  <br><button id="randomBtn" style="margin-top:4px;padding:3px 12px;cursor:pointer">Random Mode</button>
  <br><label><input type="checkbox" id="particles" checked> Sand Particles</label>
  <label style="margin-left:8px"><input type="checkbox" id="wireframe"> Wireframe</label>
  <label style="margin-left:8px"><input type="checkbox" id="bloom" checked> Bloom</label>
</div>
<div id="hint">Chladni patterns — vibrating plate nodal lines | Space for random mode</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x030508);
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 8, 14);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.2, 0.4, 0.65);
composer.addPass(bloomPass);

// Grid
scene.add(new THREE.GridHelper(30, 30, 0x111122, 0x080810));

// Chladni plate geometry
const plateW = 12, plateH = 10, plateSegs = 120;
const plateGeo = new THREE.PlaneGeometry(plateW, plateH, plateSegs, plateSegs);
const platePos = plateGeo.attributes.position;

// Chladni amplitude: Z = A * sin(m*π*x/W) * sin(n*π*y/H) * sin(ω*t)
// Nodal lines when Z=0: sin(m*π*x/W)=0 OR sin(n*π*y/H)=0
let m = 2, n = 4;
let amplitude = 1.2;
let phase = 0;

// Material: vertex colors for displacement
const count = platePos.count;
const colors = new Float32Array(count * 3);
const plateMat = new THREE.MeshStandardMaterial({
  vertexColors: true,
  side: THREE.DoubleSide,
  metalness: 0.8,
  roughness: 0.2,
  emissive: 0x112244,
});

function updatePlateGeometry() {
  const posArr = plateGeo.attributes.position.array;
  for (let i = 0; i < count; i++) {
    const x = posArr[i * 3];
    const y = posArr[i * 3 + 1];
    // Chladni displacement
    const z = amplitude * Math.sin(m * Math.PI * (x / plateW + 0.5)) *
                      Math.sin(n * Math.PI * (y / plateH + 0.5)) *
                      Math.sin(phase);
    posArr[i * 3 + 2] = z;
    // Color based on displacement
    const norm = (z / amplitude + 1) * 0.5;
    // Blue for peaks, amber for valleys
    colors[i * 3] = norm * 0.3 + (1 - norm) * 0.6;
    colors[i * 3 + 1] = norm * 0.1;
    colors[i * 3 + 2] = norm * 0.8 + (1 - norm) * 0.05;
  }
  plateGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  plateGeo.computeVertexNormals();
}

updatePlateGeometry();
const plateMesh = new THREE.Mesh(plateGeo, plateMat);
plateMesh.rotation.x = -Math.PI * 0.1;
scene.add(plateMesh);

// Sand particles: placed on nodal lines (Z≈0)
const PARTICLE_COUNT = 12000;
const pGeo = new THREE.BufferGeometry();
const pPositions = new Float32Array(PARTICLE_COUNT * 3);
const pColors = new Float32Array(PARTICLE_COUNT * 3);
const pSizes = new Float32Array(PARTICLE_COUNT);

// Nodal lines: sin(m*π*(x/W+0.5))=0 or sin(n*π*(y/H+0.5))=0
// These occur at x/W = (k/m - 0.5) and y/H = (k/n - 0.5)
function onNodalLine(x, y) {
  const xNorm = x / plateW + 0.5;
  const yNorm = y / plateH + 0.5;
  const xNodal = Math.abs(Math.sin(m * Math.PI * xNorm)) < 0.08;
  const yNodal = Math.abs(Math.sin(n * Math.PI * yNorm)) < 0.08;
  return xNodal || yNodal;
}

function initParticles() {
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const px = (Math.random() - 0.5) * plateW * 0.95;
    const py = (Math.random() - 0.5) * plateH * 0.95;
    pPositions[i * 3] = px;
    pPositions[i * 3 + 1] = py;
    pPositions[i * 3 + 2] = 0.05;
    // Sand is cream/white
    const bright = 0.7 + Math.random() * 0.3;
    pColors[i * 3] = bright * 0.9;
    pColors[i * 3 + 1] = bright * 0.85;
    pColors[i * 3 + 2] = bright * 0.65;
    pSizes[i] = 0.04 + Math.random() * 0.06;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
  pGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));
  pGeo.setAttribute('size', new THREE.BufferAttribute(pSizes, 1));
}
initParticles();

const pMat = new THREE.PointsMaterial({
  size: 0.06,
  vertexColors: true,
  transparent: true,
  opacity: 0.85,
  sizeAttenuation: true,
});
const particles = new THREE.Points(pGeo, pMat);
particles.rotation.x = -Math.PI * 0.1;
scene.add(particles);

// Particle physics: sand grains settle based on vibration
function updateParticles() {
  const posArr = pGeo.attributes.position.array;
  const vibStrength = Math.abs(Math.sin(phase));
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const px = posArr[i * 3];
    const py = posArr[i * 3 + 1];
    // Current plate height at this point
    const plateZ = amplitude * Math.sin(m * Math.PI * (px / plateW + 0.5)) *
                              Math.sin(n * Math.PI * (py / plateH + 0.5)) *
                              Math.sin(phase);
    // Sand bounces more when plate is at extreme displacement
    const bounce = (1 - vibStrength) * 0.02 + vibStrength * 0.08;
    posArr[i * 3 + 2] = plateZ + 0.05 + Math.sin(i * 137.5) * bounce;
  }
  pGeo.attributes.position.needsUpdate = true;
}

// Lighting
scene.add(new THREE.AmbientLight(0x223344, 3));
const dirLight = new THREE.DirectionalLight(0xfff8f0, 2);
dirLight.position.set(5, 15, 10);
scene.add(dirLight);
const rimLight = new THREE.PointLight(0x4466ff, 1, 30);
rimLight.position.set(-8, 5, 8);
scene.add(rimLight);

// UI
const sM = document.getElementById('sM');
const sN = document.getElementById('sN');
const modeDisplay = document.getElementById('mode');

function setMode(mm, nn) {
  m = mm; n = nn;
  modeDisplay.textContent = `${m},${n}`;
  sM.value = m; sN.value = n;
  updatePlateGeometry();
  initParticles();
}

sM.oninput = () => setMode(parseInt(sM.value), n);
sN.oninput = () => setMode(m, parseInt(sN.value));

document.getElementById('randomBtn').onclick = () => {
  setMode(Math.floor(Math.random() * 7), Math.floor(Math.random() * 9));
};

document.getElementById('particles').onchange = e => particles.visible = e.target.checked;
document.getElementById('bloom').onchange = e => bloomPass.enabled = e.target.checked;
document.getElementById('wireframe').onchange = e => {
  plateMat.wireframe = e.target.checked;
};

window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    setMode(Math.floor(Math.random() * 7), Math.floor(Math.random() * 9));
  }
});

// Freq display
const freqDisplay = document.createElement('div');
freqDisplay.style.cssText = 'position:fixed;top:14px;right:14px;color:#8cf;font-size:13px;background:rgba(0,0,0,0.8);padding:10px 16px;border-radius:6px;border:1px solid rgba(100,200,255,0.2)';
freqDisplay.textContent = 'f ≈ 440 × √(m²+2n²) Hz';
document.body.appendChild(freqDisplay);

let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;
  // Vibration frequency varies with mode
  const freq = Math.sqrt(m * m + 2 * n * n) * 0.5;
  phase = time * freq * 1.5;
  updatePlateGeometry();
  if (particles.visible) updateParticles();
  plateMesh.rotation.z = Math.sin(time * 0.1) * 0.01;
  controls.update();
  composer.render();
}
animate();
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
