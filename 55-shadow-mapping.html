<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadow Mapping 对比演示</title>
  <style>
    /* ---------- 全局样式 ---------- */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', sans-serif;
      color: #e0e0e0;
    }

    canvas { display: block; }

    /* ---------- 控制面板 ---------- */
    #panel {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 10;
      user-select: none;
    }

    #label {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #f5c842;
      text-shadow: 0 0 12px rgba(245, 200, 66, 0.55);
      transition: color 0.3s, text-shadow 0.3s;
    }

    #sublabel {
      font-size: 12px;
      color: #888;
      margin-top: -10px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    .shadow-btn {
      padding: 8px 22px;
      border: 2px solid #444;
      border-radius: 8px;
      background: #2a2a2a;
      color: #aaa;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      outline: none;
    }

    .shadow-btn:hover {
      border-color: #666;
      color: #ddd;
      background: #333;
    }

    .shadow-btn.active {
      border-color: #f5c842;
      color: #f5c842;
      background: #2e2a18;
      box-shadow: 0 0 10px rgba(245, 200, 66, 0.25);
    }

    /* ---------- 信息面板 ---------- */
    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.65);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 11px;
      line-height: 1.8;
      color: #888;
      max-width: 260px;
    }

    #info span { color: #ccc; }
  </style>
</head>
<body>

  <!-- 控制面板 -->
  <div id="panel">
    <div id="label">PCFShadowMap</div>
    <div id="sublabel">当前阴影类型</div>
    <div class="btn-group">
      <button class="shadow-btn active" data-type="PCFShadowMap">PCFShadowMap</button>
      <button class="shadow-btn" data-type="PCFSoftShadowMap">PCFSoftShadowMap</button>
      <button class="shadow-btn" data-type="BasicShadowMap">BasicShadowMap</button>
    </div>
  </div>

  <!-- 信息说明 -->
  <div id="info">
    <b style="color:#ccc">光照说明</b><br/>
    <span>DirectionalLight</span> — 模拟远距离平行光源（太阳）<br/>
    <span>SpotLight</span> — 有方向的点光源，带锥形照射范围<br/>
    <br/>
    <b style="color:#ccc">阴影类型说明</b><br/>
    <span>PCFShadowMap</span> — 百分比渐进滤波，边缘较锐<br/>
    <span>PCFSoftShadowMap</span> — 柔和阴影过渡，效果更细腻<br/>
    <span>BasicShadowMap</span> — 基础二值阴影，最锐利
  </div>

  <!-- three.js 引入（ES Module） -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    /* ================================================================
       场景基础搭建
    ================================================================ */
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    // 可选：添加雾效增强空间感
    scene.fog = new THREE.Fog(0x1a1a1a, 20, 60);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(8, 8, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    // ---------- 阴影映射核心配置 ----------
    // renderer.shadowMap.enabled = true 开启全局阴影渲染
    renderer.shadowMap.enabled = true;
    // shadowMap.type 指定阴影贴图滤波算法
    //   THREE.PCFShadowMap      — 默认，边缘有一定锯齿，渲染较快
    //   THREE.PCFSoftShadowMap  — 更柔和的边缘，渲染稍慢
    //   THREE.BasicShadowMap    — 最锐利，二值化阴影
    renderer.shadowMap.type = THREE.PCFShadowMap;
    document.body.appendChild(renderer.domElement);

    /* ================================================================
       OrbitControls（轨道控制）
    ================================================================ */
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.target.set(0, 1, 0);

    /* ================================================================
       光照系统
    ================================================================ */

    // -- 环境光 --
    const ambientLight = new THREE.AmbientLight(0x334455, 0.6);
    scene.add(ambientLight);

    // -- DirectionalLight（方向光）--
    //   castShadow: true 让光源产生阴影
    //   shadow.mapSize: 阴影贴图分辨率，越大越细腻（需为 2^n）
    //   shadow.camera: 正交相机视锥，决定阴影覆盖范围
    //   shadow.camera.left/right/top/bottom: 阴影相机范围（负值=左侧/下侧）
    //   shadow.bias: 偏移量，消除阴影痤疮（moire / acne artifact）
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.8);
    dirLight.position.set(6, 12, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left   = -12;
    dirLight.shadow.camera.right  =  12;
    dirLight.shadow.camera.top    =  12;
    dirLight.shadow.camera.bottom = -12;
    dirLight.shadow.camera.near   =  0.1;
    dirLight.shadow.camera.far    =  50;
    dirLight.shadow.bias          = -0.001;
    // shadowCameraHelper 可视化阴影相机（调试用）
    // scene.add(new THREE.CameraHelper(dirLight.shadow.camera));
    scene.add(dirLight);

    // -- SpotLight（聚光灯）--
    //   angle: 光锥半角（弧度）
    //   penumbra: 半影比例，值越大阴影边缘越柔和
    //   distance: 光照最大距离
    //   decay: 光强衰减系数（物理衰减）
    const spotLight = new THREE.SpotLight(0x44aaff, 80);
    spotLight.position.set(-6, 10, -4);
    spotLight.target.position.set(0, 0, 0);
    spotLight.angle    = Math.PI / 5;
    spotLight.penumbra = 0.4;
    spotLight.distance = 40;
    spotLight.decay    = 1.5;
    spotLight.castShadow = true;
    spotLight.shadow.mapSize.set(1024, 1024);
    spotLight.shadow.camera.near = 0.5;
    spotLight.shadow.camera.far  = 40;
    spotLight.shadow.bias        = -0.002;
    scene.add(spotLight);
    scene.add(spotLight.target);

    /* ================================================================
       地面（接收阴影）
    ================================================================ */
    const groundGeo = new THREE.PlaneGeometry(30, 30);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x2a2a2a,
      roughness: 0.85,
      metalness: 0.1,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;   // receiveShadow: true 使其接收阴影
    scene.add(ground);

    /* ================================================================
       几何体（投射阴影）
    ================================================================ */

    // 材质工厂，避免重复代码
    const stdMat = (color, rough = 0.5, metal = 0.2) =>
      new THREE.MeshStandardMaterial({ color, roughness, metalness: metal });

    // -- 立方体 --
    const cubeGeo = new THREE.BoxGeometry(2, 2, 2);
    const cube = new THREE.Mesh(cubeGeo, stdMat(0x7c5cbf));
    cube.position.set(3, 1, 0);
    cube.castShadow = true;        // castShadow: true 使其投射阴影
    cube.receiveShadow = true;
    scene.add(cube);

    // -- 球体 --
    const sphereGeo = new THREE.SphereGeometry(1.3, 32, 32);
    const sphere = new THREE.Mesh(sphereGeo, stdMat(0x42a88c));
    sphere.position.set(-3, 1.3, 0);
    sphere.castShadow = true;
    sphere.receiveShadow = true;
    scene.add(sphere);

    // -- 环面（Torus）--
    const torusGeo = new THREE.TorusGeometry(1.1, 0.4, 20, 60);
    const torus = new THREE.Mesh(torusGeo, stdMat(0xe07c42));
    torus.position.set(0, 1.1, 3);
    torus.rotation.x = Math.PI / 4;
    torus.castShadow = true;
    torus.receiveShadow = true;
    scene.add(torus);

    // -- 十二面体 --
    const dodecaGeo = new THREE.DodecahedronGeometry(1.1);
    const dodeca = new THREE.Mesh(dodecaGeo, stdMat(0xc04040));
    dodeca.position.set(0, 1.1, -3);
    dodeca.castShadow = true;
    dodeca.receiveShadow = true;
    scene.add(dodeca);

    /* ================================================================
       UI 切换逻辑
    ================================================================ */
    const label    = document.getElementById('label');
    const btnGroup = document.querySelectorAll('.shadow-btn');

    btnGroup.forEach(btn => {
      btn.addEventListener('click', () => {
        // 更新按钮高亮状态
        btnGroup.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 切换阴影类型
        const type = btn.dataset.type;
        switch (type) {
          case 'PCFShadowMap':
            renderer.shadowMap.type = THREE.PCFShadowMap;
            label.textContent = 'PCFShadowMap';
            label.style.color = '#f5c842';
            label.style.textShadow = '0 0 12px rgba(245,200,66,0.55)';
            break;
          case 'PCFSoftShadowMap':
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            label.textContent = 'PCFSoftShadowMap';
            label.style.color = '#4ec9ff';
            label.style.textShadow = '0 0 12px rgba(78,201,255,0.55)';
            break;
          case 'BasicShadowMap':
            renderer.shadowMap.type = THREE.BasicShadowMap;
            label.textContent = 'BasicShadowMap';
            label.style.color = '#ff6e4a';
            label.style.textShadow = '0 0 12px rgba(255,110,74,0.55)';
            break;
        }
      });
    });

    /* ================================================================
       窗口自适应
    ================================================================ */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ================================================================
       主动画循环
    ================================================================ */
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // 让几何体缓慢自转，方便多角度观察阴影变化
      cube.rotation.y    = t * 0.4;
      sphere.rotation.y  = t * 0.3;
      torus.rotation.z   = t * 0.2;
      dodeca.rotation.y  = t * 0.5;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
