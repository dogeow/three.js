<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>程序化城市 — three.js</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      pointer-events: none;
      text-align: center;
    }
  </style>

  <!--
    ============================================================
    title:         Procedural City — Three.js Example 183
    description:   A procedurally generated city grid rendered with
                   InstancedMesh for performance. Features day/night
                   toggling, emissive window lights, OrbitControls,
                   and live GUI to tweak density and height.
    technical pts:
      • three.js 0.160.0 via importmap (no bundler)
      • InstancedMesh for thousands of building instances
      • Procedural grid: city blocks separated by streets
      • Per-instance color + emissive for day/night window lights
      • lil-gui for runtime parameter tweaking
      • OrbitControls for free-fly camera
    how to run:
                   Serve the file with any static server, e.g.:
                     npx serve .
                     python3 -m http.server 8080
                   Then open http://localhost:8080/183-procedural-city/index.html
    ============================================================
  -->

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="info">拖拽旋转 · 滚轮缩放 · 右键平移</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

    // ─── Renderer ────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // ─── Scene ────────────────────────────────────────────────
    const scene = new THREE.Scene();

    // ─── Camera ───────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 2000);
    camera.position.set(160, 120, 160);

    // ─── Controls ─────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.maxPolarAngle = Math.PI / 2 - 0.02;
    controls.target.set(0, 0, 0);

    // ─── Day / Night state ────────────────────────────────────
    let isNight = false;

    // ─── GUI ──────────────────────────────────────────────────
    const params = {
      density: 0.72,
      maxHeight: 55,
      nightMode: false,
      regenerate: () => rebuildCity(),
    };

    const gui = new GUI();
    gui.add(params, 'density', 0.1, 1.0, 0.01).name('Density');
    gui.add(params, 'maxHeight', 10, 120, 1).name('Max Height');
    gui.add(params, 'nightMode').name('Night Mode').onChange(v => {
      isNight = v;
      applyNightMode();
    });
    gui.add(params, 'regenerate').name('🔄 Regenerate');

    // ─── Lights ───────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0xd0d8e8, 0.6);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xfff4e0, 2.2);
    sunLight.position.set(120, 200, 80);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    sunLight.shadow.camera.near = 10;
    sunLight.shadow.camera.far = 700;
    sunLight.shadow.camera.left  = -300;
    sunLight.shadow.camera.right =  300;
    sunLight.shadow.camera.top   =  300;
    sunLight.shadow.camera.bottom = -300;
    sunLight.shadow.bias = -0.0005;
    scene.add(sunLight);

    const fillLight = new THREE.DirectionalLight(0x8ab4d8, 0.4);
    fillLight.position.set(-80, 60, -120);
    scene.add(fillLight);

    const nightAmbient = new THREE.AmbientLight(0x0a0e1a, 0.8);

    // ─── Ground ───────────────────────────────────────────────
    // Street-level plane (dark asphalt)
    const groundGeo = new THREE.PlaneGeometry(800, 800);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x1a1a1a,
      roughness: 0.95,
      metalness: 0.0,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Sidewalk pads around each block (slightly lighter)
    const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x2e2e2e, roughness: 0.9 });

    // ─── Procedural City Generation ───────────────────────────

    // City layout constants
    const GRID_COLS  = 12;
    const GRID_ROWS  = 12;
    const BLOCK_W    = 28;   // width of each city block
    const BLOCK_D    = 28;   // depth of each city block
    const STREET_W   = 12;   // width of street between blocks
    const STEP_X     = BLOCK_W + STREET_W;
    const STEP_Z     = BLOCK_D + STREET_W;
    const OFFSET_X   = -(GRID_COLS * STEP_X) / 2;
    const OFFSET_Z   = -(GRID_ROWS * STEP_Z) / 2;

    // Shared geometry for all buildings (unit box, scaled per instance)
    const buildingGeo = new THREE.BoxGeometry(1, 1, 1);

    // Collect all InstancedMesh objects so we can rebuild
    let buildingMeshes = [];

    // Colors
    const BUILDING_COLORS = [
      0x8a9ab0, 0x7a8a9a, 0x9aa5b5, 0x6a7a8a,
      0xa5b0c0, 0x7d8fa0, 0x8595a8, 0x6e7f90,
      0x98a6b8, 0x708090,
    ];

    function rnd(min, max) { return min + Math.random() * (max - min); }
    function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function rebuildCity() {
      // Remove old meshes
      buildingMeshes.forEach(m => {
        scene.remove(m);
        m.geometry.dispose();
        if (Array.isArray(m.material)) m.material.forEach(mat => mat.dispose());
        else m.material.dispose();
      });
      buildingMeshes = [];

      const density      = params.density;
      const maxH         = params.maxHeight;
      const baseColor    = pick(BUILDING_COLORS);

      // Ground color shifts slightly with density
      groundMat.color.setHex(baseColor);

      for (let row = 0; row < GRID_ROWS; row++) {
        for (let col = 0; col < GRID_COLS; col++) {

          // Block centre world position
          const bx = OFFSET_X + col * STEP_X + BLOCK_W / 2;
          const bz = OFFSET_Z + row * STEP_Z + BLOCK_D / 2;

          // Subdivide block into building plots
          const plotsX = rndInt(2, 5);
          const plotsZ = rndInt(2, 5);
          const plotW  = BLOCK_W / plotsX;
          const plotD  = BLOCK_D / plotsZ;

          for (let px = 0; px < plotsX; px++) {
            for (let pz = 0; pz < plotsZ; pz++) {

              // Skip some plots randomly to create open spaces / plazas
              if (Math.random() > density) continue;

              // Building footprint
              const gap  = 0.6; // small gap between buildings
              const bw   = plotW - gap - rnd(0, 2);
              const bd   = plotD - gap - rnd(0, 2);
              if (bw < 1.5 || bd < 1.5) continue;

              // Height distribution — tall in centre, shorter at edges
              const distFromCentre = Math.hypot(col - GRID_COLS / 2, row - GRID_ROWS / 2) / (GRID_COLS / 2);
              const heightBias = Math.max(0, 1 - distFromCentre);
              const minH = 4;
              const maxHHere = minH + (maxH - minH) * (0.3 + 0.7 * heightBias + rnd(0, 0.3));
              const bh = rnd(minH, maxHHere);

              // Horizontal position within plot (slight jitter)
              const jx = rnd(-plotW * 0.1, plotW * 0.1);
              const jz = rnd(-plotD * 0.1, plotD * 0.1);
              const bpx = bx + px * plotW + plotW / 2 + jx;
              const bpz = bz + pz * plotD + plotD / 2 + jz;

              // Store for instancing
              // We'll collect per-(W,D,H) bucket and build InstancedMesh per bucket
              const key = `${bw.toFixed(1)}_${bd.toFixed(1)}`;
              if (!bucketMap.has(key)) bucketMap.set(key, []);
              bucketMap.get(key).push({ bw, bd, bh, x: bpx, z: bpz, baseColor });
            }
          }

          // Sidewalk pad for this block
          const sideGeo = new THREE.PlaneGeometry(BLOCK_W + 1, BLOCK_D + 1);
          const sideMesh = new THREE.Mesh(sideGeo, sidewalkMat);
          sideMesh.rotation.x = -Math.PI / 2;
          sideMesh.position.set(bx, 0.01, bz);
          sideMesh.receiveShadow = true;
          scene.add(sideMesh);
        }
      }

      // Group instances by (bw, bd, bh quantized) for better batching
      // Instead, group by rough height bucket for instanced mesh
      const hBuckets = new Map();
      const allBuildings = [];
      for (let row = 0; row < GRID_ROWS; row++) {
        for (let col = 0; col < GRID_COLS; col++) {
          const bx = OFFSET_X + col * STEP_X + BLOCK_W / 2;
          const bz = OFFSET_Z + row * STEP_Z + BLOCK_D / 2;
          const plotsX = rndInt(2, 5);
          const plotsZ = rndInt(2, 5);
          const plotW  = BLOCK_W / plotsX;
          const plotD  = BLOCK_D / plotsZ;
          for (let px = 0; px < plotsX; px++) {
            for (let pz = 0; pz < plotsZ; pz++) {
              if (Math.random() > density) continue;
              const gap = 0.6;
              const bw = plotW - gap - rnd(0, 2);
              const bd = plotD - gap - rnd(0, 2);
              if (bw < 1.5 || bd < 1.5) continue;
              const distFromCentre = Math.hypot(col - GRID_COLS / 2, row - GRID_ROWS / 2) / (GRID_COLS / 2);
              const heightBias = Math.max(0, 1 - distFromCentre);
              const minH = 4;
              const maxHHere = minH + (maxH - minH) * (0.3 + 0.7 * heightBias + rnd(0, 0.3));
              const bh = rnd(minH, maxHHere);
              const jx = rnd(-plotW * 0.1, plotW * 0.1);
              const jz = rnd(-plotD * 0.1, plotD * 0.1);
              const bpx = bx + px * plotW + plotW / 2 + jx;
              const bpz = bz + pz * plotD + plotD / 2 + jz;
              const hKey = Math.round(bh / 5) * 5;
              if (!hBuckets.has(hKey)) hBuckets.set(hKey, []);
              hBuckets.get(hKey).push({ bw, bd, bh, x: bpx, z: bpz });
            }
          }
        }
      }

      // Build one InstancedMesh per height bucket (allows efficient day/night)
      const dummy = new THREE.Object3D();
      const emissiveColor = new THREE.Color(0.9, 0.85, 0.6);
      const windowMat = new THREE.MeshStandardMaterial({
        color: 0xccd8ee,
        roughness: 0.3,
        metalness: 0.1,
        emissive: new THREE.Color(0, 0, 0),
        emissiveIntensity: 0,
      });

      let totalInstances = 0;
      hBuckets.forEach((buildings, hBucket) => {
        const count = buildings.length;
        if (count === 0) return;

        // Find a representative bw/bd for this bucket's geometry
        // Use a shared geometry that covers the range
        const maxBW = Math.max(...buildings.map(b => b.bw));
        const maxBD = Math.max(...buildings.map(b => b.bd));

        const geo = new THREE.BoxGeometry(maxBW, 1, maxBD);
        const mat = new THREE.MeshStandardMaterial({
          color: pick(BUILDING_COLORS),
          roughness: 0.7,
          metalness: 0.1,
          emissive: new THREE.Color(0, 0, 0),
          emissiveIntensity: 0,
        });

        const mesh = new THREE.InstancedMesh(geo, mat, count);
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        const tempColor = new THREE.Color();

        buildings.forEach((b, i) => {
          // Use actual bw/bd for scale; shift y so bottom sits at 0
          const scaleX = b.bw / maxBW;
          const scaleZ = b.bd / maxBD;
          dummy.position.set(b.x, b.bh / 2, b.z);
          dummy.scale.set(scaleX, b.bh, scaleZ);
          dummy.updateMatrix();
          mesh.setMatrixAt(i, dummy.matrix);

          // Vary colour slightly per instance
          tempColor.setHex(pick(BUILDING_COLORS));
          mesh.setColorAt(i, tempColor);
        });

        mesh.instanceMatrix.needsUpdate = true;
        if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;

        scene.add(mesh);
        buildingMeshes.push(mesh);
        totalInstances += count;
      });

      console.log(`[Procedural City] ${totalInstances} buildings generated across ${buildingMeshes.length} meshes.`);
    }

    // We need the bucket map before rebuildCity; rebuildCity uses its own hBuckets
    const bucketMap = new Map();
    rebuildCity();

    // ─── Sky colour helpers ───────────────────────────────────
    const DAY_SKY   = new THREE.Color(0x9ec8f0);
    const NIGHT_SKY = new THREE.Color(0x030712);
    const FOG_DAY   = new THREE.Color(0xb8cfe0);
    const FOG_NIGHT = new THREE.Color(0x050a14);

    function applyNightMode() {
      if (isNight) {
        scene.background = NIGHT_SKY;
        scene.fog = new THREE.FogExp2(FOG_NIGHT, 0.003);
        ambientLight.parent?.remove(ambientLight);
        scene.add(nightAmbient);
        sunLight.intensity = 0.05;
        fillLight.intensity = 0.02;
        renderer.toneMappingExposure = 0.35;

        buildingMeshes.forEach(mesh => {
          const mat = mesh.material;
          mat.emissive.set(0xffd080);
          mat.emissiveIntensity = 1.8;
        });
      } else {
        scene.background = DAY_SKY;
        scene.fog = new THREE.FogExp2(FOG_DAY, 0.0018);
        scene.remove(nightAmbient);
        scene.add(ambientLight);
        sunLight.intensity = 2.2;
        fillLight.intensity = 0.4;
        renderer.toneMappingExposure = 1.0;

        buildingMeshes.forEach(mesh => {
          const mat = mesh.material;
          mat.emissive.set(0x000000);
          mat.emissiveIntensity = 0;
        });
      }
    }

    applyNightMode();

    // ─── Resize handler ───────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Animation loop ───────────────────────────────────────
    const clock = new THREE.Clock();

    (function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      // Subtle building sway at night (window flicker)
      if (isNight && buildingMeshes.length > 0) {
        buildingMeshes.forEach(mesh => {
          const t = elapsed * 0.8 + Math.random() * 0.1;
          const flicker = 1.6 + Math.sin(t * 3.7) * 0.15 + Math.sin(t * 11.3) * 0.05;
          mesh.material.emissiveIntensity = flicker;
        });
      }

      controls.update();
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
